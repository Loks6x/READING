<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Apple Style Reader</title>

<!-- Библиотеки для парсинга и хранения -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/epub.js/0.3.93/epub.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>

<style>
  :root {
    /* Светлая тема (Apple Books) */
    --bg-color: #ffffff;
    --text-color: #000000;
    --text-muted: #8e8e93;
    --accent-color: #007aff;
    --bar-bg: rgba(255, 255, 255, 0.85);
    --bar-border: rgba(0, 0, 0, 0.1);
    --menu-bg: rgba(242, 242, 247, 0.95);
    --item-hover: #e5e5ea;
    
    --font-ui: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    --font-reading: 'Georgia', 'Times New Roman', serif;
    --font-size: 18px;
    --line-height: 1.6;
  }

  body.dark {
    --bg-color: #000000;
    --text-color: #f2f2f7;
    --text-muted: #8e8e93;
    --accent-color: #0a84ff;
    --bar-bg: rgba(28, 28, 30, 0.85);
    --bar-border: rgba(255, 255, 255, 0.1);
    --menu-bg: rgba(28, 28, 30, 0.95);
    --item-hover: #2c2c2e;
  }

  body.sepia {
    --bg-color: #f4ecd8;
    --text-color: #5b4636;
    --bar-bg: rgba(244, 236, 216, 0.9);
    --menu-bg: rgba(235, 225, 200, 0.95);
    --item-hover: #e0d4b8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  
  body {
    background-color: var(--bg-color);
    color: var(--text-color);
    font-family: var(--font-reading);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    transition: background-color 0.3s ease, color 0.3s ease;
  }

  /* Читалка на весь экран */
  #viewer {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    overflow: hidden;
  }

  /* Рендеринг для HTML/FB2/TXT через колонки (имитация страниц) */
  #column-viewer {
    width: 100%;
    height: 100%;
    padding: 40px 20px;
    column-width: 100vw;
    column-gap: 0;
    overflow-x: scroll;
    overflow-y: hidden;
    scroll-snap-type: x mandatory;
    font-size: var(--font-size);
    line-height: var(--line-height);
  }
  
  #column-viewer > * { max-width: 100%; }
  #column-viewer p { text-indent: 1.5em; margin-bottom: 0.5em; text-align: justify; }
  #column-viewer img { max-width: 100%; height: auto; display: block; margin: 10px auto; border-radius: 8px; }
  .scroll-page { scroll-snap-align: center; width: 100vw; height: 100%; display: inline-block; }

  /* Зоны для тапов */
  #tap-zone-left { position: absolute; top: 10%; left: 0; width: 25%; height: 80%; z-index: 10; }
  #tap-zone-right { position: absolute; top: 10%; right: 0; width: 25%; height: 80%; z-index: 10; }
  #tap-zone-center { position: absolute; top: 10%; left: 25%; width: 50%; height: 80%; z-index: 10; }

  /* UI Панели (Верх и Низ) */
  .ui-bar {
    position: absolute;
    left: 0; right: 0;
    background: var(--bar-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    z-index: 100;
    display: flex;
    align-items: center;
    padding: 10px 20px;
    transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.4s ease;
    font-family: var(--font-ui);
    color: var(--accent-color);
  }
  
  .ui-bar.hidden { opacity: 0; pointer-events: none; }

  #top-bar { top: 0; justify-content: space-between; border-bottom: 1px solid var(--bar-border); padding-top: max(10px, env(safe-area-inset-top)); }
  #top-bar.hidden { transform: translateY(-100%); }
  
  #bottom-bar { bottom: 0; justify-content: space-around; border-top: 1px solid var(--bar-border); padding-bottom: max(10px, env(safe-area-inset-bottom)); }
  #bottom-bar.hidden { transform: translateY(100%); }

  .icon-btn {
    background: none; border: none; color: var(--accent-color);
    font-size: 24px; cursor: pointer; padding: 5px;
    display: flex; align-items: center; justify-content: center;
  }
  .icon-btn svg { width: 24px; height: 24px; fill: currentColor; }
  .icon-btn:active { opacity: 0.5; }

  .book-title-header {
    flex: 1; text-align: center; font-weight: 600; font-size: 15px;
    color: var(--text-color); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 15px;
  }

  /* Прогресс бар внизу */
  .progress-container {
    position: absolute; bottom: 100%; left: 0; right: 0;
    height: 3px; background: rgba(0,0,0,0.1);
  }
  .progress-fill { height: 100%; background: var(--accent-color); width: 0%; transition: width 0.2s; }

  /* Боковое меню */
  #side-menu {
    position: absolute; top: 0; left: 0; bottom: 0; width: 320px; max-width: 85vw;
    background: var(--menu-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
    z-index: 200; transform: translateX(-100%); transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
    display: flex; flex-direction: column; font-family: var(--font-ui);
    box-shadow: 2px 0 10px rgba(0,0,0,0.1);
  }
  #side-menu.open { transform: translateX(0); }
  
  .menu-overlay {
    position: absolute; inset: 0; background: rgba(0,0,0,0.4); z-index: 150;
    opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
  }
  .menu-overlay.open { opacity: 1; pointer-events: auto; }

  .menu-header {
    padding: max(20px, env(safe-area-inset-top)) 20px 20px;
    font-size: 28px; font-weight: 700; border-bottom: 1px solid var(--bar-border);
    color: var(--text-color);
  }

  .menu-tabs { display: flex; border-bottom: 1px solid var(--bar-border); }
  .tab-btn { flex: 1; padding: 12px 0; background: none; border: none; font-size: 14px; font-weight: 600; color: var(--text-muted); cursor: pointer; }
  .tab-btn.active { color: var(--accent-color); box-shadow: inset 0 -2px 0 var(--accent-color); }

  .menu-content { flex: 1; overflow-y: auto; padding: 10px; }
  
  .list-item {
    padding: 12px 15px; border-radius: 10px; margin-bottom: 5px; cursor: pointer;
    display: flex; align-items: center; gap: 15px; transition: background 0.2s;
    color: var(--text-color);
  }
  .list-item:hover, .list-item.active { background: var(--item-hover); }
  .list-item .icon { font-size: 20px; flex-shrink: 0; }
  .list-item .text { flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; font-size: 15px; }
  
  .upload-wrapper { padding: 20px; margin-top: auto; border-top: 1px solid var(--bar-border); }
  .btn-primary {
    width: 100%; padding: 14px; background: var(--accent-color); color: white;
    border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer;
  }

  /* Настройки (Модальное окно) */
  #settings-panel {
    position: absolute; bottom: 70px; right: 20px; width: 280px;
    background: var(--menu-bg); backdrop-filter: blur(25px); border-radius: 16px;
    padding: 20px; z-index: 105; box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    display: none; font-family: var(--font-ui); color: var(--text-color);
  }
  #settings-panel.show { display: block; animation: popup 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
  @keyframes popup { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }

  .set-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
  .theme-btn { 
    width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--bar-border); cursor: pointer;
  }
  .sz-btn { background: var(--item-hover); border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 20px; color: var(--text-color); cursor: pointer;}

  /* Экран приветствия / Загрузка */
  #welcome-screen, #loading-screen {
    position: absolute; inset: 0; background: var(--bg-color); z-index: 50;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-family: var(--font-ui); color: var(--text-color); padding: 20px; text-align: center;
  }
  .spinner { width: 40px; height: 40px; border: 4px solid var(--item-hover); border-top-color: var(--accent-color); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px;}
  @keyframes spin { to { transform: rotate(360deg); } }
  #file-input { display: none; }

</style>
</head>
<body>

<!-- Экран приветствия -->
<div id="welcome-screen">
  <svg width="80" height="80" viewBox="0 0 24 24" fill="var(--accent-color)" style="margin-bottom: 20px;"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20V4H6.5A2.5 2.5 0 0 0 4 6.5v13ZM4 21a2 2 0 0 1-2-2V6.5A4.5 4.5 0 0 1 6.5 2H22v17H6.5a.5.5 0 0 0-.5.5.5.5 0 0 0 .5.5H22v2H6.5A4.5 4.5 0 0 1 4 21Z"/></svg>
  <h1 style="font-size: 24px; font-weight: 700; margin-bottom: 10px;">Моя Библиотека</h1>
  <p style="color: var(--text-muted); margin-bottom: 30px; font-size: 16px;">Добавьте книги (EPUB, FB2, PDF, TXT, DOCX), чтобы начать чтение.</p>
  <button class="btn-primary" style="max-width: 250px;" onclick="document.getElementById('file-input').click()">Добавить книгу</button>
</div>

<!-- Загрузочный экран -->
<div id="loading-screen" style="display: none; z-index: 300;">
  <div class="spinner"></div>
  <h2 id="loading-text" style="font-size: 18px; font-weight: 600;">Открытие книги...</h2>
</div>

<!-- Читалка -->
<div id="viewer">
  <!-- Сюда встраивается epub.js или наш CSS column viewer -->
  <div id="column-viewer" style="display:none;"></div>
</div>

<!-- Зоны листания и вызова UI -->
<div id="tap-zone-left" onclick="prevPage()"></div>
<div id="tap-zone-center" onclick="toggleUI()"></div>
<div id="tap-zone-right" onclick="nextPage()"></div>

<!-- Верхняя панель -->
<div id="top-bar" class="ui-bar hidden">
  <button class="icon-btn" onclick="toggleMenu()">
    <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
  </button>
  <div class="book-title-header" id="header-title"></div>
  <button class="icon-btn" onclick="addBookmark()" id="bookmark-btn">
    <svg viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>
  </button>
</div>

<!-- Нижняя панель -->
<div id="bottom-bar" class="ui-bar hidden">
  <div class="progress-container"><div class="progress-fill" id="progress-bar"></div></div>
  <button class="icon-btn" onclick="prevPage()"><svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6z"/></svg></button>
  <button class="icon-btn" onclick="toggleTTS()" id="tts-btn"><svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg></button>
  <button class="icon-btn" onclick="toggleSettings()"><svg viewBox="0 0 24 24"><path d="M12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5m7.43-2.53c.04-.32.07-.64.07-.97 0-.33-.03-.66-.07-.96l2.11-1.66c.19-.15.25-.42.12-.64l-2-3.46c-.12-.22-.39-.31-.61-.22l-2.49 1c-.52-.39-1.06-.73-1.69-.98l-.37-2.65c-.04-.24-.25-.42-.5-.42h-4c-.25 0-.46.18-.5.42l-.37 2.65c-.63.25-1.17.59-1.69.98l-2.49-1c-.22-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.66c-.04.3-.07.63-.07.96 0 .33.03.66.07.97l-2.11 1.66c-.19.15-.25.42-.12.64l2 3.46c.12.22.39.31.61.22l2.49-1c.52.4 1.06.74 1.69.99l.37 2.65c.04.24.25.42.5.42h4c.25 0 .46-.18.5-.42l.37-2.65c.63-.26 1.17-.59 1.69-.99l2.49 1c.22.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.66z"/></svg></button>
  <button class="icon-btn" onclick="nextPage()"><svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg></button>
</div>

<!-- Модалка Настроек -->
<div id="settings-panel">
  <div class="set-row">
    <span>Размер шрифта</span>
    <div>
      <button class="sz-btn" onclick="changeFontSize(-2)">A-</button>
      <button class="sz-btn" onclick="changeFontSize(2)" style="font-size: 24px;">A+</button>

  </div>
  <div class="set-row">
    <span>Тема</span>
    <div style="display:flex; gap:10px;">
      <button class="theme-btn" style="background:#fff" onclick="setTheme('light')"></button>
      <button class="theme-btn" style="background:#f4ecd8" onclick="setTheme('sepia')"></button>
      <button class="theme-btn" style="background:#1c1c1e" onclick="setTheme('dark')"></button>
    </div>
  </div>
</div>

<!-- Оверлей и Боковое меню -->
<div class="menu-overlay" id="menu-overlay" onclick="toggleMenu()"></div>
<div id="side-menu">
  <div class="menu-header">Библиотека</div>
  <div class="menu-tabs">
    <button class="tab-btn active" onclick="switchTab('books')" id="tab-books">Книги</button>
    <button class="tab-btn" onclick="switchTab('bookmarks')" id="tab-bookmarks">Закладки</button>
  </div>
  
  <div class="menu-content" id="list-books"></div>
  <div class="menu-content" id="list-bookmarks" style="display: none;"></div>
  
  <div class="upload-wrapper">
    <input type="file" id="file-input" accept=".epub,.fb2,.txt,.pdf,.docx" multiple>
    <button class="btn-primary" onclick="document.getElementById('file-input').click()">+ Загрузить файл</button>
  </div>
</div>

<script>
/* === ИНИЦИАЛИЗАЦИЯ И STATE === */
let library = [];
let currentBook = null;
let epubBook = null;
let epubRendition = null;
let uiVisible = false;
let currentCfiOrPage = 0;
let totalPagesCol = 1;
let ttsActive = false;
let synth = window.speechSynthesis;

// Запуск
window.onload = async () => {
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  
  const savedTheme = localStorage.getItem('theme') || 'light';
  const savedSize = localStorage.getItem('fontSize') || '18';
  setTheme(savedTheme);
  changeFontSize(0, parseInt(savedSize));

  await loadLibrary();
  
  const lastBookId = localStorage.getItem('lastBookId');
  if (lastBookId) {
    const book = library.find(b => b.id === lastBookId);
    if (book) await openBook(book.id);
  }
};

/* === БАЗА ДАННЫХ И БИБЛИОТЕКА === */
async function loadLibrary() {
  const keys = await localforage.keys();
  library = [];
  for (let key of keys) {
    if (key.startsWith('book_')) {
      const meta = await localforage.getItem(key + '_meta');
      if (meta) library.push(meta);
    }
  }
  library.sort((a,b) => b.added - a.added);
  renderLibrary();
  if (library.length > 0) document.getElementById('welcome-screen').style.display = 'none';
}

function renderLibrary() {
  const container = document.getElementById('list-books');
  container.innerHTML = '';
  if(library.length === 0) {
    container.innerHTML = '<p style="text-align:center; margin-top:20px; color:var(--text-muted);">Библиотека пуста</p>';
    return;
  }
  library.forEach(book => {
    const div = document.createElement('div');
    div.className = 'list-item' + (currentBook && currentBook.id === book.id ? ' active' : '');
    div.innerHTML = `<span class="icon">📘</span><span class="text">${escapeHtml(book.title)}</span>`;
    div.onclick = () => { toggleMenu(); openBook(book.id); };
    
    // Кнопка удаления
    const delBtn = document.createElement('span');
    delBtn.innerHTML = '✕';
    delBtn.style.color = 'var(--text-muted)';
    delBtn.onclick = (e) => { e.stopPropagation(); deleteBook(book.id); };
    div.appendChild(delBtn);

    container.appendChild(div);
  });
}

async function deleteBook(id) {
  if(!confirm('Удалить книгу?')) return;
  await localforage.removeItem(id);
  await localforage.removeItem(id + '_meta');
  if(currentBook && currentBook.id === id) location.reload();
  await loadLibrary();
}

/* === ЗАГРУЗКА ФАЙЛОВ === */
document.getElementById('file-input').addEventListener('change', async (e) => {
  const files = e.target.files;
  if (!files.length) return;
  toggleMenu(false);
  document.getElementById('welcome-screen').style.display = 'none';
  
  for (let file of files) {
    document.getElementById('loading-screen').style.display = 'flex';
    document.getElementById('loading-text').textContent = 'Обработка: ' + file.name;
    try {
      await processFile(file);
    } catch (err) {
      alert('Ошибка при загрузке ' + file.name + ':\n' + err.message);
    }
  }
  document.getElementById('loading-screen').style.display = 'none';
  e.target.value = '';
});

async function processFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  const id = 'book_' + Date.now();
  let content = null;
  const title = file.name.replace(/\.[^.]+$/, '');

  if (ext === 'epub') {
    content = await file.arrayBuffer();
  } else if (ext === 'fb2') {
    content = parseFB2(await file.text());
  } else if (ext === 'txt') {
    content = parseTXT(await file.text());
  } else if (ext === 'docx') {
    const res = await mammoth.convertToHtml({arrayBuffer: await file.arrayBuffer()});
    content = res.value;
  } else if (ext === 'pdf') {
    content = await extractPDFText(await file.arrayBuffer());
  } else {
    throw new Error('Неподдерживаемый формат');
  }

  const meta = { id, title, format: ext, added: Date.now(), bookmarks: [], lastPos: 0 };
  
  await localforage.setItem(id, content);
  await localforage.setItem(id + '_meta', meta);
  
  await loadLibrary();
  await openBook(id);
}

/* === ПАРСЕРЫ === */
function parseTXT(text) {
  return text.split(/\n\n+/).map(p => `<p>${escapeHtml(p.trim())}</p>`).join('');
}

function parseFB2(xmlText) {
  const parser = new DOMParser();
  const xml = parser.parseFromString(xmlText, 'text/xml');
  
  // Извлекаем картинки (base64)
  const binaries = xml.querySelectorAll('binary');
  const imgMap = {};
  binaries.forEach(b => {
    const id = b.getAttribute('id');
    const type = b.getAttribute('content-type') || 'image/jpeg';
    imgMap['#' + id] = `data:${type};base64,${b.textContent.trim()}`;
  });

  // Строим HTML
  let html = '';
  const bodies = xml.querySelectorAll('body');
  bodies.forEach(body => {
    const elements = body.querySelectorAll('p, title, image, empty-line');
    elements.forEach(el => {
      if (el.tagName === 'p') html += `<p>${el.textContent}</p>`;
      else if (el.tagName === 'title') html += `<h3>${el.textContent}</h3>`;
      else if (el.tagName === 'empty-line') html += `<br>`;
      else if (el.tagName === 'image') {
        const href = el.getAttribute('l:href') || el.getAttribute('xlink:href');
        if (imgMap[href]) html += `<img src="${imgMap[href]}">`;
      }
    });
  });
  return html || 'Текст не найден';
}

async function extractPDFText(buffer) {
  const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
  let html = '';
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    const text = content.items.map(item => item.str).join(' ');
    html += `<p>${escapeHtml(text)}</p>`;
  }
  return html;
}

/* === ОТКРЫТИЕ КНИГИ И РЕНДЕРИНГ === */
async function openBook(id) {
  document.getElementById('loading-screen').style.display = 'flex';
  document.getElementById('loading-text').textContent = 'Открытие книги...';
  
  if (epubBook) { epubBook.destroy(); epubBook = null; }
  document.getElementById('viewer').innerHTML = '<div id="column-viewer" style="display:none;"></div>';
  
  currentBook = await localforage.getItem(id + '_meta');
  const content = await localforage.getItem(id);
  
  document.getElementById('header-title').textContent = currentBook.title;
  localStorage.setItem('lastBookId', id);
  renderLibrary();
  renderBookmarks();

  if (currentBook.format === 'epub') {
    initEpub(content);
  } else {
    initColumns(content);
  }
  
  setTimeout(() => { document.getElementById('loading-screen').style.display = 'none'; }, 500);
}

// Рендер EPUB
function initEpub(buffer) {
  epubBook = ePub(buffer);
  epubRendition = epubBook.renderTo("viewer", {
    width: "100%", height: "100%", spread: "none", manager: "continuous", flow: "paginated"
  });

  const theme = localStorage.getItem('theme') || 'light';
  applyEpubTheme(theme);
  applyEpubFontSize();

  epubRendition.display(currentBook.lastPos || undefined);
  
  epubRendition.on('relocated', (loc) => {
    currentCfiOrPage = loc.start.cfi;
    updateProgress(loc.start.percentage);
    saveProgress();
  });

  epubRendition.on('click', handleViewerTap);
  epubRendition.on('touchstart', handleTouchStart);
  epubRendition.on('touchend', handleTouchEnd);
}

// Рендер остальных форматов (HTML) в колонках
function initColumns(html) {
  const viewer = document.getElementById('column-viewer');
  viewer.style.display = 'block';
  viewer.innerHTML = html;
  
  // Вычисляем ширину после рендера для пагинации
  setTimeout(() => {
    const totalWidth = viewer.scrollWidth;
    const viewWidth = viewer.clientWidth;
    totalPagesCol = Math.ceil(totalWidth / viewWidth);
    
    // Прыгаем на сохраненную страницу
    let targetPage = parseInt(currentBook.lastPos || '0');
    goToColPage(targetPage);
  }, 100);

  viewer.addEventListener('scroll', () => {
    const page = Math.round(viewer.scrollLeft / viewer.clientWidth);
    currentCfiOrPage = page;
    updateProgress(page / Math.max(1, totalPagesCol - 1));
    clearTimeout(window.scrollTimeout);
    window.scrollTimeout = setTimeout(saveProgress, 500);
  });
}

function goToColPage(pageIdx) {
  const viewer = document.getElementById('column-viewer');
  pageIdx = Math.max(0, Math.min(pageIdx, totalPagesCol - 1));
  viewer.scrollTo({ left: pageIdx * viewer.clientWidth, behavior: 'smooth' });
  currentCfiOrPage = pageIdx;
}

/* === НАВИГАЦИЯ === */
function prevPage() {
  if (epubRendition) epubRendition.prev();
  else goToColPage(currentCfiOrPage - 1);
}
function nextPage() {
  if (epubRendition) epubRendition.next();
  else goToColPage(currentCfiOrPage + 1);
}

function updateProgress(percent) {
  document.getElementById('progress-bar').style.width = (percent * 100) + '%';
}

function saveProgress() {
  if(!currentBook) return;
  currentBook.lastPos = currentCfiOrPage;
  localforage.setItem(currentBook.id + '_meta', currentBook);
}

/* === УПРАВЛЕНИЕ UI И ЖЕСТАМИ === */
function toggleUI() {
  uiVisible = !uiVisible;
  const top = document.getElementById('top-bar');
  const bot = document.getElementById('bottom-bar');
  const set = document.getElementById('settings-panel');
  if (uiVisible) {
    top.classList.remove('hidden'); bot.classList.remove('hidden');
  } else {
    top.classList.add('hidden'); bot.classList.add('hidden'); set.classList.remove('show');
  }
}

function handleViewerTap(e) {
  const x = e.clientX || e.changedTouches[0].clientX;
  const w = window.innerWidth;
  if (x < w * 0.25) prevPage();
  else if (x > w * 0.75) nextPage();
  else toggleUI();
}

let touchStartX = 0;
function handleTouchStart(e) { touchStartX = e.changedTouches[0].screenX; }
function handleTouchEnd(e) {
  const touchEndX = e.changedTouches[0].screenX;
  if (touchStartX - touchEndX > 50) nextPage();
  if (touchEndX - touchStartX > 50) prevPage();
}

/* === БОКОВОЕ МЕНЮ И ВКЛАДКИ === */
function toggleMenu(force) {
  const menu = document.getElementById('side-menu');
  const overlay = document.getElementById('menu-overlay');
  const isOpen = force !== undefined ? force : !menu.classList.contains('open');
  
  if (isOpen) {
    menu.classList.add('open'); overlay.classList.add('open');
  } else {
    menu.classList.remove('open'); overlay.classList.remove('open');
  }
}

function switchTab(tab) {
  document.getElementById('tab-books').classList.toggle('active', tab === 'books');
  document.getElementById('tab-bookmarks').classList.toggle('active', tab === 'bookmarks');
  document.getElementById('list-books').style.display = tab === 'books' ? 'block' : 'none';
  document.getElementById('list-bookmarks').style.display = tab === 'bookmarks' ? 'block' : 'none';
  if(tab === 'bookmarks') renderBookmarks();
}

/* === ЗАКЛАДКИ === */
async function addBookmark() {
  if(!currentBook) return;
  
  let label = '';
  if (epubRendition) {
    const loc = epubRendition.currentLocation();
    label = 'Глава/Стр: ' + (loc.start.percentage * 100).toFixed(1) + '%';
  } else {
    label = 'Страница ' + (currentCfiOrPage + 1);
  }

  const bm = { pos: currentCfiOrPage, label: label, date: new Date().toLocaleDateString() };
  currentBook.bookmarks.push(bm);
  await localforage.setItem(currentBook.id + '_meta', currentBook);
  
  const btn = document.getElementById('bookmark-btn');
  btn.style.color = '#ff3b30'; // Красный при добавлении
  setTimeout(() => btn.style.color = '', 1000);
  renderBookmarks();
}

function renderBookmarks() {
  const container = document.getElementById('list-bookmarks');
  container.innerHTML = '';
  if(!currentBook || !currentBook.bookmarks || currentBook.bookmarks.length === 0) {
    container.innerHTML = '<p style="text-align:center; margin-top:20px; color:var(--text-muted);">Нет закладок</p>';
    return;
  }
  
  currentBook.bookmarks.forEach((bm, idx) => {
    const div = document.createElement('div');
    div.className = 'list-item';
    div.innerHTML = `<span class="icon">🔖</span><div class="text"><b>${bm.label}</b><br><small style="color:var(--text-muted)">${bm.date}</small></div>`;
    div.onclick = () => {
      toggleMenu(false);
      if (epubRendition) epubRendition.display(bm.pos);
      else goToColPage(bm.pos);
    };
    
    const del = document.createElement('span');
    del.innerHTML = '✕';
    del.style.color = 'var(--text-muted)';
    del.onclick = async (e) => {
      e.stopPropagation();
      currentBook.bookmarks.splice(idx, 1);
      await localforage.setItem(currentBook.id + '_meta', currentBook);
      renderBookmarks();
    };
    div.appendChild(del);
    container.appendChild(div);
  });
}

/* === НАСТРОЙКИ (ТЕМА И ШРИФТ) === */
function toggleSettings() {
  document.getElementById('settings-panel').classList.toggle('show');
}

function setTheme(theme) {
  document.body.className = theme;
  localStorage.setItem('theme', theme);
  if (epubRendition) applyEpubTheme(theme);
}

function applyEpubTheme(theme) {
  if(!epubRendition) return;
  const colors = {
    'light': { body: '#ffffff', color: '#000000' },
    'dark': { body: '#000000', color: '#f2f2f7' },
    'sepia': { body: '#f4ecd8', color: '#5b4636' }
  };
  epubRendition.themes.register(theme, { body: { background: colors[theme].body, color: colors[theme].color }});
  epubRendition.themes.select(theme);
}

function changeFontSize(delta, exact) {
  let size = exact || parseInt(getComputedStyle(document.documentElement).getPropertyValue('--font-size'));
  size += delta;
  size = Math.max(12, Math.min(size, 36));
  document.documentElement.style.setProperty('--font-size', size + 'px');
  localStorage.setItem('fontSize', size);
  if (epubRendition) applyEpubFontSize();
}

function applyEpubFontSize() {
  if(epubRendition) {
    const size = localStorage.getItem('fontSize') || '18';
    epubRendition.themes.fontSize(size + 'px');
  }
}

/* === ОЗВУЧКА (TTS) === */
function toggleTTS() {
  if (!currentBook) return;
  if (ttsActive) {
    synth.cancel();
    ttsActive = false;
    document.getElementById('tts-btn').style.color = '';
  } else {
    let text = '';
    // Чтение для не-epub
    if (!epubRendition) {
      // Извлекаем текст примерно для текущей страницы
      const viewer = document.getElementById('column-viewer');
      text = viewer.innerText.slice(currentCfiOrPage * 500, (currentCfiOrPage + 2) * 500); // Примерно
    } else {
      alert("TTS временно работает лучше только для TXT/FB2 форматов.");
      return;
    }
    
    if(!text) return;
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'ru-RU';
    utter.onend = () => { ttsActive = false; document.getElementById('tts-btn').style.color = ''; };
    synth.speak(utter);
    ttsActive = true;
    document.getElementById('tts-btn').style.color = '#34c759'; // Зеленый
  }
}

/* Утилиты */
function escapeHtml(unsafe) {
  return (unsafe||'').replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}
