йпиринья». Его название\nпроисходит от слова «кайпира», что\nозначает «крестьянин, грубый и неотесанный человек», то есть «деревенщина».\nНаряду с «Кайпириньей» и ее вариантами, кашаса позволяет создавать\nи другие чудесные коктейли. Она\nстановится новым оружием в арсенале миксолога, желающего расширить\nпалитру вкусов. Этот напиток подхлестывает воображение бармена.\nКашаса превосходно сочетается со\nследующими ингредиентами:\n• Ананасы, маракуйя, манго и все\nэкзотические фрукты.\n• Красные и черные ягоды, в том\nчисле клюква.\n• Другие спиртные напитки (следует\nотметить сочетание с мескалем).\n• Просекко и другие игристые напитки.\n• Кориандр, мята, имбирь...", "Тра диционна я к ашаса\n\nБ ренд L eblon\n\nКашаса – это постоянно прогрессирующая категория напитков. Для тех, кто ищет аутентичные\nместные продукты, кашаса представляет большой интерес.\nХотя производители кашасы и предпочитают\nсравнивать ее с виски, коньяком или даже текилой или мескалем, первый вопрос, которым следует задаться в отношении кашасы, это суть ее\nотличия от рома.\nДействительно, кашаса очень сильно отличается от ромов английского типа, изготовленных на\nоснове патоки и отходов сахарного производства. Она ближе к рому французской традиции,\nпоскольку производится из свежего сока сахарного тростника. Но ее перегонка в кубах типа\n«пот стил», равно как и ее бразильский дух, превращают кашасу в уникальный напиток в любом\nслучае.\n\nЛеблон – это название пляжа и роскошного квартала в Рио-де-Жанейро.\nБывший владелец этих земель – француз Шарль\nЛеблон – перепродал их португальцам в 1878\nгоду.\n\nОт урожая до дистиллята\nДома, производящие традиционную кашасу, как\nправило, владеют собственными плантациями\nсахарного тростника, за которыми тщательно\nухаживают.\nПосле жатвы, длящейся с июня по октябрь, тростник перемалывается и отжимается, чтобы получить сладкий сок бледного цвета, который называют «Кальдо де кане» или «Гуарапа».\nЭтот сок подвергается брожению с использованием натуральных дрожжей, индивидуальных для\nкаждого дома и определяющих вкус кашасы.\nПерегонка, как правило, осуществляется в кубах\nтипа «пот стил». Очень важно как можно быстрее\nперегнать тростниковое сусло во избежание его\nпорчи. В зависимости от дома, кашасу перегоняют два или три раза. Полученный дистиллят отделяют от голов и хвостов, а затем выдерживают\nоколо 6 месяцев.\n\nВинокурня «Леблон»\nЧто касается винокурни «Леблон», то она расположена в глубинных землях, в знаменитом МинасЖерайс.\nДом «Леблон» владеет собственными плантациями сахарного стростника, площадь которых составляет 100 гектаров.\nЧерпая вдохновение во французских корнях\nШарля Леблона, Дом разработал уникальную технологию, сочетающую французское мастерство\nперегонки и уважение народных бразильских\nтрадиций производства кашасы.\nДом «Леблон» стоит у истоков мирового обновления кашасы. В частности он участвовал в популяризации слова «кашаса» (cachaça) в Соединенных Штатах, где она до этого продавалась под\nназванием «ром».\n\nЛинейка Leblon\nLeblon – молодая, светлая кашаса, выдержанная\nоколо шести месяцев в бочках из-под коньяка\nXO. Она проявляет ароматы сахарного тростника, фруктов и пряностей. Употребляется, в первую очередь, в составе «Кайпириньи» и других\nкоктейлей.\nLeblon Reserva Especial стареет около двух лет\nв новых французских бочках из лимузенского\nдуба. Она обладает мягким и сложным вкусом с\nнотами меда, карамели и кедровых орехов. Ее\nможно пить как в чистом виде со льдом, так и в\nмногочисленных коктейлях.\n\nВыдержка\n\nКашаса Leblon в коктейлях\n\nВыдержка также играет крайне важную роль в\nпроизводстве кашасы. Допускаются любые породы дерева, как, например, некоторые экзотические, типично бразильские сорта. Некоторые\nдома используют бочки из американского дуба,\nили даже лимузенские бочки из-под коньяка.\nВ результате получается не просто праздничный,\nно очень утонченный напиток несравненного\nароматического качества. Выдержка в бочках может достигать порядка 20 лет.\nХорошая кашаса имеет тонкий аромат. Кроме\nтого, ей свойственна характерная легкая кислотность, добавляющая ей сложности.\n\nДом «Леблон» активно работает с барменами, доказывая, что кашаса занимает достойное место\nрядом с другими известными спиртными напитками, такими как виски, водка, текила...\nКашаса Leblon равно используется как для твистов великих исторических коктейлей, так и для\nновых творений.\nОна привносит в них, помимо своей свежести,\nутонченность, сложность и собственный вкус,\nнеподражаемый дух бразильского праздника, не\nимеющий равных во всем мире.\n\nО собенности производства\nкашасы L eblon\nДом «Леблон» производит утонченную, округлую во вкусе кашасу со\nсвежими и сложными ароматами.\nОна является результатом долгого и\nупорного труда, а именно:\n• За плантациями сахарного тростника ухаживают столь же усердно, как\nза виноградником.\n• Урожай собирают вручную. Так же –\nвручную – отделяют листья тростника\nот стеблей.\n• Тростник деликатно отжимают как\nможно быстрее после сбора урожая,\nчтобы получить из него лишь первый\nсок – Caldo de cana.\n• Для сбраживания используют дикие\nдрожжи, которые живут на сахарном\nтростнике.\n• Сама ферментация длится долго,\nчтобы сохранилось максимум ароматов.\n• Кашасу перегоняют трижды в традиционных медных кубах под строгим\nконтролем со стороны мастера дистилляции – француза Жиля Мерле.\n• Наконец, кашасу выдерживают во\nфранцузских бочках. Либо – новых,\nлибо – из-под коньяка ХО.\nБлагодаря таким тщательным методам производства, кашаса Leblon\nоказалась единственной, получившей\nпоследовательно девять золотых\nмедалей на международном конкурсе\nв Сан-Франциско.\n\nк ашас а 145", "Ч асть первая . Г лава 8\n\nТ екила и мескаль\nТекила – е динс твенный в своем роде напиток . О н нас только непохож на дру гие , что можно подумать , будто его перегна ли на другой плане те . Е го ароматы\nи текс т ура не имеют ана логов в мире а лкоголя . И менно по этой причине по с тоянно ширитс я круг цените лей текилы .\nЛ егенда гласит, что ис тория текилы нача лась у подножия вулк ана , когда мол ния ударила в поле агавы . П од дейс твием ж ара сок одного из рас тений за кипе л , потом забродил и в результате превратилс я в чудесный нек тар, который\nацтеки приняли за дар небес .\n\nПульке – напиток индейцев\nПульке – предок текилы и ее ближайшего сородича мескаля – это слегка шипучий перебродивший\nсок агавы. Он был первым алкогольным напитком,\nкоторый готовили древние индейцы, жившие на\nтерритории сегодняшней Мексики.\nНа заре своей истории его употребляли исключительно во время религиозных обрядов. Со временем пульке стал напитком местной знати. А в\n16 веке начался невиданный рост потребления\nпульке среди народа, что стало причиной многих\nбед и страданий. Считается, что распространение\nпьянства было связано с влиянием испанских колонистов. В стремлении доминировать над местным населением испанцы пользовались любыми\nсредствами, в том числе и алкоголем.\nПульке продавался в тавернах и в «пулькериях»,\nпользовавшихся дурной славой.\nПульке того времени обладал сомнительным качеством и был опасен для здоровья, о чем предупреждал один из документов 18 века: «...в лучшем\nслучае у того, кто его пьет, он (пульке) вызовет\nсмерть».\n\nМескаль – между пульке и текилой\nМескаль – дистиллят сока агавы – появился на\nсвет в начале 16 века, когда испанцы познакомили\nМексику с мастерством перегонки. Его название\nзаимствовано из языка ацтеков и складывается из\nдвух слов: metl, что значит «магве» (растение из\n\n146 Теки ла и меск а ль\n\nрода агавы), и ixcalli, то есть «вареный».\nИспанцы не поощряли производство мескаля и\nдаже запрещали его несколько раз из-за боязни\nтой конкуренции, которую он мог составить привозному каталонскому бренди. Вопреки враждебному отношению властей мескаль набирал\nпопулярность, и его производство развивалось.\nВ те времена уже существовало несколько видов мескаля. Один из них заслуживает особого\nвнимания. Он назывался Mesquital. Процесс его\nизготовления отличался только тем, что в перебродивший сок агавы перед перегонкой добавляли жареную курицу. Мескалю приписывали терапевтические достоинства. Его использовали для\nвозбуждения аппетита, улучшения пищеварения,\nзаживления ран, облегчения боли. Его пили, чтобы утолить жажду после солнечного удара, снять\nусталость и даже стимулировать умственную деятельность.\n\nТекила: на пути к совершенству\nВо второй половине 18 века cовершенствование технологии привело к появлению\nтекилы – более изысканного по сравнению с мескалем напитка из агавы.\nСуществует несколько версий относительно происхождения слова «текила». В народе считается,\nчто испанские конкистадоры назвали напиток\nтекилой как производное от слова «тетилья» (сосок), поскольку они заметили, что лучшие агавы\n\nГде делают текилу?\nГолубую агаву для текилы выращивают в штатах Халиско, Гуанахуато,\nНаярит, Мичоакан и Тамаулипас.\nХалиско, основной регион производства текилы, делится на две\nзоны – Низкая земля, расположенная\nна юго-западе, и Высокая земля\nЛос-Альтос – на северо-востоке.\nКлиматические различия между\nэтими районами невелики. Однако у\nних разная почва и расположены они\nна разной высоте над уровнем моря.\nНизкая земля покрыта вулканической\nпочвой, а Лос-Альтос – более бурой, с\nвысоким содержанием железа. Состав\nпочвы отражается на вкусе агавы.", "Теки ла и меск а ль 147", "усиления добавляют дрожжи. Некоторые производители используют метод закваски, применяемый для бурбона и рома.\n\nПерегонка\nРаньше для текилы широко использовались коньячные аппараты и аламбики, применяемые для\nвиски. Сегодня производители предпочитают\nперегонные аппараты из нержавеющей стали –\nменее дорогие и более практичные в уходе, но\nфункционирующие по традиционному принципу\nдвойной перегонки. После первой дистилляции\nони дают спиртное ordinario крепостью 28% vol.,\nа после второй – текилу крепостью 55%.\n\nВыдержка\n\nТахона\nТахона - это круглый камень весом в\nдве тонны, с помощью которого давят\nпеченую агаву, чтобы извлечь из нее\nсок. Это старинный метод производства текилы, позволяющий получить более насыщенный ароматами\nнапиток.\n\nБ аканора и С отоль\nНаряду с текилой и мескалем, в\nМексике существуют другие напитки\nиз агавы. Баканора – традиционный\nнапиток, производимый в штате Сонора из разновидности агавы Якиана.\nРастения пекут в печах, выложенных\nизнутри вулканическим камнем.\nЗатем их давят, разбавляют водой и\nсбраживают, после чего перегоняют\nнаподобие мескаля.\nСотоль делается кустарным методом,\nсхожим с производством мескаля,\nиз особой разновидности агавы:\nDasylirion Wheeleri, являющейся\nсимволом штата Чиуауа.\n\n148 Теки ла и меск а ль\n\nросли по склонам небольшой горы, очертаниями\nстранно напоминавшей женскую грудь, – там, где\nтеперь расположен город Текила.\nСогласно научной версии город Текила, давший\nназвание напитку, получил свое имя от индейского племени, относившегося к народу нахуатл, на\nязыке которого слово «текила» означало что-то\nвроде места сбора урожая.\n\nП роизводс тво текилы\nСырье\nОсновным сырьем для производства текилы служит особая голубая агава (Agave Tequilana сорта\nBlue Weber). Она растет под палящими лучами\nсолнца, достигая необходимой зрелости через\n7-8 лет.\nСборщиков урожая называют «химадорами». Они\nудаляют с отрубленных агав колкие листья, оставляя только сердцевины растений, которые похожи на гигантские ананасы. За это мексиканцы называют их piñas. Такая сердцевина весит от 30 до\n80 килограммов.\n\nБрожение\nСердцевины агав разрубают в зависимости от\nразмера пополам или на четыре части. Затем их\nзапекают в больших печах, чтобы как можно больше крахмала превратилось в сахар. Готовую агаву\nизмельчают, выжимая сладкий, вязкий, темный\nсок, в который добавляют воду для облегчения\nброжения.\nБрожение длится от 2 до 5 дней. Обычно для его\n\nТекила может быть выдержана либо в старых бочках из-под бурбона, хереса или порто, либо в новых дубовых бочках.\nСпиртное агавы не обладает высоким потенциалом к старению. К тому же сухой и жаркий климат\nМексики не благоволит медленному дозреванию\nнапитка. Так, «доля ангелов» здесь достигает 10%\nв год. Для сравнения: в Шотландии она составляет 4%. Поэтому выдержка текилы чаще всего не\nпревышает 6 лет. После выдержки в случае необходимости крепость текилы снижают, добавляя в\nнее воду, и разливают по бутылкам.\n\nВ озрас тные к атегории\nBlanco (бланко), или Plata (плата)\nБесцветная текила, которую разливают по\nбутылкам сразу после перегонки. Или ее могут\nвыдержать не более двух месяцев в стальных чанах или дубовых бочках. Ее также могут называть\nWhite или Silver.\n\nReposado (Репосадо)\nТак называется текила, которая выдержана в\nдубовых бочках не менее 2 месяцев и не более\nодного года. Это придает ей легкий янтарный оттенок, который усиливают добавлением карамели (не более 1% от общего объема).\n\nAnejo (Аньехо)\nЭта текила стареет не менее одного года и не\nболее трех лет в дубовых бочках емкостью не\nболее 600 литров.\n\nExtra Anejo (Экстра Аньехо)\nЭта текила стареет не менее трех лет в дубовых\nбочках. Следует отметить, что многие производители выдерживают текилу дольше, чем того\nтребует законодательство.", "Как делают\n\nт еки л у\n\n1. Текилу делают из агавы, с которой химадор\nвначале отрубает все листья.\n\n2. Агаву привозят на винокурню, где ее пекут в больших печах,\nчтобы крахмал превратился в сахар.\n\n4. Этот сок подвергают брожению, добавляя\nдрожжи и воду.\n\n3. Из печеной агавы выжимают сок.\n\n6. Текила отдыхает и дозревает в стальных\nчанах. Затем ее либо разливают по\nбутылкам, либо выдерживают в бочках.\n\n7. Выдержка текилы в бочках чаще всего не\nпревышает 6 лет.\n\n5. После двойной перегонки перебродившего сусла\nполучается текила.\nТеки ла и меск а ль 149", "Бар El Copitas, Санкт-Петербург.\n\nках от 1 месяца до 4 лет. А некоторые сорта\nвыдерживаются гораздо дольше.\nТакой способ производства обеспечивает\nмескалю аутентичный, «деревенский» вкус с\nнотами дыма.\nКроме того, некоторые производители\nдобавляют во время брожения или дистилляции различные плоды, пряности и даже\nиногда – птичьи грудки, что обуславливает\nбольшое разнообразие мескаля.\nКрепость мескаля варьируется от 36 до 55%\nvol.\n\nВозрастные категории\nBlanco. Белый мескаль, который почти никогда не выдерживается.\nDorado. Невыдержанный мескаль золотистого цвета, который достигается за счет\nкрасителей.\nReposado (или Añejado). Мескаль, выдержанный в бочках от 2 до 9 месяцев.\nAñejo. Мескаль, которые стареет в бочке не\nменее 12 месяцев. Многие производители\nвыдерживают свой мескаль дольше – до 3\nлет, и обычно – 4 года в том случае, если он\nотносится к категории «100% агавы».\n\nУпотребление\n\nМ ескаль\nКак и текилу, мескаль получают из сердцевин агавы. Но если для производства текилы\nразрешена только одна разновидность\nагавы, то для мескаля может использоваться любая мексиканская агава, выращенная\nили выросшая в диком виде на территории\nаппелласьона Mezcal, который охватывает\nнесколько штатов. Всего насчитывается около 30 разновидностей агавы, используемых\nдля мескаля. Срок созревания этих растений\nварьируется от 7 до 15 лет.\nСогласно регламентации, в алкогольной составляющей мескаля должно быть не менее\n80% спирта из агавы (в отличие от 51% для\nтекилы).\n\nКрафт\nПроизводством мескаля в основном занимаются небольшие семейные винокурни,\nи оно мало изменилось за последние 200\n\n150 Теки ла и меск а ль\n\nлет. В земле выкапывают большую яму, на ее\nдно кладут камни и на них разводят костер.\nКогда камни нагреются, остатки дров убирают и в яму закладывают сердцевины агавы.\nСверху их засыпают землей и листьями\nагавы. Растения пекутся от 2 до 3 дней, пропитываясь дымом.\nЗатем их вынимают, охлаждают и извлекают\nсок, измельчая архаичным способом – с\nпомощью большого каменного колеса. Его\nчасто приводит в движение лошадь. Сок\nстекает в дубовый чан и начинает бродить\nбез добавления дрожжей, что является одной из особенностей изготовления мескаля.\nОн достигает крепости около 8% vol. и\nготов для перегонки в традиционных медных аппаратах. Мескаль практически всегда\nперегоняют дважды. Затем он приобретает\nянтарный цвет либо благодаря добавлению\nкарамели, либо благодаря выдержке в боч-\n\nПо причине выраженного вкуса мескаль\nчасто пьют в чистом виде. Выдержанный\nнапиток – в коньячном бокале при 18°С,\nа молодой мескаль – охлажденным. Что\nкасается коктейлей, то мескаль используют\nв наиболее простых смесях, которые не подавляют его особенности, или – в небольшом количестве, чтобы наделить коктейль\nхарактером и копчеными ароматами.\n\nЧервяк в бутылке\nВ бутылке мескаля можно найти червяка,\nобитающего в агаве. Мексиканцы называют\nего gusano.\nСогласно древнему поверью, червяк представляет собой душу агавы. По червяку\nпроверяли крепость напитка: если gusano\nне заспиртовывался, а портился, то качество\nмескаля считалось плохим.\nТот, кому попадается червяк в бокале, по\nтрадиции загадывает желание. Разумеется,\nперед этим надо допить бутылку. А значит в\nинтересах производителя – положить в нее\nчервяка. Тем не менее он никак не сказывается на вкусе напитка.", "О сновные бренды текилы\nCazadores (Каcадорес)\n\nJose Cuervo (Хосе Куэрво)\n\nПромышленное производство\nтекилы Cazadores началось в\n1973 году. Ее изготавливают полностью из голубой\nагавы, выращенной в регионе Лос-Альтос.\nЛинейка: легкая и фруктовая Cazadores Blanco, пряная Cazadores Reposado\nи выдержанная в течение\nгода Cazadores Añejo с богатым букетом.\n\nВ 1758 году Хосе Антонио де Куэрво получил от\nкороля Испании участок земли в штате Халиско.\nЗдесь в 1795 году его сын Хосе Мария Гуадалупе\nде Куэрво построил винокурню и первым получил от Испанской Короны официальную лицензию на коммерческое производство спиртного\nнапитка из перебродившего сока агавы.\n\nOlmeca Altos (Ольмека Альтос)\n\nЭта текила носит имя своего создателя Дона Хулио Гонзалеса, который занялся перегонкой агавы в 1942 году. Текила обладает мягким и выразительным вкусом.\nОна делается полностью из голубой агавы, и все\nпроизводственные этапы – брожение, дистилляция, выдержка – проводятся с большой тщательностью.\n\nЭта текила носит имя легендарного народа, жившего на территории Мексики до нашей эры.\nОльмеки пили сладкий сок агавы «агуамиэль»\n(медовая вода – исп.). После брожения и перегонки этот сок превращается в текилу.\nOlmecа Altos производится в сердце горного\nштата Халиско, знаменитого своими красными\nпочвами, благодатными для выращивания лучшей голубой агавы.\nOlmeca Altos Plata и Olmeca Altos Reposado – две\nтекилы категории суперпремиум, 100% агавы,\nсозданные при сотрудничестве мастера перегонки с британскими миксологами.\n\nEl Jimador (Эль Химадор)\n\nPatron (Патрон)\n\n«Химадор» на языке науатль означает «сборщика\nагавы». Этот бренд был создан в 1994 году.\nТекила El Jimador делается полностью из голубой агавы. Она производится текильным Домом\nCasa Herradura и пользуется большим успехом в\nМексике.\nЛинейка. El Jimador Silver – мягкая текила с оттенками цитруса. El Jimador Reposado – выдержанная в течение двух месяцев золотистая текила с\nнотками агавы, ванили и пряностей.\nЯнтарная текила El Jimador Añejo, старевшая 12\nмесяцев в бочках, обладает интенсивным, пряным вкусом.\n\nАмериканец Джон-Поль Деджориа создал эту\nмарку в 1992 году. Текила Patron производится в\nштате Халиско.\n\nDon Julio (Дон Хулио)\n\nSauza (Сауза)\nВ 1873 году Дон Сенобио Сауза приобрел дистиллерию La Perseverancia в городке Текила и\nосновал бренд Sauza. Он ввел ряд технических\nновшеств, получивших впоследствии широкое\nраспространение.\nПри производстве текилы Sauza агаву не запекают сразу, а сперва выжимают сок и только затем\nего готовят, что, как говорят на дистиллерии, придает текиле свежесть, присущую агаве.\nЛинейка. Sauza Silver обладает вкусом свежей\nагавы с нотами зеленого яблока.\nSauza Gold проявляет карамельные ароматы, которые уравновешены перечными нотами.\nSauza Signature Blue сделана из 100% голубой\nагавы, обладает свежим вкусом с цитрусовыми и\nцветочно-травяными оттенками.\nSauza Conmemorativo сделана из 100% голубой\nагавы, выдержана до 18 месяцев в бочках из-под\nбурбона среднего обжига. Ее вкус – комплексный,\nполнотелый, с древесно-ванильными тонами.\n\nH erradura (Э ррадура )\nТекильный Дом Casa Herradura,\nназвание которого по-испански\nозначает «подкова», был основан в\n1870 году. Его текила делается только\nиз агавы путем долгого естественного\nброжения и перегонки при низкой\nтемпературе.\nНежная цитрусовая Herradura Silver\nвыдержана в дубовых бочках 45 дней.\nHerradura Reposado проводит 11 месяцев в бочках. Во вкусе она маслянистая, и в ней преобладают элегантные\nароматы дуба, ванили и корицы.\nHerradura Añejo, выдержанная 2 года\nв бочках, обретает особую, почти\nсливочную консистенцию.\nHerradura Seleccion Suprema, старевшая в бочках в течение 4 лет и 1\nмесяца, обладает нежной консистенцией и мощными ароматами, где роза\nсочетается с ванилью и цитрусом.\n\nТеки ла и меск а ль 151", "К ак пить текилу?\nCтарейшие рецепты коктейлей с текилой относятся к 1930-м годам. Они были опубликованы в\n1937 году в сборнике коктейлей под названием\n«Книга коктейлей Кафе Роял» (Café Royal Cocktail\nBook). Само «Кафе Роял» было открыто одним\nфранцузом в Лондоне в конце 19 столетия и быстро превратилось в бар-ресторан, олицетворяющий высшее качество. В 1937 году гильдия английских барменов опубликовала эту небольшую\nкнигу, которая остается сборником, где сконцентрированы великие рецепты.\nС тех пор существуют две манеры потребления\nтекилы: по-мексикански и по-европейски.\nСами мексиканцы не устанавливают строгих правил потребления своего национального напитка.\nТекилу пьют просто так, чтобы получить максимум удовольствия. Как правило, – в чистом виде,\nсмешав с небольшим количеством колы или газированной воды.\nСуществует в Мексике и еще один особо популярный напиток – «Палома». Это смесь текилы,\nгрейпфрутового сока и сока лайма.\nВ Лондоне, Нью-Йорке, Париже и Москве ситуация отличается. Несмотря на растущую популярность потребления текилы в чистом виде, наподобие бурбона или шотландского виски, чаще\nвсего ее пьют в составе более или менее сложных коктейлей.\n\nРапидо\n20 мл текилы и 20 мл тоника наливают в небольшой бокал, который закрывают рукой и ударяют\nим о стойку бара, чтобы появились пузырьки. Содержимое выпивают залпом.\n\nСангрита\nТекилу и пряный безалкогольный напиток Сангрита, приготовленный на основе томатного сока,\nналивают в отдельные стопки и пьют поочередно\nнебольшими глотками.\n\n152 Теки ла и меск а ль\n\nС точки зрения бармена и миксолога,\nтекила – один из наиболее важных\nспиртных напитков. «Маргарита» входит в десятку топ-коктейлей мира, а\nколичество ее вариантов бесконечно.\nС их помощью можно заполнить ваш\nбар клиентами на ближайшие 50 лет!\nКроме того, текила – это тоже один из\nнаиболее гастрономических напитков.\nВ составе коктейлей или в чистом\nвиде, она прекрасно сочетается с\nострыми и пряными блюдами и закусками мексиканской кухни.\n\nС апельсином и корицей\nСовременный способ потребления: закусить шот\nтекилы долькой апельсина, посыпанной корицей.\n\nС солью и лаймом\nТрадиция пить текилу с солью и лаймом восходит\nк чудовищной эпидемии «испанки» – гриппа 1914\nгода. Врачи рекомендовали всем жителям пить\nтекилу с солью, а те не заставили себя долго уговаривать. Затем для улучшения вкуса добавили\nлайм. Впрочем, текилу прописывали при любых\nболезнях, даже от укусов скорпиона.\nВ стопку наливают 20 мл текилы, на тыльную сторону ладони насыпают соль и берут кусок лайма.\nЗатем опрокидывают в рот соль, одним глотком\nвыпивают текилу и закусывают лаймом.\n\nС ове ты бармену\nПо причине возрастающего экспорта\nи успеха текилы производители часто\nразбавляют сусло агавы суслом другого происхождения, например, из сока\nсахарного тростника.\nВ соответствии с мексиканским законодательством, напиток может называться\n«текилой» при использовании не менее\n51% спирта из агавы. Такая текила называется mixto.\nДля мескаля должно быть использовано\nне менее 80% спирта из агавы.\nНаиболее дорогие сорта текилы делают полностью из агавы, что обычно\nуказывается на этикетке. Так, вы можете\nвстретить надпись «100% Agave». Такую\nтекилу не разрешается подвергать ароматизации.\n\nВот еще некоторые пометки, которые вы\nможете найти на этикетке текилы, с расшифровкой их значения:\nNOM (Norma Official Mexicana de\nCalidad) – подтверждение соответствия\nтекилы официальным мексиканским\nстандартам качества. На этикетке за\nаббревиатурой NOM следует номер дистиллерии.\nАппелласьон (AO или DO) – означает\nособое разрешение мексиканского\nправительства использовать на этикетке\nнапитка название «текила» в соответствии с требованиями к географической\nзоне его происхождения.", "Т екила O lmeca A ltos . 100% агавы\nOlmeca Altos была первой текилой, разработанной барменами для барменов. Ее создателями\nвыступили такие известные миксологи, как Дре\nМассо и Генри Бенсант. Они работали в сотрудничестве со знаменитым маэстро-текилеро Хесусом Эрнандесом. Задача состояла в создании аутентичной текилы премиум класса, отвечающей\nнаиболее эксклюзивным критериям в отношении\nкачества и вкуса с тем, чтобы соответствовать\nвзыскательным требованиям барменов, которые\nтрудятся в лучших барах планеты. Кроме того,\nтекила должна была укладываться в определенные ценовые рамки, поскольку стоимость\nподаваемого коктейля, к сожалению, не может\nстремиться к бесконечности.\n\nДистиллерия\n\nПроизводство\nТекила Olmeca Altos производится из 100%\nагавы, которую вначале медленно запекают в\nкаменных печах, а потом измельчают, используя\nдва типа пресса: колесо «Тахона» и современный\nваликовый пресс.\nКолесо «Тахона» – это жернов весом около двух\nтонн, сделанный из вулканического камня. Метод\n«Тахона» является самым старинным и традиционным способом измельчения агавы. Обе разновидности текилы Olmeca Altos (Plata и Reposado)\nчастично содержат спирты, полученные данным\nметодом.\nПроцесс дистилляции проходит в кубах из меди,\nпоскольку это гарантирует чистый аромат и вкус\nбудущей текилы.\n\nВ ходе производства Olmeca Altos\nиспользуется каменное колесо\nдля прессования агавы по методу\n«Тахона».\nСлева. Маэстро-текилеро Хесус\nЭрнандес следит за всем производственным циклом текилы: «от поля до\nбутылки».\n\nД ва варианта O lmeca A ltos\nOlmeca Altos существует в двух\nвариантах: Plata и Reposado. Их\nалкогольная составляющая на 100%\nпроизводится из голубой агавы.\nПрозрачная Olmeca Altos Plata обладает ароматами лимона и травяными\nнотами, присущими агаве. Вкус –\nмягкий, маслянистый с цитрусовым\nфиналом.\nВыдержанная Olmeca Altos Reposado\nпроявляет убедительные ароматы засахаренных цитрусовых плодов, агавы\nи ванили, а также гармоничный, нежный и одновременно мощный вкус с\nдлительным послевкусием.\n\nТекилу Olmeca Altos производят на дистиллерии\nColonial de Jalisco, расположенной в регионе\nЛос-Альтос, на западе штата Халиско. Агава\nрастет здесь на высоте 2100 метров, медленно\nсозревая и насыщаясь сахаром и ароматами.\nАгаву не закупают у сторонних производителей,\nа выращивают самостоятельно, что позволяет на\nпротяжении 7 лет созревания контролировать\nусловия ее роста, соблюдение действующих правил и норм и осуществлять весь процесс ухода\nза растением. На винокурне есть даже собственное подразделение химадоров, следящих за\nсозреванием растений и собирающих агаву в\nнаиболее подходящий момент, по достижении\nею идеальной зрелости, чтобы вкус ее не был\nподпорчен резкими растительными нотками.\nРядом с винокурней на глубине 211 метров\nимеется вода высокого качества, которая играет\nчрезвычайно важную роль, ибо это один из\nосновных компонентов текилы.\n\nТеки ла и меск а ль 153", "Ч асть первая . Г лава 9\n\nКоньяк\n\nи другие бренди\n\nК оньяк – это спиртной напиток из бе лого вина , полученный на с трого\nограниченной территории с помощью ревнос тно охраняемых тра диционных\nспособов производс тва . О н носит имя небольшого французского городк а ,\nгде его изготавливают у же более 300 ле т. Город К оньяк расположен на юго запа де Ф ранции , примерно в 150 киломе тра х к северу от Б ордо . О н с тоит на\nберег у реки Ш аранта , котора я впа дае т в Атлантический океан .\n\nНасколько известна история этого региона, он\nвсегда отличался высокой деловой активностью.\nУже в III веке нашей эры по инициативе римского\nимператора Проба здесь разбили первый виноградник.\nВ 12 веке белое шарантское вино стало пользоваться известностью, в особенности в странах,\nрасположенных по берегам Северного моря.\nМорские суда не могли подниматься по Шаранте\nвыше Коньяка, поэтому город стал важным портом и торговым центром. Здесь встречались плоскодонные лодки, спускавшиеся с верховья реки,\nи морские корабли.\nВначале фламандцы, затем голландцы и вслед за\nними англичане приезжали сюда за солью, которая была важным товаром и источником дохода\nрегиона, а позднее – за вином.\nВ 16 веке голландские купцы стали предпочитать\nлегкому и слабоалкогольному вину более крепкие напитки, которые не портились и занимали\nменьше места в трюмах кораблей.\nКрепкое спиртное использовалось в нескольких целях. Его принимали в качестве лекарства\n– считалось, что оно излечивало от цинги. Оно\nслужило платежным средством в дальних странах и главное – помогало матросам пережить\nтяготы долгих плаваний.\nГолландцы начали заказывать у шарантских\n\n154 Коньяк и другие бренди", "ЧРЕЗМЕРНОЕ УПОТРЕБЛЕНИЕ АЛКОГОЛЯ ВРЕДИТ ВАШЕМУ ЗДОРОВЬЮ\nКоньяк и другие бренди 155", "Коньяк носит имя небольшого\nгородка, расположенного на югозападе Франции.\n\nВ иды коньяка\nпо происхождению\n\nG rande C hampagne (Гранд -Ш ампань)\nВиноград для этого коньяка был\nвыращен исключительно в ГрандШампани.\n\nP etite C hampagne (П етит -Ш ампань)\nВ его купаже содержатся коньяки\nтолько из Петит-Шампани.\n\nF ine C hampagne (Ф ин -Ш ампань)\n\nЭто коньяк из смеси винограда с\nучастков Гранд- и Петит-Шампань.\nСодержание винограда из ГрандШампани должно быть не менее 50%.\n\n156 Коньяк и другие бренди\n\nвиноделов так называемое «жженое вино»\n(brandewine), обменивая его на медь, служившую\nдля изготовления перегонных аппаратов.\n«Жженое вино» того времени было достаточно\nгрубоватым напитком, и перед употреблением\nего разбавляли водой.\nОднако было замечено, что во время долгих\nморских путешествий перевозимое в дубовых\nбочках спиртное улучшалось от контакта с деревом. Цвет «жженого вина» становился темнее,\nпоявлялись тонкие ароматы, а грубые исчезали.\nК тому же напиток, производимый в непосредственной близости от Коньяка, еще значительнее улучшался с возрастом.\nВ 18–19 столетиях коньяк начал пользоваться\nогромным успехом во всем мире и стал примером для подражания у производителей других\nтемных спиртных напитков.\n\nсортов, особенно Фоль Бланша, к заболеваниям\nвынудила бы виноградарей использовать химические средства, которые могут нанести вред\nконечному вкусу напитка. Поэтому в Коньяке отдается предпочтение Уньи Блану, устойчивому к\nзаболеваниям.\n\nК лимат\n\nПерегонка\n\nКлиматические условия Коньяка особенно благоприятны для виноделия, дистилляции и выдержки. Атлантический океан выполняет роль регулятора температуры. Ее колебания в течение года\nне очень значительны. Средняя годовая температура – +13°С, причем средняя температура зимой\n– +6°С, а летом – +21,5°С.\nДожди в этом регионе выпадают равномерно в\nтечение года, и влажность благоволит хорошей,\nспокойной выдержке. Тем не менее климатические условия меняются в зависимости от конкретного участка. На островах Олерон и Ре (где\nтакже разрешено производить коньяк), равно как\nи на побережье Атлантики, воздух влажный, а на\nвнутренних землях – более сухой.\nИнтересно, что зона идеального для получения коньяка климата почти точно совпадает с зоной лучших почв: участками Гранд-Шампань, Петит-Шампань и Бордери.\n\nП роизводс тво\nКоньяк производят из белого винограда следующих сортов:\n• Уньи Блан;\n• Коломбар;\n• Фоль Бланш.\nНаиболее широко используется Уньи Блан, дающий\nлегкие кислотные вина. Его доля среди всех сортов\nсоставляет более 95%.\nКоломбар и Фоль Бланш были шире распространены до нашествия филлоксеры. Согласно некоторым исследованиям, они могут дать коньяк\nлучшего качества. Однако чувствительность этих\n\nВиноделие\nСбор винограда начинается обычно в середине\nоктября и продолжается около двух недель. Собранный виноград давят, и в полученном сусле начинается брожение. Этот процесс длится\nоколо 10 дней при температуре 20-25°С. Вино\nдолжно быть кислым и не очень крепким (7-9%\nvol.). Поэтому добавление сахара (шаптализация)\nстрого запрещено. После контроля молодое\nвино подвергают дистилляции, которая должна\nзакончиться не позднее 31 марта следующего за\nгодом сбора урожая.\n\nПерегонку в Коньяке проводят дважды в одном\nи том же традиционном аппарате, называемом\nalambic charentais (шарантский аламбик). Раньше\nконьячный перегонный аппарат топили дровами.\nСейчас для большего удобства используют газ,\nчто позволяет равномернее нагревать медный\nкуб и лучше контролировать температуру дистилляции. Шарантские винокуры любят сравнивать изготовление коньяка с высокой кухней, для\nкоторой все повара используют газовый огонь.\nВедь только пиццу до сих пор выпекают в дровяной печи.\n\n«Первый подогрев»\nВино помещают в нагреватель, где оно предварительно подогревается теплом от формирующихся при перегонке паров. Затем вино поступает в\nкотел перегонного куба. Пары, образующиеся по\nмере нагревания вина, поднимаются в верхнюю\nкуполообразную часть куба и попадают в длинную трубу, называемую из-за своей особой формы «лебединой шеей». Затем пары проходят через нагреватель, где они частично охлаждаются\n(подогревая хранящееся там вино), и попадают в\nзмеевик, вокруг которого циркулирует холодная\nвода. Там они конденсируются, и из перегонного\nаппарата вытекает непрозрачная жидкость, называемая «brouillis» (муть) крепостью около 28%.\nЭтот процесс, называемый «первым подогревом»,\nпродолжается около 10 часов.\n\n«Хороший подогрев»\nАппарат чистят и подготавливают для второй\nперегонки, называемой «хорошим подогревом».\nBrouillis помещают в перегонный аппарат и повторяют операцию с той разницей, что мастер", "У час тки коньяк а\nВ конце 19 века французский инженер месье Кокан\nисследовал соотношение между свойствами коньяка\nи участком, на котором вырос виноград. Согласно\nрезультатам его исследования, в 1938 году окрестности\nгорода Коньяка были разделены на шесть участков.\n\nКиви\nГранд -Ш ампань\nЭто наиболее престижный участок земли в Коньяке. Здесь собирают самый\nдорогой виноград. Почва в Гранд-Шампани известковая, но рыхлая, дающая\nвиноградной лозе доступ к воде. Коньяк из Гранд-Шампани нуждается в\nнаиболее долгой выдержке, чтобы проявить свои достоинства. Если дать ему\nвремя, то он превзойдет всех своим букетом и изысканностью.\n\nКиви\nП етит-Ш ампань\nЭто участок, если не сопоставимый, то, по крайней мере, схожий с ГрандШампанью. Разница заключается в том, что известковый слой здесь более\nтонкий и не столь рыхлый, поэтому лоза хуже снабжается водой и необходимыми веществами. Из винограда этого участка производят тонкие напитки,\nкоторым также необходимо определенное время для выдержки и проявления\nих неоспоримых достоинств.\nЗемли вокруг Коньяка обладают сходными чертами с почвами провинции\nШампань (где изготавливают шампанское). Отсюда и названия Гранд-Шампань\n(Большая Шампань) и Петит-Шампань (Малая Шампань).\n\nБ ордери\nЭто самый маленький участок. Его коньячные спирты обладают тонким\nбукетом с ароматами фиалки и цитрусовых. Их преимущество состоит в том,\nчто во время выдержки они быстрее раскрывают свои качества, чем коньяки\nиз Гранд- и Петит-Шампани. По причине небольшой площади этого участка,\nурожай винограда здесь невелик и пользуется большим спросом.\n\nКиви\nБ он -Б уа и Буа -О рдинер\n\nКиви\nФ ен -Б уа\nКоньяки с этого участка достаточно мягкие и «округлые». Они не лишены\nопределенной тонкости, которая, к сожалению, утрачивается с возрастом.\nПоэтому чаще всего урожай Фен-Буа используется для изготовления более\nмолодых коньяков.\n\nПочва этих участков очень твердая. Она не позволяет корням виноградной\nлозы пробиться глубоко в землю, препятствуя регулярному снабжению водой\nи питательными веществами. Здесь получают обычные коньяки хорошего\nкачества, но не выдерживающие сравнения с их престижными «соседями».\n\nК оньяк и закон\nНапиток имеет право на контролируемое по происхождению наименование Cognac (коньяк), если он отвечает следующим основным требованиям.\n• Виноград должен быть выращен и сам напиток произведен в\nопределенном регионе вокруг города Коньяк, разделенном на\nшесть участков.\n• Могут быть использованы только определенные сорта белого винограда – Уньи Блан, Фоль Бланш, Коломбар, Семийон, Блан Раме.\n• При производстве необходимо следовать регламентированному\nпроцессу виноделия (в вино нельзя добавлять сахар и сульфаты).\n• Процесс производства должен включать определенные опера-\n\nции, в том числе двойную перегонку в традиционном аппарате\n«alambic charentais», которая должна начаться не раньше\n15 ноября года урожая и закончиться не позже 31 марта следующего года.\n• Для улучшения цвета напитка может использоваться карамель\nили настойка водно-спиртового раствора на дубовых стружках,\nсоставляющие не более 2% от общего объема напитка.\n• Возраст напитка должен быть не менее двух лет.\n• Напиток должен иметь крепость не менее 40%.\nЛюбой коньяк – это бренди, но только бренди, отвечающий вышеперечисленным требованиям, может называться «коньяком».\n\nКоньяк и другие бренди 157", "пость. Влажность погреба значительно влияет на\nпроцесс испарения. В сухом помещении крепость\nпонижается медленнее, чем в более влажном. Для\nсохранения влажности в погребах строят своды из\nместного известняка и бочки укладывают на утрамбованную землю.\n\n«Рай»\n\nБ очки\nВ производстве коньяка важную роль\nиграют бочки, в которых проходит\nвыдержка. Именно древесина дуба,\nособенно сердцевина дерева, придает\nконьяку аромат ванили.\nБочки изготавливают либо из дуба,\nпривезенного из лесов Лимузена, что\nна юго-западе Франции, либо из Тронсе, находящемся в центральной части\nстраны. Древесина лимузенского дуба\nменее пористая и более твердая по\nсравнению с тронским дубом.\nИз дуба, которому более 100 лет,\nможно сделать три бочки.\nСрубают дуб зимой, когда спят его\nсоки. Ствол дерева не пилят, а раскалывают на доски. Их оставляют\nне менее трех лет «закаляться» на\nоткрытом воздухе – под солнцем,\nдождем и ветром, чтобы они высохли\nи потеряли свои соки. Древесину\nдаже пробуют на вкус, чтобы узнать,\nутратила ли она свою резкость и\nсмолистость, которые нежелательно\nобнаружить в бокале.\nИзготовлению бочек в Шаранте уделяется столько же внимания, сколько\nи получению самого коньяка. Вначале\nбочку стягивают обручем только с\nодного конца. С другого конца доски\nоткрываются словно цветочные\nлепестки. Такая недостроенная бочка\nназывается «розой». Затем древесину\nбочек смачивают и обжигают.\nПосле этого бочку закрывают. В\nдревесине бочки нет ни одного\nгвоздя, ни одной железной детали.\nДля герметичности используются\nтакие материалы, как мука и листья\nкамыша.\n\n158 Коньяк и другие бренди\n\nдистилляции отбирает образующийся спирт. Тем\nсамым он оказывает значительное влияние на качество будущего коньяка.\nПервые конденсированные пары, называемые\n«головами», отбрасывают. Они содержат самые\nлетучие нежелательные и вредные элементы. Затем выходит «сердце», которое мастер дистилляции тщательно сохраняет. И, наконец, последняя\nчасть дистиллята («хвосты») также не используется. «Хвосты» добавляют в «муть» при следующих\nперегонках в том случае, если мастер хочет сделать ароматный коньяк с более выразительным\nхарактером.\nПосле второй перегонки получается дистиллят\nкрепостью около 70%. Он чист и прозрачен, как\nвода, но вбирает в себя все те свойства, которые\nпосле выдержки превратят его в коньяк.\n\nВыдержка\nТолько после выдержки коньячный спирт станет именно тем напитком, который мы назовем\n«коньяком». Вначале его выдерживают в новых\nбочках, которые придают ему ароматы ванили и\nдерева. Через три года коньячный спирт переливают в бочки постарше, чтобы его не переполнить древесными тонами. Через шесть лет коньяк\nпереливают еще раз в самые старые бочки, древесина которых больше не может повлиять на\nвкус напитка. Указанные сроки могут меняться по\nволе мастера погребов. Он вправе продлить или\nостановить выдержку в новых бочках или использовать более обожженные бочки, чтобы ускорить\nэкстракцию ванилина.\n\n«Доля ангелов»\nКаждый год содержимое бочки испаряется сквозь\nстенки, теряя около 2-4% своего объема. Это испарение называют «долей ангелов», и оно очень полезно для коньяка. Улетучиваются наиболее легкие,\nнежелательные компоненты. Но испаряется также\nспирт, и с течением времени коньяк теряет кре-\n\nЧерез пятьдесят лет содержание алкоголя у напитка, стареющего в бочке, приближается к отметке 40% vol. Это роковая цифра. Ведь именно\nтакую крепость должен иметь напиток, чтобы\nпретендовать на название «коньяк». Содержимое\nтакой бочки переливают в стеклянные бутыли во\nизбежание испарения.\nС этого момента коньяк перестает стареть и попадает в «рай» (paradis). Так называют то магическое место, где под надежными замками хранят\nсамые старые бутыли. Богатство «рая» – это состояние коньячного дома, ибо старые коньяки\nзатем будут использоваться для придания ароматов более молодым коньячным спиртам.\nОтсчет возраста коньяка прекращается, как только он оказывается в стекле. Так возраст коньяка, дистиллированного в 1800 году и разлитого\nв бутылки в 1860 году, будет всегда составлять\nшестьдесят лет. И этот коньяк сегодня не старше\nдругого коньяка, дистиллированного в 1900 году\nи перелитого в бутылки в 1960 году.\n\nКупажирование\nКоньяк – это почти всегда смесь нескольких коньячных спиртов. Купажирование играет важную роль в создании и поддержании из года в\nгод особого характера той или иной марки коньяка, который ценят ее поклонники.\nМастер погребов на свое усмотрение смешивает\nспирты разного возраста, полученные из винограда с разных участков земли и выдержанные в\nразных бочках.\nКупажирование осуществляют в больших дубовых емкостях, после чего смесь снова возвращают в дубовые бочки для отдыха от полученного\nшока и окончательного дозревания.\nСамые молодые коньяки не выдерживают в бочках так долго, чтобы их крепость понизилась до\n40% vol. естественным путем.\nДля снижения крепости в них добавляют чистую\nводу. Это сложный процесс. Воду вначале добавляют в очень старый коньяк, крепость которого\nгораздо меньше 40% и который изготовлен специально для этой цели.\nЗатем полученную смесь небольшими порциями,\nс интервалом в шесть месяцев добавляют в молодой коньяк, чтобы избежать шока, который может\nиспортить напиток. Так постепенно крепость коньяка доводят до 40%.", "Как делают\n\nконьяк\n\n1. Коньяк делают из винограда белых сортов, выращенного\nна строго определенной территории.\n2. Собранный виноград давят, чтобы отжать из него сок.\nЛебединая шея\nНагреватель\nвина\nКупол\n\nКотел\nКолонна со\nзмеевиком и\nохладителем\n\n4. Молодое вино дважды\nдистиллируют в коньячном\nперегонном аппарате.\n\n3. Виноградный сок бродит и\nпревращается в вино.\n\n5. В первую очередь коньячный спирт\nвыдерживают в новых дубовых бочках,\nгде он насыщается древесными тонами.\n\n6. Коньячный спирт заканчивает свою выдержку в\nстарых дубовых бочках, а затем его переливают в\nстеклянные бутыли.\nКоньяк и другие бренди 159", "В озрас тные к атегории коньяк а\nВ зависимости от сроков выдержки, различают\nследующие категории коньяка, которые указываются на этикетке напитка.\nПоскольку коньяк – это всегда купаж, то говоря о\nего выдержке, имеют в виду возраст самого молодого коньяка в купаже.\n\n«С редний возраст»\nПомимо официальных сроков выдержки, существует также понятие\n«среднего возраста» коньяка. Под\nпонятием «средний возраст» имеется\nв виду «вкус» коньяка. Например,\nиногда говорят: «этот VS имеет шестилетний вкус». При этом он состоит\nиз коньячных спиртов 2-х и 10-летней\nвыдержки. Но по вкусу он будет похож\nна некупажированный шестилетний\nконьяк.\n\n!!! или VS (Very Special)\nКоньяк относится к данной возрастной категории, если в его купаже самый молодой коньячный спирт был выдержан не менее двух лет.\n\nVSOP (Very Superior Old Pale)\nВ купаже коньяка VSOP самый молодой из спиртов должен быть выдержан, как минимум, четыре\nгода.\n\nNapoléon (Наполеон) – XO (Extra Old)\n– Extra (Экстра) – Hors d'âge (Ор даж)\nСамый молодой спирт, входящий в состав коньяка этой престижной возрастной категории, дол-\n\nжен быть выдержан не менее шести лет. А для коньяков, произведенных начиная с 2018 года, этот\nсрок увеличен до 10 лет.\nСледует добавить, что коньяки всегда выдерживают гораздо дольше, чем того требует закон.\nУ большинства известных марок надпись VS указывает на то, что «средний возраст» содержимого бутылки составляет от 4 до 6 лет. Средний\nвозраст коньяков VSOP – обычно от 7 до 12 лет,\nNapoléon – около 15 лет, ХО – около 25 лет, Extra –\n35 лет, а возраст самых престижных коньяков – от\n50 до 60 лет.\n\nОпределенный год перегонки\nКоньяк определенного года перегонки полностью состоит из спиртов, полученных в году, указанном на его этикетке. Важно отметить, что эта\nдата никак не связана со сроком выдержки коньяка. И для таких коньяков не разработана регламентация в отношении их выдержки.\n\nЭ волюция крепос ти коньяк а в бочке\n\n❙\n\n❙\n\nИспарение воды и алкоголя, происходящее через\nпористые стенки дубовых бочек во время выдержки\nконьяка, зависит от влажности погреба. Алкоголь всегда\nиспаряется быстрее воды, и этим объясняется снижение\nкрепости коньяка во время его выдержки.\n1. В сухом погребе вода испаряется практически наравне\nс алкоголем. Крепость, являющаяся процентным со-\n\n❙\n\nв сухом погребе\n\n❙\n\nво влажном погребе\n\n❙\n\n❙\n\n❙\n\n160 Коньяк и другие бренди\n\n❙\n\n❙\n\n❙\n\n❙\n\n❙\n\n❙\n\n❙\n\nдержанием алкоголя в общем объеме напитка, снижается\nмедленно.\n2. Во влажном погребе вода испаряется гораздо меньше\nпо сравнению с алкоголем, а значит, крепость коньяка\nснижается гораздо быстрее.\n3. Наконец, мы имеем дело с промежуточной ситуацией,\nкогда погреб обладает средним показателем влажности.\nПосле 50-70 лет выдержки в дубовой бочке крепость\nконьячного спирта падает ниже 40%, и в соответствии с\nтребованиями регламентации такой напиток не может\nназываться «коньяком». В этом случае мастера погребов\nмогут использовать два варианта.\n1. Перелить коньяк в стеклянные бутыли, когда его крепость достигает 40%.\n2. Продолжать выдержку в дубовых бочках до 80-100 лет\nили даже дольше. Объем коньяка падает, и его крепость\nопускается ниже 30%. Эти старые коньяки сообщают\nкупажу свой букет и аромат и снижают крепость более\nмолодых коньяков.\nВ бочке, содержащей 350 л коньячного спирта, после 50\nлет выдержки остается только 100 л коньяка.", "З наменитые коньячные дома\nВ данной книге невозможно перечислить всех\nпроизводителей коньяка. Их насчитывается более 1000, и они изготавливают более 3000 разных\nконьяков. Цель этой книги – рассказать о самых\nважных и престижных производителях.\n\nBaron Otard (Барон Отард)\nБарон Жан-Батист Антуан Отард выкупил средневековый замок «Шато де Коньяк» и в 1795 году\nсоздал в нем коньячный дом. Он посчитал, что\nпомимо приятной обстановки для жизни замок\nрасполагал уникальными условиями для выдержки «воды жизни». Барон не ошибся. В погребах с\nкаменными сводами и толстыми стенами, словно\nв настоящем сейфе, безучастном к времени и изменениям погоды, коньяк Baron Otard развивает\nбукет образцового изящества.\n\nCamus (Камю)\nКомпания «Camus» была учреждена ЖанБатистом Камю в 1863 году. До сих пор ею управляет семья Камю.\n\nCourvoisier (Курвуазье)\nДом Courvoisier имеет тесную связь с историей.\nОн был основан в 1843 году Феликсом Курвуазье.\nОднако его отец еще до создания дома был торговцем винами и спиртными напитками в парижском\nквартале Берси и стал поставщиком императора\nНаполеона. Связь дома Courvoisier со двором еще\nсильнее укрепилась при Наполеоне III.\n\nDelamain (Деламен)\nИрландец Джеймс Деламен учредил свой коньячный дом под названием Ranson & Delamain. Этот\nдом специализируется на производстве коньяков\nс участка Гранд-Шампань.\n\nРодовое поместье семьи Martell –\nChâteau de Chanteloup.\n\nFrapin (Фрапен)\nДом Frapin также специализируется на производстве коньяков с участка Гранд-Шампань.\n\nHennessy (Хеннесси)\nСозданный ирландцем Ричардом Хеннесси в 1765\nгоду, этот дом производит широкую гамму коньяков. Спирты из четырех участков – Фен-Буа, Бордери, Петит-Шампани и, наконец, Гранд-Шампани\n– используют в различных пропорциях, получая\nконьяки, ароматы которых пропорционально усиливаются с возрастанием гаммы.\n\nMartell (Мартель)\nЗавершался последний год правления короля\nЛюдовика XIV, когда Жан Мартель положил начало известной коньячной династии. Основанный в\n1715 году, Martell сегодня является самым старинным из крупных коньячных домов.\nКоньяки Martell обладают мягким вкусом с характерными фруктовыми ароматами и нотами винограда. Это достигается преобладанием спиртов с\nучастка Бордери, бóльшая часть которого находится в распоряжении дома Martell.\n\nRémy Martin (Реми Мартен)\nЭтот знаменитый коньячный дом был основан\nв 1724 году французским виноделом Реми Мартеном.\nВсе коньяки Rémy Martin получают исключительно с двух участков – Гранд- и Петит-Шампань. Они\nпроявляют сложные и элегантные ароматы, глубина которых увеличивается с возрастом.\nВершина гаммы Rémy Martin – коньяк Louis XIII,\nвиноград для которого выращивается только в\nГранд-Шампани.\n\nК ритерии качества\nИзначально считается, что коньяк –\nнапиток высококачественный, кто бы\nни был его производителем. Верно и\nто, что законодательные требования\nк нему настолько строги, что недобросовестный производитель будет\nочень быстро отстранен от дел.\nВ то же время одни коньяки считаются более качественными, чем\nдругие. Их оценивают по следующим\nкритериям:\n• Использование винограда, произрастающего на лучших участках\nземли.\n• Перегонка в аппаратах небольшой\nвместимости.\n• Выдержка в дубовых бочках маленького размера (они обеспечивают самый большой обмен между коньяком\nи воздухом, в результате чего коньяк\nлучше стареет).\n• Погреб для выдержки должен иметь\nутрамбованный земляной пол, лучше сохраняющий температуру и влажность.\n• Добавки на базе карамели или дубовой стружки должны быть минимальными и преследовать единственную\nцель – придание единого цвета всем\nпроизводимым коньякам одного возраста и одной марки.\n\nКоньяк и другие бренди 161", "К оньячный дом M artell .\nИ ск лючите льность с 1715 года\nM artell VS S ingle D istillery\nMartell VS Single Distillery представляет собой купаж выдержанных спиртов, полученных на одной винокурне,\nрасположенной в регионе Коньяк.\nЭтот напиток служит ярким отражением фруктового стиля дома Martell,\nобусловленного той особой перегонкой, которой подвергаются коньячные\nспирты.\nМягкость коньяка Martell VS Single\nDistillery и его щедрые фруктовые\nароматы с нотами сливы, абрикоса и\nзасахаренного лимона проявят себя\nпри подаче в чистом виде со льдом,\nа также – в лонг дринках, например,\nв сочетании с имбирным элем. Кроме\nтого, этот коньяк послужит отличной основой для многочисленных\nкоктейлей.\n\nИстория Дома Martell восходит к началу 18 века.\nВ 1715 году уроженец английского острова\nДжерси – Жан Мартель – прибыл во Францию,\nчтобы основать предприятие по торговле\nконьячными спиртами в городе Коньяк. Его\nдеятельность пришлась на период разгара французского art de vivre (искусство жить – по фр.)\n– времени прославления гастрономии, вкуса и\nмастерства во имя наслаждения красотой жизни.\nИменно эти ценности легли в основу философии\nДома Martell и остаются ведущими по сей день.\n\nТерруар\nБордери – один из центральных винодельческих\nучастков (крю) Коньяка. Кроме того, он самый\nмаленький по площади, поэтому его виноград\nособенно ценится. Ежегодно Martell закупает\nболее 50% общей продукции Бордери. Спирты\nиз Бордери развивают фруктовые, цветочные и\nпряные ноты, которые придают коньякам Martell\nтонкость и элегантный характер, одновременно\nсложный и свежий.\n\nИскусство дистилляции и выдержки\nТонкие ароматы коньяков Martell обусловлены\nтем, что перед перегонкой белые вина очища-\n\n162 Коньяк и другие бренди\n\nют от осадка. А потом чистые вина неспешно\nдистиллируют в традиционных медных кубах –\nаламбиках. Полученные спирты выдерживают в\nслегка обожженных бочках из плотного тронсейского дуба, в которых будущий коньяк набирает\nмягкость, янтарный оттенок и уравновешенные\nароматы ванили, сухофруктов и высушенных\nцветов.\n\nУникальные коньячные спирты\nБудучи старейшим из великих коньячных домов,\nMartell обладает существенным преимуществом.\nПогреб с самыми старыми спиртами, называемый «paradis» или «рай», – один из богатейших во\nвсем Коньяке.\nЗдесь можно найти немыслимо старинные спирты, любовно хранящиеся в стекле, в котором,\nкак известно, эволюция напитка прекращается.\nЭто настоящие жидкие сокровища, нечто вроде\nколлекции ароматов, где шаг за шагом прослеживаются великие годы бренда Martell.\nМастер погребов Кристоф Вальто черпает из\nэтой палитры уникальных ароматов необходимые\nноты, позволяющие ему воспроизводить гамму\nконьяков Martell, сообщая им легендарную сложность, изысканность, богатство и равновесие.", "Гамма коньяков Martell\nМастера погребов, чередовавшие друг друга в\nдоме Martell, были, прежде всего, специалистами\nпо вину. Некоторые из них возглавляли престижнейшие винодельческие хозяйства Бордо.\nА все потому, что коньяк отличается от прочих\nкрепких напитков тем, что в его основе лежит\nблагороднейший ингредиент – виноград.\nЭта связь ощущается во всей гамме коньяков\nMartell. Свежий и нетронутый фруктовый аромат\nчувствуется в молодых коньяках. В более выдержанных напитках можно отметить ароматическую\nполноту, переходящую в интенсивную сложность.\nНоты сухофруктов и цукатов обволакивают благоухание цветов, винограда и цитрусовых.\nMartell VS Single Distillery – мягкий коньяк с\nяркими фруктовыми ароматами, идеальный для\nкоктейлей и лонг дринков.\nMartell VSOP Aged in Red Barrels выдерживается\nв «красных бочках» из плотного дуба, что придает коньяку еще более яркий аромат засахаренных фруктов. Его с равным успехом подают\nкак на аперитив со льдом, так и в конце трапезы.\nКроме того, бармены любят включать этот коньяк\n\nв состав классических коктейлей, благодаря его\nсбалансированному характеру.\nMartell Cordon Bleu – уникальный в своем роде\nконьяк. В 1912 году Эдуар Мартель решил выпустить напиток для настоящих ценителей. Графин\nбез хрусталя и золота: значение имеет лишь то,\nчто внутри. В основе лежат спирты Бордери,\nкоторые достигают своего апогея, развивая\nбогатые фруктово-пряные ароматы.\nMartell ХО – сочетание элегантности Бордери с\nмощью Петит- и Гранд-Шампани. Щедрые ароматы\nпряностей, орехов и красных плодов проявляются на фоне оттенков воска и санталового дерева.\nMartell Cohiba – эксклюзивный коньяк, созданный специально для сочетания с сигарами. В его\nсостав входят лучшие спирты из Гранд-Шампани,\nвыдержанные не менее 40 лет. Коньяк обладает\nсложными и интенсивными ароматами с нотами\nсушеных цветов и табака.\n\nО собенности перегонки\nВ доме Martell коньячные спирты\nмедленно и деликатно дистиллируют\nдва раза в медных перегонных кубах\nтрадиционного шарантского типа.\nОднако, в отличие от других коньяков,\nв доме Martell перед перегонкой вина\nочищают от осадка. Цель такого уникального подхода – как можно полнее\nсохранить фруктовый характер винограда и придать коньякам экстремальную ароматическую тонкость.\nПосле перегонки спирты направляют\nна выдержку в бочках, изготовленных\nиз плотной древесины тронсейского\nдуба, выросшего в лесах центральной\nФранции.\n\nMartell Création Grand Extra содержит спирты\n60-летней выдержки. Этот роскошный коньяк\nпредназначен для особых моментов.\n\nКоньяк и другие бренди 163", "Х роник а коньячной миксологии\nКонец\n17 века\n\nКоньяк становится одним из основных ингредиентов пуншей, которые\nпьют английские аристократы.\n\nПримерно\n1800 год\n\nВ Виргинии появляется на свет смешанный напиток Mint Julep, который является прадедушкой «Мохито». Его готовят на основе коньяка.\n(Впоследствии, по всей видимости, после кризиса филлоксеры коньяк\nзаменили в рецепте на бурбон).\n\nНачало\n19 века\n\nВ Англии распространяется привычка пить коньяк с водой. Модный\nмикс называется «Brandy & Soda».\n\n1830-е годы\n\nЭтот английский способ подачи коньяка приходит во Францию. Здесь\nон получает название Fine à l'Eau (дословно: изысканное спиртное с\nводой) и становится главным напитком в парижских кафе.\n\n1850 –1860-е\nгоды\n\nВ Новом Орлеане создан культовый коктейль на коньяке под названием Sazerac.\n\n1862 год\n\nВ Америке выходит в свет первая книга по миксологии: сборник Джерри Томаса, где содержится множество рецептов на основе коньяка.\n\n1872 – 1890\nгоды\n\nКризис филлоксеры. Большинство французских виноградников уничтожено. Коньяк вместе с вином исчезли на некоторое время. Это дало\nогромный импульс другим спиртным напиткам и коктейлям.\n\nКонец 19 –\nначало 20\nвеков\n\nЭто Золотая эра коктейлей в Америке. Состоятельные американцы\nпознают изысканные европейские напитки и подгоняют их под себя,\nсмешивая между собой. На свет появляются великие классические\nкоктейли. Выходит в свет сборник рецептов легендарного Гарри Джонсона, в котором он рекомендует использовать Martell в коктейлях на\nоснове коньяка.\n\n1920-е годы\n\nВо время американского сухого закона Париж становится коктейльной столицей мира. Здесь появляется на свет монументальный коньячный коктейль Side Car.\n\n1937 год\n\nИзобретение пузатого коньячного бокала «снифтера».\n\nСередина\n20 века\n\nПосле окончания Второй мировой войны коньяк продолжает быть\nизлюбленным напитком элегантной публики.\n\n164 Коньяк и другие бренди\n\nП одача коньяк а\nИз всех спиртных напитков коньяк ценится больше других в чистом виде или со льдом просто за\nто, что он сам по себе представляет. Концентрат\nароматов, результат выдержки, сопоставимой по\nдлительности с человеческой жизнью, запертое в\nбутылке воспоминание о давних урожаях, жидкое\nнаслаждение абсолютного благородства.\nВместе с тем, не забывая об аутентичности и\nклассическом назначении коньяка, сегодня возвращаются к большей свободе в отношении его\nразличных способов подачи. В настоящее время,\nесли верить статистике, 70% коньяка выпивается\nв составе коктейлей или со льдом.\n\nКоктейли\nУже давным давно бренди был одним из самых\nвостребованных ингредиентов коктейля. За свою\nтонкость и аромат, бренди из французской области Коньяк всегда ценился превыше всех прочих. В результате, с начала 19 столетия множество американских коктейлей были разработаны\nименно на основе коньяка. Достаточно вспомнить монументальное творение «Сазерак», который готовился исключительно на коньяке. Но, к\nсожалению, кризис филлоксеры внезапно прервал полет коньяка в миксологии. Коньяк в спешном порядке заменили на бурбон или ржаной\nвиски. Надо было дождаться сухого закона, чтобы\nвновь увидеть возрождение великих коктейлей с\nконьяком, на этот раз по другую сторону Атлантики. Среди них: Side Car и Corpse Reviver №1.\nПри этом коньяк можно использовать в любых ситуациях. От создания самых простых, утоляющих\nжажду коктейлей до самых сложных творений от\nАлекса Кратены.\nМожно лишь сказать, что когда требуется приготовить наиболее престижный коктейль, миксологи обращаются к коньяку. Дело в том, что коньяк\nпозволяет бармену проявить лучшие свои качества. Вот уже 100 лет история коньяка сопутствует и будет сопутствовать истории коктейлей.", "Лонг дринки\nВ высоких бокалах, в смеси со льдом, газированной водой, апельсиновым соком, тоником или\nимбирным элем, молодой коньяк образует освежающий и приятный напиток.\n\nДижестив\nПосле обильного ужина с вином ощущения притупляются. Пробудить вкусовые рецепторы способен коньяк. Благодаря концентрации ароматов\nон является идеальным дижестивом. Коньяк пьют\nв чистом виде при температуре 18-20°С небольшими глотками, подогревая бокал в руке. Следует\nиспользовать коньячный бокал средних размеров, позволяющий наилучшим образом прочувствовать все вкусовые нюансы.\nУ французов существует правило трех «С» (café,\ncognac, cigare): вначале подается кофе, затем – коньяк и после этого – сигары.\nКроме того, коньяк может служить удачным сопровождением десерта.\n\nСтоит ли нагревать коньяк над свечей?\nЛучшие специалисты и производители коньяка\nединодушны в том, что не следует нагревать коньяк, если, конечно, вы не хотите сделать из него\nнечто вроде грога после лыжной прогулки.\nНагревание портит напиток. Лучшие ароматы\nулетучиваются, а ощущение алкоголя усиливается. Такой коньяк не принесет удовольствия, он\nпокажется слишком крепким и лишенным равновесия.\n\nКоньяк в ресторане\nПодавая коньяк на дижестив в ресторане, следует использовать сервировочную тележку, на которой выставлены все коньяки. Благодаря этому:\n• Клиент видит весь набор напитков, а наглядное\nпредставление гораздо привлекательнее самой\nкрасивой карты дижестивов.\n• Клиент присутствует при наполнении бокала\n(бокал надо поставить на стол, затем налить коньяк). Это его успокаивает, ведь он может удостовериться в том, что ему наливают именно то, что\nон заказал.\n• Первая волна ароматов коньяка не теряется.\nВ шарантских ресторанах на столе клиента, заказавшего бокал коньяка, оставляют бутылку, чтобы\nокружающие были в курсе того, какой коньяк он\nпьет (или для какого коньячного дома он работает!).\nКоньяк наливают подобно вину или шампанскому\n– с правой стороны от клиента, обслуживая сидящих за столом по направлению часовой стрелки.\nЕсли в ресторане нет сервировочной тележки, то\nследует принести бутылку и налить дижестив в\nбокал прямо перед клиентом.\n\nС ове ты бармену\nЦвет и возраст коньяка\nКоньяк набирает цвет, главным образом, во время выдержки в дубовой бочке. Оттенок напитка зависит от срока его старения. Однако по цвету коньяка не стоит\nсразу судить о его возрасте.\nИз года в год коньячный дом обязан создавать напиток с постоянным оттенком.\nВедь покупатель не поймет, если цвет будет разным у одного и того же коньяка.\nПоэтому, выравнивая цвет коньяка, производители вынуждены добавлять несколько капель карамели. Она никак не влияет на вкус напитка.\nСтрогая регламентация ограничивает количество карамели до 2% от общего\nобъема. (Заметим, что при производстве виски таких ограничений не существует.)\nРазумеется, при этом учитывается возраст коньяка. Более старый коньяк определенной марки будет темнее молодого. Но коньяки разных домов отличаются друг\nот друга, и более старый напиток той или иной марки может вполне оказаться\nсветлее молодого коньяка бренда-конкурента.\n\nДегустируем коньяк\nНалейте немного коньяка в дегустационный бокал и дотроньтесь пальцем до его\nнаружной стенки. Посмотрите с другой стороны бокала. Если видны отпечатки\nпальца, то перед вами коньяк высшего качества.\nПовращайте бокал вокруг собственной оси в горизонтальном положении, чтобы\nувидеть, какие следы оставляет стекающий коньяк на его внутренних стенках.\nЕсли эти «ножки» видны в течение 5 секунд, то вы имеете дело с коньяком 5-8 лет\nвыдержки, если они видны в течение 15 секунд, то его выдержка – около 20 лет.\nДля 50-летних коньяков эти следы различимы в течение 17-18 секунд. Сравните\nразмер капли, вытекающей из каждой «ножки», с размером самой «ножки». Если\nони примерно одинаковой ширины, то перед вами коньяк с минимальным количеством добавок. Теперь постараемся различить три «волны» запахов коньяка.\n• Первая «волна» (на расстоянии 5 см от края бокала). Вы должны почувствовать\nлегко улетучивающиеся ароматы, например, ваниль.\n• Вторая «волна» (непосредственно у края бокала). Вдохните цветочные и фруктовые ароматы. Престижные коньяки обладают тонкими, но тем не менее ощутимыми ароматами розы, фиалки, липы, а также абрикосов, сухофруктов, фруктового\nваренья и орехов. Для получения более полной информации бокал следует слегка повращать в руке (в этом случае увеличивается испарение), а затем вдохнуть\nего содержимое несколько раз.\n• Третья «волна» (нос находится прямо в бокале). Вы почувствуете запах «выдержки». Можно будет различить аромат дуба и сложный «запах рансио» (основной\nпризнак выдержки). Все обонятельные ощущения должны быть легкими и не\nзаглушать друг друга.\nИсследуйте вкус коньяка, попробовав несколько капель. Концентрация ароматов\nвелика, поэтому не стоит «перегружать» нёбо избыточным количеством вкусовых\nощущений. Если вы почувствуете жжение во рту или терпкий, резкий вкус, то\nвозьмите в рот еще несколько капель. Эфирные масла, получаемые при правильной перегонке и отделении «сердца» напитка, покроют ваше нёбо уже после\nпервого глотка коньяка и защитят от жжения при втором. Ваши вкусовые ощущения должны подтвердить обонятельные.\n\nХранение коньяка\nКоньяк можно очень долго хранить в запечатанной бутылке, в темном месте,\nпричем в вертикальном положении, чтобы спирт не воздействовал на пробку. Но\nесли вы открыли бутылку, то ее рекомендуется выпить в течение полугода. Ароматы улетучиваются всякий раз, как вы вынимаете пробку.\n\nКоньяк и другие бренди 165", "А рмянский коньяк\nК ульт ура виноде лия в А рмении насчитывает не одно тысяче летие , а знаменитый\nсегодня во всем мире армянский коньяк появился на свет в конце 19 века .\n\nИ с тория\nНачало армянского коньячного производства\nбыло положено в 1887 году в Эривани купцом и\nфилантропом Нерсесом Таиряном, впервые внедрившим на своем заводе классическую французскую технологию выкурки спирта. На этот шаг\nего вдохновил кузен, Василий Таиров: опытный\nвинодел и ученый, он как никто другой мог оценить щедрый подарок природы – уникальные\nусловия Араратской долины и высокое качество\nместного винограда.\nПри финансовой поддержке друзей и родственников, производство оснастили перегонными\nаппаратами шарантского типа и оборудовали\nпомещение для выдержки спиртов. Предпринимательское чутье не подвело братьев – их начинание стало технологическим прорывом и открыло новые перспективы для коньячного дела\nв Армении.\nКогда в 1899 году успешное предприятие перешло к российскому товариществу «Шустов и\nсыновья», новые владельцы – деятельные промышленники, реконструировали завод по по-\n\n166 Коньяк и другие бренди\n\nследнему слову техники и привлекли к работе\nлучших специалистов. Один из них, Мкртыч Мусинянц, выдающийся технолог и автор оригинальных рецептур, стал бессменным управляющим\nзавода, а также автором первого армянского\nмарочного коньяка «Финь-Шампань Отборный»\n(1902 год).\nИменно творения Мусинянца, покорив иностранное жюри, принесли Шустовым Гран-при на выставке во Франции, а также звание «Поставщика\nдвора Его Императорского Величества». Личный\nвклад этих талантливых людей в развитие производства привел к тому, что в начале 20 века\nармянский коньяк завоевал международную популярность.\nДаже революционные потрясения не смогли пошатнуть значимость коньячного производства и\nлишь подчеркнули его статус национального достояния Армении.\nНаряду с мировым признанием, главной заслугой\nМкртыча Мусинянца был основанный им драгоценный запас спиртов, и по сей день бережно\nхранящихся на Ереванском Коньячном Заводе.\nКогда Армению охватило пламя революции, сопровождавшейся погромами и грабежами, защита национального достояния – заложенных в\nдубовые бочки на выдержку коньячных спиртов,\nпотребовала от Мусинянца мужества и решительности.\nПотеря спиртов уничтожила бы многолетний труд\nсотен людей, да и будущее самого производства.\nОднако завод уцелел, и после революции в качестве ценнейшего армянского предприятия был\nнационализирован. А в 1923 году в числе прочих\nкомпаний, производящих алкоголь в Армении,\nвошел в трест «Арарат».\nСоветская эпоха подарила миру целую гамму\nлегендарных коньяков Арарат, а самому Ереванскому Коньячному Заводу – его монументальное\nздание на правом берегу реки Раздан.\nДостижения армянского коньяка в период Советского союза неразрывно связаны с именем\nталантливого специалиста Маркара Седракяна.\nКаждый из знаменитых коньяков его авторства:\nАхтамар, Наири, Двин – дань памяти многовековой культуре и истории Армении.", "Коньяк и другие бренди 167", "Монументальное здание Ереванского Коньячного Завода\nрасположено на правом берегу реки Раздан.\n\nПроцесс производства\nВиноград\nСвоим ярким вкусом коньяки Арарат обязаны,\nв первую очередь, климату Араратской долины,\nразнообразию местных почв и сортов винограда.\nКаждый сентябрь фермеры и их семьи всего за\nнесколько недель вручную собирают весь урожай: работа кипит от заката до рассвета, чтобы\nсорванные ягоды не потеряли вкусовые качества\nи как можно быстрее попали на отжим.\nДля получения виноградного сока специалисты Ереванского Коньячного Завода используют\nпневматические прессы, предназначенные для\nпроизводства дорогих игристых вин: только деликатный отжим, не повреждающий косточки и\nкожицу, позволяет сохранить насыщенный аромат армянского винограда.\nПосле отжима в результате естественного брожения из сока получается высококачественное\nбелое вино, которое направляют на дистилляцию\nдля получения коньячного спирта.\n\nДистилляция\nВ соответствии с технологическим стандартом\nконьячного производства виноматериал проходит две стадии дистилляции: первичную и вторичную, фракционированную перегонку.\nВ результате первой перегонки получается\nспирт-сырец крепостью до 32°, который дистил-\n\n168 Коньяк и другие бренди\n\n5 звезд\n5 лет\n\nА ни\n6 лет\n\nА хтамар\n10 лет\n\nФруктовые ноты спелой сливы,\nсладкого персика и черной\nсмородины.\n\nАромат солнечных цитрусов,\nсушеный инжир и сладкий\nминдаль.\n\nСоблазнительные ноты\nчернослива, пчелиный воск и\nгрецкий орех.", "лируют повторно. Вторичная дистилляция разделяет спирт на три фракции: «голову», «сердце»\nи «хвост». Основой коньяков Арарат становится\nтолько «сердце» – самая чистая, тонкая и нежная\nфракция коньячных спиртов.\nОсобый характер коньячным спиртам придает\nдистилляция паровым методом: более сложная\nи длительная по сравнению с классической дистилляцией на открытом огне, именно она позволяет коньячному спирту в неизменном виде\nперенять все вкусовые свойства местных сортов\nвинограда.\n\nВыдержка в дубовых бочках\nВыдержка – процесс, занимающий не дни и месяцы, но многие годы. Только деревья старше 70 лет\nстановятся основой для бочек, еще несколько\nлет уходит на подготовку клепок и сборку – каждая бочка изготавливается мастерами вручную в\nсобственной бондарной мастерской завода.\nНаконец, готовая бочка передается в цех выдержки, где ее наполняют спиртом. В бочке спирт проведет от трех лет до полувека или даже дольше,\nобогащаясь различными оттенками цвета, вкуса\nи аромата. Именно благодаря особой структуре\nкавказского дуба, спирты будущих коньяков приобретают свой неповторимый характер с выраженными тонами сухофруктов, пряностей, ванили и шоколада.\nНесмотря на то, что мастер не видит происходящего перерождения, он постоянно отслеживает\nи регулирует температуру и условия, в которых\nнаходится бочка. Во многом именно его чутье\nопределяет, каковы будут свойства спирта через\nдесятки лет.\n\nВ аспуркан\n15 лет\n\nН аири\n20 лет\n\nД вин\nколлекционный\n\nКофейно-древесный аромат,\nсладость армянских сухофруктов.\n\nПряные оттенки кедровых\nорехов, густой мед и душистая\nперчинка.\n\nДревесно-дымный аромат\nсигары, оттенки гвоздики и\nлесной орех.\n\nБочки\nКаждая бочка, предназначенная для выдержки коньяков Арарат, изготавливается вручную в собственной бондарной мастерской завода. Такой подход\nпозволяет лучше контролировать парк бочек и процесс выдержки спиртов.\nВ качестве материала для бочек используется древесина кавказского дуба,\nпричем только тех деревьев, возраст которых составляет более 70 лет.\n\nКупаж\nКупаж – процесс, близкий к искусству. При соединении спиртов разного возраста из разных сортов винограда в единую композицию мастер купажа имеет дело со сложной палитрой вкусов и\nароматов. Из более чем 700 спиртов отличающихся друг от друга еще и из-за колебаний погодных\nусловий, при которых зрел виноград, и свойств\nбочек, в которых спирты были выдержаны, мастер\nдолжен выбрать те, что сформируют единственно верный характер каждого из коньяков гаммы\nАрарат.\nОсобую роль в купаже играет вода – для коньяков\nАрарат используют воду из природного источника Катнахпюр, способную идеально раскрыть\nхарактер и вкусовое богатство напитка. Готовый\nкупаж снова отправляется в дубовые бочки на\n«отдых», в ходе которого спирты приспосабливаются друг к другу и становятся единым целым\n– легендарным коньяком Арарат. Остается только\nразлить его по бутылкам.\n\nКоньяк и другие бренди 169", "Коньячный способ\nЭтот способ дистилляции допускается в Арманьяке с 1972 года, но им пользуется лишь одна пятая\nпроизводителей, поскольку шарантский аппарат\nстоит слишком дорого. Он позволяет точнее отсекать «головы» и «хвосты» и более разумно отбирать «сердце» дистиллята.\n\nАрманьячный способ\n\nА рманьяк\nАрманьяк считается самым древним спиртным\nнапитком Франции. Первое официальное упоминание, свидетельствующее о его существовании,\nотносится к 15 веку.\nВиноградники Арманьяка расположены в провинции Гасконь, на юго-западе Франции. Климат\nздесь особенный. Зимой холодный ветер дует с\nзаснеженных склонов Пиренеев. Летом раскаленное солнце иссушает виноградную лозу. Осень –\nтеплая, долгая и спокойная. Днем она содействует\nперегонке, а вечером благоволит дегустации.\n\nП роизводс тво\nСреди сортов винограда, используемых для арманьяка, господствует Уньи Блан.\nИз него делают легкое, кислое вино крепостью\nне более 8-10% vol. Есть два способа дистилляции\nэтого вина: арманьячный и коньячный.\nЕсли тот или иной производитель попытается\nубедить вас, что его метод дистилляции – наилучший, он, разумеется, будет прав. В зависимости от\nсорта винограда и характера почвы некоторые\nспирты гораздо лучше адаптированы к той или\nиной дистилляции. Но считать, что традиционная арманьячная дистилляция лучше коньячной,\nбыло бы большим заблуждением, столь же грубым, как и противоположное предположение.\n\n170 Коньяк и другие бренди\n\nА рманьяк и закон\nНазвание «арманьяк» вправе носить\nтолько тот напиток, который отвечает\nследующим требованиям:\n• Он происходит из районов: Нижний\nАрманьяк, Верхний Арманьяк или\nТенарез.\n• Для его производства использованы\nразрешенные белые сорта винограда.\n• Он был дистиллирован в арманьячном или шарантском аппарате до 31\nмарта, следующего за годом урожая.\nКрепость дистиллята составила от 52\nдо 72% vol.\n• Он был выдержан в дубовых бочках.\n• Крепость готового напитка – не\nменее 40% vol.\n\nЭтот способ перегонки предусматривает непрерывную дистилляцию, которая является предметом подлинного культа в некоторых семьях,\nпроизводящих арманьяк. Как, например, у Самаленсов, которые контролируют ее до мельчайших\nдеталей. Мне пришлось вместе с владельцем этого дома засунуть голову в аппарат типа Вердье,\nчтобы понять, сколь важную роль играет перегонка в культуре региона. Термин «непрерывная\nдистилляция» может создать впечатление, что\nподобно «патент стил» аппарат выдаст вам сразу\nводку, нейтральную и безвкусную. Нет ничего более ошибочного. Дисковый аппарат Вердье отрегулирован в самой своей конструкции так, чтобы\nдавать алкоголь крепостью около 55% vol., богатый вторичными элементами. Спирту потребуется долгая выдержка в бочках, чтобы смягчиться,\nокруглиться и получить цивилизованный вид, подобно медведю, надевшему смокинг. Единственное, что помогает «подогнать по фигуре костюм»,\n– это регулирование температуры нагрева перегонного аппарата: чем она выше, тем крепче и\nчище алкоголь, а чем ниже, тем слабее и пахучее.\nОднако колебания температуры должны быть незначительными. Каждое вмешательство потребует нескольких десятков минут, чтобы распространиться по всему аппарату. Поэтому, если нагрев\nслишком сильный или, наоборот, недостаточный,\nэто может привести к катастрофе. Вам останется\nтолько покинуть Арманьяк и попытать счастья в\nПариже. В силу этих трудностей мелкие производители арманьяка во многом различаются между\nсобой. Одни предложат вам тусклый напиток, в\nкотором вторичные элементы бросаются в глаза,\nкак жир в борще, а другие способны преподнести\nлучшее о-де-ви на свете.\n\nВыдержка\n\nB lanchе d'A rmagnac\n(Б ланш д'А рманьяк )\nЭто невыдержанный арманьячный\nспирт. После дистилляции он «отдыхает» три месяца в чанах. Существует\nкак самоcтоятельный напиток относительно недавно. В баре его можно\nподать с соком или в коктейлях.\n\nВыдержка арманьяка схожа с выдержкой коньяка.\nИспарение называют «долей ангелов», а стены\nвинных погребов возводят из местного камня\nдля сохранения влажности. Арманьяку требуется меньше времени, чтобы раскрыться. Самые\nстарые из них выдерживают 30-40 лет. Можно\nпредположить, что такие «укороченные» сроки\nвыдержки связаны с сухим климатом Гаскони\nи менее кислотными винами. После выдержки\nспирты купажируют между собой.", "Разновиднос ти\nНа возраст арманьяка указывают следующие надписи на этикетке:\n★★★ – купаж, в котором самый молодой арманьяк старел в бочках не менее 2 лет.\nVO, VSOP или Réserve – самый молодой арманьячный спирт в данном купаже выдерживался\nне менее пяти лет.\nXO, Extra, Napoléon – это купаж арманьяков\nстарше шести лет.\nHors d'âge – самый выдержанный арманьяк, в его\nсостав обычно входят арманьячные спирты не\nмоложе 10 лет.\nРегламентируется только минимальный возраст\nарманьяка. Арманьяк, поступающий в продажу,\nчасто намного превосходит минимальные сроки\nвыдержки.\nРегламентация допускает для арманьяка понятие\nmillesime (год урожая). В его состав входят арманьяки, продистиллированные в году, указанном\nна этикетке.\n\nУ потребление\nДижестив\nАрманьяк обладает долгим послевкусием и мощными ароматами. Это отличный дижестив, включенный в карты самых престижных заведений. В\nэтом случае арманьяк подают при 19-20°С либо\nв коньячном бокале, либо в специальном бокале\nдля арманьяка. Его форма позволяет лучше оценить ароматы напитка.\nВ ресторане арманьяк лучше сервировать с сервировочной тележки.\nБокал с арманьяком можно слегка нагреть в\nруке, после этого поднести к носу и вдохнуть: вы\nпочувствуете запах ванили, привносимый дубом,\nноты сливы, различные цветочные оттенки, а\nтакже аромат «рансио», присущий арманьякам\nдолгой выдержки.\nАрманьяк предоставляет дегустатору редкое\nудовольствие – вдыхать воспоминание о том,\nчто он пил. Его аромат настолько сильный, что\nощущается даже тогда, когда в бокале уже давно\nничего нет.\n\nАперитив и Any Time Drink\nМолодой арманьяк с газированной водой или\nтоником послужит приятным аперитивом. Он\nсочетается с апельсиновым и грейпфрутовым\nсоком. В этом случае его подают в высоком бокале со льдом.\nТакже арманьяк можно подать со льдом в бокале\nрокс.\n\nДругие бренди\nСпиртной напиток, полученный посредством\nдистилляции вина, называется бренди. Слово\nbrandy происходит от голландского brandvine,\nчто значит «жженое вино». Под этим названием\nсуществуют разные напитки. Лучшие из них отражают характер своей земли и образ жизни своих\nсоздателей. Бренди должен сохранять отличительные черты базового продукта, то есть винограда. Во всем мире существует бесчисленное\nмножество бренди.\n\nИталия\nБренди можно производить повсюду в Италии из\nвинограда любых сортов. Чаще всего используется Треббьяно. Итальянское бренди обычно обладает крепостью 40% vol. Его получают либо путем\nдвойной дистилляции, либо путем непрерывной\nперегонки, а чаще всего – смешанным способом.\n\nИспания\nПервоначально для испанского бренди использовали сорт Паломино, но вскоре отдали предпочтение сорту Аирен, который дает ароматные\nи кислотные вина. Испанские бренди могут производить методом «дистиладос» – непрерывная\nдистилляция при высокой температуре, либо\nметодом «холандос» – непрерывная дистилляция\nпри низкой температуре, либо путем двойной\nперегонки «алкитарес», либо путем однократной\nдистилляции «супериор». Два пос
