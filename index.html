// Init
window.onload = () => {
  // Load from localStorage
  const saved = localStorage.getItem('reader_library');
  if (saved) {
    try { library = JSON.parse(saved); } catch(e) {}
  }

  // Add preloaded book if not already in library
  if (!library.find(b => b.title === 'Библия бармена')) {
    library.unshift({
      title: 'Библия бармена',
      pages: PRELOADED_BOOK,
      added: Date.now()
    });
    saveLibrary();
  }

  renderBookList();
  initTTS();
  
  // Load last position
  const lastBook = localStorage.getItem('last_book');
  const lastPage = parseInt(localStorage.getItem('last_page') || '0');
  if (lastBook !== null) {
    openBook(parseInt(lastBook), lastPage);
  }
};

function saveLibrary() {
  // Save only non-preloaded books to avoid quota issues
  const toSave = library.map(b => ({...b, pages: b.title === 'Библия бармена' ? [] : b.pages}));
  try { localStorage.setItem('reader_library', JSON.stringify(toSave)); } catch(e) {}
}

function renderBookList() {
  const list = document.getElementById('book-list');
  list.innerHTML = '';
  library.forEach((book, i) => {
    const div = document.createElement('div');
    div.className = 'book-item' + (i === currentBookIdx ? ' active' : '');
    div.innerHTML = `<span class="book-icon">📖</span><span class="book-title">${escHtml(book.title)}</span><span class="book-pages">${book.pages.length}с</span>`;
    div.onclick = () => openBook(i, 0);
    list.appendChild(div);
  });
}

function openBook(idx, startPage = 0) {
  currentBookIdx = idx;
  currentPage = startPage;
  const book = library[idx];
  document.getElementById('book-title-bar').textContent = book.title;
  document.getElementById('total-pages').textContent = book.pages.length;
  document.getElementById('page-input').max = book.pages.length;
  renderBookList();
  renderPage();
  localStorage.setItem('last_book', idx);
}

function renderPage() {
  if (currentBookIdx < 0) return;
  const book = library[currentBookIdx];
  const pages = book.pages;
  if (!pages || pages.length === 0) return;
  
  currentPage = Math.max(0, Math.min(currentPage, pages.length - 1));
  let text = pages[currentPage] || '';
  
  // Highlight search
  if (searchQuery) {
    const re = new RegExp(escRegex(searchQuery), 'gi');
    text = text.replace(re, m => `<mark>${m}</mark>`);
    const reader = document.getElementById('reader-page');
    reader.innerHTML = text.replace(/\n/g, '<br>');
  } else {
    const reader = document.getElementById('reader-page');
    reader.textContent = text;
  }
  
  document.getElementById('page-input').value = currentPage + 1;
  const pct = pages.length > 1 ? ((currentPage / (pages.length - 1)) * 100).toFixed(1) : 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('reader-wrap').scrollTop = 0;
  localStorage.setItem('last_page', currentPage);
  
  if (ttsActive) ttsRead();
}

function prevPage() { currentPage--; renderPage(); }
function nextPage() { currentPage++; renderPage(); }
function goToPage(n) { currentPage = parseInt(n) - 1; renderPage(); }

function searchText(q) {
  searchQuery = q;
  renderPage();
  if (q && currentBookIdx >= 0) {
    // Find first page with match
    const pages = library[currentBookIdx].pages;
    for (let i = 0; i < pages.length; i++) {
      if (pages[i].toLowerCase().includes(q.toLowerCase())) {
        currentPage = i;
        renderPage();
        break;
      }
    }
  }
}

// File loading
document.getElementById('file-input').addEventListener('change', async (e) => {
  const files = Array.from(e.target.files);
  for (const file of files) {
    await loadFile(file);
  }
  e.target.value = '';
});

async function loadFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  showLoading('Читаю ' + file.name + '...');
  
  try {
    let pages = [];
    
    if (ext === 'txt') {
      const text = await readAsText(file);
      pages = splitIntoPages(text, 3000);
    } else if (ext === 'pdf') {
      pages = await loadPDF(file);
    } else if (ext === 'epub') {
      pages = await loadEPUB(file);
    } else if (ext === 'fb2') {
      pages = await loadFB2(file);
    } else if (ext === 'rtf') {
      pages = await loadRTF(file);
    } else if (ext === 'docx') {
      pages = await loadDOCX(file);
    } else {
      const text = await readAsText(file);
      pages = splitIntoPages(text, 3000);
    }
    
    if (pages.length === 0) {
      alert('Не удалось прочитать файл. Возможно, он защищён или повреждён.');
      return;
    }
    
    const title = file.name.replace(/\.[^.]+$/, '');
    const existing = library.findIndex(b => b.title === title);
    if (existing >= 0) library.splice(existing, 1);
    
    library.push({ title, pages, added: Date.now() });
    saveLibrary();
    renderBookList();
    openBook(library.length - 1, 0);
    
  } catch(err) {
    console.error(err);
    alert('Ошибка загрузки: ' + err.message);
  } finally {
    hideLoading();
  }
}

function readAsText(file, encoding = 'utf-8') {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = e => res(e.target.result);
    r.onerror = () => rej(new Error('Read error'));
    r.readAsText(file, encoding);
  });
}

function readAsArrayBuffer(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = e => res(e.target.result);
    r.onerror = () => rej(new Error('Read error'));
    r.readAsArrayBuffer(file);
  });
}

function splitIntoPages(text, charsPerPage = 3000) {
  // Try to split on paragraph boundaries
  const paragraphs = text.split(/\n\n+/);
  const pages = [];
  let current = '';
  
  for (const p of paragraphs) {
    if ((current + p).length > charsPerPage && current.length > 0) {
      pages.push(current.trim());
      current = p + '\n\n';
    } else {
      current += p + '\n\n';
    }
  }
  if (current.trim()) pages.push(current.trim());
  return pages.filter(p => p.trim());
}

async function loadPDF(file) {
  // Use PDF.js from CDN
  if (!window.pdfjsLib) {
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js');
    window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }
  
  const buf = await readAsArrayBuffer(file);
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  const pages = [];
  
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    const text = content.items.map(item => item.str).join(' ').trim();
    if (text) pages.push(text);
  }
  
  return pages;
}

async function loadEPUB(file) {
  const buf = await readAsArrayBuffer(file);
  // Use JSZip to unzip EPUB
  if (!window.JSZip) {
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js');
  }
  
  const zip = await JSZip.loadAsync(buf);
  const texts = [];
  
  // Find all HTML/XHTML files
  const htmlFiles = [];
  zip.forEach((path, file) => {
    if (path.endsWith('.html') || path.endsWith('.xhtml') || path.endsWith('.htm')) {
      htmlFiles.push({ path, file });
    }
  });
  
  // Sort by path to maintain order
  htmlFiles.sort((a, b) => a.path.localeCompare(b.path));
  
  for (const { file } of htmlFiles) {
    const html = await file.async('text');
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    // Remove scripts and styles
    doc.querySelectorAll('script, style').forEach(el => el.remove());
    const text = doc.body ? doc.body.innerText || doc.body.textContent : '';
    if (text.trim().length > 50) {
      texts.push(text.trim());
    }
  }
  
  // If EPUB reading failed, try reading all text content
  if (texts.length === 0) {
    throw new Error('EPUB не содержит читаемого текста');
  }
  
  // Combine and split into pages
  const combined = texts.join('\n\n');
  return splitIntoPages(combined, 3000);
}

async function loadFB2(file) {
  const text = await readAsText(file);
  const parser = new DOMParser();
  const doc = parser.parseFromString(text, 'text/xml');
  
  const bodies = doc.querySelectorAll('body');
  let allText = '';
  
  bodies.forEach(body => {
    const sections = body.querySelectorAll('section, p, title, epigraph, poem, stanza, v');
    sections.forEach(el => {
      const t = el.textContent.trim();
      if (t) allText += t + '\n\n';
    });
  });
  
  if (!allText.trim()) {
    // Fallback: get all text
    allText = doc.documentElement.textContent;
  }
  
  return splitIntoPages(allText.trim(), 3000);
}

async function loadRTF(file) {
  const text = await readAsText(file);
  // Strip RTF markup
  let clean = text
    .replace(/\{[^{}]*\}/g, '')
    .replace(/\\[a-z]+\d*\s?/g, '')
    .replace(/[{}]/g, '')
    .replace(/\\par\s*/g, '\n\n')
    .replace(/\\line\s*/g, '\n')
    .trim();
  return splitIntoPages(clean, 3000);
}

async function loadDOCX(file) {
  if (!window.mammoth) {
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js');
  }
  const buf = await readAsArrayBuffer(file);
  const result = await mammoth.extractRawText({ arrayBuffer: buf });
  return splitIntoPages(result.value, 3000);
}

function loadScript(src) {
  return new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = res;
    s.onerror = () => rej(new Error('Script load failed: ' + src));
    document.head.appendChild(s);
  });
}

// TTS
function initTTS() {
  if (!('speechSynthesis' in window)) return;
  
  const loadVoices = () => {
    voices = window.speechSynthesis.getVoices();
    const sel = document.getElementById('voice-select');
    sel.innerHTML = '';
    voices.forEach((v, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = v.name + ' (' + v.lang + ')';
      if (v.lang.startsWith('ru')) opt.textContent = '★ ' + opt.textContent;
      sel.appendChild(opt);
    });
    // Default to Russian voice if available
    const ruIdx = voices.findIndex(v => v.lang.startsWith('ru'));
    if (ruIdx >= 0) sel.value = ruIdx;
  };
  
  window.speechSynthesis.onvoiceschanged = loadVoices;
  loadVoices();
  
  document.getElementById('tts-speed').oninput = function() {
    document.getElementById('tts-speed-val').textContent = parseFloat(this.value).toFixed(1) + '×';
    if (ttsActive) ttsRead();
  };
}

function setVoice() {}

function toggleTTS() {
  const bar = document.getElementById('tts-bar');
  bar.classList.toggle('show');
  if (!bar.classList.contains('show')) {
    ttsStop();
  }
}

function ttsToggle() {
  if (ttsActive) {
    window.speechSynthesis.pause();
    ttsActive = false;
    document.getElementById('tts-play-btn').textContent = '▶ Играть';
  } else {
    if (window.speechSynthesis.paused) {
      window.speechSynthesis.resume();
      ttsActive = true;
      document.getElementById('tts-play-btn').textContent = '⏸ Пауза';
    } else {
      ttsRead();
    }
  }
}

function ttsRead() {
  window.speechSynthesis.cancel();
  if (currentBookIdx < 0) return;
  
  const text = library[currentBookIdx].pages[currentPage] || '';
  const utter = new SpeechSynthesisUtterance(text);
  
  const voiceIdx = parseInt(document.getElementById('voice-select').value);
  if (voices[voiceIdx]) utter.voice = voices[voiceIdx];
  utter.rate = parseFloat(document.getElementById('tts-speed').value);
  utter.lang = 'ru-RU';
  
  utter.onend = () => {
    if (ttsActive) { nextPage(); }
  };
  
  window.speechSynthesis.speak(utter);
  ttsActive = true;
  document.getElementById('tts-play-btn').textContent = '⏸ Пауза';
  document.getElementById('tts-bar').classList.add('show');
}

function ttsStop() {
  window.speechSynthesis.cancel();
  ttsActive = false;
  if (document.getElementById('tts-play-btn'))
    document.getElementById('tts-play-btn').textContent = '▶ Играть';
}

// Utils
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
function showLoading(msg) {
  document.getElementById('loading-text').textContent = msg;
  document.getElementById('loading').classList.add('show');
}
function hideLoading() { document.getElementById('loading').classList.remove('show'); }

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); nextPage(); }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); prevPage(); }
  if (e.key === 'f' || e.key === 'F') document.getElementById('search-box').focus();
});
</script>
