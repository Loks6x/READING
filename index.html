То есть, это стратегический\nвыбор.\nПеред подачей коктейля следует убедиться в том, что бокал чист и не сломан. Затем, в некоторых случаях, его\nследует охладить, используя кубики\nльда или, лучше, дробленый лед. Ни в\nкоем случае не рекомендуется брать\nбокалы пальцами за внутреннюю\nповерхность, а, по возможности,\nдержать их ближе к основанию.\n\n19. Терка, чаще всего употребляется для натирания мускатного ореха.\n\nБ окалы для бара\n\nБокал для мартини\n(коктейльный бокал)\n120–160 мл\n\nХайбол (коллинз)\n240–320 мл\n\nПивная кружка\n260–360 мл\n\nВинный бокал\n180–300 мл\n\n214 Иск усс тв о кок тей ля\n\nРокс (тумблер)\n200–320 мл\n\nСтопка\n40–60 мл\n\nСлинг\n220–300 мл\n\nБокал для Маргариты\n240–300 мл\n\nЧаша для\nшампанского\n160–220 мл\n\nФужер для\nшампанского\n160–180 мл\n\nЖароустойчивый бокал\nТодди\n240–280 мл\n\nПус кафе (для слоистых\nкоктейлей)\n80–120 мл\n\nВодочная\nрюмка\n40–60 мл\n\nКоньячный бокал\n240–360 мл", "С пособы смешивания\nВ зависимос ти от того , насколько легко перемешиваютс я ме ж ду\nсобой ингре диенты кок тейля , его готовят одним из пре дс тавленных\nда лее способов .\n\nП рямо в бок а ле\n(B uild in G lass)\n\nОбычно так готовят все основные лонг дринки, не\nсодержащие слишком тяжелых сиропов, сливок и\nсостоящие из небольшого количества ингредиентов (не более трех).\nЧаще всего это напитки, которые подаются со\nльдом. В качестве примера можно привести такие классические смешанные напитки, как «Мохито» и «Джин-тоник».\n\nПриготовление\nПоложить несколько кусочков льда в соответствующий бокал. Налить ингредиенты в порядке,\nуказанном в рецепте. Перемешать их и, если это\nнеобходимо по рецепту, добавить газированный\nнапиток. Размешивать газированные напитки\nследует, разумеется, как можно меньше.\n\n1. Насыпать лед в бокал,\nуказанный в рецепте.\n\n2. Налить ингредиенты.\n\n3. Премешать барной\nложкой.\n\nМ етод «С уизл »\nПалочка «суизл» - это ветка тропического кустарника с 3-5 разветвлениями на конце. Она дала свое название методу приготовления коктейлей и всей группе таких коктейлей. Вы вставляете эту палочку в бокал\nс напитком и дробленым льдом и быстро вращаете ее между ладоней,\nнаподобие того, как первобытный человек разжигал огонь.\nВот что написано в карте нью-йоркского бара Clover Club про группу\nкоктейлей суизл: «Суизл – это кисло-сладкий напиток, подаваемый\nс дробленым льдом и перемешанный при помощи палочки «суизл».\nНекоторые утверждают, что ингредиенты суизла не столь важны,\nкак сама техника перемешивания. Правильно приготовленный суизл\nбудет пенистым, а бокал подмороженным. Эти напитки требуют\nкак умения от того, кто их готовит, так и терпения от того, кто их\nзаказывает. Правильный суизл – это бескорыстный труд, полностью\nзаслуживающий ожидания».\nВозвращаясь к деревянной палочке, надо сказать, что сегодня также\nраспространены ее металлические аналоги. Кроме того, вместо нее\nможно использовать обычную барную ложку, быстро вращая ее между\nладонями и острожно приподнимая и опуская ее в бокале.\n\nИск усс тво кок тей ля 215", "М етод « флоат»\nМетоду «флоат» (float) почти столько же лет,\nсколько коктейлю вообще. Из старинных сборников рецептов становится ясно, что чаще всего\nэтим методом пользовался Гарри Джонсон, а в\n1940-х годах у него принял эстафету Дэвид Эмбери.\nМетод состоит в добавлении дэша или нескольких\nмиллилитров очень душистого спиртного напитка\nповерх коктейля. Этот напиток должен обладать\nменьшей плотностью, нежели коктейль, иначе\nон опустится на дно, и никакого всплывания не\nполучится. Часто сверху наливают напиток, принадлежащий к той же группе, что и тот, на основе\nкоторого готовится коктейль. Флоат выдержанного\nили ямайского рома на коктейле с легким ромом\nили флоат мескаля на коктейле с текилой могут послужить примером. Использование флоат следует\nрасценивать как утонченное внимание бармена,\nпоследний штрих в эфемерном произведении\nискусства, каким является коктейль. Но следует\nсоблюдать меру, поскольку флоат не должен «утопить» клиента.\n\nМария Милацкова, Санкт-Петербург.\n\nВ с так ане д ля\nсмешивания\n(Stir & Strain)\n2. В смесительный\nстакан добавить\nингредиенты согласно\nрецепту.\n1. Наполнить льдом смесительный\nстакан и коктейльный бокал (чтобы\nохладить последний).\n\nСтакан для смешивания используют для приготовления более сложных коктейлей, которые\nсодержат больше ингредиентов, но не требуют\nвстряхивания.\nТакже его применяют для тех смешанных напитков, которые подают охлажденными, но без льда.\n\nПриготовление\n\n3. Перемешать\nбарной ложкой.\n\n216 Иск усс тв о кок тей ля\n\n4. Выбросить лед из\nкоктейльного бокала и\nотфильтровать в него коктейль.\n\nСтакан для смешивания (для этого подойдет нижняя часть шейкера) надо заполнить льдом. Образовавшуюся воду слить.\nНалить в стакан для смешивания ингредиенты\nв порядке, указанном в рецепте. Перемешать их\nбарной ложкой. Перелить полученный коктейль\nв бокал, отфильтровав от льда с помощью барного ситечка. Если коктейль подается со льдом,\nто надо использовать новый лед, предварительно положив его в бокал, а не лед из стакана для\nсмешивания!", "В шейкере (Shake)\nТакие ингредиенты, как соки, сливки, сиропы,\nяйца, нуждаются во взбивании, чтобы превратиться в однородную массу.\nДля этого используют шейкер, позволяющий\nодновременно хорошо перемешать перечисленные продукты с алкогольными напитками и\nохладить создаваемый коктейль.\n\nПриготовление\nНаполнить льдом нижнюю часть шейкера. Налить ингредиенты и плотно его закрыть. Шейкер\nвстряхивают около 10 секунд.\nОднако не забывайте, что лучшее – враг хорошего, а идеал – это некий компромисс. Чем дольше\nвы взбиваете коктейль, тем лучше он смешивается и охлаждается, но тем больше тает лед.\nЧем меньше вы взбиваете коктейль, тем хуже он\nохлаждается и смешивается, но тем меньше он\nразбавляется водой от растаявшего льда.\n\n1. Насыпать лед в\nнижнюю, стеклянную\nчасть шейкера, а также\n– в бокал, указанный в\nрецепте.\n\n2. В шейкер добавить\nингредиенты согласно\nрецепту.\n\n3. Плотно\nзакрыть шейкер\nметаллическим\nстаканом.\n\nХардшейк\nHard Shake (интенсивное встряхивание шейкера).\nОн был изобретен японским барменом Казуо\nУйедой. Шейкер встряхивается таким образом,\nчто лед перемещается по всем четырем углам\nшейкера, если можно так выразиться. При этом\nон колется, прекрасно охлаждает и аэрирует\nнапиток, не требуя его двойного процеживания. Последний отфильтровывается из шейкера\nвспененным.\nHard Shake в особенности подходит для напитков, содержащих сливки или яйцо. Бармен\nрасставляет ноги, как боксер на ринге, и трясет\nнебольшой шейкер двумя руками, перемещая\nего по диагонали и акцентируя каждое движение\nшейкера в четырех точках: вверху, в центре,\nвнизу, в середине между центром и низом диагонали, а затем опять повторяет все заново несколько раз. Удары льда о стенки шейкера усиливаются с помощью дополнительного движения\nзапястья, действующего, как удар хлыста. При\nподобной технике чрезвычайно важно никогда\nне встряхивать шейкер в направлении клиентов.\nМетод «хард шейка» многими оспаривается:\nон не способен превратить плохой коктейль в\nхороший, но широко используется японскими\nбарменами. Лично я считаю, что его следует рассматривать, как телесное самовыражение, вид\nсвоеобразного искусства, придающего коктейлю\nдополнительную ценность.\n\n4. Быстро и энергично\nвстряхнуть шейкер.\n\n5. Перевернуть шейкер\nметаллическим стаканом вниз\nи открыть его, слегка стукнув\nсбоку по металлической части.\n\n6. Отфильтровать содержимое\nшейкера через ситечко в\nбокал, предварительно\nвыбросив из него лед.\n\nДамир Стойкович,\n15 Kitchen+Bar, Москва.\n\nИск усс тво кок тей ля 217", "Д войное процеживание\nДвойное процеживание (double strain или fine strain)\nполучило распространение в конце прошлого – начале\nнынешнего века. Возникло оно, скорее всего, в Лондоне, став одним из проявлений коктейльной революции.\nЭтот метод применяют к коктейлям, приготовленным\nв смесительном стакане или шейкере. Он заключается\nв том, что напиток процеживают одновременно через\nстрейнер и через ситечко, что позволяют лучше отфильтровать частички фруктов (если такие имеются),\nа также – осколки льда, которые, таким образом, не\nразбавят коктейль, подпортив его сухой вкус.\nОдно время абсолютно все коктейли, подаваемые без\nльда в лучших барах английской столицы, подвергались двойному процеживанию вне зависимости от\nиспользованных ингредиентов.\nСегодня приветствуется более избирательный подход\nпри использовании «дабл стрейна». Противники метода\nуказывают на то, что он лишает взбитый в шейкере\nкоктейль легких пузырьков воздуха. Воздух отфильтровывается ситечком, и напиток теряет живость своей\nтекстуры и утрачивает немного пенистый внешний\nвид. Кроме того, двойное процеживание отнимает у\nбармена больше времени, а также поднимает вопрос\nгигиены ситечка.\nВ любом случае двойное процеживание должно применяться к коктейлям, которые содержат частицы\nфруктов, ягод или других растительных ингредиентов,\nи ни в коем случае не должно применяться с пенистым\nкоктейлям, которые содержат яичный белок.\n\nАнастасия Гвак. Noor Bar, Москва.\n\nВ блендере (B lend)\nВ блендере получаются либо коктейли более\nгустой консистенции на основе сливок, свежих\nфруктов, льда и т.д., либо, наоборот, очень воздушные и пенистые коктейли.\nНаряду в блендером, сегодня для приготовления\nкоктейлей с консистенцией «мокрого снега»\nшироко применяется специальный аппарат под\nназванием «гранитор», который перемешивает\nингредиенты при их одновременном замораживании.\n\nПриготовление\nПоложить в блендер лед (лучше дробленый), добавить нарезанные фрукты и другие ингредиенты. Взбивать около 30 секунд. Перелить коктейль\nв бокал, украсить и подать.\n\n218 Иск усс тв о кок тей ля", "С ухой шейк ,\nпрямой и обратный\nДля приготовления пенистых коктейлей, которые содержат яичный белок\nбармены чаще всего прибегают к\nметоду под названием dry shake (сухой шейк). Причина использования\nданного метода проста – белок плохо\nвзбивается со льдом и в контакте с\nним с трудом образует густую красивую пену. Поэтому вначале все ингредиенты, включая белок, энергично\nвзбивают в шейкере насухую, то есть\nбез льда. А потом добавляют лед и\nвстряхивают шейкер еще раз. Затем\nкоктейль процеживают в бокал.\nНекоторые перфекционисты идут еще\nдальше и используют reverse dry shake\n(обратный сухой шейк). Они взбивают\nв шейкере со льдом все ингредиенты,\nкроме белка. Затем удаляют лед, добавляют белок и встряхивают шейкер\nеще раз. Потом коктейль переливают,\nне отфильтровывая, в бокал.\n\nП ена : кок тейль с\n\nД ым : спецэффек т\n\nнежной текс т урой\n\nпри подаче\n\nПрименительно к миксологии, пена – это образование из жидкости (напитка) и газа (воздух, углекислый газ, закись азота). В этом образовании газ\nв виде мельчайших пузырьков равномерно распространен в жидкости.\nТрадиционный пенообразователь в коктейлях –\nэто яичный белок, который после взбивания образует красивую «шапку» на поверхности напитка и обуславливает его нежную текстуру.\nСегодня при создании пены на помощь миксологам приходят новые технологии и пищевые добавки.\nТак с помощью соевого лецитина можно создать\nлегкую пену практически из любых жидкостей,\nпричем без использования яиц. Вначале следует\nрастворить соевый лецитин в той жидкости, из\nкоторой мы собираемся приготовить пену. Далее\nпробить блендером, пока не образуется пена.\nДать пене стабилизироваться 2 минуты. Разложить ложкой перед употреблением.\nРазличные пены и муссы можно также приготовить в кремере. Например, – взбитые сливки для\nкофейного коктейля. Кроме того, кремер позволяет сделать мусс и без сливок: со вкусом специй\nили фруктов. В данном случае в качестве эмульгатора используется яичный белок в сочетании с\nжелатином, который стабилизирует пену.\n\nПри, так называемой, мультисенсорной подаче\nкоктейля часто используется дым, как один из\nэлементов воздействия на наши органы чувств.\nНапустить дым можно несколькими способами.\nВ первую очередь, – при помощи специального\nприспособления: дымового пистолета (Smoking\nGun). Он заряжается деревянными щепками и выделяет дым, передающий копченый вкус напитку.\nВозможны различные пути действия: оставить\nкоктейль на некоторое время под полным дыма\nстеклянным куполом или, например, прежде чем\nналить коктейль в бокал, перемешать его с дымом в крупном графине.\nПривкус дыма меняется в зависимости от пород\nдерева, использованных для изготовления щепок.\nЕще один способ окутать коктейль облаком дыма\n– поджечь его гарниш. В качестве последнего используют шишки, розмарин, ореган, кожура цитрусовых...\nСухой лед – это еще один вариант создать «смог»\nпри сервировке. Только его дым не обладает копченым запахом.\n\nИск усс тво кок тей ля 219", "Ирина Голубева.\nSanto Spirito, Москва.\n\nД есять золотых правил\nприготовления коктейля\n\nК ак на лить правильную дозу?\nНет ничего легче, чем налить бокал? Глубокое\nзаблуждение. Сторонники «свободного пуринга» (free pouring – разлив без мерки, на глаз) и\nджиггера столкнулись в яростном споре. Свободный пуринг котируется. В первую очередь, он\nзрелищен. Его сторонники считают, что профессиональный бармен должен уметь оценить\nна глаз наливаемое количество напитка. Опыт\nподсказывает ему, когда он достигает 40 мл.\nБолее того, у каждого бармена есть свои трюки,\nчтобы оценить количество налитого напитка.\nНекоторые отсчитывают секунды, другие имеют\nсвои отметки на стакане для смешивания или\nшейкере. Например, в Испании бармен прекращает наливать виски в бокал рокс, когда его\nуровень достигает высоты второго кубика льда,\n\n220 Иск усс тв о кок тей ля\n\nи в результате получается ровно 50 мл. Но для\nсторонников джиггера такой подход недостаточно точен. Они убеждены, что если в рецепте\nсказано: 50 мл водки и 20 мл лимонного сока, то\nэто не может быть соответственно 52 и 27 мл, и\nлишь джиггер позволяет не отступить от пропорций рецепта. Такой подход также помогает\nболее точно отслеживать запасы и оценивать\nиздержки и прибыль.\nОба лагеря имеют своих адептов. Их мнения\nразличаются столь же радикально, как и у сторонников правостороннего и левостороннего\nдвижения. Лучше не пускать их ездить вместе.\nТочно так же бар должен сделать окончательный\nвыбор – свободный пуринг или джиггер, а все\nбармены – подчиниться этому решению.\n\n1. Используйте ингредиенты самого\nвысокого качества.\n2. Уделяйте огромное значение воде\nи никогда не используйте воду изпод крана для приготовления льда.\n3. Используйте как можно более\nхолодный лед в крупных кусках.\n4. Свежие фрукты режут или выжимают в самый последний момент.\n5. Если необходимо приготовить\nпенистый коктейль в шейкере (а в\nего состав входит сахарный сироп),\nто в этом случае лучше использовать\nсахарный песок.\n6. Уважайте порядок, предусмотренный в рецепте, но, если это возможно, наливайте самый дорогой\nингредиент в последнюю очередь.\n7. Никогда не взбивайте в шейкере и\nне наливайте в бокал для смешивания газированные напитки.\n8. Следует готовить коктейли быстро,\nчтобы лед не успел растаять.\n9. Когда вы готовите в шейкере или\nв стакане для смешивания сразу\nнесколько порций коктейля, не\nзаполняйте доверху первый бокал.\nРазливайте коктейль постепенно, в\nнесколько приемов во все бокалы,\nчтобы получить одинаковые порции.\n10. Мыть посуду и оборудование надо\nкак можно быстрее после приготовления и подачи коктейля, поскольку\nвысохшие остатки продуктов очень\nтрудно отчистить.", "М е тод Throw, он же «К убан ролл »\nМетод приготовления коктейлей Throwing (или\nthrow, он же Cuban Roll) заключается в том, что\nсмешанный напиток несколько раз переливают\nиз одного металлического стакана в другой, что,\nпомимо зрелищного эффекта, насыщает коктейль\nкислородом и раскрывает его ароматы.\n\nИстория\n\nДжерри Томасу, следует отметить, что он готовил\nтаким способом пылающий коктейль Blue Blazer,\nто есть переливал из одного стакана в другой\nгорящую смесь, что было еще более эффектно и\nеще более сложно с технической точки зрения.\nСам Джерри Томас рекомендует в своей книге\nтем, кто хочет освоить этот метод, вначале потренироваться с холодной водой.\n\nНикита Иванкин.\nАнтикварный Boutique & Bar, Москва.\n\nЭтот метод появился или, скорее, возродился, на\nКубе во времена сухого закона. Тогда Гавана была\nбарной стойкой Америки, а кубинские бармены, оттачивая свое мастерство, воскресили этот\nстаринный способ приготовления коктейлей, запечатленный на гравюре в книге легендарного\nамериканского бармена 19 столетия – Джерри\nТомаса.\nИз Кубы метод throw вновь распространился\nпо лучшим барам планеты благодаря Мигелю\nБоадасу Парера. Этот известный бармен родился в 1895 году в Гаване, в семье выходцев из\nЛьорет-де-Мар, того же каталонского города,\nчто и Константе Рибалаигуа. В то время на Кубе\nдвоюродные братья Мигеля владели небольшим\nбаром «Ла Пинья дель Плата», который, по мере\nсовершенствования и появления иностранных\nтуристов, превратился во «Флориду», а потом –\nво «Флоридиту».\nМигель, поступив туда на работу в качестве бармена, узнал все тонкости кубинской школы и\nосвоил искусство смешивать «Дайкири» рядом\nс Константе. Когда в 1925 году он обосновался\nв Барселоне, у него была лишь одна цель – открыть, наконец, свой бар. Что он и сделал в 1933\nгоду. Так родился «Боадас коктейль бар», первый\nкоктейльный бар Барселоны. А метод Cuban Roll\nполучил распространение в Европе.\n\nТехника\nЭтот метод нельзя назвать простым. Он требует\nопределенной ловкости и навыка. Ингредиенты и\nлед помещают в один из стаканов шейкера. Кубики льда не должны помешать стрейнеру плотно\nнакрыть стакан. Пустой стакан от шейкера берется в левую руку, стакан со стрейнером – в правую.\nКоктейль переливают, одновременно поднимая\nправую руку и опуская левую. При этом смотреть\nнадо на нижний стакан. Когда вся жидкость оказывается в нижнем стакане, надо перелить ее\nобратно в стакан со льдом и повторить операцию заново. И так несколько раз.\nВ результате должен получиться немного пенистый коктейль, насыщенный кислородом.\nВозвращаясь к родоначальнику метода throw –\n\nИск усс тво кок тей ля 221", "Украшение\nкок т ей лей\n\nС егодняшняя мода на гарниши подобна общей моде : ак т уа льно все , при условии , что у вас ес ть с тиль и творческий подход .\nГарниш може т быть самым минима лис тическим или , наоборот, невероятно\nтеатра льным : мини - зак уск а , ароматическое облако , пипе тки с абсентом или\nбит тером , ме лкие игрушки ( на память), фиг урки - конфе ты , све тящийс я ле д ,\nпавлиньи перья , с ла дк а я вата ... В а жно только одно : гарниш должен органич но вписыватьс я в концепцию кок тейля .\n\nУкрашение напитка является частью его рецепта.\nА в некоторых случаях два разных коктейля могут\nотличаться лишь гарнишем. Поэтому клиент ждет,\nчто его напиток будет украшен соответствующим\nобразом. Украшение фирменного коктейля должно отвечать стилю заведения. Строгое или пышное – оно представляет собой как бы визитную\nкарточку коктейля. Однако учтите, что лучше сделать простое, но удачное украшение, чем сложное, но малоподходящее.\n\nПримеры классических украшений\nДля украшения коктейля могут быть использованы разнообразные плоды, в том числе:\n• «пьяная» вишня (вишня, вымоченная в крепком\nспиртном напитке);\n• вишня в сиропе;\n• свежая вишня;\n• ломтик лимона;\n• узкая длинная полоска из кожуры лимона, свернутая в спираль (такое украшение называют «твистом», оно служит не только для красоты, но еще\nи сильно ароматизирует коктейль);\n• ломтик лайма;\n• ломтик апельсина;\n• твист из кожуры апельсина;\n• ломтик грейпфрута;\n• ломтик свежего ананаса;\n• зеленые оливки;\n• мята;\n• маленькие маринованные луковицы;\n• ветка сельдерея;\n• яблочный веер.\n\nНарезка фруктов\nПеред нарезкой фруктов следует предваритель-\n\n222 Иск усс тв о кок тей ля\n\nно вымыть руки с мылом и хорошенько их сполоснуть.\nНа кожуре цитрусовых содержатся пестициды и\nдругие химикаты. Поэтому лучше всего использовать в баре экологически чистые лимоны, апельсины и лаймы. Тщательно мойте фрукты перед\nупотреблением. Обычно все фрукты нарезают в\nпоследний момент. К сожалению, это не всегда\nвозможно, и во многих барах и на дискотеках\nпредпочитают их нарезать заранее.\nПри украшении коктейлей действуйте по системе FIFO (first in, first out) – то есть сначала следует\nиспользовать украшения, приготовленные первыми, чтобы фрукты сохранили свежесть.\nЕсли вы хотите соорудить украшения из яблок, то\nэто следует делать одновременно с приготовлением коктейля, иначе яблочные фигурки просто\nпочернеют.\n\nОливки и вишенки\nОливки и мелкие маринованные луковицы следует доставать и помещать их в коктейль с помощью пики.\nКоктейльные вишни обычно не накалывают на\nпику, а просто кладут ложкой на дно бокала с\nкоктейлем. При этом коктейль должен быть достаточно прозрачным, чтобы вишня была видна.\n\nОбожженная апельсиновая корка\nНекоторые коктейли ароматизируют и украшают\nобожженной апельсиновой цедрой. Для этого отрежьте небольшой кусочек корки и нагрейте его\nнад огнем зажигалки. Выжмите корку между пальцами. Из-за брызг эфирных масел корка воспламенится на несколько мгновений. Затем опустите\nее в коктейль.\n\nРазделка лайма (или лимона )\n1. Тщательно вымойте лайм и отрежьте оба его кончика.\n2. Разрежьте лайм вдоль на две\nполовины.\n3. Нарежьте части лайма полукружками. Украшения для коктейлей\nготовы.", "К рас та\nДля некоторых коктейлей требуется создание\nсоленой или сладкой красты (кромки) по краю\nбокала.\nКраста – это не только украшение, она выступает в роли дополнительного ингредиента, который должен влиться в общий вкусовой баланс\nкоктейля.\nСоль (разных видов), сахар, мед, молотые пряности, специи, сушеные плоды и кожура цитрусовых... – все годится для красты. Строгих правил\nне существует, важно чтобы получилось вкусно.\nНекоторые сегодняшние бартендеры готовят\nкрасты из нескольких ингредиентов. В этом слу-\n\n1. Насыпьте в блюдце соль или сахарный\nпесок. Протрите край бокала ломтиком\nлайма или лимона.\n\nчае они заранее их перемалывают и смешивают\nмежду собой.\nЕсли вы сделает красту только на половине\nокаемки бокала, то гость сможет прочувствовать,\nкак ее наличие или отсутствие меняет восприятие коктейля.\nДля того чтобы сделать красту, протрите край\nбокала ломтиком лимона или апельсина и поставьте этот бокал «вниз головой» в соль или в\nсахар. Получить разноцветную кромку можно погружая край бокала в блюдце с ликером, а затем\nв соль или сахар. Голубой Curaçao дает голубую\nкромку, мятный ликер – зеленую и т.д.\n\n2. Погрузите край бокала в соль или сахар.\nСделайте им вращательное движение по кругу. Приподнимите бокал и слегка покачайте\nего в руке, чтобы стряхнуть с него излишки\nсоли или сахара.\n\nЧ ипсы из цитрусовых ,\nдегидрация\nКогда речь заходит об украшении коктейлей, сухие чипсы из апельсинов,\nлимонов и лаймов представляют собой альтернативу слайсам из свежих\nцитрусовых.\nЧипсы изготавливают в специальном\nсушильном аппарате – дегидраторе.\nПринцип его работы, как правило,\nследующий. Нарезанные кружками\nцитрусовые укладывают на лотки. Нагретый воздух циркулирует внутри,\nобдувая фрукты и удаляя из них влагу.\nТакие чипсы можно приготовить\nзаранее в большом количестве, что\nпозволит потом долгое время больше\nне думать о нарезке цитрусовых для\nукрашений.\nДегидратор используется и для\nмногих других фруктов, овощей, трав.\nВысушивание ингредиентов является\nпредварительным этапом для приготовления многих домашних заготовок, например, некоторых настоек и\nбиттеров.\nКроме того, из высушенных и перемолотых растительных ингредиентов\nнекоторые бармены готовят смеси,\nкоторые потом используются для\nкраст на бокалах.\n\nТвис т (спира ль из цитрусовых )\n\n1. Отрежьте от лимона или\nапельсина полоску цедры.\nСледует срезать лишь самую\nверхнюю часть кожуры, чтобы\nне прихватить белую прослойку.\n\n2. Накрутите полоску цедры\nвокруг палочки для перемешивания, чтобы придать\nей форму спирали.\n\n3. Расположите полученный\nтвист на краю бокала. Иногда\nего частично или полностью\nопускают в коктейль, которому он сообщает дополнительные ароматы.\n\nИск усс тво кок тей ля 223", "П ро лёд\nП оявление льда явилось д ля кок тейлей почти с толь же опре де ляющим со бытием , что и изобре тение а лкоголя . Д о создания льдогенератора применялс я\nле д из ле дников , который перевозили в те ле жк а х , завернув его в одеяла и со лому д ля теплоизоляции . Э то был природный прозрачный ле д , который к а ж дый бармен хранил , к ак зеницу ок а .\nВ да льнейшем появились фабрики по производс тву льда , который е же дневно\nпос тавлялс я в бары . И лишь относите льно не давно у к а ж дого бара появи лась возможнос ть обеспечивать себя всем необходимым льдом .\n\nВ прошлом лед расходовали очень экономно.\nБартендеры пытались создать не охлажденные\nнапитки, а всего лишь освежающие. В исторических документах можно прочесть: «слишком\nхолодный коктейль теряет свой вкус, но если он\nнедостаточно охлажден, то спирт сохраняет\n\n224 Иск усс тв о кок тей ля\n\nобжигающий вкус и напиток утрачивает аромат».\nПо традиции нашего времени лед должен быть\nсухим, то есть максимально холодным, почти\nпримерзающим к пальцам.\nОн не должен слишком долго оставаться на воз-\n\nСегодня лед не только охлаждает\nкоктейль, но и служит важнейшим\nэлементом его оформления. Лед\nпомечают печатью бара при помощи\nметаллического штампа. Его подают в\nвиде шаров или подвергают огранке\nнаподобие бриллианта.\nСлева. Виталий Горгуль, Berlin Bar,\nМосква.", "духе, где он впитывает все запахи.\nНе экономьте лед. Используя больше льда в шейкере или стакане для смешивания, вы быстрее\nохлаждаете напиток, лед меньше тает, и, в конечном счете, коктейль получится более концентрированным.\nТот же самый лед никогда не используется дважды!\n\nП ринципы\nиспользования льда\n• Ко льду предъявляются самые строгие требования гигиены. Никогда не кладите лед руками\nв шейкер, стакан для смешивания или в бокал.\n(Пользуйтесь для этой цели чистым совком или\nщипцами для льда).\n• Высеченный вручную кусок льда или айс-бол\nпромойте под холодной водой.\n• После дробления льда соберите его совком, но\nни в коем случае не пальцами.\n• Не оставляйте во льду совок.\n• Постоянно отслеживайте качество, внешний\nвид и запах льда.\nЕго цвет должен быть белым, а запах – нейтральным. Если лед становится прозрачным или появляется запах, это указывает на проблемы. Его\nнадо заменить.\n• Убедитесь, что лед сухой. На дне бака для льда\nникогда не должно быть воды.\n• Если вы разбили бокал поблизости от льда, немедленно, чем бы вы в этот момент ни занимались, замените весь лед. В противном случае вы\nподвергаете своих клиентов серьезной опасности.\n• По той же причине никогда не пользуйтесь стеклянными предметами для забора льда. Никогда\nне набирайте лед стаканом для смешивания. Такие действия несут в себе опасность для клиентов.\n• Постоянно следите за чистотой совка для льда.\nДержите его в специально отведенном чистом\nместе.\n• Никогда не кладите обратно в бак со льдом уже\nиспользованный лед, даже если вы просто им охладили бокал. Выбросите такой лед немедленно.\n• Никогда не используйте лед, предназначенный\nдля коктейлей, для охлаждения в нем бутылок и\nбокалов.\n• Не кашляйте, не говорите и не сморкайтесь над\nбаком со льдом.\n• Если требуется охладить бутылки, поместите их\nв специальную емкость (например, ведерко) и заполните ее льдом с помощью совка для льда.\n• Промывайте бак для льда в конце каждого рабочего дня. Иначе в емкости могут развиться\n\nразнообразные бактерии, появиться различные\nзапахи и привкусы, которые испортят качество и\nвкус напитков.\n•\tРегулярно заменяйте лед.\n\nЛ ьдогенераторы\nВы можете или приобрести лед у специализированных поставщиков, гарантирующих его чистоту, или изготовить свой лед прямо в баре с помощью льдогенератора.\nВ последнем случае предъявляйте к льдогенератору следующие требования.\n• Он должен быть способен произвести достаточное количество льда. Нехватка льда может оказаться фатальной для бара.\n• Он должен быть снабжен фильтрами, что позволяет очищать воду перед заморозкой.\n• Он должен быть оснащен индикатором, указывающим на необходимость чистки аппарата.\n\nД робленый ле д\nВ прежние времена при смешивании часто использовали дробленый лед, который клали в\nшейкер из расчета – ложка на порцию коктейля.\nИногда, как например в «Слоппи Джоз» на Кубе,\nкоктейль из шейкера переливали прямо в бокал\nбез процеживания.\n\nХранилище для льда (Ice House),\n19 век. В таких сооружениях на протяжении всего года хранились целые\nглыбы этого ценного природного\nресурса до того времени, пока не изобрели морозильник.\n\nИск усс тво кок тей ля 225", "Разделка блочного льда в лондонском\nбаре Purl.\n\nС ухой лед\nСухой лед используют для приготовления впечатляющих дымящихся коктейлей, где он играет полезную роль\n(охлаждая коктейль), но в первую\nочередь – декоративную.\nНа самом деле сухой лед представляет собой жидкий углекислый газ,\nохлажденный до –78°C. Дым, который\nон выделяет, – это водяные пары.\nНикогда не прикасайтесь к сухому\nльду пальцами. Пользуйтесь ложкой.\nЕсли вы кладете его в напиток,\nвыждите перед подачей, поскольку\nнапиток в самом деле становится\nочень холодным. Ни в коем случае\nне помещайте сухой лед в закрытую\nемкость, так как это может вызвать\nсильный взрыв.\n\n226 Иск усс тв о кок тей ля\n\nЭто показывает, что коктейли наших предшественников не были ни столь концентрированными, ни столь холодными, как сегодняшние. И если\nсовременная миксология проделала такой значительный шаг к прогрессу, она в немалой степени\nобязана этим генераторам льда.\nЧто до дробленого льда, его можно приготовить\nсамостоятельно, завернув кубики в чистое полотенце, и затем разбив с помощью большой толкушки. Такой метод позволяет получить грубые\nкуски различного размера, которые прекрасно\nсмотрятся в бокале.\n\nБ лочный ле д\nИстория циклична. И вот опять вернулись те\nвремена, когда бармены сами разделывают кристальные глыбы, как это было в 19 веке. Тогда\nблоки природного льда заворачивали в солому\n\nи развозили на лошадях по городским салунам.\nТолько сегодня – это осознанный выбор, который делают в лучших барах, где готовят крафтовые коктейли. Поставляют лед в наше время в\nспециальных термогрузовиках или изготавливают прямо в барах.\nЛед в блоках быстро охлажден при очень низкой температуре, он содержит мало взвешенных\nпузырьков воздуха. В конечном счете, он сильно\nнапоминает лед из ледников и обладает высокой\nпрозрачностью.\n\nПринципы разделки глыбы\nДля того чтобы превратить ледяной блок в кубики, бруски и сферы, вам потребуется сноровка, а\nтакже некоторые аксессуары.\nНа рынке представлен целый ассортимент различных пик, ножей, пил, щипцов и прочих инструментов, которые служат для разделки блочного\nльда.", "Существует несколько правил при работе с блоком. Вначале нужно выдержать его около получаса при комнатной температуре. Так будет легче\nего разделать на части. Если нет времени на ожидание, то можно слегка обработать блок газовой\nгорелкой.\nЛучше рассекать блоки и куски льда строго по\nцентру. Так лед будет меньше ломаться.\nИтак, при помощи пилы делаем насечку посередине блока. Затем вставляет в эту насечку ножскребок и, ударяя по нему молотком, раскалываем блок на две части.\nПовторяем эту операцию применительно к половинам, четвертинкам и т.д. до получения кубиков\nтребуемого размера.\nЗатем из кубика можно изготовить кусок льда\nболее сложной формы, например, многогранник\nнавроде драгоценного камня или шар (ice-ball),\nчто требует немалого мастерства и опыта.\nЭти индивидуальные куски льда высекают с по-\n\nмощью специального ножа или пики для колки\nльда.\nДанное действие представляет собой часть того\nмини-спектакля, которым сегодня является приготовление и подача крафтового коктейля. Готовый многогранник или сферу ополаскивают\nхолодной водой, чтобы сделать лед еще более\nблестящим.\nТакой кусок льда играет в коктейле ту же роль,\nчто и обычный лед, но тает он намного медленнее, что помогает коктейлю дольше держаться в\nтонусе. Кроме того, такой способ подачи повышает престиж напитка.\nВпрочем, лед окупается достаточно быстро, поскольку некоторые ловкие бармены обрезают кусок льда практически в точности по форме бокала. Таким образом, всего 20 мл коктейля наполнят\nваш стакан до края. С подобной практикой надо\nбороться. Лед играет в коктейле важную роль, но\nэто не повод подавать лед вместо коктейля!\n\nИск усс тво кок тей ля 227", "Н ас тойки\nCегодня без настоек невозможно представить\nсебе настоящий коктейльный бар. У настоек есть\nмного преимуществ. Они позволяют сохранить\nвкус сезонных плодов. Они придают коктейлю\nдополнительный ароматический профиль, не меняя его крепости и объема. Они служат простором для творчества и дают бармену возможность\nприготовить уникальные коктейли, которые не\nвстретишь в других барах.\nЛюбой спиртной напиток, в том числе вермуты,\nликеры и даже вкусовые варианты водок, могут\nлечь в основу будущей настойки. В качестве ароматизаторов могут быть использованы практически любые плоды, пряности, цветы, травы, чай,\nкофе и даже крупы и кондитерские изделия.\nВот некоторые советы относительно приготовления настоек.\nОтдавайте предпочтение сезонным фруктам, ягодам и овощам. Сезонные настойки будут вкуснее.\nТщательно мойте свежие плоды и пряные травы\nперед использованием.\nИз высушенных ингредиентов, как правило, получаются более концентрированные настойки с\nболее выраженным вкусом.\nИзмельченные, размятые плоды и специи придадут больше вкуса будущей настойке.\nДля употребления настойки в чистом виде, при\nжелании в нее можно добавить сахар.\nНекоторые отработавшие в настойке фрукты и\nпряности, можно использовать потом еще раз\nдля коктейлей и других целей. Из вымоченной\nкураги приготовить пюре, использовать цитрусовые для украшения, заспиртованную вишню добавить в мороженое...\nНастойки на крепких спиртных напитках, как правило, рекомендуется выпить в течение 6-12 месяцев. Хранить при комнатной температуре.\nЕсли не принимать во внимание достаточно редкие способы приготовления настоек, например, в\nкулинарных сифонах, микроволновке и посудомоечной машине, то можно сказать, что сегодня\nраспространены два метода вытягивания ароматов: традиционное настаивание и «су вид».\n\nИ нгре диенты\nЯгоды и фрукты. Ягоды просто созданы для настаивания: в свежем виде, в свежемороженном и\nв сушеном.\n\n228 Иск усс тв о кок тей ля\n\nСрок настаивания традиционным методом – от\nнедели и более. На литр спиртного требуется от\n600 г до 1 кг свежих ягод.\nТакие фрукты, как яблоки, груши, айва, персики,\nабрикосы, сливы и фиги часто дают лучший результат при использовании в сушеном или засахаренном, а не в свежем виде.\nСухие фрукты следует настаивать в течение 1015 дней. Свежие плоды настаиваем, как правило,\nоколо 3-5 дней. При настаивании свежих слив, их\nнадо проколоть перед использованием. Клубнику рекомендуется разрезать вдоль пополам.\nЭкзотика. Лакомые ананасовые ароматы лучше\nвсего проявятся в настойке, если в спиртном\nвымачивать цукаты ананаса, а не свежие плоды.\nБананы часто рекомендуют использовать в форме обезвоженных чипсов. Манго – в виде высушенных ломтиков. Сухая кокосовая стружка дает\nлучше результат, чем свежий кокос. С маракуйи\nснимаем кожуру и настаиваем полтора дня.\n«Запретные» плоды. Что касается плодов с нежной мякотью, таких как дыня, арбуз, киви, то лучше их использовать для коктейлей в свежем виде,\nразминая на дне шейкера. Дело в том, что эти\nфрукты вызывают сложности при настаивании,\nибо быстро портятся при контакте со спиртом.\nТак, настаивать их надо не более 2-3 суток.\nЦитрусовые. Лимоны, апельсины, грейпфруты,\nкумкваты, мандарины ... – все цитрусовые обладают великолепными ароматами и прекрасно\nподходят для настаивания. Надо уделить особое\nвнимание их чистке (вымыть со щеточкой и обтереть полотенцем). А лучше отдать предпочтение\nэкологически чистым плодам, которые выращивают без пестицидов.\nПоскольку самые выразительные ароматы содержатся в богатой эфирными маслами кожуре\nцитрусовых, рекомендуется использовать для настоек именно цедру. Снимать цедру следует без\nгорького белого нижнего слоя.\nЦедра передает свои ароматы спиртному за 7-14\nдней. На литр спиртного достаточно кожуры четырех лимонов или апельсинов.\nСок цитрусовых укорачивает срок хранения настойки, которая начинает быстро горчить. Поэтому целиком для настаивания лучше использовать\nцитрусовые в виде высушенных чипсов.\n\nО бмывание жиром\nДля приготовления fat-washed spirit,\nто есть инфуза на жире (бекон, панчетта, жир индейки...) надо вначале\nэтот жир растопить на огне.\nПотом охладить его и отфильтровать\nв чистую посуду. Добавить спиртное и\nперемешать.\nНастаивать при комнатной температуре 4-6 часов. Затем поставить в морозилку. Когда жир затвердеет, надо\nего удалить. А настойку процедить\nобратно в бутылку.", "Традиционный метод\nнастаивания\nТрадиционный метод – самый простой и доступный.\nИнгредиенты (в пропорциях и количестве, требуемом рецептом) просто\nпомещают в спиртное. Все перемешивают, закупоривают и оставляют так\nна некоторое время в темном месте.\nПотом процеживают.\nВажно не передержать ингредиенты в\nалкоголе, ибо из-за воды, которая составляет спиртной напиток более чем\nна половину, через какое-то время\nингредиенты начнут портиться, что\nсообщит настойке нежелательный\nпривкус.\nПоэтому время – один из важнейших факторов в деле приготовления\nнастоек. Однако очень трудно его\nточно предугадать заранее, ибо все\nзависит от конкретных ингредиентов\nи их ароматических качеств: спелости\nфруктов, свежести специй, степени\nизмельченности пряностей и т.д. Поэтому рекомендуется часто пробовать\nинфуз во время настаивания. Особенно, если вы готовите его впервые.\nРегулярно (ежедневно или чаще, в\nзависимости от рецепта) перемешивайте ваш инфуз и снимайте пробу.\nПри необходимости можно добавить\nфруктов, если прежние уже потеряли\nсвои вкусовые свойства и перестали\nнасыщать спиртное.\nСухие ингредиенты требуют более\nдолгого настаивания по сравнению со\nсвежими. Деликатные ингредиенты\nнадо держать дольше в спиртном,\nпо сравнению с ингредиентами с\nнасыщенными и ярко-выраженными\nароматами.\nСвежие травы (мята, базилик и др.)\nочень быстро отдают спиртному все\nсвои ароматические компоненты.\nПоэтому, когда вы используете их\nв купе с другими ингредиентами,\nдобавляйте травы в конце процесса,\nпримерно за два дня до процеживания настойки.\nСпеции «играют» в настойке гораздо\nдольше, чем фрукты, из которых\nспиртное вытягивает все ароматы за\nдве недели.\nКогда желаемый вкус достигнут,\nтщательно процедите настойку.\n\nТравы. Чем свежее ваши травы, тем лучший результат они дадут при вымачивании.\nТакие свежие травы, как мята, укроп, базилик,\nшалфей настаивают в течение 2-4 дней.\nСредиземноморские растения – розмарин и тимьян – подходят для настаивания только в свежем виде. Важно их не передержать в спиртном,\nчтобы не придать ему горечь.\nУ лимонника надо предварительно снять наружные листья, а потом его рассечь вдоль пополам.\nСвежие листья черной смородины или кафрского лайма (для писко) тоже пользуются любовью у\nмиксологов.\nПряности. Свежий имбирь подходит для настаивания лучше высушенного. Он проявит в настойке свои яркие пряные ароматы. Перед использованием корень лучше очистить от кожуры\nи нарезать либо ломтиками, либо брусочками.\nНастаивать от 7 до 10 дней. На 1 л спиртного потребуется около 200 г свежего имбиря.\nЗасахаренный имбирь тоже великолепен в инфузах, которые он наделяет более десертным, лакомым характером.\nЧто касается других пряностей, то лучше использовать их целиком (или только слегка раздавленными), но – не в молотом виде, чтобы сохранить\nпрозрачность настойки. Корицу используем –\nпалками, анис – звездами, можжевельник – ягодами, мускат – орехами, гвоздику – головками, тмин\nи фенхель – семенами, перец – горошинами, шафран – пестиками.\nЧем «моложе» пряности, тем ярче и выразительней получится настойка. И наоборот: чем ближе\nконец срока годности, тем меньше у пряностей\nароматических веществ.\nГоворя о перце, следует отметить, что для настоек подходят все его разновидности, в том числе и\nстручки чили, причем как в сушеном так и в свежем виде. С перцем, как и со всеми другими пряностями, важно не переборщить, а использовать\nв умеренном количестве и сразу отфильтровать\nпри достижении настойкой требуемого вкуса.\nЕще одна прекрасная пряность для настаивания\n– это ваниль. Ее стручки надо рассечь вдоль пополам, зернышки отскрести ножом и положить их\nв настойку вместе со створками стручка. Так настойка получится ароматнее. Ваниль настаивают,\nкак правило, около недели.\nКрупа. С некоторых пор крупа, а именно национальная гречка, принята на вооружение миксологами. Причем не только в России.\nРекомендуется предварительно прокалить крупу\nна сковороде.\nОрехи и шишки. Кедровые орехи и кедровые\n\nшишки – фавориты миксологов. На литр спиртного надо полкило орехов. Срок настаивания – от\nмесяца до полутора.\nОчищенные грецкие орехи и фундук следует прокалить на сковороде при постоянном перемешивании. Затем остудить и смешать со спиртным.\nНаставать около 2 суток.\nЦветы. Лаванда, роза, гибискус, ромашка и фиалка придадут вашим настойкам дополнительные\nэлегантные и изящные ароматы.\nЛучше использовать цветы в сушеном виде. Достаточно пары ложек на литр спиртного. Они требуют вымачивания от нескольких часов до суток.\nКондитерка. Жидкие конфеты для взрослых или\nнастойки для бывших детей – вот как можно охарактеризовать инфузы на леденцах и карамели.\nПриготовить их очень просто. Надо растворить\nконфеты, помешивая, в спиртном напитке. В случае необходимости, процедить. Главным образом, в качестве основы используется водка, ибо\nтолько она подчеркнет вкус любимых конфет, не\nисказив его.\nЧто касается шоколада (а также шоколадных\nконфет или батончиков), то вначале их надо растопить. Лучше делать это на водяной бане. Для\nэтого поставьте на огонь кастрюлю с водой. В кастрюлю поместите миску, чтобы ее дно немного\nпогрузилось в воду. В миску положите разломанный на кусочки шоколад. Помешивая, дождитесь,\nпока шоколад растопится. Добавьте этот шоколад\nв спиртное.\nСледует учитывать тот факт, что ваша шоколадная\nнастойка, скорее всего, расслоится и вам придется каждый раз перемешивать ее перед использованием. На литр спиртного достаточно около\n200-250 г шоколада. Срок настаивания – 5-7 дней.\nЧай (как впрочем и кофе) в коктейлях – это один\nиз отчетливых трендов современной миксологии. Джим Михан из нью-йоркского бара PDT\nрекомендует просто перемешать в пищевом контейнере бутылку спиртного с хорошим крепким\nчаем (несколько мл). Настоять от 10 до 20 минут.\nОтфильтровать и перелить обратно в бутылку.\nЕсли вы готовите подобную настойку на вермуте,\nто поместите 2-3 пакетика чая и пол-литра вермута в посуду. Плотно закройте и дайте настояться\nот одного до нескольких часов. Хранить такую настойку лучше в холодильнике.\nКофе дает прекрасный результат при настаивании в крепком спиртном: в одиночку или с добавлением пряностей, например, ванили. Кофейные зерна настаиваются от 2 до 10 дней. На литр\nспиртного требуется около 200 г кофейных зерен.\n\nИск усс тво кок тей ля 229", "Д омашние заготовки\nС иропы\nСиропы служат для приготовления множества\nкоктейлей. Сегодня на рынке представлены заслуженные бренды сиропов с широчайшей палитрой ароматов. Тем не менее, следуя общей моде\nна домашние ингредиенты, бармены готовят свои\nсобственные уникальные сиропы.\nНадо сказать, что сиропы были одними из первых объектов крафтового творчества после\nтого, как закончилась эпоха индустриальных\nпремиксов и началось движение в сторону авторских коктейлей.\nУ домашних сиропов есть много достоинств –\nнеповторимый характер, свежий натуральный\nвкус, отсутствие красителей и других пищевых\nдобавок.\nК недостаткам можно отнести их небольшой срок\nхранения. Готовый сироп в закупоренной бутылке следует хранить в холодильнике не более 3\nнедель. А открытую бутылку надо закончить в течение недели.\n\nно сахар вы используете в качестве основы.\nБелый, рафинированный сахар д сахара.\nДля сиропа из чая, трав или пряностей, достаточно заварить эти растительные компоненты кипятком и настоять несколько минут, а затем настой\nотфильтровать и смешать с сахаром.\n\nК ордиа лы\nСлово cordial восходит к латыни и значит «сердечный», свидетельствуя о том, что кордиалы\nимеют давние медицинские корни и использовались нашими предками в качестве стимулятора\nсердечной деятельности.\nВ наше время кордиалы широко используются в\nкоктейлях. Но несмотря на это, трудно дать точное определение «кордиалу». Они весьма близки\nк сиропам, но, как правило, менее сладкие и часто содержат больше ингредиентов, в том числе\nкислоту – лимонную, винную, яблочную. Кроме\nтого, иногда в состав кордиалов входит алкоголь,\nчто сближает их с ликерами.\nСамый известный кордиал – это Rose’s Lime Juice,\nкоторый используется в коктейле «Гимлет».\nСегодня, следуя крафтовой моде, бартендеры\nвсе чаще готовят домашние кордиалы, которые\nиграют важную роль во вкусе их авторских коктейлей, сообщая им уникальный характер.\nКроме того, в некоторых заведениях, особенно\nтам, где бывает много гостей, бармены готовят\nкордиалы, возлагая ни них функцию премиксов,\nускоряющих время приготовления коктейлей.\nК недостаткам использования кордиалов можно\nотнести их достаточно короткий срок годности.\nКордиалы следует хранить в холодильнике, где\nони продержатся 3-4 недели в закупоренной\nстеклянной бутылке. Но после того, как вы ее\nоткроете, надо использовать содержимое в течение недели.\n\nБ ит теры\nСегодня многие бартендеры готовят домашние\nгорькие настойки, которые придают уникальный\nхарактер их авторским коктейлям.\n\nКомпозиция биттера\nСпиртное. Чаще всего в качестве основы биттера\nвыступает спирт. Кроме того, это может быть виски (в частности, «рай» или бурбон) или ром. Как\nправило, используется основа c повышенным содержанием алкоголя: 50-75% vol.\nРастительные компоненты. В состав биттера входят горькие ингредиенты, обуславливающие его\n\nпринадлежность к биттерам, и ароматические ингредиенты, определяющие его вкусовой профиль.\nГоречь биттерам придают при помощи следующих ингредиентов: кассия, кора хинного дерева,\nгоречавка, полынь, корень дудника (или ангелики), корень аира, калган, корень ириса, корень\nлопуха, корень одуванчика и другие.\nСписок ароматических ингредиентов, используемых для биттеров, бесконечен. Пряности, травы,\nплоды, цветы, листья.... Все зависит от того, какой\nименно вкус вы хотите сообщить вашему биттеру.\nСахар. Довольно часто биттер подслащивают:\nлибо добавляя сироп прямо в биттер, либо добавляя сахар во вспомогательный отвар.\n\nЧто потребуется?\n• Микровесы. Они помогут вам точнее определить количество трав и специй.\n• Посуда для настаивания (банка с крышкой).\n• Фильтр (подойдет фильтр для кофе или марля).\n• Стерилизованные бутылочки из темного стекла\nдля готового биттера.\n\nПриготовление биттера\nКлассические правила по приготовлению биттеров следующие. Половина растительных компонентов должна носить горький вкус. Другую\nполовину вы можете, на ваше усмотрение, разделить между ингредиентами с пряным и фруктовым вкусом. На 200 грамм спиртовой основы вам\nпотребуется в общей сложности около 50 грамм\nингредиентов в высушенном виде.\nВысушенные коренья, травы и специи измельчают перед настаиванием.\nКак правило, все ингредиенты кладут в спиртное\nвместе, но иногда – постепенно: в зависимости от\nсроков их настаивания.\nСам процесс настаивания проходит в темном месте и длится 2-3 недели, иногда дольше.\nКаждый день или два настой надо перемешивать и\nпробовать. При необходимости – корректировать\nвкус, добавляя или удаляя ингредиенты.\nНекоторые рецептуры требуют дополнительного\nпроваривания ингредиентов в воде с добавлением этого отвара в настой.\nБиттер процеживают сквозь марлю или другой\nфильтр. Можно добавить в биттер немного сахарного сиропа (в том случае если вы не добавили\nсахар в отвар). Потом перелить биттер в небольшие бутылочки из темного стекла.\nЧтобы быть стабильным, биттер должен иметь\nкрепость 35-45% vol.\nОн хранится около года при комнатной температуре.\nВы можете готовить биттер не только путем настаивания, но и методом «су вид».\n\nН астаивание методом\n«С у вид »\n«Су вид» – от французского sous vide,\nто есть в пустоте, вакууме – это метод настаивания, позаимствованный\nиз молекулярной кухни.\nЕго суть заключается в том, что\nингредиенты вместе со спиртным напитком запечатываются в вакуумный\nпакет, из которого откачивается\nвоздух, а потом в этом пакете варятся\nна водяной бане при определенной\nпостоянной температуре, насыщая\nалкоголь ароматами.\nЭто более прогрессивный способ\nприготовления настоек по сравнению\nс традиционным настаиванием в\nбанках. Он требует дополнительного\nоборудования и несколько более\nсложен.\nСчитается, что «су вид» имеет ряд\nпреимуществ по сравнению с традиционным способом.\nВо-первых, он значительно ускоряет время приготовления настойки.\nАроматы из ингредиентов можно\nвытянуть за час, на что уходят дни\nили даже недели при традиционном\nнастаивании.\nВо-вторых, «су вид» дает возможность извлечь из фруктов, трав и\nдругих ингредиентов больше ароматов, которые, к тому же, оказываются\nболее изысканными, но одновременно концентрированными, свежими,\nсочными, без привкуса оксидации.\nНаконец, «су вид» позволяет воспроизводить настойки с постоянным\nвкусом, поскольку температуру и\nвремя нахождения в горячей воде\nможно строго контролировать.\nОбычно для приготовления настоя спиртного на цитрусовых надо\nдержать пакет в воде, разогретой\nдо 60°C, в течение 60 минут. Более\nделикатные ингредиенты, вроде\nсвежих ягод и трав, требуют сбавить\nтемпературу до 50–55°C.\n\nИск усс тво кок тей ля 231", "Коктейли в пузатых бутылках в\nмосковском баре Voda. Смешанные\nзаранее напитки гарантируют\nкачество и постоянство вкуса, а также\nскорость обслуживания.\n\nК ок тейли\n\nиз бутылок и из бочек\nБу тилированные\nкок тейли\nЕще в первом справочнике для бартендеров от\nДжерри Томаса, изданном в 1862 году, содержится\nрецепт Bottle Cocktail, состоящий из бренди, воды,\nбиттера, сиропа и ликера Кюрасао.\nА 21-й век стал свидетелем возрождения моды на\nбутилирование коктейлей. Причем, сегодня можно разделить эту практику на несколько направлений: обычное хранение коктейлей в бутылках,\nвыдержка коктейлей в стекле и получение ферментированных коктейлей.\n\nХранение\nХранение смешанных напитков в стекле имеет\nряд преимуществ. Во-первых, коктейли готовятся\nзаранее, что позволяет потом быстрее обслуживать гостей и оптимизировать работу бармена.\nВо-вторых, это оригинально, современно и помогает привлечь охотливых на нововведения посетителей.\n\n232 Иск усс тв о кок тей ля\n\nБудет достаточно налить через воронку ингредиенты согласно рецепту в индивидуальные,\nпорционные бутылки. Газированный напиток наливается в последнюю очередь. Затем бутылки\nзакупоривают. Не помешает наклеить этикетку с\nназванием коктейля и указать дату его изготовления.\nКоктейль, содержащий газированный напиток,\nследует выпить в течение двух недель. Другие\nкоктейли можно хранить дольше.\nСуществует табу: не использовать яйца.\n\nВыдержка\nВ данном случае коктейль заключают в бутылку\nдля того, чтобы он состарился и претерпел эволюцию, в ходе которой из-за оксидации напиток\nстановится полнее и богаче, а ароматы разных\nкомпонентов коктейля сливаются между собой.\nДля бутылочной выдержки лучше всего подходят\nклассические коктейли с мощными ароматами.\nИнгредиенты наливают в сухую стерилизованную бутылку, оставляя в горлышке зазор в 2-3 см\n\nК ислота вместо цитрусовых\nРаспространение моды на домашние\nкордиалы, бутилированные коктейли\nи прочие заготовки привело к тому,\nчто в барах используется все больше\nноваторских ингредиентов, в том\nчисле – кислоты. Главным образом,\nприменение находит лимонная кислота, а также яблочная.\nПо сравнению с классическим соком\nлимона или лайма, кислота не портится, что позволяет готовить более\nстабильные напитки, которые к тому\nже сохраняют свою прозрачность.\nТем не менее, кислота никогда не\nсможет конкурировать с роскошными\nцитрусовыми ароматами настоящего\nфрукта.", "между напитком и пробкой, чтобы сохранилось\nнемного воздуха. Закрыть бутылку следует герметичной пробкой.\nНекоторые бармены дополнительно обматывают\nгорлышко изолентой.\nХранят бутылки в темном прохладном месте от\nнескольких месяцев и даже до нескольких лет.\nКстати, старение в стекле – это один из этапов\nпроизводства некоторых напитков: например,\nдорогих разновидностей порто и ряда крепленых вин с юга Франции.\n\nФерментированные коктейли\nПриготовление ферментированных коктейлей\nстало одним из направлений миксологии. Брожение дает возможность получать шипучие коктейли, которые созревают и хранятся в бутылках\nнаподобие шампанского.\nОбычно используются винные или шампанские\nдрожжи, которые добавляют в основу, например,\nфруктовый сок (иногда настоянный на пряностях).\nСмесь бродит в бутылке, вырабатывая углекислый\nгаз. Затем содержимое бутылки крепят при помощи спиртного напитка, чтобы остановить брожение. Как известно, при крепости выше 16% vol.\nдрожжи погибают и ферментация прекращается.\nВместе с крепким спиртным может добавляться\nсахар и другие ингредиенты.\n\n«В оспитание» в дереве\nУ выдержки коктейлей в бочках есть горячие сторонники и яростные противники.\nПротивники настаивают на том, что выдержка\nискажает вкус алкоголя. Оксидация разрушает\nароматы, над которыми без устали трудятся производители спиртных напитков: ведущие мастера\nпогребов, опытные дистилляторы и талантливые\nботанисты.\nСторонники, в свою очередь, считают, что миксология не может останавливаться на достигнутом.\nОни говорят, что правильно проведенная выдержка вызывает метаморфоз коктейля, настоящее преобразование на химическо-молекулярном уровне, которое переносит напиток в новое\nароматическое измерение.\nТе несколько недель или месяцев, которые коктейль проводит в бочке, позволяют «поженить»\nмежду собой его ингредиенты и добиться их полной гармонии.\n\nдревесный привкус, старая, использованная бочка – ароматы того напитка, который в ней хранился прежде, а обугленная – горелые ноты дыма и\nподжарки.\n\nПодготовка бочки\nСначала надо выдержать в бочке чистую воду (от\nсуток до недели). Это минимизирует протекание\nбочки, ибо древесина от влажности разбухает\nи щели закрываются. Если бочка все-равно подтекает и на ее поверхности проступают мокрые\nпятна, вы можете ее обработать воском. Для этого надо расплавить пчелиный воск, покрыть толстым слоем те места, где образуются подтеки и\nпрогреть размазанный воск при помощи газовой\nгорелки. Вощение бочки должно устранить последние щели. Если бочка все равно продолжает\nподтекать, придется отказаться от ее использования.\n\nЗаливка коктейля\nПосле слива воды из бочки можно заливать в нее\nкоктейль. Вначале его смешивают согласно рецепту в отдельной посуде. А затем переливают\nсмесь в бочку, заполняя ее доверху.\nЧто касается ингредиентов коктейля, то, во первых, их не должно быть много.\nРекомендуется использовать не менее трети\nспиртного повышенной крепости (50% vol и более) в общем объеме коктейля, чтобы последний\nполучился менее приторным.\nЧто касается коктейльных биттеров, то их лучше\nдобавить в коктейль потом, перед подачей, ибо в\nходе выдержки они способны перебить вкус всех\nостальных ингредиентов.\nКроме того, не рекомендуется использовать ни\nсвежие ингредиенты, ни мед.\n\nГде держать\n\nбочки с коктейлями?\nНекоторые перфекционисты рекомендуют при выдержке коктейлей брать\nпример с производителей виски и\nдругих спиртных напитков, то есть\nхранить бочки в отдельном помещении, без света и вдали от источников\nтепла.\nНо с другой стороны, в мире спиртного есть немало примеров достойных\nнапитков, которые выдерживаются\nв нестандартных условиях, чтобы\nдостичь своего уникального вкуса.\nТа же самая мадера, которая стареет\nв жарком погребе с подогревом.\nИли некоторые вермуты, которые,\nвообще, хранятся в бочках под открытым небом, как бы повторяя на\nместе то плавание на палубе корабля,\nкогда в прошлых веках их возили\nмесяцами из одного место в другое\nпод солнцем, дождем и ветром.\nПоэтому, если у вас нет специального\nпогреба для выдержки, не стоит отчаиваться. Бочки в помещении бара\nпривлекают внимание гостей и дают\nжеланию попробовать выдержанные\nв них коктейли. В конце концов,\nважно, чтобы на выходе из бочки\nполучился интересный результат,\nкоторый служит удачной эволюцией\nсвежесмешанного коктейля.\n\nВыдержка\nВыдерживать коктейль следует в зависимости от\nразмера и новизны бочки: от недели (совсем новая\n5-литровая бочка) до года (старая 20-литровая\nбочка). Необходимо регулярно снимать пробу,\nчтобы следить за эволюцией напитка.\nПосле окончания выдержки надо перелить коктейль в герметичный контейнер или в бутылки и\nзакупорить их при помощи вакуумного упаковщика. А что касается использованной бочки, то\nпридется либо сразу заполнить ее новой партией\nкоктейля, либо залить водой, чтобы не образовались щели. Воду надо менять каждые 2-3 недели.\n\nВлияние бочки\n\nПодача выдержанного коктейля\n\nКаждая бочка по-своему индивидуальна, ее бэкграунд определяет ее характеристики и то, как\nвыдержка в ней повлияет на вкус коктейля.\nНовая бочка сообщит напитку более выраженный\n\nПеред подачей коктейль охлаждают, перемешивая в смесительном стакане со льдом и добавляя\nбиттер и другие ингредиенты, если это требуется\nпо рецепту.\n\nИск усс тво кок тей ля 233", "К лассификация\nкок тейлей\n\nзадача, поскольку коктейль представляет собой\nобъект творчества, и он уникален по определению. В результате быстро выясняется, что категорий образуется почти столько же, сколько и\nсамих коктейлей. Некоторые категории, которые\nотличались от других лишь типом украшения (например, из лайма вместо лимона), в конечном\nсчете, просто исчезли. Тем не менее классификация все-таки полезна. Когда тип коктейля входит\nв его название, он дает клиенту информацию о\nспособе его приготовления. Например, «Джин\nФизз» и «Джин Сауэр» – это два различных метода\nприготовления коктейля на основе джина.\nНекоторые исторические семейства коктейлей\nпережили века и дошли до наших дней, например\nсауэры (появившиеся около 1700 года), джулепы\n(1800-е годы), физзы, коллинзы.\nДругие семейства, такие, как крусты, скаффы, флипы, паффы и шрабы, одно время практически исчезли. Но сейчас они вновь входят в моду, сопровождая тенденцию возрождения исторических\nкоктейлей.\nМир смешанных напитков не застыл на месте. Постоянно возникают новые семейства коктейлей.\nНекоторые группы сейчас находятся в стадии\nформирования и потребуется придать им официальный статус, как это уже произошло с тысячами\nвариантов «Мартини», появившимися на свет под\nвдохновением от «Драй Мартини».\n\nКоллинз\n\nТики\n\nКогда появились первые смешанные напитки, рецепты их в большинстве случаев носили отпечаток семейных традиций. Пунши, которые начали\nготовить в районе Карибского моря в 17 веке,\nобъединяло лишь то, что они включали пять компонентов, одним из которых был ром. В остальном каждая семья создавала свой собственный\nрецепт. В американских семьях кобблеры соседствовали с джулепами, слингами и эгг-ногами.\nКогда из-за разнообразия ингредиентов число\nсмешанных напитков стало быстро возрастать,\nтогдашние специалисты попытались отнести\nкаждый напиток к определенной группе, чтобы\nпотребителю было понятнее, что он пьет.\nСлово «коктейль», в наши дни означающее практически любой смешанный напиток, первоначально\nотносилось лишь к одной группе из многих, которая, делаясь все более значительной, поглотила, в\nконце концов, все смешанные напитки.\nОсновную работу по классификации коктейлей\nпроделал американец Дэвид Эмбери. Он начал\nтрудиться над ней в 1948 году, и его классификацией до сих пор руководствуются страстные любители коктейлей и их истории.\nКлассификация смешанных напитков – трудная\n\nКруста", "Эгг-Ноги (Egg-Nogs)\n\nСэнгери (Sangarees)\n\nЭти лонг дринки старинного американского происхождения возникли в 18 столетии. Их готовят\nв шейкере, чтобы получить однородную смесь\nиз яичного желтка, сахара, сливок или молока и\nкрепкого спиртного напитка. Для ароматизации\nдобавляют молотый мускатный орех. Традиционно эгг-ноги подают во время рождественско-новогодних праздников.\n\nКоктейли сэнгери можно готовить на основе\nджина, бренди, виски и прочих напитков. Важно\nразбавить спиртное содовой водой, добавить\nпорто Tawny и посыпать сверху коктейль мускатным орехом.\n\nФлипы (Flips)\n\nГруппы коктейлей согласно\nразмеру и крепости\n\nL ong D rinks (Л онг дринки)\n\nДлинные напитки, они содержат (не\nсчитая лед!) от 120 до 220 миллилитров. Их крепость – 7-18% vol.\n\nS hort D rinks (Ш орт дринки)\n\nКороткие напитки, они содержат от\n60 до 120 миллилитров. Их крепость\n17-45% vol.\n\nS hooters (Ш у теры)\n\nСтреляющие напитки, или напитки«глотки». Они содержат от 40 до 60\nмиллилитров (их крепость может\nбыть разной). Шутеры пьются залпом.\n\nЭто эгг-ноги, которые подаются в виде шорт\nдринков, без молока или сливок. Соответственно,\nони содержат в качестве основы спиртной напиток (или крепленое вино), а также сахар и яичный\nжелток. Разумеется, их готовят в шейкере и подают в бокалах для мартини или рокс.\n\nСауэры (Sours)\nСауэры, название которых означает «кислые»,\nготовятся из сока лимона или лайма, сахара и\nкрепкого спиртного. Под их кажущейся простотой прячется выраженный характер, и, зачастую,\nименно приготовление обычного сауэра – соблюдение равновесия между сладостью, крепостью\nи кислотностью – позволяет бармену продемонстрировать весь масштаб своего таланта. К сожалению, сауэры редко бывают такими крепкими\nи несладкими, какими они должны быть, и часто\nнапоминают welcome drinks, которые предлагают\nдетям в Диснейленде. Говоря о конкретных примерах, следует отметить, что «Дайкири» является\nсауэром, а «Сайд кар» – продвинутым вариантом\nсауэра, в котором в качестве подсластителя используется ликер Cointreau.\n\nСкаффы (Scaffas)\nПопулярные в прошлом скаффы представляли\nсобой шорт дринки, в состав которых обязательно входил ликер Мараскино и дэш биттера Ангостура. Их подавали при комнатной температуре.\nС некоторых пор скаффы опять вызывают интерес\nсреди барменов.\n\nШрабы (Shrubs)\nПрактически исчезнувшие шрабы, подобно скаффам, опять обретают симпатии публики. Поэтому\nполезно дать описание шрабов, приведенное\nФранком Мейером в его книге «Искусство смешанных напитков», изданной в 1936 году: «Шрабы\nготовят из бренди, рома или хереса, в которых\nвымачивают ломтики лимонов и апельсинов.\nКроме того, в их состав входят компотные ягоды\n– черная смородина, вишня, малина. Подаваться\nони должны горячими, как грог. Их можно также\nподавать и охлажденными, в этом случае они делаются превосходными летними напитками».\n\nФиззы (Fizzes)\nВ конечном счете физз представляет собой разбавленный газированной водой сауэр, и потому\nтребует большого умения дозировать компоненты. В его состав входят лимонный сок, сахарный\nпесок, крепкий спиртной напиток, иногда – немного яичного белка. Он относится к той малой\nчасти лонг дринков, которые готовят в шейкере.\nЗатем прямо в бокале в него добавляют газированную воду. Некоторые бармены рекомендуют\nдля получения особо шипучего физза встряхнуть\nбутылку с газированной водой, заткнув ее пальцем, прежде чем наливать ее в коктейль. Так лучше подчеркиваются освежающие свойства физза.\nНаиболее известные представители этой группы\n– «Джин Физз» и «Водка Физз».\nВ начале прошлого века физзы сильно отличались от тех, которые мы знаем сегодня. По словам\nпервого в истории миксолога Билла Бутби, в их\nсостав могли входить, кроме яичного белка, сливки. Физзы считали «Eye opener» (продирающими\nглаза), то есть коктейлями, потребляемыми «наутро после бурной вечеринки».\n\nКоллинзы (Collins)\nИмеют примерно тот же состав, что и физзы (за\nисключением яичного белка), но готовятся непосредственно в бокале. Главный представитель –\n«Том Коллинз».\n\nКобблеры (Cobblers)\nКобблеры встречаются в самых старинных руководствах по приготовлению коктейлей. Они восходят, по-видимому, к началу 19 столетия. Чаще\nвсего они состоят из вина, сухого или крепленого, а также включают кусочки фруктов, сахар и ликер Кюрасао. Иногда в них добавляют лимонный\nсок. Их подают в бокалах рокс с колотым льдом.\nВ давние времена кобблеры часто ароматизировали мятой, что сближало их с джулепами. При\nвстрече с качественным кобблером пожаловаться не на что, в то время как никудышный можно\nузнать по острому чувству разочарования в момент оплаты по счету.\n\nФиксы (Fixes)\nФиксы подают в бокалах рокс. Они занимают\nпромежуточное положение между сауэрами и\nколлинзами. К лимонному соку, который иногда\nзаменяют ягодами, добавляется сахарный песок,\n\nИск усс тво кок тей ля 235", "а основу составляют бренди, виски или джин. В\nприготовлении данных коктейлей большую роль\nиграют навыки бармена, так как для успеха необходимо полное равновесие компонентов.\n\nДжулепы (Juleps)\nЭто напитки со свежей мятой, содержащие крепкий напиток и дробленый лед. Происхождение\nих очень давнее, по-видимому, оно восходит к 18\nвеку. Вполне возможно, что благодаря джулепам\nна свет появился «Мохито».\n\nСлоистые коктейли (Rainbows, Радуга)\nВ таких коктейлях спиртные напитки не перемешиваются, а наливаются друг на друга отдельными слоями. Чтобы коктейль получил надлежащий\nвид, его приготовление требует навыка, а также\nучета плотности его компонентов.\n\nПусс Кафе (Pousse Café)\nPousse Cafe, или «проталкиватель кофе» – это слоистый коктейль, предположительно, французского происхождения. По традиции их подавали сразу после кофе. Они были чрезвычайно популярны\nво второй половине 19 и в первой половине 20\nстолетия.\n\nХайболы (Highballs)\nИзготовляемые из алкогольного напитка и содовой воды и подаваемые в высоких бокалах, хайболы имеют старинное происхождение.\nВ 1900 году Билл Бутби утверждал, что из всех\nсмешанных напитков хайболы имели наибольшее\nзначение после коктейлей. Хайболы и в наши дни\nостаются популярными благодаря их освежающему воздействию.\n\nДейзи (Daisies)\nДейзи познали момент славы в золотой век коктейлей. Они являются близкими родственниками коллинзов, а, следовательно, и сауэров, от\nкоторых они позаимствовали основной состав:\nкрепкий напиток, лимонный сок и сахар. Их ароматизируют ликером (Кюрасао, Шартрезом или\nанисовым) и, как хайболы, разбавляют газированной водой.\n\nРики (Rickeys)\nРики пользовались большим успехом в 1930-е годы.\nОни были похожи на коллинзы и физзы, но оставались более сухими, поскольку содержали больше\nлимонного сока и меньше сахара. Кроме того, их\nразбавляли только небольшим количеством содовой. Скорее всего, такая близость рики с другими\nсемействами напитков способствовала практически полному их исчезновению, хотя иногда они еще\nвстречаются в барах для любителей коктейлей, в\n\n236 Иск усс тв о кок тей ля\n\nособенности в Англии и Соединенных Штатах.\n\nКрусты (Crustas)\nВремя от времени в картах баров попадаются\nкрусты, бывшие в моде в период с конца 19 до\nсередины 20 века. Они представляют собой вариант сауэра, дополненного биттером, например,\nАнгостурой, и часто содержат в придачу немного\nликера Мараскино. Бокал украшается кромкой из\nцитрусовой цедры, покрытой сахаром.\n\nПунши (Punches)\nЗародившиеся на Антильских островах пунши\nберут свое название от слова «пандж» (pandj),\nто есть «пять». Ибо таково было число ингредиентов, входивших в состав напитка. Что касается\nдревности, то пунш можно считать отцом всех\nсмешанных напитков. Алкогольная основа (чаще\nвсего ром) дополняется водой, фруктовым соком\nили чаем, соком лайма, сахарным сиропом или\nсахаром, и, наконец, приправляется пряностями,\nнапример, корицей. Пунш может подаваться горячим. Из всех пуншей наиболее известен «Пунш\nПлантатора».\n\nШампань-коктейли\nСамым прославленным и историческим в этой\nгруппе является «Шампань коктейль».\nЕще один известный коктейль – «Беллини» – сегодня готовится на основе просекко, что, в принципе, является общим трендом роста спроса на\nитальянское игристое вино.\n\nГруппы коктейлей\nсогласно моменту подачи\n\nА перитивы\n\nРоль аперитива состоит в том, чтобы\nвозбудить аппетит в ожидании обеда\nили ужина, но ни в коем случае не\nпритупить чувство голода.\nИз-за отличий в культуре питания в\nразных странах аперитивы существуют в различных формах.\nКлассические англо-саксонские\nаперитивы – это «Драй Мартини» и\n«Манхэттен».\nК аперитивам средиземноморской\nЕвропы относятся коктейли на основе\nвермутов и биттеров. Среди них:\n«Американо», «Негрони» и другие.\n\nД ижестивы\n\nГруппу дижестивов называют «After\nDinner Cocktails» – коктейли после\nужина. Это достаточно крепкие коктейли, часто содержащие коньяк или\nкофейный ликер. Среди них – «Белый\nРусский» и «Кузнечик».\n\nA ny Time D rinks\n\nЭту группу составляют коктейли,\nподходящие для любого момента.\nСреди них можно встретить такие\nшорт дринки, как «Маргарита» или\n«Гимлет», и такие лонг дринки, как\n«Джин Физз» и «Том Коллинз».\n\n«Возвращающие к жизни мертвеца»\n(Corpse Revivers)\nЭти тонизирующие коктейли не классифицируются по компонентам, входящим в их состав. Они\nлибо очень крепкие (30-35% vol.), либо содержат\nмного сока, калорийных фруктов или бульона. К\nэтой группе относится «Кровавая Мэри».\n\nТики (Tiki)\nTики – это особые коктейли, стоящие отдельно от\nклассических смешанных напитков. Некоторые\nисторики, злоупотреблявшие тики-коктейлями в\nходе своих исследований, считают, что они достались нам от исчезнувшей цивилизации или\nже готовятся на основе рецептов, найденных на\nкорабле инопланетян, потерпевшем крушение\nна Земле. Действительность одновременно и\nпроще, и красивее: тики-коктейли изобрел Дон\nБичкомбер, за которым последовал Трейдер Вик.\nДва титана мира баров, две незабвенные легенды\nЗападного побережья Америки. Единственные и\nуникальные в своем роде, они всецело способствовали всемирному успеху экзотических коктейлей.\n\nГорячие напитки (H ot D rinks)\nГорячие напитки подают в термостойких бокалах. Спиртной напиток\nни в коем случае нельзя доводить до\nкипения. К данной категории относят\nгроги (лимонный сок, сахар, крепкий\nнапиток, вода или чай, пряности) и их\nбританский аналог тодди (Toddies),\nвключающий крепкий напиток, сахар\nили мед, воду или фруктовый сок.", "С емейс тво\n\nО писание\n\nБ ок а л\n\nУ крашение\n\nК ок тейли\n\nBucks\nбакс\n\nЛонг дринк из спиртного напитка, лимонного сока и имбирного эля.\n\nхайбол\n\nДолька лимона, выжатая и\nопущенная в бокал\n\nGin Buck, Brandy\nBuck и т.д.\n\nCobbler\nкобблер\n\nЛонг дринк с дробленым льдом, содержащий спиртной напиток\n(или вино), сахар и кусочки фруктов.\n\nрокс или хайбол\n\nКусочки фруктов или мята\nплюс трубочка\n\nBrandy Cobbler,\nWhisky Cobbler\n\nCollins\nколлинз\n\nЛонг дринк из спиртного напитка, лимонного сока, сахара и газированной воды\n\nколлинз (хайбол)\n\nЛомтик цитруса и вишня\n\nTom Collins\n\nColada\nколада\n\nЛонг дринк, включающий спиртной напиток, фруктовый сок и\nкокосовое молоко.\n\nслинг\n\nЛомтик фрукта\n\nPiña Colada\n\nCooler\nкулер\n\nЛонг дринк из спиртного напитка и газированного напитка.\n\nхайбол\n\nСпираль из лимонной\nцедры\n\nHorse's Neck\n\nCrusta\nкруста\n\nШорт дринк из спиртного напитка, лимонного сока, сахара и\nбиттера.\n\nвинный бокал\n\nКромка из апельсиновой\nили лимонной цедры,\nпокрытая сахаром.\n\nBrandy Crusta\n\nDaisy\nдэйзи\n\nЛонг дринк из спиртного напитка, лимонного сока и ликера,\nподаваемый на дробленом льду.\n\nкоктейльный или\nвинный бокал\n\nЛомтик любого фрукта\n\nGin Daisy\n\nEgg-Nog\nэгг-ног\n\nЛонг дринк из спиртного напитка, яичного желтка, сахара и сливок\n(или молока)\n\nхайбол\n\nМолотый мускатный орех\n\nBrandy Egg-Nog,\nTom and Jerry\n\nFix\nфикс\n\nЛонг дринк из спиртного напитка, ананасового сиропа и лимонного\nсока на дробленом льду.\n\nхайбол\n\nЛомтик любого фрукта\n\nGin Fix\n\nFizz\nфизз\n\nЛонг дринк из спиртного напитка, яичного белка, лимонного сока,\nсахара и содовой воды.\n\nхайбол\n\nКоктейльная вишня\n\nGin Fizz\n\nFlip\nфлип\n\nШорт дринк, включающий спиртной напиток или крепленое вино,\nяйцо и сахар.\n\nвинный бокал\n\nМолотый мускатный орех\n\nPorto Flip\n\nFrozen\nфрозен\n\nЛонг дринк на основе спиртного напитка и фруктов, взбитый в\nблендере со льдом.\n\nв зависимости\nот коктейля\n\nЛомтик фрукта\nи краста\n\nFrozen Margarita,\nFrozen Daiquiri\n\nGrog и Toddy\nгрог и тодди\n\nГорячий напиток из спиртного напитка, сахара, лимонного сока и\nкипятка.\n\nтермостойкий\nбокал тодди\n\nHighball\nхайбол\n\nНесмешанный лонг дринк из спиртного напитка и фруктового сока\nили газированного напитка. Получается, что его компоненты можно\nпить по отдельности через трубочку.\n\nхайбол\n\nДолька лайма или лимона\n\nWhisky Cola\n\nШорт дринк из спиртного, мяты, сахара и дробленого льда.\n\nрокс или металлический стакан\n\nЛистья мяты\n\nMint Julep\n\nКрепкий шорт дринк на основе водки или джина, подаваемый в\nбокале для мартини.\n\nбокал для мартини\n\nВ зависимости от каждого\nконкретного коктейля\n\nDry Martini,\nEspresso Martini\n\nJulep / джулеп\nMartini\nмартини\n\nHot Buttered Rum,\nHot Toddy\n\nPuff\nпаф\n\nЛонг дринк из равных частей спиртного напитка и молока с добавлением сахара и содовой воды. По традиции подается во второй\nполовине дня.\n\nхайбол\n\nPunch\nпунш\n\nЛонг дринк из пяти ингредиентов: спиртного напитка, лимонного\nсока, сахара, воды, а также специй или биттера, подаваемый на\nдробленом льду. Некоторые пунши подаются в горячем виде.\n\nрокс или хайбол\n\nДолька лимона\n\nPlanter's Punch\n\nRickey\nрики\n\nСхожий с коллинзом лонг дринк, включающий сок лайма вместо\nлимонного сока.\n\nхайбол\n\nЛомтик лайма\n\nGin Rickey\n\nSangaree\nсэнгери\n\nЛонг дринк из крепленого вина или спиртного напитка с сахаром и\nводой. Может подаваться в теплом виде.\n\nхайбол\n\nМолотый мускатный орех\n\nPorto Sangaree,\nRum Sangaree\n\nScaffa\nскаффа\n\nШорт дринк на основе равных частей спиртного напитка и ликера\nMaraschino, с добавлением биттера Angostura.\n\nбокал для хереса\n\nКоктейльная вишня\n\nBrandy Scaffa\n\nSmash\nсмэш\n\n«Укороченный» джулеп\n\nрокс\n\nМята\n\nBourbon Smash,\nVodka Smash и т.д.\n\nSour\nсауэр\n\nШорт дринк из спиртного напитка, лимонного сока и сахара.\n\nрокс или\nбокал для мартини\n\nВ зависимости от\nкоктейля\n\nWhisky Sour,\nDaiquiri\n\nSwizzle\nсуизл\n\nЛонг дринк из спиртного напитка, лимонного сока, сахара, иногда\nбиттера, с дробленым льдом, приготовленный методом swizzle.\n\nрокс\n\nКоктейльная палочка\n\nRum Swizzle,\nGin Swizzle\n\nVirgin / вирджин\n\nBrandy Puff,\nWhisky Puff и т.д.\n\nВсе безалкогольные смешанные напитки. Их также называют Mocktails.\n\nИск усс тво кок тей ля 237", "Ч асть вторая . Г лава 14\n\nA merican Bar\nОт джулепов до черно-белых русских", "Старый - добрый олд ск ул , стр. 240\nКлассика: Минт Джулеп, Виски Сауэр, Шампань-коктейль\n\nG olden age (конец 1860- х – 1919), стр. 245\nКлассика: Олд Фешенд, Манхэттен, Драй Мартини, Авиация,\nКлавер клаб, Роб Рой, Джин Физз\n\nН овый О рлеан – микс американского с французским , стр. 261\nКлассика: Сазерак, Рамос Джин Физз, Вьё Каре\n\nС ухой закон , стр. 266\nХ олодная война (1946 – 1991), стр. 268\nКлассика: Московский Мул, Водка Мартини, Черный Русский,\nБелый Русский, Лонг Айленд Айсед Ти, Космополитен", "С та р ы й - д о б р ы й о л д с к у л\n\nК\n\nок тейли старой школы – это первые шаги миксологии . В те дав ние времена , заходя в са лун , вы могли либо заказать коктейль ,\nлибо нарваться на пулю . Ч асто получалось и то, и другое !\n\nМ ногие смешанные напитки той эпохи дос таточно с ложные в при готовлении , ве дь тогда кок тейль был тек учим продолжением до машних к улинарных тра диций .\nС егодня эти ис торические кок тейли ос таютс я образцом вк уса . Д ля\nбармена они с та ли своего рода ориентирами , ма як ами в полумраке\nбара . К а ж дый профессиона л должен вла де ть с таринными кок тей лями , так к ак именно по ним буду т с удить о его ква лифик ации .\nХороший «Ш ерри К обблер » или «М инт Д ж улеп » пок а ж у т, что бар мен много знае т и увлечен своей работой . А тот к то , разбирае тс я в\nпрошлом своей профессии , имее т будущее .\n\nД жерри Т омас\n\nП радедушка барменов\nВ наше время Джерри Томас, прозванный «Профессором», считается родоначальником всех\nбарменов. Он ввел коктейли в современную эпоху.\nДжерри Томас родился в 1830 году. Он изучал барное дело в Нью-Хейвене (штат Коннектикут)\nи на протяжении своей карьеры работал в отелях и салунах многих американских городов, в\nтом числе: в Нью-Йорке, Чикаго, Сан-Франциско, Новом Орлеане.\nДжерри Томас был известной личностью своего времени. Его сборник коктейлей «The\nBartender’s Guide», изданный в 1862 году, стал первым в истории трудом по миксологии.\nВ 1863 году, будучи управляющим бара в «Западном Отеле» Сан-Франциско, Джерри Томас получал в неделю 400 долларов, то есть больше, чем вице-президент Соединенных Штатов. Он\nумер в 1885 году, в возрасте 55 лет от апоплексического удара, потеряв в конце жизни значительную часть своего состояния на бирже.\n\n240 Americ an Bar\n\nПунш «Фиш Хаус»\nFish House Punch\nОдин из самых старинных рецептов, дошедших\nдо наших дней. Он был создан в 1732 году в\nклубе Fish House, в Филадельфии. Здесь его\nрецепт представлен в версии современного ньюйоркского миксолога Джима Михана.\nНа 1 бокал\n\nТемный ром - 45 мл\nКоньяк - 15 мл\nСвежевыжатый лимонный сок - 15 мл\nСвежевыжатый сок лайма - 7.5 мл\nПерсиковый ликер - 15 мл\nСахарный сироп - 15 мл\n\n1. Взбить ингредиенты в шейкере со льдом.\n2. Отфильтровать в охлажденный бокал\nрокс, заполненный льдом.\n3. Посыпать молотым мускатным орехом.\n\nДжерри Томас готовит обжигающую и пылающую\nсмесь – коктейль «Блю Блейзер» (Blue Blazer). Этот\nвеличайший бармен разливал его с ловкостью\nсегодняшних адептов флейринга.", "С та р ы й - д о б р ы й о л д с к у л\n\nМинт Д ж улеп\n\nКлассика\n\nMint Julep\nЕсли бы у входа в нью-йоркский порт потребовалось создать заново\nстатую Свободы, то вместо факела ей следовало бы вручить бокал «Минт\nДжулепа»! Но почему тогда не «Манхэттена»? Потому что «Минт Джулеп»\nв еще большей степени, чем «Манхэттен», связан с историей США. Потому\nчто «Минт Джулеп» появился на свет в 1803 году в Виргинии, родном штате Джорджа Вашингтона. Потому что, наконец, «Минт Джулеп» – первый\nдостойный этого имени смешанный напиток в истории страны.\nКороче, «Минт Джулеп» пробуждает страсть, но ставит много вопросов.\nСвежую мяту следует растереть или только слегка раздавить? Должна ли\nона оставаться в бокале? Какой тип бурбона лучше использовать? Требуется наливать его в один или в два приема? Необходим ли биттер Angostura?\nНужно ли сбрызнуть напиток темным ромом? Следует ли добавлять\nгазированную воду? Представленный рецепт – наиболее традиционный.\nОн даст вам ответы на все эти вопросы, с учетом того, что в Соединенных\nШтатах существует столько же способов готовить «Минт Джулеп», сколько\nмостов на Миссисипи. То есть ровно 221!\nМожно отметить, что превоначально «Минт Джулеп» готовился на основе\nконьяка, который впоследствии был заменен на бурбон. Сегодня версия\nна основе коньяка опять набирает популярность, называясь Brandy Julep.\n\nНа 1 бокал\n\nМолодая мята - 12 листиков\nСахарный песок - две барные ложки\nБурбон - 60 мл\nБиттер Angostura или темный ром (факультативно) - дэш\n\n1. В бокал рокс (или металлический стакан)\nположить сахар и налить биттер, добавить\nмяту и слегка размять ее листья.\n2. Наполнить бокал до половины дробленым\nльдом.\n3. Налить 30 мл бурбона, перемешать.\n4. Заполнить бокал доверху дробленым\nльдом.\n5. Добавить оставшиеся 30 мл бурбона,\nперемешать.\n6. Сверху сбрызнуть биттером или ромом.\n7. Украсить веткой мяты, воткнув ее в лед.\n\nAmeric an Bar 241", "С та р ы й - д о б р ы й о л д с к у л\nВиски Сауэр\n\nКлассика\n\nWhiskey Sour\nПервый сауэр был приготовлен в 1850-х годах на основе бренди.\nВ самом деле, до кризиса филлоксеры, уничтожившего значительную\nчасть европейских и мировых виноградников, бренди был самым популярным напитком. Но в дальнейшем его пришлось заменить други
