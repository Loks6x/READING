ис­тил­ля­ция – это про­цесс от­де­ле­ния жид­ко­с­\nти с вы­со­ким со­дер­жа­ни­ем спир­та от пе­ре­бро­\nдив­ше­го сус ­ла пу ­тем ис­па­ре­ния с по­с ле­ду­ю­щей\nкон­ден­са­ци­ей об­ра­зо­вав­ших­с я па­ров. Про­цесс\nпе­ре­гон­ки чрез­вы­чай­но прост: тем­пе­ра­т у­ра ки­\nпе­ния чи­с ­то­го спир­та – +78,4°С, а во­ды – +100°С.\nВ про­ме­ж ут­ке меж ­ду эти­ми дву­м я тем­пе­ра­т у­ра­ми\nспирт ис­па­ря­ет­с я го­раз­до бы­с­т­рее, чем во­да. Ес­\nли его пары ох ­ла­дить, то спирт кон­ден­си­ру­ет­с я.\nДля раз­ных спирт­ных на­пит­ков ис­поль­зу­ется раз­\nная пе­ре­гон­ка. Су­ще­с т­ву­ют два ос­нов­ных ее ви­да:\nтрадиционная дистилляция и непрерывная (или\nпостоянная) дистилляция.\n\nТрадиционная перегонка\nТра­ди­ци­он­ная дис­тил­ля­ция не поз­во­ля­ет сра­\n34 Ме тоды произв одс тва\n\nзу по­лу­чить напиток вы­со­кой кре­по­с­ти. По­это­\nму спирт­ное пе­ре­го­ня­ют не ме­нее двух раз. Для\nэтой цели ис­поль­зу­ют­с я, в частности, та­кие пере­\nгонные ап­па­ра­ты, как ан­г­лий­ский «пот стил» (для\nвиски) и фран­цуз­ский «аламбик шаранте» (для\nконьяка).\nНе­же­ла­тель­ные эфи­ры со­дер­жат­с я в ос­нов­ном в\n«го­ло­вах» дис­тил­ля­та, то есть в пер­вых кон­ден­\nси­ру­е­мых па­рах. Силь­ные, тя­же­лые аро­ма­ты на­\nхо­д ят­с я в «хво­с­тах» – па­рах, кон­ден­си­ру­е­мых в\nпо­с лед­нюю оче­редь. Ис­к ус­с т­во ма­с­те­ра дис­тил­\nля­ции за­к лю­ча­ет­с я в уме­нии от­де­лить «го­ло­вы» и\n«хво­с­ты» и со­брать толь­ко «серд­це» дис­тил­ля­та –\nлег­кое спирт­ное, ко­то­рое в то же вре­м я не со­дер­\nжит вред­ных эфи­ров, ко­то­рое бо­га­то аро­ма­та­ми,\nно не име­ет не­при­ят­ных тя­же­лых за­па­хов.\nТра­ди­ци­он­ной пе­ре­гон­ке под­вер­га­ют од­но­со­\nло­до­вый ви­с­ки, ко­нь­як, каль­ва­дос, то есть те на­\n\nП рибор S pirit S afe\nПри производстве виски мастер дистилляции пользуется специальным\nзастекленным ящиком – Spirit Safe.\nПрибор помогает мастеру удалить\n«головы» и «хвосты», то есть те части\nдистиллята, которые выходят в самом\nначале и в самом конце перегонки и\nвключают нежелательные вещества.\nМастер отслеживает выход различных фракций дистиллята в трубках\nприбора, где измеряется крепость\nпроходящего спиртного. Оперируя\nрычагами «спирит сейфа» мастер сохраняет «сердце» напитка, содержащее лучшие ароматы.\nКроме того, прибор измеряет количество произведенного спиртного,\nчто упрощает работу контрольного\nнадзора.", "Б очки : дуб и время\nВ производстве многих спиртных напитков бочки играют жизненно важную роль.\nКак правило, они построены из дуба. Виды его различны и отличаются, в основном,\nстепенью пористости, в большей или меньшей степени позволяющей испарение,\nзнаменитую «долю ангелов». Грубо говоря, можно разделить бочки на три типа.\n\nНовые бочки\nЭто свежевыделанные бочки, в которых дерево содержит много своих компонентов.\nНовые бочки в большей или меньшей степени обожжены, то есть покрыты изнутри\nболее или менее толстым слоем древесного угля. Чем больше обожжена бочка, тем\nболее выраженный карамельный и ванильный привкус приобретет напиток. Наибо­\nлее типичным примером напитков, выдерживаемых в таких бочках, является бурбон.\nНовые бочки, как правило, используются экономно, в течение относительно корот­\nкого периода, чтобы не забить характерные свойства хранящегося в них напитка.\n\nСтарые бочки, в которых уже старел напиток того же типа\nОни выделяют меньше компонентов и, соответственно, позволяют хранить напитки,\nне слишком изменяя их вкус, если не считать старения и испарения.\n\nСтарые бочки, в которых выдерживался напиток другого типа\nИх роль совершенно другая. Вместо передачи ароматических компонентов дре­\nвесины, которые они уже подарили, будучи новыми, другому, первому спиртному\nнапитку, они сообщат сохранившиеся ароматы предыдущего напитка, которым про­\nпитались их стенки. Так, виски хранится в бочках, прежде содержавших херес, порто\nили разнообразные вина, что позволяет расширить его ароматическую палитру.\n\nИ змерение крепости\nФ ранцузск ая система\n\nКре­п ость из­м е­р я­е т­с я в объ­е м­н ых\nпро­ц ен­т ах без­в од­н о­г о спир­т а (% vol.)\nпри тем­п е­р а­т у­р е напитка 20°С. Со­з да­\nте­л ь этой системы – Гэ Люс­с ак.\n\nА нглийск ая система\n\nРань­ш е спирт­н ое по­л у­ч а­л о от­м ет­\nку proven, ес­л и его смесь с по­р о­х ом\nго­р е­л а не очень сла­б о, но и не очень\nсиль­н о. В на­ч а­л е 19 ве­к а та­к о­м у\nна­п ит­к у при­с во­и­л и кре­п ость 100\nBritish Proofs и ус­т а­н о­в и­л и, что она\nсоответствует 57,1% vol.\n70 British Proofs = 40% vol.\n\nА мерик анск ая система\n\nВ США кре­п ость спирт­н о­г о из­м е­р я­ю т в\nUS proofs: 100 US Proofs = 50% vol.\nПо­т ря­с и­т е бу ­т ыл­к у, ес ­л и пузыри на\nпо­в ерх­н о­с­т и напитка боль­ш ие, то его\nкре­п ость вы­ш е 100 Proofs, а ес­л и –\nмел­к ие и бы­с­т­р о ис­ч е­з а­ю т, то – мень­\nше 100 Proofs.\n\nпит­ки, ко­то­рые об­ла­да­ют ха­рак ­тер­ным вку­сом\nис­ход­но­го сы­рья. За­тем спирт­ное улуч­ша­ется и\nоб­ла­го­ра­жи­ва­ет свой вкус и аро­мат во вре­м я вы­\nдерж­ки в ду­бо­вых боч­ках. Каж ­дый из упо­м я­ну ­тых\nспирт­ных на­пит­ков тре­бу­ет пе­ре­гон­но­го ап­па­\nра­та оп­ре­де­лен­ной фор­мы, ко­то­рая долж­на спо­\nсоб­с т­во­вать на­и­бо­лее рав­но­мер­но­му рас­пре­де­\nле­нию теп­ла вну ­т­ри дис­тил­ли­ру­е­мой жид­ко­с­ти.\nТол­с тые ме­тал­ли­че­с­кие стен­ки пе­ре­гон­но­го ку­ба\nдолж­ны об­ла­дать вы­со­кой теп­ло­про­вод­но­с­тью.\n\nНепрерывная перегонка\nНе­пре­рыв­ная дис ­тил­ля­ция в ап­па­ра­те «па­тент\nстил» или «коф­фи стил» поз­во­ля­ет сразу изгото­\nвить спирт­ное вы­со­кой кре­по­с­ти. В данном слу­\nчае «серд­це» на­пит­ка по­лу­ча­ет­с я ав­то­ма­ти­че­с­ки,\nно его ко­ли­че­с т­вен­ное со­от­но­ше­ние с «го­ло­ва­\nми» и «хво­с­та­ми» мень­ше, чем при пе­ре­гон­ке в\nтрадиционном ап­па­ра­те.\nЭта перегонка дает спирт­ное в боль­шом ко­ли­че­ст­\nве. Оно по­лу­ча­ет­ся чи­с­тым, об­ла­да­ет ней­т­раль­ным\nвку­сом и вы­со­кой кре­по­с­тью, за­ви­ся­щей от вы­со­ты\nко­лонн, и не долж­но быть под­вер­же­но вы­держ­ке.\nНепрерывная перегонка ис­поль­зу­ет­с я для вод­ки,\nджи­на, бе­ло­го ро­ма, зер­но­во­го ви­с­ки, не­ко­то­рых\nвидов те­ки­лы.\n\nВ ыдержк а\nВыдержка спиртных напитков – необходимый\nэтап их производства. Она выполняет две абсо­\nлютно различные функции.\nС одной стороны, она способствует испарению\nили видоизменению определенных нежелатель­\nных вторичных компонентов.\nС другой стороны, поскольку выдержка зачастую\nпроходит в не являющихся нейтральными емко­\nстях, напиток абсорбирует новые ароматические\nкомпоненты, такие, как, например, ванилин, кото­\nрые обогащают и облагораживают его вкус. На­\nконец, выдержка меняет цвет напитка, который\nзатем выравнивается с помощью добавления ка­\nрамели.\nКраткосрочная выдержка (которую называют\nвызреванием) применяется к светлым спирт­\nным напиткам, полученным путем непрерывной\nперегонки. Продолжительная выдержка, порой\nдостигающая 50 лет, применяется к темным на­\nпиткам, например, к коньяку, арманьяку или ви­\nски, полученным путем традиционной перегонки\nи содержащим большое количество вторичных\nкомпонентов.\n\nК упа жирование\n(блендинг )\nСэмюэль Бронфман, бывший в свое время вла­\nдельцем бренда Chivas Regal, однажды произнес\nфразу, ставшую знаменитой: «перегонка – это наука, а купажирование – искусство». Он был совер­\nшенно прав, поскольку это две абсолютно разные\nобласти.\nВ процессе купажа человек, мастер-блендер,\nисходя из своего опыта, таланта, суждения, сме­\nшивает спиртные напитки одного типа, но раз­\nличного происхождения с тем, чтобы получить\nнапиток, превосходящий простую совокупность\nего компонентов. В результате он способен при­\nдать вкусовую идентичность марке и увековечить\nсозданный им вкус, несмотря на вариации вкусов\nи ассортимента напитков, которые он смешивает\nмежду собой.\nЭто тонкая работа, в которой личные качества че­\nловека играют чрезвычайно важную роль. Поэтому\nв производстве виски, так же, как и в производстве\nконьяка, и некоторых сортов рома, мастер-блен­\nдер занимает центральное место и иногда дости­\nгает уровня «звезды» в своей профессии.\n\nМе тоды произв одс тва 35", "С ырье – основа крепкого напитка\nВсе крепкие спиртные напитки получают\nперегонкой сброженного сусла, которое, в\nсвою очередь, образуется в результате пре­\nвращения сахара в спирт под действием\nдрожжей.\nДля каждого типа спиртных напитков ис­\nпользуется определенный вид сусла. Это\nможет быть вино, пиво или любой другой\nфруктовый либо просто растительный сок,\nсодержащий достаточно сахара для дости­\nжения требуемой концентрации спирта.\nПроисхождение сусла определяет вкус\nспиртного напитка. Тем не менее, вне зави­\nсимости от использованного сусла, при глу­\nбокой очистке путем дистилляции никакой\n\nразницы между спиртом из зерна и спиртом\nиз картофеля не обнаружится.\nТаким образом, разница между спиртными\nнапитками различных типов, если отбросить\nв сторону ароматизаторы, объясняется при­\nмесями, которые сохранились при перегонке.\nВсе искусство мастера перегонки состоит в\nсохранении лишь тех примесей, которые по­\nложительно влияют на аромат и окончатель­\nный вкус напитка. Чем больше в продукте\nперегонки содержится таких вторичных эле­\nментов, тем большей выдержки он потребует,\nпоскольку в ходе испарения напиток, кроме\nвсего прочего, избавляется от нежелательных\nпримесей. Только таким образом он становит­\n\nся качественнее. Именно поэтому виски, ар­\nманьяки и коньяки улучшают свои свойства\nв процессе старения в бочках, в то время\nкак джин или водку можно и нужно пить без\nвсякой предварительной выдержки. Лишь\nблагодаря неполной перегонке коньяк со­\nхраняет ароматы винограда, виски – дыма,\nв то время как очищенная водка имеет ней­\nтральный вкус.\nМеняя сырье, способы перегонки и вы­\nдержки, можно получить бесконечное раз­\nнообразие вкусов. Богатство, которое затем\nматериализуется на полках баров, в специ­\nализированных бутиках и на бесконечных\nаллеях супермаркетов.\n\nЗ ерно\n\nВ иногра д\nДля приготовления крепких напитков широ­\nко используются фрукты. В первую очередь,\nвиноград. Вино для перегонки отличается от\nвина, которое пьют: лучшее бренди получа­\nется не из Шато Мутон-Ротшильд. Напротив,\nтребуются легкие, кислые, не слишком аро­\nматные белые вина. Именно они, в конечном\nсчете, дают наилучший результат и наиболее\nсбалансированные крепкие напитки, напри­\nмер, коньяки и арманьяки.\n\n36 Ме тоды произв одс тва\n\nДля производства как виски, так и джина\nили водки широко используется зерно. Для\nвиски, перегоняемого в традиционном ап­\nпарате «пот стил», ячмень обращают в солод,\nчто позволяет легче превратить крахмал\nв сахар и, соответственно, сделать более\nкрепкое сусло. При изготовлении зернового\nвиски, предназначенного для смешивания,\nа также джина и водки, перегонка ведется\nпри высокой температуре по методу «патент\nстил», а сусло получают из пророщенного\nили непророщенного зерна. Для производ­\nства бурбона используется кукуруза, а также\nбольшинство других известных злаковых,\nнапример, рожь и пшеница.\nПри производстве джина и водки несколько\nпоследовательных перегонок приводят к\nчрезвычайно высокому уровню очистки\nспирта, при котором характер первона­\nчального сырья не сохраняется совсем или\nзаметен слабо. В случае с джином, чтобы\nдобиться столь узнаваемого аромата, в даль­\nнейшем используют ароматические травы,\nрецепт которых производители зачастую\nдержат в секрете.\n\nРас тения\nТекилу и мескаль получают перегонкой сока\nагавы, который разбавляют водой, чтобы\nсделать его менее густым, а для брожения\nдобавляют дрожжи.\nРом получают по большей части из души­\nстых отходов сахарного производства или\nреже – непосредственно из сока сахарного\nтростника. Мастерство его производства\n– от сбраживания патоки до перегонки и\nвыдержки – очень важно, поэтому вкусовая\nпалитра рома столь различается от бутылки\nк бутылке.\n\nНа соседней странице. Запекание агавы в\nтрадиционных печах перед измельчением,\nброжением и дистилляцией для\nпроизводства текилы Olmeca Altos.", "Хроник а а лкоголя и кок тей лей 37", "Ч асть первая . Г лава 3\n\nА перитивы и бит теры\nНазвание аперитива восходит к латыни: aperitivus – «открыватель » (от aperire – открывать). П онятие « аперитив » долгое время имело медицинский смысл, ибо лекари\nс помощью алкоголя « открывали » сосуды и вены . Н о алкоголь тоже вызывает ап петит, поэтому постепенно слово « аперитив » приобрело свое сегодняшнее значе ние : ритуал, способ подачи напитка перед едой в сопровождении мини -закусок .\n\nНаряду с пробуждением аппетита, современная\nцивилизация поставила перед аперитивом дополнительные задачи: снять накопленный в процессе работы стресс, избавить рассудок от сковывающей робости и тем самым способствовать\nсближению между людьми в начале вечеринок.\nЧто касается законодательной части аперитивного вопроса, то надо сказать, что европейской\nрегламентацией не предусмотрено требований\nк наименованию «аперитив». К общей группе\nаперитивов относятся многие напитки, причем\nкак на винной, так и на спиртовой основе. В частности: вермуты, хинные и анисовые настойки, абсент, а также амаро и биттеры.\n\nИстория аперитива\nЕще древние римляне пили предшественника\nсегодняшнего аперитива: он назывался «мульсум» и представлял собой напиток из вина, меда\nи специй. Но если не углубляться так далеко в\nисторию, то можно сказать, что тот аперитив, который мы знаем сегодня, появился на свет в 1786\nгоду в Турине, когда Антонио Бенедетто Карпано\nизобрел свой знаменитый вермут.\nПройдет пара десятков лет, и история аперитива получит французское продолжение благодаря\nАнри Дюбуа и его зятю Анри-Луи Перно, основавшим производство абсента.\nВ последующем, 19 столетии в Италии и во Франции на свет появилось множество аперитивных\nбрендов. К концу века аперитив стал любимым\nзанятием французов, что, по мнению правящих\nкругов, вызывало лень и приводило к безделью.\nПоэтому были приняты всевозможные анти-аперитивные меры. Так в 1915 году был запрещен\n\n38 Аперитивы\n\nабсент. Потом во время Второй мировой войны\nбыли запрещены практически все аперитивные\nбренды крепче 16% vol.\nПосле окончания войны началась американизация общества и коктейлезация аперитива.\nЕсли аперитив был символом «ничегонеделания»,\nто коктейль стал одним из атрибутов отдыха продуктивного работника. Популяризация потребления коктейлей получила поддержку на государственном уровне. В Европе под американским\nвлиянием распространилась традиция «счастливого часа» (happy hour), когда второй напиток подавался бесплатно и без закуски (два-три орешка\nне в счет). А закусывать полагалось когда-то во\nвремя остальных несчастливых 23 часов.\nИ здесь опять из Италии пришли перемены к\nлучшему. Сегодняшний ритуал аперитива возник\nв Милане. В 1990-х годах Виничо Вальдо владел\nнебольшим баром Cap Saint Martin. Однажды его\nпосетила блестящая идея. Чтобы привлечь побольше посетителей в свое скромное, но удачно\nрасположенное заведение, он предложил бесплатную закуску тем, кто закажет коктейль между\n18 и 21 часом. Успех оказался незамедлительным.\nТротуары перед баром были забиты скутерами\n«Веспа». Конкуренция заработала, и в течение нескольких лет все бары Милана переняли схему\n«закуска – бесплатно». Со временем aperitivo стал\nритуалом и образом жизни всей Италии.\nВ наши дни этот тренд распространяется везде\nв мире, и все больше баров предлагают «аперитиво» своим гостям. Его содержимое зависит от\nстатуса и амбиций заведения: от бокала вермута с\nкусочками фокаччи до изысканного премиального коктейля с утонченными аппетайзерами.\n\nА перитив ,\nперетекающий в ужин\nСегодня аперитив распространяется\nне только в пространстве, но и во\nвремени. Он уже начинает вытеснять\nужин благодаря своей новой форме,\nкоторая по-итальянски называется\n«аперичена» (apericena), то есть\nаперитив, перетекающий в ужин и\nпродолжающийся весь вечер.\n(Французский эквивалент носит название aperitif dinatoire.)\nЭто неформальный прием пищи,\nкогда едят в той же мере, что и пьют.\nИли, если вам так больше нравится, в\nтой же мере пьют, что и едят.", "В ермуты\nВ ерму ты имеют давнюю ис торию . П ервое упоминание о « пре дке» верму та –\n«V inum A bsinthiatum » – относитс я к 4 век у до нашей эры и , согласно легенде ,\nприна д ле жит Гиппократ у.\nВ ина , нас тоянные на трава х , цве та х и смола х , были широко распрос транены в\nантичные времена . П озднее венецианские торговцы с та ли завозить в И та лию\nиз разных с тран множес тво специй : к ардамон , ромашк у, гвоздик у, имбирь и\nпрочие прянос ти , которые способс твова ли совершенс твованию ароматизиро ванных вин , используемых в то время в ме дицинских це лях .\n\nСамо слово «вермут» – wermut wein – возникло\nпри дворе короля Баварии, оно было придумало\nитальянским гербаристом Алессио.\nВ 18 веке изготовление вермута, центром которого стал итальянский город Турин, получило\nнастоящее развитие. Этому благоприятствовало обильное производство белых вин в области\nПьемонт и многообразие душистых растений на\nсклонах близлежащих Альп.\n\nП роизводс тво\nКаждая фирма производит вермуты, следуя своей секретной рецептуре, но можно выделить некоторые общие моменты.\nОбычно в качестве основы используют смесь белых вин. Иногда смесь-основу выдерживают некоторое время, как правило, один год в больших\nдубовых чанах.\nОсновные пряности для вермута: полынь, которой он обязан своим названием (wermut – понемецки «полынь»), кора хинного дерева, корица,\nгоречавка, кола, имбирь, ангелика, ромашка, гвоздика, корочки горького апельсина, тмин, ваниль\nи другие, иногда их количество доходит почти до\nчетырех десятков. Экстракты этих растений получают путем их мацерации или дистилляции. В\nвине смешивают экстракты растений, необходимое количество сахара и чистый спирт.\nКрасные вермуты окрашивают натуральными\nкрасителями – кармином и карамелью.\nИспользуемые компоненты и их пропорция\nопределяют вкус вермута каждого бренда и каждого вида.\nПолученный вермут иногда выдерживают, затем\nфильтруют, пастеризуют и, наконец, разливают по\nбутылкам.\n\n40 Аперитивы\n\nИ та льянские верму ты\nИтальянские вермуты производят в округе города Турин. Они, как правило, менее сухие по сравнению с французскими. Среди них наиболее распространены следующие разновидности.\n• Vermouth Rosso. Сладкий красный вермут, обязанный своим коричнево-янтарным оттенком,\nкак правило, добавлению карамели. Он должен\nиметь крепость не менее 15,5% vol. и содержать\nне менее 14% сахара.\n\nП олынь\nПолынь (Artemisia absinthium) –\nосновной растительный ингредиент\nвермута, который придает напитку\nприятные горьковатые ноты. Кроме\nтого, это растение широко используется в медицине с самых давних\nвремен.\nПри производстве может использоваться как корень, так и надземная\nчасть растения.\n\nВ ерму т и закон\nИтальянское законодательство предъявляет к вермуту следующие требования:\n• Вермут может быть изготовлен из сухого белого вина итальянского происхождения, спирта (крепостью 95-96% vol.), сахара, а также ароматических трав и специй.\n• Вермут должен содержать как минимум 75% вина.\n• Крепость вермута должна быть от 15,5 до 22% vol.\n• Содержание сахара варьируется в зависимости от типа вермута: от максимум 12%\n(Extra Dry) до минимум 14% (Bianco и Rosso).\n• Около пятидесяти различный трав, пряностей и специй разрешены для использования, но среди них должна преобладать полынь (Artemisia absinthium).\nНаименование Vermouth di Torino (или Vermut di Torino) может использоваться\nтолько для вермутов, изготовленных в регионе Пьемонт, но на основе вин, которые\nмогут происходить из разных уголков Италии.\nК категории Superiore предъявляются дополнительные требования: половина вина,\nиспользованного для производства вермута, должна происходить из Пьемонта, а\nдля ароматизации должны быть частично использованы местные травы, в частности, пьемонтская полынь.", "Аперитивные напитки\nА перитивы на винной основе\n\nА перитивы на спиртовой основе\n\nВ ерму ты\n\nА нисовые нас тойки\n\n• Итальянские\n• Французские\n\nП рочие аперитивы\n• Сухие вина, белые и розовые\n• Крепленые вина: порто, херес,\nмарсала\n• Просекко и другие игристые\n• Пиво\n\nА бсент\nХ инные нас тойки\nА маро и Б ит теры\n\n• Vermouth Bianco. Белый вермут. Как и красный вермут, он должен иметь крепость не менее\n15,5% vol. и содержать не менее 14% сахара.\nВ состав вермута входит несколько\nдесятков трав, кореньев и специй,\nкоторые обуславливают его горьковатые, пряные и душистые ароматы.\n\n• Vermouth Rosato. Розовый вермут.\n• Vermouth Extra Dry. Сухой вермут. Его крепость\nдолжна быть не менее 18% vol., а содержание сахара – не более 12%.\n\nФ ранцузские верму ты\nФранцузский вермут появился под влиянием туринского вермута. Тем не менее, он обладает собственными характеристиками, что обуславливает\nего востребованность в барах.\nВ 19 столетии на юге Франции предприниматель\nпо имени Жозеф Нойли решил создать подобие\nитальянского вермута. Но, чтобы придать своему\nнапитку особый характер, он стал выдерживать\nвинную основу в бочках, выставленных на улице\nпрямо под открытым небом. Такое старение воспроизводило условия перевозки вин на открытых палубах кораблей.\nВ результате, француз получил очень сухой вермут Noilly Prat с характерными ароматами. Он используется для «Драй Мартини» и во множестве\nдругих коктейлей.\nОбласти Шамбери во Французских Альпах принадлежит наименование, контролируемое по\nпроисхождению: AOC Vermouth de Chambéry\n(«Вермут Шамбери»). Там из местных белых сортов\nвинограда производят вермут в более легком и\nсухом стиле, чем его собратья из относительно\nнедалеко расположенного города Турин.\n\nС мешанные напитки\nи коктейли\nНегрони, Збальято, Спритц\nи многие другие\n\nП одача верму та\nВермут в чистом виде\n«Вермут заслуживает \"Оскара\" за главную роль в\nаперитиве», – говорит Колин Филд, шеф-бармен\n«Ритца». Действительно, поданный со льдом и\nломтиком лимона или апельсина, он пробуждает\nвкусовые ощущения горьковато-сладкими ароматами.\nДля вермута лучше использовать широкий бокал\nрокс, наполняя его на две трети льдом. А открытые бутылки вермута рекомендуется держать в\nхолодильнике.\n\nВермут в коктейлях\nВермут является центральным столпом коктейльной культуры. В мире без вермута не существовало бы ни «Негрони», ни «Манхэттена», ни\n«Драй Мартини», ни множества других смешанных напитков.\nПервые коктейли с вермутом появились в Америке после того, как туда завезли вермут из Италии.\nВначале увидел свет Vermout Cocktail (ориентировочно 1869 год). Он проложил путь последующим смешанным напиткам, среди которых был\nсимвол миксологии – «Манхэттен», изобретенный\nв 1874 году.\nНесколько позднее, уже в начале 20 века на итальянской территории, но опять же под американским влиянием на свет появился «Американо», а\nзатем его вариант с джином – «Негрони»\n\nВ лонг дринках\nС тоником, содовой, ломтиком лимона или апельсина – вермут позволяет создавать множество\nкомбинаций.\n\nАперитивы 41", "М ир M artini\nM artini – это бренд - икона . О н запечатлен в коллек тивном\nбессознате льном начина я со второй половины 19 с толе тия .\nТогда Л уиджи Р осси и А лессандро М артини созда ли\nсамый знаменитый т уринский верму т. С тех пор этот бренд\nпокорил миллионы потребите лей , вк люча я ак теров , людей\nиск усс тва и других выдающихс я личнос тей .\nВ ерму ты M artini производятс я по уник а льной технологии .\nР ядом с Турином , в мес течке П ессионе , к ак и 150 ле т наза д ,\nв ме дных к уба х перегоняют нас тои трав , корней и корочек .\nК роме того , здесь продолж ают экспериментировать ,\nрасширяя гамму ароматных и мощных т уринских верму тов .\nТак , день за днем , бренд M artini помогае т к а ж дому\nбармену, где бы он ни на ходи лс я , готови т ь лу чшие\nкок т ей ли , ч тобы пора доват ь своих го с т ей и доби т ьс я\nуспе х а .\n\nАлессандро Мартини\nЛуиджи Росси\n\n1863 год.\n\nОснование бренда\nАлессандро Мартини выкупает компанию по продаже вин и крепких напитков,\nв которой он работает. Вместе с энологом Луиджи Росси он выпускает на рынок\nкрасный вермут Martini Rosso.\nЧерез год незамедлительный успех вермута вынуждает партнеров расширять\nпроизводство. Было решено построить крупное предприятие в Пессионе – недалеко от Турина и рядом с железной дорогой, ведущей в портовый город Генуя.\nСегодня именно отсюда продолжают снабжать всю планету вермутами Martini.\nНесмотря на впечатляющие масштабы – 150 миллионов бутылок в год, процесс\nпроизводства остается артизанальным, а старинные медные перегонные аппараты продолжают функционировать как в 19 веке.\n\n1867 год\nПервая поставка вермута Martini в Нью-Йорк.\nАмериканцы быстро оценили вермут за его безграничные ароматы и стимулирующие аппетит\nсвойства. Martini стал символом Италии и ее «дольче виты» и занял почетное место на барных полках\nглавных американских городов.\n\n42 Аперитивы\n\nКонец 1860-х\nВ Америке появляется первый коктейль на основе вермута, который так и называется: Vermouth\nCocktail. Вначале он состоял из вермута и лимонной\nцедры, к которым немного позднее присоединились Ангостура и Мараскино.\n\n1874 год.\n\nРождение «Манхэттена»\nВ Нью-Йорке был придуман культовый коктейль\n«Манхэттен» (вермут, виски, биттер), который\nпроложил дорогу множеству других смешанных\nнапитков с вермутом.\n\n1900 год\nПоявление сухого вермута Martini Extra Dry. Расширение продуктового ряда сопровождалось расширением торговой сети. К 1903 году были открыты\nпредставительства Martini в 43 государствах, что\nобеспечивало дистрибуцию в 90 странах.", "1910 год.\n\nРасширение линейки и\nмеждународное признание\nВыпуск на рынок вермута Martini Bianco. Продукция\nMartini завоевывает всеобщее признание.\nК 1912 году Martini имеет 13 Гран При и более 40\nзолотых медалей на международных конкурсах и\nявляется поставщиком королевских дворов Италии,\nИспании, Англии, Баварии, Португалии и даже\nЯпонии.\n\n1950-е\nПреодолев великую депрессию, сухой закон и две\nмировых войны, компания «Martini» вновь поставляет свою продукцию во множество стран и использует инновационный маркетинг, в частности, так\nназываемые «Мартини Террасы».\n\n2015 год.\n\nНовые суперпремиальные\nвермуты Riserva Speciale\n\n1960-е – 2000-е.\n«Нет Martini.\nНет и вечеринки»\n\nКомпания «Martini» поддерживает тесную связь\nс искусством. Среди ее почитателей числятся\nактеры и другие знаменитости.\n\n2010 год\nПоявление на свет коктейля Martini Royale с\nвермутом Martini Bianco. Он становится современной классикой. Кроме того, он утверждает\nмоду на бокалы шарообразной формы для\nигристых коктейлей.\n\nВыпуск суперпремиальных вермутов Martini Riserva\nSpeciale Ambrato и Martini Riserva Speciale Rubino.\nОни предназначены для требовательных любителей и профессионалов. Эти аутентичные напитки\nпроизводятся на основе двух великих пьемонтских\nсортов винограда – Неббиоло (для Rubino) и Мускат\nбелый (для Ambrato). Некоторые используемые пряности также имеют местное происхождение, что\nделает эти вермуты достойными представителями\nродной области.\n\n2017 год.\n\nВыпуск\nсуперпремиального\nбиттера\nКомпания «Martini» выводит на рынок\nполностью натуральный биттер с\nгорьким мультивкусом. Красным\nцветом напиток обязан кармину – натуральному красителю из кошенили.\nА оранжевые отблески, которые делают приготовленный на его основе\n«Негрони» еще более грандиозным,\nсообщаются шафраном.\n\nАперитивы 43", "В местечке Панкальери, расположенном\nнеподалеку от Турина, находится кооператив Erbe Aromatiche, который уже более\nполувека выращивает около 20 различных\nароматических трав, входящих в состав\nвермутов Martini. Остальные ботаникалы\nпривозят из других стран и континентов.\n\nП роизводс твенные\nсекре ты верму та\n\nОригинальная линейка вермутов Martini – настоящая классика. Это самые популярные итальянские аперитивы вот уже на протяжении 150 лет.\nВермуты этой линейки основываются на исторических рецептах, которые передаются из поколения в поколение, от одного мастера к другому. Каждый вермут делается из натуральных ингредиентов и медленно настаивается согласно фирменному\nметоду: «macerato a girata lenta», который позволяет экстрагировать из растительных компонентов все ароматическое богатство.\n\nРецепты Martini держатся в секрете.\nОни известны всего нескольким ответственным\nлицам и как величайшая ценность хранятся в\nсейфе швейцарского банка.\nПри производстве столь сложного напитка, как\nвермут Martini, на сцене по ходу действия появляются два ключевых персонажа. Мастер трав и\nМастер-энолог. Первый отбирает по всему свету\nлучшие пряности для производства вермута,\nкоторые завозят из самых разных уголков мира.\nМастер-энолог отвечает за винную основу вермута. Он смешивает легкие белые вина ЭмилииРоманьи, Апулии и Сицилии.\nСочетание ароматических эссенций и вин,\nточное соблюдение пропорций, добавление\nсахара и карамели для обретения нужного цвета\nпорождают различных представителей семейства Martini.\nТщательность на всех стадиях производства и качество ингредиентов наделяют вермуты Martini\nсложным характером, благодаря которому они\nприспосабливаются к любой ситуации – от\nсамых экстравагантных до совершенно классических коктейлей, не забывая о роли аперитива,\nдля которой они исторически предназначены.\n\nMartini Rosso\n\nРастительные компоненты\n\nГлубокий цвет с отблесками темного янтаря и меда. Обладает мощным букетом,\nтеплотой и легкой горчинкой. В нем ярко и интенсивно выражены полынь и другие\nароматические травы.\n\nМастер трав компании Martini гарантирует качество пряностей и других растительных компонентов для производства вермута, отбирая их\nкак в окрестностях Турина, так и в самых разных\nстранах мира.\nВсего в состав Martini входят около пяти десятков растительных компонента из Азии, Америки\nи Средиземноморья. Для экстракции ароматов\nодни из них настаивают, а другие подвергают\nперегонке.\nРассмотрим некоторые из «даров природы»,\nкоторые используются для производства Martini,\nнаделяя его ароматами, вкусом и характером.\nЯсенец белый. Ароматическое и лекарственное\nрастение, известное со времен древних греков.\nПолынь. Для Martini используется полынь различных видов, произрастающая в предгорьях\n\nП ервонача льна я линейк а М артини\n\nMartini Bianco\nБледного цвета с перламутровыми отблесками. Он очень душистый и проявляет оттенки ванили и цветов перед финалом на нотах цитрусовой цедры. Превосходное\nравновесие между сладостью и горечью.\n\nMartini Rosato\nОбладает пряным букетом, в котором гвоздика и корица подчеркнуты свежими\nароматами цитрусовых. Он одновременно нежен и мощен.\n\nMartini Extra Dry\nАроматы выразительны, цвет – бледно-золотистый. Он сух и четок во рту. Идеальная основа для лучших коктейлей.\n\n44 Аперитивы", "Альп и сообщающая вермуту свою горчинку и\nхарактер.\nФиалка из Флоренции. Обладает легким запахом и способна подчеркивать другие ароматы\nвермута.\nРоза. Ее аромат нежен и волнующ. Розу привозят\nиз Марокко.\nМалина. Сладостные ароматы малины отделяют\nпри помощи дистилляции свежих ягод, собранных вручную.\nСладкий испанский лимон. Кожура специально\nвыведенных сортов лимонов играет в ароматах\nMartini важную роль, привнося в них сложность.\nКассия с Ямайки. Древесина Кассии обладает\nароматной горечью и целебными свойствами.\nКорень ириса из Тосканы. Обладает теми же\nсвойствами, что и фиалка, – закрепляет другие\nароматы.\nКаскарилья. Душистая кора этого кустарника\nобладает тонизирующим действием. Происходит\nс Багамских островов и из Флориды.\nКорень горечавки. Тонизирует и возбуждает\nаппетит. Привозится из Центрального Горного\nМассива Франции.\nГвоздика. Наилучшим ароматом обладает молодая гвоздика с Мадагаскара.\nКорица из Шри-Ланки. Мощный антиоксидант c\nсильным пряным ароматом.\nШалфей. Его латинское название Salvia происходит от слова «спасти», что много говорит о его\nсвойствах. Ароматы шалфея ценятся в гастрономии.\nМайоран. Известен с античных времен, обладает\nлечебными свойствами.\n\nЛ инейк а R iserva S peciale\nЭто суперпремиальные крафтовые вермуты для требовательных бартендеров и\nпродвинутых любителей. Они инспирированы историческими рецептами дома\nMartini и традиционными методами производства, существующими в окрестностях\nТурина. Вместе с тем, мастера дома объединили традиции с современностью.\nОба вермута созданы с использованием отборного итальянского винограда сортов\nНеббиоло (для Rubino) и Мускат белый (для Ambrato). Они ароматизированы при\nпомощи собранных вручную, редких растительных компонентов из Италии и разных уголков мира. В их число входят три разновидности пьемонтской полыни,\nкрасное сандаловое дерево, римская ромашка и кора хинного дерева. Крафтовый\nхарактер вермутов соответствует недавно закрепленному законодательством наименованию Vermouth di Torino.\nВ 2017 году к этой линейке добавился еще и биттер, что позволяет готовить новое\nпоколение классических аперитивных коктейлей с «туринским происхождением».\n\nMartini Riserva Speciale Rubino\nГлубокие и щедрые вина из сорта Неббиоло с небольших виноградников, относящихся к ограниченной территории Langhe DOC, смешивают с экстрактами кникуса\nблагословенного из Италии, красного сандалового дерева из Африки и еще множеством других пряностей. В результате получается вермут яркого рубинового цвета.\nЭто сложный, мощный напиток с травяными ароматами и долгим послевкусием. Его\nупотребляют в чистом виде со льдом, с тоником и в классических коктейлях, таких\nкак «Негрони» и «Американо». Его мощь позволяет ему прекрасно сочетаться с\nтемными спиртными напитками, такими как ром, коньяк и виски.\n\nMartini Riserva Speciale Ambrato\nЭтот вермут изготавливают с использованием душистого вина из сорта Мускат\nбелый, выращенного на небольших земельных участках региона Асти. Желтая кора\nхинного дерева из Эквадора и китайский ревень вносят легкую горчинку, подчеркивая вкусовые качества винной основы. Этот вермут красивого янтарного цвета\nпрекрасно раскрывается как с тоником, так и со светлыми алкогольными напитками, такими как джин и водка.", "Х инные настойки\n\nХ инное дерево\nХинное дерево – это вечнозеленое\nрастение, которое может достигать\n15-метровой высоты. Кора этого дерева содержит хинин, который помогает\nбороться с малярией.\nВо Франции, благодаря своим медицинским свойствам, кора хинного\nдерева была введена в моду еще\nЛюдовиком XVI. Позднее она стала\nнезаменимым ингредиентом многих\nфранцузских аперитивов.\n\nХинные настойки близки к вермутам с точки зрения истории, производства и своего состава. Эти\nнастойки обладают выраженным терпко-горьковатым вкусом, который вызывает аппетит и улучшает пищеварение. Их употребляют на аперитив\nи добавляют в коктейли.\nОсновным ароматизатором этих напитков служит\nкора хинного дерева, которое может достигать\n15-метровой высоты. Его название происходит от\nиндийского kina-kina, что значит «кора коры». Это\nдерево произрастает в Южной Америке (главным\nобразом, в Перу), в Индии и на острове Ява.\nСодержащийся в коре хинин излечивает от малярии. Однажды хинин спас от этой болезни супругу вице-короля Перу. Супруга была графиней и\nзавезла хинин в Испанию. Оттуда он распространился по Европе, где долгое время его называли\n«Порошком графини».\nВо Франции различные бренды хинных настоек\nпоявились в середине и второй половине 19 столетия. В ту эпоху они считались тонизирующим\nсредством. Их предлагали в качестве напитков,\nвосстанавливающих тонус, придающих силы,\nспособствующих пищеварению. Врачи даже рекомендовали хинные настойки в качестве лекарства для снижения температуры, борьбы с анемией, мышечной и нервной слабостью.\n\nByrrh (Бирр)\n\nО сновные бренды\n\nLillet (Лилле)\n\nAmbassadeur (Амбассадёр)\nЭтот популярный во Франции аперитив представляет собой смесь сладких крепленых вин,\nароматизированных апельсиновыми корками,\nцветами горечавки и ванилью.\nОн стареет в больших дубовых бочках, развивая\nдушистые, фруктовые ароматы. Подается в чистом\nвиде, с лимонной или апельсиновой цедрой. Может быть как красным, так и белым. Франция, крепость – 16% vol.\n\nBonal (Бональ)\nЭто тонизирующее вино было создано в 1865 году\nбывшим монахом из монастыря Гранд-Шартрез\nпо имени Ипполит Бональ.\nВ течение нескольких месяцев горные травы,\nапельсиновые корочки, кора хинного дерева и\nкорень горечавки настаиваются в крепленом\nвине. Франция, крепость – 16% vol.\n\n46 Аперитивы\n\nРецепт Бирра был разработан в 1870 году в Перпиньяне Симоном Виоле и его другом-аптекарем.\nОсновой рецепта послужили руссийонские вина\nиз сортов винограда Кариньян и Гренаш, которые\nсоздатели ароматизировали местными травами,\nэкзотическими пряностями и корой хинного дерева. Byrrh стал пользоваться огромным успехом\nи сделался популярным в кафе по всей Франции.\nВ наши дни Byrrh производится по прежнему рецепту в Восточных Пиренеях. Его выдерживают в\nтечение двух лет в огромных дубовых бочках, самых больших в мире, каждая из которых вмещает\nболее миллиона литров!\nВ идеале Byrrh следует подавать при температуре\n15-16°C с ломтиком апельсина или лимона. Франция, крепость – 17% vol.\n\nDubonnet (Дюбонне)\nЭтот аперитив появился на свет в Париже в 1846\nгоду. Для него используют специально отобранные\nвина с юго-запада Франции. На поздней стадии брожения в них добавляют спирт, затем их смешивают\nи ароматизируют корой хинного дерева, травами и\nкорками и выдерживают в бочках в течение 3 лет.\nDubonnet бывает белым, красным и янтарным, подается при комнатной температуре или слегка охлажденным. Франция, крепость – 16% vol.\n\nРецепт этого знаменитого французского аперитива был создан братьями Лилле в 1887 году\nв городке Подансак к югу от Бордо. Он объединяет изысканные сладкие белые вина, ароматные апельсиновые ликеры и ноты хинной коры.\nПроцесс производства Lillet включает выдержку\nв дубовых бочках. Lillet широко используется в\nкоктейлях, из которых самый известный – это\nклассический «Веспер». Кроме того, Lillet подают\nв чистом виде: сильно охлажденным со льдом, а\nтакже в сочетании с тоником и ломтиком апельсина. Франция, крепость – 17% vol.\n\nSaint-Raphaël (Сент-Рафаэль)\nАперитив, ароматизированный корой хинного\nдерева, какао, апельсинами и другими пряностями, которые предварительно вымачивают в\nспирте. Красный Saint-Raphaël и белый (имеющий\nзолотистый цвет) пьют слегка охлажденными или\nсо льдом. Франция, крепость – 16% vol.", "L illet . С кромное обаяние аперитива\nLillet – это один из тех аперитивов, которые\nолицетворяют искусство жить по-французски, во\nвсем его шарме, вкусе и комфорте. Lillet одновременно престижен и доступен. Его с равным\nуспехом можно найти, как во всех французских\nбистро, где почитают его аутентичность, так и на\nгранд-столах гастрономических ресторанов, где\nценят его богатый вкус.\n\nИстория\nБратья Ремон и Поль Лилле открыли свою фирму\nв 1872 году. Вначале они производили самые\nразнообразные и очень оригинальные ликеры.\n«Гигиенический ликер» включал ангелику, ирный\nкорень, мир и корицу. Кроме того, был «Ликер\nдевственницы», «Ликер рогоносца», «Ликер Бастильи» и незабываемый ликер N’emporte Quoi,\nто есть в переводе «Не имеет значения». Это на\nтот случай когда на вопрос бармена: «Что вы будете пить?», гость отвечал: «Не имеет значения».\nРегион вокруг города Бордо был идеальным\nместом для производства подобных ликеров.\nВ порт приплывали корабли, нагруженные сахаром и пряностями со всех концов света.\nБратья Лилле также занимались торговлей ромом, порто, хересом и бордоскими винами.\nЗнаменитый аперитив Kina Lillet был создан\nбратьями Лилле в 1887 году. Для него использовалась хинная кора в качестве компонента,\nпридающего горчинку, так как ее вкус был очень\nтрендовым в ту эпоху.\nБлагодаря большой любительнице Lillet – графине Винздорской, – этот аперитив стали пить в\nвысшем английском обществе.\nПозднее, а именно в 1985 году, выходец из Бордо\n(речь идет о Брюно Бори, владельце бордоского\nзамка Гран Крю) впервые попробовал Lillet в одном из баров Нью-Йорка. Напиток настолько ему\nпонравился, что он решил выкупить бренд.\nОн модернизировал предприятие по производству Lillet, реставрировал погреба и даже внес\nнекоторые изменения в рецепт, сохранив оригинальные характеристики напитка. Так на свет\nпоявился новый, современный женственный и\nутонченный Lillet, который мы знаем сегодня.\n\nНо мы знаем, что Lillet Blanc является результатом сочетания изысканного сладкого белого\nвина из бордоского сорта Семийон, выдержанного в дубовых бочках, с живыми и ароматными\nликерами из корочек апельсинов, горькие\nэкземпляры которых привозят с Гаити, а сладкие\n– с юга Испании и из Туниса. Общую композицию\nподчеркивают горьковатые ноты коры хинного\nдерева из Перу.\nВ 1962 году на основе красного бордоского сорта Мерло был создан Lillet Rouge.\nСуществует также розовая версия Lillet, разработанная в 2012 году на базе белого винограда, цвет которой придают ликеры из красных\nплодов.\n\nП одача L illet\nТрадиционно Lillet пьют сильно\nохлажденным, со льдом и ломтиком\nапельсина.\nТрендовый способ подачи Lillet – в сочетании с тоником (в пропорции один\nк одному) и долькой апельсина.\nГоворя о коктейлях, следует вспомнить о том, что Lillet – это один из\nингредиентов знаменитого «Веспера»,\nсозданного самим Джеймсом Бондом.\nКроме того, с некоторых пор бартендеры широко используют Lillet в\nсвоих рецептах.\nВ результате, сегодня Lillet объединяет миры баров и ресторанов, сомелье\nи миксологов.\n\nРецепт\nПревосходный рецепт, созданный братьями\nЛилле после экспериментов с различными пряностями и ликерами из экзотических фруктов,\nдержится в секрете и известен одному лишь\nмастеру погреба.\n\nАперитивы 47", "А бсент\nИстория абсента началась в Швейцарии. В 18 веке\nдоктор Ординер готовил из местных растений –\nзвездчатого аниса и полыни – настойку, которую\nон прописывал своим пациентам для улучшения\nумственной деятельности. Горький зеленоватый\nнапиток пользовался у больных большим успехом.\nПеред смертью доктор передал заветный рецепт\nсвоей верной гувернантке. Через некоторое время она продала его двум роялистам, изгнанным из\nФранции, которые быстро оценили потенциал абсента. Итак, в 1797 году собственниками рецепта\nстали майор Анри Дюбуа и его зять Анри-Луи Перно. Они основали производство абсента, которое\nсоставляло около 30 литров в день.\nВ 1805 году партнеры перебрались во французский город Понтарлье. Местный климат походил\nна швейцарский и благоприятствовал произрастанию необходимых трав. Производство абсента\nросло вместе с его успехом небывалыми масштабами, достигнув к 1908 году 25000 литров в день.\nВ 1901 году на винокурне «Перно» произошел\nпожар. Во избежание взрыва сообразительный\nрабочий открыл краны чанов. Весь запас абсента вылился в ближайшую реку Ду. Она сразу покрылась знаменитыми зеленоватыми отблесками.\nГоворят, было достаточно зачерпнуть стаканом\nиз реки, чтобы получить бесплатный аперитив. А\nсолдаты наполняли им свои каски!\nВо время колониальных кампаний в Алжире абсент стал напитком французских офицеров. Для\nобеззараживания воды они добавляли в нее немного абсента. Содержавшийся в нем анетол кристаллизовался от контакта с водой, что делало ее\nмутной. За это абсент окрестили «зеленой феей».\nПредполагалось, что алкоголь в сочетании с анисом дезинфицирует воду. А непрозрачный зеленый цвет позволял увидеть в воде нечистоты и\n\n48 Аперитивы\n\nизбежать многих заболеваний. Сделать воду питьевой – не это ли самая благородная роль, выпавшая на долю спиртного напитка?\nВозвратившиеся на родину офицеры распространили абсент в Париже. Абсент стал любимым\nнапитком среди определенной элиты, в частности в творческих кругах. Художники, писатели,\nпоэты пили абсент, смешивая его капля за каплей\nс водой и сахаром в торжественном ритуале.\nОднако в эйфории предвоенных лет, после череды\nкровавых преступлений, совершенных в состоянии\nопьянения, идеального виновника всех бед нашли\nв лице порочного абсента. Было установлено, что\nтуйон – одна из составляющих корки полыни – может вызвать галлюцинации и повреждение рассудка. Вслед за этим открытием абсент был запрещен\nв Швейцарии, затем в Италии и в Бельгии, а в 1915\nгоду – во Франции.\nЭто был не только благовидный предлог для\nустранения опасного конкурента с пути виноделов юга Франции и производителей других напитков, но и возможность отрегулировать производство спирта во время Первой мировой войны.\nОднако деградация богемы и смерть многих ее\nпредставителей была вызвана не столько самим\nабсентом, сколько его излишним употреблением,\nа также бушевавшим в то время сифилисом.\nВ начале 2000-х годов европейское законодательство смягчилось в отношении алкоголя с\nполынью, ограничивая в нем содержание туйона\nот 5 до 10 мг/л в зависимости от крепости. После\nэтого на свет появилось много напитков, на этикетке которых значилось слово «Absinthe».\nДля потребителя наибольший интерес представляют те из них, которые возрождают исторические марки, опираются на давний рецепт и опыт\nи воспроизводят вкус настоящего абсента. Ведь\n\nА перитив P ernod\nЛегендарный абсент Pernod был создан французом Анри-Луи Перно более\n200 лет тому назад. Вплоть до запрета\nабсента в 1915 году, он был напитком\nпарижской богемы, которая искала в\nнем свое вдохновение.\nСегодняшний аперитив «PERNOD aux\nextraits de plantes d'Absinthe» (Перно\nс экстрактами растения полынь),\nкрепостью 68% vol., не содержащий\nсахара, практически возрождает\nлегендарный абсент, с которого началась история компании «Pernod Fils».\nСовременные способы перегонки позволяют ограничивать в напитке долю\nтуйона до 10 мг/л в соответствии с\nдействующим законодательством.\nПодавая напиток, рекомендуется разбавлять его водой: 5-7 частей воды на\nодну часть абсента.", "сегодняшние «абсенты» расцвели в большом количестве, но не все из них заслуживают право\nносить это название. Некоторые из них даже не\nмутнеют при контакте с водой. А новые способы\nупотребления, придуманные маркетологами с целью скрыть отсутствие истории у своих напитков,\nсильно шокируют защитников почти священного\nритуала абсента, который лежит в основе его\nпрестижа и славы, обретенной в парижских кафе.\n\nК ак пьют абсент?\nУчитывая крепость абсента, его следует пить в\nумеренном количестве одним из перечисленных\nспособов.\n\nПо всем правилам искусства\n• В «фонтан» (специальный графин с краном) положить дробленый лед и налить воду.\n• Под кран поставить бокал и налить в него из бутылки несколько сантилитров абсента.\n• На бокал положить специальную ложечку, а на\nнее – кусок сахара. (Некоторые требуют, чтобы\nсахар был предварительно вымочен в абсенте).\n• Кран «фонтана» открывают, и вода падает капля\nза каплей на сахар.\n• Когда весь сахар растаял, в бокал кладут лед и\nнаполняют его водой.\nЕсли у вас нет «фонтана», можно наливать холодную воду тонкой струей из небольшого графина.\n\nСо льдом\nТому, кто любит горчинку и аромат полыни, понравится абсент со льдом, лучше дробленым.\n\nКак в колониальной армии\nНалейте в бокал немного абсента («на два пальца»). Отдельно подайте графин с чистой охлажденной водой. Пусть клиент сам дольет воду в\nбокал в той пропорции, которая ему нравится.\nКлассическая пропорция: одна часть абсента на\nпять-восемь частей воды.\n\nА нисовые настойки\nКолыбель анисовых настоек – Средиземноморье, где испокон веков признавались целебные свойства аниса.\nНастоящий успех пришел к анисовым\nнастойкам в Европе после запрета абсента. Европейская регламентация предписывает: анисовая настойка должна\nприобретать свой характерный аромат\nблагодаря использованию следующих\nрастительных пряностей: зеленого аниса, звездчатого аниса или фенхеля. На\nпрактике чаще всего применяют все три\nрастения. Также используются различные пряные травы и небольшое количество лакрицы, сообщающие напитку\nдополнительные ароматы.\nРастения и корни вымачивают в спиртном. Затем настой подвергают перегонке. В полученный дистиллят добавляют\nводу и немного сахара. Крепость готовых анисовых настоек – от 25 до 51% vol.\nДля оценки всех ароматов напитка из\nаниса налейте в бокал 25-30 мл настойки\nи разбавьте ее в пять раз бóльшим объемом охлажденной воды.\nМожно добавить в бокал кусок-два льда,\nно делать это следует только после того,\nкак процесс смешивания анисовой настойки с водой полностью закончен (и\nкристаллизация завершилась). Запотевший от холода бокал содержит не более\n7,5% алкоголя, что позволяет в полной\nбезмятежности дожидаться ужина.\nВ баре нужно предоставить клиенту\nсамому приготовить эту смесь, подав\nотдельно воду в небольшом графине, а\nлед – в ведерке для льда.\nФранцузы для получения максимальной\n\nсвежести добавляют в пастис несколько\nкапель мятного сиропа. Такой напиток\nназывается «Попугай» (Perroquet). А если\nдобавить еще и лимонный сироп, то\nполучится «Канарейка» (Canari).\n\nПастис\nВо Франции самое популярное спиртное\nна основе аниса – это пастис. После запрета абсента анисовая настойка Pernod\nстала чрезвычайно популярной, и ее\nначали подделывать. Может быть, эти\nимитации и привели к появлению слова\n«пастис». Ведь pastis – это производная\nот pastiche, что по-французски значит\n«подделка». Согласно регламентации\nпастисом может называться анисовая\nнастойка, содержащая больше натурального экстракта из древесины лакрицы,\nкоторый, кроме характерного аромата,\nпридает пастису янтарный оттенок.\n\nРаки\nАнисовая настойка появилась в Турции,\nкогда начали настаивать на анисе спиртное, полученное путем дистилляции\nфиников. Напиток был назван raki (раки),\nчто значит «финиковый пот».\n\nАрак и узо\nВ Ливане анисовую настойку называют\nарак (arac), а в Греции – узо (ouzo). Узо содержат меньше аниса и сахара по сравнению с французскими настойками. Их\nназвание произошло от выражения «Oso\nMassalia» («В Марсель»). Так подписывали\nящики с раки, отправляемые по морю во\nФранцию.\n\nДля любителей острых ощущений\nАбсент наливают в стопку и выпивают залпом. В\nэтом случае его подают на дижестив.\n\nВ коктейлях\nАбсент широко используется в коктейлях, как в\nисторических рецептах, так и в современных.\nСегодня невозможно представить себе юг Франции,\nгород Марсель без пастиса Ricard, ставшего символом\n«искусства жить по-французски». Он был изобретен\nПолем Рикаром в 1930-е годы. Он взял за основу старинный марсельский рецепт, в котором используется\nмного лакрицы и провансальских трав.\n\nАперитивы 49", "Б иттеры и амаро\nС ре ди всех спиртных напитков бит теры в наибольшей с тепени имеют лек ар с твенное происхож дение . С давних времен че ловек пыта лс я извлечь из рас те ний и кореньев те вещес тва , которые должны были исце лить от болезней .\nЭ ти изыск ания способс твова ли большому разнообразию с ущес твующих\nсегодня брендов бит теров , большинс тво из которых производитс я в И та лии .\n\nС точки зрения европейской регламентации,\namaro и bitter – это одно и то же, а именно: «аперитив-дижестив» на основе спирта, в котором\nпреобладает горький вкус и который получен\nпутем ароматизации спирта при помощи растительных компонентов (натуральных или идентичных натуральным). Его крепость должна быть\nне менее 15% vol. Рецепты биттеров и амаро держатся в секрете. В их состав входит порой до 50\nразличных ингредиентов. Корни, горькие растения, корки и травы вымачивают в спиртном. На заключительном этапе настойку фильтруют, иногда\nподслащивают и подкрашивают. Для понижения\nкрепости биттера в него добавляют воду.\nНа соседней странице. Максим Иващенко, Москва.\n\nО сновные бренды\nAmaro di Angostura\n(Амаро ди Ангостура)\nС недавних пор новые бренды амаро стали производить в разных странах. Среди них – Amaro di\nAngostura, который включает биттер Ангостура и\nразные пряности, образуя теплое и экзотическое\nсочетание коричных, шоколадных и лакричных\nаккордов. Тринидад и Тобаго, крепость – 35% vol.\n\nM artini R iserva S peciale B itter\nБиттер Martini Riserva Speciale предназначен для барменов, стремящихся\nподнять качество своих коктейлей на\nновый уровень.\nПроцесс его производства основан на\nстаринном рецепте 1872 года.\nОн состоит только из натуральных ингредиентов, проявляет комплексные\nароматы и многогранную горчинку,\nстоль важную для вкуса хорошего\nкоктейля.\nБиттер Martini Riserva Speciale\nхорошо смешивается с вермутами\nMartini Riserva Speciale. Их сочетание\nоткрывает новые возможности для\nсоздания богатых и гармоничных\nаперитивных коктейлей.\n\nAperol (Апероль)\nAperol – аперитив на спиртовой основе, который\nможно условно отнести к биттерам, хотя его\nгорький вкус легко очерчен. Он обязан им, в\n\nБит теры 51", "первую очередь, – апельсиновой кожуре. Кроме\nтого, Aperol содержит экстракты горечавки, ревеня\nи других растений и корней. Он появился на свет в\nПадуе (Италия) и используется для «Спритца».\n\nМилане в 1860-е годы. Он сочетается с апельсиновым соком, тоником, содовой, джином, красным вермутом. Италия, крепость – 25% vol.\n\nBecherovka (Бехеровка)\n\nАмаро красного цвета из 13 растений с преобладанием артишока. Его немало используют в\nкоктейлях. Он гармонично сочетается с красным\nвермутом. Также Cynar можно подать разбавленным тоником или содовой. Италия/Швейцария,\nкрепость – 16,5% vol.\n\nРецепт Becherovka восходит в 1807 году. Его придумал Йозеф Бехер – аптекарь и специалист по\nтравам из города, который сегодня называется\nКарловы Вары. Он расположен в исторической\nобласти Богемия (Чехия). Для производства\nBecherovka используются около 20 растительных\nкомпонентов. В наши дни на основе этого душистого биттера готовится великое множество коктейлей. Крепость – 38% vol.\n\nBranca Menta (Бранка Мента)\nРодной, более сладкий брат Fernet Branca, в котором ярко выражены мятные ароматы. Его следует подавать сильно охлажденным. Кроме того,\nон может пробудить своей свежестью некоторые\nклассические коктейли.\n\nCampari (Кампари)\nЭтот ярко-красный биттер из ароматных растений, корочек цитрусовых, сахара, спирта и\nочищенной воды был создан Гаспаре Кампари в\n\nCynar (Чинар)\n\nFernet Branca (Фернет Бранка)\nЭтот итальянский бренд был основан братьями\nБранка в 1845 году. Напиток включает 27 растительных компонентов с четырех континентов и\nвыдерживается не менее года в дубовых бочках.\nИнтенсивные ароматы Fernet Branca проявят себя\nпри подаче напитка в чистом виде. Кроме того,\nего можно смешать с колой или тоником, а также\nдобавить в коктейли в небольшом количестве.\n\nMartini Riserva Speciale Bitter\n(Мартини Ризерва Спечиале Биттер)\nСекретный рецепт, восходящий к 1872 году, вдохновил сегодняшних мастеров компании «Мартини» на производство этого крафтового и премиального красно-рубинового биттера.\nВ его состав входит более 20 трав и кореньев, в\nтом числе три редких компонента. Шафран придает биттеру не только свой уникальный вкус, но\nи нюансы цвета. Кора ангостуры играет важную\nроль в горьком профиле напитка. Корень калумба сообщает вяжущие ноты, которые сочетаются\nс горькими оттенками других ингредиентов.\nMartini Riserva Speciale Bitter обладает изысканным\nвкусом со сложной гармонией горьких аккордов.\nОн проходит выдержку в традиционных пьемонтских чанах из дуба, и на 100% состоит из натуральных ингредиентов. Италия, крепость – 28,5% vol.\n\nPicon (Пикон)\nPicon появился 150 лет назад в Африке. Чаще всего\nего добавляют в пиво. Производится путем вымачивания апельсиновых корок, горечавки и коры\nхинного дерева. Франция, крепость – 21% vol.\n\nSuze (Сюз)\nПопулярный во Франции горько-сладкий биттераперитив, был создан в 1889 году. Подается в чистом виде, со льдом, с водой, с лимонным соком, в\nкоктейлях. Франция, крепость – 16% vol.\n\nZucca (Дзукка)\nАмаро на основе ревеня, история которого началась в Милане в 1845 году. Его пьют чаще всего на\nаперитив в чистом виде со льдом или с содовой.\n\n52 БИт теры\n\nУ потребление биттеров\nН а аперитив\n\nВ странах средиземноморской\nЕвропы, например на итальянской и\nфранцузской ривьере, биттеры подают в чистом виде со льдом и долькой\nлимона или апельсина. Их можно\nслегка разбавить тоником, газированной водой или фруктовым соком,\nполучив в результате более «долгий»\nи освежающий аперитив.\n\nВ кок тейлях\n\nПрисущая биттерам горчинка приветствуется в мире баров при создании\nсмешанных напитков. В этом случае\nспособы их использования – многообразны, почти безграничны и зависят,\nглавным образом, от воображения\nбармена. Биттер уравновешивает\nсладость других напитков. Также\nбиттеры придают динамизм многим\nкоктейлям, при этом эффектно обогащая их ароматическую палитру.\n\nН а дижестив\n\nБиттеры восходят к тем далеким временам, что и ликеры, когда центрами\nнауки и культуры были европейские\nмонастыри, где совершенствовали дистилляцию, гербалистику и\nмацерацию, изготавливая напитки в\nмедицинских целях, в том числе для\nулучшения пищеварения. Поэтому,\nподавая их на дижестив (или к кофе)\nв чистом виде или со льдом, вы воздаете дань древним традициям.\n\nАроматный и согревающий коктейль\nот Артёма Емельшина послужит примером использования исторических\nбиттеров в современных смешанных\nнапитках. Он представляет собой сочетание биттера Becherovka с яблочным и лимонным соками, мёдом,\nсливочным маслом и пряностями.\nНосит имя Hot Buttered B. и подается\nв горячем виде.", "Б иттер B echerovka .\nА птечный рецепт в арсенале бармена\nИстория\nИстория биттера Becherovka насчитывает\nболее 200 лет. Рецепт напитка был разработан\nв медицинских целях в 1807 году фармацевтомтравником Йозефом Бехером из Карловых Вар\n(ныне в Чехии). В 1838 году его сын Йохан Бехер\nразвернул широкомасштабное производство\nэтого напитка, и он быстро познал успех.\n\nкоторый длится около 6-8 недель.\nКрепость Becherovka составляет 38% vol.\nСледует отметить еще одну немаловажную деталь:\nBecherovka производится исключительно\nиз натуральных ингредиентов. Во вкусе и\nв ароматах напитка ощущается вся сложность и свежесть трав с очаровательными\nакцентами корицы и гвоздики.\n\nПроизводство\n\nПодача\n\nВ наши дни процесс производства Becherovka\nокружен глубочайшей тайной, так что знают его в\nкомпании всего лишь два человека. Тем не менее,\nизвестно, что в рецепте используются два десятка\nтрав и пряностей. Спирт из сахарной свеклы закупается на территории Чехии, а вода берется из\nводохранилища «Становице», расположенного в\nокрестностях Карловых Вар.\nИнгредиенты долгое время вымачиваются при\nстрого определенной температуре в смеси спирта\nи воды. Кроме того, при производстве биттера\nBecherovka используется процесс созревания,\n\nБлагодаря целебному воздействию на\nпищеварение, Becherovka долгое время\nупотреблялась в чистом виде. Потом ее\nсмешали с тоником, что послужило началом ее международной карьеры в барах\nпланеты.\nСегодня, в свете распространения миксологии, Becherovka превосходно соответствует новому тренду ароматических\nбиттеров и позволяет создавать одновременно традиционные и современные,\nвкусные и душистые коктейли.\n\nВсемирно известный курорт Карловы\nВары, где производят легендарный\nчешский биттер Becherovka.\n\nБит теры 53", "К ок тейльные бит теры ,\nили биттеры - приправы\nН аряду с с амо с тоя т е льными би т т ерами , которые подобны прочим спирт ным\nнапи т к ам , с ле ду е т выде ли т ь « би т т еры - приправы », использу емые по преиму щес т ву только в кок т ей лях . Э т и би т т еры имеют д авнюю ис торию , ибо в аме рик анской га зе т е The B al ance за 1806 год ясно говори тс я , ч то кок т ей ль – это\nре зультат соче тания а лкогольного напи т к а и би т т ера . И з чего можно с де лат ь\nвывод , ч то первые в ис тории бармены очень рано с та ли использоват ь би т т еры , которые час то готови ли с амо с тоя т е льно , ч тобы улу чши т ь вк ус своих\nсмешанных напи т ков .\n\nКоктейльные биттеры выделяются насыщенным\nвкусом и должны расходоваться экономно. Они\nпозволяют привнести в коктейль бесконечное\nчисло новых ароматов.\nМногие из великих классических коктейлей в\nопределенной степени обязаны своим успехом\nвходящему в их состав биттеру. Среди них можно отметить «Сазерак», «Олд Фешенд» и «Манхэттен».\n\n54 БИт теры\n\nП роизводс тво\nСписок ингредиентов, которые можно использовать для биттеров, практически бесконечен.\nСреди них из числа горьких ингредиентов используется кассия, кора хинного дерева, горечавка, полынь, корень дудника, ириса, одуванчика и\nдругие. Среди ароматических растений применяются: анис, лаванда, фенхель, мускатный орех, шо-", "Сегодня на рынке представлено несколько марок коктейльных биттеров,\nкоторые предлагают целые палитры\nразличных ароматов: от апельсина до\nлаванды, от сливы до лакрицы. Они\nпомогают барменам придать смешанным напиткам дополнительную\nглубину и подчеркнуть в них те или\nиные вкусовые черты.\nНесмотря на все на это, многие бармены изготавливают свои собственные, домашние биттеры и создают с\nих помощью авторские коктейли.\n\nколад, а также кожура цитрусовых, лимон, апельсин, грейпфрут и т.д. и т.п..\nДля извлечения горьких и ароматических веществ используют перегонку, настаивание, вываривание, фильтрацию. Следует отметить, что три\nпоследних метода применимы на обычной кухне\nдля приготовления домашних биттеров.\nПерегонка. Для перегонки ингредиенты несколько дней вымачивают в спирте, который затем дистиллируют. Таким образом получают концентрированный экстракт.\nНастаивание. При настаивании ингредиенты\nоставляют вымачиваться в смеси воды со спиртом, которую слегка нагревают для ускорения\nпроцесса экстракции ароматов. Как и перегонка, данный метод не всегда возможен, поскольку\nслишком высокая температура разрушает некоторые ароматические компоненты. Для экстракции самых хрупких ароматов используют холодное вымачивание, при котором ингредиенты\nпомещаются на различное время в спирт, джин,\nром или, например, коньяк.\nФильтрация. Для нее можно использовать даже\nобычную кофеварку. Сухие ингредиенты сначала\nперемалывают, затем помещают в фильтр и процеживают через него горячую смесь спирта и\nводы.\nВываривание. Наконец, можно просто сварить\nингредиенты в кастрюле с водой. Такой способ\nподходит для экстрагирования ароматов из твердых и компактных растительных компонентов, запахи которых трудноизвлекаемы.\nИногда приходится прибегать к комбинации различных методов, чтобы получить более сложный\nи изысканный биттер.\n\nБ ренды\n\nароматизированный горечавкой, и еще с десяток компонентов, которые держатся в секрете.\nМножество коктейлей попросту не могут без\nнего обойтись. Сегодня Ангостуру производят на\nострове Тринидад.\n\nPeychaud's (Пэшо)\nАптекарь французского происхождения по имени Антуан Амедей Пэшо в 1793 году обосновался в Новом Орлеане. В 1838 году он выпустил в\nпродажу биттер на основе горечавки под названием Peychaud’s. У новоорлеанских жителей\nвошло в привычку добавлять несколько капель\nэтого биттера в коньяк. Так в 1860-х годах появился на свет легендарный коктейль «Сазерак».\nБиттер Peychaud’s сегодня имеет большой успех\nи используется для приготовления множества\nкоктейлей.\n\nПочти все старинные бренды коктейльных биттеров канули в лету. Только Angostura и Peychaud’s\nсумели пережить крутые повороты истории и\nдошли до наших дней.\nЧто касается современных брендов, то среди\nних следует отметить: Regan’s Orange Bitters №6,\nAmargo Chuncho, Bob’s Bitters, The Bitter End, Bitter Truth, Bittermens, Bittercube, Urban Moonshine,\nElmegirab’s, Scrappy’s, Fee Bros и Hermes.\n\nRegan’s Orange Bitter №6\n(Риганс Орэнж биттер №6)\n\nAngostura (Ангостура)\n\nAmargo Chuncho (Амарго Чунчо)\n\nПервоначально это была лекарственная настойка, созданная прусским доктором Зигертом в 1824\nгоду для лечения солдат в Венесуэле. Эликсир завоевал успех, и доктор Зигерт решил наладить\nего промышленное производство. Так появился\nбиттер «Ангостура» (прежнее название города Сьюдад-Боливар). Angostura содержит ром,\n\nПеруанский биттер, предназначенный для использования в коктейле «Писко Сауэр». Его процесс производства требует более 30 различных\nкорочек, трав, кореньев, цветов и пород древесины (в том числе кора хинного дерева и листья\nсаррапии), а также включает 6-месячную выдержку в бочках.\n\nЭтот апельсиновый биттер был создан в 90-х годах прошлого века Гарри Риганом – известной\nличностью в мире баров, автором многих книг\nо спиртных напитках. При его производстве используются апельсиновые корки, кориандр, кардамон, а также кора хинного дерева, кассия и\nгоречавка.\n\nБИт теры 55", "Ч асть первая . Г лава 4\n\nВ одка\nВ одк а не только раскрывае т в кок т ей ле вк ус инг ре диен тов . О на тоже раскрывае т та лан т бармена . К огд а бармен созд ае т кок т ей ль на водке , ре зуль тат полно с т ью зависи т от его спо собно с т ей . Э то он выбирае т аромат ы и\nсозд ае т из них соче тания . Е с ли с де лат ь сравнение с живописью , водк а\nподобна чис тому холс т у, на котором бармен т вори т гармонию красок ,\nроль которых выполняют инг ре диен т ы . П оэтому, ес ли вы хот и т е у бе ди т ьс я в\nмиксолог ических спо собно с тях бармена , попро си т е его придумат ь д ля вас\nкок т ей ль на водке . Н е удиви т е льно , ч то именно на о снове водки созд аютс я\nнаиболее уд ачные , изыск анные и кре ат ивные кок т ей ли .\nЧ то к ас ае тс я вк усовых вариан тов водок , то это совсем дру га я ис тория .\nО ни , дейс т ви т е льно , привнес ли в кок т ей ли новые х арак т ерис т ики , пре до с тавив в распоряжение бармена ин т ересные аромат ы .\nН аконец , имид ж водки – от правна я точк а при созд ании кок т ей ля . И зыск ан но с т ь , иск усс т во , гас т рономия , природ а , современно с т ь и ли к лассик а ...\nТаковы лишь некоторые из ценно с т ей , провозглашаемых извес т ными брен д ами . Б армен должен с у ва жением от но си т ьс я к эт им ценно с тям , подбира я\nд ля к а ж дого кок т ей ля наиболее под ход ящу ю водк у.\n\nВодка – национальный напиток, заставляющий\nвибрировать патриотические струны в душе каждого русского бармена. Это что-то вроде джина\nдля англичан или коньяка для французов.\nУ водки очень давняя история. По всей видимости, она зародилась на Руси еще в середине 15\nвека. Согласно российскому исследователю Похлебкину, первым человеком, занимавшимся на\nРуси искусством перегонки, был монах Исидор.\nОн был в составе русской церковной делегации,\nкоторая в 1438 году присутствовала во Флоренции на Вселенском соборе. Она также посетила\nВенецию и Феррару. Путешествуя, русское духовенство останавливалось в итальянских монастырях, которые в то время были центрами науки\nи где уже дистиллировали первые образцы «воды\nжизни» для медицинских целей. Именно Исидор\nпо возвращению в Москву мог создать водку в\nЧудове монастыре.\n\n56 Водк а\n\nМировой успех водка познала гораздо позднее.\nОна стала известной, когда порожденная революцией русская эмиграция покорила мир своим\nудивительным образом жизни. Появившись в Париже в 1920-х годах, водка дала рождение знаменитому коктейлю «Кровавая Мэри».\nНесколько позднее, уже после отмены сухого\nзакона в Америке к водке пришел настоящий\nмеждународный успех, благодаря ее широкому\nиспользованию во всевозможных смешанных напитках.\nБогатому разными цветами и вкусами миру коктейлей был необходим элегантный спиртной\nнапиток, который мог соединяться с другими\nкомпонентами, не противореча их вкусу, и, благодаря безукоризненному качеству, придавать\nалкогольную крепость, не меняя сложившихся\nароматов. Главная роль здесь по праву досталась водке.", "В одк а 57", "П роизводс тво водки – погоня за чис тотой\nС первого взгляда водка может показаться несложным напитком, ведь в основе ее производства лежит простой принцип – максимальная чистота конечного продукта. Однако нет и ничего\nсложнее, ведь ее изготовление требует высочайшей технологии, современного оборудования,\nбольшого опыта и пристального внимания. Ни\nодна лишняя добавка не может оказаться в водке\nи спрятать малейший ее дефект.\nТакие факторы, как качество спирта, особенности\nводы и легкая ароматизация, которую иногда используют производители, обуславливают отличия между разными водками и объясняют успех\nодних марок и безвестность других.\n\nПодготовка бражки\nВ 1553 году царь всея Руси – Иван\nГрозный (1530-1584) – повелевает\nоткрыть первый «царев» кабак, то\nесть казенный питейный дом. Кроме\nтого, он приказывает учреждать\nтакие заведения по всей стране.\nВ то время водку изготавливали\nпрямо при кабаках.\n\nСырьем для получения лучших водок служит зерно. Его перемалывают в муку, добавляют воду, и\nэту смесь разваривают под давлением. В результате такой операции крахмал, содержащийся в\nзерне, превращается в желеобразную массу, а затем в сахар. Полученный затор охлаждают, в него\nдобавляют дрожжи и квасят, то есть подвергают\nброжению. Брожение длится около 40 часов и\nдает бражку крепостью около 9% vol.\n\nПерегонка\nИз бражки получают спирт самой высокой крепости путем непрерывной перегонки и ректификации в аппарате, содержащем не менее двух\nколонн. В высоту они обычно достигают 20-40 метров. Рассмотрим, как протекает процесс производства спирта на примере завода, где установлен пятиколонный аппарат.\nДля перегонки используются две колонны аппарата, и на этой стадии от будущей водки отделяется большинство вредных примесей.\nПодогретая бражка поступает сверху в первую\nколонну и встречается с потоком горячего водяного пара, подаваемым снизу. Водяной пар извлекает алкоголь из бражки. Остатки бражки – барда\n– уходят вниз и впоследствии идут на корм скоту.\nА образованные алкогольно-водяные пары, содержащие около 30% спирта, поднимаются вверх\nи по трубе вводятся снизу во вторую колонну. В\nее верхней части спирт концентрируется, достигая крепости около 93% vol., и направляется на\nректификацию.\n\nРектификация\nЭто очень важный процесс, от которого зависит\nчистота водки. Сырой спирт ректифицируют в\nтрех последующих перегонных колоннах. Очищаясь от оставшегося сивушного масла и метанола,\nспирт достигает крепости примерно 96% vol. Он\nне имеет ни запаха, ни вкуса первичного сырья.\n\nРазбавление водой\nСпирт смешивают с водой, снижая его крепость\nобычно до 40% vol. Чистота и качество воды играют очень важную роль. Полученную водку после\nстрогого контроля разливают по бутылкам.\n\nДополнительная очистка и\nароматизация\nМногие производители, стремясь как можно лучше очистить водку от побочных запахов, пропускают ее капиллярным способом через песочные\nфильтры или фильтруют сквозь древесный уголь,\nтолщина которого может достигать 8 метров.\nВ водку могут добавлять пряности, придающие\nей легкие ароматы, например, анис, гвоздику, березовые почки, вишневые листья.\nВторой способ ароматизации, применяемый для\nводок с выраженными ароматами, – вымачивание\nпряностей. Так получают клюквенную водку, черносмородиновую, перцовку и другие.\n\n58 Водк а", "Как делают\n\nводк у\n\n1. Лучшие водки изготавливают из зерна.\n\n2. Зерно перемалывают в муку.\n3. Муку смешивают с водой и разваривают\nпод давлением, чтобы крахмал превратился\nв сахар.\n\n5. Брага превращается в спирт после\nперегонки и ректификации.\n4. В сусло добавляют дрожжи и подвергают его\nброжению, чтобы получить брагу.\n\n6. Спирт разбавляют водой.\n7. Водку фильтруют через древесный уголь и разливают по бутылкам.\nВ одк а 59", "ных напитков в США, устанавливает: «Водка – это\nнейтральный алкоголь, дистиллированный или обработанный после дистилляции углем или другими\nматериалами до такого состояния, что он не имеет\nни распознаваемого характера, ни аромата, ни вкуса, ни цвета».\n«Белый виски – Ни вкуса. Ни запаха», – гласил в\n1930-е годы рекламный слоган известной американской марки водки, подтверждая идею регламентации.\nСхожие с американским законодательства существуют и в других англо-саксонских странах – Канаде и Англии.\n\nПольша\n\nВ одк а из разных с тран\nА квавит\nАквавит получил свое название от\nлатинского aqua vitae («вода жизни»),\nпервого названия алкоголя. Он производится на севере Европы, преимущественно из зерна или картофеля.\nПервоначально спирт перегоняется\nдо высокой степени крепости, а затем\nсмешивается с водой, травами и пряностями (укропом, тмином, анисом,\nкожурой апельсина и лимона) и подвергается второй перегонке.\nАквавит существует в бесцветном,\nневыдержанном варианте и – в\nвыдержанном, который созревает в\nдубовых бочках.\nСледует отметить марку Linie, под\nкоторой продается аквавит, выдержанный в бочках из-под хереса\noloroso, а затем переживший морское\nпутешествие через экватор, при котором напиток испытывает воздействие\nжары и влажности, что ускоряет его\nсозревание.\n\n60 Водк а\n\nСкандинавия\nВ 1970-х годах скандинавские страны возглавили новую революцию в мире водки, вдохновившись давними традициями дистилляции. Здесь\nпоявилась на свет водка, основанная на чистоте,\nчто стало возможно благодаря новым методам\nперегонки и соответствовало экологической безупречности здешней природы.\nКроме того, страны Северной Европы положили\nмоду на вкусовые варианты водки с эссенциями\nиз натуральных фруктов, ягод и пряностей, благодаря чему водка заняла больше места на полках баров, а эти страны-производители стали\nлидерами в своей области.\nСоревнование возглавляют две известные марки водки Absolut и Finlandia\n\nАнгло-саксонские страны\nОрганизация BATF (Bureau of Alcohol, Tobacco and\nFirearms), занимающаяся регламентацией спирт-\n\nПольша, наряду с Россией, претендует на первенство в создании водки. Однако из-за географической и исторической близости невозможно\nотдать приоритет той или иной стороне.\nПольская водка имеет более вероятное западно-европейское происхождение. По сравнению\nс русской водкой она более схожа с аквавитом\nиз стран Северной Европы, а также из-за возможного применения выдержки – с бренди.\nРаньше, подобно бренди, ее называли gorzalka\nили gorzale wino (то есть «жженое вино»). Также, подобно аквавиту, она носила имя okowita,\nпрежде чем получить аналогичное русскому название wodka.\nВ 1580-е годы предок польской водки был распространенным напитком в Кракове, а также в\nПознани, который был центром его производства, и приносил немалую прибыль государственной казне.\nСегодняшняя польская водка, порой как и прежде перегоняемая в аламбиках, – это напиток с\nхарактером и выразительными ароматами, напоминающими черты использованного сырья.\nСреди польских водок есть ароматизированные,\nнапример, Зубровка – с травой, которую щиплют\nпоследние зубры Европы, а также такие ржаные\nводки, как представленная на российском рынке\nBelvedere. Она производится неподалеку от Варшавы.\n\nДругие страны\nЕсть в наши дни и другие страны, научившиеся производить водку высокого качества, которая получает известность на мировом рынке. К ним относится\nФранция, где качество жизни и гастрономических\nпродуктов способствуют процветанию водки, рожденной на ее земле. Лучшим примером может послужить бренд Grey Goose.\nБлагодаря такой водке, как Ketel One, Голландия\nпродолжает давние традиции перегонки, восходящие практически к истокам этой страны.", "В одка G rey G oose .\nП о - французски . С о вкусом .\nМесто производства – Франция, где столетиями\nумеют делать изысканные спиртные напитки.\nИспользование только лучших ингредиентов\nи работа высочайших профессионалов. Такова\nбыла концепция гениального Сидни Фрэнка при\nсоздании водки класса «суперпремиум», которую\nон назвал Grey Goose.\nЕго водка сразу встретила феноменальный успех\nв продвинутых барах Нью-Йорка, у миксологов и\nих клиентов. Позднее Сидни Фрэнк продал свой\nбренд компании Bacardi, и с тех пор водка Grey\nGoose продолжает завоевывать бары и сердца\nбарменов во всех концах света.\n\nМесто происхождения\nДля производства своей водки Сидни Фрэнк избрал Францию – наиболее совершенный символ\nстиля и качества во всем мире.\nФранция – это не только страна роскоши и\nдавних традиций производства утонченных напитков. Это также и место, где растет превосходная пшеница и течет чистейшая вода, которые\n\n62 Водк а\n\nнеобходимы для производства суперпремиальной водки.\n\nСырье\nВодку Grey Goose получают из нежной озимой\nпшеницы, которую выращивают на севере\nФранции, в историческом регионе Пикардия,\nгде сложились уникальные условия для идеального созревания зерна, богатого протеинами и\nмикроэлементами. При производстве особо трепетно относятся к выбору поставщиков зерна.\nКстати, водку Grey Goose делают на основе той\nже пшеницы высшего сорта, из которой выпекают знаменитый французский хлеб.\n\nПроизводство\nЗерно очищают, перемалывают в муку и просеивают. Затем добавляют воду и дрожжи, которые\nактивизируют брожение, в результате которого\nполучается брага, крепостью 10% vol.\nЭту брагу последовательно дистиллируют в пяти\nперегонных аппаратах, получая в итоге чистей-\n\nО зимая пшеница\nДля водки Grey Goose используется\nфранцузская озимая пшеница высшего сорта.\nПроизводители Grey Goose не только\nсами перегоняют спирт, но еще и сами\nперемалывают зерно в муку. Это дает\nполный контроль над качеством и\nпозволяет изготавливать богатую\nводку, оставляющую во рту ощущение\nполноты, которое отчетливо присутствует во всех напитках: от «Эспрессо\nМартини» до лонг дринков.", "ший зерновой спирт крепостью более 96% vol.\n\n«Мэтр-де-Ше» («мастер погреба» фр.)\nЗа производственный процесс и качество водки\nотвечает Франсуа Тибо, который в прошлом,\nболее 20-ти лет, был мастером погреба одного\nизвестного коньячного дома.\nФрансуа контролирует весь процесс создания\nкаждой партии водки – «от поля до бутылки». Он\nработал для Grey Goose с момента основания\nбренда, когда принял вызов Сидни Фрэнка создать водку категории «суперпремиум».\nФрансуа Тибо считает дистилляцию искусством.\n«Представьте себе пеструю картину, где на холсте множество разных цветов. Ничего страшного, если на такую картину упадет еще одна\nкапля краски. А водка – это чистый холст. Если\nна него капнуть краской, любой поймет, что\nбелизна утратила свой блеск».\n\nме, причем, при комнатной температуре, без\nохлаждения, через 5-микронные фильтры. Это\nобеспечивает сохранение вкуса и характера\nвысококачественных зерновых спиртов.\n\nНежность и аромат\nВодка Grey Goose обладает мягким, нежным,\nслегка сливочным ароматом. Во вкусе проявляются перечные оттенки и легкие анисовые\nаккорды, которые перерастают в ноты свежей\nвыпечки в послевкусии.\n\nТворчество барменов\n\nВ Коньяке – колыбели французских традиций изготовления спиртных напитков – заканчивается\nпроизводственный процесс Grey Goose. Здесь\nспирт разбавляют водой из источника Жансак,\nкоторая естественным образом фильтруется\nчерез известковые скалы.\nВодку Grey Goose фильтруют в щадящем режи-\n\nКоктейли на основе водки позволяют барменам\nпродемонстрировать все свое мастерство.\nНекоторые лучшие профессионалы считают, что\nвершина барного искусства – это умение выразить натуральный ароматический профиль коктейля с водкой.\nС момента своего появления на свет водка Grey\nGoose наделяет коктейли качеством и полнотой вкуса. К лассическая водка Grey Goose и\nее вкусовые варианты позволяют приготовить\nширочайший спектр гениальных смешанных напитков. Создавая коктейль, главное – стараться\nсохранить изначальный характер водки. Рецепты\nдолжны быть простыми, легкими, блестящими и,\nбезусловно, талантливыми!\n\nМ астер\n\nП омол\n\n«Мэтр-де-Ше» («мастер погреба» фр.)\nФрансуа Тибо отвечает за качество водки\nGrey Goose. Его девиз: «Выбрать лучшие\nингредиенты из самых лучших и дать\nкачеству самому заявить о себе».\n\nОдна из особенностей производства водки\nGrey Goose заключается в том, что при\nпомоле пшеницы удаляются отруби –\nтвердая оболочка зерен. Это позволяет\nмаксимально сконцентрировать натуральный пшеничный вкус.\n\nРождение водки\n\nК лассика и вкусовые варианты\nНаряду с классической водкой Grey\nGoose существуют ее вкусовые\nварианты, которым апельсин и\nлимон придают свои утонченные и\nделикатные ноты.\nДля производства Grey Goose Le Citron\nиспользуются лимоны, выращенные\nво французском Ментоне, в Аргентине\nи в Бразилии.\nGrey Goose L'Orange включает ароматическое масло из цедры сладких\nапельсинов, выращенных во Флориде,\nБразилии и Новой Гвинее.\n\nВ одк а 63", "блематичных» ингредиентов, среди которых свежая яблочная мякоть, свежие киви, а также корнеплоды. Кстати вкусовые варианты водки тоже\nможно использовать для настоек.\n\nВ чистом виде\n\nК ак пить водк у?\nВ коктейлях\nБлагодаря коктейлям водка познала беспрецедентный успех во всем мире. После отмены\nамерика
