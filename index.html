и,\nчьи ночные бдения были кошмаром\nдля местных обитателей, которые\nобосновались на Лонг-Айленде\nкак раз для того, чтобы сбежать\nот суеты Нью-Йорка. В конечном\nсчете, последние добились своего,\nи в 2003 году клуб был снесен. От\nнего остался всемирно известный\nкоктейль, который распространился по всей планете. Встречается\nмасса его вариантов с различным\nсодержанием алкоголя, с большим\nили меньшим количеством колы.\nВот рецепт, предположительно\nоригинальный и уж во всяком случае наиболее распространенный.\nВопреки всем классическим правилам, он включает четыре спиртных\nнапитка, не считая ликера.\nНа 1 бокал\n\nВодка - два дэш\nЛикер Triple Sec - два дэш\nТемный ром - два дэш\nДжин - два дэш\nТекила - два дэш\nCвежевыжатый лимонный сок - 10 мл\nКола - 90 мл\n\n1. Все ингредиенты, кроме колы, взбить в\nшейкере, заполненном льдом.\n2. Налить колу в бокал хайбол, предварительно наполненный льдом.\n3. Отфильтровывая от льда, аккуратно налить сверху содержимое шейкера, чтобы кола\nосталась на дне бокала.\n4. Опустить в бокал ломтик лимона.\n\n272 Americ an Bar", "Х о л о д н а я в о й н а (1946 – 1991)\nБ-52\nB-52\nВ-52 восходит к 1970-м годам, но точное происхождение рецепта остается туманным. Его название – то же, что и у знаменитого американского бомбардировщика, который во время Вьетнамской войны сеял опустошение, сбрасывая печально известные бомбы с напалмом.\nВ-52 – напиток к кофе, слоистый коктейль, который готовят, наливая ингредиенты один за другим по обратной стороне барной ложки так, чтобы слои не перемешались. По порядку: Kahlua,\nBaileys и затем Cointreau, который поджигают. Рекомендуется наполнять стопку до самого\nверха, чтобы она не слишком нагревалась. Напитку дают гореть максимум одну минуту, затем\nвставляют трубочку и выпивают одним глотком.\nНа 1 бокал\n\nКофейный ликер Kahlua - 10 мл\nИрландский ликер Baileys - 10 мл\nЛикер Cointreau - 10 мл\n\n1. Налить перечисленные ингредиенты\nслоями в бокал-стопку в указанной последовательности.\n2. Верхний слой – Cointreau – принято\nподжигать, а коктейль быстро пить через\nтрубочку.\n\nРжавый гвоздь\n\nКрестный отец\n\nRusty Nail\n\nGod Father\n\nЭтот коктейль изобретен после Второй мировой\nвойны, когда Соединенные Штаты захлестнул\nпоток ликеров и крепких напитков из Европы. Я читал в различных источниках, что его\nизобретение приписывают бармену Донато\nАнтоне в 1955 году. Кроме того, Донато мог\nбыть автором таких коктейлей, как «Харвей,\nударяющийся о стены» и «Крестный отец».\n\nКоктейль-дижестив, в котором теплый характер шотландского виски Chivas Regal с силой\nразворачивает свои медово-фруктовые ноты.\n\nНа 1 бокал\n\n1. В бокал рокс положить лед.\n2. Налить ингредиенты, перемешать.\n\nВиски Chivas Regal 12 y.o. - 40 мл\nЛикер Drambuie - 30 мл\n\n1. В бокал рокс положить лед.\n2. Налить Drambuie и виски, перемешать.\n3. Украсить ломтиком лимона.\n\nХарвей, ударяющийся\nо стены\nHarvey Wallbanger\nСчитается, что этот коктейль был впервые\nсмешан в одном из калифорнийских баров в\nконце 1960-х годов.\nНа 1 бокал\n\nНа 1 бокал\n\nВиски Chivas Regal 12 y.o. - 35 мл\nЛикер Amaretto di Saronno - 35 мл\nАпельсиновый биттер - 1 дэш\n\nВодка - 40 мл\nЛикер Galliano Vanilla - 10 мл\nСвежевыжатый апельсиновый сок - 130 мл\n\n1. В шейкере, заполненном льдом, взбить\nводку с апельсиновым соком.\n2. Отфильтровать в бокал хайбол, заполненный льдом. Сверху налить ликер.\n\nСекс на пляже\nSex on the Beach\nРецепт «Секса на пляже» формировался постепенно, и коктейль носил разные названия. Скорее всего, он был придуман барменами из сети ресторанов TGI Fridays в 1980-е годы. Вначале\nего называли Fun on the Beach или Peach on the Beach, поскольку использование слова sex\nбыло запрещено в американских заведениях того времени.\nНа 1 бокал\n\nВодка - 40 мл\nПерсиковый ликер - 20 мл\nКлюквенный сок - 60 мл\nАпельсиновый сок - 60 мл\n\n1. В шейкере, заполненном льдом, взбить\nингредиенты.\n2. Отфильтровать в бокал хайбол, заполненный льдом.\n\nAmeric an Bar 273", "Х о л о д н а я в о й н а (1946 – 1991)\nКосмополитен\n\nКлассика\n\nCosmopolitan\n«Космополитен» – это, наверное, самый урбанистический, утонченный\nи женственный из всех коктейлей. Некоторые историки считают, что он\nпоявился в одном из гей-баров Сан-Франциско в 1960-е годы. Однако «Космополитен» производит впечатление гораздо более молодого коктейля, и я считаю более надежной версию, согласно которой\n«Космополитен» был придуман Шерил Кук, барменшей из бара «Саут\nБич» во Флориде. Шерил заметила, что дамы заказывают «Драй Мартини» из-за его элегантности, но совершенно не ценят его вкус. Когда в\n1988 году в ее бар поступили первые ящики водки Absolut Citron, у нее\nсразу же родилась идея создать более сладкий и душистый коктейль,\nкоторый подавался бы как «мартини». Она назвала его «Космополитен»\nв честь знаменитого женского журнала.\nУспех последовал незамедлительно. Помимо лимонной водки Absolut,\nее версия «Космополитена» содержала Rose’s lime juice (сладкий сок\nлайма), трипл сек и клюквенный сок.\nСвой окончательный статус «Космополитен» обрел благодаря ньюйоркскому бармену Тоби Чеккини, который доработал рецепт коктейля, заменив Rose’s lime juice на свежевыжатый сок лайма.\nЛегендарный бармен Дейл ДеГрофф дал толчок популяризации коктейля. А на вершину славы «Космополитен» поднялся после выхода\nсериала «Секс в большом городе», сделавшись символом модного и\nгламурного поколения 2000-х годов.\nНа 1 бокал\n\nВодка Absolut Citron - 25 мл\nЛикер Triple Sec - 12.5 мл\nКлюквенный сок - 32.5 мл\nСок лайма - несколько капель\n\n1. Ингредиенты взбить в шейкере, заполненном льдом.\n2. Отфильтровать в охлажденный коктейльный бокал.\n3. Отжать в коктейль кусочек цедры лимона и опустить его в бокал.\n\nМорской бриз\nSea Breeze\nЭлегантный лонг дринк на основе водки,\nсочетающий свежесть грейпфрута с шармом\nклюквы.\nЯ читал в разных современных источниках, что\nон появился в 1930-е годы, в период сухого\nзакона, но не нашел ни малейшего его следа в\nсборниках рецептов тех времен.\nВ любом случае, в те годы в США водка была\nпрактически неизвестна. Мне кажется, что по\nсвоему стилю коктейль, скорее, напоминает\n1970-е или 1980-е годы, к которым, вероятно,\nи относится.\nНа 1 бокал\n\nВодка Absolut - 40 мл\nКлюквенный сок - 90 мл\nСок грейпфрута - 40 мл\nДолька лайма\n\nФранцузский мартини\nFrench Martini\nСчитается, что этот коктейль появился на свет в Нью-Йорке в 1980-х годах.\nНа 1 бокал\n\nВодка Absolut - 50 мл\nАнанасовый сок - 25 мл\nМалиновый ликер - 15 мл\nМалина и ананасовый лист (для украшения)\n\n1. В шейкере, заполненном льдом, взбить\nводку с соком и ликером.\n2. Отфильтровать в охлажденный коктейльный бокал.\n3. Украсить ягодой малины и ананасовым\nлистом.\n\n1. В бокал хайбол положить дробленый лед.\n2. Налить водку и соки. Перемешать.\n3. Выжать в коктейль дольку лайма\nи опустить ее в бокал.\n\nAmeric an Bar 275", "Ч асть вторая . Г лава 15\n\nБритания\n\nи колонии\nкоктейли д ля джентльменов и не только", "В ик торианское нас ле дие , стр. 278\nКлассика: Гимлет, Том Коллинз, Джин-тоник, Ханки Панки\n\nЭ поха А р - деко и Гарри К рэддока , стр. 283\nКлассика: Оживитель трупов № 1, Кровь и песок, Веспер\n\nД ары И рландии , стр. 289\nЛ ондон на пороге К ок тейльной революции , стр. 290\nКлассика: Брэмбл, Эспрессо Мартини", "Вик торианское нас ле дие\n\nВ\n\nик торианская эпоха являет собой вершину британского го сподс тва как на морях , так в литерат уре и архитек т уре . О на\nсовпадает с апогеем промышленной революции .\n\nО ф корс , вик торианское нас ледие отражается в кок тейлях .\nП одававшийся на кораблях «Гимлет» с та л одним из проявлений\nвоенно - морского мог ущес тва Б ритании . Так же , как и пунши или\nджин -тоник . В нача ле их пили в колониях , а затем с та ли потягивать\nв гранд - оте лях , массово открывавшихся в т у эпоху.\nТипично британские , с тавшие незаменимыми и вневременными , эти\nкок тейли являются символами , иногда нос та льгическими , динамич ной и у тонченной А нглии 19 с толетия .\n\nТом Коллинз\n\nКлассика\n\nTom Collins\nОдин из наиболее старинных\nкоктейлей. Настоящий динозавр,\nдоживший до наших дней. При этом\nон кажется абсолютно современным. Короче говоря, это высокая\nклассика, которая не может выйти\nиз моды.\nОсновная версия гласит, что этот\nкоктейль появился в середине\n19 столетия. Его изобрел Джон\nКоллинз – метрдотель одного из\nотелей Лондона, всемирной столицы джина. Коктейль назвали «Том\nКоллинз», поскольку для его приготовления использовался джин\nОлд Том.\nОн сделался столь популярен, что\nдал начало целому семейству смешанных напитков, готовившихся на\nоснове самого разного спиртного,\nи был упомянут в сборнике Джерри Томаса 1887 года издания.\nНа 1 бокал\n\nДжин Bombay Sapphire или Олд Том - 50 мл\nСвежевыжатый лимонный сок - 30 мл\nСахарный сироп - 15 мл\nСодовая вода - 85 мл\n\n1. В бокал коллинз положить 4-5 кусочков\nльда.\n2. Налить в бокал сироп, лимонный сок и\nджин, перемешать.\n3. Добавить содовую, слегка перемешать.\n4. Украсить коктейльной вишней или ломтиком лимона.\n\nД жон К оллинз\n«Джон Коллинз» – это еще одно название коктейля «Том Коллинз», особенно\nв том случае, если он приготовлен на\nоснове Лондон Драй джина.\n\n278 Британия и колонии", "Вик торианское нас ле дие\nгимлет\n\nКлассика\n\nGimlet\n«Гимлет» – это сама простота. Естественная комбинация джина и лайма\nсоздает подобие ароматической квинтэссенции. Но сочетание это зародилось неслучайно и имеет интересную историю.\nВ 1867 году некий Лачлин Роуз получил патент на способ изготовления\nсока лайма, позволяющий сохранить все его свойства. Так появился на\nсвет хорошо известный барменам «Сок лайма Роуза» (Rose’s Lime juice),\nвключающий сок лайма и сахар.\nНачиная с 1865 года Королевский Британский флот обязывал свои\nсудна брать на борт значительные количества лайма, который считался\nлучшим средством от цинги, не подозревая, что в лайме содержится\nвчетверо меньше витамина С, чем в лимоне. В 1879 году «Сок лайма\nРоуза», с успехом заменявший свежие плоды цитрусовых, тоннами\nгрузился на корабли.\nИменно тогда один врач – сэр Томас Десмонд Гимлет решил добавить\nк соку лайма джин, чтобы сделать «лекарство» более привлекательным\nдля моряков. Так появился знаменитый коктейль, который моряки в\nчесть врача окрестили «Гимлетом».\nВ наши дни можно приготовить «Гимлет», смешав свежевыжатый сок\nлайма с сахаром и джином. Но если вы хотите воссоздать вкус оригинала, то рекомендуется использовать именно «Cок лайма Роуза», ведь\nмы имеем дело с одним из тех редких случаев, когда в основе первоначального рецепта коктейля лежит «премикс».\nДля «Гимлета» не существует строго установленных пропорций, и они\nменяются в зависимости от вкусов, моды и убеждений бармена. Например, версии Гарри Крэддока и Гарри МакЭлхона, обе имеющие соотношение «один к одному», несколько переслащены.\nЯ бы, скорее, порекомендовал вариант Франка Мейера из «Ритца»:\n2/3 джина и 1/3 сока лайма Роуза.\nТакой вариант, несомненно, крепче,\nно современнее и больше соответствует\nнынешнему вкусу.\nНа 1 бокал\n\nДжи­н Beefeater - 60 мл\nRose's Lime Juice Cordial - 30 мл\n\n1. Взбить ингредиенты в шейкере со льдом.\n2. От­ф иль­т ­р о­в ать в охлажденный коктейльный бокал.\n\nБ ританские пунши\nПунши – старейшие смешанные напитки – возникли около 1700 года на Британских Антильских\nостровах, вероятно на Барбадосе. Слово «пунш»\nпроисходит от «панч» на хиндустани, что означает\n«пять», то есть количество ингредиентов, использовавшихся для приготовления напитка. На\nзаре своей истории пунш включал ром или коньяк\nи был частью семейных традиций. Впоследствии\nпунши нашли благоприятные условия для развития в Англии. В результате ром оказался заменен\nна джин. В наши дни в лучших английских барах\nможно встретить бесчисленные варианты пунша,\nутонченные, с чудесным вкусом.\nИсторические английские пунши из легендарной\nкниги Уильяма Террингтона «Cooling Cups and\nDainty Drinks» (1869 год) были воскрешены из\nзабвения современными миксологами и вновь\nпользуются популярностью в Лондоне.\n\nЭгг-Ног\nEgg-Nog\nВна­ча­ле сло­в о nog оз­на­ча­ло креп­к ий ан­г­лий­\nский эль (сорт пива), в ко­то­рый бы­ло при­н я­то\nдо­б ав­л ять яй­цо. Ве­р о­я т­но, от это­го воз­ник ­ла\nпри­выч­к а так же на­зы­в ать сли­в оч­но-яич­ные\nсме­шан­ные на­пит­к и. По традиции начиная с 18\nвека, сперва – в Англии, затем – в Америке,\nих готовили на Рождество и Новый год, по­\nдавая к сто­л у в спе­ци­а ль­н ой суп­ни­це. Часто их\nделали на основе коньяка. Иногда – с ромом.\nМно­г ие се­мьи хра­н ят свой соб­с т­в ен­ный ре­цепт\nна­пит­к а, не­р ед­ко очень слож­ный и тре­бу­ющий\nне­с коль­к их ча­сов при­го­тов­ле­ния.\nДан­ный ре­цепт «эгг-но­г а» – са­мый про­с той.\nНа 1 бокал\n\nКоньяк - 60 мл\nМо­л о­к о - 70 мл\nСа­х ар­н ый си­р о­п - 15 мл\nОдин яич­н ый жел­т ок\n\n1. В шейкере, заполненном льдом, взбить\nингредиенты.\n2. От­ф иль­т ­р о­в ать в бокал хайбол, заполненный льдом.\n3. По­с ы­п ать мо­л о­т ым му­с­к ат­н ым оре­х ом.\n\nБритания и колонии 279", "280 Британия и колонии", "Вик торианское нас ле дие\nД жин-Тоник\n\nКлассика\n\nGin Tonic\nВпервые джин был смешан с тоником британскими офицерами, воевавшими в Индии в начале 19 столетия. Тоник, напиток на основе хинина, помогал\nбороться с малярией, нередкой в тех краях. За офицерами последовали\nсолдаты. Их любимое спиртное в сочетании с тоником было лучшим способом\nутоления жажды.\nСовременная мода на джин способствовала новому взлету джин-тоника. Сегодня готовят множество его вариаций, добавляя различные пряности и специи.\nДжин-тоник даже начинает теснить вино с гастрономических столов, ведь он\nотлично сочетается с тапас и пряной, экзотической кухней.\nНиже приведен рецепт классического джин-тоника. Благодаря корню фиалки\nи ангелике, джин Bombay Sapphire обладает цветочными ароматами с нотами\nгумуса, которые сочетаются с бодрящими оттенками цитрусовых и можжевельника. Все эти богатые ароматы ярко проявляют себя в сочетании с тоником.\nНа 1 бокал\n\nДжин Bombay Sapphire - 50 мл\nПремиальный тоник - 100 мл\nДолька лайма\n\n1. Крупный шарообразный бокал наполнить льдом.\n2. Перемешать лед в бокале до тех пор, пока он не охладится. Слить образовавшуюся воду.\n3. Поверх льда налить джин. Отжать в напиток дольку лайма и опустить ее в бокал.\n4. Перемешать содержимое бокала.\n5. Наклонить бокал. Влить охлажденный тоник по нижней стенке бокала. Аккуратно сделать один\nоборот барной ложкой, перемешав джин с тоником.\n\nПинк джин\n\nЧерный Бархат\n\nPink Gin\n\nBlack Velvet\n\nСчитается одним из любимых коктейлей\nанглийских лордов-колонистов, живших в труд­\nном тропическом климате Индии. Классическое\nсочетание джина и биттера подается необыч­\nным образом – при комнатной температуре.\n\nКоктейль был создан в 1861 году по поводу кончины принца Альберта, мужа королевы Виктории.\nУтром после известия о его смерти в лондонском «Брукс Клабе» сочли неэтичным пить шампан­\nское, тем более, что многие члены клуба были близки к королевской семье. Изобретатель «Черного\nБархата» ловко обошел правила этикета, смешав с шампанским пиво Гиннесс, чтобы придать ему\nтемный цвет, более соответствующий настроению, уместному в тот момент в данном заведении.\nВ наши дни «Черный Бархат» перестал быть траурным коктейлем, который полагается пить с со­\nответствующим выражением лица. Даже если отдельные любители трагично воспринимают идею\nиспортить пиво, долив в него шампанское.\n\nНа 1 бокал\n\nДжин - 50 мл\nБиттер Angostura - 2 дэш\n\n1. Биттер налить в коктейльный бокал и покрутить его, покрывая стенки напитком.\n2. Добавить джин.\nНа соседней странице. Мода курить кальян, как и\nпить джин с тоником, пришла в Европу из Индии\nблагодаря британским колонистам.\n\nНа 1 бокал\n\nТемное ирландское пиво - 60 мл\nОхлажденное шампанское - 60 мл\n\n1. Налить в фужер для шампанского пиво, затем шампанское так, чтобы они перемешались,\nоправдывая название коктейля.\n\nБритания и колонии 281", "Вик торианское нас ле дие\nХанки Панки\n\nКлассика\n\nHanky Panky\nНемного женщин отметились в истории миксологии (ибо раньше бар был\nмужским заведением), и первое место среди них, скорее всего, занимает\nАда Коулман. Она была дочерью дворецкого, работавшего у владельцев\nотеля «Савой». Сначала Ада стояла за стойкой в баре отеля «Кларидж», а\nпотом в 1903 году перешла в «Савой», где осталась шеф-барменом до 1925\nгода.\nГоворят, она подавала напитки таким гостям, как Марк Твен, принц Уэльский, Марлен Дитрих. В любом случае, Ада Коулман – символичная женская фигура в профессии.\nКоктейль «Ханки Панки» был придуман Адой Коулман в честь актера\nЧарльза Хоутри. Позже она рассказала об обстоятельствах его появления\nна свет: «Чарльз Хоутри со временем... стал одним из лучших знатоков\nкоктейлей, каких я только встречала. Несколько лет назад, когда он много\nработал, он часто заглядывал в бар и говорил: \"Коули, я устал. Дай мне\nчто-нибудь, в чем было бы немного энергии\". Для него я провела часы за экспериментами, пока не изобрела новый коктейль. В следующий раз, когда он\nпришел, я сказала ему, что у меня для него есть новый напиток. Он попробовал его и, опустошив бокал, заявил: \"Клянусь Юпитером! Это настоящая\nловкость рук (hanky panky)!\" С тех пор этот коктейль так и называется».\n\nАда Коулман\n\n282 Британия и колонии\n\nНа 1 бокал\n\nКрасный вермут Martini Rosso - 45 мл\nДжин - 45 мл\nБиттер Fernet Branca - 2 дэш\n\n1. Взбить ингредиенты в шейкере, заполненном льдом.\n2. Отфильтровать в охлажденный коктейльный бокал.\n3. Отжать в коктейль кусочек апельсиновой\nцедры и опустить его в бокал.", "Э п о х а А р - д е к о и Га р р и К р эд д о к а\n\nЧ\n\nтобы понять значение\nтермина «А р - деко », до с таточно посмотреть на\n\nоригина льную обложк у «К ниги\nкок тейлей С авоя » Гарри К рэддока .\n\nН азвание этого с тиля происходит\nот выражения «Д екоративные иск усс тва », которым была посвящена\nП арижская меж дународная вы с тавка 1925 года . В дейс твите ль нос ти , это движение в иск усс тве\nнача лось пос ле П ервой мировой\nвойны и закончилось с нача лом\n\nВ торой .\nН а обложке к ультовой книги\nГарри К рэддока прису тс твуют все\nэлементы А р - деко : изломанные\nлинии , геометрический орнамент,\nс тилизованная античная с тат уя ,\nшик золотого тиснения .\nР ецепты , предс тавленные в книге ,\n– из той же серии . Э то элегантные\nкок тейли , избавленные от всего\nлишнего . П о отношению к своим\nпредшес твенникам они , как че ло век на обложке , с троги и иногда\nугловаты . Р ецепты кратки . П одоб но C orpse R eviver #1 они мол ниеносно дос тигают це ли . И х и\nсегодня подают с благоговением .\n\nГарри К рэд док\nЗа стойкой «С авойя »\nГарри Крэддок (1876 – 1963) – легендарный бармен. Говорят, что именно он приготовил\nпоследний законный коктейль в «Холланд Хаусе» на 5-й авеню Нью-Йорка за секунды до\nвступления в силу мрачного сухого закона. На следующий день он отплыл в Англию, чтобы\nбольше никогда не возвращаться в Соединенные Штаты. Судьба ждала его в лондонском\nотеле «Савой», куда он поступил на службу в 1920 году.\nГарри Крэддок вошел в историю как автор десятков коктейлей, и он принял участие в совершенствовании сотен других.\nОн был быстрым, динамичным и точным барменом. Гарри говорил, что коктейль следует\nподавать, «пока он еще смеется», то есть сразу после приготовления, пока он еще сохраняет всю свою свежесть.\nВ 1930 году он опубликовал «Книгу коктейлей Савоя» (The Savoy Cocktail Book), ставшую образцовым трудом, который очень ценят коллекционеры.\nПосле «Савоя» Гарри работал в другом лондонском отеле – «Дорчестере».\n\nКоктейль Гарри\nHarry's Cocktail\nНезабываемое наследие, оставленное нам\nГарри Крэддоком. Итальянский вермут и джин\nсливаются воедино, окольцованные абсентом.\nА мятные листья придают альянсу дополни­\nтельную свежесть и яркую современность.\n\nНа 1 бокал\n\nДжин - 60 мл\nКрасный вермут - 30 мл\nАбсент - дэш\nСвежая мята - две веточки\n\n1. В шейкер положить лед и налить ингредиенты.\n2. Взбить содержимое шейкера и отфильтровать в охлажденный коктейльный бокал.\n\nБритания и колонии 283", "Э п о х а А р - д е к о и Га р р и К р эд д о к а\nОживитель трупов #1\n\nКлассика\n\nCorpse Reviver #1\nКлассика от Гарри Крэддока, первое письменное упоминание которой\nвстречается в его книге «The Savoy Cocktail Book» 1930 года издания.\nСегодняшние бартендеры любят добавить в «Оживитель трупов» дэш\nсолевого раствора (50 г морской соли на 200 мл воды), чтобы подчеркнуть ароматы коктейля. Кстати, соль – это один из способов переосмыслить исторические смешанные напитки, сделав ярче их вкус.\nНа 1 бокал\n\nКальвадос - 20 мл\nКоньяк - 40 мл\nКрасный вермут - 20 мл\n\n1. Взбить все ингредиенты в шейкере, заполненном льдом.\n2. Отфильтровать в охлажденный коктейльный бокал.\n\nФундаментальный труд Гарри Крэддока «The Savoy Cocktail Book» (1930 год) в окружении винтажных спиртных напитков. Отель «Савой», Лондон.\n\nСвист-удар\nWhiz-Bang\nВыдающийся рецепт этого коктейля придумал\nв 1920 году бармен Томми Бартон из лондон­\nского «Спортс клаба».\nКоктейль получил свое название от пуль\nвремен Первой мировой войны с высокой\nначальной скоростью. Все, что удавалось ус­\nлышать, – это свист, за которым немедленно\nследовал удар.\nНа 1 бокал\n\nШотландский виски Chivas Regal - 40 мл\nСухой французский вермут - 20 мл\nСироп Гренадин - 5 мл\nАбсент Pernod - 3 дэш\nБиттер Orange Bitter - 2 дэш\n\n1. В стакан для смешивания положить лед и\nналить ингредиенты.\n2. Перемешать и отфильтровать в охлажденный коктейльный бокал.\n\n284 Британия и колонии", "Э п о х а А р - д е к о и Га р р и К р эд д о к а\n\nЛет учий Шотландец\n\nМарме лад\n\nМейфер\n\nFlying Scotsman\n\nMarmalade Cocktail\n\nMayfair\n\nЭтот коктейль придуман легендарным лон­\nдонским барменом Гарри Крэддоком в честь\nлокомотива Flying Scotsman, построенного в\n1923 году.\n\nГарри Крэддок рекомендовал подавать этот\nгорько-сладкий коктейль в качестве предобе­\nденного аперитива. Сегодня в лондонских барах\nHawksmoor в этот коктейль добавляют красный\nбиттер и пару дэш апельсинового биттера, под­\nчеркивая его цитрусовую сторону.\n\nМейфер – название аристократического квар­\nтала в Лондоне, где в 17 веке в царствование\nКарла II, в мае проходил ежегодный праздник.\nЭтот коктейль был создан Робертом Вермейром\nв лондонском «Эмбасси клубе» в 1921 году. Его\nчудесные ароматы и по сей день восхищают\nлюбителей коктейлей.\n\nНа 1 бокал\n\nШотландский виски - 45 мл\nКрасный итальянский вермут - 35 мл\nСахарный сироп - 5 мл\nБиттер Angostura - несколько капель\n\n1. В шейкере, заполненном льдом, взбить\nингредиенты.\n2. Отфильтровать в охлажденный коктейльный бокал.\n\nНа 1 бокал\n\nДжин - 60 мл\nЛимонный сок - 30 мл\nАпельсиновый конфитюр - две барные ложки\n\n1. В шейкер положить лед и налить ингредиенты.\n2. Взбить содержимое шейкера и отфильтровать в охлажденный коктейльный бокал.\n3. Отжать кусочек апельсиновой цедры в\nкоктейль и опустить его в бокал.\n\nНа 1 бокал\n\nДжин - 50 мл\nСвежевыжатый апельсиновый сок - 40 мл\nСахарный сироп - 5 мл\nЛикер Apricot Brandy, настоянный на гвоздике\n- 10 мл\n\n1. В шейкер положить лед и налить ингредиенты.\n2. Взбить содержимое шейкера и отфильтровать в охлажденный коктейльный бокал.\n\nБритания и колонии 285", "Э п о х а А р - д е к о и Га р р и К р эд д о к а\nАлександра\nAlexandra (он же Бренди Александр)\nКоктейль Alexandra назывался Brandy Alexander вплоть до середины прошлого столетия. Изменение\nназвания связано, по всей видимости, с тем что используемый в его рецепте коньяк к тому времени\nобособился от прочих бренди.\nОтносительно того, откуда взялось первоначальное название Brandy Alexander, мнения расходятся.\nНаиболее правдоподобной считается версия, согласно которой коктейль был придуман в 1922 году по\nслучаю лондонской свадьбы принцессы Мэри Виктории Александры Алисы. Однако другие считают,\nчто коктейль мог быть создан в честь царя Александра II. Но как бы коктейль не назывался, он оста­\nется таким же вкусным, ведь сочетание коньяка, какао и мускатного ореха стало гастрономической\nклассикой, а сам коктейль – бессменным атрибутом в меню любого хорошего бара.\n\nМиллионер\n\nНа 1 бокал\n\nКоньяк - 30 мл\nЛикер Crème de Cacao - 20 мл\nСливки - 20 мл\n\nMillionaire\n\n1. В шейкере, заполненном льдом, взбить все ингредиенты.\n2. Отфильтровать в охлажденный коктейльный бокал.\n3. Сверху посыпать молотым мускатным орехом.\n\n20-й век\n20th Century Cocktail\nВ английском сборнике рецептов «Café Royal\nCocktail Book», изданном в 1937 году за\nавторством Тарлинга, создание этого коктейля\nприписано бармену по имени C.A. Tuck.\nНа 1 бокал\n\nДжин Beefeater - 50 мл\nБесцветный ликер Crème de Cacao - 30 мл\nАперитив Lillet Blanc - 30 мл\nСвежевыжатый лимонный сок - 20 мл\n\n1. В шейкер положить лед и налить ингредиенты.\n2. Взбить содержимое шейкера и отфильтровать в охлажденный коктейльный бокал.\n3. Украсить твистом из цедры лимона или\nапельсина.\n\nВ сборнике Гарри МакЭлхона «ABC of Mixing\nCocktails» (1922 год) указано, что данный рецепт\nбыл создан в лондонском отеле «Ритц».\nНа 1 бокал\n\nВиски - 60 мл\nЛикер Orange Curaçao - 15 мл\nСироп Гренадин - 10 мл\nСвежевыжатый лимонный сок - 5 мл\nПоловина яичного белка\n\n1. Все ингредиенты взбить в шейкере без\nльда (сухой шейк).\n2. Добавить лед и встряхнуть шейкер еще раз.\n3. Отфильтровать в охлажденный бокал.\n\nГлубинная бомба\nDepth Bomb\nЭтот рецепт был придуман в Англии во время\nПервой мировой войны, а затем подхвачен\nГарри Крэддоком.\nНа 1 бокал\n\nКоньяк - 25 мл\nКальвадос - 25 мл\nСвежевыжатый лимонный сок - 25 мл\nСироп Гренадин - 25 мл\n\n1. В шейкер положить лед и налить ингредиенты.\n2. Взбить и отфильтровать в охлажденный\nкоктейльный бокал.\n3. Украсить кусочком лимонной цедры.\n\n286 Британия и колонии", "«Американ бар», лондонский отель «Савой, 1931 год.\n\nКровь и Песок\n\nКлассика\n\nBlood and Sand\nВосхитительно фруктовый и неподражаемый «Кровь и Песок» – это исторический коктейль, который вновь стал популярным. Впервые его рецепт\nбыл опубликован в «Книге коктейлей Савоя» Гарри Крэддока в 1930 году, и\nс тех пор он не изменился ни на миллилитр.\nКоктейль носит название фильма, вышедшего на экраны в 1922 году. В нем\nроль тореро, погибающего в схватке с быком, исполняет яркий и брутальный Рудольф Валентино, ставший одним из первых секс-символов кинематографа. Он пользовался таким невероятным успехом у женщин, что некоторые из них падали в обморок на просмотрах фильмов с его участием.\nСмерть актера в возрасте 31 года вызвала, как рассказывают, целую волну\nсамоубийств.\nНа 1 бокал\n\nШотландский виски Chivas Regal 12 y.o. - 20 мл\nСвежевыжатый апельсиновый сок - 20 мл\nЛикер Cherry Brandy - 20 мл\nКрасный вермут - 20 мл\n\n1. В шейкер положить лед и налить ингредиенты.\n2. Взбить и отфильтровать в охлажденный коктейльный бокал.\n3. Украсить полоской апельсиновой цедры.\n\nБритания и колонии 287", "Меж Простыней\nBetween the Sheets\nЧасто говорят, что этот коктейль изобрел\nГарри МакЭлхон из парижского «Гаррис бара»\nв 1930-е годы. Но вся загвоздка в том, что\n«Гаррис бар» никогда не стеснялся заявлять\nоб авторстве коктейлей, придуманных в его\nстенах, а иногда и приписывал себе чужие\nизобретения. Однако он ни единого раза не\nпохвастался авторством коктейля «Меж про­\nстыней».\nЭтот смешанный напиток является, по сути,\nдальнейшим развитием «Сайд кара», в котором\nбелый ром заглушил зимнюю сторону и придал\nнекоторый экзотический оттенок.\nДругие гипотезы относят появление коктейля\nк 1921 году и лондонскому отелю «Беркли».\nПервое обнаруженное мною упоминание «Меж\nпростыней» принадлежит Гарри Крэддоку из\nотеля «Савой», и вот его рецепт.\nНа 1 бокал\n\nКоньяк - 30 мл\nБелый ром - 30 мл\nЛикер Трипл Сек - 30 мл\nЛимонный сок - дэш\n\n1. Ингредиенты взбить в шейкере, заполненном льдом.\n2. Отфильтровать в охлажденный коктейльный бокал.\n\nДе Ригёр\nDe Rigueur\nОдна из жемчужин «Книги коктейлей Савойя»\nГарри Крэддока.\nНа 1 бокал\n\nШотландский виски - 60 мл\nСок грейпфрута - 30 мл\nМедовый сироп - 20 мл\n\n1. В шейкере, заполненном льдом, взбить\nингредиенты.\n2. Отфильтровать в охлажденный коктейльный бокал.\n\n288 Британия и колонии\n\nВеспер\n\nКлассика\n\nVesper\n«Веспер», прославленный Яном Флемингом и его культовым героем\nДжеймсом Бондом, – это коктейль, несущий в себе больше вопросов,\nчем ответов. Он впервые упоминается в 1953 году в романе «Казино\nРояль» и назван именем его героини. В книге Джеймс Бонд сам придумывает рецепт этого коктейля и, подыскивая ему название, встречает\nдвойного агента Веспер Линд и просит у нее разрешение использовать ее имя для коктейля.\nСчитается, что рецепты тех «Мартини», которые пьет Бонд, были вдохновлены визитами Яна Флеминга в лондонский «Дюкс бар». Но серьезных подтверждений этому факту не нашлось, кроме того, что «Дюкс бар»\n– это историческое и гостеприимное заведение, где готовят одни из\nлучших «Мартини» в Лондоне, а также специализируются на «Веспере».\nОдно время «Веспер» полностью сошел со сцены, и лишь особо эрудированные бармены помнили о нем. Сегодня ситуация кардинально\nизменилась. В конечном счете, «Веспер» не только вышел из тени, но\nдаже сделался одним из самых востребованных коктейлей, чего он,\nнесомненно, заслуживает даже и без Джеймса Бонда.\nНа 1 бокал\n\nДжин Beefeater - 60 мл\nВодка - 20 мл\nLillet Blanc - 10 мл\n\n1. В шейкер положить лед и налить ингредиенты.\n2. Взбить содержимое шейкера и отфильтровать в охлажденный коктейльный бокал.\n3. Украсить спиралью из лимонной цедры.", "Дары Ирландии\nКэмеронз кик\n\nВсеирландский\n\nCameron's Kick\n\nEverybody's Irish\n\nIrish Cocktail\n\nШотландский и ирландский виски в одном\nбокале. Рецепт был впервые опубликован в\nсправочнике Гарри МакЭлхона в 1922 году.\n\nМожно сказать, что это национальный коктейль\nИрландии, о которой он напоминает своим зе­\nленым цветом, а также вкусом, одновременно\nмощным и дружественным. Он был изобретен\nв день Святого Патрика, предположительно,\nГарри Крэддоком.\n\nМогучий, живительный и теплый коктейль,\nкак рукопожатие медведя. Рецепт из «Книги\nкоктейлей Савоя» Гарри Крэддока, изданной в\n1930 году.\n\nНа 1 бокал\n\nВиски Ballantine’s Finest - 30 мл\nВиски Jameson - 30 мл\nСвежевыжатый лимонный сок - 20 мл\nСироп «Миндаль» (Orgeat Syrup) - 15 мл\n\n1. Ингредиенты взбить в шейкере, заполненном льдом.\n2. Отфильтровать в охлажденный коктейльный бокал.\n\nИрландский Кофе\nIrish Coffee\n\nНа 1 бокал\n\nИрландский виски Jameson - 55 мл\nЗеленый ликер Chartreuse - 10 мл\nЗеленый мятный ликер - 5 мл\n\n1. Ингредиенты взбить в шейкере, заполненном льдом.\n2. Отфильтровать в охлажденный коктейльный бокал.\n3. Украсить зеленой оливкой.\n\nИрландский коктейль\n\nНа 1 бокал\n\nИрландский виски Jameson - 60 мл\nАбсент - два дэш\nЛикер Curaçao - два дэш\nЛикер Maraschino - дэш\nБиттер Angostura - несколько капель\n\n1. В шейкер положить лед и налить все\nингредиенты.\n2. Взбить и отфильтровать в охлажденный\nкоктейльный бокал.\n3. В бокал положить оливку, а сверху положить полоски апельсиновой цедры.\n\n«Ирландский кофе» – спасительный коктейль,\nсогревающий тело и душу. Он был создан в\nирландском аэропорту Шеннон барменом по\nимени Джо Шеридан. «Ирландский кофе» пред­\nназначался для путешественников, летевших\nиз США в Ирландию на гидросамолетах. Он\nпомогал им прийти в себя после трудного пере­\nлета, который иногда длился более 18 часов.\nПозднее, в 1952 году коктейль был завезен\nв США молодым журналистом Стеном Дела­\nплейном, который передал рецепт бару «Буэна\nВиста» в Сан-Франциско.\nВместо ирландского виски можно использовать\nпочти любой крепкий спиртной напиток. Так,\nRussian Coffee готовится с водкой, French Coffee\n– с коньяком и т.д. Однако «Ирландский кофе»\n– это самый известный и лучший из них.\nНа 1 бокал\n\nИрландский виски Jameson - 40 мл\nВзбитые сливки - 20 мл\nГорячий крепкий кофе - 120 мл\nБурый сахар - 2 ч. л.\n\n1. В термостойкий бокал насыпать сахар,\nналить кофе и виски.\n2. Перемешать. Сверху напитка разместить\nвзбитые сливки.\nПаб-музей Black Swan (Москва) изобилует удивительными экспонатами родом из Ирландии.\nБритания и колонии 289", "Лондон на пороге Коктейльной революции\n\nЭ\n\nти кок тейли появились на све т в Л ондоне в 1980- х и в\n\n1990- х года х . П озднее некоторые из них с та ли современной\nк лассикой , хотя в те времена еще ник то бы не дога да лс я об\nэтом . П ре дс тавленные здесь кок тейли разбудили вообра жение про фессиона лов . Б армены , обученные в тот период такими мас терами ,\nк ак Д ик Б рэдсе лл и С а льваторе К а лабрезе , впос ле дс твии возглави ли К ок тейльную революцию .\n\nМартини к завтрак у\nBreakfast Martini\nАвтор этого коктейля – Сальваторе Калабрезе.\nСам напиток представляет собой эволюцию\nкоктейля «Мармелад» от Гарри Крэддока.\nВпервые «Мартини к завтраку» был подан\nв роскошном баре «Лайбрери» лондонского\nотеля «Лэйнсборо».\nНа 1 бокал\n\nДжин Bombay Sapphire - 50 мл\nЛикер Triple Sec - 15 мл\nСвежевыжатый лимонный сок - 15 мл\nАпельсиновый конфитюр (кусочки цедры\nизмельчить) - полная барная ложка\n\n1. В шейкер поместить все ингредиенты.\nПеремешать до растворения конфитюра.\n2. В шейкер добавить лед. Встряхнуть и\nотфильтровать в охлажденный коктейльный\nбокал.\n3. Сверху положить тонкие полоски апельсиновой цедры.\n\nЗолотая мечта\nGolden Dream\n\nБрэмбл\n\nКлассика\n\nBramble\n«Брэмбл» – это самое легендарное творение Дика Брэдселла,\nувидевшее свет в 1980-х годах. Сложные и утонченные ароматы джина\nпрекрасно сочетаются в коктейле с ежевикой.\nНа 1 бокал\n\nДжин Bombay Sapphire - 50 мл\nЛимонный сок - 25 мл\nСахарный сироп - дэш\nЕжевичный ликер - два дэш\n\n290 Британия и колонии\n\n1. Положить в шейкер лед и налить в него все\nингредиенты, кроме ликера.\n2. Взбить содержимое шейкера и отфильтровать\nего в бокал рокс, наполненный до краев дробленым\nльдом. Добавить дробленый лед до края бокала.\n3. Налить ежевичный ликер. Украсить ягодой ежевики и ломтиками лимона.\n\nМожно было бы счесть этот коктейль старин­\nным, относящимся к Золотому веку. На самом\nделе он был придуман в баре лондонского\nотеля «Дорчестер» в 1980 году. Коктейль про­\nславил журналист Генри МакНалти, опублико­\nвав его рецепт в журнале Vogue в 1982 году.\nКаждый из нас имеет свою золотую мечту,\nно, надо признаться, очень редко она стано­\nвится явью. Так почему бы не отыграться на\nэтой «Золотой Мечте», которая выполняет все\nобещания? В конце концов, ее шелковистый и\nнежный характер, дивный пленительный вкус\nмогут принести богатство любому бармену.\nНа 1 бокал\n\nЛикер Galliano Vanilla - 20 мл\nЛикер Triple Sec - 20 мл\nАпельсиновый сок - 20 мл\nСливки - 10 мл\n\n1. В шейкер положить лед и налить ингредиенты.\n2. Основательно взбить и отфильтровать в\nохлажденный коктейльный бокал.", "Лондон на пороге Коктейльной революции\nДик Брэдселл (1959–2016) подает «Брэмбл»\nв спикизи на Ромилли стрит. Сохо, 2009 год.\n\nЕго напитки перевернули сердце столицы\nАнглии вверх дном: все ринулись в «Атлантик Бар», а затем в «Плейер», чтобы удостоиться чести попробовать его творения.\nВ качестве учеников Дика за стойкой «Атлантик бара» стояли молодые бармены по\nимени Тони Кониглиаро и Ник Стрэнджуэй.\nДа, друзья-читатели, Дик Брэдселл был\nанглийским родоначальником коктейльной\nреволюции. Он явился подобно сияющему\nсолнцу после беззвездной ночи.\nПриготовление смешанных напитков внезапно превратилось в модную профессию. К\nкоктейлям стали применять эпитеты «sexy»\nи «cool». Сделаться барменом больше не\nозначало «упустить свою жизнь».\nПока Дейл ДеГрофф в Соединенных Штатах\nвозрождал исторические коктейли, Дик\nБрэдселл изобретал новые, а Сальваторе\nКалабрезе привлекал богатых клиентов и\nзанимался пиаром.\n\nД ик Б рэдселл\nThe O ne\n\n«Эспрессо Мартини» и «Брэмбл» – культовые творения Дика. Этими коктейлями он\nдал понять, что революция состояла в новых\nвариантах смешивания, свободных от старых правил, необязательно было использовать новые ингредиенты.\nМы также обязаны ему такими коктейлями,\nкак «Русский Весенний Пунш», «Чувство Сюрприза», «Трикл» и «Ковбойский Мартини».\nДик вошел в историю как необычный\nперсонаж, насмехавшийся над почестями и\nпопаданием в вечность, которое, впрочем,\nему обеспечено.\n\nВ 1980-х годах в лондонском Ковент-Гардене, в клубе «Занзибар» молодой бармен по имени\nДик Брэдселл начал карьеру миксолога, которая потрясла мир, казавшийся обреченным пить\nтолько джин-тоники до конца своих дней. Дик прибыл в Лондон с острова Уайт, что на юге Англии, то есть ниоткуда. Он не принадлежал ни к какому клану, ни к какой касте, если не считать\nтаковой касту свободных людей. Он использовал те же ингредиенты, что и другие бармены,\nразве что лучшего качества. Он работал теми же приемами, но с новым вдохновением. Он\nсоздал коктейли, ставшие сегодня классикой.\n\nБритания и колонии 291", "Лондон на пороге Коктейльной революции\nЭспрессо Мартини\n\nКлассика\n\nEspresso Martini\n«Эспрессо Мартини» – это «неизбежный» коктейль, который присутствует практически в каждой карте бара.\nАвторство «Эспрессо Мартини» принадлежит Дику Брэдселлу, гуру\nнового поколения миксологов, который в 1984 году изобрел его в лондонском «Фредс баре».\nТем самым Дик Брэдселл обнаружил свой талант создавать очевидные, простые коктейли, вызывающие вопрос, почему их не изобрели\nраньше.\n\nРусский весенний пунш\nRussian Spring Punch\nРецепт легендарного лондонского бармена\nДика Брэдселла.\nНа 1 бокал\n\nВодка Grey Goose - 25 мл\nСвежевыжатый лимонный сок - 25 мл\nЛикер из черной смородины - 15 мл\nСахарный сироп - 10 мл\nОхлажденное шампанское\n\n1. В бокал хайбол положить лед, налить\nводку, лимонный сок и сахарный сироп. Перемешать.\n2. Добавить шампанское. Сверху полить\nликером.\n\nНа 1 бокал\n\nВодка Grey Goose - 40 мл\nОхлажденный кофе эспрессо - 30 мл\nКофейный ликер - 10 мл\nСахарный сироп - чайная ложка\n\n1. Взбить все ингредиенты в шейкере со льдом.\n2. Отфильтровать в охлажденный коктейльный бокал.\n3. Украсить кофейными зернами.\n\nЧувство сюрприза\nWibble\n\nКовбойская ножища\n\nМалиновый Мартини\n\nCowboy Hoof Martini\n\nRaspberry Martini\n\nКоктейль Дика Б азом сегодня весь мир с тановится « латино ».\nЭ то глоба льный тренд , сочетающий с тиль и музык у, гас трономию\nи кок тейли . О н лежит на с тыке других мощных направлений , таких\nкак К уба , И спания , П уэрто -Р ико , Б разилия , М ексика . В радос тном\nсмешении всех этих к ульт ур танцуют З умбу, с лушают «Д еспасито » и\nЭ нрике И глесиаса и пьют ром , кашасу, текилу и меска ль . К ок тейли\n– ароматные , вк усные и у толяющие жаж ду. О ни не приготовлены по\nс трогому рецепт у, как «С айд К ар », и их крепос ть имеет обыкновение\nменяться в зависимос ти от нас троения бармена . Н о они впита ли в\nсебя все безумие латиноамериканской фиес ты .\nИ когда гремит музыка и поднимаются бока лы , даже те , к то никогда\nне танцует, выходят на танцпол . В «Р итце» вы никогда не увидите\nничего подобного .\n\n296 Эк зотик а\n\nРОн Коллинз\nRon Collins\nКубинская версия классического коктейля «Том\nКоллинз».\nНа 1 бокал\n\nРом Havana Club Añejo 3 Años - 50 мл\nПол-лайма\nСахарный сироп - 15 мл\nСодовая - 50 мл\n\n1. В высокий бокал хайбол положить несколько кубиков льда.\n2. Отжать в бокал сок половины лайма.\nДобавить сахарный сироп и ром. Хорошо\nперемешать.\n3. Добавить содовую. Аккуратно перемешать.\n4. Украсить ломтиком лайма.", "Ф и е с та Л ат и н а\n\nГавана 3 Мохито\n\nК убан Джинджер\n\nHavana 3 Mojito\n\nCuban Ginger\n\nЭтот простой рецепт позволяет прочувствовать\nвсе ароматы кубинского рома.\n\nКлассическое сочетание имбиря и яблока\nподчеркивает пряные, сладостные и цитрусовые ароматы рома Havana Club Añejo Especial,\nкоторый подвергается двойной выдержке.\n\nНа 1 бокал\n\nРом Havana Club Añejo 3 Años - 60 мл\nСвежевыжатый сок лайма - 30 мл\nСахарный песок - две барные ложки\nМята - две ветки\nСодовая\n\n1. В высоком бокале хайбол как следует перемешать ром с соком лайма и сахаром.\n2. Добавить лед и мяту.\n3. Наполнить бокал содовой водой. Хорошо\nперемешать.\n4. Украсить листьями мяты.\n\nНа 1 бокал\n\nРом Havana Club Añejo Especial - 60 мл\nЯблочный ликер - 20 мл\nИмбирный эль - 120 мл\n\n1. В высокий бокал хайбол положить несколько кубиков льда.\n2. Налить ром и ликер. Перемешать.\n3. Добавить имбирный эль. Аккуратно перемешать.\n4. Украсить ломтиком яблока.\n\n7 глотков с грейпфру том и\nкорицей\n7 Sips Grapefruit & Cinnamon\nКомбинация цитрусовых и специй в сочетании с\nвыдержанным ромом раскрывает все ароматическое богатство этого благородного спиртного\nнапитка. Следует вначале отпить глоток рома,\nа затем закусить его долькой грейпфрута, посыпанной молотой корицей.\nНа 1 порцию\n\nРом Havana Club Añejo 7 Años - 50 мл\nДолька грейпфрута\nЩепотка молотой корицы\n\n1. В бокал рокс положить лед и налить ром.\n2. Дольку грейпфрута обсыпать корицей с\nдвух сторон и подать вместе с ромом.\n\nЭк зотик а 297", "Дэнис Вальдес – потомственный бартендер. Его\nотец – родом с Кубы, настоящий кантинеро –\nработает за стойкой уже более 30 лет.\nДэнис родился в Минске. За 10 лет в профессии\nон прошел путь от помощника официанта до\nсовладельца маленького бара El Pushka в центре\nбелорусской столицы, который превратился в посольство латиноамериканской фиесты.\nКроме того, Дэнис успел стать одним из основателей барной школы Splash&Dash, а также – победителем локального финала Olmeca Tahona Society\nCocktail Competition. А потом он занял 3-е место\nна глобальном финале в Мексике.\nДэнис говорит: «Бартендинг – это сфера, кото-\n\nрая перестала быть просто работой. Сегодня\nэто настоящий стиль жизни, страсть и целая\nфилософия. Также это настоящее глобальное комьюнити, которое не позволит тебе пропасть\nни в одной стране мира. Современный бартендер – это универсальный солдат гостеприимства, у которого должна быть ясная голова,\nзолотые руки и открытое сердце».\n\nДэнис Ва льдес\nБ р е н д - а м б а сс а до р O l m e c a A lto s и H ava n a C lu b\nТекила Olmeca Altos появилась на свет в ходе Коктейльной революции, которая потрясла\nсонное царство миксологии в начале 2000-х годов. Эта текила стала одним из первых\nбрендов спиртных напитков, который создавался при сотрудничестве с барменами.\nВ этом интервью Денис Вальдес рассказывает нам о том, как зародилась идея создания\nтекилы Olmeca Altos, чем обуславливается ее аутентичный и одновременно современный характер, и почему она является универсальным коктейльным ингредиентом.\n\nДенис, в мире спиртных напитков Olmeca\nAltos была одним из первых брендов, который создавался вместе с барменами. Можете ли вы вкратце рассказать нам об этом\nсотрудничестве?\nКонечно, и даже с удовольствием, обожаю\nрассказывать эту историю. В начале 2000-х\nгодов был настоящий коктейльный бум,\nкоторый не мог не коснуться текилы. Бартендеры из Лондона стали всерьез интересоваться миром текилы, а точнее – текилы\nиз 100% агавы. У руля агавового движения\n\n298 Эк зотик а\n\nбританской столицы стали две легендарных\nличности – Дре Массо (трижды Bartender\nof the Year в UK) и Генри Бенсант (главный\nавтор книги «Margarita Rocks»). Они решили\nотправиться в Мексику, чтобы познакомиться там с текилой поближе и посетили более\n20 производств, каждое из которых отличалось по стилю и методам. Дре и Генри искали для своих коктейлей настоящую, 100%\nтекилу, которая бы отлично раскрывалась в\nсмешанных напитках, и которой можно было\nбы наслаждаться в чистом виде. Это оказалось не так просто. Те напитки, которые\n\nоправдывали их ожидания, были далеко не\nтой ценовой категории, которая их устраивала. Именно тогда состоялась судьбоносная встреча: наши герои познакомились с\nХесусом Эрнандесом – маэстро-текильеро\nдистиллерии Colonial de Jalisco (на которой\nпроизводится Olmeca), за плечами которого\nопыт работы в индустрии более 30 лет.\nВместе, они решили создать новую текилу,\nкоторая сочетала бы в себе аутентичность\nМексики, современные технологии, а также\nбезупречное качество при доступной цене.\nТак и родилась на свет Olmeca Altos – текила\nиз 100% агавы, при создании которой используются два метода – аутентичный метод\nTahona, а также современный Molinos. Именно благодаря этому сочетанию, мы получаем\nлегкий, свежий и многогранный напиток,\nсозданный вместе с барменами для барменов\nПолучается, что Olmeca Altos наилучшим\nобразом соответствует требованиям\nсовременных барменов для создания их\nноваторских смешанных напитков. Какие\nкоктейли с Olmeca Altos получаются лучше\nвсего? Какие ингредиенты сочетаются с ней\nнаиболее удачно?\nЭто вопрос, на который можно отвечать бесконечно. Я думаю, если мы спросим у десяти\nбартендеров, с чем лучше сочетается текила,\nто мы получим как минимум 10 различных\nответов. Ну вот смотрите: если растереть немного текилы между ладонями и на секунду\nвдохнуть ее аромат, то мы почувствуем и\nпряные цитрусовые ноты, и тонкие цветоч-", "Ф и е с та Л ат и н а\nные оттенки. Нам, наверняка, покажется, что\nминуту назад мы держали в руках свежие\nперцы, а также мы уловим сладковатый аромат ванили. А если мы говорим о категории\nРепосадо, то там подключится также мед с\nкорицей.\nЭто все говорит о том, что текила понастоящему универсальный коктейльный\nингредиент.\nДля развития коктейльного направления Altos, в 2010 году был создан проект\nTahona Society. Он стал образовательной\nплатформой для бартендеров, а также это\nглобальный коктейльный конкурс, благодаря которому бартендеры научились ценить\nлокальные ингредиенты и смешивать текилу\nс ними. Этот конкурс – настоящее доказательство того, что мир текилы многогранен.\nДаже такие ингредиенты, как хрен, квас и\nсметана могут создать с ней прекрасную\nмиксологическую пару.\nРасскажите о производстве Olmeca Altos.\nOlmeca Altos относится к категории 100%\nAgave. Это означает, что для нее используется исключительно сладкий сок голубой\n\nагавы. Она выпускается только на заводе\nDestilería Colonial de Jalisco в регионе ЛосАльтос, Халиско. Эта местность расположена на высоте 2100 м над уровнем моря.\nПочвы в районе вулканические, богатые\nминералами, что в сочетании с уникальным\nклиматом обеспечивает идеальные условия\nдля роста агавы, идущей на производство\nтекилы Olmeca Altos.\nАгава тщательно выращивается и собирается на собственных плантациях командой\nопытнейших химадоров, которые ставят\nперед собой цель отобрать только максимально спелые и насыщенные плоды, а не\nпросто выполнить задачу по собранным\nкилограммам.\nПосле сбора сердцевина агавы рубится на\nчасти и запекается в течении 3-х дней при\nтемпературе 68-72°C в больших традиционных каменных печах. После чего следует\nпроцесс измельчения, и здесь как раз\nвстречаются аутентичность и современность, ведь мы используем комбинацию\nиз 2-х методов – аутентичного Tahona, при\nкотором агава в течении 2-х часов медленно\nпревращается в волокнистое пюре при помощи 2-х тонного колеса Тахона, выполнен-\n\nного из вулканического ископаемого камня\nТезонтле. Этому методу уже более 500 лет и\nтекила, созданная по это методу, отличается\nкомплексностью, многогранностью и интенсивным ароматом и вкусом агавы, который\nневозможно ни с чем спутать.\nВторой метод называется Molinos. Здесь роль\nколеса Tahona выполняет ряд из валиковых\nотжимных прессов, которые измельчают агаву значительно быстрее и помогают создать\nболее легкий и свежий профиль текилы.\nЗатем следует этап ферментации напитка\nвместе с волокнами агавы, при этом используется особый штамм дрожжей, выведенный\nна заводе. Через 3 дня мы получаем Mosto\nMuerto, крепостью 6-12% vol., который после\nдвойной дистилляции в маленьком медном\nкубе объемом 750 литров, разбавления водой из собственного источника до нужного\nградуса и бутилирования, наконец, превращается в текилу Olmeca Altos.\nВсе этикетки клеятся вручную. Каждая\nбутылка Olmeca Altos имеет свой серийный\nномер, что действительно говорит о ее\nиндивидуальности и отменном качестве при\nстрогом контроле. Именно так выглядит наш\nвзгляд на производство 100% текилы.\n\nЭрнандез\nHernandez\nЭтот напиток посвящен Маэстро-текильеро\nХесусу Эрнандесу. В нем, как и в самом сеньоре\nХесусе, сочетаются крепость характера, элегантность манер и простота восприятия.\nДля любителей «Мартинеза» и Текилы 100%\nагавы.\nНа 1 бокал\n\nТекила Olmeca Altos Plata - 45 мл\nLillet Blanc - 20 мл\nКрасный вермут - 20 мл\nСироп агавы - 5 мл\nБиттера Ангостура - три капли\n\n1. Все ингредиенты перемешать в стакане\nдля смешивания, заполненном льдом.\n2. Сцедить в охлажденный коктейльный\nбокал.\n3. Украсить апельсиновой цедрой.\nЭк зотик а 299", "Ф и е с та Л ат и н а\nМаргарита\n\nКлассика\n\nMargarita\nНа странице номер 153 в английском сборнике коктейлей под названием «Café Royal Cocktail Book» (1937 год) есть один интересный\nрецепт. Он называется «Пикадор» и совпадает с сегодняшним рецептом «Маргариты», за исключением соленой кромки.\nЧто касается безумного успеха коктейля, то он пришел к нему во\nвторой половине 20 века, причем, когда тот уже назывался женским именем. Относительно возникновения последнего существует\nнесколько гипотез. Одной из версий является история Маргариты\nСеймз, которая дала свое имя коктейлю в 1948 году в Акапулько,\nорганизуя прием, на который были приглашены члены семьи Хилтон\n– магнаты гостиничного бизнеса.\nВзбивая ингредиенты со льдом в блендере, получаем «Замороженную\nМаргариту» (Frozen Margarita).\nТакже существуют всевозможные варианты фруктовой «Маргариты».\nНа 1 бокал\n\nТекила Olmeca Altos Plata - 40 мл\nЛикер Triple Sec - 20 мл\nСвежевыжатый сок лайма - 20 мл\n\n1. Сделать соленую красту на коктейльном бокале или бокале для маргариты.\n2. Взбить ингредиенты в шейкере, заполненном льдом.\n3. Отфильтровать в бокал.\n\nК лубничная Маргарита\n\nХалиско\n\nЭль Дьябло\n\nStrawberry Margarita\n\nJalisco\n\nEl Diablo\n\nОдна из самых распространенных и востребованных вариаций классической «Маргариты».\n\nОдин из сюрпризов книги «Café Royal Cocktail\nBook». В самом деле, в нем присутствуют все\nкомпоненты знаменитого коктейля «Текила\nВосход», на который «Халиско», похоже, оказал\nнемалое влияние!\nВ любом случае, это превосходный шорт дринк,\nзаслуживающий внимания барменов.\n\nДьявольский коктейль с текилой, восходящий,\nкак считается, к 1930-м – 1940-м годам.\nНекоторые источники приписывают его авторство самому Трейдеру Вику.\n\nНа 1 бокал\n\nТекила Olmeca Аltos Plata - 60 мл\nСвежевыжатый сок лайма - 30 мл\nСахарный сироп - 22.5 мл\nКлубника - 5 ягод\n\n1. На дне шейкера размять клубнику мадлером.\n2. Добавить лед и другие ингредиенты.\n3. Взбить и отфильтровать в охлажденный\nкоктейльный бокал.\n4. Украсить клубникой.\n\n300 Эк зотик а\n\nНа 1 бокал\n\nСвежевыжатый апельсиновый сок - 30 мл\nТекила Olmeca Аltos Plata - 60 мл\nСироп Гренадин - четверть барной ложки\n\n1. В шейкере, заполненном льдом, взбить все\nингредиенты.\n2. Отфильтровать в охлажденный коктейльный бокал.\n\nНа 1 бокал\n\nТекила Olmeca Altos Plata - 40 мл\nЧерносмородиновый ликер - 25 мл\nCвежевыжатый сок лайма - 25 мл\nИмбирный эль\n\n1. В шейкере, заполненном льдом, взбить все\nингредиенты, кроме имбирного эля.\n2. Отфильтровать в бокал рокс, заполненный кубиками льда.\n3. Добавить имбирный эль.\n4. Украсить ломтиком лайма.", "Ф и е с та Л ат и н а\nБатанга\n\nТореадор\nToreador\n\nBatanga\n\nЭто один из первых в истории рецептов на основе текилы, «жемчужина» изданной в 1937 году\nкниги «Café Royal Cocktail Book». По малообъяснимым причинам «Тореадор» совершенно исчез из\nобращения, но горстка страстных миксологов воскресила его из праха. Они совершили благое дело,\nпоскольку этот коктейль поистине великолепен.\n\nПопулярный в Мексике способ употребления\nтекилы, придуманный в 1960-е годы барменом\nиз города Текила по имени Дон Хавьер Дельгадо Корона.\n\nНа 1 бокал\n\nНа 1 бокал\n\nТекила Olmeca Аltos Plata - 60 мл\nЛикер Apricot Brandy - 20 мл\nСвежевыжатый сок лайма - 20 мл\n\nТекила Olmeca Altos Reposado - 60 мл\nСвежевыжатый сок лайма - 15 мл\nКола\n\n1. Все ингредиенты взбить в шейкере, заполненном льдом.\n2. Отфильтровать в охлажденный бокал для маргариты.\n\n1. У бокала хайбол сделать кромку из сахара.\n2. Положить в него несколько кубиков льда.\n3. Налить ингредиенты, перемешать.\n\nТоммиз Маргарита\nTommy’s Margarita\nХулио Бермехо – живая легенда мира текилы.\nЕго «Томмиз ресторан» в Сан-Франциско – это\nхранилище памяти о текиле. Здесь можно продегустировать десятки различных ее сортов,\nнаблюдая как Хулио с фантастической сноровкой выдавливает сок из лаймов для своего\nкультового коктейля «Томмиз Маргарита»,\nкоторый он придумал в 1980-х годах.\nНа 1 бокал\n\nТекила Olmeca Аltos Plata - 60 мл\nСвежевыжатый сок лайма - 30 мл\nСироп агавы - три барные ложки\n\n1. Взбить ингредиенты в шейкере, заполненном льдом.\n2. Отфильтровать в бокал рокс, содержащий\nнесколько кубиков льда.\n3. Украсить слайсом лайма.\n\nA ltos M argarita\nТвист на «Томмиз Маргариту» под названием\nAltos Margarita вы получите, смешав текилу\nOlmeca Altos Plata (50 мл) с соком лайма (25 мл) и\nсиропом агавы (15 мл). Коктейль процеживается\nв жестяную банку, на которой при желании можно\nсделать красту из крупной морской соли, и он\nукрашается лаймом.\n\nЭк зотик а 301", "Ф и е с та Л ат и н а\nТекила восход\nTequila Sunrise\nКоктейль «Текила Восход» – настолько же красив, насколько и вкусен. Он пользуется большой\nизвестностью: причем скорее – среди любителей, чем у миксологов. Декадентский вкус и скандальная история навсегда сделали его символом своей эпохи. Вместе с «Кричащим оргазмом», «Лонг\nАйленд Айсед Ти» и прочими «Комфортабельными отвертками», он относится к коктейлям того доконформистского периода, пока еще своего рода единомыслие не завладело всей нашей планетой.\nВ упрощенном виде история успеха «Текилы Восход» сводится к следующему. Восходящий к 1930-м\nгодам коктейль был популяризирован музыкантами «Роллинг Стоунз» в ходе их психоделических\nгастролей по Америке в 1972 году. Это было разгульное турне со всеми излишествами, получившее\nназвание «Cocaine and Tequila Sunrise Tour».\nВ начале этих легендарных гастролей Мик Джаггер впервые попробовал «Текилу Восход» в «Тридентбаре» в Саусалито, к северу от Сан-Франциско, где был организован вечер с журналистами. Этим\nвечером Мик Джаггер заказал «Маргариту». Но здешний бармен по имени Бобби Лазофф поинтересовался, если тот уже пробовал «Текилу Восход». «Нет», - ответил музыкант. «Тогда я вам ее приготовлю», - сказал Бобби. Мику Джаггеру понравился коктейль, и с того дня «Текила Восход» сопровождала «cтоунов» во время всех их гастролей по Америке. Вместе с кокаином и ЛСД, разумеется.\nЧто касается происхождения коктейля, то положение вещей немного усложняется. Как и многие другие\nкоктейли «Текила Восход» – это единение рецепта и названия. Название «Sunrise Tequila» впервые появляется в 1930-е годы в буклете мексиканского отеля Agua Caliente, который был открыт во время сухого\nзакона для американской клиентуры и располагался рядом с Тихуаной. Представленный в качестве\n«божественного напитка», коктейль был инспирирован традицией пить сок агавы на восходе солнца во\nвремя ацтекских ритуалов. Его рецепт, кроме текилы, включал сок лайма, Гренадин, черносмородиновый ликер и содовую. Тем не менее, современный рецепт «Текилы Восход» происходит, скорее всего,\nиз английского сборника коктейлей «Café Royal Cocktail Book» (1937 год), в котором его «укороченная»\nверсия называлась «Халиско». Получается, что современная версия интересующего нас коктейля – это\n«Халиско» поданный в виде лонг дринка в бокале хайбол, причем под именем «Текила Восход».\n\nПИско сауэр\n\nКлассика\n\nPisco Sour\nЕсли чилиец затронет с перуанцем тему писко, можете не сомневаться,\nразговор в баре будет на повышенных тонах. Но если, к несчастью, вы заговорите о «Писко сауэре», вам придется спрятаться за стойку!\nНазвание «писко» происходит от перуанского портового города, но обе\nстраны считают его своим национальным напитком. В действительности,\nперуанский и чилийский писко отличаются друг от друга как итальянская\nграппа – от испанского бренди. В итоге вы получите два совершенно разных коктейля, в зависимости от того, какой из двух писко вы используете.\nПервый достоверный рецепт «Писко сауэр» (но еще без этого названия)\nвосходит к 1903 году, когда он был опубликован в кулинарной книге, вышедшей в Лиме. С 1921 года его подавали в «Моррис баре» в Лиме, и с тех\nпор он носит прославившее его название «Писко сауэр».\nСледует отметить, что перуанский «Писко сауэр» украшается тремя каплями биттера «Ангостура» или «Амарго Чунчо». В то время как в Чили его\nобычно подают без биттера.\n\n302 Эк зотик а\n\nНа 1 бокал\n\nТекила Olmeca Аltos Plata - 50 мл\nАпельсиновый сок - 110 мл\nСироп Гренадин - 10 мл\n\n1. В шейкер положить лед, налить текилу и\nсок.\n2. Взбить и отфильтровать в бокал хайбол.\n3. Добавить сироп, не размешивать.\n\nНа 1 бокал\n\nПиско - 60 мл\nСвежевыжатый сок лайма - 30 мл\nСахарный сироп - 30 мл\nЯичный белок - 15 мл\n\n1. Все ингредиенты основательно взбить в\nшейкере со льдом.\n2. Отфильтровать в бокал.\n3. Украсить ломтиком лайма.", "Ф и е с та Л ат и н а\nПалома\n\nPaloma\n\nКлассика\n\nНародные традиции – бесконечный источник вдохновения. Их сила в\nпростоте и правде, которая проверена временем. Все это относится и\nк вкусовым сочетаниям. Смешанный напиток «Палома» (в переводе «Голубка») – хорошая текила, цитрусовые и соль – мексиканский способ\nупотребления текилы, простой и изысканный, который распространился по всем барам мира.\nНа 1 бокал\n\nТекила Olmeca Altos Plata - 60 мл\nСвежевыжатый грейпфрутовый сок - 60 мл\nСвежевыжатый сок лайма - 10 мл\nСироп агавы - 10 мл\nСильногазированная вода - 40 мл (факультативно)\n\n1. На высоком бокале сделать красту из соли и\nрозового перца*.\n2. Все ингредиенты, кроме содовой, взбить в шейкере, заполненном льдом.\n3. Отфильтровать в подготовленный бокал. Добавить содовую.\n4. Украсить долькой грейпфрута.\n\n*К раста из соли и розового перца\n(на 200 г)\n\nКрупная морская соль - 100 г\nРозовый перец - 100 г\n\nРастолочь соль и перец при помощи\nпестика до правильной консистенции.\n\nГибиск ус Маргарита\nHibiscus Margarita\nНа 1 бокал\n\nТекила Olmeca Аltos Plata - 50 мл\nСвежевыжатый сок лайма - 25 мл\nДомашний сироп гибискуса - 20 мл\n\n1. В шейкере, заполненном льдом, взбить все\nингредиенты.\n2. Отфильтровать в охлажденный коктейльный бокал.\n3. Украсить перчиком чили.\n\n*С ироп гибискуса\n(на 1 литр)\n\nСушеные цветы гибискуса - 60 г\nСахар - 1 кг\nПоловинка перца чили\nВода - 700 мл\n\nСмесь сахара с водой держать на медленном\nогне до полного растворения сахара. Довести\nдо кипения и добавить гибискус и чили.\nДать настояться не менее 20 минут. После\nполного остывания процедить в заранее подготовленную бутылку.\n\nЭк зотик а 303", "Ф и е с та Л ат и н а\nК айпиринья\n\nКлассика\n\nCaipirinha\nНациональный бразильский коктейль «Кайпиринья» восходит к 19\nстолетию. На праздниках и похоронах рабы смешивали кашасу – местное спиртное из сахарного тростника – с фруктовыми соками и пряностями, получая в результате знаменитые Батидас («batidas»). Наиболее\nизвестной была Batida de limao с соком лайма. Она-то и стала предшественницей «Кайпириньи».\nВ 1918 году во время эпидемии «испанки» разнесся слух, что «Кайпириньи» из одного бара в Сан-Пауло защищают от вируса. Когда эпидемия\nстала сходить на нет, коктейлю приписали лекарственные свойства, и\nон сделался излюбленным напитком бразильцев.\nМощь лайма смягчает вкус алкоголя, поэтому «Кайпиринья» – коварный напиток, и пить ее следует с осторожностью. Бразильцы, со своей\nврожденной страстью к метафорам, говорят, что «Кайпиринья» – как\nженская грудь: одной недостаточно, а три – чересчур.\nКоктейль Caipirissima («Кайпириссима») готовится точно таким же образом, но с белым ромом. А коктейль Caipiroska («Кайпироска») содержит\nвместо кашасы водку.\nНа 1 бокал\n\nКашаса Leblon - 50 мл\nОдин лайм\nБурый сахар - две барные ложки\n\n1. Обрезать лайм с двух концов. Поставить его вертикально на один из обрезов (как\nбочонок) и разрезать вдоль на три части. Повернуть лайм на 90 градусов вокруг своей\nоси (оставляя в стоячем положении) и разрезать вдоль еще на три части. В результате\nу вас образовалось 9 длинных долек. Центральную дольку, содержащую горькую продольную\nбелую перегородку, выбросить.\n2. Положить кусочки лайма в бокал рокс, добавить сахар и все тщательно растолочь\nпестиком.\n3. Наполнить бокал дробленым льдом до края.\n4. Добавить кашасу и\nперемешать.\n5. Подавать с трубочками.\n\n304 Эк зотик а", "Т и к и - п л а н е та\n\nК\n\nогда америк анцы открыли д ля себя удовольс твия пу теше с твий , т уризма и войны , они привезли из да льних с тран\nра дос тные эк зотические с увениры , помогавшие им отрешить -\n\nс я от бана льнос ти с ущес твования . С ре ди этих с увениров – всевоз можных раковин , рыболовных се тей , амуле тов и с тат у эток – были\n\n«тики ». Тики появились на све т на П олинезийских или Гавайских\nос трова х и пре дс тавляют собой к аменные или деревянные с уще с тва - божес тва зага дочного вида . Л егенда гласит, что Тики созда л\nче ловек а . О н обла дае т сверх ъес тес твенными способнос тями . У\nнего тре угольное лицо на коротеньких ножк а х . Р от несоразмерно\nрас тяну т и вызывае т у ж ас , чтобы напугать противник а .\nП ервые тики - бары , вдохновленные этим образом , были открыты\nД оном Б ичкомбером в 1934 году, за ним пос ле дова л его а льтер эго\n– Трейдер В ик . Тики - бар с де ла лс я нас тоящим социа льным фено меном , и да же бар серьезнейшего лондонского «С авоя » в 1950- х\nгода х на к акое -то время превратилс я в тики - бар.\nВ тики - бара х с тат у этки с та ли играть роль с так анов д ля «М ай Тай »\nи «З омби », которые готовили бармены в цве тас тых руба ха х .\n«З омби » был нас только крепок , что Д он Б ичкомбер отк азыва лс я\nподавать более дву х кок тейлей на че ловек а . П отому что в против ном с лучае , выходя из бара , вы наверняк а буде те име ть на плеча х\nголову Тики .\nВ наши дни Тики громоподобно вернулись на сцену смешанных\nнапитков . Тики - кок тейли подают во множес тве баров . «Р езак по\nт уману », «С корпион », «Д ок тор Ф анк »... Э ти названия , противос тоят\n«А лександру », «М анхэт тену », «К ловер к лубу », которые эс таблиш мент потягивае т в кос тюме и га лс т уке , в то время к ак дерзкие тики кок тейли пьют в цве тас той руба хе или ... без руба хи , вообще .\n\nМай Тай\n\nКлассика\n\nMai Tai\n«Май Тай» создан в 1944 году Трейдером Виком, основателем американской сети баров-ресторанов в\nполинезийском стиле под названием «Trader Vic’s». Однажды Вик и его\nбармен вносили последние усовершенствования в придуманный\nВиком коктейль. В ресторан вошли\nдва посетителя, приехавшие из Таити. Вик предложил им попробовать\nкоктейль и высказать свое мнение.\nЭто «Mai Tai roa ae» – сказали они,\nчто значит «лучший, неземной». Так\nкоктейль получил свое название.\nВ «Май Тай» иногда добавляют\nликер Apricot Brandy или сироп\nГренадин. Часто его разбавляют\nананасовым соком, превращая в\nлонг дринк.\nНа 1 бокал\n\nРом Bacardi Carta Blanca - 25 мл\nРом Bacardi Carta Ora - 25 мл\nЛикер Orange Curaçao - 12.5 мл\nСироп «Миндаль» (Orgeat Syrup) - 20 мл\nСвежевыжатый сок лайма - 20 мл\n\n1. Все ингредиенты взбить в шейкере, заполненном льдом.\n2. Отфильтровать в бокал рокс, заполненный дробленым льдом.\n3. Украсить мятой, ломтиком апельсина и\nвишней.\n\nЭк зотик а 305", "Т и к и - п л а н е та\nСкорпион Боул\nScorpion Bowl\nЧто касается данного рецепта, то в своем\nсборнике «Book of Food and Drink» 1946 года\nТрейдер Вик рекомендует смешать ингредиенты с дробленым льдом и настоять в течение\nдвух часов. А при подаче добавить еще льда.\nУкрашать коктейль Трейдер Вик советует\nгардениями.\nСегодня «Скорпион Боул» обычно готовится в\nблендере, а при подаче может поджигаться.\nНиже приводится рецепт в версии Трейдера\nВика, в расчете на компанию из 4-6 человек.\nНадо сказать, что на сегодняшний день нет\nчетких правил относительно используемых\nингредиентов. Вы можете убрать из рецепта\nджин, вино или бренди, не использовать мяту\nили добавить ананасовый сок. Важно, чтобы\nостался ром. В том случае, если ваше вино –\nигристое, его не надо взбивать в блендере, а\nследует добавить в конце.\nВ парижском баре Dirty Dick, как и во многих\nдругих тики-барах, «Скорпион Боул» подается\nв чаше, называемой Volcano Bowl. Особенность\nэтой посуды заключается в наличии «кратера», возвышающегося посреди чаши. В этот\n«кратер» наливают ром повышенной крепости\nи поджигают его перед подачей.\nНа 4–6 порций\n\nРом Bacardi Carta Blanca - 250 мл\nДжин - 15 мл\nБренди - 15 мл\nСвежевыжатый лимонный сок - 120 мл\nСвежевыжатый апельсиновый сок - 60 мл\nСироп «Миндаль» (Orgeat Syrup) - 60 мл\nБелое вино - 90 мл\nМята - одна ветка\n\nСкорпион\nScorpion\nПоначалу существовавший в виде пунша, «Скорпион» впервые появляется в качестве индивидуального коктейля в сборнике рецептов Трейдера Вика «Trader Vic’s Pacific Island Cookbook» 1968\nгода издания.\nНа 1 бокал\n\nРом Bacardi Carta Blanca - 60 мл\nКоньяк - 30 мл\nСироп «Миндаль» (Orgeat Syrup) - 15 мл\nСвежевыжатый лимонный сок - 45 мл\nСвежевыжатый апельсиновый сок - 60 мл\n\n306 Эк зотик а\n\n1. Все ингредиенты взбить в блендере со\nльдом.\n2. Перелить в бокал хайбол.\n3. Украсить мятой и ломтиком апельсина.\n4. Подавать с трубочками.\n\n1. Ингредиенты взбить в блендере со льдом.\n2. Перелить в чашу для пунша.\n3. Подавать с трубочками.", "Т и к и - п л а н е та\nСуизл «Королевский Парк»\nQueen’s Park Swizzle\nКоктейль был придуман в 1920-е годы в\nтринидадском отеле Queen’s Park Hotel. Позднее\nон был взят на заметку Трейдером Виком,\nкоторый в своей книге «Trader Vic’s Book of Food\n& Drink» (1946 год) назвал его «всемирно известным напитком», а также «самой восхитительной формой анестезии».\nНа 1 бокал\n\nПоловина крупного лайма\nМятные листья\nРом Bacardi Carta Blanca - 90 мл\nБиттер Ангостура - два дэш\nСироп Демерара - 15 мл\n\n1. В бокал хайбол отжать сок из половинки\nлайма.\n2. Опустить в бокал кожуру лайма и мяту.\nНалить остальные ингредиенты. Положить\nдробленый лед. Перемешать при помощи\nметода «суизл».\n3. Добавить дробленый лед до верха бокала.\nУкрасить веточкой мяты.\n\nРезак по т уману\nFog Cutter\n«Некоронованный король экзотических напитков» за авторством Трейдера Вика, который он\nрекомендует подавать с трубочками и двумя\nтаблетками аспирина.\nТрейдер Вик. «Trader Vic’s Book of Food & Drink»,\n1946 год.\nНа 1 бокал\n\nРом Bacardi Carta Blanca - 60 мл\nКоньяк - 30 мл\nДжин - 15 мл\nСироп «Миндаль» (Orgeat Syrup) - 15 мл\nСвежевыжатый лимонный сок - 60 мл\nСвежевыжатый апельсиновый сок - 30 мл\nХерес (для флоат)\n\nТрейдер В ик\nТрейдер Вик (1902-1984), его настоящее имя – Виктор Жюль Бержерон, является основателем сети баров-ресторанов «Trader Vic’s» в полинезийском стиле.\nОн создал такие известные коктейли, как Mai Tai, Scorpion, Fog Cutter, Montego Bay...\n\n1. Все ингредиенты, кроме хереса, взбить в\nшейкере со льдом.\n2. Перелить вместе со льдом в тики-кружку.\n3. Добавить лед в бокал и сверху налить\nхерес.\nЭк зотик а 307", "Т и к и - п л а н е та\nПогибе ль Миссионера\nMissionary’s Downfall\nЭтот коктейль Дон Бичкомбер создал в районе\n1940-х годов.\nРецепт из сборника Джеффа Берри «Beachbum\nBerry Remixed», 2010 год.\nНа 1 бокал\n\nCвежевыжатый сок лайма - 15 мл\nПерсиковый ликер - 15 мл\nМедовый сироп - 30 мл\nРом Bacardi Carta Blanca - 30 мл\nСвежий ананас, порезанный кусочками - 60 г\nПолстакана плотно уложенной свежей мяты\n\n1. Все ингредиенты взбить в блендере с\nдробленым льдом.\n2. Перелить в чашу для шампанского или в\nтики-кружку.\n3. Украсить веточкой мяты и ломтиком\nананаса.\n\nД он Б ичкомбер\nДон Бичкомбер (1907-1989), его настоящее имя\n– Эрнест Раймонд Бомон Гэнт, во время сухого\nзакона занимался контрабандой рома.\nВ 1930-е годы открыл свой первый бар на улице\nМакКэдден в Голливуде, где бывал сам Чарли Чаплин. Был дружен с Трейдером Виком, но позднее\nих пути разошлись, и они открыли конкурирующие\nсети баров-ресторанов.\nДон Бич создал более 70 коктейлей. Самые известные из них: Zombi, Doctor Funk, Missionary’s\nDownfall, QB Cooler, Royal Daiquiri...\n\n308 Эк зотик а", "Т и к и - п л а н е та\nЗомби\n\nКлассика\n\nZombie\nТоржественное возвращение\n«Зомби» в бары связано с возрождением моды на тики-коктейли. Его\nпервоначальный рецепт был настоящей бомбой, потреблять которую\nследовало с предельной осторожностью. Говорят, что создатель\nкоктейля – Дон Бичкомбер – был\nчрезвычайно озабочен сохранением в тайне своих рецептов. Его\nбармены получали их в зашифрованном виде вместе с бутылками\nпредварительно приготовленных\nсложных смесей, которые были помечены лишь буквами и цифрами.\nОсобенно тщательно он охранял\nрецепт своего самого зловещего\nтворения – «Зомби» и, по всей видимости, унес его с собой в могилу.\nСегодняшние бармены предлагают\nсобственные вариации «Зомби», по\nих мнению, наиболее приближенные к оригиналу.\nНа 1 бокал\n\nРом Bacardi Carta Blanca - 45 мл\nТемный ямайский ром - 30 мл\nТемный ром повышенной крепости - 15 мл\nЛикер Apricot Brandy - 15 мл\nАнанасовый сок - 30 мл\nСок одного лайма\nСок половины апельсина\nСахар - две барные ложки\nСироп «Маракуйя» - 30 мл\nСироп Гренадин - дэш\n\n1. Все ингредиенты, кроме рома повышенной\nкрепости и Гренадина, взбить в шейкере,\nзаполненном льдом.\n2. Отфильтровать в бокал хайбол, наполненный дробленым льдом. Налить Гренадин,\nперемешать. При необходимости добавить\nдробленый лед.\n3. Сверху налить ром повышенной крепости\n(флоат). Украсить ломтиком апельсина и\nвишней.\nПодача «Зомби» в баре Dirty Dick, Париж.\n\nЭк зотик а 309", "Т и к и - п л а н е та\nНейви Грог\nNavy Grog\nВ плавании матросы английского флота ежедневно получали полпинты рома. Крепость напитка влияла на дисциплину. В середине 18 века адмирал Вернон, прозванный «Старым грогом»,\nраспорядился разбавлять ром четырьмя мерами воды. Матросы окрестили новый напиток\n«грогом».\nЧто касается данного рецепта, то он был создан Доном Бичкомбером в начале 1940-х годов.\nЕго особенностью является кусок льда в форме конуса, через который вставлена трубочка.\nПока вы через нее потягиваете коктейль, лед постепенно тает и разбавляет изначально крепкий напиток, как бы воздавая дань традициям, введенным английским адмиралом.\nНа 1 бокал\n\nРом Bacardi Carta Blanca - 20 мл\nТемный ямайский ром - 20 мл\nЗолотистый ром из Демерары - 20 мл\nМедовый премикс (1 часть меда на 1 часть воды) - 20 мл\nСвежевыжатый сок лайма - 7.5 мл\nСвежевыжатый сок белого грейпфрута - 7.5 мл\nСодовая вода - 7.5 мл\n\n1. Все ингредиенты, кроме содовой, основательно взбить в шейкере.\n2. Отфильтровать в широкий бокал рокс.\n3. Сбрызнуть содовой.\n4. Вставить в бокал ледяной конус с трубочкой.\nПодача «Пупуле» в баре Smuggler's Cove,\nСан-Франциско.\n\nПупуле\nPupule\nPupule – по-гавайски: сумасшедший, дикий.\nЭто один из ранних коктейлей Дона Бичкомбера, созданный в 1930-е годы.\nНа 1 бокал\n\nСвежевыжатый сок лайма - 30 мл\nСвежевыжатый апельсиновый сок - 30 мл\nВанильный сироп - 15 мл\nСироп из корицы - 15 мл\nЛикер из ямайского перца - 15 мл\nРом средней выдержки - 60 мл\nБиттер Ангостура - дэш\n\n1. Взбить ингредиенты в шейкере, заполненном льдом.\n2. Отфильтровать в бокал хайбол, заполненный дробленым льдом.\n3. Украсить длинным твистом из апельсиновой цедры и веточкой мяты.\n\n310 Эк зотик а\n\nДжефф «Бичбум» Берри продает специальное приспособление, которое\nпозволяет изготавливать ледяные\nконусы для коктейля Navy Grog.\nЭто металлический стакан, который\nнадо плотно заполнить очень мелко\nраздробленным льдом. С помощью\nдругой детали лед протыкается\nвдоль по центру, чтобы получился\n«туннель» для трубочки. Образовавшийся конус аккуратно достается из\nстакана и помещается в морозилку\nна несколько часов, чтобы превратиться в единую глыбу со сквозным\nотверстием, в которое вставляется\nтрубочка.\nЕсли в вашем арсенале отсутствует\nэтот тики-девайс, можно воспользоваться обычным бокалом конусообразной формы.", "Т и к и - п л а н е та\nТи пунш\n\nПунш Плантатора\n\nTi Punch\n\nPlanter’s Punch\n\n«Ти пунш» (в переводе – «пуншик», ибо «ти» по-креольски – «маленький») родился на Французских Антилах. Кроме того, он распространен на острове Реюньон и во Французской Гвиане.\nРом, сахар и сок лайма смешивают друг с другом. Следуя французской традиции, используется\nсельскохозяйственный ром, то есть ром из сока сахарного тростника, а не из патоки.\nНе следует путать Ti Punch с Tea Punch – историческим чайным пуншем, который часто подают\nв горячем виде!\n«Ти пунш» находится где-то на полпути между семейными традициями и миксологией.\nСуществует не один способ его приготовления. Каждый житель Антильских островов способен\nсделать «Ти пунш». Чаще всего ингредиенты и стаканы просто ставят на стол и каждый готовит\nсебе «Ти пунш» сам. Пол-лайма разрезают на четыре части. Бросают их в стакан, одновременно\nотжимая из них сок. Добавляют сахар и хорошо перемешивают. Наконец, наливают ром. Смесь\nпьют, время от времени перемешивая ее. Некоторые, но их мало, добавляют в «Ти пунш» немного льда или воды, чтобы смягчить жгучесть напитка.\nВместе с тем, существуют и другие более изысканные варианты «Ти пунша», как представленный ниже семейный рецепт, рассчитанный на четыре стакана.\n\n«Пунш Плантатора» – это прадедушка всех\nсегодняшних коктейлей. На Антильских островах каждая семья имеет собственный рецепт\nнапитка, который передается из поколения\nв поколение. Вариации «Пунша Плантатора»\nбесконечны. Рассмотрим одну из них. Это очень\nпростой рецепт Международной ассоциации\nбарменов. Он содержит только основные\nингредиенты, без которых нельзя обойтись, и\nможет послужить отправной точкой для вашего\nвоображения.\n\nНа 4 порции\n\nСельскохозяйственный ром - 250 мл\nОдин лайм\nКорица\nВаниль – небольшой стручок (порезать на кусочки)\nБурый тростниковый сахар - четыре полные чайные ложки\n\n1. Разрезать лайм на четыре части. Отжать каждую четвертинку в миску и опустить их\nтуда же. Размять немного кусочки лайма на дне миски мадлером.\n2. Добавить в миску небольшой кусочек корицы, ваниль и сахар.\n3. Налить в миску немного (50 мл) сельскохозяйственного рома, можно выдержанного.\n4. Хорошо перемешать и дать настояться 15-30 минут.\n5. Перед подачей в каждый стакан налить четверть настоявшейся смеси из миски и добавить ром (50 мл).\n6. Сервировать с небольшой ложкой или палочкой, чтобы можно было время от времени\nперемешивать содержимое стакана.\n\nНа 1 бокал\n\nТемный ром - 60 мл\nСвежевыжатый лимонный сок - 30 мл\nСироп Гренадин - 10 мл\nБиттер Angostura - дэш\nМинеральная вода без газа - 50 мл\n\n1. В бокал рокс положить лед, налить лимонный сок, ром, биттер и сироп.\n2. Перемешать и добавить воду.\n3. Украсить ломтиком лимона или апельсина.\n\nЭк зотик а 311", "Ураган\nHurricane\nЕще один коктейль, который завоевал весь мир из Нового Орлеана. Как ни удивительно, но лучшие\nверсии «Урагана» подают не в Новом Орлеане, где приготовление этого коктейля сделалось сродни\nпромышленному, а например в Сан-Франциско, где рвение миксологов помогает сохранить его\nвкус.\nЭтот коктейль, судя по всему, относится примерно к 1940 году, когда его придумал Луис Каллинген,\nшеф-бармен знаменитого новоорлеанского бара «Пэт О’Брайенс». Как говорят, это случилось под\nдавлением торговцев спиртным, имевших в своем распоряжении мало виски и желавших в первую\nочередь распродать ром.\nВ результате, чтобы приобрести ящик виски, требовалось купить заодно еще и ящик рома. Так\nродился коктейль, обязанный своим успехом, кроме всего прочего, необычному бокалу, в котором\nего подают. Поговаривают, что это сам Пэт О’Брайен придумал для этого коктейля бокал в виде\nштормового фонаря и дал коктейлю его название.\nБар Пэта О’Брайена до сих пор остается одним из притягательных мест Нового Орлеана. Он был\nоснован в 1933 году, сразу же после отмены сухого закона на месте спикизи Пэта О’Брайена, а затем\nпереехал по адресу Сент Питер стрит, 718, где и находится по сей день.\n\n312 Эк зотик а\n\nНа 1 бокал\n\nРом Bacardi Carta Negra - 50 мл\nРом Bacardi Carta Ora - 35 мл\nСвежевыжатый лимонный сок - 60 мл\nСироп «Маракуйя» - 60 мл\n\n1. Взбить ингредиенты в шейкере с большим\nколичеством дробленого льда.\n2. Перелить (не отфильтровывая) в бокал\nслинг. При необходимости добавить дробленый лед.", "Т и к и - п л а н е та\nПинья Колада\n\nКлассика\n\nPiña Colada\nПо всей видимости, этот коктейль был создан 15 августа 1954 года в баре\n«Бичкомбер» отеля «Карибе Хилтон» в городе Сан-Хуане, в Пуэрто-Рико\nлегендарным барменом Рамоном «Мончито» Марреро. Задавшись целью\nсоздать напиток «с изюминкой», он использовал три местных продукта:\nлегкий ром, свежий ананас и кокосовый орех. С тех пор «Пинья Колада»\nстала национальным напитком Пуэрто-Рико.\nЛучшая «Пинья Колада» получается при использовании свежего молока\nнезрелого кокосового ореха. Вскройте орех, вылейте молоко в блендер,\nзатем выскребите всю мякоть и добавьте ее к молоку. Взбивайте несколько\nминут, пока смесь не достигнет консистенции сливок.\nДобавляя свежий банан и сахарный сироп, получаем коктейль Banana\nColada. Piña Colada без алкоголя называется «Вирджин колада».\nНа 1 бокал\nРом Bacardi Carta Blanca - 50 мл\nКокосовое молоко - 37,5 мл\nАнанасовый сок - 25 мл\nАнанас - 3-4 кусочка\nСахар - три барные ложки\n\n1. В блендер положить полбокала дробленого\nльда и налить ингредиенты.\n2. Взбить в течение 15 секунд и перелить в\nбокал слинг.\n3. Украсить ломтиком и листьями ананаса.\n\nСингапур с линг\nSingapore Sling\n«Сингапур Слинг» был придуман в 1913 году барменом по имени Нгьям Тонг Буун в «Лонг баре» знаменитого сингапурского отеля « Раффлс», который в свое время посещали такие известные писатели, как Джек\nЛондон, Сомерсет Моэм и Джозеф Конрад.\nЭтот коктейль – символ Азии, его даже подают на рейсах Сингапурских авиалиний. Он все еще\nзаставляет мечтать тех, кто страдает от недостатка экзотики. Возможность попробовать его в\nроскошной обстановке отеля «Раффлс» уже оправдывает и перелет, и смену часовых поясов. Тем\nне менее, прежде чем зарезервировать билет на самолет и заказать прямо на борту первый Слинг,\nследует учесть, что первоначальный рецепт Нгьям Тонг Бууна, к сожалению, был утерян. К 1936 году\nон был воспроизведен при помощи племянника бармена, а затем модифицирован. Ниже приводится рецепт «Сингапур Слинга», по которому он готовится в отеле «Раффлс».\nНа 1 бокал\n\nДжин Bombay Sapphire - 30 мл\nВишневый ликер - 15 мл\nАнанасовый сок - 120 мл\nСок лайма - 15 мл\nЛикер Bénédictine - 7,5 мл\nЛикер Cointreau - 7,5 мл\nСироп Гренадин - 10 мл\nБиттер Angostura - дэш\n\n1. В шейкер положить лед и налить ингредиенты.\n2. Взбить содержимое шейкера.\n3. Перелить в бокал слинг, предварительно\nнаполненный льдом.\n4. Украсить ломтиком ананаса и коктейльной вишней.\n\nЭк зотик а 313", "В 1950-х годах мода на экзотические коктейли\nбыла столь сильна, что даже чопорный\nAmerican Bar в лондонском отеле «Савой»\nперепрофилировался в тики-бар.\n\nПейнкиллер\n\nСиний гаваец\n\nPainkiller\n\nBlue Hawaiian\n\nЭто «обезболивающее средство» было создано\nв начале 1970-х годов в одном из баров на\nБританских Виргинских островах.\n\nАмериканская классика 1970-х годов.\n\nНа 1 бокал\n\nТемный ямайский ром - 60 мл\nСвежевыжатый апельсиновый сок - 30 мл\nКокосовые сливки - 30 мл\nСвежевыжатый ананасовый сок - 60 мл\n\n1. Ингредиенты взбить в блендере со льдом.\n2. Перелить в бокал хайбол или тики-кружку.\n3. Посыпать молотым мускатным орехом\nи корицей. Украсить ломтиком ананаса и\nвишней.\n\n314 Эк зотик а\n\nНа 1 бокал\n\nРом Bacardi Carta Blanca - 40 мл\nАнанасовый сок - 120 мл\nКокосовое молоко - 40 мл\nСиний ликер Blue Curaçao - 10 мл\n\n1. Взбить ингредиенты в шейкере, заполненном льдом.\n2. Отфильтровать в бокал слинг, заполненный дробленым льдом.", "Т и к и - п л а н е та\nДарк энд Сторми\n\nКлассика\n\nDark & Stormy\nОн появился на Бермудах, когда смешали три дорогих сердцу\nморяка ингредиента: ром, лайм и\nимбирный эль, который, как считалось, помогал от морской болезни.\nНазвание Dark and Stormy связывает\nбурю с темным цветом рома, и популярность его не иссякает. На Бермудах, где он в какой-то мере является\nнациональным коктейлем, его готовят на роме Gosling Black Seal.\nНа 1 бокал\n\nТемный
