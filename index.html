м\nалкоголем. Основным конкурентом бренди стал виски, и в результате\nпоявился «Виски Cауэр».\nСуществуют и другие сауэры которые, как и «Виски сауэр», носят название базового напитка. Например – «Писко Сауэр».\nС другой стороны, есть коктейли, которые, будучи обычными сауэрами, имеют другие названия: например, «Дайкири», который вполне\nможно считать «Ром сауэром».\nЕсть также более сложные варианты сауэров. «Сайд Кар» (с коньяком), «Маргарита» (с текилой) и «Белая леди» (с джином) – наиболее\nпростые и известные сауэры, приготовленные на основе различных\nспиртных напитков.\nВозвращаясь к «Виски сауэру», следует сказать, что само его имя (а\nименно Whiskey через «e») указывает на то, что он готовится с американским виски, в частности с бурбоном.\nЕсли добавить к нему дэш яичного белка, чтобы пена получилась\nболее тонкой и стойкой, то он будет называться «Бостон сауэр».\nСауэр относится к великой классике. Невозможно\nпридумать что-либо более академичное, чем сочетание кислого и сладкого. Поскольку этот коктейль содержит крайне мало ингредиентов, следует\nуделить особое внимание выбору виски, так как его\nхарактеристики в сауэре выйдут на первый план.\nНа 1 бокал\n\nСахарный сироп - 15 мл\nСвежевыжатый лимонный сок - 15 мл\nБурбон - 40 мл\n\n1. Положить в шейкер лед и налить ингредиенты.\n2. Взбить содержимое шейкера.\n3. Отфильтровать в охлажденный коктейльный бокал или в бокал рокс.\n4. Украсить коктейльной вишней и цедрой\nлимона (или долькой цитруса).\n\nЯпонский\nJapanese\nВпервые рецепт этого коктейля был опубликован в 1862 году в первом гиде «The Bartender's\nGuide» Джерри Томаса. Коктейльный историк\nДэвид Уондрич высказывает гипотезу о том,\nчто это, может быть, один-единственный\nрецепт, в действительности, придуманный великим миксологом. Не подписываясь под этим\nпредположением, тем не менее, можно заметить, что Japanese, в душе своей, – это очень\n«томасовский» коктейль. Сочетание коньяка,\nбиттера и сиропа из оршада, как нельзя лучше,\nотвечает понятию «коктейль», которое существовало в 19 столетии. Напиток был создан\nпо случаю приезда в Нью-Йорк одной делегации из Японии. Кстати, это первый рецепт, в\nкотором используется сироп из оршада. Можно\nслегка уменьшить его количество в рецепте,\nчтобы лучше соответствовать современному\nвкусу.\nНа 1 бокал\n\nКоньяк - 60 мл\nСироп «Миндаль» (Orgeat Syrup) - 15 мл\nБиттер Angostura - два дэш\n\n1. В шейкер положить лед и налить ингредиенты.\n2. Взбить и отфильтровать в охлажденный\nкоктейльный бокал.\n3. Украсить твистом из лимонной цедры.\n\n242 Americ an Bar", "С та р ы й - д о б р ы й о л д с к у л\nБлю Блейзер\nBlue Blazer\nО Джерри Томасе ходит масса более или менее правдоподобных анекдотов. Рассказывают, что\nоднажды в Сан-Франциско одна банда напала на ресторан «Эльдорадо», где он работал. Джерри\nневозмутимо поинтересовался у гангстеров, не желают ли они чего-нибудь выпить прежде, чем\nприступить к исполнению своих злых намерений. Гангстеры соблазнились, но после первого же\nглотка смеси, которую им приготовил бармен, без сил попадали на пол, и без сопротивления сдались подоспевшей полиции! Именно в «Эльдорадо» Джерри придумал «Блю Блейзер», пользовавшийся оглушительным успехом по всему тихоокеанскому побережью. Через несколько лет Джерри\nТомас, которого уже именовали «Профессором», приготовил «Блю Блейзер» для президента Гранта.\nПоследний был столь впечатлен, что в ответ угостил бармена сигарой. Под занавес карьеры Джерри\nнастолько надоело готовить исключительно «Блю Блейзеры», что он объявил этот коктейль зимним\nи подавал его только в те дни, когда температура на улице опускалась ниже -10°C. В наше время вне\nзависимости от погоды «Блю Блейзер» готовят лишь в нескольких барах, хранящих память об отце\nмиксологии. Приготовление его сложно и связано с огнем. Поэтому оно представляет опасность для\nбармена, для заведения, для здания и для всего квартала...\n\nШампань-кок тейль\n\nНа 1 бокал\n\nШотландский виски Dewar's - 60 мл\nСахарный песок - две барные ложки\nКипящая вода - 60 мл\n\n1. Подогреть два металлические чашки. В\nодну налить кипяток. В другую – виски. Поджечь его. Перелить горящий виски в чашку\nс кипятком и обратно. Так несколько раз.\nПогасить пламя, накрыв чашку с горящим\nнапитком другой пустой чашкой.\n2. Добавить сахар и перелить в кружку. Украсить твистом из лимонной цедры.\n\nКлассика\n\nChampagne Cocktail\nИз всех коктейлей с шампанским\nнаиболее знаковым и распространенным является «Шампанькоктейль». Это великая классика,\nстоящая в одном ряду с «Минт\nДжулепом», «Манхэттеном» и им\nподобными. Этот коктейль полностью сохраняет целостность\nшампанского, придавая ему особый\nяркий характер.\nЭто один из наиболее старинных\nсмешанных напитков. Некоторые\nисследователи относят его появление к началу 1800-х годов. Название коктейля впервые появляется\nв справочнике, опубликованном\nДжерри Томасом в 1862 году. Оригинальный рецепт, включающий\nшампанское, а также сахар, пропитанный биттером, и цедру лимона,\nпросуществовал в первоначальном\nвиде до середины 20 века.\nВ 1948 году выдающийся американский автор книг о спиртных\nнапитках Дэвид Эмбери поднимает\n\nскандал и резко выступает против попыток испортить хорошее\nшампанское добавлением сахара,\nпропитанного или нет биттером.\nВозможно, именно после этой\nатаки появился видоизмененный\nрецепт. Какой-то смекалистый английский бармен догадался ввести\nв состав коктейля коньяк.\nЭто была мудрая идея, и остается только гадать, почему она не\nпришла никому в голову раньше.\nВерсия «Шампань-коктейля» с коньяком стала классической. Вместе с тем, в Соединенных Штатах\n«Шампань-коктейль» продолжают\nготовить по первоначальному рецепту, то есть без коньяка.\n\n1. Пропитать сахар бит­т ером Angostura и\nпо­л о­ж ить его на дно охлажденного фу­ж е­р а\nдля шампанского.\n2. До­б а­в ить коньяк и шам­п ан­с кое.\n\nНа 1 бокал\n\nОх­л аж ­д ен­н ое шам­п ан­с кое - 100 мл\nКоньяк - 20 мл\nБит­т е­р Angostura - дэш\nКусочек бурого сахара\n\nAmeric an Bar 243", "С та р ы й - д о б р ы й о л д с к у л\nкаменный забор\n\nШерри Кобблер\n\nТом и Джерри\n\nStone Fence\n\nSherry Cobbler\n\nTom & Jerry\n\nРецепт этого смешанного напитка опубликован\nв первом справочнике Джерри Томаса в 1862\nгоду. В качестве основы Томас использует\nбурбон.\nВместе с тем считается, что Stone Fence подавался в американских тавернах и салунах еще в\nначале 19 века.\nСовременный коктейльный историк Дэвид\nУондрич относит Stone Fence к еще более\nдавнему периоду, связывая его появление с\nбитвой у форта Тикондерога в 1775 году. Тогда\nамериканские колонисты отбили у англичан\nэто стратегическое каменное сооружение, а\nсмесь темного рома и сидра использовалась в\nкачестве разъяряющего средства.\n\nКобблеры восходят, по-видимому, к началу\n19 столетия. Говорят, что они получили свое\nназвание от маленьких «cobbles», то есть\n«камешков» льда, которые входят в их рецепт.\nТоже говорят, что кобблеры были очень популярны в свое время, а «Шерри-кобблер»\nбыл и вовсе настоящей звездой. Почему? Все\nпросто. Кобблеры были не только восхитительны, но также включали забавное нововведение:\nтрубочку.\nДжерри Томас. «The Bartender’s Guide», 1862 год.\n\nСчитается, что этот коктейль был изобретен\nДжерри Томасом примерно в 1850 году, когда\nтот работал в отеле «Плантерс Хаус» в СентЛуисе, штат Миссури. Он назвал коктейль\n«Копенгаген» в честь датчан, ценивших такого\nрода смеси. Но это абсурдное имя не прижилось. Клиенты предпочитали называть напиток\n«Джерри Томас», и скоро он превратился в «Том\nи Джерри». Поэтому он не имеет никакой связи\nсо знаменитым мультфильмом, который начали\nснимать только в 1940 году. «Том и Джерри» –\nзимний напиток, согревающий и подкрепляющий в холодную погоду. Джерри Томас подавал\nего лишь после выпадения первого снега.\n\nНа 1 бокал\n\nБурбон или темный ром - 45 мл\nСидр\n\n1. В высокий бокал положить лед.\n2. Налить спиртное и сидр.\n3. Слегка перемешать.\n\nНа 1 бокал\n\nХерес Medium Dry - 120 мл\nСахарный сироп - барная ложка\nСвежевыжатый апельсиновый сок - 15 мл\nАпельсиновый биттер - дэш (факультативно)\n\n1. Взбить ингредиенты в шейкере с дробленым льдом.\n2. Не отфильтровывая, перелить в хайбол.\n3. Украсить сезонными ягодами. Подавать с\nтрубочками.\n\nАссортимент американских виски в новоорлеанском баре Tujague's.\n\n244 Americ an Bar\n\nНа 1 бокал\n\nЯйцо (отделить белок от желтка)\nЯмайский ром - 40 мл\nСахарный песок - две барные ложки\nЩепотка корицы и молотой гвоздики\nКипяток - 70 мл\n\n1. Белок взбить до образования пены.\n2. Желток перемешать с сахаром и специями.\n3. В жароустойчивый бокал налить желтковую смесь и ром, перемешать. Залить\nкипятком. Перемешать. Разместить на\nповерхности бокала взбитый белок.", "G o l d e n A g e (конец 1860 -х – 1919)\n\nЗ\n\nолотой век – это основа основ современной кок тейльной\nк ульт уры . «М анхэт тен », «А виация », «Д рай М артини », «К ловер\n\nК лаб »... С писок кок тейлей тех времен , которые и сегодня ничу ть\nне у тратили своей ак т уа льнос ти , бесконечен . К ок тейли З олотого век а\nсодерж ат в себе все компоненты миксологии . Б а ланс ме ж ду с ла дким и\nкис лым , ме ж ду горечью и с ла дос тью ...\nВ ходе кок тейльной революции нача ла 2000-х годов бармены обрати лись именно к кок тейлям З олотого век а , чтобы придать новый им пульс своей технике и творчес тву. Ч ерпа я вдохновение из тех кок тей лей , бармены с уме ли положить нача ло новому,\nсегодняшнему З олотому век у.\n\nГарри Д жонсон\nП реподаватель\nбарного искусства\nО Гарри Джонсоне мало что известно, хотя он и оставил, вероятно, самый заметный след в барной культуре.\nГарри Джонсон начал работать в Сан-Франциско, затем открыл бар в Чикаго, который сделался одним из наиболее\nизвестных в Соединенных Штатах. Его бар сгорел в октябре\n1871 года во время страшного пожара, опустошившего город\nза два дня. Этот пожар Соединенные Штаты запомнили, как\nодну из самых тяжелых катастроф 19 столетия.\nРазоренный дотла, Гарри Джонсон начал новую жизнь. Вначале он работал в нескольких гранд-отелях, а затем путешествовал по всему миру, особенно по Европе, приобщая профессионалов к тайнам смешивания напитков.\nГарри Джонсон представлялся как «преподаватель искусства\nсодержания бара» и посвятил свою жизнь распространению\nзнаний. Педантичный, точный, чрезвычайно строгий, он был\nнастоящим прототипом профессионального бармена.\nВсе свои знания Гарри Джонсон вместил в «Учебник бармена\nГарри Джонсона» («Harry Johnson’s Bartender’s Manual»), который по своему содержанию и качеству признан наиболее\nзначительным произведением, когда-либо написанным для\nпрофессионалов бара. В наше время цена первого издания\nэтой книги (1882 год) с легкостью взлетает выше 3000 долларов, если, конечно, вам посчастливится его найти.\nПодобно Анри Матиссу, самостоятельно анализировавшему свое творчество, Гарри Джонсон был первым и лучшим\nобозревателем профессии бармена. Его советы остаются и в\nнаше время удивительно актуальными.\n\nAmeric an Bar 245", "G o l d e n A g e (конец 1860 -х – 1919)\nОлд Фешенд («Старомодный»)\n\nКлассика\n\nOld Fashioned\n«Старомодный» начал свою жизнь под названием «Виски коктейль». Однако к концу 19 столетия его способ приготовления – смешанный и поданный в том же самом стакане – посчитали устаревшим, и коктейль был\nпереименован. Считается, что произошло данное событие в «Пенденнис\nклубе» в городе Луисвиль, штат Кентукки.\nПозже «Олд Фешенд» был одним из знаковых коктейлей эпохи сухого закона. В тот период его принялись смешивать с разными раздавленными\nфруктами, чтобы заглушить привкус некачественного спиртного. Кроме\nтого, его испокон веков портили всякого рода дополнительными ингредиентами, такими как ликер «Кюрасао», мускатный орех и даже абсент.\nНо оригинальный рецепт во всей его простоте и утонченности выстоял, пережив неуважительное обхождение. Поэтому, когда в 2000-х годах\nспикизи вошли в моду, «Старомодный» появился вновь, более модный чем\nкогда-либо.\nДругой важной причиной его успеха было то, что подобно «Космополитену», ставшему популярным благодаря сериалу «Секс в большом городе»,\n«Старомодный» достиг сияющих вершин продаж с помощью сериала «Безумцы», где он был излюбленным напитком героев.\nЧасто утверждают, что «Олд Фешенд» – один из редких коктейлей, возвеличивающих вкус виски. Качественный «Старомодный» действительно\nподчеркивает вкус ржаного виски или бурбона, и его можно «твистить»\nдо бесконечности. Важно подобрать оптимальную дозировку сахара,\nпоскольку для вкуса коктейля избыток сладости столь же пагубен, как и\nнедостаток.\nВажный компонент «Старомодного» – это лед. Современная тенденция\nсостоит в использовании ледяных шаров (ice ball). Лед должен таять медленно, а коктейль постепенно эволюционировать, превращаясь из очень\nсухого в практически лонг дринк.\nНекоторые бармены добавляют в коктейль дэш газированной воды. Это\nсвятотатство. Но оно достаточно распространено, так как делает напиток\nменее крепким и более освежающим.\nКроме того, «Старомодный» содержит фрукты. Появившаяся в период\nсухого закона вишня «Мараскино» до сих пор в моде, особенно в Соединенных Штатах. Но, в принципе, пуристы признают в этом коктейле лишь\nапельсиновую цедру.\nСегодня «Старомодного» готовят не только на основе бурбона, но и на\nдругом алкоголе. В этом случае меняется вся ароматическая гамма коктейля. Чаще всего используют шотландский виски, коньяк, а также ром,\nкоторый в последние годы особенно востребован. Также применяют текилу, мескаль и даже джин. Иногда, чтобы заменить сахар, добавляют сироп\nсахарного тростника (для рома), сироп агавы (для текилы или мескаля) и\nдаже кленовый сироп и некоторые ликеры, например, St-Germain. Короче\nговоря, «Старомодный» всегда был коктейлем, разжигавшим воображение\nбарменов, что позволит ему и в дальнейшем оставаться на гребне моды!\n\n246 Americ an Bar\n\nНа 1 бокал\n\nБурбон - 50 мл\nНебольшой кусочек сахара\nБиттер Angostura - 2-3 дэш\n\n1. На дне бокала олд фешенд пропитать\nсахар биттером и раздавить его обратной\nстороной барной ложки.\n2. Добавить кубик льда и 15 мл бурбона.\nОсновательно перемешать.\n3. Повторить операцию еще два раза.", "G o l d e n A g e (конец 1860 -х – 1919)\nБиж у\nBijou Cocktail\nВысокая классика, созданная в 1870-х годах.\nДжин символизирует бриллиант, красный\nвермут – рубин, а зеленый ликер Шартрез –\nизумруд. Это легендарный коктейль, который\nвводит нас в современную коктейльную эпоху,\nдемонстрируя всю миксологичность вермута.\nЕго лучший рецепт приводится в сборнике Гарри\nДжонсона.\nСовременные миксологи часто заменяют\nзеленый Шартрез на желтый, получая более\nокруглый и нежный напиток.\n\nГлобализация коктейлей\n\nНа 1 бокал\n\nДжин - 45 мл\nКрасный вермут Martini Rosso - 22.5 мл\nЗеленый ликер Chartreuse - 15 мл\nАпельсиновый биттер - дэш\n\n1. Перемешать ингредиенты в стакане для\nсмешивания, заполненном льдом.\n2. Отфильтровать в охлажденный коктейльный бокал.\n3. Отжать в коктейль полоску лимонной\nцедры и опустить ее в бокал.\n\nРазвитие транспортных сообщений, в частности появление трансатлантических линий,\nсыграло важную роль в эволюции коктейльной культуры. Со Старого континента на\nНовый поплыли итальянские вермуты, шотландские виски, французские ликеры... На\nамериканской земле они вдохновили бартендеров на создание легендарных коктейлей.\nВ противоположном направлении следовали богатые американцы. Специально для\nэтих туристов в европейских отелях были открыты бары, так называемые American\nBars, где стали подавать смешанные напитки, как в Америке. Произошла глобализация\nкоктейльной культуры.\n\nВерму т-коктейль\nVermouth Cocktail\n\nОст-Индия\nEast India Cocktail\nСоздание этого коктейля часто приписывают\nГарри Джонсону. Сам он написал, что это был\nизлюбленный напиток англичан, проживавших\nв разных уголках Ост-Индии.\nГарри Джонсон. «Harry Johnson’s Bartenders’\nManual», 1900 год.\nНа 1 бокал\n\nКоньяк Martell VSOP - 60 мл\nЛикер Curaçao - чайная ложка\nАнанасовый сироп - чайная ложка\nБиттер Ангостура - два-три дэш\nЛикер Maraschino - два дэш\n\n1. Ингредиенты перемешать в стакане для\nсмешивания, заполненном льдом.\n2. Отфильтровать в охлажденный коктейльный бокал.\n3. Украсить вишней и твистом из цедры\nлимона.\n\nКогда американцы познакомились с итальянским вермутом, они тут же сделали его основой\nдля коктейля. Так на свет появился Vermouth\nCocktail. Это случилось, по всей видимости, в\nсамом конце 1860-х годов. Напиток состоял из\nвермута и лимонной цедры. Впоследствии к ним\nприсоединились биттер и Мараскино. Коктейль\nпользовался славой как средство от головной\nболи и сыграл важную роль в истории смешанных напитков, проложив путь монументальным\nамериканским коктейлям, среди которых –\n«Манхэттен».\nНа 1 бокал\n\nВермут Martini Riserva Speciale Ambrato - 90 мл\nАпельсиновый биттер - три дэш\nЛикер Maraschino - три дэш\n\n1. Перемешать ингредиенты в смесительном\nстакане, заполненном льдом.\n2. Отфильтровать в охлажденный коктейльный бокал.\n3. Украсить лимонной цедрой.\n\nAmeric an Bar 247", "G o l d e n A g e (конец 1860 -х – 1919)\nД жин Физз\n\nКлассика\n\nGin Fizz\nДжин опять переживает полное\nобновление или даже почти революцию. Cнова коктейли с джином\nвозвращаются в бар на одно из\nпервых мест, если не на первое.\nРядом с бесконечными творениями,\nставшими возможными из-за выдающейся многогранности джина, воссоздаются великие исторические\nкоктейли, одновременно простые,\nутоляющие жажду и прекрасные на\nвкус.\nОдин из них – «Джин Физз». Его\nпервое упоминание восходит к\nкниге Джерри Томаса, изданной\nв 1887 году. Однако, скорее всего,\nэтот смешанный напиток значительно старше. «Джин Физз» – производная «Джин Сауэра», в который добавили газированную воду.\nЭтот напиток существовал по ходу\nистории во множестве вариаций.\n«Джин Физз» – один из самых популярных напитков в Новом Орлеане,\nоткуда к нам пришла его известная\nверсия – «Рамос Джин Физз».\nЕще один восхитительный вариант\n– «Франкс Спешиал Джин Физз» –\nбыл придуман в 1925 году Франком\nМейером из «Ритца». Он добавлял\nв шейкер раздавленную четвертинку белого персика.\nНа 1 бокал\n\nС ельтерская и содовая\nРаньше газированную воду продавали в специальных бутылях. В них разливали минеральную воду естественной газации из немецкого источника\nЗельтерс. Саму воду называли сельтерской.\nВ 19 веке Якоб Швепп основал производство воды искусственной газации.\nОна получила название soda water. Эту содовую воду стали широко использовать при приготовлении смешанных напитков.\nНа иллюстрации. Укупорка бутылей с сельтерской водой.\n\n248 Americ an Bar\n\nДжин - 50 мл\nСвежевыжатый лимонный сок - 20 мл\nСахарный сироп - 10 мл\nСодовая вода - 100 мл\n\n1. В шейкер положить лед, налить сахарный\nсироп, лимонный сок и джин.\n2. Завернуть шейкер в полотенце (так\nлед меньше растает), взбивать минимум\nминуту.\n3. Отфильтровать в охлажденный хайбол,\nдобавить содовую.\n4. Украсить ломтиком лимона и мятой.", "G o l d e n A g e (конец 1860 -х – 1919)\nКофейный коктейль\nCoffee Cocktail\nКак написано в справочнике Джерри Томаса 1887 года издания, название коктейля отражает\nвнешний вид напитка, так как кофе не числится среди его ингредиентов.\nМожно добавить, что данный рецепт также называется Porto Flip. Поначалу флипы были\nанглийскими напитками из горячего пива, в которые добавляли ром и яйцо и приправляли\nмускатным орехом и имбирем. Для того чтобы во флипе образовалась пена, его переливали из\nодной емкости в другую, поднимая их высоко друг над другом. При этом издавался характерный звук «флип-флоп», что и дало название коктейлю. Сегодня флипы подаются чаще всего в\nхолодном виде, и пена образуется во время взбивания коктейля в шейкере.\nНа 1 бокал\n\nКоньяк - 45 мл\nПорто - 45 мл\nСахарный сироп - 7.5 мл\nОдно цельное свежее яйцо\n\n1. Взбить все ингредиенты в шейкере (без льда). Добавить лед и опять\nвстряхнуть шейкер.\n2. Отфильтровать в охлажденную чашу\nдля шампанского.\n3. Сверху посыпать молотым мускатным орехом.\n\nФизз У тренней с лавы\nMorning Glory Fizz\nКоктейли изобрели для исцеления боли от жизни. «Физз Утренней славы» был задуман как лекарство для того, кто перебрал коктейлей. Он появился в октябре 1884 года, то есть более 130 лет\nназад. И год за годом время стекает на «Физз Утренней славы», как капли абсента на кусок сахара.\nСахар растворяется, а вкус напитка усиливается, и «Физз Утренней Славы» навечно остается в\nколлективной памяти любителей коктейлей.\nДо сухого закона существовал обычай после бурной ночи рано утром с всклокоченными волосами\nвернуться в свой любимый бар к моменту его открытия, и на этот раз взять «Физз Утренней славы»,\nимя которого (сказанное с хриплым американским выговором) прочищало глотку. В наши дни,\n«Физз Утренней славы» в основном подают вечером. Новое поколение клиентов предусмотрительно, и поэтому не испытывает необходимости бежать в бар рано утром.\nНа 1 бокал\n\nВиски Chivas Regal 12 y.o. - 40 мл\nЯичный белок\nСахарный сироп - 10 мл\nЛимонный сок - 10 мл\nСок лайма - 10 мл\nАбсент - два дэш\nСодовая вода\n\nМартинез\nMartinez\n«Мартинеза» рассматривают как предшественника «Драй Мартини». Но он, скорее, родственен «Манхэттену», в котором виски заменили\nджином. Чаcто честь изобретения «Мартинеза»\nприписывают Джерри Томасу. Я не сумел\nобнаружить ни подтверждающих, ни опровергающих данный факт свидетельств. Известно\nлишь, что он впервые упомянут в издании «The\nModern Bartender’s Guide», опубликованном в\n1884 году под авторством О.Х. Байрона. Затем\nего можно найти в справочнике Джерри Томаса\n1887 года издания, а позже – в многочисленных руководствах для барменов, где он\nсоседствует с «Драй Мартини», порожденным\nим и укравшим его популярность.\nНа 1 бокал\n\nДжин Old Tom - 50 мл\nКрасный вермут - 20 мл\nЛикер Maraschino - 15 мл\nБиттер Angostura - дэш\n\n1. Положить в шейкер лед и налить ингредиенты.\n2. Взбить и от­ф иль­т ­р о­в ать в охлажденный\nкоктейльный бокал.\n3. Отжать в коктейль лимонную цедру и\nопустить ее в бокал.\n\n1. В шейкер положить лед и налить все ингредиенты, кроме содовой.\n2. Основательно взбить содержимое шейкера и отфильтровать в бокал хайбол, предварительно наполненный льдом. Добавить содовую.\n\nAmeric an Bar 249", "G o l d e n A g e (конец 1860 -х – 1919)\nМанхэттен\n\nКлассика\n\nManhattan\nКак и «Олд Фэшенд», «Манхэттен» – один из популярнейших коктейлей.\nСимвол Нью-Йорка. Если в этом городе вы попросите любого (хорошего) бармена приготовить одно из его творений, 80 шансов из 100, что он\nпредложит вам твист на «Манхэттен». Уж поверьте мне на слово. Я не\nрекомендую вам убеждаться в этой статистике самостоятельно!\nВ самом деле, в Нью-Йорке «Манхэттен» настолько распространен, что\nрискует повторить путь, проделанный в свое время «Драй Мартини», то\nесть стать синонимом коктейля вообще. Даже может статься, что однажды вы зайдете в нью-йоркский бар со своими рублями, чтобы заказать\n«Манхэттен», а бармен, взглянув на ваши деньги, поинтересуется: алкогольный или безалкогольный?\nПростота «Манхэттена» только кажущаяся. Многое зависит от навыков\nбармена. Дело в том, что как и для всех коктейлей, приготовленных в смесительном стакане, разбавление водой от льда играет критическую роль.\nИменно оно позволяет добиться алхимически совершенного равновесия\nмежду всеми точно отмеренными ингредиентами.\nЛегенда гласит, что коктейль был изобретен в 1874 году на банкете, организованном матерью Черчилля в нью-йоркском «Манхэттен клубе» в честь\nпобеды на выборах Сэмюэла Тилдена. Существуют и другие версии, они\nболее туманные, может быть, более вероятные, но куда менее интересные.\nКороче, о происхождении коктейля известно мало, но нет сомнения, что\nтакое название, как «Манхэттен», не могло не сработать. Оставалось лишь\nутвердить окончательный рецепт. В итоге последний мало изменился со временем. Основой служит бурбон или ржаной виски. Вермут используется, как\nправило, итальянский, хотя иногда упоминается и французский. «Ангостура»\nприсутствует в рецепте с самого начала. Однако по ходу истории можно\nвстретить менее обычные варианты коктейля, в частности, с абсентом.\nПервое упоминание о «Манхэттене», адресованное барменам, встречается в книге О.Х. Байрона, изданной как раз в Нью-Йорке в 1884 году под\nназванием «Руководство современного бармена», на странице 22.\nЭта книга представляет два рецепта: «Манхэттен №1» и «Манхэттен №2» с\nликером Кюрасао. Из чего следует, что коктейль уже пользовался значительным успехом. Затем «Манхэттен» появляется почти во всех старинных\nруководствах: Гарри Джонсон (1888 год), Лоэв (1904 год), Строб (1914 год).\nСегодня часто задаются вопросом относительно вишни «Мараскино».\nЯвляется ли она обязательной? Не лучше ли заменить ее цедрой?\nЕсли изучать старинные книги, создается впечатление, что поначалу в\n«Манхэттене» не было ни украшений, ни ароматизаторов. Цедра, используемая только для придания аромата, появляется лишь в первой книге\nГарри Джонсона, затем упоминается достаточно регулярно до тех пор,\nпока неизвестный бармен не бросил ее в коктейль в качестве украшения.\n«Манхэттен» иногда противопоставляют «Бронксу», который носит имя\nдругого района Нью-Йорка и представляет собой вариацию «Манхэттена»\nна основе джина. Что до «Роб Роя», то это близнец «Манхэттена», приготовленный со «скотчем» для тех, кто предпочитает Шотландию Америке.\n250 Americ an Bar\n\nНа 1 бокал\n\nРжаной виски (или бурбон) - 50 мл\nКрасный вермут Martini Rosso - 20 мл\nБиттер Angostura - несколько капель\n\n1. Положить лед в стакан для смешивания.\n2. Добавить несколько капель биттера,\nвермут и виски.\n3. Перемешать и отфильтровать в охлажденный коктейльный бокал.\n4. Украсить коктейльной вишней или апельсиновой цедрой.\nЗаменив половину красного сладкого вермута\nна сухой вермут, вы получите «Совершенный\nМанхэттен» (Perfect Manhattan). А используя\nвместо красного вермута сухой вермут,\nвы приготовите «Сухой Манхэттен» (Dry\nManhattan).", "G o l d e n A g e (конец 1860 -х – 1919)\nАмериканская Красотка\n\nЭппл Джек\n\nДжек Роуз\n\nAmerican Beauty\n\nApple Jack\n\nJack Rose\n\n«Американская красотка» – сорт розы, и коктейль воспроизводит тонкие изменения цвета\nее лепестков. Это старый рецепт, происхождение которого я так и не сумел установить, но\nон присутствует во всех старинных сборниках\nкоктейлей, начиная с 1920-х годов. Кроме того,\nдля тех, кто предпочитает большие дозы, он\nсуществует в виде пунша.\n\nЭтот типично американский коктейль пользовался большим успехом и, как следствие,\nсуществовал во множестве вариантов. Первая\nизвестная мне версия содержится в сборнике\n«The Modern Bartenders’ Guide» Байрона, изданном в 1884 году. Этот рецепт приведен ниже.\nВпоследствии, в 1908 году Бусби заменил\nсахарный и малиновый сиропы на Гренадин\nи немного лимонного сока. В 1914 году Строб\nвообще убирает сиропы, используя вместо\nних дэш апельсинового биттера, отжимая в\nкоктейль кусочек лимонной цедры и украшая\nего оливкой. Наконец, в 1916 году Энсслин –\nшеф-бармен отеля Wallick на Бродвее – добавляет в яблочный бренди два дэш сахарного\nсиропа, два дэш апельсинового биттера и дэш\nбиттера Peychaud’s.\n\nГоворят, что «Джек Роуз» – очень старинный\nкоктейль, хотя первое упоминание о нем\nотносится только к 1908 году, встречаясь в\nкниге Уильяма Бусби «Boothby’s World of Drinks\nand How to Mix Them», где предлагается его\nготовить с лимонным соком. (Кстати, в наше\nвремя именно так поступает Джим Михан).\n«Джек Роуз» также упоминается, как один из\nкоктейлей отеля «Уолдорф-Астория», где его\nготовили с соком лайма. Предпочтительную\nверсию выбирать вам!\n\nНа 1 бокал\n\nСухой французский вермут - 20 мл\nКоньяк - 20 мл\nАпельсиновый сок - 10 мл\nСироп Гренадин - 10 мл\nБесцветный мятный ликер - дэш\nПорто - дэш\n\n1. В шейкер положить лед и налить все ингредиенты, кроме мятного ликера и порто.\n2. Взбить содержимое шейкера.\n3. Сбрызнуть мятным ликером бокал рокс,\nпредварительно наполненный льдом.\n4. Отфильтровать в него содержимое\nшейкера.\n5. Сбрызнуть коктейль порто и украсить\nветочкой мяты.\n\nЛ ьдогенератор\nНаиболее очевидный пример вклада технологии в совершенствование коктейлей – это\nпоявившийся в 1875 году льдогенератор.\nИскусственный лед сменил дорогостоящий\nнатуральный лед, вырубленных в ледниках,\nпозволив готовить коктейли где и когда\nугодно.\nС этого момента бармены взбивали в\nшейкере «Джин Физз» вне зависимости от\nтого, где находился бар: в большом городе,\nв вагоне поезда или на трансатлантическом\nлайнере. Благодаря этому круг потребителей\nкоктейлей значительно расширился.\n\nНа 1 бокал\n\nЯблочный бренди (или кальвадос) - 60 мл\nСироп «Малина» - два-три дэш\nСахарный сироп - два-три дэш\n\n1. Взбить ингредиенты в шейкере, заполненном льдом.\n2. Отфильтровать в охлажденный коктейльный бокал.\n3. Отжать в коктейль кусочек лимонной\nцедры.\n\nНа 1 бокал\n\nЯблочный бренди (или кальвадос) - 60 мл\nСироп Гренадин - 20 мл\nСвежевыжатый лимонный сок - 20 мл\n\n1. Взбить ингредиенты в шейкере, заполненном льдом.\n2. Отфильтровать в охлажденный коктейльный бокал.\n\nВосьмой округ\nWard Eight\nВариация на тему «Виски Сауэр», появившаяся\nна свет в конце 19 века. Считается, что коктейль\nбыл создан в Бостоне, по случаю победы на\nвыборах от восьмого округа политика Мартина\nЛомесни.\nРоберт. «Cocktails. How to Mix Them», 1922 год.\nНа 1 бокал\n\nБурбон - 60 мл\nАпельсиновый сок - 15 мл\nЛимонный сок - 15 мл\nСироп Гренадин - 7.5 мл\n\n1. В шейкере, заполненном льдом, взбить все\nингредиенты.\n2. Отфильтровать в охлажденный коктейльный бокал.\n\nAmeric an Bar 251", "252 Americ an Bar", "G o l d e n A g e (конец 1860 -х – 1919)\nАлександр\n\nМетрополитен\n\nПригород\n\nAlexander\n\nMetropolitan Cocktail\n\nSuburban Cocktail\n\nСовременная версия «Александра» впервые\nвстречается в американском сборнике рецептов Хьюга Энсслина, который был издан в 1916\nгоду. В семействе коктейлей Alexander можно\nнайти Alexander №2 с белым ликером Cacao\nWhite, а также Alexander’s Sister, в который\nвходит мятный ликер вместо шоколадного.\nСамый молодой представитель династии – это\nAlexander Baby, в котором вместо джина используется ром. Коктейль «Бренди Александр»\nбыл создан по случаю бракосочетания принцессы Мэри и графа Анри Ласселя в Лондоне в\n1922 году.\n\nНазвание этого исторического коктейля\nиспользовалось множеством барменов, но\nего самый старинный рецепт, по-видимому,\nотносится к 1884 году.\nВ своем сборнике коктейлей «Drinks» (1914 год)\nЖак Строб предлагает коктейль «Метрополитен»\nв версии «Southern Style», заменяя французский\nвермут на красный итальянский, а Ангостуру –\nна апельсиновый биттер.\nНиже приводится исторический рецепт из труда\nО. Эйч. Байрона «The Modern Bartenders’ Guide»,\n1884 год.\n\nЭтот дижестивный коктейль одним из первых\nпоявился на свет в нью-йоркском отеле «Уолдорф» сразу после его открытия в 1893 году.\nОн был создан в честь победы лошадей Джеймса Р. Киина на скачках в пригороде Нью-Йорка.\nАльберт Стивенс Крокетт. «The Old WaldorfAstoria Bar Book», 1935 год.\n\nНа 1 бокал\n\nСухой французский вермут - 60 мл\nКоньяк - 30 мл\nБиттер Angostura - три дэш\nСахарный сироп - три дэш\n\nCливки - 25 мл\nЛикер Cacao Brown - 25 мл\nДжин - 25 мл\n\n1. Все ингредиенты взбить в шейкере, заполненном льдом.\n2. Отфильтровать в охлажденный коктейльный бокал.\n3. Посыпать молотым мускатным орехом.\n\nАлгонкин\nAlgonquin\nЭтот исторический американский коктейль\nназван в честь одноименного нью-йоркского\nотеля, который был основан в 1902 году.\nНа 1 бокал\n\nВиски Chivas Regal 12 y.o. - 50 мл\nLillet Blanc - 30 мл\nСвежевыжатый ананасовый сок - 30 мл\nБиттер Peychaud - два дэш\n\n1. В шейкере, заполненном льдом, взбить все\nингредиенты.\n2. Отфильтровать в охлажденный коктейльный бокал.\n\nНа 1 бокал\n\n1. Взбить ингредиенты в шейкере со льдом.\n2. Отфильтровать в охлажденный коктейльный бокал.\n\nНа 1 бокал\n\nВиски - 45 мл\nТемный ром - 15 мл\nПорто - 15 мл\nБиттер Angostura - дэш\nАпельсиновый биттер - дэш\n\n1. Взбить ингредиенты в шейкере со льдом.\n2. От­ф иль­т­р о­в ать в охлажденный коктейльный бокал.\n\nБобби бернс\nBobby Burns\nАмериканский коктейль, названный в честь\nизвестного шотландского поэта. Был создан на\nрубеже 19 и 20 веков.\nНе надо путать его с другим известным рецептом под названием Robert Burns. Последний не\nсодержит ликера, но включает дэш абсента и\nдэш апельсинового биттера.\nНа 1 бокал\n\nШотландский виски - 60 мл\nКрасный итальянский вермут - 20 мл\nЛикер Bénédictine - 15 мл\n\n1. Ингредиенты перемешать в смесительном\nстакане, заполненном льдом.\n2. Отфильтровать в охлажденный коктейльный бокал.\n3. Украсить лимонной цедрой.\n\nНа соседней странице. Один из\nкоктейльных баров Манхэттена.\nЗолотая эра миксологии, начало 20\nвека.\nAmeric an Bar 253", "G o l d e n A g e (конец 1860 -х – 1919)\nГибсон\n\nБамбук\n\nGibson\n\nBamboo Cocktail\n\nКоктейль обязан своим названием художнику по имени Чарльз Дана Гибсон. В конце 19\nвека он создал образ сексапильных «девушек\nГибсона».\nВ этом коктейле на две маринованные луковицы возложена роль женской груди.\n\n«Бамбук» – коктейль, который вновь пользуется спросом. Считается, что он был изобретен в 1890-х\nгодах Луисом Эппингером, немцем, управлявшим «Гранд Отелем» в Иокогаме, в Японии. В то время\nИокогама была главным портом и наиболее европеизированным городом страны. Среди прочих\nзнаменитостей «Гранд Отель» посещал Редьярд Киплинг. Коктейль быстро стал успешным, и его\nможно было заказать в лучших барах Америки, в частности в Нью-Йорке. Первое найденное мной\nупоминание встречается в книге Пола Э. Лоу «Drinks. How to Mix and How to Serve» (1904 год). Но этот\nрецепт включал сладкий итальянский вермут, а не сухой французский. Сегодняшняя версия «Бамбука» с французским вермутом и биттерами появляется в 1908 году в справочнике Билла Бусби.\nСледует также отметить, что поскольку немец Луис Эппингер держал салуны в Сан-Франциско, миксологи этого города широко используют его рецепт, и коктейль можно встретить в лучших местных\nбарах.\n\nНа 1 бокал\n\nДжин - 60 мл\nСухой вермут - 10 мл\nДве мелкие маринованные луковички\n\n1. В смесительный стакан положить лед и\nналить джин с вермутом.\n2. Перемешать содержимое стакана и отфильтровать в охлажденный коктейльный\nбокал.\n3. Две маринованные луковицы наколоть на\nшпажку. Опустить ее в коктейль или положить на бортики бокала.\n\nНа 1 бокал\n\nХерес Amontillado - 45 мл\nСухой французский вермут - 45 мл\nАпельсиновый биттер - два дэш\nБиттер Ангостура - дэш\n\n1. Взбить ингредиенты в шейкере, заполненном льдом.\n2. Отфильтровать в охлажденный коктейльный бокал.\n3. Украсить твистом из лимонной цедры.\n\nБакарди Коктейль\nBacardi Cocktail\n«Бакарди коктейль» был одним из наиболее востребованных в годы, предшествовавшие сухому\nзакону. Долгое время его путали с «Дайкири», вариацией которого он и является.\nПроясним ситуацию: единственное различие между «Дайкири» и «Бакарди коктейлем» состоит\nв сиропе Гренадин, который служит подсластителем для последнего. Однако в те времена это не\nказалось столь очевидным.\nИ если Жак Строб в 1914 году предлагает рецепт с Гренадином, то в 1916 году Хьюго Энсслин\n(бармен из нью-йоркского «Уоллик Отеля» на Бродвее) для приготовления коктейля использует ром\nBacardi, сок половинки лайма и два дэш сахарного сиропа.\nНаконец, не следует забывать о том, что «Бакарди коктейль» пользовался таким успехом, что после\nотмены сухого закона имел место шумный процесс против отеля, использовавшего в коктейле\nвместо Bacardi другой ром. В 1936 году было официально объявлено, что для «Бакарди коктейля»\nможет быть использован лишь ром Bacardi.\nВ результате, на данный момент это единственный коктейль, защищенный американским законом!\nНа 1 бокал\n\nРом Bacardi Carta Blanca - 40 мл\nСироп Гренадин - 15 мл\nСок половины лайма\n\n1. Взбить ингредиенты в шейкере, заполненном льдом.\n2. Отфильтровать в охлажденный коктейльный бокал.\n\n254 Americ an Bar", "G o l d e n A g e (конец 1860 -х – 1919)\nК лавер К лаб\n\nКлассика\n\nClover Club\n«Клавер Клаб» – исторический американский коктейль. Его название происходит от одноименного мужского клуба, существовавшего с 1881 года в\nФиладельфии. В 1904 году клуб собирался в шикарной гостинице Бельвю\nСтафорд Отель. Специально для джентльменов этого благородного сообщества бармен отеля придумал нежный коктейль с ягодным вкусом.\nОтличительной чертой этого напитка стал яичный белок, который, смешиваясь в шейкере с другими ингредиентами, образует деликатную и приятную пену, придающую напитку шелковистость и изысканность.\nКоктейль «Клеверный лист» (Clover Leaf) готовится точно так же, но украшается листиком мяты.\nНа 1 бокал\n\nДжин Bombay Sapphire - 40 мл\nКрасный вермут Martini Rosso - 20 мл\nЯичный белок\nСок половины лайма\nСироп Гренадин - дэш\n\n1. В шейкер положить лед и налить ингредиенты.\n2. Основательно взбить содержимое шейкера и отфильтровать в охлажденный коктейльный\nбокал.\n\nЛошадиная шея\n\nАляска\n\nHorse’s Neck\n\nAlaska\n\nКоктейль «Лошадиная шея» поначалу был безалкогольным, но небезынтересным. Он пользовался\nопределенным успехом, начиная с 1890-х годов. Это был освежающий напиток из имбирного эля со\nльдом, а главное, украшенный длинной лентой лимонной цедры. В период сухого закона «Лошадиная шея» привлекла к себе особое внимание. Люди продолжали вполне официально потягивать\nэтот коктейль, но по их радостным лицам можно было догадаться, что обязательным компонентом\n«Лошадиной шеи» сделался бренди или виски. В результате безалкогольный вариант окончательно\nприказал долго жить.\nВ наше время «Лошадиная шея» продолжает быть освежающим коктейлем, который пьют летом. А\nего длинная спираль из лимонной цедры вообще уникальна в мире миксологии.\n\nЭтот коктейль отдает приключениями на\nдальнем Севере. В 1867 году Россия продала\nАмерике Аляску за 7 миллионов долларов, что\nсегодня составляет около 2 миллиардов. В 1912\nгоду Аляска перестала быть округом и начала\nименоваться «территорией» Соединенных Штатов. Данный рецепт был опубликован Жаком\nСтробом в 1914 году.\nВ наши дни современные миксологи часто\nперерабатывают этот коктейль, и он вновь\nпользуется популярностью.\n\nНа 1 бокал\n\nКоньяк - 35 мл\nИмбирный эль - 135 мл\nБиттер Angostura - дэш\n\n1. Бокал хайбол наполнить льдом и украсить его твистом – спиралью из кожуры лимона так,\nчтобы один ее конец лежал на краю бокала, а другой свисал в него.\n2. Налить ингредиенты.\n\nНа 1 бокал\n\nДжин - 60 мл\nЖелтый ликер Chartreuse - 20 мл\n\n1. Взбить ингредиенты в шейкере, заполненном льдом.\n2. Отфильтровать в охлажденный коктейльный бокал.\n\nAmeric an Bar 255", "Роб Рой\n\nКлассика\n\nRob Roy\nВ конце 19 – в начале 20 века, благодаря развитию морских сообщений и трансатлантических линий, США захлестнула волна европейских\nспиртных напитков. Экономический рост породил американский средний класс, который имел средства и желал пить напитки высокого качества. Американцы открывали для себя великосветские удовольствия, в\nчастности шотландскую игру в гольф.\nСопровождая тренд на все шотландское, в том числе гольф и литературу, возрастало потребление скотча. К тому же, купажированный виски\nпрекрасно смешивается с другими ингредиентами, и на американской\nземле он дал рождение некоторым известным историческим коктейлям.\nЭти новомодные смешанные напитки подчеркивали достоинства бленда, более уравновешенного и мягкого по сравнению с солодовым виски.\nДанный вариант «Манхэттена» включает вместо американского шотландский виски. Считается, что он был создан в 1894 году в известном\nнью-йоркском отеле «Уолдорф-Астория», когда неподалеку шла постановка мюзикла под названием «Роб Рой».\nКоктейль «Роб Рой», в свою очередь, дал рождение многочисленному потомству, среди которого такие исторические коктейли, как «Родство душ»,\n«Летучий шотландец», «Свист-удар», «Бобби Бернс» и многие другие.\nРецепт из сборника Жака Строба «Drinks», 1914 год.\nНа 1 бокал\n\nШотландский виски Dewar's 12 y.o. - 50 мл\nКрасный вермут Martini Rosso - 25 мл\nБиттер Angostura - дэш\nАпельсиновый биттер - дэш\n\n1. В стакан для смешивания положить лед и налить ингредиенты.\n2. Перемешать и отфильтровать в охлажденный коктейльный бокал.\n3. Украсить вишней.\n\n256 Americ an Bar\n\nРодство душ\nAffinity\n«На Бродвее появился еще один новый коктейль.\nОн называется «Родство душ». По утверждению\nэкспериментаторов, успешно выдержавших\nиспытание, после первого бокала горизонт\nприобретает розовато-лиловый оттенок.\nПосле второго – в самом сердце Уолл-стрита\nпоявляются кипы сверкающей серебром\nсостриженной овечьей шерсти. Ну а после\nтретьего – вокруг растет молодая трава, в\nветвях смоковниц сладко щебечут птицы, и\nвозникает родство душ. Эта новая амброзия\nвключает следующие ингредиенты: чайная\nложка сахарного песка, дэш апельсинового\nбиттера, джиггер шотландского виски и\nполджиггера итальянского вермута...» – так\nнаписала о этом коктейле газета «Вашингтон\nпост» от 29 октября 1907 года.\nРецепт из сборника Хьюго Энсслина «Recipes for\nMixed Drinks», 1916 год.\nНа 1 бокал\n\nШотландский виски Dewar's 12 y.o. - 40 мл\nКрасный вермут Martini Rosso - 20 мл\nСухой французский вермут - 20 мл\nАпельсиновый биттер - два дэш\n\n1. Перемешать все ингредиенты в стакане\nдля смешивания, заполненном льдом.\n2. Отфильтровать в охлажденный коктейльный бокал. Украсить вишней и твистом из\nлимонной цедры.", "G o l d e n A g e (конец 1860 -х – 1919)\nБронкс\n\nАдонис\n\nBronx Cocktail\n\nAdonis\n\n«Бронкс» появился на свет около 1900 года.\nБармен Джонни Солон на спор с одним клиентом придумал его за пару минут и, давая\nему название, вспомнил о своем недавнем\nпосещении зоопарка Бронкса. Продолжение\nизвестно. Рецепт «Бронкса», опубликованный\nсначала в сборнике Буcби в 1908 году, а затем\nв следующем издании этой книги в 1934 году,\nразделился на три вида: Серебряный (с яичным\nбелком и мускатным орехом), Ананасовый\n(джин, вермут, ананасовый сок) и «Бронкс\nномер два» с апельсиновым биттером вместо\nапельсинового сока.\n\nВ греческой мифологии прекрасный юноша Адонис был возлюбленным богини любви Афродиты. А в Нью-Йорке этот коктейль получил свое название в честь театральной постановки\n«Адонис» Генри Дикси и Фанни Уорд, которая их и прославила.\nПеред вами старейшая версия рецепта, имеющаяся в моих архивах. Она принадлежит Жаку\nСтробу и восходит к 1914 году. Но есть сведения, что уже с начала 20 века «Адониса» подавали\nв отеле «Уолдорф-Астория».\nВпоследствии рецепт был включен во все сборники коктейлей, в частности Гарри Крэддока, но\nуже содержал равные доли хереса и вермута.\n\nНа 1 бокал\n\nДжи­н - 30 мл\nКрас­н ый вер­м у­т Martini Rosso - 10 мл\nСу­х о­й вер­м у­т - 10 мл\nАпель­с и­н о­в ый со­к - 20 мл\n\nНа 1 бокал\n\nХерес - 25 мл\nВермут Martini Rosso - 50 мл\nАпельсиновый биттер - два дэш\n\n1. Перемешать ингредиенты со льдом в смесительном стакане.\n2. Отфильтровать в охлажденный коктейльный бокал.\n3. Украсить твистом из апельсиновой цедры.\n\n1. Все ингредиенты взбить в шейкере, заполненном льдом.\n2. Отфильтровать в охлажденный коктейльный бокал.\n\nБронкс Терраса\nBronx Terrace\nСамая известная разновидность «Бронкса», не\nменее популярная, чем сам оригинал.\nНа 1 бокал\n\nДжи­н - 40 мл\nСу­х о­й вер­м у­т - 20 мл\nСок половины лайма\n\n1. Все ингредиенты взбить в шейкере, заполненном льдом.\n2. Отфильтровать в охлажденный коктейльный бокал.\n\nAmeric an Bar 257", "G o l d e n A g e (конец 1860 -х – 1919)\nСтингер\nStinger\nЭто сочетание коньяка и мятного ликера, по\nвсей видимости, увидело свет в начале 20 века.\nНа 1 бокал\n\nКоньяк - 50 мл\nБесцветный мятный ликер - 20 мл\n\n1. Взбить ингредиенты в шейкере, заполненном льдом.\n2. Отфильтровать в охлажденный коктейльный бокал.\n3. Украсить мятными листьями.\n\nДжин Рики\n\nАвиация\n\nGin Rickey\n\nAviation\n\nКак говорится в книге Альберта Стивенса\nКрокетта «Old Waldorf Bar Days» (1931 год), этот\nосвежающий коктейль был создан в конце 19\nстолетия в вашингтонском баре Shoemaker’s.\nОн был приготовлен для завсегдатая кулуаров\nконгресса – полковника Джоэ Рики, который\nтоже, как говорят, занимался импортом лаймов\nв Америку.\nНа 1 бокал\n\nДжин - 60 мл\nПоловина лайма\nСодовая вода\n\n1. Бокал хайбол заполнить кубиками льда.\n2. Отжать в него сок лайма. Налить джин.\n3. Опустить в бокал оставшуюся кожуру половинки лайма. Добавить содовую.\n\nР ики\nКоктейли группы Рики (Rickeys) пользовались\nбольшим успехом и до, и после отмены сухого\nзакона. Они были похожи на коллинзы и физзы, но\nоставались более сухими, поскольку содержали\nбольше сока лайма и не включали сахар. Кроме\nтого, их разбавляли только небольшим количеством содовой.\n\n258 Americ an Bar\n\nКлассика\n\nЭтот исторический рецепт, вначале сделавшись редкостью, сегодня\nс триумфом вернулся на сцену коктейлей. Официальной датой рождения «Авиации» считается 1916 год, когда она появилась в сборнике\nрецептов, изданном Хьюго Энсслином, шеф-барменом нью-йоркского\nотеля «Уоллик». Но, как это бывает с детьми, дата регистрации отличается от даты рождения, и изобретение «Авиации» относят к 1911 году.\nСтранное название коктейля происходит от фиалкового крем-ликера,\nкоторый был его неотъемлемым компонентом. Он сообщал коктейлю\nцвет неба, который оправдывал его название.\nС «Авиацией» произошла большая путаница. У ее истоков стоял Гарри\nКрэддок. В своей «Книге коктейлей Савоя» (1930 год) он поместил рецепт «Авиации» без фиалкового ликера. Скорее всего, по причине дефицита данного ингредиента в тот период. В результате коктейль утратил\nцвет и смысл. В 1940 году Патрик Даффи в своем издании «Официальный\nучебник составителя смесей» исправил положение и опубликовал первоначальный рецепт с фиалковым ликером. Но было уже поздно: плохо\nинформированные бармены и сегодня продолжают готовить «Авиацию»\nбез фиалкового ликера, что, с моей точки зрения, равноценно попытке\nполета на самолете в безвоздушном пространстве!\nНа 1 бокал\n\nДжин Bombay Sapphire - 60 мл\nЛимонный сок - 30 мл\nЛикер Maraschino - 2 дэш\nФиалковый ликер Crème de Violette - два дэш\n\n1. В шейкере, заполненном льдом, взбить ингредиенты.\n2. От­ф иль­т ­р о­в ать в охлажденный коктейльный бокал.", "G o l d e n A g e (конец 1860 -х – 1919)\nДрай Мартини\n\nКлассика\n\nDry Martini\nDry Martini представляет собой эволюцию коктейля Martinez. Его первое\nписьменное упоминание встречается в книге Франка Ньюмана «American\nBar», изданной в 1904 году. Рецепт включал равные доли джина и сухого\nвермута, немного Ангостуры или апельсинового биттера и оливку в качестве украшения.\nВ свое время это был один из самых популярных коктейлей, настоящий\nмонумент миксологии, излюбленный напиток актеров и политиков. Он\nпородил многочисленное потомство, среди которого «Веспер» и разнообразные коктейли «в стиле Мартини», а также дал название коктейльной\nрюмке в которой они подаются.\nНиже приведен рецепт по версии Международной ассоциации барменов (IBA).\nНа 1 бокал\n\nСухой вермут - 15 мл\nДжин Bombay Sapphire - 55 мл\nКусочек лимонной цедры и оливка\n\n1. В смесительный стакан положить лед и налить ингредиенты.\n2. Перемешать и отфильтровать в охлажденный коктейльный бокал.\n3. Опустить в бокал оливку и выжать в коктейль цедру лимона.\n\nПос леднее с лово\n\nБрук лин\n\nLast Word\n\nBrooklyn\n\nLast Word – американский смешанный напиток периода сухого закона, который в свое время сошел\nс коктейльной сцены и пребывал в забытье несколько десятилетий. Однако это не стало последним\nсловом в его барной карьере, ибо не так давно миксологи воскресили его рецепт, и он стал вновь\nпопулярным, благодаря своему пикантному кисло-сладкому вкусу в сочетании с крепостью.\nПервое письменное упоминание «Последнего слова» встречается в сборнике Теда Сосье «Bottoms\nUp», изданном в 1951 году. Автор указывает, что рецепт напитка он получил в Детройтском атлетическом клубе, уточняя следующее: «Этот коктейль был занесен сюда около 30 лет тому назад\nФрэнком Фогарти, который был хорошо известным водевильным актером. Его называли «Дублинским менестрелем», и он был прекрасным исполнителем монологов».\n\nПервоначальный рецепт этого исторического\nкоктейля, появившегося на свет в начале 20\nвека, включал ржаной виски и французский\nвермут в равных пропорциях, сдобренные дэшем Мараскино и биттера Amer Picon. Сегодня,\nза недостатком Amer Picon, бармены перерабатывают рецепт. Здесь он приводится как раз в\nтакой современной обработке.\nНа 1 бокал\n\nНа 1 бокал\n\nДжин - 25 мл\nЛикер Maraschino - 25 мл\nЗеленый ликер Chartreuse - 25 мл\nСок лайма - 25 мл\n\n1. Взбить все ингредиенты в шейкере, заполненном льдом.\n2. Отфильтровать в охлажденный коктейльный бокал.\n\nБурбон - 45 мл\nЛикер Maraschino - 7.5 мл\nСухой французский вермут - 15 мл\nКрасный вермут Martini Rosso - 15 мл\nБиттер Angostura - три дэш\n\n1. В стакане для смешивания, заполненном\nльдом, перемешать все ингредиенты.\n2. Отфильтровать в охлажденный коктейльный бокал.\n3. Украсить коктейльной вишней.\n\nAmeric an Bar 259", "Новый Орлеан\n\nМ\n\nузык а и кок тейли . П овсюду и пос тоянно . В удушающей\n\nАбсент Фраппе\n\nж аре не ясно , то ли это бары выходят на улицу, то ли\n\nAbsinthe Frappe\n\nулица вливае тс я в бары . Н а этом бесконечном празднике\n\nзвучание труб и саксофона чере дуе тс я с позвякиванием шейкера .\n\nУ кок тейлей Н ового О рлеана яркий цве т и яркий вк ус . У них ес ть\nда же опре де ленна я текс т ура , поскольк у в Н овом О рлеане е дин с твенный в мире с тиль жизни , где кок тейль объе диняе т две осно вополагающие ценнос ти города : праздник и гас трономию .\nН овый О рлеан – « колыбе ль » кок тейля . О н отчас ти напоминае т\nП ариж , отчас ти – Гавану. З десь изобре ли множес тво смешанных\nнапитков , которые непременно вк усные , подаютс я с улыбкой и без\nпафоса . Э то кок тейли д ля всех , кем бы вы ни были и отк уда бы ни\nприбыли . В конечном сче те , они символизируют лучшее , чем дол жен быть бар : гос теприимное , открытое всем заве дение , гремящее\nмузыкой и хорошими кок тейлями .\n\nСтаринный коктейль и один из самых популярных смешанных напитков Нового Орлеана.\nНа 1 бокал\n\nАбсент Pernod - 45 мл\nСахарный сироп - 15 мл\nСодовая вода - 60 мл\nМятные листики - 6-8 штук\n\n1. Абсент, мяту и сироп взбить в шейкере,\nзаполненном льдом.\n2. Отфильтровать (дабл стрейн) в бокал\nрокс, заполненный дробленым льдом.\n3. Налить содовую. Перемешать.\n4. Украсить мятой.\n\nБренди Круста\nBrandy Crusta\nСоздание этого коктейля приписывают Джозефу Сантине, который в 1850-х годах стал владельцем\nодного питейного заведения в Новом Орлеане. Представленный ниже рецепт был опубликован в\nсборнике Джерри Томаса «The Bartender’s Guide» 1862 года издания.\nВ своей книге «Изящное искусство смешивания напитков» (1958 год) Дэвид Эмбари советует при\nприготовлении коктейля группы Круста использовать большой лимон (или маленький апельсин)\nпримерно такого же диаметра, что и бокал. Он рекомендует сначала обрезать оба основания\nцитруса, а потом срезать одной полоской всю его кожуру. Обернуть этим твистом бокал изнутри,\nувлажнить край бокал и обмакнуть в сахарный песок, чтобы покрыть сахаром и края твиста, и\nкромку бокала.\nНа 1 бокал\n\nКоньяк - 50 мл\nЛикер Dry Orange Curaçao - два дэш\nЛимонный сок - дэш\nБиттер Angostura - дэш\nСахарный сироп - три дэш\nПол-лимона (для цедры)\nМелкий сахарный песок (для кромки)\n\n1. Для того чтобы сделать крусту, надо взять небольшой охлажденный винный бокал и вначале сделать у него кромку из сахара, протерев бортики кусочком лимона и обмакнув бокал в\nмелкий сахарный песок. Затем снять одной полоской кожуру с половинки лимона (как с яблока).\nВставить полоску из цедры в бокал, чтобы она покрывала изнутри его верхнюю часть.\n2. Жидкие ингредиенты взбить в шейкере, заполненном льдом, и отфильтровать в подготовленный бокал.\n\nAmeric an Bar 261", "Новый Орлеан\nНа 1 бокал\n\nКоньяк (или ржаной виски) - 50 мл\nБиттер Peychaud's - дэш\nАбсент - дэш\nСахар - 1-2 кусочка (по вкусу)\nЦедра лимона\n\n1. В бокал рокс положить дробленый лед, налить абсент и немного воды.\n2. Положить сахар на дно смесительного\nстакана. Налить на него биттер и растереть сахар пестиком.\n3. Добавить в смесительный стакан лед и\nналить коньяк. Перемешать.\n4. Вылить содержимое из охладившегося и\nприобретшего ароматы абсента бокала рокс.\n5. Отфильтровать в бокал рокс содержимое\nсмесительного стакана.\n6. Отжать в коктейль полоску цедры лимона\nи опустить ее в бокал.\n\nБ иттер P eychaud's\n\nСазерак\n\nКлассика\n\nSazerac Cocktail\n«Сазерак» – старинный коктейль, оставивший яркий след в истории, и его\nподают в тех заведениях, где уважают барную культуру.\nВ самом деле, каждый настоящий бармен, какие бы чудеса он ни творил\nво флейринге, должен знать рецепт «Сазерака». И если коктейль у него\nполучится, тогда его можно назвать барменом. В противном случае – непременное разжалование в бар беки!\nВ 1860-х годах Джон Б. Шиллер, представитель коньячной марки «Сазерак де Форж и сыновья», открыл бар в Новом Орлеане под названием\nThe Sazerac Coffee House, где он предлагал напитки на основе своего\nконьяка. Там появился предок сегодняшнего «Сазерака», когда коньяк приправили биттером Peychaud’s. Несколько лет спустя был добавлен абсент,\nа коньяк исчез, по-видимому, в связи с кризисом филлоксеры. Его заменили ржаным виски. Сегодня все бармены Нового Орлеана готовят «Сазерак»\nна основе ржаного виски. Тем не менее, великий Дейл ДеГрофф актом\nвысокой политики смешал в составе «Сазерака» равные части коньяка и\nржаного виски.\n«Сазерак» следует долго перемешивать, чтобы добиться полного равновесия между ароматической мощью, сладостью и свежестью. Поэтому для\nприготовления этого коктейля столь важен навык.\n\n262 Americ an Bar\n\nЭтот биттер на основе горечавки был создан в\n1838 году аптекарем французского происхождения Антуаном Пешо, обосновавшимся в Новом\nОрлеане. В 1860-х годах он стал незаменимым\nкомпонентом легендарного коктейля «Сазерак».", "Новый Орлеан\nРамос д жин физз\n\nКлассика\n\nRamos Gin Fizz\nВ 1888 году Генри Рамос приобрел в Новом Орлеане «Империал\nКабинет Салун». А через несколько лет он изобрел этот коктейль.\nЛегендарный успех «Рамос Джин Физза» объясняется не только ингредиентами, но и способом приготовления. Ежедневно в баре работали,\nкак минимум, восемь молодых барменов, которые взбивали только этот\nкоктейль. Сообщают, что на последний день карнавала 1915 года Генри\nРамос нанял в общей сложности 35 барменов, чтобы сбивать знаменитые «Рамос Джин Физзы». Но коктейль был настолько популярным, что\nнесмотря на все усилия, персонал не справлялся, и своего заказа приходилось ждать по часу. Один из посетителей в свое время даже заявил, что «выпить \"Рамос Джин Физз\" – это все равно, что попробовать\nцветок». Скорее всего, именно сложность приготовления и прозвучала\nв свое время похоронным звоном для этого уникального в своем роде\nкоктейля. Дело в том, что после закрытия салуна из-за сухого закона\nне осталось барменов, готовых потратить должную энергию на этот\nкоктейль.\nНынешняя мода на джин и на смешанные напитки из Нового Орлеана\nвновь вызвала интерес к «Рамос Джин Физзу», и он быстро взошел на\nуровень коктейльной классики.\nСекрет «Рамос Джин Физза», среди прочего, состоит в том, что его\nнеобходимо встряхивать в шейкере буквально на пределе человеческих возможностей. «Руководство гурмана Нового Орлеана» (1945 год)\nуточняет, что настоящее искусство приготовления коктейля состоит в\nшейке: «Не думайте, что встряхнув несколько раз шейкер, вы на этом\nзакончили. Все еще только начинается. Вы должны заполнить шейкер\nльдом и встряхивать его, пока содержимое не загустеет настолько, что\nвы перестанете слышать удары льда о стенки шейкера. Если вы этого\nне добьетесь, у вас не получится Джин Физз в новоорлеанском стиле».\nСледует отметить, что некоторые старинные рецепты рекомендуют\nиспользовать «Драй джин», а другие – «Олд Том». Также существуют\nразногласия в отношении экстракта ванили. Одни настаивают, что он\nвообще никогда не использовался, другие же, наоборот, утверждают,\nчто именно в нем заключается тайна великого коктейля.\nНа 1 бокал\n\nСахарный песок - 1 ст.л.\nФлердоранжевая вода - 3 капли\nСок половинки лайма\nСок половинки лимона\nДжин - 40 мл\nЯичный белок\nСливки - 40 мл\nВанильный экстракт - 2 капли\nСодовая вода\n\nБренди Милк Панч\nBrandy Milk Punch\nИзлюбленный старинный коктейль в Новом\nОрлеане, который здесь начинают пить с самого\nутра.\nНа 1 бокал\n\nКоньяк - 50 мл\nЦельное молоко - 240 мл\nСахар - чайная ложка\n\n1. В шейкере, заполненном льдом, основательно взбить ингредиенты в течение одной\nминуты.\n2. Отфильтровать в крупный бокал типа\nслинг, заполненный дробленым льдом.\n3. Посыпать молотым мускатным орехом.\n\n1. С барного ситечка снять пружину и положить\nее в шейкер. Поместить в шейкер (без льда) все\nкомпоненты, кроме содовой, и энергично взбить в\nтечение, как минимум, 3 минут, пока коктейль не\nобретет вязкую консистенцию.\n2. Удалить пружину, заполнить шейкер льдом и\nочень энергично взбить его еще в течение двух\nминут.\n3. Перелить содержимое в бокал хайбол, предварительно заполненный льдом.\n4. Добавить содовую воду, перемешивая палочкой,\nчтобы лучше смешать воду с пеной.\n\nAmeric an Bar 263", "Новый Орлеан\nК октейли без льда\n«П усс кафе» и С каффы\nВо Франции в середине 19 века вошло в моду пить слоистые коктейли сразу после кофе,\nкоторый они якобы проталкивали дальше. Эти напитки называли «Pousse Café» – проталкиватель для кофе. Чаще всего они состояли из ликеров и коньяка или кирша. Затем Pousse\nCafé завезли в Америку и стали подавать в салунах Нового Орлеана, где сокращенно их\nстали звать scaffa (скаффа).\nНадо сказать, что лед в то время был дорогим и весьма редким ингредиентом. Поэтому не\nтребующие охлаждение скаффы и пусс кафе были очень практичны при подаче и употреблении. В наше время, из-за возрастающего интереса к историческим напиткам, коктейли\nкомнатной температуры опять пользуются благосклонностью у бартендеров.\nРазумеется, без льда лучше всего держат баланс выдержанные спиртные напитки: темный\nром, коньяк, виски, текила аньеха. Кроме того, подходят некоторые, не самые сладкие ликеры, а также ингредиенты с горьким вкусом: амаро, биттеры, вермуты.\n\nПимз Кап\nPimm’s Cup\nОдин из самых популярных коктейлей в Новом\nОрлеане, фирменный напиток «Наполеон Хауса», где его воскресили из прошлого, а именно\nиз Лондона 19 века.\nНа 1 бокал\n\nPimm’s - 40 мл\nЛимонад - 120 мл\nГазированный напиток 7Up - 10 мл\n\n1. В бокал хайбол положить несколько кубиков\nльда. Налить Pimm’s и лимонад. Добавить 7Up.\n2. Украсить ломтиком огурца. Подавать с\nтрубочкой.\n\nК узнечик\n«Проталкивате ль кофе» от Сантины\nSantina’s Pousse Cafe\nPousse Cafe, или «проталкиватель кофе» – это слоистый коктейль французского происхождения.\nПо традиции их подавали сразу после кофе.\nЭтот самый известный рецепт «проталкивателя кофе» был придуман в середине 19 столетия\nхозяином новоорлеанского заведения Spanish Cafe по имени Джозеф Сантина.\nНадо сказать, что слоистые коктейли были чрезвычайно популярны во второй половине 19 и в\nпервой половине 20 столетия. Pousse Cafe дали рождение группе Scaffa (слово «скаффа» в Новом Орлеане соответствовало сокращенному произношению «пус кафе»). Эта группа охватывает\nсмешанные напитки, которые подают при комнатной температуре.\nРецепт из сборника Джерри Томаса «The Bartender’s Guide», 1862 год.\nНа 1 бокал\n\nЛикер Dry Orange - 20 мл\nЛикер Maraschino - 20 мл\nКоньяк - 20 мл\n\n1. С помощью барной ложки налить слоями в небольшую рюмку ингредиенты в указанной\nпоследовательности, закончив коньяком.\n\nБренди Скаффа\nBrandy Scaffa\n\nGrasshopper\n«Кузнечик» появился в начале 1900-х годов.\nС тех отдаленных времен и до нынешнего дня\nон считается авангардистским коктейлем.\nСочетание шоколадного и мятного вкуса может\nвызвать настоящий вкусовой шок.\nВ знаменитом фильме Джона Франкенхаймера\n«Ронин» герой Роберта ДеНиро рассказывает о\nпытках, которым его подвергали враги. «Какие\nпытки?» – спрашивает его один из персонажей.\n«Ужасные, невыносимые пытки», – отвечает\nДеНиро. «Но какие именно?» – продолжает настаивать другой. «Ну, например, они заставили\nменя пить коктейль \"Кузнечик\"!»\nПо правде говоря, «Кузнечик» не заслуживает\nстоль негативных суждений. Хорошо приготовленный из отборных компонентов, он восхитителен в качестве дижестива.\nСогласно одной из версий этот исторический\nкоктейль был придуман в новоорлеанском\n«Тюжагсе». В любом случае, «Кузнечик» – фирменный напиток этого бара.\nНа 1 бокал\n\nДжерри Томас. «The Bartender’s Guide», 1862 год.\nНа 1 бокал\n\nБренди - 30 мл\nЛикер Maraschino - 30 мл\nБиттер - два дэш\n\n1. Налить ингредиенты в небольшой винный бокал в указанной последовательности.\n\n264 Americ an Bar\n\nЗеленый мятный ликер - 25 мл\nЛикер Cacao White - 25 мл\nСливки - 25 мл\n\n1. Ингредиенты основательно взбить в\nшейкере, заполненном льдом.\n2. Отфильтровать в охлажденный коктейльный бокал.", "Новый Орлеан\nАмброзия\nAmbrosia\nС. К. Артур – автор книги «Famous New Orleans\nDrinks and How to Mix’em» (1937 год) – получил\nэтот рецепт напрямую от основателя известного новоорлеанского ресторана – графа Арно\nКазенава.\nНа 1 бокал\n\nКоньяк - 20 мл\nЯблочный бренди (или кальвадос) - 20 мл\nСвежевыжатый лимонный сок - 10 мл\nЛикер Cointreau - 10 мл\nОхлажденное шампанское - 60 мл\n\n1. В шейкере, заполненном льдом, взбить все\nингредиенты, кроме шампанского.\n2. Отфильтровать в охлажденный фужер.\nДобавить шампанское.\n\nЛа Луизиан\nLa Louisiane\n\nСтарый Квадрат (Вьё Каре)\n\nКлассика\n\nVieux Carré Cocktail\nКоктейль носит название Французского квартала, то есть первоначального ядра Нового Орлеана. Он был изобретен в 1930-х годах в отеле\n«Монтелеоне» Уолтером Берджероном. Это не самый древний из коктейлей, придуманных в Новом Орлеане. Но он содержит одновременно и ржаной виски, и коньяк, примиряя ностальгирующих по Франции\nс патриотами Америки. С некоторых пор этот коктейль сделался одним\nиз символом города после, разумеется, «Сазерака» и наряду с «Рамос\nДжин Физзом». Рецепт из сборника Стэнли Клисби Артура «Famous New\nOrleans Drinks and How to Mix’em», 1937 год.\nНа 1 бокал\n\nРжаной виски (или бурбон) - 30 мл\nКоньяк - 30 мл\nКрасный вермут Martini Rosso - 30 мл\nЛикер Bénédictine - 7.5 мл\nБиттер Ангостура - два дэш\nБиттер Peychaud’s - два дэш\n\n1. В бокал рокс положить несколько кубиков\nльда.\n2. Добавить ингредиенты и перемешать.\n3. Украсить твистом из лимонной цедры.\n\nЕще один рецепт из книги С. К. Артура «Famous\nNew Orleans Drinks and How to Mix’em» (1937\nгод). Это, в некотором роде, эволюция «Сазерака» и почти родной брат «Старого Квадрата».\nКоктейль подавали в одноименнои новоорлеанском ресторане французской кухни – La\nLouisiane, который был основан в 1881 году и в\nсвое время являлся одним из самых шикарных\nзаведений города.\nЭтот рецепт долгое время пребывал в забытье,\nно в последнее время в связи с возрастающей\nмодой на новоорлеанские коктейль, вновь был\nвзят на вооружение миксологами.\nНа 1 бокал\n\nРжаной виски (или бурбон) - 30 мл\nКрасный вермут Martini Rosso - 30 мл\nЛикер Bénédictine - 30 мл\nАбсент - три-четыре дэш\nБиттер Peychaud’s - три-четыре дэш\n\n1. Ингредиенты перемешать в стакане для\nсмешивания, заполненном льдом.\n2. Отфильтровать в охлажденный коктейльный бокал.\n3. Украсить вишней.\n\nAmeric an Bar 265", "С у хой закон\n\nС\n\nу хой закон , дейс твовавший в С ое диненных Ш тата х с 1920 по\n\n1933 год , запреща л прода ж у и изготовление спиртных напитков . П ервым из его пос ле дс твий была у течк а мозгов , что распрос транило к ульт уру кок тейлей по всем с транам . П отеряв работ у,\nамерик анские бармены не опус тили руки . О ни открыли бары заграни цей и научили своим ме тодам приготовления кок тейлей барменов из\n\nА нглии , Ф ранции и И та лии .\nВ А мерике главным феноменом с у хого закона было открытие много чис ленных спикизи , то ес ть подпольных баров . Термин « speakeasy »,\nозначающий « говорить тихо », был заимс твован из ж аргона , которым\nпользова лись контрабандис ты в конце 19 с толе тия .\nС пикизи – бары без вывески , котора я могла их выдать , – принима ли\nтолько посвященных . В спикизи подава ли контрабандные или само де льные спиртные напитки . Д ля того чтобы скрыть привк ус нек аче с твенного а лкоголя или замаскировать крепкие напитки от влас тей\nв с лучае полицейского на ле та , лучше всего подходили кок тейли .\n\nЮжная сторона\nSouthside\nСуществует легенда, согласно которой во время\nсухого закона этот коктейль был излюбленным\nнапитком Аль Капоне и отчаянных ребят из его\nбанды с южной стороны Чикаго.\nВпервые рецепт коктейля встречается в книге\nХьюго Энсслина «Recipes for Mixed Drinks» 1916\nгода, но – в виде лонг дринка, то есть разбавленный содовой водой. Сегодня этот коктейль\nвновь пользуется большой популярностью,\nсопровождая моду на спикизи.\nНа 1 бокал\n\nДжин Beefeater - 50 мл\nСвежевыжатый лимонный сок - 25 мл\nСахарный сироп - 20 мл\nСвежая мята - 10 листиков\n\n1. Все ингредиенты взбить в шейкере, заполненном льдом.\n2. Отфильтровать (дабл стрейн) в охлажденный коктейльный бокал.\nПетербургский бар «Кабинет» служит русской\nверсией «спикизи» времен сухого закона. Кроме\nтого, он объединяет страсть к игре и к коктейлям.\nГость вначале выбирает одну из четырех карт,\nсоответствующую его вкусовым предпочтениям.\nБармен-крупье – Георгий Муромцев – предлагает\nему три другие карты с коктейлями, из которых\nгость должен выбрать тот напиток, который он\nбудет пить.\n\n266 Americ an Bar", "С у хой закон\nБлинкер\n\nВарварский берег\n\nBlinker\n\nBarbary Coast\n\nПоявившийся на свет, по всей видимости, во\nвремя сухого закона, «Блинкер» был впервые\nупомянут в 1934 году в справочнике Патрика\nДаффи «The Official Mixer’s Manual».\nСовременная тенденция при приготовлении\nэтого коктейля заключается в использовании\nмалинового сиропа вместо Гренадина (причем в меньшей пропорции) и увеличении доли\nвиски в ущерб грейпфрутовому соку.\n\n«Только в порыве безысходности можно смешать шотландский виски с джином. Но сухой\nзакон был безысходным временем... И, к удивлению, результат получился недурственным», –\nнаписал об этом коктейле Дэвид Уондрич.\nРецепт из сборника Уильяма Бусби «World\nDrinks and How to Mix Them», 1934 год.\n\nНа 1 бокал\n\nБурбон - 40 мл\nГрейпфрутовый сок - 60 мл\nСироп Гренадин - 20 мл\n\nНа 1 бокал\n\nДжин - 25 мл\nШотландский виски - 25 мл\nЛикер Cacao White - 25 мл\nСливки - 25 мл\n\nП одпольный джин из спикизи\nО существовавших во время сухого закона\nспикизи ходит масса различных слухов и легенд.\nНапример, рассказывают, что в некоторых из них\nдистиллировали джин прямо на месте, причем, в\nперегонных аппаратах со змеевиком, спрятанным\nв поручнях лестниц. Может быть, это и не правда.\nНо очень романтично. Эти легенды свидетельствуют о том, что в подпольных условиях легче\nвсего было изготавливать именно джин. Вкус\nкустарного спирта, не прошедшего ректификацию,\nскрывали за мощными ароматами можжевельника. Потом оставалось лишь найти удачный рецепт\nкоктейля и подходящую музыку, чтобы в спикизи\nцарила атмосфера вновь обретенной свободы. По\nвсем этим причинам, джин – это спиртной напиток, который лучше всего символизирует коктейли\nэпохи сухого закона.\n\n1. Взбить ингредиенты в шейкере со льдом.\n\n1. Взбить ингредиенты в шейкере, заполненном льдом.\n2. Отфильтровать в охлажденный коктейльный бокал.\n\n2. Отфильтровать в охлажденный коктейльный бокал.\n\nГрязный Мартини\n\nКолониальный коктейль\n\nСу хой закон\n\nDirty Martini\n\nColonial Cocktail\n\nProhibition Cocktail\n\nПолитика и искусство приготовления коктейлей\nидут рука об руку. В обоих случаях требуются\nловкость и соблюдение пропорций. А вы знаете,\nчто «Грязный Мартини» появился на исходе\nсухого закона, и некоторые приписывают его\nавторство самому Франклину Рузвельту? Он\nдобавил в коктейль «Драй Мартини» чайную\nложку маринада от оливок. «Драй Мартини»\nутратил свою кристальную прозрачность, зато\nприобрел дополнительный аромат. Говорят\nтакже, что в Тегеране в 1943 году американский\nпрезидент угостил «Грязным Мартини» Сталина\nи Черчилля.\n\nЭтот типичный коктейль времен сухого закона\nбыл придуман барменом по имени Марко\nХэттем в нью-йоркском ресторане Colony.\nУ него было несколько версий, все из которых\nимели под собой одну общую цель: сгладить\nвкус «бастаб-джина», в буквальном смысле, –\nджина, изготовленного в ванной.\nРецепт из книги Патрика Даффи «The Official\nMixer’s Manual», 1934 год.\n\nУсловия сухого закона стимулировали воображение бармена. Требовалось не только компенсировать отсутствие многих ингредиентов,\nно еще и скрыть вкус кустарного алкоголя. Поэтому в то время появились на свет смешанные\nнапитки с выразительным вкусом и сильными\nароматами, как этот коктейль, рецепт которого приводится из книге Патрика Даффи «The\nOfficial Mixer’s Manual», 1934 год.\n\nНа 1 бокал\n\nСу­х ой вер­м у­т - 15 мл\nДжи­н - 55 мл\nОливковый рассол - дэш\n\n1. В смесительный стакан положить лед и\nналить ингредиенты.\n2. Перемешать и отфильтровать в охлажденный коктейльный бокал.\n3. Украсить двумя оливками и подать.\n\nНа 1 бокал\n\nДжин - 60 мл\nСвежевыжатый грейпфрутовый сок - 30 мл\nЛикер Maraschino - три дэш\n\n1. Взбить ингредиенты в шейкере, заполненном льдом.\n2. Отфильтровать в охлажденный коктейльный бокал.\n3. Украсить оливкой.\n\nНа 1 бокал\n\nДжин - 40 мл\nАперитив Lillet Blanc - 40 мл\nАпельсиновый биттер - два дэш\nЛикер Apricot Brandy - дэш\n\n1. Взбить ингредиенты в шейкере, заполненном льдом.\n2. Отфильтровать в охлажденный коктейльный бокал.\n3. Отжать в коктейль кусочек лимонной\nцедры и опустить его в бокал.\n\nAmeric an Bar 267", "Х о л о д н а я в о й н а (1946 – 1991)\nМосковский мул\n\nКлассика\n\nMoscow Mule\n\nК\n\nок тейли , созданные пос ле\n\nВ торой мировой войны ,\nотражают тот неподде льный\n\nинтерес , который вызыва л у амери канцев СССР. Страна , близкая по\nразмерам и умс твенным способ нос тям насе ления , соответс твен но , конк урент и соперник .\n\nН еобъяснимым , но вполне реа ль ным образом , чем больше А мерика\nопаса лась русских , тем больше\nона пила водки . И ли это для того ,\nчтобы читать чу жие мыс ли?\nТем не менее , весьма с транно, что\nкок тейль «М осковский М ул » был\nпридуман в 1940-х годах в пред верии маккартизма !\nА кок тейль «Ч ерный Р усский » был\nизобретен в Б рюссе ле по с лучаю\nу жина в чес ть американской да мы - пос ла . И с тория ума лчивает, не\nвс та л ли он ей поперек горла ...\nП о справедливос ти , кок тейли вре мен Холодной войны должны по даваться очень холодными . И чем\nбольше в них водки , тем холоднее\nвойна .\n\n268 Americ an Bar\n\n«Московский мул» был придуман в 1940-е годы в Лос-Анджелесе двумя\nамериканцами. Один из них – сотрудник компании, торгующей напитками, а другой – хозяин ресторана Cock‘n’Bull, на складе которого скопилось слишком много имбирного пива. Позднее в рецепте коктейля к\nводке и имбирному пиву присоединился сок лайма.\nРецепт из сборника Лусиуса Биба. «The Stork Club Bar Book», 1946 год.\nНа 1 бокал\n\nВодка - 60 мл\nСвежевыжатый сок лайма - 15 мл\nGinger Beer\n\n1. Наполнить металлическую кружку\nдробленым льдом.\n2. Налить ингредиенты, перемешать.\n3. Украсить ломтиком лайма.", "Х о л о д н а я в о й н а (1946 – 1991)\nЧерный русский\n\nКлассика\n\nBlack Russian\nС исторической точки зрения, оба «Русских» – и «Черный», и «Белый» –\nпредставляют собой эволюцию старинных коктейлей.\n«Черный Русский» – это видоизмененный Russian Cocktail (водка, джин и\nликер из какао), который можно найти в «Книге коктейлей Савойя» Гарри\nКрэддока. А «Белый Русский» – это почти Alexander The Great (водка, кофейный ликер, ликер из какао и сливки), который, в свою очередь, является вариацией знаменитого «Александра» и содержится в «Книге Сторк\nКлаб Бара» (1946 год).\nИз двух коктейлей «Черный Русский» представляется более старинным.\nГоворят, что его изобрел в 1949 году бельгийский бармен по имени Густав\nТопс в брюссельском отеле «Метрополь» в честь американской дамы-посла из Люксембурга. Версия кажется достаточно маловероятной. Но примем ее такой, какая она есть. Позже, в 1960-х и 1970-х годах, «Черный Русский» был способом употребления водки, продвигаемым брендом Kahlua.\nНа 1 бокал\n\nВодка - 40 мл\nКофейный ликер Kahlua - 20 мл\n\n1. В бокал рокс положить 3-4 кусочка льда.\n2. Налить ликер и водку, перемешать.\n\nБелый русский\n\nКлассика\n\nWhite Russian\nПервое письменное упоминание о «Белом Русском» датируется 1965\nгодом. Тогда его рецепт был опубликован в двух газетах – в Бостоне и\nОкленде, городе неподалеку от Сан-Франциско.\nКультовый фильм «Большой Лебовский» с Джефом Бриджесом в главной\nроли, вышедший на экраны в 1998 году, способствовал новому взлету\n«Белого Русского», поскольку герой фильма по прозвищу Дьюд потребляет\nего в неимоверных количествах. Я даже где-то читал, что некоторые фанаты при просмотре фильма готовят себе столько же «Белых Русских», что и\nДьюд, и пьют их одновременно с ним, утверждая, что лишь таким образом\nможно понять все тонкости фильма и сохранить к нему интерес навсегда,\nпоскольку никогда не удается досмотреть его до конца.\nНа 1 бокал\n\nВодка - 30 мл\nКофейный ликер Kahlua - 20 мл\nВзбитые сливки - 20 мл\n\n1. В бокал рокс положить 3-4 кубика льда.\n2. Налить ликер и водку, перемешать. Сверху добавить сливки.\n\nAmeric an Bar 269", "Х о л о д н а я в о й н а (1946 – 1991)\n\nВодк а Мартини\n\nКлассика\n\nVodka Martini\nСамый знаменитый вариант «Драй Мартини». Его первое письменное упоминание встречается в сборнике коктейлей от Лусиуса Биба «The Stork Club\nBar Book» 1946 года издания.\nКоктейль «Водка Мартини», в свою очередь, породил многочисленное потомство – огромную группу разнообразных мартини на основе водки.\nВ начале этого тысячелетия одним из самых известных его представителей\nбыл коктейль «Эппл Мартини» (Apple Martini), который, помимо водки\n(60 мл), включал яблочный ликер (30 мл) и украшался ломтиком яблока.\nНа 1 бокал\n\nВодка Grey Goose - 55 мл\nСухой вермут - 15 мл\n\n1. В смесительном стакане перемешать ингредиенты со льдом.\n2. Отфильтровать в охлажденный коктейльный бокал.\n3. Выжать в коктейль цедру лимона.\n4. Украсить оливкой или лимонной цедрой.\n\n270 Americ an Bar\n\nГрейхаунд\nGreyhound\nЭто один из тех коктейлей, которые поначалу\nготовились на основе джина, а после Второй\nмировой войны обратились к водке, набиравшей в то время свою мировую известность.\nЕсли на бокале «Грейхаунда» сделать красту\nиз соли, то он превратится в «Соленую собаку»\n(Salty Dog).\nНа 1 бокал\n\nВодка Grey Goose - 40 мл\nСок грейпфрута - 120 мл\n\n1. Налить ингредиенты в бокал рокс, заполненный льдом. Перемешать.\n2. Украсить ломтиком грейпфрута.", "Х о л о д н а я в о й н а (1946 – 1991)\nЦарица\n\nОтвертка\n\nСиний понеде льник\n\nCzarina\n\nScrewdriver\n\nBlue Monday\n\nЛусиус Биб. «The Stork Club Bar Book», 1946 год.\n\nСчитается, что этот коктейль был придуман\nамериканскими авиамеханиками, работавшими на Среднем востоке в начале 1950-х\nгодов. Не имея под рукой необходимых барных\nаксессуаров, они перемешивали водку с соком\nобычной отверткой (Только не надо брать с них\nпример). От этого появилось на свет название\nкоктейля.\nЦвет этого напитка особенно показателен, отражая его крепость. Чем насыщеннее оттенок,\nтем меньше содержание алкоголя. Качественная водка и свежевыжатый сок – вот секрет\nуспеха этого коктейля.\n\nТед Сосье. «Bottoms up», 1951 год.\n\nНа 1 бокал\n\nCape Codder\n\nНа 1 бокал\n\nВодка - 30 мл\nЛикер Apricot Brandy - 25 мл\nБелый французский вермут - 15 мл\nКрасный итальянский вермут - 15 мл\n\n1. В шейкере, заполненном льдом, взбить\nингредиенты.\n2. Отфильтровать в охлажденный коктейльный бокал.\n\nКозак\n\nНа 1 бокал\n\nВодка - 45 мл\nЛикер Cointreau - 15 мл\nЛикер Blue Curaçao - дэш\n\n1. В шейкере, заполненном льдом, взбить все\nингредиенты.\n2. Отфильтровать в охлажденный коктейльный бокал.\n\nКейп коддер\n\nCossak\n\nВодка - 50 мл\nАпельсиновый сок - 120 мл\n\nДэвид Эмбари. «The Fine Art of Mixing Drinks»,\n1958 год.\n\n1. В бокал хайбол положить 4-5 кубиков льда.\n2. Налить водку и сок, перемешать.\n3. Украсить ломтиком апельсина.\n\nСчитается, что этот коктейль был создан\nмаркетологами
