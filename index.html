в Италии наименованием DOCG.\n\nСорта винограда\nИгристые вина просекко получили свое название\nот старинного сорта винограда Prosecco, который\nв 2009 году переименовали в Glera (Глера).\nЧасто он дополняется сортами Вердизо, Перера\nи Бьянкетта. Вердизо привносит кислоту и свежесть, играя особо важную роль в жаркие годы.\nОчень древний сорт Перера сообщает ароматы\nгруши.\nНаконец, виноград Бьянкетта восходит к 1500 году\nи призван уравновесить Вердизо, в особенности,\nв прохладные годы, когда важно придать купажу\nбольше нежности.\nВ результате эти сорта винограда позволяют добиться баланса между свежестью и полнотой ароматов.\n\nВенеция является королевством\nпросекко, а просекко – эмблематичным напитком Венеции.", "Виды просекко\nПросекко – вино, которое пьют молодым, в течение одного-двух лет после сбора урожая. Просекко может быть «брют» (самое сухое), «экстра\nдрай» (очень сухое) или «драй» (сухое).\nКак правило, просекко – это спуманте (spumante),\nто есть игристое вино с таким же сильным давлением в бутылке, что и у шампанского. В этом\nслучае бутылка закупоривается пробкой со\nстальной уздечкой. Но оно может быть и обычным слабо-игристым фризанте (frizzante), и тогда\nпробку удерживает небольшая бечевка, которую\nназывают «cпаго».\n\nДегустация\nВенецианский коктейль «Беллини»\n(просекко и персиковое пюре) – это\nполная противоположность «Драй\nМартини». Последний – сухой и\nбрутальный – поставит вас на рельсы\nпосле трудного рабочего дня. А\nнежный «Беллини» станет спутником\nсладостных дней «дольче виты».\nНа фото – подача «Беллини» в венецианском «Гаррис баре», где он был\nпридуман его основателем Джузеппе\nЧиприани.\n\nПросекко проявляет ароматы белых цветов, которые сопровождают ноты яблок, груши, цитрусовых и экзотических фруктов.\nВо вкусе просекко обладает превосходным балансом между нежностью и кислотностью, который определяет его прелесть и способность\nдоставлять наслаждение. Финал под знаком\nфруктов – одна из его главных отличительных\nчерт.\nДля получения максимальной экспрессии и полного удовольствия от дегустации важнейшим\nусловием является температура подачи. Она\nдолжна составлять от 6 до максимум 8°C. Поэтому\nпросекко подают в ведерке со льдом.\n\nПросекко, Венеция и\nискусство жить по-итальянски\nСуществует не так уже много вин, несущих в себе\n\nстолько положительных ассоциаций. Просекко\nсочетает все характерные черты Италии.\nЭто элегантное и современное, очень трендовое\nвино, которое заказывают бокалами в барах или\nзапивают им хороший ужин в ресторанах или открывают дома в кругу друзей по поводу любого\nпраздника.\nЕго успех не вызывает сомнений, поскольку в настоящее время влияние просекко растет с впечатляющей быстротой практически во всех странах мира.\nПросекко является символом Венеции, где его\nпьют на террасах всех кафе. Кроме того, это игристое вино входит в состав знаменитых венецианских коктейлей «Спритц» и «Беллини».\nСоздателем «Беллини» является Джузеппе Чиприани (1900–1980), который был выходцем из\nбедной семьи и успел поработать официантом\nво множестве отелей по всему миру, пока не обосновался в Венеции.\nС легкостью общаясь с клиентурой на многих\nязыках, он стал барменом в отеле «Европа». Однажды он одолжил значительную сумму одному\nиз своих клиентов, молодому американцу по имени Гарри Пикеринг. Тогда он был убежден, что навсегда распростился с деньгами. Но американец\nвернулся в Венецию и увеличил отданную сумму\nвчетверо, что помогло Джузеппе осуществить\nсвою мечту: открыть в Венеции собственный бар.\nВ благодарность американцу, Чиприани назвал\nсвое заведение, открывшее двери 13 мая 1931\nгода, «Гаррис бар». С тех пор его бар стал легендарным.\n\nВино 197", "И гристые вина M artini .\nП раздник родом из И талии\nС самого начала своего основания в 1863 году\nкомпания Martini производила не только вермуты, но и игристые вина, участвуя в становлении\nвинодельческих традиций Пьемонта, в частности, в области Асти.\nЗа 150 лет сотрудничества с виноградарями у\nMartini сложились с ними особые отношения.\nКомпания не просто закупает их виноград, но\nтакже активно участвует в развитии виноградарства.\nОбсерватория Martini занимается выведением\nновых клонов винограда, устойчивых к болезням, разрабатывает экологические способы\nборьбы с вредителями (например, привлекает\nптиц, развешивая скворечники среди лоз), а также оказывает консалтинговые услуги виноградарям, анализируя состав почв, составляя прогноз\nпогоды и давая рекомендации по сохранению\nокружающей среды.\nБлагодаря такому подходу, виноградники дают\nлучшие плоды, которые служат основой для\nизготовления качественных игристых вин. Их\nпроизводят путем брожения в герметично закрытых чанах, которое позволяет сохранить в\nвине свежий и фруктовый вкус винограда.\nПо сравнению с 1863 годом география игристых\nвин Martini расширилась. Сегодня наряду с\nисторическим Asti, компания Martini также производит сухое Martini Brut, розовое Martini Rosé\nи изысканное Martini Prosecco.\n\nM artini P rosecco\nИзготовленное на основе сорта Глера (минимум\n75%), Martini Prosecco обладает выразительными\nфруктовыми ароматами винограда с оттенками\nцветов, зеленого яблока и цитрусовых. Приятный\nполусухой вкус заканчивается тонкими минеральными нотами в послевкусии.\nMartini Prosecco – это классический аперитив,\nигристое вино для террас и вечеринок. Также оно\nпослужит гастрономическим спутником многих\nблюд, сочетаясь с морепродуктами, прошутто, средиземноморскими салатами и свежими\nсливочными сырами. Кроме того, Martini Prosecco\nстанет основой изысканного коктейля, например, классического Bellini или популярного\nMartini Royale.\n\n198 Вино\n\nДля подачи Martini Prosecco в чистом виде лучше всего использовать винный бокал. Летом стоит\nдобавить лед, так как вино быстро нагревается. Зимой можно подавать просекко без льда, но\nхорошо охлажденным: до 6°С.\n\nM artini B rut\nЭто сухое игристое было создано более 80 лет\nназад. В его основе лежит виноград классических сортов (Глера, Шардоне, Совиньон, Рислинг),\nвыращенный в Пьемонте и Венето.\nВино производится методом Шармата-Мартинотти: с вторичным брожением в герметично\nзакрытых чанах.\nЭто элегантное, мягкое вино, без излишней\nкислотности, в котором пузырьки углекислого\nгаза подчеркивают тонкие ноты миндаля, груши\nи зеленого яблока. Оно послужит не только превосходным аперитивом, но и дополнит блюда из\nморепродуктов. Подавать охлажденным до 6°C.", "M artini R osé и\nR osé E x tra D ry\n\nMartini Rosé\n\nMartini Rosé\nExtra Dry\n\nДва розовых игристых вина, каждое из которых\nполучено из своей, уникальной композиции\nкрасных и белых сортов винограда.\nMartini Rosé – полусухое ( 48 г сахара на литр), с\nделикатными ароматами красных ягод, шиповника и цветочными нотами.\nMartini Rosé Extra Dry – сухое (15 г сахара на\nлитр) лососево-розовое игристое, с элегантными\nароматами розы, экзотических фруктов и тонким\nприкосновением черного перца.\nОба вина отлично подойдут на роль аперитива\nи станут удачным гастрономическим спутником\nморепродуктов и блюд Средиземноморской кухни. Подавать охлажденными до 6-8°С в бокале\nфлюте.\n\nM artini A sti\nMartini Asti – легкое и сладкое игристое вино, с\nярким вкусом и фруктовыми ароматами.\nОно делается согласно всем правилам виноделия региона Асти, и ему присвоена самая\nвысокая классификация итальянских вин DOCG.\nКроме того, на этикетке вина красуются королевские гербы Италии, Испании и Португалии, свидетельствуя о том, что это вино с конца 19 века\nпоставлялось ко двору европейских монархов.\nMartini Asti – самое известное вино из Асти, лидер продаж в своей категории, как в Италии, так\nи во всем мире. На него приходится 35% мирового рынка вин из этого региона.\nАсти – один из наиболее престижных виноградников Италии, производящий вина с наименованием DOCG. В этом районе, раскинувшемся по обрывистым холмам, где зимой может быть\nмного снега, а летом удушающая жара, произрастает виноград сорта Москато Бьянко, дающий\nвина с ароматами цитрусовых и флердоранжа.\n\nПроизводство\nПосле сбора урожая виноград сразу деликатно отжимают с целью сохранить в будущем\nвине всю его легкость, минимизируя контакт\nс кожицей и препятствуя началу бродильного\nпроцесса. Поэтому сусло быстро фильтруется и\nохлаждается. В этот момент вино содержит всего\nлишь от 1 до 2% алкоголя. Затем оно помещается\nв закрытые бродильные чаны, где и происходит\nброжение, которое, насыщая вино углекислым\nгазом, делает его игристым, но при этом сохраняются все тонкие и возвышенные фруктовые\nароматы вина.\n\nДегустация\nMartini Asti проявляет великолепные и утонченные ароматы груши, персика, яблока и даже\nцветов бузины.\nОно подается при температуре от 5 до 8 °C.\nЭто вино в Италии пьют в конце второй половины дня. В гастрономии оно превосходно\nсочетается с любыми десертами, фруктами и\nмороженым. Особенно ценится его сочетание с\nзабайоне (сладким яичным кремом) и классическими панеттоне.\n\nMartini Asti и миксология\nПоскольку миксология опирается на вкус и\nгастрономию, бармен не может остаться равнодушным к той пользе, которую можно извлечь\nв баре из Martini Asti. Его восхитительный вкус\nсочетается со многими ароматами, образуя пленительные коктейли.\nКоктейли на основе Martini Asti не следует\nпредлагать утомленным деловым людям, только\nчто вышедшим из офиса. Они охотнее выпьют\n«Дайкири», «Манхэттен» или «Негрони», чтобы\nснять напряжение.\nКоктейли с Martini Asti – легкие и обворожительные. Их иногда называют «Pool Side Cocktails»,\n«коктейлями, которые пьют у бассейна», поскольку они позволяют освежиться, не теряя формы,\nблагодаря относительно невысокой крепости.\nКроме того, эти коктейли подают на разных женских праздниках, ближе к вечеру, сопровождая\nих миндальными пирожными или другими столь\nже чудесными сладостями.\nВсе эти игристые коктейли являются либо вариациями классических итальянских смешанных\nнапитков, либо – лонг дринками с фруктовыми\nсоками. Это неудивительно, ведь Мускат, скорее\nвсего, – тот сорт винограда, который лучше всего\nсочетается с фруктами.\nПо этой же причине, создавая более крепкий\nкоктейль с Martini Asti, можно добавить фруктовую водку, например, Grey Goose с апельсином\nили лимоном, которые позволяют добиться превосходного результата.\nВино 199", "Шампанское\nВ период Средневековья в Шампани делали красные вина, получавшиеся слегка шипучими. Они\nбыли фруктовыми и легкими, но имели одну\nнеприятную особенность – тенденцию к вторичному брожению в бочках, которые иногда даже\nвзрывались, за что вино из Шампани прозвали\n«дьявольским». Неконтролируемая ферментация\nвызывалась рядом причин, в том числе внезапными холодами, которые прерывали процесс\nброжения, оставляя в вине недобродивший до\nконца сахар.\nИстория шампанского – это история эволюции\n«дьявольского» вина. Здесь заслуга, по всей\nвидимости, принадлежит монаху по имени Дом\nПериньон, жившему в 17 веке. Он посвятил 47\nлет своей жизни изучению и совершенствованию\nшампанского. Он внес большой вклад в эволюцию этого игристого напитка своими работами\nпо купажированию и изучению брожения. Его\nпоследователям осталось усовершенствовать\nформу бутылок шампанского и укрепить пробку\nспециальным металлическим предохранителем.\n\nметрах северо-восточнее Парижа. Для здешних\nземель характерен тонкий верхний слой почвы,\nпокрывающий очень мощный пласт известняка\n(приблизительно 200 метров толщиной), который\nотлично регулирует температуру, вбирая в себя\nднем избыток солнечного тепла, чтобы вернуть\nего в холодные часы ночью. Также известняк\nрегулирует влажность, снабжая лозу водой.\nШампань – это самый северный район виноделия\nво Франции.\n\nПриродные условия\n\nВыжимка. После сбора урожая виноград разных\nсортов, разного качества, а также собранный с\n\nПровинция Шампань располагается в 150 кило-\n\n200 Вино\n\nПроизводство\nШампанское – это белое, иногда розовое вино,\nполученное из винограда белого и красных\nсортов. Сбор урожая осуществляется вручную.\nCобранные грозди складывают в специальные\nкорзины, где виноград не лопается от тяжести\nсобственного веса. Причина этих предосторожностей проста: красящие вещества красного\nвинограда содержатся в его кожице. Для получения из него белого вина необходимо сократить\nконтакт между кожицей и соком винограда.\n\nCлева. Монах Дом Периньон (16381715) сичтается создателем шампанского.\nCправа. Выжимка Шардоне в шампанском Доме G.H. Mumm.\nНа соседней странице. Погреба\nшампанского Дома G.H. Mumm.\n\nР егламентация\nДля того чтобы иметь право\nназываться «шампанским»\n(Champagne), вино должно отвечать\nследующим требованиям:\n• Оно должно производиться только в\nпровинции Шампань.\n• В его основе могут лежать только\nопределенные сорта винограда: два\nкрасных – Пино Менье и Пино Нуар\nи один белый – Шардоне. Они могут\nиспользоваться как поодиночке, так\nи вместе. Пино Нуар сообщает вину\nвкус и силу, Шардоне – элегантность\nи свежесть, а неприхотливый Пино\nМенье приходит на помощь в трудный\nгод урожая.\n• Может использоваться только\nтрадиционная технология\nпроизводства данного региона.", "разных участков, выжимают отдельно в небольших прессах.\nВиноделие. Каждое сусло подвергают брожению\nотдельно в металлических чанах или, для самых\nпрестижных марок, в старых дубовых бочках.\nКупажирование. Мастер смешивает различные\nвина, полученные из разных сортов винограда,\nс разных участков, из разного сусла и в разные\nгоды урожая. Так он добивается уникального\nвкуса, который присущ определенному шампанскому. Иногда для получения нужного вкуса смешивают до 50 вин.\nОбразование пены. В момент разлива по бутылкам в вино добавляют смесь из сахара и дрожжей. В герметично закупоренной бутылке начинается вторичное брожение, которое доводит\nкрепость вина, превращающегося в шампанское,\nдо 12% vol. и образует в нем столь желаемую пену\nпутем высвобождения запертого внутри бутылки\nуглекислого газа. Давление в бутылке поднимается, достигая 6 атмосфер (примерно как в шине\nавтобуса).\n\nГравюра из книги Джерри Томаса,\nна которой изображен Шампанькоктейль. Это старинный смешанный напиток. Согласно некоторым\nисследованиям, он восходит к\nначалу 1800-х годов.\n\nВ иды шампанского в\nза в­ исимо с­ т­ и от с ла д­ о ­с ти\n• Brut (ме­н ее 15 г са­х а­р а на литр)\n• Extra Sec (12–20 г/л)\n• Sec (17–35 г/л)\n• Demi Sec (33–50 г/л)\n• Doux (более 50 г/л)\n\nРемюаж. После выполнения своей работы дрожжи остаются в бутылке в виде осадка, от которого\nнеобходимо избавиться. Для этого его вначале переводят на пробку с помощью ремюажа:\nбутылку, изначально занимающую горизонтальное положение, каждый день слегка опускают\nгорлышком вниз и вращают вокруг собственной\nоси с тем, чтобы собрать осадок в горлышке.\nНа фирмах с небольшим производством ремюаж\nпроводят вручную. Другие компании используют\nспециальный аппарат, называемый «жиропалетт».\nОн управляется компьютером.\nВыдержка. В вертикальном положении шампанское выдерживают на осадке от 2 до 6 лет.\nДегоржаж. Чтобы окончательно расправиться\nс осадком, переведенным на пробку, бутылки в\nвертикальном положении отправляют на дегоржаж. Горлышки бутылок замораживают в растворе воды и соли, охлажденном до –18°С. Затем\nбутылку открывают, ледяная «пробка» выскакивает, забирая с собою весь осадок.\nПотеря жидкости компенсируется добавлением «экспедиционного раствора»: смеси из вина,\nконьяка и сахарного сиропа. Количество добавляемого сахара определяет вид шампанского.\nЗатем бутылки укупоривают новой пробкой,\nкоторую закрепляют проволочной уздечкой.\n\nВино 201", "1. Вина с чистыми ароматами, подходящие для хереса Fino, Manzanilla и Amontillado.\n2. Мощные вина, способные превратиться в херес\nOloroso.\n3. Неопределенные вина, за эволюцией которых\nеще придется следить.\n4. Вина без потенциала, которые безжалостно отправляют на перегонку.\nВина первой группы крепят с помощью бренди до\n15-15,5% vol. Вина второй группы – до 17,5% vol. Бочки оставляют открытыми, херес стареет в контакте\nс воздухом.\nОсобая атмосфера погребов благоприятствует\nпоявлению необычных дрожжей. Они развиваются в вине, менее крепком в алкоголе. Эти дрожжи\nобразуют на поверхности вина пленку, называемую «цветочная вуаль». Она защищает вино от\nокисления, сообщая ему особый вкус.\nВыдержка по системе «солера» позволяет «вуали»\nвыживать и уберегать херес от воздействия кислорода.\n\nОсновные виды хереса\n\nС истема « солера »\nКаждая разновидность хереса выдерживается отдельно по методу\n«солера». Идея этого метода состоит\nв том, что старое вино «воспитывает»\nмолодое. И у хереса отсутствует год\nурожая. Бочки с самым выдержанным\nхересом помещают на пол. Этот ряд\nбочек называется так же, как и сам\nметод, – «солера», что значит «пол»,\n«земля». На него ставят бочки с более\nмолодым хересом, образуя следующий ряд – первую криадеру. На эти\nбочки помещают ряд бочек с еще\nболее молодым хересом – вторую\nкриадеру и т.д. Такая конструкция\nдолжна содержать не меньше трех\nрядов. Когда винодел разливает часть\nсвоего вина в бутылки, он берет лишь\nтреть вина из каждой бочки нижнего\nряда «солера» и затем доливает в них\nвино из первой криадеры, а бочки\nпервой криадеры доливает хересом\nиз второй криадеры и т.д. Если в бочке нижнего ряда хранится столетнее\nвино, то по-настоящему его осталось\nтам очень мало, – скорее всего,\nтолько одна ложка. Зато характер получаемого хереса, его вкус и аромат,\nвсегда неизменны.\n\n202 Вино\n\nХерес\nХерес производят на юге Испании в Андалузии,\nв районе между городами Херес-де-ла-Фронтера,\nСанлукар-де-Баррамеда и Эль-Пуэрто-де-СантаМариа.\n\nПроизводство\nУрожай собирают вручную, чтобы не повредить\nнежные ягоды. Сорт Паломино дает самый утонченный херес и используется в 90% случаев. Также для полусладких и сладких разновидностей\nхереса используют сорта Педро Хименез и Александрийский Мускат. Виноград Паломино сразу\nувозят на переработку. Мускат и Педро Хименез\nоставляют на воздухе на 48 часов. За этот период\nсодержание сахара в винограде сильно поднимается. На винодельне виноград выжимают.\nБурное брожение сусла продолжается от трех\nдней до недели, затем оно становится спокойным\nи заканчивается в течение двух месяцев.\nКлассификация бочек. В декабре отдыхающее в\nбочках вино разделяют на 4 группы:\n\n• Fino (Фино). Вино бледно-желтого цвета с тонким букетом, сухое, с легким фруктовым вкусом\nминдаля и лесного ореха. Его крепость колеблется от 15,5 до 16% vol. Фино бледнее других разновидностей хереса, поскольку «вуаль» защищает\nего от окислительного воздействия воздуха.\n• Manzanilla (Манзанилья). Его единственное отличие от Фино состоит в том, что он производится в прибрежных областях. Фино и Манзанилья\nподаются при 7°С на аперитив.\n• Amontillado (Амонтильядо). Во время выдержки в этот херес несколько лет не добавляли\nмолодое вино, из-за чего «цветочная вуаль» постепенно умерла. Это мощный и сухой промежуточный херес между Fino и Oloroso. Он обладает\nянтарным цветом и характерным вкусом лесного\nореха. Пьют его охлажденным, при 12–15°С. Крепость – 17,5% vol.\n• Oloroso (Олоросо). Крепость Оloroso, что поиспански значит «ароматный», около 18% vol. Он\nсозревает без «цветочной вуали». У него темный\nзолотистый цвет и насыщенный, богатый винный\nвкус. Его пьют при температуре 15–16°С. Открытую бутылку хереса Олоросо не стоит хранить\nболее месяца.\n• Pale Cream (Пэйл крим). Бледное сладкое вино\nс мягким вкусом, его крепость – около 17,5% vol.\nПеред употреблением херес следует охлаждать\nдо 7°С.\n• Pedro Ximenez (Педро Хименез). Темное, мягкое, сладкое вино с нотами изюма. Его изготавливают из сорта Педро Хименез, крепость – около\n17% vol.", "Порто\nПроцесс производства порто был, по всей видимости, разработан монахами из монастыря Ламего. А позднее англичане прославили порто во\nвсем мире.\n\nПриродные условия\nВ долине Дору, где производят порто, дождливая\nзима и сухое жаркое лето с прохладными ночами.\nВиноград растет на обрывистых склонах на сланцевых почвах. Его корни уходят на 20-метровую\nглубину в поисках питательных веществ, что дает\nягоды с большой концентрацией ароматов.\n\nСорта винограда\nВ долине Дору выращивают более 30 сортов винограда. Однако чаще всего для производства\nпорто используются всего пять: Турига Насиональ, Тинта Рориз (он же Темпранильо), Тинта Барокка, Тинта Чао и Турига Франчеза.\n\nПроизводство\nСтруктура виноградников не позволяет использовать технику при сборе урожая, и все делается\nвручную. Виноград выжимают; сок вместе с кожурой бродит в контейнерах из нержавеющей стали. Через 2–3 дня сусло окрашивается в глубокий\nкрасный цвет, и примерно половина сахара превращается в алкоголь.\nСусло переливают в деревянные чаны и в него\nдобавляют 77-градусный бренди в количестве 1620% от общего объема. Это убивает дрожжи, сохраняет в вине часть сахара и придает ему силу\nи корпус. После этого вино «отдыхает» всю зиму.\nВесной молодое порто обычно перевозят в город Вила-Нова-ди-Гая, расположенный в низовье\nреки Дору на противоположном берегу от города Порто. Здесь вино выдерживают и купажируют.\nСырой прибрежный воздух и постоянная температура определяют идеальную выдержку, которая может продолжаться более 50 лет. Крепость\nготового порто – около 20% vol.\n\n• Tawny (Тауни). Купаж порто разных годов урожая, выдержанных в бочках (обычно не более 3\nлет). Это легкий, деликатный напиток, живой, мягкий и освежающий.\nTawny, по-английски – «коричнево-желтый», светлее других порто из-за более короткого контакта\nсока с кожицей винограда или из-за добавления\nбелого порто. У некоторых качественных tawny\nна этикетке указывается срок выдержки. Это\nсредний возраст вин, входящих в его купаж.\n• Vintage Character (Винтейдж кэректер). Купаж\nразных порто, которые были выдержаны около 4\nлет в бочках. У него глубокий цвет, полный сложный вкус и долгое винное послевкусие. Оно хорошо стареет в бутылке.\n• Late Bottled Vintage (Лейт боттелед винтейдж). Порто определенного года урожая, его\nвыдерживают от 4 до 6 лет. Сложное вино, готовое к употреблению сразу после разлива по бутылкам.\n• Vintage (Винтейдж). Самое престижное и дорогое порто, сделанное из винограда одного, исключительного по качеству года урожая. Вначале\nего выдерживают от 2 до 3 лет в дубовых бочках,\nзатем переливают в бутылки, где оно продолжает\nсвое созревание от 15 до 50 лет.\nВо время выдержки порто постепенно теряет насыщенность цвета, приобретает мягкость, сложность, уравновешенность и образует «корку»\n(осадок). На этикетке такого порто указан год\nурожая и разлива по бутылкам.\n\nК ак пить порто?\nПорто – это одно из самых дорогих\nвин. Как правило, его пьют в чистом\nвиде из специальных бокалов тюльпановидной формы. Причем бокал\nнаполняется только наполовину.\nНа аперитив подают белое порто или\nмолодое tawny.\nБелое порто обретает равновесие при\nтемпературе 9–11°С. Кроме того, его\nможно подать со льдом, ломтиком\nлимона или содовой. Молодое tawny\nтакже отлично подходит для аперитива. Его охлаждают до 12°С.\nНа дижестив следует пить Vintage,\nLate Bottled Vintage, Ruby, Vintage\nCharacter и выдержанный Tawny. Их\nподают при температуре 18°С.\nДля отделения порто от осадка бутылку ставят в вертикальное положение\nна 24 часа. Затем ее содержимое\nпереливают в графин через воронку.\nГорлышко бутылки держат над огнем\nсвечи. Как только осадок поступает в\nгорлышко, операцию по декантации\nпрерывают.\n\nОбрывистые виноградники в долине\nреки Дору.\n\nОсновные виды порто\n• White Port (белое порто) производят из белых сортов винограда. Варьируется от сухого до\nочень сладкого.\n• Ruby (Руби). Смесь молодых терпких порто, выдержанных в бочках около 3 лет. Оно обладает\nтемным рубиновым цветом и богато фруктовыми\nароматами.\n\nВино 203", "Ч асть первая . Г лава 12\n\nП иво\nС амое первое письменное упоминание о пиве относится к временам шумеров\n(они жили на территории нынешнего И рака в IV-II тысяче летиях до н . э .). И х\nпиво называ лось « сикару ». У же в тот период в его производс тве использова л ся соложеный ячмень . П озже вавилоняне продолжили традиции пивоварения\nи ос тавили множес тво письменных упоминаний о социа льной значимос ти\nпива . В т у эпоху злаки обычно перема лыва лись в муку, затем из нее де ла ли\nформовой « х леб », удобный для хранения и перевозки . Д ля получения пива надо\nбыло разме льчить этот « х леб », погрузить образовавшуюся массу в воду и ос та вить бродить на несколько дней .\n\nБ езалкогольное пиво\nБезалкогольное пиво можно получать\nдвумя основными способами:\n• очищением готового пива от алкоголя специальным фильтром;\n• прерыванием брожения путем\nпонижения температуры, при этом у\nпродукта сохраняется нужный вкус,\nа содержание алкоголя сводится к\nминимуму.\n\nВ эпоху расцвета Древней Греции и Рима у пива\nпоявился серьезный конкурент – вино. Римляне\nотделяли цивилизованный мир, в котором пили\nвино, от варварского, знавшего только пиво.\nВ Средние века в Европе ячмень был одной из\nсамых распространенных зерновых культур, и\nкаждая семья варила свое «домашнее» пиво. Постепенно самодельное пивоварение уступило\nместо производственному.\nВ конце 11 века в пиво стали добавлять хмель, который придал ему известный нам вкус.\nВпоследствии, до начала индустриальной революции, процесс производства пива оставался\nнеизменным. Однако в дальнейшем технический\nпрогресс способствовал быстрому развитию технологии пивоварения.\n\nП роизводство\nДля производства пива необходимы вода, зерно,\nдрожжи и хмель, от которых зависят сорт и качество получаемого напитка.\nЗерно, используемое для пивоварения, обычно\nможет быть двух видов: соложеное (только ячмень) и несоложеное (кукуруза, пшеница и рис).\nПри добавлении хмеля, придающего пиву горечь,\nиспользуются только женские растения, хотя для\nнекоторых английских сортов пива могут употребляться и мужские. Цветки хмеля, высушенные и\n\n204 Пив о\n\nспрессованные, предварительно выдерживают на\nхолоде.\nНа 100 л пива требуется от 100 до 200 граммов сушеных цветков хмеля. Помимо цветков, пивовары\nмогут использовать экстракты хмеля.\nПроцесс пивоварения складывается из приготовления солода и пивного сусла, а также брожения.\n\nПриготовление солода\nЗерно очищают, замачивают, а затем проращивают, оставляя на некоторое время в специальном,\nдостаточно теплом помещении, называемом солодовней (при температуре 17°С). Там оно превращается в зеленый солод, который затем сушат\nна специальных сушилках. При этом в нем образуются ароматические и красящие вещества,\nопределяющие вкус и цвет приготовляемого\nпива.\n\nПриготовление пивного сусла\nСолод дробят и смешивают с подогретой водой,\nблагодаря чему крахмал превращается в сахар.\nПолученную жидкость фильтруют и очищенное\nсусло варят с хмелем, что обеспечивает стерилизацию, ароматизацию и сгущение сусла. Этот\nпроцесс длится обычно от одного до двух часов\nв зависимости от сорта получаемого пива. Горячее сусло пропускают через хмелеотделитель и\nохлаждают. На этом заканчивается подготовка\nсусла к брожению.", "Пив о 205", "Брожение\nБрожение проходит две стадии: главное брожение и дображивание. Главное брожение бывает\nнескольких видов, что служит основой для получения разных сортов пива.\n1. Брожение при высокой температуре\nЭто самый старый способ брожения, использующий дрожжи. При температуре 15-20°С дрожжи\nподнимаются на поверхность пива за довольно\nкороткий период времени (от 3 до 5 дней). В результате получается насыщенный густой напиток\nс выраженным вкусом.\nПутем этого брожения производят такие виды\nпива, как эль, стаут, портер и некоторые сорта на\nоснове пшеницы.\n2. Брожение при низкой температуре\nЭтот наиболее распространенный вид брожения\nпроисходит с добавлением дрожжей в течение\n7-10 дней при довольно низкой температуре (от\n6 до 8°С). Дрожжи при этом остаются на дне бака.\nЭтот способ брожения дает нам такие разновидности пива, как лагер, пилсенер, бок и другие.\n3. Естественное брожение\nИспользуется в Бельгии для производства пива\nламбик и пива гёз. При этом брожение вызывают\nнатуральные дрожжи, существующие в атмосфере.\n\nДображивание\nПосле завершения главного брожения получается «зеленое» пиво, еще непригодное к употреблению. Оно дображивает при температуре около\n0-2°С, в это время пиво насыщается углекислым\nгазом, осветляется и приобретает полноту вкуса.\nПродолжительность дображивания и выдержки\nзависит от сорта получаемого пива и может варьироваться от 3 до 13 недель и более. Готовое\nпиво фильтруется и разливается по бочкам, банкам и бутылкам.\nЗдесь приведена лишь общая схема процесса пивоварения. На самом деле в зависимости от сорта\nпива, он может иметь те или иные особенности.\n\nР азновидности\nAbbaye (абеи)\n\nmild – некрепкое пиво с малыми добавками хмеля, bitter, stout или barley wine.\n\nAlt (алт)\nНемецкое название сортов пива, полученных\nброжением при высокой температуре. Alt означает «старый», по отношению к более современным\nсортам pils, бродящим при низкой температуре.\nПивоваренные заводы Дюссельдорфа специализируются на пиве подобного рода.\n\nBarley Wine (барлей уайн)\nЭтот термин означает «ячменное вино». В Великобритании так называют наиболее густые и крепкие сорта эля.\n\nBitter (биттер)\nЭто наиболее распространенный вид эля в Великобритании, который отличается достаточно\nгорьким вкусом, цвет бывает от янтарного до\nоранжевого. Наибольшее количество этого пива\nупотребляется в английских пабах.\n\nЗа исключением британского ale и\nнекоторых сортов, содержащих небольшое количество растворенного\nуглекислого газа, пиво подается с\nпеной, которая называется «шапочкой», толщиной не менее двух\nсантиметров. Это не только красиво\nсмотрится, но и сохраняет вкусовые\nкачества пива.\nПена предохраняет его от вредного\nвоздействия кислорода. Поэтому\nрекомендуется подавать бутылочное\nпиво в достаточно больших бокалах,\nпозволяющих вылить из бутылки\nсразу все содержимое. Исключение\n– пиво с осадком. Его надо наливать\nв бокал осторожно, не двигая резко\nбутылку, чтобы осадок не смешался\nс пивом.\n\nBlanche (бланш)\nБельгийское пиво на пшеничной основе, часто\nсо специями. Его не подвергают фильтрации, оно\nдостаточно мутное и характеризуется кисловатым вкусом.\n\nBock (бок)\nВ Германии так называют крепкое пиво. Термин\n«Double bock» присваивается пиву еще более\nкрепкому.\n\nБельгийское пиво (брожение при высокой температуре), достаточно крепкое и густое, часто\nподвергается вторичному брожению при розливе в бутылки. Может быть светлым, янтарным или\nтемным.\n\nGueuze (гёз)\n\nAle (эль)\n\nKriek (крик)\n\nАнглийское пиво (брожение при высокой температуре) средней крепости, светлого или интенсивного янтарного цвета. Оно может быть разных\nвидов: pale ale с большим содержанием хмеля,\n\nСорт пива lambic, в котором пивовары в течение\nнескольких месяцев вымачивают вишню. Его успех\nспособствовал созданию новых видов этого пива\nс малиной, черной смородиной и даже с бананом.\n\n206 Пив о\n\nП ена\n\nЭто бельгийское пиво представляет собой смесь\nмолодых и старых сортов пива lambic. Его разливают в бутылки, похожие на бутылки для шампанского.\n\nХ ранение пива\nБутылочное пиво должно храниться в\nпрохладном темном месте, вдали от\nисточников тепла. Однако слишком\nнизкая температура (ниже +5°С) ему\nтакже противопоказана.\nВ отличие от вина, положение\nбутылки при хранении не играет\nроли. Исключение составляет пиво с\nосадком и пиво, закрытое деревянной пробкой. Бутылки с таким пивом\nдолжны храниться в вертикальном\nположении.\nКак правило, чем пиво моложе, тем\nоно лучше. Соответственно, делать\nзапасы не имеет смысла.", "Lager (лагер)\nНемецкое слово lager означает «сохранять», напоминая о необходимости хранить в прохладном\nместе пиво, приготовленное брожением при низкой температуре. Сегодня этот термин относится\nк любому пиву, полученному путем подобного\nпроцесса брожения. Обычно lager – светлый напиток, хотя существует несколько темных разновидностей этого пива в Германии.\n\nLambic (ламбик)\nБельгийское пиво на основе пшеницы, ячменя и\nстарого хмеля, полученное путем естественного\nброжения. Это «фирменное» пиво города Брюсселя.\n\nPils (пилс)\nЭто название произошло от чешского города\nПльзень, где было произведено первое в истории светлое пиво, полученное путем брожения\nпри низкой температуре. Будучи очень схожим с\nпивом lager, название рils означает сегодня любое\nсветлое пиво, бродившее при низкой температуре. В Германии термин pilsener или pilsner является показателем качества и используется для пива\nс большим содержанием хмеля.\n\nPorter (портер)\nБританское пиво, особенно распространенное в\nЛондоне, получается при высокой температуре\nброжения. Очень темное, с большим содержанием хмеля.\n\nPremium (премиум)\nЭтот термин применительно к пиву говорит о высококачественном lager, но более золотистом и\nнасыщенном, чем остальные его виды.\n\nRauchbier (раушбир)\nНемецкое светлое пиво, получаемое при низкой\nтемпературе брожения, со вкусом дыма, образующегося при горении сосновых дров в процессе\nсушки солода.\n\nStout (стаут)\nЧерное пиво, получаемое путем брожения при\nвысокой температуре из хорошо поджаренного\nсолода. Ирландское пиво отличает сухость и вязкость, тогда как английское имеет более мягкий\nвкус.\n\nTrappiste (траппист)\nРазновидность пива ale, производимая монахами-траппистами. Существуют пять видов этого\nнапитка в Бельгии и один в Голландии.\n\nС оветы бармену\nУмение правильно наливать разливное пиво – один из важных критериев, по\nкоторому клиенты судят о профессиональности и мастерстве бармена.\n\nБочки с пивом и их хранение\n• Бочки с пивом должны храниться в прохладном и чистом месте при постоянной\nтемпературе, обращаться с ними надо очень осторожно.\n• Сначала следует использовать более старые бочки, не забывая о том, что срок\nхранения пива ограничен.\n• Перенесите бочки с пивом в помещение бара за 24 часа до начала их использования. Температура пива должна сравняться с температурой бара.\n• Открывать бочку следует в последний момент. Пиво в открытой бочке может\nхраниться не более 72 часов, поэтому необходимо точно рассчитать его ежедневный расход, учитывая, что 50 литров пива – это 200 порций по 250 мл.\n\nУглекислый газ\n• В целях безопасности бутыль с газом прикрепляют к стене, куда не проникают\nсолнечные лучи, поскольку температура ее хранения не должна превышать 32°С.\n• Нельзя закрывать бутыль на ночь, иначе пиво может потерять свою насыщенность углекислым газом.\n• Будьте бдительны с выбросами углекислого газа, так как они токсичны.\n• При возникновении проблем обращайтесь за советом к поставщикам пива.\n\nКак мыть бокалы\nЖирные пятна, следы от губной помады и жидкости для мытья посуды сильно влияют на качество пивной пены. Она быстро спадает, что, конечно же, непривлекательно, поэтому бокалы для пива следует мыть отдельно от других, используя два\nбака. Один – для мойки, второй – для ополаскивания. Ни в коем случае бокалы не\nнадо вытирать. При машинной мойке пивные бокалы также следует мыть отдельно\nот другой посуды и не вытирать.\n\nКак наливать разливное пиво\n• Взять бокал той же марки, что и пиво.\n• Хорошо ополоснуть его, чтобы освежить бокал и улучшить качество пены.\n• Тщательно стряхнуть капли с бокала.\n• Наполнить бокал за один раз: одним движением открыть кран до конца и держать бокал под углом 45 градусов к концу крана, чтобы струя падала на стенку\nбокала. Когда он заполнится наполовину, направить струю прямо в бокал, приводя его постепенно в вертикальное положение для получения необходимой пены.\n• Когда бокал заполнится, закрыть кран одним движением.\n• Смыть пену с нижней части бокала, если он запачкался, затем промокнуть полотенцем.\n• Положить на стойку перед клиентом картонную подставку нужной марки и на\nнее поставить пиво.\n\nТемпература подачи\nТемпература является определяющим элементом вкуса пива. Чем пиво плотнее и\nкрепче, тем выше должна быть температура его подачи (от 6–7°С до 14°С ).\nИсключением является британское пиво ale, которое, не будучи очень крепким,\nидеально раскрывает свои качества при температуре выше +10°С, но только при\nусловии, что это разливное пиво. Вкус теплого пива поистине ужасен.\nНикогда не следует добавлять в пиво лед. Лишая пиво газов, лед лишит его и\nвкуса.\n\nПив о 207", "208 Иск усс тв о кок тей ля", "Библия Бармена\n\nЧ асть № 2\n\nКок тейли\n\nи Барная к ульт ура\n• Искусство коктейля • Аксессуары и инструменты\n• Бокалы для бара • Способы смешивания • Украшение\nкоктейлей • Про лёд • Настойки • Домашние заготовки\n• Коктейли из бутылок и из бочек\n• Классификация коктейлей\n• Рецепты", "Виталий Бганцев, бар Veladora, Москва.\n\nЧ асть вторая . Г лава 13\n\nИскусство\nкоктейля\n\nК ак и любое дру гое иск усс т во , иск усс т во кок т ей ля на ходи тс я в ра зви т ии .\nУ него ес т ь свои периоды , свои цик лы . О но де лае тс я точнее , обогащ ае тс я\nблагод аря т ворческим уси лиям барменов , т е хнологическому прог ресс у,\nменяющейс я моде . Н о о снова , на которой иск усс т во кок т ей ля рас т е т и\nу креп ляе тс я , о с тае тс я все той же .\n\n210 Иск усс тв о кок тей ля", "Илья Астафьев и Евгений Горбунов,\nGin Tonic Bar, Санкт-Петербург.\n\nИскусство коктейля заключается в предложении\nкак можно лучших смешанных напитков. Оно\nподчинено точным правилам, которые относятся\nк методам приготовления, посуде, украшениям,\nльду и подаче.\nВ то же время, искусство коктейля развивается в\nобласти технологий. С одной стороны, возвращаются старые методы, например, cuban roll. С другой стороны, появляются современные методы,\nиспользующие последние технологии.\nЧто касается ингредиентов, то современная тенденция состоит в самостоятельном приготовлении базовых компонентов. Царившая в конце 20\nвека стандартизация коктейлей – всего лишь далекое воспоминание. Больше не осталось бармена, который не готовил бы собственные настойки,\nсобственные биттеры.\nГлобализация, легкий доступ к самым экзотическим ингредиентам, поиск местных ингредиентов, все это вносит свой вклад в безостановочное\nпредложение новых ароматов. Потребитель ждет\n\nот коктейля нового вкуса, сюрприза.\nНаоборот, когда речь идет о классических коктейлях, любитель точно знает, что от них следует\nждать.\nБлагодаря лоукостерным перелетам, сегодняшний\nклиент побывал в барах Кубы, Рио-де-Жанейро,\nСингапура, Парижа, Нью-Йорка, Барселоны и Токио. Он точно знает, каким должен быть «Олд Фешенд», «Манхэттен» и «Кровавая Мэри».\nЕго требовательность заставляет бармена превзойти самого себя даже при приготовлении\nпростого «Дайкири».\nТаким образом, для бармена искусство коктейля\nсостоит в точном знании каждого смешанного\nнапитка: его истории, вариантов и приемов, используемых для его приготовления и подачи. Все\nэто для того, чтобы его коктейль всякий раз оказывался на уровне лучших образцов вкуса.\nПодобно любому искусству, искусство коктейля\nимеет свои точные и незыблемые правила. Но\nоно не имеет границ.\n\nИск усс тво кок тей ля 211", "Аксессуары и инструменты\nШ ейкер – символ бармена\n\nВ каждом баре, где подают напитки и коктейли,\nспособные удовлетворить практически любые\nзапросы гостей, должны быть соответствующие\nинструменты и оборудование.\n\n4. Шейкер. Шейкер – символ бармена.\n\n1. Нож сомелье с небольшим лезвием, штопором и открывалкой для бутылок.\n\n2. Небольшая разделочная доска для фруктов, а также маленький нож и точило. Деревянные\nдоски красивее, но не идеальны с точки зрения\nгигиены. Чаще используют доски из пластика,\nустойчивые к царапинам, легко моющиеся и быстро высыхающие.\n\n3. Барная ложка для смешивания. При перемешивании коктейля ложкой в стакане для смешивания движения не должны быть резкими,\nчтобы не раскрошить лед на мелкие кусочки, которые, быстро растаяв, разбавят коктейль.\nЛожка для смешивания также используется\nпри приготовлении слоистых коктейлей (типа\nRainbow). Ее подносят вплотную к стенке бокала\nи медленно наливают напитки по ее обратной\nстороне. Для подобных коктейлей также существует специальная барная ложка с пластинкой\nпод углом вместо пестика на конце.\n\n212 Иск усс тв о кок тей ля\n\n5. Барное ситечко (Strainer). Прежде чем налить коктейль в бокал, его в большинстве случаев надо процедить. Для некоторых шейкеров\n(например, для «Бостона») необходимо использовать барное ситечко, задерживающее кусочки\nфруктов и льда. Но для того чтобы получить менее разбавленный и более прозрачный коктейль,\nможет оказаться оправданным профильтровать\nкоктейль одновременно через два ситечка: барное и обычное. Это называется «двойное процеживание» (дабл стрейн), и в лучших барах оно\nприменяется ко многим коктейлям. Основное\nпреимущество двойного процеживания – удаление мелких кусочков льда, способных разбавить\nкоктейль.\n\n6. Смесительный стакан. Движения бармена,\nвращающего барную ложку в стакане для смешивания, относятся к одним из наиболее элегантных\nв гастрономии. Помимо эстетического аспекта,\nтолько смесительный стакан позволяет охладить\nкоктейль, сохранив его прозрачность.\nСтакан для смешивания предшествовал шейкеру, но обрел весь свой смысл в приготовлении\n\nБармен без шейкера – это как футбольная команда без мяча. Остается\nлишь вернуться в раздевалку. До изобретения шейкера для охлаждения\nнапитка использовали два больших\nстакана, вставлявшиеся один в\nдругой. Когда появился шейкер, в\nнем начали готовить все напитки без\nразбора, и этот новый инструмент\nзначительно способствовал распространению культуры коктейля по\nвсему миру.\nПо инерции человеческой души или\nиз-за страха перед будущим, именно\nв то время появился на свет коктейль\n«Старомодный» (Old Fashioned). Его\nготовили по старинке непосредственно в бокале, и он пользовался\nлюбовью у клиентов, не желавших\nменять свои привычки. В таком виде\nон и дожил до наших дней.\nРабота с шейкером – противоположность занятия любовью. Необходимо\nдействовать яростно, но очень\nбыстро. Трясти шейкер, что есть\nсил. Если вы попытаетесь убаюкать\nего, как ребенка, коктейль у вас не\nполучится. Надо, напротив, постараться разбудить дремлющие внутри\nнапитки.\nСуществуют шейкеры трех типов.\nКлассический, континентальный и\nбостон-шейкер.\n\nК лассический шйкер\n(он же традиционный или кобблер)\n\nЭто шейкер для любителя. Но это\nслово не несет ни малейшего уничижительного оттенка, поскольку он\nвсего лишь прост в употреблении.\nКлассический шейкер состоит из трех\nчастей: стакана, фильтра и крышки,\nспособной служить дозатором.\nХотя его часто заклинивает, можно\nзаметить, что постепенно он возвращается в бары. Многие миксологи\nценят его за простоту использования,\nкоторая, в конечном счете, позволяет\nвыиграть время.\n\nБ остон - шейкер\n\nСостоит из двух частей: стеклянной и\nметаллической, большего диаметра.\nИнгредиенты наливают в стеклянную\nчасть и накрывают ее металлической.\nПри контакте со льдом металл сжимается и обеспечивает превосходную\nгерметичность. Кроме того, Бостоншейкер никогда не заклинивает.", "«Драй Мартини». В зависимости от ситуации, 15\nили 17 оборотов ложки отличали истинный «Драй\nМартини» от самозванца. На практике вместо стакана для смешивания часто пользуются нижней\nчастью шейкера.\n\nОткрывают его легким ударом руки\nпо нижней части. Поскольку стекло\nимеет низкую теплопроводность,\nкоктейль в нем получается менее разбавленным.\n\nК онтинента льный\n(французский) шейкер\n\nЭтот элегантный шейкер чаще всего\nиспользуется в барах при грандотелях. Он состоит из двух частей из\nпосеребренного металла. С ним работают так же, как с Бостон-шейкером,\nно он имеет склонность к легкому заклиниванию. Его открывают легкими\nударами рукой по нижней части.\nКаждый бармен должен знать, что\nпредпочтительнее использовать\nшейкеры большего объема, вмещающие крупные куски льда, которые\nтают медленнее, дольше сохраняя\nкачество коктейля. И даже заполнив\nшейкер льдом до краев (что весьма\nрекомендуется), в нем останется\nдостаточно места для всех ингредиентов коктейля.\n\n12. Ведерко для игристого вина.\n7. Щипцы для льда.\n\n13. Джиггеры. Рецепты коктейлей делаются все\n8. Совок для льда. Лед никогда не кладут в шейкер или бокал руками.\n\n9.\nСоковыжималка\nдля\nцитрусовых\n(Squeezer). Если вы видите в карте бара среди\nингредиентов коктейля: «cвежевыжатый лимонный сок», то вы попали в серьезное заведение.\nСоковыжималка для лимона необходима, чтобы\nполучить действительно свежий сок, что позволит вам поместить в карту вышеуказанную\nнадпись. Еще один момент: не храните лимоны\nв холодильнике, так как в этом случае они дадут\nменьше сока.\n\nД ымовой пистолет\n(S moking gun)\nОдно из последних новшеств\nкоктейльных баров – прибор для\nнасыщения коктейлей дымом – пробуждает живой интерес. Имеется в\nвиду пистолет, который заряжается\nдеревянными щепками и выделяет\nдым, передающий копченый вкус\nнапитку.\nСледует отметить, что привкус дыма\nменяется в зависимости от использованных пород дерева.\n\nболее точными, и современная миксология требует все большей четкости.\nВ конце 19 столетия миксологи не работали с такой точностью, как сегодня. Они готовили напитки, используя в качестве меры разные стаканы, а\nпозже – джиггер, который не всегда наполняли\nточно по требуемому объему. В результате истинный вкус некоторых исторических коктейлей\nнам, наверное, не известен. В наше время, за исключением пристрастия американцев к унциям\n(напоминаем: одна унция равна 29.57 мл) используют миллилитры.\nFree Pouring, то есть разлив на глазок, из-за своей\nнеточности, постепенно уступает место джиггеру. Поэтому джиггеры (объемом «50 и 25 мл» или\n«40 и 20 мл») вновь получили широкое распространение у миксологов.\n\n14. Стоппер. Герметичная пробка, позволяющая\nзаткнуть и сохранить открытую бутылку игристого вина.\n15. Поднос.\n\n10. Воронка.\n\n11. Термостойкий стеклянный кувшин.\n\n16. Пестик (или мадлер). В наши дни толкушка-мадлер сделалась одним из основных инструментов миксолога. И служит она не только для\nтого, чтобы гарантировать оплату от недобросовестных клиентов!\nВ прежние времена (и даже кое-где сейчас) листья мяты и фрукты давили обратной стороной\nбарной ложки. Такой способ не был ни удобным,\nни эффективным. Никогда нельзя было понять,\nполучили ли ингредиенты достаточное выражение, выделились ли из н
