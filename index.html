рня использует перегонные кубы того же типа,\nчто и Лох Ломонд. Они отличаются небольшими\nразмерами, установлены в 1959 году, и мастер\nперегонки относится к ним с большой заботой,\nпоскольку они уникальны в своем роде и в наши\nдни их невозможно заменить. Дата основания:\n1885 год.\n\nSpeyside (Спейсайд)\nЭта винокурня географически относится к Хайленду, но исток реки Спей протекает прямо за ней. Она\nпостроена в 1976 году на месте старинной мельницы 1710 года, главное здание которой сохранилось\nдо наших дней. Производит достойный и приятный\nвиски.\n\nTalisker (Талискер)\nЭто единственная винокурня, расположенная\nна острове Скай (территориально относящийся\nк Хайленду). Ее виски отличается благородством\nи «морским характером». Он проявляет ароматы\nдыма, табака, солода с имбирными, перечными и\nсолоноватыми оттенками. Дата основания: 1830\nгод.\n\nTomatin (Томатин)\nТоматин – большая винокурня, основанная в 1897\nгоду. Она насчитывает не менее 23 перегонных\nкубов, что превращает ее в настоящий маленький\nзавод, 70% продукции которого используется для\nкупажей. Это первая шотландская винокурня, полностью выкупленная японцами в 1986 году.\n\nTullibardine (Таллибардин)\nТаллибардин, действующая с 1949 года, расположена на месте пивоварни 15 века. Она также\nвключает коммерческий центр, направленный на\nпопуляризацию виски. Здешний виски – сдержанный, тонкий и фруктовый.\n\n92 Виски\n\nС пейсайд (S peyside )\nЭтот основной район производства виски расположен на северо-востоке Хайленда. Он получил\nсвое название от реки Спей. Здесь сконцентрированы престижные дистиллерии.\nВиски Спейсайда имеют богатый и сложный букет, оставаясь при этом тонкими.\nДистиллерии расположены близко друг к другу,\nчто приводит к существенной конкуренции. Производители охотнее, чем в других местах, проводят изыскания в сфере перегонки и выдержки.\n\nAberlour (Аберлауэр)\nВ этом знаковом месте на берегу реки Спей виски\nпроизводили задолго до 1826 года, который считается официальной датой основания вискикурни\nАберлауэр.\nЗдесь получают типичный для Спейсайда односолодовый виски с богатыми и глубокими ароматами.\nЕго отличительной особенностью является использование бочек из-под хереса и из-под бурбона, которые придают виски насыщенные фруктовые ноты\nи характерные янтарно-красные оттенки.\n\nО дносолодовый виски\nA berlour\nНазвание Aberlour с гэльского языка\nпереводится как «уста журчащего ручья». Это одна из наиболее знаковых\nвискикурен Спейсайда.\nЧистейшая вода, используемая для\nпроизводства виски, тщательность\nвсех этапов производства, а также\nвыдержка в бочках из-под хереса\nи из-под бурбона – это те факторы,\nкоторые обуславливают яркий цвет и\nхарактер виски Aberlour.\nAberlour 12 y.o. обладает янтарнокрасным цветом и насыщенным\nфруктово-пряным вкусом с мятными\nоттенками.\nAberlour 16 y.o. – это богатый и комплексный виски, с оттенками хереса и\nпряным послевкусием.\nПри дегустации Aberlour рекомендуется добавить в него небольшое количество воды, и вы сразу перенесетесь\nв исторический центр Спейсайда, где\nрождаются великие односолодовые\nвиски.", "Т от самый Г ленливет\nДолина реки Ливет в Спейсайде считается\nколыбелью шотландского виски. Раньше в\nэтом труднодоступном месте более двух сотен\nподпольных производителей делали виски в\nисключительно подходящих для этого условиях.\nТорф и ячмень имелись в изобилии, а вода отличалась невероятной чистотой и мягкостью.\nВ те давние времена нелегальный виски из долины Ливет, обладающий мягким характером и типичными фруктовыми нотками, считался самым\nизысканным и был известен далеко за пределами\nХайленда. Среди его поклонников числился\nдаже сам король Великобритании Георг IV.\n\nСмелость быть независимым\nВ 1824 году местный уроженец по имени Джордж\nСмит решился первым официально зарегистрировать свою вискикурню в долине Ливет. Это был\nрискованный шаг. В течение нескольких лет он\nвынужден был защищать свою жизнь и жизнь своих близких от подпольных производителей виски,\nне желавших подчиняться закону. Но смелость и\nнезависимость, в конечном счете, всегда вознаграждаются. Качество его виски было признано\nпо всей Шотландии и за ее пределами.\nВ 1849 году в ответ на большое количество запросов потребителей была построена вторая\nвискикурня для производства «Гленливет». Но и\nэтого вскоре оказалось мало, чтобы полностью\nудовлетворить спрос.\nThe Glenlivet окончательно «обосновался» в\n1859 году, когда Джордж Смит переместил свою\nвискикурню несколько ниже по реке Ливет, на\n\nболее просторное место рядом с исключительным подземным источником Джози’с Велл, вода\nкоторого, обладающая несравненным минеральным составом, и по сей день играет основополагающую роль во вкусе виски.\n\nГленливет с артиклем «The»\nК концу 1870-х годов The Glenlivet стал символом односолодовых виски Спейсайда. Его\nуспех был столь велик, что многие другие виски\nначали его имитировать, используя его название\nна этикетке.\nСын Джорджа Смита встал на защиту своего\nвиски. В 1884 году после долгих судебных разбирательств он получил исключительное право называть свой виски The Glenlivet, с определенным\nартиклем the, что значит «тот самый, настоящий\nГленливет».\n\nОсобенности производства\nПерегонные кубы «Гленливет» воспроизводят\nформу масляной лампы, разработанную Джорджем Смитом, основателем вискикурни.\nСолод высушивается без использования торфа.\nВ результате получается мягкий и элегантный\nвиски с фруктовыми нотами.\nТакая ароматическая тонкость благоприятствует\nдолгой выдержке. Для выдержки The Glenlivet\nиспользуется множество разновидностей бочек:\nуже использованные и еще новые дубовые бочки, из Америки и Европы.\nВ ходе старения виски развивает дополнительные ароматы, вкус и цвет.\n\nК оллекция The G lenlivet\nThe Glenlivet Founder's Reserve содержит спирты, выдержанные в бочках\nпервой заливки из американского\nдуба, которые придают виски сладкие\nсливочные ноты в добавлении к\nфруктовым, цитрусовым оттенкам,\nполученным при перегонке.\nПосле 12 лет выдержки с использованием бочек из-под хереса, виски\nThe Glenlivet 12 y.o. Excellence имеет\nпряные ноты шоколада, корицы и\nимбиря, которые подчеркивают его\nмедово-цитрусовый характер.\nThe Glenlivet 15 y.o. выдерживается\nв бочках из дуба, выросшего в лесах\nЛимузена во Франции. При этом он\nимеет пряные древесные ароматы в\nдополнении к насыщенному фруктовому вкусу.\nThe Glenlivet 18 y.o. является образцом изящества и сбалансированности. В его ярком букете переплетаются сложные древесные и пряные\nароматы с фруктовыми и карамельными оттенками.\nThe Glenlivet 21 y.o. Archive выдерживается не менее 21 года с использованием до семи разных типов дубовых\nбочек, каждый из которых оказывает\nсвое влияние на вкус виски, что также\nпридает напитку и комплексный\nаромат.\nThe Glenlivet XXV – это эксклюзивный, насыщенный, сливочно-пряный\nвиски 25-ти лет выдержки, который\nпроходит финальное созревание в\nбочках из-под хереса Олоросо первого\nзаполнения.\nThe Glenlivet Nadurra Oloroso – виски\nбочковой крепости, производимый\nнебольшими партиями с использованием лучших хересных бочек Олоросо\nпервого заполнения.\nВиски 93", "Aultmore (Олтмор)\nМастера купажа ценят виски Олтмор за его изысканность, уравновешенность и чистый вкус.\nСчитается, что эти качества виски обретает, в немалой степени, благодаря природным особенностям здешнего района, называемого Фогги Мосс.\nВиски рождается в тумане, среди болот и небольших ручейков, развивая травяные ароматы влажного моха и деликатных растений. Дата основания винокурни: 1896 год.\n\nBalmenach (Балмэнак)\n\nВ туманной и болотистой местности\nФогги Мосс появляется на свет изысканный солодовый виски Aultmore\nс деликатными растительными\nароматами.\n\nВинокурня существовала еще до своего официального открытия в 1824 году. Неоднократно она\nзакрывалась и открывалась вновь. Последняя пауза длилась с 1993 по 1997 год. Производство возобновилось к большой радости знатоков, всегда\nценивших этот богатый и торфяной солодовый\nвиски Спейсайда.\n\nThe Balvenie (Балвини)\nИстория винокурни Балвини, раскинувшейся на\nберегу реки Ливет, началась с пожара, который\nуничтожил большую часть запасов другой расположенной неподалеку винокурни Гленливет и погрузил в разруху все производство виски. Тогда\nУильям Грант решил воспользоваться случаем и в\n1892 году основал Балвини.\n\nBenriach (Бенриак)\n\nО фициальный и\nнезависимый розлив\nCолодовый виски чаще всего выдерживается и разливается по бутылкам\nна самой винокурне, которая и выпускает его в продажу. Такой розлив\nназывается официальным (Official\nbottling). Но существуют компании,\nкоторые покупают на винокурнях\nбочки с солодовым виски, а затем\nвыдерживают его сами и разливают по бутылкам. Подобная схема\nназывается независимым розливом\n(Independent bottling).\nНекоторые винокурни в целях сохранения контроля своей продукции\nне продают никому солодовый виски\nв бочке, не добавив к нему немного\nсолодового виски другого сорта.\nПодобная практика не позволяет\nнезависимым торговцам продавать\nданный виски под его названием.\n\n94 Виски\n\nВинокурня производит душистый виски различного возраста, используя бочки практически изпод любых вин и крепких напитков. Дата основания: 1897 год.\n\nBenromach (Бенромак)\nСамая маленькая спейсайдская винокурня – Бенромак – расположена неподалеку от города Инвернесс среди пастбищ и сельских пейзажей. С\n1898 года она выпускает виски, малоизвестный,\nно высокого качества, в частности, Organic на\nоснове экологически чистых ячменя и дрожжей.\n\nCraigellachie (Крейгэллаки)\nЕсли свернуть на дорогу А491, то между деревней Крейгэллаки и городком Ротс невозможно не\nобратить внимание на эту величественную винокурню, основанную в 1891 году. За ее застекленным фасадом видны впечатляющие гигантские\nперегонные кубы. С наступлением темноты зал\nперегонки освещается, делая зрелище еще более\nэффектным. Что касается виски, то он обладает\nособым характером и яркими ароматами.\n\nGlenburgie (Гленберги)\nПод названием «Гленберги» винокурня известна с 1878 года, в то время как виски перегоняли\nздесь уже в 1829 году. В наше время производительность винокурни значительно возросла. Этот\nвиски используется, в первую очередь, в знаменитых блендах, которым он придает удивительные ноты красных фруктов.\n\nGlendronach (Глендронах)\n\nЖивописная винокурня Карду расположена на\nхолме, возвышающемся над чередующимися\nдолинами реки Спей и ее притоков. Эта небольшая, типичная винокурня производит деликатный и утонченный виски с 1824 года.\n\nЭта винокурня, основанная в 1829 году, на протяжении всей своей истории сопротивлялась, как\nмогла, современным веяниям. Здесь продолжали\nнагревать перегонные кубы прямым огнем, а не\nпаром, и охотнее использовали дерево, чем металл или нержавеющую сталь. Виски Глендронах\nбогат ароматами, что позволяет ему превосходно\nсочетаться с древесными нотами бочек особенно\nиз-под хереса.\n\nCragganmore (Крэгганмор)\n\nGlenfarclas (Гленфарклас)\n\nКрэгганмор – один из наиболее классических виски Спейсайда, свежий, с легким вкусом торфа и\nпряностей. За свой аристократический вкус он\nвысоко ценится мастерами купажа, которые охотно его используют. Поэтому он довольно редко\nвстречается на рынке. Дата основания: 1869 год.\n\nЗначительные объемы производства и виски\nвысокого качества – таковы особенности винокурни Гленфарклас. Ее перегонные кубы – самые\nкрупные во всем Спейсайде. Поэтому не надо особо доверять тем, кто уверяет, что лучший виски\nобязательно получается в кубах малого объема.\n\nCardhu (Карду)", "В данной области не существует четких законов.\nВ конце концов, результат зависит от воды, торфа,\nсолода, перегонки, выдержки и десятков прочих\nмелочей. Гленфарклас – мощный, богатый виски\nс выраженными нотами дыма и со сладковатыми\nакцентами хереса. Дата основания: 1836 год.\n\nGlenfiddich (Гленфиддик)\nГленфиддик по-гэльски означает «Долина оленей». Для укрепления такого имиджа винокурня\nГленфиддик завезла оленей, которые раньше во\nмножестве водились в Спейсайде. Рано утром\nможно увидеть, как они выходят из леса, покрывающего склоны над винокурней и дорогой в\nДаффтаун. Основанная Уильямом Грантом в 1886\nгоду, эта винокурня одной из первых стала предлагать свой виски не только мастерам-блендерам, но и непосредственно потребителям. Благодаря успеху, она разрослась и теперь владеет\nвпечатляющим количеством перегонных кубов\n– 29 в общей сложности.\n\nThe Glenlivet (Гленливет)\nГленливет – первая вискикурня, получившая в\n1824 году лицензию на изготовление виски в Спейсайде. Долина реки Ливет всегда считалась самым\nблагоприятным местом для производства виски.\nЧто и подтверждает сингл молт The Glenlivet, который, благодаря нежным и комплексным ароматам\nс фруктовыми нотами, по праву занимает одно из\nпервых мест.\n\nGlenrothes (Гленротс)\nЭта живописная винокурня, расположенная в\nсельской местности, производит виски с гармоничным, сбалансированным и мощным характером, который высоко ценится как мастерамиблендерами, так и любителями. Дата основания:\n1878 год.\n\nGlen Elgin (Глен Элгин)\nВинокурня Глен Элгин была последним творением знаменитого архитектора Чарльза Дойга, а\nтакже последней винокурней Спейсайда, возведенной в 19 столетии (1898 год). Виски Глен Элгин\nпроявляет типичный для Спейсайда характер. Он\nнасыщен ароматами трав и хереса и обладает\nнотками меда.\n\nGlen Grant (Глен Грант)\nОснованная братьями Джеймсом и Джоном Грантами в 1840 году, винокурня была электрифицирована первой в Спейсайде в 1861 году. Виски\nГлен Грант обычно бледнее своих «собратьев».\nПричина тому – наличие в перегонных кубах\nсистемы очистки, допускающей более глубокое\n\nразделение паров спирта. Глен Грант производит\nвнушительную линейку виски, являющихся классикой Спейсайда.\n\nGlen Moray (Глен Морей)\nНесколько лет назад ходили разговоры о том,\nчто даже мастера купажа не имели возможности\nкупить чистый виски Гленморанджи в бочках, так\nкак к нему обязательно добавляли Глен Морей, во\nизбежание появления на рынке Гленморанджи от\nнезависимых торговцев, самостоятельно разливающих виски по бутылкам.\nДистиллерия недавно сменила владельцев, и я\nне в курсе, продолжается ли подобная практика.\nВ наше время винокурня Глен Морей участвует\nв обогащении нескольких сортов купажированного виски и выпускает достойный сингл молт с\nфруктовым ароматом, типичный для Спейсайда.\nДата основания: 1897 год.\n\nKnockando (Ноканду)\nВозвышающаяся над рекой Спей винокурня Ноканду, основанная в 1898 году, встречает посетителя\nбезукоризненным фасадом и любовно ухоженными газонами. Здесь царит спокойная и безмятежная атмосфера, а виски получается изысканным,\nлегким и ароматным, но в то же время богатым\nвкусовыми оттенками. Только около 8% продукции\nпредназначается для любителей, все остальное быстро разбирают мастера купажа.\n\nLinkwood (Линквуд)\nЭта живописная винокурня, основанная в 1821\nгоду в спейсайдской сельской местности, выпускает виски, очень ценимый мастерами-блендерами. Лишь ничтожная часть продукции оказывается в бутылках с этикетками Linkwood.\n\nMacallan (Макаллан)\nМакаллан, как и Гленливет – легенда Спейсайда.\nРаскинувшись на площади в несколько гектаров,\nМакаллан, скорее, напоминает большую деревню, нежели маленькую винокурню.\nЧто касается виски, то он уникален в своем роде.\nГромадный перегонный зал заполнен небольшими перегонными кубами, а выдержка производится главным образом в бочках из-под хереса.\nВ результате получается сложный и глубокий виски, нежный и богатый во вкусе. Дата основания\nвинокурни: 1824 год.\n\nБ очки для виски\nЗерновой дистиллят становится виски\nлишь после того, как время сделает\nсвое благородное дело. Выдержка\nиграет важнейшее значение для конечного вкуса напитка. Обжиг бочек,\nглубина этого обжига, размер бочки,\nвид использованной древесины,\nнаконец, бэкграунд бочки – тот напиток, который хранился в ней прежде\nи передал ей часть своего аромата, –\nвсе это придает каждому виски свой,\nярко выраженный характер.\nПроизводители виски были первыми,\nкто использовал бочки из-под хереса,\nзатем – из-под порто, потом – из-под\nбурбона, то есть, собственно, другого\nвиски.\nВ Шотландии находят применение\nдаже бочки из-под великих вин\nБордо.\nСегодня выдержка виски достигла\nвершин изысканности, и поиски совершенства продолжаются.\n\nMiltonduff (Милтондафф)\nНа этом месте раньше был монастырь, варивший\nпиво, которое славилось благодаря чистоте воды\nиз источника Black Burn. Позже на месте монастыря\nбыла построена винокурня, получившая лицензию\n\nВиски 95", "Стратайла – самая старинная из действующих вискикурен Спейсайда.\nОна была основана в 1786 году.\nЗдесь производят виски, как и 200\nлет тому назад. Его дистиллируют в\nнебольших приземистых перегонных\nкубах с широкими «лебедиными\nшеями».\nВ результате получается изящный\nсингл молт, отражающий дух Спейсайда. Он богат, обладает ароматами\nпряностей, проявляет легкие древесные тона, подчеркнутые тонкими цветочно-шоколадными нотами, и радует\nнежным послевкусием с влиянием\nимбиря. Но, главное, он великолепно\nсбалансирован, что чрезвычайно\nценится при купажировании. Поэтому\nСтратайла считается бриллиантом в\nкороне купажированных виски\nChivas Regal.\n\n96 Виски\n\nна перегонку виски в 1824 году. Как и во времена\nподполья, здесь продолжают производить виски в\nмаленьких перегонных кубах.\nВ 1964 году к ним добавили несколько кубов конструкции Ломонд. Милтондафф в бутылках встречается редко, так как он быстро поглощается\nмастерами-блендерами, в первую очередь, для купажирования виски Ballantine’s.\n\nMortlach (Мортлах)\nОдна из семи винокурен Даффтауна. Ее продукция ценится мастерами-блендерами и лишь изредка встречается на рынке в чистом виде. Дата\nоснования: 1823 год.\n\nSpeyburn (Спейбарн)\nСпейбарн была построена архитектором Чарльзом Дойгом в 1897 году. В свое время он был\nсамым известным созидателем дистиллерий. Неудивительно, что туристы притормаживают на\nобочине дороги, чтобы сфотографировать эту\nвосхитительную винокурню, расположенную рядом с Ротсом.\nОна производит легкий виски с небольшим кислотным оттенком.\n\nStrathisla (Стратайла)\nВы не найдете в Шотландии более живописной\nвискикурни. Стратайла с ее лужайкой, стенами из\nстарых камней, мельницей и крышами в форме\nпагод – не только самая старинная из действующих вискикурен Спейсайда (дата основания: 1786\nгод), но она еще и сумела в наибольшей степени\nсохранить дух прошлого.\nПри этом Стратайла производит виски, который\nочень ценится любителями. Он встречается достаточно редко, поскольку почти полностью используется для купажирования блендов, в частности, Chivas Regal и Royal Salute.\n\nTamdhu (Тамду)\nВинокурня была основана в 1896 году, но с 1928 по\n1948 год была закрыта. Производимый виски практически полностью предназначен для купажа.\n\nTomintoul (Томинтауэл)\nТоминтауэл – значительная винокурня, имеющая две пары больших перегонных кубов, производящих с 1964 года один из наиболее легких\nсингл молтов Спейсайда. Продукция по большей\nчасти используется для купажей.", "А йла (Islay)\n\nЛ оуленд (L owland )\nЛоуленд – это обширная низина Шотландии, названная так в противовес высокогорному Хайленду.\nЛоуленд – это самый южный и наименее холмистый край страны с умеренным климатом. Считается, что в этом регионе получают самые мягкие\nсорта солодового виски.\nВиски из Лоуленда был наиболее популярен в\nШотландии до появления первых творений Эндрю Ашера. Среди самых знаменитых сингл молтов этого региона мы встречаем Акентошан и\nГленкинчи.\n\nЛоулендский солодовый виски\nAuchentoshan выходит за рамки\nшотландских традиций. Его подвергают не двойной, а тройной перегонке.\nИменно тройная дистилляция лежит в\nоснове его чистого мягкого характера, а также позволяет виски максимально насытиться ароматами тех\nбочек, в которых он выдерживается.\nБочки из-под бурбона, из-под хереса\nи из-под вина передают свои ароматы\nвиски, не нарушая его шелковистость\nи округлость, полученную в результате тройной перегонки.\nБлагодаря такому особенному\nхарактеру, Auchentoshan пользуется\nпопулярностью у миксологов.\nКроме того, нет строгих правил употребления этого виски. Auchentoshan\nможет гордиться своим вкусом и своей историей при любой сервировке: в\nчистом виде, со льдом, с небольшим\nдобавлением воды или в составе\nсмешанных напитков.\n\nКаждая капля виски Auchentoshan\nпроходит тройную перегонку в отличие от других шотландских виски,\nкоторые дистиллируют дважды.\n\nАйла – это небольшой остров у западного побережья Шотландии, на котором сохранились\nостатки древнейших винокурен. Сегодня на\nострове действуют восемь предприятий. Самые\nизвестные из них – Бомо, Лэгавулин, Лафройг,\nБаннахэйбн и Брюклэддик.\nКлимат острова Айла, где властвуют волны и ветер, особенно влажный. Виски стареет здесь в исключительно благоприятных условиях, обретая\nхарактерный аромат йода и соли. И это не просто\nфантазия поэтов.\nНе надо быть профессиональным дегустатором,\nчтобы почувствовать вкус моря и тумана в виски\nс острова Айла\n\nArdbeg (Ардбег)\nВ сверхъестественном освещении острова Айла\nбелый фасад Ардбега вызывает в памяти корабли,\nпотерпевшие крушение у прибрежных скал.\nВиски Ардбег раньше имел выраженный торфяной характер. Теперь его аромат стал более\nсбалансированным. Но все же в нем превалирует\nдым, а также медицинский запах йода, характерный для островных виски. Дата основания винокурни: 1815 год.\n\nAuchentoshan (Акентошан)\nЯркий и уникальный солодовый виски региона Лоуленд. Винокурня, основанная в 1823 году,\nявляется единственной крупной дистиллерией,\nреализующей метод тройной перегонки. Спирты\nвысокой степени очистки выдерживаются в дубовых бочках из-под хереса Олоросо и Педро Хименес, бурбона и французского вина, приобретая\nисключительный букет ароматов и вкусов.\nБлагодаря своему деликатному характеру, виски\nAuchentoshan послужит прекрасной основой для\nсоздания коктейлей.\n\nGlenkinchie (Гленкинчи)\nВо время Второй мировой войны на большинстве\nвинокурен Шотландии производство было приостановлено, чтобы не наносить ущерба запасам\nячменя. Но винокурня Гленкинчи оказалась в числе немногих, которым разрешили продолжать\nпроизводство виски. Возможно, это объясняется\nее близостью к Эдинбургу. Так или иначе, ее производство никогда не было значительным, и Гленкинчи остается достаточно редким, но востребованным виски. Дата основания: 1837 год.\n\nВиски 97", "Bowmore (Бомо)\nСтарейшая винокурня острова Айла и первая\nв Шотландии, получившая лицензию на производство виски, – она была основана в 1779 году.\nВиски Bowmore созревает в специальных хранилищах, расположенных ниже уровня моря, в условиях высокой влажности и насыщенности воздуха морской солью. Bowmore – мягкий и тонкий\nвиски, с легко узнаваемым оттенком моря, нотами дыма и папоротника.\n\nBruichladdich (Брюклэддик)\nБрюклэддик – самая западная шотландская винокурня. Наряду с Баннахэйбн она производит\nнаиболее легкий и, по-видимому, наименее торфяной виски на острове Айла. Дата основания:\n1881 год.\n\nК емпбе лтаун\n(C ampbeltown)\n\nБ очки в названии виски\nЭтот полуостров расположен к югу от Айла и имеет\nсхожий климат. То же самое можно сказать о характере здешних виски.\nБыло время, когда Кемпбелтаун был одним из\nважнейших центров производства виски. Городу\nхватало угля. Ячмень и торф имелись в изобилии.\nВ конце 19 столетия здесь работали 30 винокурен. В настоящее время их осталось три, самые\nизвестные из которых – Глен Скоча и Спрингбэнк.\n\nGlen Scotia (Глен Скоча)\nЭта винокурня была основана в 1832 году. Ее виски имеет ярко выраженный характер, он могуч и\nбогат торфяными нотами.\n\nBunnahabhain (Баннахэйбн)\n\nSpringbank (Спрингбэнк)\n\nВиски Баннахэйбн предназначен для тех, кого\nприводит в ужас «медицинский», йодистый, соленый и дымный вкус некоторых сингл молтов из\nАйла – этого унылого, дикого и величественного\nострова Шотландии. Виски Баннахэйбн свеж и\nутончен, но при этом проявляет характер. Задолго до того, как он появился в продаже в качестве\nсингл молта, его уже использовали в купажах.\nДата основания: 1881 год.\n\nС момента создания винокурни в 1828 году ею\nвсегда управляли члены семьи Митчелл. В наши\nвремена, когда международные компании упорно бьются между собой за винокурни, как в\nогромной игре «Монополия», подобное постоянство поражает. Сингл молт Springbank отличается выраженным характером и ценится любителями виски.\n\nCaol Ila (Каол Ила)\nНаиболее крупная винокурня острова Айла. Она\nбыла основана в 1846 году и отстроена заново в\n1972 году. Здесь производят богатый и сложный\nвиски с выразительными ароматами торфа и\nдыма.\n\nLagavulin (Лэгавулин)\nЛэгавулин была основана в 1816 году на каменистом берегу острова Айла на месте уже давно\nсуществовавшей подпольной винокурни. Лэгавулин с его выраженными дымными ароматами и\nдолгим послевкусием – яркое отражение виски\nс острова Айла. Мощный, морской характер этого виски в тоже время отличается сложностью и\nизысканностью.\n\nLaphroaig (Лафройг)\nЭтот односолодовый шотландский виски с 1815\nгода создается на семейной винокурне в южной\nчасти острова Айла.\nБлагодаря местному торфу, виски имеет уникальный «лекарственный» аромат с нотами морских\nводорослей, вереска и мха. Его благородное происхождение подчеркивает тот факт, что с 1994\nгода винокурня Laphroaig является поставщиком\nКоролевского Двора Великобритании.\n\n98 Виски\n\n«Е динственная бочк а » (S ingle C ask )\n\nЕсли виски взят только из одной бочки, то он носит пометку «single cask».\nРазница между бочками и их разное\nместорасположение в погребе лежат в\nоснове отличий между выдержанными в них виски. Смесь содержимого\nразных бочек стирает эти отличия.\nНапротив, в случае с виски Single Cask\nставка делается на специфичность и\nсовершенную экспрессию индивидуального вкуса солодового виски.\n\n«Б очковая крепость » (C ask Strength)\n\nЕсли на этикетке виски есть пометка\n«cask strength» или «full strength», то\nперед вами сингл молт, не разбавленный водой, а разлитый по бутылкам\nпри натуральной крепости, которая\nснизилась в ходе его выдержки.\nСодержание алкоголя в таком виски,\nкак правило, выше, чем в регулярных\nрелизах.\nНаряду с годом дистилляции на\nэтикетке такого виски обычно указывается год разлива по бутылкам.\nCask Strength часто также является\nSingle Cask, и в этом случае носит\nномер бочки, из которой он появился\nна свет.", "К упаж солодовых виски\nКупаж солодовых виски (Blended\nMalt Scotch Whisky) – это смесь сингл\nмолтов, изготовленных на разных\nвинокурнях. Он не обладает столь выраженным вкусом, как сингл молт.\nПри создании этого типа виски\nстремятся создать напиток, превосходящий по качеству все его компоненты. Здесь многое зависит от умения\nмастера-блендера.\nСолодовые виски разных винокурен в\nопределенной пропорции смешивают\nв больших чанах. Купаж выдерживают\nнесколько месяцев в дубовых бочках,\nгде виски дозревает и оправляется от\nшока, вызванного встречей его компонентов. Готовый виски разливают\nпо бутылкам.\nКак и сингл молт, этот виски выпускается в разных возрастных категориях.\n\nАппарат непрерывной перегонки, созданный\nирландцем Аэнеасом Коффи в 1831 году, произвел\nреволюцию в мире шотландского виски.\n\nЗ ерновой\n\nвиски (G rain W hisky)\nВ 1831 году ирландец Аэнеас Коффи запатентовал аппарат непрерывной перегонки, названный\ncoffey still (или patent still). Этот аппарат позволял дистиллировать спирт в 15-20 раз быстрее\nтрадиционного «пот стила» и получать зерновой\nвиски, более легкий по сравнению с солодовым.\nЗерновой виски применяют главным образом\nпри создании бленда.\n\nСырье\nСырьем служат соложеный (но не с помощью\nторфяного дыма) ячмень, а также несоложеный\nячмень, иногда пшеница, овес и кукуруза.\n\nПроизводство\nЗерно разваривают под давлением, выделяя содержащийся в нем крахмал. Затем добавляют\nотвар из соложеного ячменя, который содержит\nразновидность энзима – диастазу, способную\nпревращать крахмал в сахар, необходимый для\n\nброжения. Перебродившее под воздействием\nдрожжей сусло перегоняют один раз в аппарате\n«патент стил», получая спиртное крепостью около 80% vol. с достаточно нейтральным, легким\nвкусом. Его разбавляют водой, снижая крепость\nдо 50-60% vol., и выдерживают в дубовых бочках.\nВ соответствии с регламентацией, только после\nтрех лет выдержки зерновой спирт может быть\nназван «виски».\n\nВинокурни\nВсе винокурни, производящие зерновой виски\n(кроме Invergordon, расположенной на севере\nХайленда), находятся в Лоуленде. К ним относятся Cambus, Cameron Bridge, Dumbarton, Girvan,\nNorth British, Port Dundas, Caledonian. Зерновой\nспирт из различного сырья дистиллируют и выдерживают в соответствии с требованиями бренда-заказчика.\n\nВиски 99", "К упажированный\n\nшотландский виски\n(B lend)\nМ ы в значите льной с тепени обязаны бленду всей сегодняшней культ урой виски\nи способами его употребления .\nВ о второй половине 19 века во время кризиса филлоксеры купажированный\nвиски с та л заменой бренди и коньяк у. Н еобходимо было найти напиток , с толь\nже элегантный и изысканный , какими были различные бренди , широко распро с траненные в дофиллоксерную эпоху. К упажированный виски с самого нача ла\nс та л предметом роскоши и быс тро обре л всемирное признание .\n\nСуществуют и другие факторы, способствовавшие взлету купажированного виски. Во-первых,\nэто изобретение непрерывной перегонки, позволившей получать в большом количестве зерновой спирт с более нейтральным вкусом, который\nможно было смешивать с обладавшими ярко выраженным характером солодовым виски.\nВо-вторых, совершенствование выдержки напитков в бочках, главным образом, из-под хереса.\nХерес был широко распространен в Англии еще с\n16 столетия. Но в 19 веке его потребление значительно возросло, в частности из-за того, что его\nвиноградники оказались заражены филлоксерой\nпозже прочих.\nИспользовать пустые бочки из-под хереса показалось куда более выгодным делом, нежели\nотправлять их из Англии обратно в Испанию. Так\nудалось обзавестись дешевой, но ценной тарой.\nВ результате выяснилось, что бочки из-под хереса, а также мадеры и порто придавали виски те\nароматы, которые очень даже напоминали ароматы исчезавшего с рынка коньяка.\nЭтот союз между зерном и вином дал рождение\nблендам: купажированным виски иногда немыслимой ароматической сложности, где дикие соленые брызги с островов и торфяной дым смешиваются с пленительным ароматом вин юга Европы.\nС тех пор мастер-блендер стал одним из самых\nтворческих и вдохновленных персонажей в мире\nспиртных напитков. Мастерство смешивания –\n\n100 Виски\n\nэто искусство. В блендах естественным образом\nотражается сочетание таланта человека с дарами\nприроды.\nКупажированный виски является незаменимым\nпомощником бармена и миксолога, поскольку\nароматическая архитектура бленда позволяет\nсоздавать невероятные смешанные напитки.\nБармен, стремящийся к успеху, должен знать: так\nили иначе, он является наследником мастеров\nбленда.\n\nПроизводство\nкупажированного виски\nМастер-блендер смешивает разные зерновые\nвиски, отличающиеся друг от друга сроком выдержки, с многочисленными солодовыми виски\nразного возраста и из разных винокурен. Его\nцель – получить уникальный, с точки зрения стиля и аромата, виски, вкус которого он сможет воспроизводить из года в год.\nПропорции купажа солодовых и зерновых виски\nчаще всего держатся в секрете. Обычно используют от 15 до 40 солодовых виски, которые составляют 20-40% купажа, и 2-3 зерновых виски.\nПолученный купаж можно сразу разлить по\nбутылкам или выдержать около 6 месяцев в дубовых бочках, что облагораживает напиток и\nпомогает ему оправиться от шока, вызванного\nвстречей разных «характеров». Этот период называют «свадьбой» (или «женитьбой»).\n\nЭ ндрю А шер – создатель\nбленда\n\nКогда вечером, глядя на огонь в камине, вы потягиваете хороший бленд\nпод звуки пианино, подумайте, хотя\nбы вскользь, об Эндрю Ашере. Он долго работал коммерческим служащим\nна одной винокурне и был увлечен\nмиром виски. Вдохновившись опытом\nпроизводителей коньяка, он первым\nделом начал смешивать между собой\nпо несколько солодовых виски разных\nсортов.\nВ 1853 году Эндрю Ашеру пришла в\nголову гениальная идея: для обретения гармонии уравновесить жесткие\nи мощные солодовые виски легкими\nзерновыми сортами. Так появился\nпервый Blended Scotch Whisky (купажированный шотландский виски),\nнемедленно завоевавший признание\nво всем мире.", "В иски D ewar ' s . Т ворческая сила бренда\nКогда вы посещаете дистиллерию «Аберфелди»,\nгде производят солодовый виски, лежащий в\nоснове бленда Dewar's, то отмечаете две вещи.\nВо-первых, это огромный опыт перегонки, купажирования и выдержки, объединяющий команду,\nкоторая создает виски, используя при этом творческий подход. А во-вторых, это аура главного\nдействующего лица в истории виски Dewar's, а\nименно сына основателя бренда – Томми Дюара.\nКонечно же, виски – это всего лишь напиток.\nКаким бы вкусным, сбалансированным или\nсложным он ни был. Но обращаясь к истории,\nмы видим, что виски тоже может стать целью и\nсмыслом жизни.\nВы сами, будучи барменом, стремитесь реализовать себя в профессии, работая в собственном\nстиле, со своими амбициями, энергией и увлечением. Неважно, вы ли выбрали эту профессию,\nили она выбрала вас, отныне вся ваша карьера\nбудет связана с работой в баре. В какой-то\nстепени вы сольетесь с ней. Отныне у вас нет\nдругого выбора, кроме как преуспеть в качестве\nбармена, если вы хотите преуспеть в жизни.\nС виски происходит то же самое. Получив наследство от основателя бренда Dewar's – Джона\nДюара, его сын Томми дал толчок дальнейшему\nразвитию этого виски, в чем и преуспел.\nС тех пор Томми Дюар стал главным действующим лицом, причем не только для бренда\nDewar’s, но и в мире виски вообще. Томми Дюар\n\n102 Виски\n\nстал символом успеха этого напитка.\nПозже другие личности, одержимые тем же\nвдохновением, пришли ему на смену. В свое\nвремя легендарный мастер купажа Александр\nКэмерон ввел «двойную выдержку» в процесс\nсоздания виски Dewar's. Этим он заложил фундамент, позволяющий Стефани МакЛеод, которая\nсегодня работает мастером купажа, получать\nфантастический Dewar’s Double Aged 15-летней\nвыдержки.\nЗаряженные творческой энергией Томми Дюара,\nвсе эти мужчины и женщины создавали и создают виски, наиболее востребованный в Шотландии, пользующийся успехом во всем мире и\nимеющий наибольшее количество медалей.\nЭтот динамичный и амбициозный бренд продолжает постоянно прогрессировать.\nВеликие бренды – это те бренды, которые смогли преуспеть. Это бренды, благодаря которым\nпреуспели и люди. Соответственно, эти бренды\nпомогут и вам стать успешным барменом.\nПоэтому такой виски, как Dewar’s будет воздействовать на вашу креативность и растить ваши\nамбиции, когда вы используете его в баре и в\nкоктейлях.\nВнесем ясность: факт использования вами виски\nDewar’s, а не какого-то виски «игрек» не заставит\nпланету вертеться в другую сторону. Но если вы\nподходите к коктейлям с позиции победителя,\nвдохновляясь примером Томми Дюара, который\n\nЭ кскурс в историю\nВ 1846 году Джон Дюар основал в\nПерте компанию по торговле виски.\nОн одним из первых приобщился к искусству блендинга и начал предлагать\nкупажированный виски под своим\nименем – Dewar’s.\nПозднее на смену Джону пришли его\nсыновья – Джон Александр и Роберт\nТомас (Томми), которые не только\nпродолжили дело отца, но и сделали\nвиски Dewar's известным во всем\nмире. В 1893 году Dewar's был первым\nбрендом виски, получившим лицензию Поставщика Королевского Двора,\nкоторую он сохраняет до сих пор.\n\nТомми Д юар\n«Whisky Barons» – так называли в\nВеликобритании конца 19 века тех\nмагнатов, которые построили свои\nимперии на производстве виски.\nНаверное, самым харизматичным\nсреди них был Томми Дюар. Успешный предприниматель, светский\nлев, удачный политик, писатель. Мэр\nродного Перта, шериф Лондона.\nКроме того, Томми Дюар прославился\nкак самый талантливый экспортер\nвиски в истории. С 1891 по 1893 год он\nпосетил 26 стран и нанял 32 торговых\nпредставителя, организовав первые\nпоставки своего виски в разные\nстраны мира.", "Д войная выдержка\nВиски Dewar's производят следуя\nособому методу двойной выдержки.\nЭтот метод придумал Александр Дж.\nКэмерон – первый мастер купажа\nдома «Дюарc» (на фото сверху).\nВ 1899 году он создал купаж White\nLabel по новой гениальной методике.\nБленд, смешанный из лучших\nвыдержанных солодовых и зерновых\nвиски, отправлялся выдерживаться\nеще 6 месяцев в небольших дубовых\nбочках.\nВ ходе этого полугодового дозревания в дубовых бочках, емкостью 250\nлитров, виски достигает мягкости и\nгармонии между всеми составляющими и развивает мощный букет.\nБлагодаря этому методу Dewar's получил рекордное число медалей за свою\nисторию (более 1000 наград!).\n\nстал третьим по счету автовладельцем в Соединенном Королевстве (после сэра Томаса Липтона и Принца Уэльского) и который объехал 26\nстран ради продвижения виски (в ту эпоху, когда\nеще не было самолетов), то это говорит о том,\nчто вы способны превзойти себя, черпая творческую энергию у людей, создавших великий\nвиски. И это поможет вам вырасти в профессии и\nизменить вашу жизнь к лучшему.\n\nМ астер купажа\nСтефани МакЛеод – сегодняшний мастер купажа\nдома Dewar's. Это одна из немногих женщин,\nдостигших столь высокой должности.\nСтефани изучала сыры, вино, но уже больше\n10 лет занимается виски. Она микробиолог\nпо образованию. И, тем не менее, надеется,\nчто процесс созревания виски никогда не\nпревратится в точную науку, а навсегда останется\nволшебством и магией.\n\nЛинейка\nDewar's White Label («Белая этикетка») – флагман\nбренда Dewar's. Это превосходно сбалансированный, мягкий и утонченный виски с ароматами\nмеда, вереска, ванили и грушевыми нотами. Он\nвключает 40 солодовых виски и пьется в чистом\nвиде, со льдом или с небольшим количеством\nводы, а также в составе коктейлей.\nDewar’s 12 y.o. включает обширную палитру\nвыдержанных солодовых виски из всех областей\nШотландии. После купажирования он дозревает\nв старых бочках. В результате получается один из\nлучших блендов в своей категории – фруктовый,\nбогатый, округлый во вкусе.\nDewar’s 15 y.o. cоставлен из солодовых виски\nХайленда и Спейсайда, которые после купажирования проходят повторную выдержку в старых\nбочках, завершающих созревание этого возвышенного напитка с медовыми, цветочными и\nфруктовыми ароматами.\nDewar’s 18 y.o. – виски высокого класса, со сложными ароматами меда и марципана, шелковистой архитектурой и глубоким характером. Его\nрекомендуется пить без льда, слегка разбавляя\nводой, что подчеркивает его ароматы.\n\nDewar’s 25 y.o. – благородный виски, появившийся в 2017 году. В компании Dewar's убеждены,\nчто указание срока выдержки является важным\nориентиром для потребителя. Следуя этой\nтрадиции, Стефани МакЛеод отобрала более 40\nредчайших солодовых и зерновых виски, выдержанных не менее 25 лет в бочках. Она разлила\nготовый купаж в бочки, где до этого хранился\nсолодовый виски Royal Brackla, и оставила еще на\nполгода для гармонизации вкуса. В итоге получился эксклюзивный бленд с богатыми ароматами и бесконечным, бархатистым послевкусием.\n\nВиски Dewar’s и коктейли\nРаспространение виски Dewar’s в Америке\nсовпало с рождением многих выдающихся\nамериканских коктейлей на основе скотча,\nсреди который Rob Roy, Affinity и многие другие.\nЕстественно, что миксологи используют Dewar's\nв исторических коктейлях, сделавших Америку\nколыбелью смешанных напитков.\nВместе с тем, бренд Dewar's наделяет барменов\nамбициями и творческой энергией. Он вдохновляет их на создание современных и креативных\nкоктейлей, которые дают возможность прочувствовать все теплые ароматы и уравновешенный\nхарактер этого купажированного виски.\n\nВиски 103", "Благородные традиции братьев Ч ивас\nД истиллерия Стратайла\nПроисхождение бренда Chivas Regal восходит к\n1801 году. Тогда в Шотландии, в городе Абердине\nбыла основана бакалейная лавка братьев Чивас,\nкоторая снабжала взыскательных клиентов качественными продуктами и деликатесами.\nПозднее, в середине 19 века братья Чивас\nпосвятили свое время и талант разработке\nвыдающегося купажированного виски, уравновешивающего между собой великолепные сингл\nмолты Спейсайда, создав маслянистый, богатый\nи сбалансированный бленд Chivas Regal.\n\nСпейсайд - колыбель шотландского\nвиски\n\nтые тонкими цветочно-шоколадными нотами,\nи радует нежным финалом с влиянием имбиря.\nНо, главное, он великолепно сбалансирован, что\nчрезвычайно ценится при купажировании.\nДистиллерия Стратайла была основана в 1786\nгоду. Она одна из самых старых в Шотландии и,\nпо-видимому, самая старая в Спейсайде. Процесс\nпроизводства здесь сохранил традиционный\nхарактер. Виски перегоняют, как и 200 лет тому\nназад, в небольших приземистых перегонных\nкубах, отличающихся широкими «лебедиными\nшеями».\n\nПродуктовый ряд\n\nСпейсайд является географическим и культурным\nцентром производства шотландского виски. Благодаря сочетанию климата, воды и географического положения, Спейсайд оказался идеальным\nместом для нахождения дистиллерий. Образующие основу Chivas Regal виски производятся в\nСпейсайде, отражая его гармоничный характер.\n\nChivas Regal 12 y.o. – сбалансированный и мягкий бленд, объединяющий в себе молты из разных уголков региона Спейсайд. Он демонстрирует медово-ореховый букет с оттенками вереска\nи фруктов. Его пьют в чистом виде, разбавленным\nнебольшим количеством воды, со льдом, а также\nиспользуют в престижных коктейлях.\n\nСтратайла - сердце всех купажей\nвиски Chivas Regal\n\nChivas Regal Extra – виски с ярко выраженным\nхарактером, глубокий янтарный цвет и богатый\nаромат которого обусловлены выдержкой в\nценных бочках первого наполнения из-под хереса Олоросо. Каждая бочка выдерживается под\nсолнцем Андалусии, после чего отправляется в\nШотландию для созревания избранных спиртов,\nвходящих в купаж этого виски.\n\nБриллиантом в короне купажированного\nвиски Chivas Regal служит изящный сингл молт\nStrathisla, который считается одним из наиболее\nхарактерных для Спейсайда. Он богат, обладает ароматом пряностей, почти сладок на вкус,\nпроявляет легкие древесные тона, подчеркну-\n\n104 Виски\n\nСолодовый виски старинной дистиллерии Стратайла служит стержнем\nбленда Chivas Regal.\nОснованная в 1786 году, Стратайла\nбыла перестроена после пожара в\n1879 году.\nВладельцы сумели сберечь первозданное очарование старинных стен,\nблагодаря которым Стратайла остается самой живописной дистиллерией\nШотландии и чаще других встречается\nна фотографиях. Можно сказать, что\nона принадлежит коллективному наследию всех любителей виски.", "Х ранитель традиций\nХранитель мастерства купажирования Дома Chivas – Колин Скотт\n– является одним из величайших\nпрофессионалов в мире виски. Более\n40 лет своей жизни он посвятил искусству составления купажей.\nПод его наставничеством небольшая команда мастеров продолжает\nтрадиции Джона и Джеймса Чивас,\nоснованные в 1840 году: производство богатого и насыщенного виски с\nуникальными вкусовыми характеристиками.\n\nChivas Regal 18 y.o. содержит, помимо всего\nпрочего, два выдающихся солодовых виски. Вопервых, Стратайла, которому он обязан теплым,\nдолгим, сбалансированным и стойким финалом,\nи, во-вторых, Лонгморн, привносящий вкусовое\nбогатство. Chivas Regal 18 y.o. пьют чистым или со\nльдом, или – в идеальном варианте – разбавив\nнебольшим количеством воды.\nChivas Regal Ultis. Квинтэссенция традиций и\nмастерства Дома Chivas.\nОсновой основ всех творений Дома являются\nмастера купажа. С 1909 года только 5 мастеров\nсменились на этой позиции, посвятив свои жизни совершенствованию знаменитого стиля Дома\nChivas. Их имена: Чарльз Говард, Чарльз Джулиан,\nАлан Бэйли, Джимми Ланг и Колин Скотт.\nЧествуя их преданность и талант, для создания\nChivas Regal Ultis были отобраны 5 знаковых\nодносолодовых виски, каждый из которых передает купажу свой индивидуальный характер.\nПять дистиллерий, производящих эти ценные\nвиски, расположены в разных уголках региона\nСпейсайд. Это винокурни Тормор, Лонгморн,\nСтратайла, Альт-а-Бейн и Брэвал.\nИх хранилища насчитывают миллионы бочек, из\nкоторых только один процент спиртов с исключительным характером был отобран традиционным ручным способом для создания Chivas\nRegal Ultis. Этот виски высокого класса обладает\nмногогранным вкусом, насыщенным золотым\nцветом и богатым ароматом.\n\nChivas Regal 25 y.o. После 25 лет выдержки\nвходящие в состав этого бленда солодовые\nвиски достигают своего рода совершенства, и\nутонченное сочетание их ароматов граничит\nс магией. Вкусовые оттенки колеблются между\nгрушами и сухофруктами, шоколадом и апельсинами, сохраняя исключительную нежность во\nрту. Chivas Regal 25-летней выдержки – это один\nиз наиболее ярких примеров того, что, сочетая\nмежду собой ароматы, бленд переносит их в\nновое измерение.\nChivas Regal The Icon – вершина коллекции\nChivas Regal. Этот сложный купаж выпускается\nкаждый год в строго ограниченном количестве.\nОн включает старейшие и редчайшие виски из\nболее чем 20 винокурен Шотландии, в том числе\nуникальные солодовые спирты Стратайлы, а\nтакже некоторые раритетные сорта из ныне несуществующих дистиллерий.\nВ результате, Chivas Regal The Icon, заключенный\nв хрустальный декантер ручной работы, представляет собой изящный баланс старого и нового с уникальными характеристиками от каждой\nдистиллерии.\nХранитель мастерства купажирования Колин\nСкотт отмечает: «Chivas Regal The Icon – это\nпо-настоящему изысканный бленд. Мягкий, но\nобладающий сильной концентрацией изысканных\nвкусов, которые раскрываются на протяжении\nвсей дегустации и дарят истинное наслаждение\nценителям благородного напитка».\n\nВиски 105", "К ак пить скотч?\nВ последние годы правила употребления виски\nстали значительно менее строгими и намного более разнообразными.\nВ чистом виде со льдом – классический вариант.\nСолодовый виски в коктейлях – почему бы и нет.\nВ сочетании с родниковой водой из собственной\nвинокурни – отличный выбор. С гастрономическими сетами или в составе настойки – прекрасная идея!\n\nCолодовый виски\nСами шотландцы считают, что их виски подходит\nдля любой погоды, любого настроения и любого\nвремени дня или ночи.\nОни наливают солидную порцию сингл молта в\nбокал и добавляют в него touch (чуточку) воды.\nЭта «чуточка» может достигать 10 миллилитров.\nВода должна быть слабоминеральной и иметь\nкомнатную температуру.\nШотландцы считают, что вода «отворяет» поверхность виски, высвобождая его ароматы. Переливаясь в бокале, виски раскроет легкие запахи\nхереса, торфа, дыма, йода, а иногда красных фруктов и цитрусовых. Некоторые знатоки разбавляют\nвиски только шотландской водой, а самые строгие\nпуристы заказывают воду из источника той винокурни, где был получен их любимый виски. Они не\nпоощряют использование газированной воды и добавление льда, которые, по их мнению, вызывают у\nвиски шок и искажают его вкус.\n\nБленд\nУпотребление купажированного виски гораздо\nболее свободно от правил и зависит, разумеется,\nот его стоимости. Самое важное – это получаемое удовольствие.\nВиски адаптируется к самым разнообразным\nситуациям: в чистом виде, с небольшим количеством воды, подобно сингл молту, со льдом, с газированной водой, а также в коктейлях, которые\nпредоставляют виски исключительную сферу для\nсамовыражения.\n\nКоктейли\nСегодня шотландский виски широко используется в коктейлях.\nНадо сказать, что первые смешанные напитки со\nскотчем присутствуют в историческом сборнике\nрецептов Джерри Томаса (1862 год). Среди них\n– знаменитый Blue Blazer. В то время миксологи\nиспользовали, по всей вероятности, солодовый\nвиски. Так Джерри Томас рекомендует использовать «Гленливет», как один из вариантов виски, в\nрецепте «Скотч Виски Пунш».\n\n106 Виски\n\nПозднее, Золотой век коктейлей (начало 20 столетия) совпал с развитием транспортного сообщения между Европой и Америкой и ростом\nпоставок шотландского купажированного виски.\nПрекрасно смешиваясь с другими ингредиентами, бленды дали рождение на американской земле таким коктейлям, как Rob Roy, Affinity, Robert\nBurns... Солодовый виски в то время был практически повсеместно вытеснен из смешанных напитков.\nС начала этого века миксологи вновь воспылали\nстрастью к виски. Причем – не только к бленду, но\nи к сингл молту. Произошло это, в частности, благодаря Сэму Россу и его выдающемуся коктейлю\n«Пенициллин» с островным виски, созданному в\n2005 году. С тех пор бармены не перестают создавать новые, прекрасные и богатые ароматами\nкоктейли как на купажированном, так и на солодовом виски.\n\nС ове ты бармену\nКак распознать качество виски\nНаполните дегустационный бокал виски, затем вылейте его содержимое и подождите, пока бокал высохнет. Вдыхая его ароматы, можно составить представление об\nароматическом богатстве виски и почувствовать все его нюансы. Запахи торфа, йода,\nванили или хереса высвобождаются и сменяют друг друга под влиянием ускоренного\nиспарения. Дефекты и неуравновешенность виски четко проявляются в ходе подобной дегустации.\n\nХранение виски\nБутылки с виски следует хранить в вертикальном положении, чтобы напиток не соприкасался с пробкой.\n\nГрафин\nГрафин красив, но обладает несколькими недостатками. Во-первых, в графине из-за\nпроницаемости воздуха виски теряет некоторые ароматы, в частности, запах ванили,\nкоторый улетучивается в первую очередь. Во-вторых, утрачивается магия дегустации,\nкогда этикетка, вбирающая в себя всю историю и опыт бренда, больше не приглашена к столу.\n\nТемпература подачи\nCолодовый виски следует пить при температуре от 18 до 20°С. Если температура\nниже, то аромат напитка не почувствуется, а если выше, то ощущение алкоголя будет\nслишком сильным.\n\nРоль воды\nВода с высоким содержанием минеральных солей придает виски соленый вкус. Следовательно, лучше использовать слабоминеральную воду.\nУделяйте большое внимание приготовлению льда для охлаждения виски.", "Виски 107", "Н ас тоящий виски Д жорджа Б аллантайна\nИстория\nВ 1808 году в семье шотландского фермера Баллантайна родился мальчик по имени Джордж,\nкоторому предстояло войти в историю виски.\nВ 1827 году, в девятнадцать лет, он уже был\nвладельцем свой бакалейной лавки в Эдинбурге,\nгде помимо всего прочего продавался большой\nассортимент виски.\nВ 1865 году, передав управление магазином\nсвоему старшему сыну Арчибальду, Джордж Баллантайн переехал в Глазго, где он открыл новый,\nболее крупный магазин. Кроме того, Джордж\nналадил выпуск своего бленда. Надо сказать, что\nэта категория виски в то время только появилась на рынке. Дела шли в гору, и очень быстро\nДжорджу понадобилась помощь в ведении дел.\nВ качестве помощника к нему присоединился\nего сын – Джордж-младший. Так была основана\nкомпания «Джордж Баллантайн и сын».\nВ 1881 году Джордж Баллантайн отошел от дел.\nУ руля встал Джордж-младший, при котором\nбренд Ballantine’s продолжал стремительно\nразвиваться вплоть до 1919 года, когда он решил\nпродать компанию.\nНовым собственником стала фирма «Барклай и\n\n108 Виски\n\nМакКинли». Благодаря тому, что виски Ballantine’s\nуже имел хорошую репутацию и множество\nпочитателей по всему миру, новым владельцам\nне составило особого труда поднять бренд на\nновый уровень.\nДаже сухой закон не помешал виски Ballantine's\nпродолжать свою экспансию. Именно тогда\nBallantine's познал славу в Америке. Его поставляли к границе США (в Канаде и на Багамах), а\nоттуда он попадал в нью-йоркские тайные бары\nи, в первую очередь, в «Клуб 21», который был\nсамым известным американским спикизи.\n\nД евиз основателя\n«Будь настоящим, и преимущество\nбудет на твоей стороне». Эта фраза\nпринадлежит Джорджу Баллантайну и является философией дома\nBallantine's, который остается верен\nтрадициям и производит образцовый шотландский виски с нежной\nструктурой.", "В 1937 году бренд Ballantine’s вновь сменил\nсобственника. Владельцем стала канадская\nкомпания Hiram Walker. В 1960-х годах компания\nрешила выйти на рынок Европы, где шотландский скотч еще мало кто знал. Такой ход оказался настолько успешным, что к 1965 году было\nпринято решение уйти с рынка Великобритании\nи сконцентрироваться на экспорте.\nСегодня брендом Ballantine's владеет крупный\nфранцузский алкогольный концерн Pernod\nRicard.\n\nКупажирование\nСегодня купажированием виски Ballantine's занимается Сэнди Хислоп. В компании гордятся тем,\nчто он – всего лишь ее пятый по счету мастерблендер. Преемственность поколений гарантирует верность традициям.\nСэнди уделяет большое внимание зерновому\nвиски, который используется не для разбавления\nвкуса солодовых виски, а для создания гармонии между всеми компонентами и образования\nхарактерной для Ballantine's нежной структуры.\nВ компании «Баллантайнс» считают, что бочки из-под бурбона, придающие ноты ванили\nи сливочную текстуру, в наибольшей степени\nсоответствует духу подлинности шотландского\nвиски, и используют их для выдержки в первую\nочередь.\n\nЛинейка Ballantine's\n\nB allantine 's и коктейли\n\nBallantine’s Finest – символичный виски дома\n«Баллантайнс». Он был создан в 1910 году и украшен подписью Джорджа Баллантайна, второго\nсына создателя компании.\nЕго нежный вкус с нотами молочного шоколада,\nкрасного яблока и ванили переходит в свежее и\nцветочное послевкусие, которое дает ощущение\nзавершенности. Он послужит прекрасной основой для лонг дринков и коктейлей.\n\nBallantine’s можно использовать в\nсамых разных коктейлях.\nВо-первых, в классических и исторических смешанных напитках. Бархатистость виски Ballantine’s Finest творит\nчудеса и воскрешает первоначальный\nвкус старинных коктейлей.\nВо-вторых, Ballantine’s отлично подходит для творчества современных\nмиксологов. Его ароматы, характер\nи нежная текстура возвышают вкус\nкоктейлей и привносят в них дополнительную мягкость.\n\nBallantine's 12 y.o. – сбалансированный виски со\nсливочной структурой. Его медово-цветочные\nароматы раскроются при подаче в чистом виде\nсо льдом или разбавленным небольшим количеством воды.\nBallantine's Brasil Lime – виски, ароматизированный цедрой бразильского лайма. Отличное сочетание освежающих цитрусовых нот с нежными\nванильными оттенками скотча.\nКроме того, существует коллекция эксклюзивных\nвиски Ballantine's особо долгой выдержки. Благородство и концентрация ароматов этих виски\nнарастает по мере подъема к вершине коллекции – роскошному Ballantine's 40 y.o., который\nвключает солодовые спирты сорока и более лет\nвыдержки.\n\nД истиллерия «Гленберги »\nЗа белым фасадом спейсайдской\nдистиллерии Glenburgie производят\nодносолодовый виски, который (вместе с двумя другими сингл молтами\n– Miltonduff и Glentauchers) образует\n«сердце» купажированных виски\nBallantine's.\nНа дистиллерии установлены шесть\nперегонных кубов «пот стил». Полученный в них виски обладает яркими\nфруктовыми ароматами с медовыми\nнотами.\n\nВиски 109", "В а жнейшие бренды шотландского\nк упа жированного виски\nBallantine’s (Баллантайнс)\nИстория бренда восходит к 1827 году, когда\nДжордж Баллантайн открыл в Эдинбурге бакалейную лавку. Понемногу он занялся торговлей\nвиски и создал собственный купаж, успех которого сегодня всем известен. Ballantine’s пользуется\nзаслуженной репутацией хранить дух входящих в\nего состав солодовых виски. Зерновые виски придают общей «архитектуре» полнотелый и нежный\nхарактер. Выдерживать виски предпочитают в\nбочках из-под бурбона, поскольку в компании\n«Баллантайнс» считают, что только они способны\nсохранить всю полноту виски.\nВиски Ballantine’s Finest имеет теплый и сбалансированный характер.\nBallantine’s 12 y.o. – виски со сливочной структурой и медово-цветочными ароматами.\n\nBlack Bottle (Блэк Боттл)\n\nC hivas R egal U ltis\nВиски Chivas Regal Ultis отдает дань\nуважения наследию пяти поколений\nнепревзойденного мастерства купажирования.\nОн содержит пять редких односолодовых виски из пяти знаковых\nдистиллерий Спейсайда, чествуя\nпреданность и талант пяти мастеров\nкупажа Дома, которые сменяли друг\nдруга на протяжении его истории.\nХранилища этих дистиллерий насчитывают миллионы бочек, из которых\nтолько один процент спиртов с исключительным характером был отобран\nдля создания Chivas Regal Ultis.\nЭтот виски обладает насыщенным золотым цветом, многогранным вкусом\nи богатым ароматом.\n\n110 Виски\n\nБренд купажированного виски Black Bottle был\nоснован в 1879 году в Абердине Гордоном Грэхемом, который был выходцем из семейства, занимавшегося чайной торговлей и смешиванием\nразных сортов чая.\nБленд Гордона Грэхема завоевал популярность\nсреди потребителей, оценивших насыщенный\nдымный вкус содержимого черной матовой бутылки. Однако с началом Первой мировой войны\nбренд постепенно потерял свой лоск, в середине\n20 века поменял владельцев и, в конце концов,\nпришел в упадок.\nВиски Black Bottle был воссоздан и полностью обновлен в 2013 году. Сегодня он вновь обрел свое\nпрежнее благородство: в его свежем цветочном\nаромате чувствуются легкие оттенки дуба и специй, а также приятные дымные ноты.\n\nChivas Regal (Чивас Ригал)\nВ 1801 году братья Чивас открыли бакалейный\nмагазин в Абердине и стали вести активную торговлю престижными гастрономическими продуктами. В 1842 году они стали Поставщиками\nКоролевского двора. Затем, в целях создания\nпрестижного бленда, Дом Chivas пустился на поиски лучших сортов виски. Так в 1909 году на свет\nпоявился Chivas Regal, величественный бленд\n25-летней выдержки, предназначенный для американского рынка. Сто лет спустя этот роскошный и исключительный виски был воссоздан легендарным мастером купажа Колином Скоттом.\nПосле отмены сухого закона флагманом Дома\nChivas стал виски Chivas Regal 12-летней выдерж-\n\nки с медово-ореховым букетом, с нотами вереска\nи фруктов.\nChivas Regal Extra содержит тщательно отобранные виски, выдержанные в бочках из-под хереса\nОлоросо первого наполнения. В результате, этот\nбленд обладает глубоким янтарным цветом и яркими ароматами со сладковато-пряными нотами.\nСледующий этап в искусстве составления купажа\nдемонстрирует Chivas Regal 18-летней выдержки\nс богатой ароматической палитрой, нотами специй и шоколада.\nМногогранный Chivas Regal Ultis включает редкие\nодносолодовые виски пяти знаковых дистиллерий Спейсайда: Тормор, Лонгморн, Стратайла,\nАльт-а-Бейн и Брэвал.\nВершина коллекции – Chivas Regal The Icon – объединяет старейшие, раритетные виски более\nдвадцати дистиллерий. Этот исключительный виски обладает мягким характером и одновременно высокой концентрацией изысканных вкусов.\n\nCutty Sark (Катти Сарк)\nВиски Cutty Sark – по-гэльски «короткая рубашка» – получил свое название от знаменитого шотландского парусника. Он был выпущен на рынок\nв 1923 году. Cutty Sark отличается светлым цветом\nи деликатным, легким характером, который обусловлен выдержкой в хересных бочках из американского дуба. Во вкусе сладковатые ноты ванили\nперекликаются с цветочными и фруктовыми оттенками.\n\nDewar’s (Дюарс)\nDewar's принадлежит к закрытому клубу легендарных блендов. Он обязан этим своему неизменному качеству и гениальному Томми Дюару,\nсумевшему оставить свой след в истории виски.\nЗнаменосец марки – White Label (Белая этикетка) –\nделикатный купаж с ароматами груши и меда.\nКупаж Dewar's 12 y.o. – мощный виски, с фруктовыми\nароматами. Он собрал внушительную коллекцию\nмедалей на международных конкурсах.\nDewar's 15 y.o. – изысканный бленд с ароматами\nмеда и экзотических плодов, которые перекликаются с нежными цветочными нотами.\nDewar's 18 y.o., созданный на основе солодового виски Aberfeldy, имеет шелковистую консистенцию во\nвкусе, ароматы марципана и меда.\nDewar's 25 y.o. включает более 40 редчайших виски, выдержанных не менее 25 лет в бочках. Готовый купаж выдерживается еще полгода в бочках\nиз-под солодового виски Royal Brackla. Этот экс-", "клюзивный бленд обладает богатыми ароматами\nи бесконечным, бархатистым послевкусием.\n\nThe Famous Grouse (Феймоус Грауз)\nВ 1800 году Мэтью Глог открыл в Перте, в Шотландии, торговлю винами и крепкими напитками.\nПоявлением на свет «Знаменитой куропатки» мы\nобязаны племяннику его сына, которого тоже звали Мэтью Глог. В 1896 году он проникся идеей организовать собственное предприятие по купажированию виски. Он назвал свой напиток «Grouse»\n(Куропатка), так как предназначал его, в первую\nочередь, для джентльменов-охотников. Виски\nбыстро познал успех и, благодаря своей известности, стал именоваться «Знаменитая Куропатка».\nВ состав этого исключительного и востребованного виски входят такие ценные сингл молты, как\nThe Macallan и Highland Park. Его выдерживают в\nдубовых бочках из-под бурбона и хереса.\n\nGrant’s (Грантc)\nВ состав бленда Family Reserve Уильяма Гранта входят солодовые виски Glenfiddich и The\nBalvenie, а также еще около двух десятков других\nсингл молтов. Он издает ароматы меда, миндаля\nи ванили.\nВозвышенный характер виски Dewar's\n15 y.o., его цветочно-фруктовые\nароматы с нотами меда отлично\nпрочувствуются при подаче напитка в\nчистом виде. Кроме того, он послужит\nосновой престижных коктейлей,\nкоторым он передаст свою изысканность и мягкость. Эта особая мягкость\nи гармония являются результатом\nдвойной выдержки напитка: купаж\nуже выдержанных солодовых виски\nвыдерживают еще 6 месяцев в небольших дубовых бочках.\n\nJ&B Rare (Джи энд Би Рейр)\nВиноторговая компания «Джастерини энд Брукс»\nбыла основана итальянцем Джакомо Джастерини\nи британцем Джорджем Джонсоном. Альфред\nБрукс добавил к ней свое имя, выкупив в 1831\nгоду акции Джонсона.\nИзвестный в наше время купажированный виски\nJ&B Rare был создан специально для американской клиентуры во времена сухого закона. Бледный, очень легкий, он обладает тонами аниса и\nлакрицы, а в финале проявляет свою основу зернового виски.\n\nJohnnie Walker (Джонни Уокер)\nПервый виски Джона Уокера появился в 1820 году\nи дал начало значительному потомству.\nJohnnie Walker Red Label объединяет легкие виски с востока Шотландии и дымные виски с западных островов. Его пьют в чистом виде или в\nкоктейлях.\nВ купаж Johnnie Walker Black Label входят более\n40 солодовых и зерновых виски из разных регионов Шотландии, сообщающие ему богатые ароматы дыма, ванили и фруктов.\n\nRoyal Salute (Роял Салют)\nRoyal Salute – исключительный купажированный\nвиски, который впервые был представлен в 1953\nгоду по случаю коронации Елизаветы II. Он получил свое название в честь «королевского салюта»:\n\nзалпа пушечных орудий, пускаемого с корабля в\nдень восхождения на трон молодой королевы.\nRoyal Salute 21 y.o. – это купаж редких виски, самый\nмолодой из которых выдержан 21 год в бочках.\nRoyal Salute «The Diamond Tribute» создан на основе редчайших спиртов старейшей винокурни\nХайленда – знаменитой Стратайлы.\nRoyal Salute 38 y.o. («Stone of Destiny») – виски\nограниченной серии, вершина роскоши и искусства купажирования.\n\nTeacher’s (Тичерс)\nКлассический купажированный виски, в котором\nна фоне мягкого характера проявляются дымные\nароматы и богатый солодовый вкус. Он был создан Уильямом Тичером в Глазго. Бленд содержит\nбольшую долю солодовых виски из Хайленда,\nна что указывает название «Highland Cream» на\nэтикетке. За его янтарно-золотым цветом кроется\nшелковистая, округлая архитектура и сбалансированная ароматическая палитра.\n\nVat 69 (Ват 69)\nЭтикетка Vat 69 напоминает своим дизайном этикетку порто. Это неслучайно, ведь Уильям Сандерсон, стоящий у истоков этого бленда, имел\nтесные связи с индустрией порто. Марка появилась на свет в 1882 году, когда из 100 заказанных\nбочек с виски содержимое «Бочки № 69» получило одобрение Сандерсона.\n\nWhyte & Mackay (Уайт энд Мэкей)\nЧарльз Мэкей и Джеймс Уайт занялись производством виски в 1881 году, используя основанную\nв 1844 году фирму. Сегодня их предприятие владеет несколькими винокурнями, среди которых\nInvergordon – центр производства зернового\nвиски, где и разливается по бутылкам этот бленд.\n\nWilliam Lawson’s (Вильям Лоусонз)\nВильям Лоусонз – это купаж с большой долей\nсолодовых виски из Хайленда (Шотландия), существующий с 1849 года. Его основу составляет\nсингл молт The Deveron. В этот бленд входит до\n40% солодовых спиртов, при этом мастер-блендер\nизбегает слишком дымных солодовых виски, способных разрушить фруктовую архитектуру продукта. Маслянистость зерновых виски подчеркивает\nфруктовые ноты сингл молтов.\nПолученный купаж вновь подвергается выдержке.\nВ результате получается мягкий, нерезкий виски в\nирландском стиле, с едва уловимыми ароматами\nмеда и ванили. Его следует пить со льдом, с содовой или с колой. Кроме того, благодаря своей\nмягкости, он послужит отличной основой для коктейлей: от исторических пуншей до современных\nтворений.\n\nВиски 111", "И рландский виски\nМ ас терс тво перегонки извес тно в И рландии с очень давних пор. В этой с тране\nбыл найден древний бронзовый перегонный куб , относящийся примерно к 6 веку.\nЧ то касается первого письменного упоминания « воды жизни » (однако без\nуказания использованного сырья), то оно датируется 1405 годом .\nВ 1556 году в ак тах парламента И рландии впервые упоминается « вода жизни »,\nпроизведенная из ячменя .\n\nБесконечная борьба со сборщиками налогов\nдолго отмечала ход истории ирландского виски.\nВ конце 16 века в Ирландии существовало множество подпольных винокурен. Первая из них –\nБушмилс – стала легальной в 1608 году.\n\nПочин – напиток контрабандистов\nПод Рождество 1661 года англичане установили\nналог на ирландское спиртное в размере 4 пенсов с галлона. Говорят, что в тот же самый день\nна свет появился «почин» (poteen) – невыдержанный контрабандный виски. Из-за возрастающего\nспроса почин стали получать из картофеля, а\nиногда даже из яблок. Успех почина был настолько велик, что он некоторое время затмевал легально произведенный виски.\n\nРасцвет ирландского виски\nТолько в 1780–1790-е годы, когда были основаны винокурни Джемесона и Пауэра, законный\nирландский виски занял прочное место в привычках местных жителей. После стабилизации\nналоговой политики (до 1823 года порой каждый месяц издавался новый закон в отношении\nспиртного!) начался международный взлет ирландского виски.\nВ первой половине 19 века потребляемый в мире\nвиски был чаще всего ирландским. Его пили не\nтолько в Англии, но также в Америке и в британской колонии – Индии. В то время в Ирландии\nнасчитывалось огромное количество винокурен.\nВыходя из подполья, они изготавливали легкий и\nтонкий напиток, который ценился больше шотландского солодового виски.\n\nПреданность традициям\nВ конце 19 века ирландцы отвергли предложение\nАэнеаса Коффи использовать его перегонный аппарат непрерывного действия. Они посчитали,\nчто спиртное, изготовленное в таком нетрадиционном аппарате, не может носить престижное на-\n\n112 Виски\n\nзвание «виски». После этого ирландцы потеряли\nбольшую часть рынка, уступив ее шотландцам,\nкоторые внедрили изобретение Коффи и стали\nмасштабно производить более дешевый виски.\nПотеря Великобританией своих колониальных\nрынков, а затем сухой закон в Соединенных Штатах нанесли еще один тяжелый удар по многим\nирландским винокурням.\nСегодня ирландский виски отвоевывает утраченные в прошлом позиции, что происходит благодаря его большой оригинальности, постоянному\nконтролю качества и активной коммерческой политике.\n\nС вятой П атрик\nХристианский проповедник Святой Патрик – покровитель Ирландии. Считается, что\nон прибыл в страну в 432 году. Ирландцы утверждают, что его монахи-сподвижники\nпривезли с Ближнего Востока знания о дистилляции, которую использовали там для производства духов. В Ирландии эти знания распространились и дали рождение виски. День\nСвятого Патрика – 17 марта – широко отмечается в ирландских барах по всему миру.\n\nИ рландский виски и закон\nЗаконодательство предъявляет следующие основные требования к напитку под\nназванием Irish Whiskey.\n• Виски должен быть изготовлен на территории Ирландии путем дистилляции сусла из зерна.\n• Сахар в зерне должен высвобождаться\nблагодаря диастазе, содержащейся в солоде, с применением или без диастазы\nдругого натурального происхождения.\n• Брожение должно происходить под\nвоздействием дрожжей.\n\n• В результате дистилляции должно получиться спиртное не крепче 94,8% vol.,\nчтобы в дистилляте присутствовали\nароматы использованного сырья.\n• Спиртное должно выдерживаться на\nтерритории Ирландии в деревянных\nбочках (объемом не более 700 литров)\nне менее трех лет.\n• Разрешаются добавки воды для снижения крепости, а также карамели – для\nпридания цвета.\n• Крепость готового виски должна быть\nне менее 40% vol.", "ЧРЕЗМЕРНОЕ УПОТРЕБЛЕНИЕ АЛКОГОЛЯ ВРЕДИТ ВАШЕМУ ЗДОРОВЬЮ\nВиски 113", "П роизводс тво ирландского виски\nКлассический ирландский виски изготавливают\nпутем тройной перегонки из соложеного, но не\nкопченого ячменя. Рассмотрим основные этапы\nего производства.\n\nВарка и брожение\nВ отличие от производства шотландского виски,\nячменные зерна не коптят с помощью торфа. Для\nобразования сахара, необходимого для брожения, зерно увлажняют с целью прорастания, ко-\n\nВ иды ирландского виски\n\nторое затем резко прерывают, высушивая ячмень\nв больших печах.\nЗерно перемалывают в муку и смешивают с горячей водой. Смесь варят, а затем фильтруют, получая сладкую жидкость, называемую wort.\nПод воздействием дрожжей wort бродит и превращается в пиво (wash) крепостью от 6 до 8% vol.\n\nПерегонка\nДистилляция ирландского виски осуществляется\nпоследовательно в трех больших медных перегонных аппаратах.\nЭта тройная перегонка определяет особенности ирландского виски – его тонкость и легкие\nароматы. Дистиллят, вышедший из первого куба,\nпоступает во второй, а затем в третий куб, постепенно избавляясь от лишних элементов и насыщаясь алкоголем.\nОперация по отделению «сердца» напитка более\nделикатна, чем при двойной перегонке, поскольку количество дистиллята пропорционально\nменьше по отношению к перегоняемому пиву.\nЕсли мастер дистилляции хочет создать более\nтяжелый виски с сильно выраженным ароматом,\nто ему придется добавить немного «хвостов» к\n«сердцу» дистиллята.\nНа выходе из третьего куба напиток имеет крепость около 70% vol. К нему добавляют чистую\nводу, снижая содержание алкоголя примерно до\n55% vol.\nИрландский виски – это легкое, гармоничное и\nтонкое спиртное, которое не нуждается в слишком долгой выдержке.\n\nSingle Pot Still Whiskey\n\nВыдержка\n\nТрадиционный виски, полученный из соложеного ячменя (минимум 30%), а также\nнесоложеного ячменя (минимум 30%) и других несоложеных злаковых (максимум 5%)\nв аппаратах «пот стил» на одной винокурне. Обычно для него используется тройная\nперегонка, но может применяться и двойная.\n\nВыдержка значительно влияет на вкус виски. Во\nвремя старения в дубовых бочках спирт медленно испаряется сквозь поры древесины, и виски\nтеряет свою крепость. Исчезают последние нежелательные компоненты, а оставшиеся вещества определяют характер получаемого напитка.\nДревесина бочки сообщает виски свой особый\nаромат.\nВ Ирландии часто используют бочки, в которых\nраньше выдерживали херес или порто. Небольшое количество вина, сохранившегося в древесине, постепенно переходит в виски и придает\nему желанную маслянистость, мягкость и богатство ароматов.\nВ некоторых погребах бочки с виски ставят вертикальными рядами друг над другом, чтобы ограничить вокруг них циркуляцию воздуха, а значит\nзамедлить испарение, называемое «долей ангелов».\n\nSingle Malt Whiskey\nВиски из соложеного ячменя, полученный путем двойной или тройной перегонки в\nаппарате «пот стил» на одной винокурне.\n\nGrain Whiskey\nСхож с шотландским зерновым виски. На него не налагаются ограничения в отношении используемого сырья (это может быть, как соложеный ячмень, так и другие злаковые). Получен путем непрерывной перегонки. Слово Single может быть добавлено\nк Grain Whiskey, если напиток был дистиллирован только на одной винокурне.\n\nBlended Whiskey\nСмесь нескольких виски, перечисленных выше. Ее секретные пропорции зависят от\nрезультата, необходимого мастеру-блендеру.\n\n114 Виски", "Купажирование\nМастер-блендер доводит до совершенства напиток, смешивая несколько видов виски. Входящие\nв купаж виски отличаются друг от друга:\n• сроком выдержки (от 3 до 20 лет и более);\n• исходным сырьем (соложеный или несоложеный ячмень, рожь, пшеница, овес);\n• типом дистилляции (размер перегонного куба,\nширота отбора «сердца»).\nВсе эти виски объединяют свои достоинства для\nувеличения палитры ароматов конечного напитка.\nКупаж настаивают нескольких дней, называемых\n«свадьбой», и разливают в бутылки.\n\nД ис тиллерии\nВ настоящее время в Ирландии действует около\nдвух десятков дистиллерий. Многие из них были\nвведены в строй не так давно, и их виски еще не\nне был выпущен на рынок.\nКаждая из винокурен, основываясь на собственном опыте, имеет особое представление о производстве виски. Далее перечислены важнейшие\nирландские винокурни.\n\nМидлтон\nВинокурня основана на юге Ирландии на месте\nстаринной шерстопрядильной фабрики в начале\n19 века. Чистота воды и свежесть воздуха побудили\nизвестных винокуров братьев Мэрфи сконцентрировать свои усилия и воплотить здесь в жизнь искусство перегонки.\nПостепенно произошло слияние Мидлтона с некоторыми другими винокурнями.\nПоследнее укрупнение предприятия случилось\nв 1966 году, когда образовалась группа «Айриш\nДистиллерз».\nВ 1975 году винокурня переехала в новое здание,\nвозведенное рядом с историческим, и стала местом скопления практически всех знаний о перегонке, купажировании и выдержке ирландского\nвиски. Поэтому сегодня Мидлтон – важнейшая и\nсамая впечатляющая из винокурен. Здесь изготавливают такие известные марки, как Jameson\nи Power's, такие популярные, как Paddy, и такие\nпрестижные, как Midleton Very Rare.\nМидлтон может производить виски как самым традиционным образом – путем тройной перегонки\nсоложеного ячменя, так и самым необычным способом – путем комбинации двойной или тройной дистилляции с перегонкой в аппарате «патент стил»,\nкоторый в данном случае извлекает из дистиллята\nопределенную ароматическую фракцию, необходимую для будущего виски. Здесь также получают\nзерновой виски, используемый в купажах.\nЭта винокурня – настоящий рай для мастера-\n\nблендера, который здесь может создать настоящую палитру разных виски – от самого легкого до\nсамого «солидного», включая тот виски, который,\nпо его мнению, близок к идеальному.\n\nБушмилс\nЗарегистрированная в 1608 году и расположенная на северном побережье острова, эта винокурня считается старейшей в мире. Ее отличительная особенность – получение солодовых\nвиски. Производство виски здесь хранит традиционный характер с тройной перегонкой в аппаратах «пот стил».\n\nКулей\nЭта винокурня построена в 1989 году на границе\nСеверной Ирландии. Здесь производят виски, на\nсегодняшний день мало отличающийся от шотландского.\n\nО сновные бренды\nBushmills (Бушмилс)\nЭтот виски производится на старейшей ирландской винокурне Бушмилс.\nBushmills Original является купажом солодовых и\nзерновых виски, выдержанных от 4 до 6 лет в бочках. Оттенки фруктов, пряностей и дубовой древесины образуют в итоге гармоничное единство.\n\nJameson (Джемесон)\nЭто самый популярный виски в Ирландии и один\nиз старейших брендов. Он существует с 1780 года.\nГлубина букета, изысканность и округлый вкус –\nотличительные черты Jameson. Они объясняются\nотсутствием копчения солода с помощью торфа и\nиспользованием тройной перегонки.\n\nPaddy (Падди)\nПроизводится с 1779 года. Вначале его называли\nCDC’s Old Irish Whiskey. Но в 1920-е годы коммерсант Падди Флаэрти так хорошо продавал этот\nвиски, что его клиенты, делая заказ, спрашивали\nвиски от Падди. И было решено изменить название виски.\n\nTullamore Dew (Талламор Дью)\nЭтот виски появился на свет в 1829 году. Первое\nслово в его названии – это имя городка в центре\nИрландии, а второе – аббревиатура от имени человека Daniel E. Williams, который в конце 19 века\nбыл сотрудником, а затем и совладельцем винокурни. С недавних пор этот виски производится\nна одноименной Tullamore Distillery. Обладает\nянтарным цветом и деликатным, бархатистым\nвкусом.\n\nС лова W hisky и W hiskey\nНе существует настоящего исторического или закрепленного законодательным образом различия\nмежду написанием слова «виски» поирландски (whiskey) и по-шотландски\n(whisky).\nНазвание напитка произошло от uisge\nbeatha («вода жизни»). Со временем осталось только первое слово\nuisge, превратившееся в whiskey в\nИрландии. В 19 веке это было самое\nраспространенное написание «виски»,\nчто объясняет его использование в\nСША под влиянием ирландских переселенцев.\n\nУ потребление\nирландского виски\n\nВ чистом виде и с водой\n\nБлагодаря легкости и тонкому букету\nирландский виски пьют в чистом виде\nили разбавленным водой.\nВода должна содержать как можно\nменьше минеральных солей, чтобы не\nподавлять фруктовый вкус напитка.\nВода, богатая минералами, сообщает\nсмеси соленый привкус, что отрицательно отражается на вкусовых\nкачествах виски.\n\nС о льдом\n\nЕсли вы любите виски со льдом (хотя\nо нем говорят, что он искажает букет\nнапитка), примите следующие меры\nпредосторожности.\n• Лед должен быть сделан из самой\nчистой воды и не иметь никакого\nпривкуса.\n• Его следует хранить вдали от\nлюбых запахов, так как он хорошо их\nвпитывает.\n• Он должен быть свежим, то есть\nприготовленным не более 48 часов\nтому назад, потому что он портится\nпри хранении.\n\nВ кок тейлях\n\nСамый знаменитый ирландский\nкоктейль – это Irish Coffee. Нет ничего\nлучшего в промозглую погоду, и ничто другое так не снимает усталость.\nА ирландский виски, даже будучи\nгорячим, прекрасно сохраняет в\nкоктейле равновесие ароматов.\n\nВиски 115", "В иски J ameson . И рландский дух с 1780 года\nИрландский виски возродился из пепла. Раньше\nон господствовал во всем мире, побеждая\nсвоего шотландского соперника, а потом ушел в\nтень и потерял винокурни, как теряют солдат на\nполе боя. Но никогда не стоит спешить хоронить ирландцев. В их жилах течет боевая кровь,\nа, может, – и виски Jameson. Поэтому в течение\nпоследних лет ирландский виски достиг небывалого прогресса на международном рынке и в\nбарах разных стран.\nНадо сказать, что с качеством у него все в порядке. Ирландцы сумели развернуть ароматы\nвысокой сложности, не теряя при этом то, что\nвсегда было их сильной стороной и ключом к\nуспеху: невероятную мягкость, происходящую\nот почти волшебного воздействия тройной\nперегонки.\n\nСимволичный виски\nБесспорный лидер ирландских виски, Jameson,\nявляется ярким примером этих невероятных качественных подвижек и мирового успеха. Кроме\nтого, он служит эмблемой Ирландии, символом\nэтой страны. Вдобавок ко всему, Jameson – это\n\n116 Виски\n\nочень современный виски, прекрасно чувствующий себя в 21 веке. Давление истории и\nтрадиций не смогли помешать его постоянной\nэволюции в последние годы.\nВиски Jameson притягателен для бармена по\nнескольким причинам. При разработке стильных\nи креативных коктейлей его мягкость и динамичный имидж помогают избегать барьеров,\nсвязанных с традиционностью, свойственной\nдругим виски. Вместе с тем, он существует с 1780\nгода, и его историческая сторона внушает доверие, является залогом качества, серьезности и\nзнания дела.\n\nJameson Irish Whiskey\nЭто типичный ирландский виски. Его архитектуру\nдолжны изучать в школах ирландских мастеров\nперегонки. Сочетание ореховых ароматов и\nванили, припудренное несколькими штрихами\nхереса и меда, растворяется в мягкости, которая и\nхарактеризует Jameson.\nПревосходно сбалансированный виски, подходящий для употребления разбавленным газированной водой, лимонадами или в составе коктейлей.\n\nО снователь бренда\nДжон Джемесон – создатель выдающегося ирландского виски Jameson,\nбыл шотландцем по происхождению!\nВ 1780 году он купил винокурню на\nBow Street в Дублине и стал производить свой виски.\nОн ввел ряд усовершенствований и\nпридал своему напитку типично ирландский дух. Джемесон экспериментировал с тройной перегонкой (а не с\nдвойной, как в Шотландии), призванной сделать виски мягче, и первым\nиспользовал выдержку в бочках изпод хереса, что в наши дни является\nраспространенной практикой.\nЕго виски познал ошеломляющий\nуспех. В 1805 году Джемесон стал\nкрупнейшим производителем виски\nв мире.\nВ настоящее время винокурня на Bow\nStreet в Дублине функционирует, как\nинтерактивный музей и больше не\nпроизводит виски. Со второй поло
