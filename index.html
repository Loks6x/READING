<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Читалка книг</title>
<style>
  :root {
    --bg: #1a1a1a;
    --surface: #242424;
    --surface2: #2e2e2e;
    --border: #3a3a3a;
    --text: #e8e0d0;
    --text-muted: #8a8075;
    --accent: #c9a96e;
    --accent-dim: #8a6f3e;
    --sidebar-w: 280px;
    --font-body: 'Georgia', 'Times New Roman', serif;
    --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .light {
    --bg: #f5f0e8;
    --surface: #fffdf8;
    --surface2: #f0ebe0;
    --border: #d8d0c0;
    --text: #2c2820;
    --text-muted: #8a8075;
    --accent: #8b5e2a;
    --accent-dim: #c9a96e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* Sidebar */
  #sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    transition: transform 0.3s ease;
    z-index: 100;
  }
  #sidebar.collapsed { transform: translateX(calc(-1 * var(--sidebar-w))); position: absolute; height: 100%; }
  .sidebar-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    font-family: var(--font-ui);
  }
  .sidebar-header h2 {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
  }
  .upload-btn {
    width: 100%;
    padding: 8px 12px;
    background: var(--accent);
    color: #1a1008;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-family: var(--font-ui);
    cursor: pointer;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
    justify-content: center;
  }
  .upload-btn:hover { opacity: 0.85; }
  #file-input { display: none; }
  #book-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  .book-item {
    padding: 10px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--font-ui);
    font-size: 13px;
    margin-bottom: 2px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text);
    transition: background 0.15s;
  }
  .book-item:hover { background: var(--surface2); }
  .book-item.active { background: var(--surface2); color: var(--accent); }
  .book-item .book-icon { font-size: 16px; flex-shrink: 0; }
  .book-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .book-pages { font-size: 11px; color: var(--text-muted); flex-shrink: 0; }

  /* Main content */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }

  /* Toolbar */
  #toolbar {
    display: flex;
    align-items: center;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    gap: 10px;
    font-family: var(--font-ui);
    flex-wrap: wrap;
  }
  .tb-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 10px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 13px;
    font-family: var(--font-ui);
    display: flex;
    align-items: center;
    gap: 4px;
    transition: background 0.15s;
  }
  .tb-btn:hover { background: var(--surface2); }
  .tb-sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }
  .page-nav {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .page-nav input {
    width: 52px;
    text-align: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 6px;
    border-radius: 5px;
    font-family: var(--font-ui);
    font-size: 13px;
  }
  .page-nav span { font-size: 13px; color: var(--text-muted); }
  .tb-spacer { flex: 1; }
  select.tb-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 8px;
    border-radius: 5px;
    font-family: var(--font-ui);
    font-size: 13px;
    cursor: pointer;
  }
  #search-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 10px;
    border-radius: 5px;
    font-family: var(--font-ui);
    font-size: 13px;
    width: 180px;
  }
  #search-box::placeholder { color: var(--text-muted); }
  #book-title-bar {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* Reader */
  #reader-wrap {
    flex: 1;
    overflow-y: auto;
    display: flex;
    justify-content: center;
    padding: 40px 20px;
  }
  #reader-page {
    max-width: 680px;
    width: 100%;
    line-height: 1.85;
    font-size: 18px;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }
  #reader-page.font-sans { font-family: var(--font-ui); }
  #reader-page.font-serif { font-family: 'Georgia', serif; }
  #reader-page.font-mono { font-family: 'Courier New', monospace; }
  #reader-page mark { background: #c9a96e44; color: inherit; }

  /* Progress bar */
  #progress-bar {
    height: 2px;
    background: var(--border);
    position: relative;
  }
  #progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.3s ease;
  }

  /* Welcome screen */
  #welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 20px;
    font-family: var(--font-ui);
    padding: 40px;
    text-align: center;
  }
  #welcome h1 {
    font-size: 28px;
    font-weight: 300;
    color: var(--accent);
    letter-spacing: 0.03em;
  }
  #welcome p {
    color: var(--text-muted);
    font-size: 15px;
    max-width: 400px;
    line-height: 1.6;
  }
  .format-tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .fmt-tag {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .upload-big {
    padding: 12px 28px;
    background: var(--accent);
    color: #1a1008;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-family: var(--font-ui);
    cursor: pointer;
    font-weight: 600;
  }
  .upload-big:hover { opacity: 0.85; }

  /* Loading overlay */
  #loading {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 999;
    align-items: center;
    justify-content: center;
    font-family: var(--font-ui);
    color: #fff;
    font-size: 16px;
    flex-direction: column;
    gap: 12px;
  }
  #loading.show { display: flex; }
  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid rgba(201,169,110,0.3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* TTS controls */
  #tts-bar {
    display: none;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: var(--surface2);
    border-top: 1px solid var(--border);
    font-family: var(--font-ui);
    font-size: 13px;
  }
  #tts-bar.show { display: flex; }
  .tts-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 10px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 13px;
    font-family: var(--font-ui);
  }
  .tts-btn.active { background: var(--accent); color: #1a1008; border-color: var(--accent); }
  #tts-speed { width: 80px; }
  #voice-select { 
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 8px;
    border-radius: 5px;
    font-family: var(--font-ui);
    font-size: 12px;
  }
  .tts-label { color: var(--text-muted); }

  @media (max-width: 600px) {
    :root { --sidebar-w: 260px; }
    #sidebar { position: absolute; height: 100%; }
    #sidebar:not(.collapsed) { box-shadow: 4px 0 20px rgba(0,0,0,0.4); }
    #reader-page { font-size: 16px; }
    #toolbar { padding: 8px; gap: 6px; }
    #search-box { width: 120px; }
  }
</style>
</head>
<body class="">

<div id="loading"><div class="spinner"></div><span id="loading-text">Загрузка книги...</span></div>

<div id="sidebar">
  <div class="sidebar-header">
    <h2>📚 Мои книги</h2>
    <button class="upload-btn" onclick="document.getElementById('file-input').click()">
      + Добавить книгу
    </button>
    <input type="file" id="file-input" accept=".pdf,.epub,.txt,.fb2,.rtf,.docx,.mobi" multiple>
  </div>
  <div id="book-list"></div>
</div>

<div id="main">
  <div id="toolbar">
    <button class="tb-btn" onclick="toggleSidebar()" title="Меню">☰</button>
    <div id="book-title-bar">Выберите книгу</div>
    <div class="tb-sep"></div>
    <div class="page-nav">
      <button class="tb-btn" onclick="prevPage()">‹</button>
      <input type="number" id="page-input" min="1" value="1" onchange="goToPage(this.value)">
      <span>/ <span id="total-pages">0</span></span>
      <button class="tb-btn" onclick="nextPage()">›</button>
    </div>
    <div class="tb-sep"></div>
    <input type="text" id="search-box" placeholder="Поиск..." oninput="searchText(this.value)">
    <div class="tb-spacer"></div>
    <select class="tb-select" onchange="setFont(this.value)">
      <option value="font-serif">Georgia</option>
      <option value="font-sans">Sans-serif</option>
      <option value="font-mono">Mono</option>
    </select>
    <select class="tb-select" id="font-size-sel" onchange="setFontSize(this.value)">
      <option value="15">Мелкий</option>
      <option value="18" selected>Средний</option>
      <option value="21">Крупный</option>
      <option value="25">Очень крупный</option>
    </select>
    <button class="tb-btn" onclick="toggleTheme()">🌓</button>
    <button class="tb-btn" onclick="toggleTTS()" title="Озвучить">🔊</button>
  </div>
  <div id="progress-bar"><div id="progress-fill" style="width:0%"></div></div>

  <div id="reader-wrap">
    <div id="reader-page" class="font-serif">
      <div id="welcome">
        <h1>Читалка книг</h1>
        <p>Загружайте книги в любом популярном формате и читайте с удобством</p>
        <div class="format-tags">
          <span class="fmt-tag">PDF</span>
          <span class="fmt-tag">EPUB</span>
          <span class="fmt-tag">TXT</span>
          <span class="fmt-tag">FB2</span>
          <span class="fmt-tag">RTF</span>
          <span class="fmt-tag">DOCX</span>
        </div>
        <button class="upload-big" onclick="document.getElementById('file-input').click()">
          📂 Открыть книгу
        </button>
        <p style="font-size:13px; color: var(--text-muted);">или выберите «Библия бармена» из списка слева</p>
      </div>
    </div>
  </div>

  <div id="tts-bar">
    <span class="tts-label">🔊 Озвучка:</span>
    <button class="tts-btn" id="tts-play-btn" onclick="ttsToggle()">▶ Играть</button>
    <button class="tts-btn" onclick="ttsStop()">■ Стоп</button>
    <span class="tts-label">Скорость:</span>
    <input type="range" id="tts-speed" min="0.5" max="2" step="0.1" value="1">
    <span id="tts-speed-val">1.0×</span>
    <span class="tts-label">Голос:</span>
    <select id="voice-select" onchange="setVoice()"></select>
    <button class="tts-btn" onclick="toggleTTS()">✕</button>
  </div>
</div>

<script>

жин\n\n• Франция\n• Италия\n• Испания\n• Южная Африка\n• Чили\n\n185\n187\n188\n190\n191\n\nИгристые вина: • Просекко • Шампанское\n\n192\n\n56\n\nКрепленые вина: • Херес • Порто\n\n202\n\n68\n\n12. Пиво\n\n204", "Ч ас ть 2\n\nК ок т ей ли и Б арна я к ульт ура\n13. Искусство коктейля\n\n210\n\n• Аксессуары и инструменты\n• Бокалы для бара\n• Способы смешивания\n• Украшение коктейлей\n• Про лед\n• Настойки\n• Домашние заготовки\n• Коктейли из бутылок и из бочек\n• Классификация коктейлей\n\n14. American Bar\n\n• Дары Ирландии\n• Лондон на пороге Коктейльной революции\n\n16. Экзотика\n\n294\n\n• Фиеста Латина\n• Тики-планета\n• Остров рома\n\n17. Италия\n\n322\n\nПобедное трио: вермут, биттер и просекко\n\n238\n\n• Старый-добрый олд скул\n• Golden Age (конец 1860-х – 1919)\n• Новый Орлеан – микс\nамериканского с французским\n• Сухой закон\n• Холодная война (1946 – 1991)\n\n18. Париж. Миксология в изгнании\n\n332\n\n• Коктейли Парижа. «Ритц»\n• Тем временем в «Гаррис баре»...\n• Французские коктейли-аперитивы\n\n19. Новейшая миксология\n\n344\n\nКоктейльная революция 21 века\n\n15. Британия и колонии\n• Викторианское наследие\n• Эпоха Ар-деко и Гарри Крэддока\n\n276\nУказатель коктейлей\n\n374", "6 Библия бармена", "О т автора\nВ последние годы вселенная миксологии испытала взрывной рост. Поэтому в новом,\nпятом по счету издании «Библии Бармена» содержатся многочисленные новшества. Благодаря этой книге, у читателя сложится полное представление о том, что сегодня представляет собой профессия бармена, и какие требования к ней предъявляет наше время.\n«Библия Бармена» – это, в первую очередь, базовое издание, охватывающее все стороны потрясающей профессии. В книге, как всегда, есть вся полезная информация, ознакомившись с которой, вы сможете незамедлительно приступить к работе в баре.\nБармен найдет здесь легендарные, классические и исторические рецепты коктейлей.\nКроме того, он получит информацию о новейших, наиболее продвинутых техниках\nбарного искусства, а также сможет вдохновиться самыми современными рецептами,\nкоторые используются ведущими барменами в некоторых лучших заведениях мира.\nРазумеется, «Библия Бармена» содержит информацию об используемых в баре продуктах. Речь идет о разных ингредиентах и, конечно, о спиртных напитках, которые вместе\nс коктейлями составляют ядро этой книги.\nБольшое внимание уделяется отдельным брендам спиртных напитков. У каждого бренда своя история, вкус, свой способ подачи. Бренды меняются, множатся. Их линейки\nразвиваются все быстрее. Бармен обязан их знать, поскольку с некоторыми из этих\nбрендов он будет работать всю жизнь.\nВ данном издании присутствует существенное нововведение – особая классификация\nкоктейлей. Классифицировать коктейли всегда трудно, ибо каждый из них представляет\nсобой произведение искусства и, в какой-то мере, не поддается классификации.\nПривычное деление по базовому спиртному напитку имеет свои недостатки, поскольку\nобъединяет коктейли, которые по своему духу, времени создания, способу приготовления не имеют ничего общего. Более того, многие коктейли содержат в своей основе\nдва, а то и три алкогольных напитка.\nПоэтому я представляю здесь коктейли по месту и времени их создания или по принадлежности к конкретному тренду.\nЯ считаю, что коктейль, относящийся к определенной эпохе или тренду, несет в себе\nих черты, которые обуславливают его характер. Так обстоит дело с коктейлями сухого\nзакона, с коктейлями, созданными в Париже перед Второй мировой войной, с тики-коктейлями...\nА те, кто пожелает найти смешанные напитки по другим признакам, смогут воспользоваться Указателем в конце книги. Там коктейли расположены в алфавитном порядке, а\nтакже согласно категориям спиртных напитков.\nМир баров – это целая отдельная вселенная. Это часть нашей цивилизации, нашей культуры. С профессиональной точки зрения, это жесткий, но справедливый мир, где хорошо проделанная работа и честность по отношению к себе и к гостю всегда окупаются.\nПрофессия бармена существует уже почти два века. И она не собирается исчезать.\nНаоборот, она находится на новом витке развития. Знаменитые и неизвестные люди посвятили ей свою жизнь, а легендарные бармены превратили эту профессию в искусство.\nИ каждый новый бармен, смешивая хороший коктейль, должен знать, что с этих пор он\nтоже занял свое место в этой Великой истории.\nФ ё дор Е всевский", "8 За барной с тойкой", "Библия Бармена\n\nЧ асть\nвст упительная\n\nЗа барной\nс тойкой\n• Профессия: Бармен • Двойная жизнь в многоликом мире\n• Гостеприимство • Быстро и хорошо • Задачи бармена\n• Творчество • Правила подачи напитков • Каким должен\nбыть бармен • Бар бэк: улыбка сквозь слезы\n• Структура бара • Ответственность при подаче\nспиртных напитков", "Ч асть вступительная\n\nПрофессия:\n\nБ армен\n\nС лово « бармен » в английском языке имее т, к ак минимум , два синонима , что\nговорит о многограннос ти профессии . П ервый синоним – « бартендер », то\nес ть держ ате ль бара , наиболее точно пере дае т смыс л этой работы , охватыва я\nвсе необходимые обязаннос ти и полномочия . К роме того , с ущес твуе т с лово\n« миксолог», означающее специа лис та , который посвящае т свою деяте льнос ть ,\nглавным образом , созданию и приготовлению кок тейлей .\n\nСогласно академическому определению профессии, бармен подает напитки и разрабатывает\nкоктейли. Он принимает участие в организации\nработы коллектива и атмосферы заведения. Он\nруководит сотрудниками, которые находятся под\nего началом, а также следит за кассой, запасами\nнапитков и других необходимых продуктов. Он\nотвечает за подготовку бара, порядок и чистоту.\nСоответственно, бармен – это профессия, вбирающая определенное количество обязанностей,\nглавной из которых является приготовление и\nподача напитков гостям. Но помимо этой основной функции, существует целый круг других задач, которые делают профессию бармена одной\nиз наиболее всеобъемлющих и увлекательных.\nПрофессия бармена является частью ресторанного дела и гостиничного бизнеса, а также, в более широком смысле, – индустрии развлечений.\nЭто богатая и процветающая область, в которой\nкаждая личность, обладающая соответствующими качествами, может найти себе применение в\nмеру своей компетенции и таланта.\nДля кого-то эта работа – второй шанс, для когото – призвание. Но каждый человек, если он любит труд и честен, всегда найдет себе достойное\nместо.\n\n10 За барной с тойкой", "Далее перечислены три основных аспекта профессии бармена.\n\n1. Подача качественных напитков в\nдоброжелательной обстановке\nДля выполнения этой основной задачи необходимо владеть методами приготовления коктейлей, знать историю и производство спиртных\nнапитков, а также знать вина, безалкогольные\nнапитки и все другие продукты, с которыми приходится работать. Эта фундаментальная задача\nтребует общей культуры. Кроме того, она требует\nот амбициозного бармена знания как уже зарекомендовавших себя методов смешивания, так и\nавангардных технологий, появляющихся ежегодно, поскольку профессия бармена находится в\nнепрерывном развитии.\nКлиентура при этом пребывает в постоянном\nожидании новых вкусов, новых текстур, новых\nконцепций. Бары, желающие вырваться вперед\nв конкурентной борьбе, должны прежде всего\nопираться на креативного бармена-миксолога с\nверным вкусом, чтобы иметь оптимальное предложение коктейлей.\nВ отличие от шеф-повара, не вступающего в непосредственный контакт с гостями, бармен персонально отвечает за вкус своих напитков. Поэтому любезность и гостеприимство должны всегда\nоставаться в центре требований, предъявляемых\nк профессии.\nКроме того, бармен должен быть психологом, поскольку он обязан разрешать непростые ситуации, чреватые разными эксцессами.\nНе зря говорят, что бармен – «доктор души»!\nЭта сторона профессии никогда не менялась – со\nвремен первых салунов, где трудился Джерри Томас, до самых современных и безумных концептбаров, какие только могут существовать сегодня.\n\n2. Обеспечение работы бара\nДля выполнения данной задачи необходимо\nуметь каждый день готовить бар к работе, что позволит затем трудиться без суеты и спешки, без\nзадержек в обслуживании, которые могут привести к потере качества. Эта задача охватывает\nмножество вещей: подготовка фруктов, льда, проверка бокалов, напитков, чистота, контроль различной техники... Кроме того, здесь потребуются\nменеджерские способности, так как необходимо\nуметь управлять персоналом, за который вы отвечаете. А также надо уметь отчитываться перед\nначальством.\n\n3. Общеадминистративный аспект\nТретий круг задач в большей мере административный. Он включает осуществление и контроль\nкассовых операций. Сюда же относится обеспе-\n\nчение контактов и переговоры с поставщиками, а\nтакже составление заказов, исходя из имеющихся запасов. Кроме того, к этим задачам относится\nсоздание меню коктейлей, которое соответствует\nконцепции бара. В некоторых случаях бармену\nтакже приходится отвечать за ивенты.\nСписок вышеперечисленных задач далеко не полон. Он доказывает, что любой сотрудник может\nподняться по карьерному лифту и дорасти от бар\nбэка до директора, если научится анализировать\nситуацию и будет повышать свою квалификацию,\nотвечая требованиям к компетенции на всех\nуровнях иерархической лестницы.\nМногогранная профессия Бармена, когда один\nдень не похож на другой, открыта всем желающим. Только надо отдавать себе отчет в том, что\nтрудно найти личность, которая будет соответствовать всем требованиям. Каждый из нас может лучше проявить себя при решении какой-то\nчасти этих задач. Кто-то может быть хорошим\nадминистратором и королем общения, другой,\nвозможно, – великим креативщиком и миксологом. Получается, что главное качество хорошего\nбармена – влиться в команду и занять там свое\nместо. Потому что успешный бар – это бар, где все\nсотрудники умеют поддержать друг друга и трудятся вместе в полной гармонии.\n\nЗа барной с тойкой 11", "Д войная жизнь в\nмноголиком мире\nКак и все люди, работающие на публику, бармены\nведут двойную жизнь. Именно в этом частично\nзаключается аттрактивность профессии.\nВы выходите из «бабушкиной двушки», пробегаете\nмимо ободранных почтовых ящиков, едва не\nспотыкаетесь на выходе из подъезда, но вам есть\nк чему стремиться.\nВы знаете, что через три четверти часа у вас\nпод ногами будет толстый ковер роскошного\nклуба. Или же вы ступите на мраморный пол\nпятизвездного отеля. Или, может быть, вы\nвстретитесь с командой друзей и коллег, вместе\nс которыми создали свой небольшой бар, паркет\nкоторого уже истерт толпами посетителей. Бар,\nкоторый столь дорог вашему сердцу.\nВы снимете пальто, расправите рукава безупречной рубашки и, наконец, сможете вступить в блестящую часть вашей двойной жизни.\nЧто общего, помимо напитков, можно найти\nмежду роскошным баром отеля класса «люкс»\nи баром дискотеки, или между спикизи и баром\nкруизного лайнера? По сути, почти ничего. Все\nразное. Клиенты, обстановка, меню. Однако, во\nвсех этих местах делают ту же самую работу!\nА получив опыт в барной сфере, вы сможете не\nтолько найти работу в любой точке страны, но и –\nвезде в мире, обеспечив себе очень интенсивную\nжизнь.\nВы будете проводить время в заведениях, иногда\nроскошных, иногда экзотических, но всегда волнующих.\n\nНайти себе подходящий бар\nВсе мы разные, и каждый бармен может, а точнее\nдолжен найти тип бара, соответствующий его характеру. Я никогда не перестану советовать бармену набираться опыта в различных заведениях.\nРазумеется, каждый бар уникален. Их невозможно подвергнуть строгой классификации. Но я вам\nпредставлю несколько типов баров. Так вы поймете, какой из них вам больше подходит и может\nстать вашим будущим местом работы. Выбор за\nвами.\n\nСпикизи\nВесь мир знает, или должен знать историю спи-\n\n12 За барной с тойкой\n\nкизи – баров, возникших в эпоху сухого закона.\nПервые спикизи были тайными заведениями,\nспрятанными от глаз федеральных агентов.\nОни снова вошли в моду благодаря Саше Петраске, открывшему в 1999 году в Нью-Йорке первый\nспикизи нашего времени – Milk&Honey. Продолжение известно: с тех концепция спикизи покорила весь мир.\nСпикизи, тайный и интимный, сближает гостя с\nбарменом. Поэтому столь важна личность стоящего за стойкой. От него в большой мере зависит,\nвернется клиент или нет. Подаваемые коктейли\nчасто носят индивидуальный характер (bespoke).\nГлядя на гостя, вы должны понять, что ему нравится, суметь приспособить коктейль к его вкусам и\nнастроению.\nТребуемые качества: способность видеть в темноте (с этим лучше справляются голубые глаза),\nзнание великой американской классики и ее\nмельчайших нюансов, яркая креативность, умение предугадать желание гостя, коммуникативные способности.\n\nБар гранд-отеля\nБар отеля должен быть воплощением уюта и комфорта. Гость расслабляется при входе и погружается в состояние блаженства. Этому способствует высокая культура обслуживания и приятная\nспокойная обстановка, которая тешит самолюбие\nгостя. Ибо даже если, в принципе, каждый может\nвремя от времени заплатить за коктейль в грандотеле, делают это далеко не все.\nГость ждет от бармена, чтобы он был образованным, приятным в общении, знатоком человеческих душ и коктейлей. Гость желает попробовать исторические или новаторские напитки,\nуносящие его в утонченную вселенную высокой\nгастрономии.\nОн ожидает, что они будут приготовлены из лучших ингредиентов, самых утонченных и дорогих\nспиртных напитков, поскольку в некоторых подобных барах пара коктейлей стоит как целый\nужин в неплохом ресторане.\nОбращаясь к истории, можно сказать, что бары\nотелей распространили коктейльную культуру", "по всему миру. В Англии, во Франции, в Италии,\nв Восточной Европе и Азии поначалу подавали\nамериканские коктейли американским гостям в\nгранд-отелях. А потом и местная клиентура стала заказывать смешанные напитки, и они вошли\nв обиход.\nВсе это к тому, что типичный бар гранд-отеля выдержан в классическом стиле.\nВместе с тем, в отеле может быть и экстремально трендовый бар, находящийся на передовой\nлинии миксологии. Очевидно одно: бары отелей объединяет стремление к абсолютному совершенству, погоня за идеалом в мельчайших\nдеталях, будь то в искусстве приготовления коктейлей, в общем уровне обслуживания, в образовании персонала и его манерах.\nЕсли ваша цель – быть барменом в гранд-отеле,\nвы должны понимать ожидания гостей. И если\nвы не перфекционист в крайней степени, лучше\nпроходите мимо.\nТребуемые качества: скрупулезность, высшая степень личной гигиены, ухоженность, вежливость и\nобразованность, скромность, соблюдение субординации, широкая улыбка (необходимо регулярное отбеливание и детартраж зубов).\n\nЛаунж-бар\nПоскольку лаунж вдохновлен атмосферой грандотеля, логично, что он часто оказывается вариацией бара гранд-отеля. Это заведение отличается\nпространством, элегантностью и роскошью. По\nпричине большого размера помещения, бармен\nнаходится дальше от клиента, и его лучшим способом общения становится совершенство в обслуживании, качество коктейлей и внимание ко\nвсем деталям.\nРабота в лаунж-баре – это в большей степени\nработа в коллективе, поскольку при меньшем\nзначении личности, все – от уборщицы до управляющего – являются представителями бара и ответственны за его успех.\n\nАперитивные бары\nАперитивный бар – итальянская традиция. Коктейлям и прочим напиткам в этой стране со-\n\nпутствуют роскошные буфеты, предлагающие\nширокий выбор закусок, при условии соответствующего заказа выпивки.\nЕсли, покидая бар, вы все еще ощущаете голод,\nэто ненормально, и ничто не помешает вам написать об этом в ТрипАдвизоре.\nПо примеру итальянских баров, предложение\nзакуски тем, кто заказывает бокал, распространяется в мире коктейлей. Поэтому современный\nбармен должен все лучше разбираться в гастрономии.\nВ барах данного типа бармен обязан знать правила гастрономических сочетаний, а также уметь\nподавать свои коктейли к определенным блюдам,\nевропейским или азиатским. Кроме того, очень\nвостребовано знание вин, вермутов, просекко и\nшампанского.\n\nТики\nРабота в тики-баре требует особых качеств. Вопервых, следует знать культуру тики (так, зомби\n– это не клиент, это коктейль!). Надо, чтобы эта\nкультура вас интересовала. Необходимо любить\nэкзотику и выглядеть соответственно. Желательно быть готовым носить рубашку с цветочными\nпринтами и, временами, шляпу. Не злоупотребляйте услугами солярия, хотя выглядеть загорелым круглый год – несомненный плюс.\nСледует отметить, что тики-бары – самые гостеприимные заведения планеты. Логично предположить, что ваш период работы в тики-баре будет\nвычтен из вашего пребывания в Раю.\n\nДискотека\nРабота бармена в дискотеке может шокировать\nмиксолога из крафтового бара. Но обратное тоже\nсправедливо.\nМир ночной жизни и праздника многолик. Подача сотен, а то и тысяч напитков за один вечер/\nночь, сохраняя при этом допустимый уровень качества, – это изматывающий труд, который невозможен в течение долгих лет.\nОт бармена дискотеки требуется, в частности, физическая выносливость и терпимость к громкой\nмузыке. Мой совет: умение читать по губам – это\nбольшое преимущество.\n\nЗа барной с тойкой 13", "Гос теприимс тво\n\nО тношения с к лиентами\n• Улыбайтесь и никогда не\nдемонстрируйте свое плохое\nнастроение.\n• Всегда держите гостей в поле\nзрения, чтобы сразу же заметить,\nесли им что-то потребуется.\n• Не заставляйте гостя ждать, если он\nхочет повторить заказ. Как только его\nбокал опустеет, сразу же предложите\nему новый. Если клиент больше\nничего не желает, не забирайте\nпустой бокал.\n• Обращайтесь с каждым\nклиентом так, как если бы он был\nисключительным.\n• Что бы вы ни увидели или ни\nуслышали, не распускайте сплетни.\n• Все время возвращайте сдачу, как\nбы мала она ни была. Не сдавайте\nсдачу мелкими деньгами в расчете\nна большие чаевые. Клиентов это\nраздражает.\nКроме того, не заставляйте\nпосетителей ждать и сдавайте сдачу\nкак можно быстрее, не надеясь на их\nвозможный уход. С вашей стороны\nэто было бы неприлично.\n• Узнайте имена своих гостей и\nзапомните, что они заказывают.\nКогда они вновь посетят вас, сразу же\nпредложите им их любимый напиток,\nони непременно это оценят.\n\n14 За барной с тойкой\n\nУ истоков бара стоит гостеприимство. В давние\nвремена бартендер, он же хозяин заведения (часто усатый) следил за благополучием своего небольшого мирка. Он сам и был душой бара, предназначенного для развлечения, беседы и отдыха.\nТогда не существовали ни телевидение, ни интернет. Местом социального общения был бар.\nУчитывая, что люди проводили много времени в\nодном и том же баре (транспорт не был столь же\nразвит, как в наши дни), бартендер становился их\nдругом и поверенным. Его слова поддерживали\nзавсегдатаев наравне с сервируемыми напитками. Он служил лекарем для тела и для духа.\nБартендер был центральным действующим лицом\nобщественной жизни, а его характер и человеческие качества значили не меньше, чем манера\nсмешивать и подавать напитки.\nПозже, в ходе индустриализации и развития конвейерного производства, появился человек-робот, который сделался образцом общественной\nжизни. Люди начали одеваться одинаково, мыслить одинаково и, разумеется, пить одно и то же.\nГостеприимство стало расплывчатым понятием,\nпрофессиональной обязанностью, а не смыслом\nжизни. Столь значимая раньше индивидуальность бартендера теперь считалась скорее недостатком, чем достоинством.\nБармен, лишенный индивидуальности, был нужен, чтобы подавать стандартные напитки. Не\nследовало требовать от него большего. А в случае проблем обращались к директору.\nНо все эпохи имеют свой конец. Даже худшие.\nКоктейльная революция возвела на пост бармена креативную личность, живущую страстью\nк коктейлю и вкусу. Эту личность даже назвали\nдавним, не слишком употребительным именем,\nнесколько отдававшим наукой: «миксолог». Новый миксолог, зачастую запершийся в своей\nбашне из слоновой кости, погруженный в творчество, не был специалистом по гостеприимству,\nно, по крайней мере, то, что он создавал, было\nвкусно. Благодаря ему, люди вновь открыли для\nсебя вкус коктейлей и потянулись в бары из\nгурманских соображений. Профессия бармена\nопять вошла в моду. Даже девушки из хороших\nсемей стали посещать бары. Бар снова сделался\nцентром общественной жизни, как в старые добрые времена. А после улучшения качества коктейлей оставалось лишь улучшить прием гостей.\nС этим мы подошли к дню сегодняшнему. Или к\nпрошлой неделе, или, если вам так больше нравится, к будущему вечеру пятницы. Пришли к той\n\nсамой эпохе, о которой уже и не думали, что она\nкогда-нибудь наступит. Уникальный момент истории, где разом столкнулись прошлое, настоящее\nи будущее. Когда бартендер со своей индивидуальностью и харизмой (не забывая про усы) и\nмиксолог со своим одиноким гением, встретились в одном лице, чтобы подавать с широкой\nулыбкой немыслимо вкусные, филигранные коктейли, которые сердечная атмосфера делает еще\nлучше.\nТе, кто пережил индустриальную эпоху, а потом\nи жизнь в Фейсбуке, снова стали настоящими\nлюдьми, любящими настоящую жизнь а, следовательно, и настоящие бары. Как по волшебству,\nбартендер вернулся на свое центральное место:\nон вновь стал публичным персонажем с характером, одновременно доверенным лицом, другом,\nсоветником и гарантом успеха своего бара. А\nприем, гостеприимство, являющиеся основой\nпрофессии бармена, вернулись на ту позицию,\nкоторую никогда не должны были потерять, то\nесть, на первое место.\n\nЧто такое гостеприимство?\nГостеприимство – широкое понятие, оно включает и сам прием, и сервируемые напитки. Работа в\nбаре состоит из тысяч деталей, и все они должны\nбыть на высоте. Когда цель достигнута (а она\nникогда не бывает достигнута полностью), вы\nстановитесь великим бартендером.\nПоданный с улыбкой плохой коктейль похож на\nзамаскированную попытку убийства. А сервированный с пренебрежением хороший коктейль\nунизит гостя, и он больше не вернется. Гостеприимство не должно быть в ущерб качеству, и напротив. Они неразрывно связаны.\nПринять гостя – это тоже немного ему помочь,\nособенно в экстремальных ситуациях. Человек,\nискавший при –22°C полтора часа вход в спикизи\n(и, в конце концов, отыскавший его), заслуживает\nбольшего, чем прохладный прием. Почему бы,\nв память о всех тех, кто не сумел найти вход, не\nподнести ему напиток за счет заведения?\n\nБеседа\nСамое трудное дело в приеме гостей – это, наверное, завязать беседу, что зависит от природных качеств и дано не всем. Для этого необходимо развивать общую культуру и интересоваться\nдругими вещами, помимо бара. В первую очередь, необходимо интересоваться людьми. Необязательно немедленно спрашивать их, что они", "Гости\n\nпортится и прием окажется неудачным.\nВторой тип клиентов – завсегдатаи. Чувствуя\nсебя как дома, они допускают легкие задержки\nобслуживания, но в ответ ждут, чтобы их узнавали. В этом случае, они почувствуют признательность, которая отразится на их заказах и чаевых.\nВ противном случае, они ощутят разочарование,\nфрустрацию. Их верность вашему бару может\nбыть поставлена под вопрос.\n\nГость не может вас раздражать, он ваша профессия. Без него вас бы здесь не было. Как только вы\nэто усвоили, вы способны к дальнейшему развитию.\nКаждый клиент хочет, чтобы его признали, сначала как человека, затем как желанного гостя.\nСуществуют два типа клиентов. Тот, кто пришел в первый раз, нуждается в поддержке и\nодобрении. Для него важен визуальный прием.\nЕсли бармен покажет, что заметил его, хотя бы\nиздалека, гость сразу же почувствует себя более\nуверенно. Существует правило, что со вновь\nпришедшим клиентом следует поздороваться в\nтечение минуты с момента его появления. Если\nэтот сигнал запоздает, то настроение клиента ис-\n\nСледует знать, что доброжелательность персонала помогает забыть о невольных мелких погрешностях в обслуживании. Даже в стремлении\nк совершенству нельзя быть уверенным в его достижимости. Гостеприимство поможет сгладить\nпроблемы.\nНаконец, прием – это командная работа. Он\nначинается с превосходно поставленной телефонной беседы, начатой после максимум трех\nзвонков. Он продолжается встречей при входе.\nВ приеме участвуют все, и даже для уборщицы\nнайдется своя роль, поскольку неадекватное\nповедение любого сотрудника будет рассматриваться в ущерб всем остальным.\n\nбудут пить. Можно для начала спросить, как у них\nдела. Следует подбирать сердечные и благожелательные слова, где присутствует слово «да» и отсутствует слово «проблема». Но слова – это еще\nне все. Говорят, что половина общения между\nлюдьми происходит при помощи невербалики:\nжестикуляции, мимики, интонаций, взглядов и т. д.\n\nЗа стойкой бара «Московский»,\nотель Four Seasons, Москва.\n\nНа следующем развороте.\nМихаил Мельник, El Copitas Bar,\nСанкт-Петербург.\n\nЗа барной с тойкой 15", "16 За барной с тойкой", "За барной с тойкой 17", "Б ыс тро и хорошо\nГигиена\nДля директора бара гигиена должна\nбыть одним из приоритетов, а барменам и остальному персоналу следует\nпостоянно о ней помнить. Личная\nгигиена должна быть безупречной\nНеобходимо полностью избавиться от\nзапаха тела. Волосы и ногти должны\nбыть аккуратно подстрижены (желательна короткая стрижка).\n\nГигиена рук\n\n• Всегда мыть руки перед работой и\nрегулярно во время работы.\n• Всегда мыть руки после туалета.\n• Всегда мыть руки, прикоснувшись\nк деньгам (неважно, монетам или\nкупюрам) и газете.\n• Всегда мыть руки после к губки или\nтряпки для уборки, а также после\nпользования моющими средствами.\n• Всегда мыть руки перед и после\nработы с продуктами питания.\n• Во время обслуживания не прикасаться к волосам и лицу.\n\nБыстрота исполнения и стабильное качество\nпри приготовлении серии коктейлей одного за\nдругим – это два момента, отличающие барменапрофессионала от любителя, собравшего друзей\nу себя дома.\nБыстрота достигается благодаря правильным\nприемам работы. Речь не идет о том, что все следует делать в спешке, словно устанавливая мировой рекорд, отмеченный разбитыми бокалами,\nпомятым шейкером и облитыми клиентами. Достаточно иметь под рукой все подготовленные\nингредиенты, заранее четко представлять себе\nпроцесс приготовления и, благодаря усвоенной\nтехнике исполнения, совершать как можно меньше лишних движений, чтобы полностью сосредоточиться на самом коктейле.\nВ результате коктейли настоящего профессионала с верными движениями будут сохранять\nстабильное качество. Они будут приготовлены\nбыстро и хорошо.\n\nП равила подачи напитков\nСпособ подачи напитков играет не меньшую роль, чем они сами по себе. Если вы\nподаете напитки или коктейли в неподходящих бокалах или игнорируете правила\nсервировки, то сведете на нет все свои усилия.\nВот перечень требований к подаче напитков, который существует в «Школах профессиональных барменов Америки» («Professional Bartending Schools of America»), а\nтакже предъявляется лучшими профессионалами мира.\n• Как еще в 1888 году писал Гарри Джонсон: «Каждый напиток должен подаваться в\nсоответствующей ему посуде. Клиент вправе почувствовать себя разочарованным\nесли мартини не будет подан в бокале для мартини».\n• Качество и стиль бокала должны соответствовать стилю заведения и материальному уровню клиентов.\n• Чистота бокала должна быть безупречной.\n• Никогда не поворачивайтесь спиной к гостю, когда вы наливаете ему напиток или\nготовите его в шейкере. Используемые бутылки и их этикетки всегда должны быть\nхорошо видны.\n• Подавая напиток, всегда кладите под бокал новую подставку.\n• Всякое повторение заказа должно восприниматься как новый заказ.\n• Если вы подаете напиток с трубочкой или палочкой для смешивания, последняя\nдолжна всегда быть повернута в противоположную от клиента сторону.\n• За исключением вина, бокалы должны быть наполнены минимум на три четверти\nвысоты, чтобы не производить впечатления «недолива». Они не должны быть заполнены до краев, чтобы клиенту не было трудно поднести напиток ко рту.\n• Подавать бокал следует с улыбкой, а не с мучительной гримасой, как будто вы проделали тяжкую работу.\n\n18 За барной с тойкой\n\nЗ а дачи бармена\n• Задача бармена – участие в деятельности бара\nпри соблюдении правил и требований, установленных его работодателем. Он встречает, информирует, консультирует, принимает заказы и\nобслуживает клиентов. Главные цели его деятельности – прибыльность бара и удовлетворение запросов клиента.\n• Бармен обязан следить, чтобы подаваемые им\nили его подчиненными напитки соответствовали\nвкусам и пожеланиям клиента, а их подача отвечала нормам гигиены и безопасности, а также\nосуществлялась в рамках правил, установленных\nстилем бара.\n• Бармен контролирует запасы спиртных напитков, принимает решение о закупке продуктов и\nоборудования и следит за их пригодностью к использованию.\n• Бармен может также контролировать кассовые\nоперации.\n• Бармен принимает участие в подборе напитков\nи в составлении карты бара.\n\nТворчес тво\nНекоторые бармены вспоминают свои рискованные смеси, вежливо одобренные на праздновании дня рождения, и думают, что они могут\nпродолжать в том же духе и в баре, который отважился взять их на работу.\nТакие бармены не понимают, что искусство составления коктейлей не менее сложно, чем литературное творчество. Любой из нас способен\nнаписать текст, но Пушкин – только один!…\nВ конечном счете самым трудным для начинающего бармена будет сдерживание излишней\nтворческой активности. Именно поэтому, в первую очередь, он должен научиться готовить наилучшим образом, точно, ловко и в академической\nманере классические коктейли. Только когда его\n«Манхэттен» будет походить на настоящий «Манхэттен», «Дайкири» сохранит свою свежесть, не\nутопая в растаявшем льду, от «Мохито» не будут\nсклеиваться зубы, а «Космополитен» окончательно обретет тонкое равновесие между крепостью\nалкоголя и фруктовой сладостью, возможно, бармен будет готов проявить свое творческое видение. Но, поверьте, путь будет длинным.\nПикассо сделался Пикассо, способным изменить\nмир в своей области, только тогда, когда он пол-", "ностью освоил классическую манеру живописи.\nНе забывайте об этом, и сэкономите массу времени.\nЕсли у вас есть тяга к творчеству, она проявится сама собой. Когда вы овладеете мастерством\nуправления вкусом и пропорциями, вам удастся\nдобавить к коктейлям собственный штрих. Если\nвы талантливы и достигли высокого уровня, то\nваши коктейли обретут признание. А если вы\nк тому же – харизматичная личность, то станете выдающимся барменом. Но не все наделены\nспособностью к творчеству. Творчество требует\nбольшого внутреннего напряжения. Это постоянная, непрерывная и выматывающая погоня за совершенством вкуса. А в данной области не существует непреложных истин, и нет ничего менее\nдолговечного, чем коктейль.\n\nК аким должен быть\nбармен\n• Бармен должен знать все подаваемые им напитки: их происхождение, производство, разновидности, условия хранения, правила подачи.\n• Он должен уметь отлично обращаться с инвентарем бара, в первую очередь, с шейкером и стаканом для смешивания, а также со всеми остальными аксессуарами и оборудованием.\n• Он должен знать правила смешивания и помнить наизусть перечень классических коктейлей,\nа также коктейлей, включенных в меню бара. Он\nобязан быть в курсе новых тенденций и веяний\nмоды, чтобы суметь удовлетворить любые запросы клиентов.\n• Бармен может принимать участие в разработке\nрецептов новых коктейлей. Поэтому он должен\nобладать тонким вкусом.\n• Бармен должен быть честным и щепетильным. Он\nне должен пить спиртное во время работы, но обязан знать вкус всех предлагаемых им напитков.\n• Внешний вид бармена, разумеется, должен быть\nбезукоризненным. Это касается как физического,\nтак и психологического аспекта. Его карманы не\nдолжны раздуваться от бесполезных личных вещей. Ногти – ухожены.\nДевушки-бармены не должны носить броские\nукрашения, а аромат их духов может ощущаться\nлишь в непосредственной близости.\n• Очень важно, чтобы одежда и общий вид бармена сочетались с общим стилем заведения, в котором он работает.\n• Бармен должен уметь выслушать клиента, поддержать беседу, соблюдая при этом необходимую\nдистанцию.\n• Он не должен вступать ни в какие споры, за ис-\n\nАндрей Казимиров, бар Voda, Москва.\nключением рабочих моментов со своими коллегами.\n• Один из основных аспектов его деятельности\n– развитие профессиональных качеств с целью\nустановления хороших отношений с клиентурой,\nпоэтому он должен следить за своей речью и при\nнеобходимости совершенствоваться в этом. Он\nдолжен быть в курсе текущих событий, чтобы суметь поддержать разговор.\n• Он должен суметь уменьшить дозу алкоголя перебравшему клиенту и отказать в обслуживании\nпьяному.\n• Он должен уметь обслужить клиента во всем,\nчто входит в его обязанности.\n• Даже если бармен исполняет роль шоумена,\nон не должен забывать о том, что вкус коктейлей\nне менее важен, чем манера их приготовления.\nСлишком часто приготовленные с необыкновенной ловкостью коктейли разочаровывают вкусом, не соответствующим ожиданиям.\n• Не следует рассчитывать на антисептические свойства спирта и творить невесть что за\nспиной клиента. Постоянной заботой бармена\nдолжна быть самая строгая гигиена.\n• Бармен должен следить за своей манерой речи,\nза словами, которые он употребляет. Это относится как к общению с вышестоящим, так и с подчиненным персоналом. Он не должен выставлять\nнапоказ свои религиозные или политические\nвзгляды во время работы.\n\nЧ истота\n• Постоянно следите за чистотой\nбокалов и приборов (в частности,\nчайных ложек).\n• Никогда не берите бокал, касаясь\nего внутренней поверхности.\n• Никогда не берите ложки и прочие\nприборы за часть, непосредственно\nсоприкасающуюся с напитком или\nпищевыми продуктами.\n• Постоянно следите за чистотой\nсвоей части стойки.\n• Фрукты – это возможные источники пищевого отравления. Особую\nосторожность нужно проявлять в\nотношении цитрусовых, которые подвергаются обработке сильнодействующими пестицидами.\nЕсли вы используете цитрусовые\nи их цедру, постарайтесь закупать\nэкологически чистые фрукты. Если это\nневозможно, перед употреблением\nтщательно промойте их под проточной водой.\nКаждый фрукт следует мыть в течение 20 секунд.\nФрукты вытирают чистым полотенцем. Это очень важно, поскольку\nнекоторые вещества иначе удалить\nнельзя.\nВ ожидании использования фрукты помещают в чистую емкость, а\nнарезают их чаще всего только в\nпоследний момент.\n\nЗа барной с тойкой 19", "Б ар бэк : улыбка сквозь слезы\nВ мире бара бар бэк – фундаментальная фигура. С одной стороны, он\nзанимает нижнюю ступень в иерархии, и в его обязанности входит\nвся неблагодарная работа. С другой стороны, он символизирует\nбудущее, поскольку все лучшие бармены начинали как бар бэки или\nбас бои.\nBar Back – английское выражение, одновременно обозначающее\nместо позади барной стойки и человека, который должен содержать\nэто место в порядке. Его синоним – Bus Boy (бас бой) – в большей\nмере употребляется в Соединенных Штатах и применяется к сотрудникам, ответственным за поддержание чистоты и порядка, как в\nбаре, так и в ресторане.\nИногда функции бар бэка входят в обязанности бармена. Но в\nкрупных коктейльных барах, где многочисленные заказы почти не\nоставляют времени на одновременное приготовление напитков и\nподдержание порядка, бар бэк – отдельная должность, занимаемая\nсоответствующим лицом.\nОсновные аспекты его работы сводятся к следующему.\n• Он убирает и чистит стойку бара и место за баром (или отведенную ему\nсекцию), а также все те аксессуары, которые не моют бармены.\n• Он проверяет уровень напитков в бутылках и в случае необходимости\nзаменяет их новыми.\n• Он проверяет расположение бутылок на полках и следит за тем,\nчтобы их этикетки были чистыми и всегда видны. Он протирает их\nвлажной тряпкой.\n• Он готовит ингредиенты для коктейлей: от сахарного сиропа до\nльда. Что касается фруктов, то, за исключением некоторого количества лимонов и лаймов, плоды не нарезают заранее. Их следует\nтолько аккуратно помыть и почистить, а нарежет их бармен перед\nподачей.\n• Он моет и проверяет бокалы, откладывает поцарапанную, разбитую\n\nи испорченную посуду.\n• Он подчиняется бармену и делает все то, что требуется тому для\nхорошего исполнения своей работы.\nВеликий бармен Гарри Джонсон в своем «Учебнике бармена» 1888 года\nиздания подчеркивает ответственность бармена перед своим учеником. В определенной мере обучение бар бэка входит в обязанности\nбармена, и если ученик работает плохо, может статься, что он всего\nлишь подражает характеру и манере работы своего наставника.\nНеобходимо, чтобы отношения между барменом и его помощником\nбыли вежливыми, но строго иерархическими, а указания бармена –\nчеткими, точными и логичными.\nБармен должен без колебаний учить бар бэка всему, что умеет сам,\nибо профессиональный опыт передается именно так. В результате сложное, тонкое и удивительное искусство работы за барной\nстойкой перейдет к следующему поколению. Нежелание делиться\nсвоими познаниями с другими, в конечном счете, лишь свидетельствует о слабости бармена.\nЧто же касается бар бэка, то он должен усвоить, что его неблагодарная работа – временная, и относиться к ней как к испытанию. Если он\nвыполняет свои обязанности, не проявляя недовольство, то у него\nесть все данные, чтобы стать хорошим барменом.\nВ любом случае в этот период он должен свыкнуться с атмосферой\nбара и быть предельно наблюдательным, реактивным и быстрым,\nпоскольку функционирование заведения зависит в большой степени\nи от его усилий.\nДолжность бар бэка – обязательный этап в карьере бармена.\nКогда вы, в свою очередь, станете директором бара или хозяином\nсобственного заведения, вы убедитесь, что отправлять прямо в бой\nбармена, вооруженного лишь теоретическими знаниями о профессии, по меньшей мере, неразумно.\n\nС труктура бара\nСклад. Шеф-бармен управляет запасами: он отвечает как за пополнение\nзапасов бара со склада, так и за закупки напитков для бара. Он проводит\nинвентаризацию.\nХозяйственный отдел. Шеф-бармен взаимодействует с хозяйственным\nотделом, который снабжает бар салфетками, посудой и т.д.\nКухня. Во взаимодействии с кухней шеф-бармен может включить в меню\nбара разные закуски, тапас, сэндвичи...\nРесторан. Шеф-бармен взаимодействует с рестораном в отношении кофе,\nкоктейлей и других напитков, которые готовятся в баре, но подаются в\nзале ресторана.\nВ отелях шеф-бармен занимается организацией приемов и cocktail party.\nОн также ведает мини-барами в гостиничных номерах.\nШеф-бармен занимается приемом на работу и обучением барменов и бар\nбэков, он составляет график работы.\n\n20 За барной с тойкой\n\nДиректор\nзаведения\nКухня\n\nСклад\nШеф-бармен\n\nРесторан\n\nХозяйственный\nотдел\nКасса\nБармен\n\nБар бэк", "О тветственность при\n\nБар Dirty Dick, Париж.\n\nподаче спиртных напитков\nСпиртные напитки должны подаваться ответственными людьми. Это, разумеется, относится\nкак к бармену, так и ко всем людям, когда они\nпринимают друзей или устраивают вечеринку.\n\nУметь оценить\nстепень опьянения клиента\nОдна из самых важных обязанностей бармена – оценивать степень опьянения гостя. Он\nдолжен уметь отказать в обслуживании клиенту,\nпревысившему определенную дозу, если тот\nможет нарушить атмосферу заведения, нанести\nсущественный вред собственному здоровью или\nугрожать безопасности окружающих.\nБудучи профессионалами в мире спиртных напитков, вин и коктейлей, мы знаем, что они несут\nв себе культуру и цивилизацию. Но мы сознаем\nи ту опасность, которую они могут представлять\nдля людей слабых, зависимых или переживающих сложный период в жизни.\nБармен, будучи сознательным профессионалом,\nникогда не должен пользоваться подобной слабостью. Наоборот, потребление напитков в баре\nдолжно сделаться предпочтительнее бесконтрольного домашнего пьянства, а бармен обязан\nпомогать тому, кто испытывает алкогольную\nзависимость, отказывая ему в обслуживании.\nНа всех нас алкоголь действует по-разному. Поэтому бессмысленно составлять таблицы и правила, ограничивающие максимальные дозы для\nкаждого клиента. Но бармен должен стремиться\nприспособиться к каждой конкретной ситуации\n\nи отслеживать заметно перебравших клиентов,\nпредставляющих опасность для самих себя или\nокружающих.\nПоэтому бармен всегда должен помнить число\nбокалов и количество спиртного, поданного клиенту и, при необходимости, оценить в момент\nнового заказа физическое и психологическое\nсостояние этого человека.\nПри этом он обязан проявить такт и наблюдательность, а также помнить, что очень крепкий\nнапиток, употребленный в большом количестве\nза едой, оказывает пропорционально меньший\nэффект, чем более легкий, но выпитый в качестве\nаперитива натощак.\nЛегендарный бармен Алекс Бомон не рекомендовал выпивать в час более одного коктейля.\n\nДругие правила\n• Тем, кто заказывает крепкий спиртной напиток\nв чистом виде или со льдом, регулярно подавайте стакан с водой. Некоторые бармены также\nподают стакан воды к коктейлю типа «Мартини».\n• Если вы отказываетесь обслуживать перебравшего клиента, сообщите об этом своему\nруководству и всему персоналу, чтобы эта мера\nсоблюдалась всеми.\n• Когда вы крайне вежливо, со всей возможной\nкорректностью и тактом отказываете клиенту\nв обслуживании, предложите ему бесплатно\nфруктовый сок, любой другой безалкогольный\nнапиток или, например, небольшую порцию закуски, чтобы он лучше себя почувствовал.\n\nБ езопасность за рулем\nЕсли бармен узнает о том, что клиент\nв состоянии опьянения собирается сесть за руль, он должен этому\nвоспрепятствовать. В подобном\nслучае ему следует либо обратиться\nк друзьям клиента, способным отвезти его домой, либо вызвать такси.\nТакая моральная ответственность\nраспространяется и на хозяина дома,\nорганизовавшего вечеринку, и на\nдиректора компании, пригласившего\nсвоих подчиненных на корпоративный\nпраздник, и на любого гражданина,\nосознавшего, что пьяный собирается\nсесть за руль. Каждый отвечает как\nза своих гостей, так и за клиентов.\nТолько при соблюдении этого условия\nспиртные напитки могут украсить\nторжество.\n\nЗа барной с тойкой 21", "Библия Бармена\n\nЧ асть № 1\n\nС пир т ные\nнапитки\n• Хроника алкоголя и коктейлей\n• Методы производства спиртных напитков\n• Аперитивы и биттеры • Водка\n• Джин • Виски • Ром и кашаса • Текила и мескаль\n• Коньяк и другие бренди\n• Ликеры • Вино • Пиво", "Ч асть первая . Г лава 1\n\nХ роника\n\nалкоголя и коктейлей\n«А к ­в а ­в и ­та хо ­р о ­ш о из ­л е ­ч и ­в а ­е т все бо ­л ез ­н и от хо ­л о ­д а . О на по ­м о ­га ­е т лю ­д ям\nсо зло в\n­ он н­ ым ды х­ а н­ и е­ м , про т­ ив гни л­ ых и за р­ а ж\n­ ен н­ ых ран , про т­ ив не и­ з л­ е ч­ и ­\nмых бо л\n­ ез н­ ей , про т­ ив ук у с­ ов ядо в­ и т­ ых тва р­ ей ».\nП ись ­м ен ­н ый ис ­т оч ­н ик эпо ­х и С ре дневековья\n\nНашим доисторическим предкам приходилось\nдовольствоваться только напитками, полученны­\nми путем брожения: ферментированным соком\nвинограда и перебродившим настоем ячменя.\nВ те далекие времена само брожение пред­\nставлялось священным процессом, связанным с\nвлиянием богов.\nЧто ка­са­ет­с я ис­к ус­с т­ва пе­ре­гон­ки, то оно мог­ло\nза­ро­дить­с я в Ки­тае, од­на­ко этой стра­не не хва­\nта­ет точ­ных дан­ных для под­тверж ­де­ния та­кой\nги­по­те­зы. По­это­му Еги­пет бе­рет на се­бя роль\nко­лы­бе­ли дис ­тил­ля­ции, ис­поль­зуя в ка­че­с т­ве\nдоказательства на­с тен­ные изо­б­ра­же­ния.\n\nД ис тилляция в\nА нтичнос ти\nВо времена Античности древние греки внесли\nогромный вклад в развитие перегонки. В то вре­\nмя дистилляция была занятием философов и ле­\nкарей, которые предавались смолокурению, по­\nлучая ценные масла и эссенции для медицинских\nцелей.\nПе­ре­гон­ный ап­па­ра­т то­го вре­ме­ни чаще всего\nсо­с то­ял из кот­ла, слу ­жив­ше­го во­д я­ной ба­ней,\nре­тор­ты, со­дер­жа­щей ис­ход­ный про­дукт, а также\nвы­т я­ну ­то­го со­с у­да, в ко­то­р ом скап­ли­в а­лись\nпа­ры, и труб­ки, по ко­то­рой они про­хо­ди­ли, кон­\n\n24 Хроник а а лкоголя и кок тей лей\n\nден­си­ру­ясь в при­ем­ни­ке дис ­тил­ля­та.\nВероятно, в те далекие времена вино и пиво еще\nне особо интересовали наших предков в каче­\nстве объектов перегонки. Так, первое письмен­\nное упоминание о перегонке вина встречается\nлишь в позднеантичном документе (3-й век нашей\nэры). Он называется «Трактат го спирт­но­го он\nпредлагал по­вто­рять пе­ре­гон­к у.\nВ свое второе путешествие в Новый Свет в 1493\nгоду Христофор Колумб берет ростки сахар­\nного тростника, который впоследствии станет\nсырьем для производства рома.\nВ 1494 году в шотландском письменном источ­\nнике упоминается «вода жизни», полученная из\nячменя. Это первый известный нам предшествен­\nник шотландского виски.\nВ начале 1500-х годов испанцы знакомят\nМексику с мастерством перегонки. Так на свет\nпоявляется мескаль – дистиллят перебродивше­\nго сока агавы.\nМожжевеловый напиток женевер появляется на\nсвет в конце 16 века. Его придумал голландец\nФранциск Сильвиус в качестве средства от желу­\nдочных болей.\n\nЛ ек арс тво и не только\n(1600-е –1700-е годы)\n\nНаверху. На протяжении многих веков алкоголь можно было приобрести\nисключительно в аптеках, ибо он использовался только в медицинских целях.\nВнизу. Древние, примитивные перегонные «аппаратусы».\n\n26 Хроник а а лкоголя и кок тей лей\n\nК 1600-м годам ме­то­ды пе­ре­гон­ки стали до­с та­\nточ­но раз­ви­ты, что да­­ло воз­мож­ность по­лу­чать\nал­ко­голь в боль­шом ко­ли­че­с т­ве. На этом за­кон­\nчи­лась его «ме­ди­цин­ская» эпо­ха и на­ча­лась эпо­\nха тор­гов­ли.\nВ то время начинают использовать выдержку.\nДля пе­ре­воз­ки спирт­ное на­ли­вали в ду­бо­вые\nбоч­ки, ко­то­рые дол­го пре­бы­ва­ли в трю­мах ко­раб­\nлей. Бы­ло за­ме­че­но, что дре­ве­си­на улуч­ша­ла\nгру­бо­ва­тый вкус ак­ва­ви­ты и при­да­ва­ла на­пит­к у\nкра­си­вый от ­те­нок. Та­к вы­держ­ка в боч­ках ста­ла", "иг­рать важ­ную роль в про­цес­се из­го­тов­ле­ния\nмно­гих спирт­ных на­пит­ков.\nВ 1608 году произошла легализация древнейшей дистиллерии – ирландской винокурни\nБушмилс, которая производила виски даже и до\nтого времени, но подпольным образом.\nНаряду в изготовлением виски в Шотландии и\nИрландии, в начале 17 века в районе реки\nШаранты, во Франции начинают «жечь» белое\nвино. Продукт перегонки получает название\n«бренди из Коньяка» (впоследствии – просто\n«коньяк»).\nВ первой половине 17 века на Руси появляются\nказенные и частные винокурни. (В 16 веке спирт­\nное гнали прямо при кабаках). На винокурнях\nбрагу начинают перегонять по нескольку раз.\nПредшественник нынешней водки становится\nкрепче и чище.\nВо второй половине 17 века в Англии развива­\nется винокурение и местное спиртное с можже­\nвеловой ягодой получает название «джин».\nВ это же время монах Дом Периньон совершен­\nствует шампанское вино во Франции.\nВ другой части земного шара – на Карибских\nостровах – начинают подвергать перегонке\nперебродившую патоку сахарного тростника,\nполучая при этом ром.\nВ 17 веке под английским влиянием появляются\nпервые смешанные напитки – пунши, в первую\nочередь – на основе рома и бренди.\nВ 1732 году был создан один из старейших\nрецептов смешанных напитков, дошедших до\nнаших дней. Он зародился в клубе Fish House в\nФиладельфии. Напиток называется «Фиш Хаус\nПунш» и включает коньяк, ром, персиковый\nбренди, лимонный сок, воду и сахар.\nВ середине 18 века в Англии появляются смешан­\nные напитки группы «Сауэр», взбитые из лимон­\nного сока, сахара и алкоголя. Самый известный\nих представитель – «Виски Сауэр».\nВо второй половине 18 века итальянский город\nТурин становится центром производства вермутов на основе пьемонтских вин и душистых\nальпийских растений.\nА в Англии появляется традиция готовить на\nрождественские праздники смешанный напиток\n«ег-ног» из спиртного (коньяк или ром), молока,\nсахара и яичного желтка.\n\nКонец 18 века стал свидетелем зарождения бурбона в Америке, а также изобретения швейцар­\nским доктором Ординером абсента.\n\nРанняя миксология\nи непрерывна я\nдис тилляция\nОколо 1800 года в Виргинии появился на\nсвет известный исторический коктейль «Минт\nДжулеп» (мята, сахар и – в то время – коньяк).\nКроме того, начало 19 века стало свидетелем\nпоявления американских смешанных напит­\nков группы «кобблер» (смесь вина, сухого или\nкрепленого, кусочки фруктов и часто ликера\nКюрасао), которые включали забавное нововве­\nдение: трубочку. Говорят, что они получили свое\nназвание от маленьких «cobbles», то есть «камеш­\nков» льда, которые входят в их рецепт.\nВ то же время в Англии появляются «флипы», в\nоснове которых тоже лежало крепленое вино.\nЕго взбивали с желтком и сахаром, а потом посы­\nпали молотым мускатным орехом.\n1806 год стал символическим в истории миксо­\nлогии, ибо к нему относится первое письменное\nупоминание слова коктейль применительно к\nсмеси спиртных напитков. А именно, в амери­\nканской газете «The Balance» была опубликована\nстатья, где говорилось, что «cock tail» (писалось в\nдва слова) – это «бодрящий напиток, составленный из спиртного, сахара, воды и биттеров. Его\nтакже называют \"биттеред слинг\"». Ироничный\nжурналист представляет коктейль в качестве\n«предвыборного напитка», поскольку, по его сло­\nвам, после большого бокала можно выслушать\nречь политика и заглотить любую его идею.\nК первой половине 19 века относится появле­\nние легендарного «Шампань-коктейля», кото­\nрый первоначально состоял из шампанского,\nкуска сахара, пропитанного биттером, и цедры\nлимона.\n\nС лово « коктейль »\nВ соответствии с версией, которой\nпридерживается большинство историков, коктейли пришли к нам из Англии. Выражение cock tail (петушиный\nхвост) означало скачки нечистокровных лошадей с развевающимися как\nу петуха хвостами. Смешение кровей\nпрямо ассоциировалось со смешиванием напитков.\nВторая гипотеза гласит, что на родине\nконьяка в Шаранте смесь вина с крепким спиртным называли «coquetelle».\nТак появилось слово «коктейль» для\nобозначения смешанных напитков,\nкоторые сначала готовили в домашних условиях. Затем это слово\nполучило широкое распространение\nи приобрело несколько английское\nзвучание.\nНаконец, существует множество\nдругих легенд о происхождении\nслова «коктейль», более или менее\nправдоподобных, которые продолжают служить темой для споров в барах.\nВ этом, вероятно, и заключается их\nглавный интерес.\n\nИрландец Аэнеас Коффи в 1831 году изобретает\nреволюционный аппарат непрерывной перегонки, который улучшил очистку спирта, позво­\nлив гнать его в большом количестве. Это изобре­\nтение вскоре стало использоваться некоторыми\nпроизводителями виски, а также джина, рома и\nдругих напитков.\nВ середине 19 века в Новом Орлеане зарождает­\n\nХроник а а лкоголя и кок тей лей 27", "28 Хроник а а лкоголя и кок тей лей", "С алуны , Б ары\nи их «Д ержатели »\nАмериканское слово «салун» (saloon)\nпроисходит от французского «салон»\n(salon). Первоначально оно имело тот\nже смысл, а к 1750-м годам стало относиться к общественным помещениям, где можно было расслабиться, и\nиспользовалось преимущественно на\nпассажирских суднах.\nНаконец, к 1840-м годам это слово\nстало означать бар, хорошо отражая его суть. Салун – это место, где\nможно расслабиться, отдохнуть после\nизнурительного рабочего дня.\nСлово «салун» практически вышло\nиз употребления во времена сухого\nзакона и вновь вошло в обиход лишь\nмного позже. Сегодня оно снова пользуется благосклонностью публики, и\nмногочисленные новые салуны открывают свои двери для посетителей.\nЧто касается слова «бар», то оно появилось в Соединенных Штатах только\nв середине 19 века. Первоначально\nоно означало предмет меблировки, в котором держали бутылки со\nспиртными напитками, и получило\nсвое название от окружавшего его\nметаллического барьера. Постепенно\nназвание перешло на все заведение.\nКак только появились бары, сразу же\nвозникло слово «бармен» и его синоним «бартендер», то есть держатель\nбара.\nПотребление спиртного на публике\nтребует соответствующей обстановки, в которой под элегантностью\nскрывается твердость соблюдения незыблемых правил, при всем уважении\nк свободе личности. Для этого требуются люди с сильным характером.\nДирижеры, способные управлять непрерывным праздником, не допуская\nни единой фальшивой ноты.\n19-е столетие стало свидетелем\nпоявления подобных персонажей,\nоставивших неизгладимый след в\nистории.\nНа фото: «Эриксонс Салун», штат\nОрегон, начало 20 века.\n\nся группа коктейлей «круста»: крепкое спиртное\n(обычно бренди или виски), лимонный сок, сахар\nи биттер, подаваемые в бокале с кромкой из\nцедры и сахара.\nВ Лондоне тем временем был придуман «Том\nКоллинз» (джин, лимонный сок, сахарный сироп\nи содовая), давший рождение целой группе сме­\nшанных напитков под названием «коллинзы».\nВ 1853 году Эндрю Ашер создает шотландский\nкупажированный виски (бленд), смешав соло­\nдовые сорта с зерновыми, полученными путем\nнепрерывной перегонки.\nВ Новом Орлеане в середине 19 века появляется\nна свет легендарный коктейль «Сазерак» (коньяк,\nбиттер Пешо, абсент, сахар, цедра лимона).\nВ 1862 году вышло в свет первое руководстве для бартендеров за авторством великого\nДжерри Томаса (1830-1885 г.г.).\nВ том же 1862 году на Кубе выходец из Каталонии\nФакундо Бакарди создает новый, легкий тип\nрома, который несколькими десятилетиями\nпозднее ляжет в основу легендарных кубинских\nкоктейлей.\nТем временем во Франции в 1870-х годах раз­\nразился кризис филлоксеры. Большинство\nвиноградников уничтожено. Нехватка вина на\nрынке дала мощный толчок распространению\nкоктейльной культуры. А производители коньяка\nстолкнулись с тяжелыми временами. Кризис фил­\nлоксеры продлился до 1890-х годов.\n\nG olden A ge\n\n(конец 1860-х – 1919 г.)\nВо второй половине 19 века транспортное сооб­\nщение между Европой и Америкой развивается\nблагодаря трансатлантическим лайнерам. Со ста­\nрого континента на новый поставляются крепкие\nнапитки, вина, вермуты и ликеры, которые стано­\nвятся ингредиентами модных американских кок­\nтейлей. В обратном направлении следуют состо­\nятельные американцы, ради которых в Европе\nпри отелях открывают так называемые «амери­\nканские бары», где подают смешанные напитки.\nПроисходит глобализация коктейльной моды.\n1874 – это год создания культового «Манхэттена»\n(ржаной виски, красный вермут, биттер).\nВ 1875 году появляется льдогенератор.\n\nХроник а а лкоголя и кок тей лей 29", "Искусственно приготовленный лед сменил доро­\nгой природный лед из ледников, что значитель­\nно облегчило работу бартендеров и сделало\nдоступнее коктейли.\nВ 1870-х годах Америка стала свидетельницей\nрождения шипучих лонг-дринков физзов. На\nсамом деле, они представляли собой эволюцию\nколлинзов, но – с яичным белком.\nОриентировочно к 1880-м годам можно отне­\nсти коктейль «Олд фешенд», который появился\nна свет в джентльменском «Педденис клубе» в\nКентукки.\nВ 1882 году был издан «Учебник бармена» Гарри\nДжонсона, легендарного бартендера и «препо­\nдавателя искусства содержания бара».\nВ 1895 году в России вводится монополия, уже­\nсточающая процесс очистки спирта путем обя­\nзательной ректификации и фильтрации. Можно\nсчитать, что эта «питейная монополия» ознаме­\nновала сегодняшнюю концепцию водки, осно­\nванную на максимальной, безупречной чистоте.\nГодом позднее – в 1896 году – американский\nинженер Дженнинг Кокс, работавший на кубин­\nской шахте неподалеку от Сантьяго-де-Куба, соз­\nдал культовый коктейль «Дайкири» (легкий ром\nBacardi, сок лайма и сахар).\nНа рубеже 19 и 20 столетий в Италии на свет\nпоявляется коктейль «Милано-Торино» (вермут,\nкампари и содовая), который ориентировочно в\n1917 году будет переименован в «Американо».\nВ Америке начало 20 века – это время рождения\nвеликих классических коктейлей. В 1904 году\nв одном из отелей Филадельфии был изобре­\nтен «Кловер клуб» (джин, лимонный сок, сахар,\nмалиновый сироп и яичный белок).\nК тому же году относится первое письменное\nупоминание коктейля «Драй Мартини» (Франк\nНьюман. «American Bar»).\n1914 – год рождения коктейля «Роб Рой» (скотч,\nкрасный вермут и биттеры), который ознамено­\nвал начало использования шотландского купажи­\nрованного виски в коктейлях.\nСчитается, что в 1919 году был создан знаме­\nнитый «Негрони», более крепкая вариация\n«Американо» с джином.\n\nС у хой закон\n\n(1920 – 1933 г.г.)\nВ 1920 году в Америке вступил в силу сухой\nзакон Он привел к возникновению подпольных\nбаров, которые назывались «спикизи» (от speak\neasy – говорить вполголоса), где подавали кон­\nтрабандные напитки и коктейли на их основе.\nОфициальная барная культура переметнулась в\nдругие страны. Париж стал коктейльной столи­\nцей мира, а Гавана – барной стойкой Америки.\n«Кровавая Мэри» – один из первых коктейлей\nна основе водки – была придумана в парижском\n«Гаррис баре» в 1920-х годах.\nК тому же периоду можно отнести «Сайд Кар»\n(коньяк, трипл сек, лимонный сок). По одной из\nверсий его создал Франк Мейер в парижском\n«Ритце».\nПервое письменное упоминание «Мохито» отно­\nсится к 1930 году, встречаясь в буклете с рецепта­\nми гаванского бара «Слоппи Джоз».\nВ Лондоне в том же году выходит в свет знамени­\nтая книга не менее знаменитого Гарри Крэддока\n– «Книга коктейлей Савоя».\n1933 – это год отмены сухого закона, после чего\nкоктейльное движение переживает своего рода\nзастой, который продлится до 1980-х годов.\n\nП ериод зас тоя\n\n(1940-е – 1970-е г.г.)\nВторая Мировая война ознаменовала собой\nконец блестящей коктейльной эпохи. Постепенно\nпрофессия бармена потеряла свой былой пре­\nстиж, и больше не служила источником вдохно­\nвения. По большому счету, только одно направ­\nление отпочковалось от той эпохи, сумев избе­\nжать застоя, и стало мощным трендом, который\nпродолжается и в наши дни. Это тики-коктейли,\nвозникшие сразу после отмены сухого закона.\nПрародителями экзотического направления\nбыли американцы – друзья и конкуренты Дон\nБичкомбер и Трейдер Вик.\nВ 1944 году Трейдер Вик разработал коктейль\n«Май Тай» (темный ром, апельсиновый ликер,\nсиропы миндальный и карамельный, сок лайма).\nДанный период также отмечен распространени­\nем водки в Америке. Ее продажи росли небыва­\nлыми темпами, и она вытеснила джин в коктейлях.\n\n30 Хроник а а лкоголя и кок тей лей\n\nПосле окончания Второй мировой\nвойны «Драй Мартини» оставался самым популярным коктейлем планеты.\nРисунок с обложки итальянского\nжурнала Grand Hôtel, 1950 год.", "В 1940-х годах в Лос-Анджелесе был создан\nкоктейль «Московский Мул» (водка, сок лайма,\nимбирный эль) – яркий представитель нового\nпоколения коктейлей на основе водки.\n\n80- е и 90- е :\nВ е тер перемен\nВ 1980-х годах легкий ветер перемен встает\nнад сонным царством смешанных напитков.\nПоявляются первые ласточки, которые укажут\nпуть и высвободят творческую энергию у множе­\nства барменов по всему свету.\nВ Сан-Франциско в 1980-х годах Хулио Бермехо\nсоздает революционный твист на «Маргариту»\n– коктейль «Томмиз Маргарита» (текила, сок\nлайма и сироп агавы). Такой новый подход к\nклассике впоследствии послужит примером для\nмножества бартендеров по всему миру, которые\nначнут придумывать всевозможные твисты на\nизвестные, исторические коктейли.\nВ 1984 году Дик Брэдселл создает в Лондоне\n«Эспрессо Мартини» (водка, охлажденный кофе,\nкофейный ликер). Этим коктейлем он задал моду\nна всевозможные «мартини» на основе водки,\nкоторая продолжается до сих пор.\nВ 1980-х годах Дик Брэдселл также придумывает\nлегендарный коктейль «Брэмбл», ставший сим­\nволом лондонской миксологии.\n\nВ 1990-х годах появляется новый, пока еще\nмикро-тренд: готовить в баре домашние настойки на водке. Так, например, этой теме посвя­\nщается бар-ресторан Infusion в Сан-Франциско.\nНастойки в то время пьют, в основном, в чистом\nвиде. Лет через десять-пятнадцать микро-тренд\nразрастется до тотальной моды на домашние\nнастойки, причем не только на водке, но и на всех\nдругих напитках, которые будут вовсю использо­\nваться для смешивания.\n1994 год. В Лондоне открывается Atlantic Bar &\nGrill, за стойкой которого работал Дик Брэдселл.\nАссистировали ему Тони Кониглиаро и Ник\nСтрэнджуэй. Это место стало эпицентром кок­\nтейльной революции в Лондоне.\nВ том же 1994 году Колин Филд становится\nшеф-барменом бара «Хемингуэй» в парижском\n«Ритце», где, кстати, он продолжает трудиться по\nсей день. Колин, одним из первых – в 1994 году,\n– ввел в коктейли домашние настойки (водка на\nмалине, водка на имбире, водка на перце-чили).\n\nНа рубеже прошлого и настоящего\nвеков одним из самых символичных\nкоктейлей стал «Космополитен»,\nвоспетый героинями сериала «Секс в\nбольшом городе».\n\nВ 1987 году будущий «Король коктейлей», а в то\nвремя просто талантливый и увлеченный бармен\nДейл ДеГрофф встает за стойку «Рейнбоу рум»\nв Нью-Йорке. Вдохновившись старинной книгой\nДжерри Томаса (см. 1862 год), он возрождает из\nпепла американскую миксологию и подает исто­\nрические коктейли с размахом высокой кухни.\nДейл ДеГрофф возвращает блеск профессии бар­\nтендера. Сегодня он считается первым миксоло­\nгом современной эпохи.\nВ 1988 году на большие экраны выходит фильм\n«Коктейль» c Томом Крузом в главной роли. Он\nвдохновляет молодых людей выбрать профессию\nбармена и задает моду на флейринг.\nВ том же 1988 году появляется на свет культо­\nвый коктейль – «Космополитен». Он был соз­\nдан, по всей видимости, девушкой-барменом из\nФлориды по имени Шерил Кук. Коктейль включал\nследующие ингредиенты: лимонная водка, клюк­\nвенный сок, ликер трипл сек и – на тот момент\n– Rose’s lime juice, который впоследствии был\nзаменен на свежевыжатый сок лайма.\n\nХроник а а лкоголя и кок тей лей 31", "21- й век . Н ова я\nЗ олота я Э ра\nК началу текущего столетия сложились все пред­\nпосылки для коктейльной революции. Эти пер­\nвые творческие искры, появившиеся в конце\n20 века, теперь превратились в пламя, озарив\nНовую Золотую эру коктейлей, полностью изме­\nнившую суть работы бартендера и наши питей­\nные привычки.\nКреативная лихорадка охватила барменов по\nвсему миру. Бартендер стал не просто исполни­\nтелем, а творцом, волшебником вкуса. Профессия\nвернула себе престиж, который она имела в 19\nвеке. В бар стали приходить ради бармена. Чтобы\nпопробовать его творения и увидеть мастера за\nработой.\nВместе с тем, глобализация ускорила обмен\nинформацией через интернет и увеличила тор­\nговый оборот, способствуя продажам новых про­\nдуктов и экзотических ингредиентов, что тоже\nдало импульс развитию коктейлей.\nПо всему миру стало открываться все больше\nкоктейльных баров. Коктейльная культура захва­\nтила широкие слои населения.\nВ начале нулевых Лондон стал центром кок­\nтейльной культуры. А бар Lab – творческой лабо­\nраторией, взрастившей некоторых выдающихся\nпрофессионалов, среди которых Шарль Вексена\nи Дре Массо.\nСовершенно разные эпохи и направления миксо­\nлогии стали сосуществовать параллельно друг с\nдругом. Так, с одной стороны, бармены старались\nкак можно точнее воспроизвести вкус забытых\nисторических коктейлей, а с другой – готовили\nсуперсовременные молекулярные творения.\nЭто был период резкой премиумизации алкоголя\nи смешанных напитков. Для коктейлей начинают\nиспользовать напитки повышенной выдержки,\nодносолодовый виски, текилу 100% агавы и т.д.\nи т.п.\nБлагодаря лондонскому влиянию, произошла\nреабилитация джина, который теперь не только\nвновь востребован у миксологов, но и стал самой\nбыстро растущей категорией спиртных напитков.\nВ то время меняется суть и расширяются рамки\nсамой профессии бармена. Отныне он стано­\nвится еще и консультантом, креативщиком, раз­\nработчиком, амбассадором и даже... – ученымисследователем.\nТак, в 2005 году Тони Кониглиаро открывает\nсвою лондонскую лабораторию – консультаци­\nонный центр Drink Factory, где он превращает\n\n32 Хроник а а лкоголя и кок тей лей\n\nмиксологию в целую науку. Тони эксперименти­\nрует с новыми способами приготовления сме­\nшанных напитков: выдержка коктейлей в бутылке,\nвыдержка в бочке, настаивание методом су-вид\nи т.д. и т.п.\nПо другую сторону Атлантики в том же 2005 году\nнью-йоркский бармен Сэм Росс создает коктейль\n«Пенициллин», который можно считать одновре­\nменно наиболее ярким, простым и иконоборче­\nским произведением современной миксологии.\nРецепт включает шотландский купажированный\nвиски, а также – солодовый виски (флоат), лимон­\nный и имбирный соки и медовый сироп.\nЕсли в самом начале 21 века бармены старались\nкак можно точнее воспроизвести вкус старин­\nных и классических коктейлей, то в 2010-х годах\nони стали представлять публике свое видение\nклассики и истории. Всевозможные «твисты» на\nизвестные коктейли появились в меню любого\nуважающего себя бара. Писк тренда – использо­\nвание редких, домашних ингредиентов, которых\nне встретишь в других местах.\nВ этом контексте приготовление домашних\nнастоек в 2010-х годах набрало обороты и поро­\nдило еще один смежный тренд – приготовление\nсобственных биттеров. Кроме того, все другие\nдомашние ингредиенты, как никогда, востребо­\nваны для использования в коктейлях.\nДа и вообще, в особом фаворе оказалось все\nредкое, уникальное, единственное и неповтори­\nмое, включая «подножный корм», ставший новой\nэкзотикой.\nПолучается, что с одной стороны, работа бар­\nтендера все больше похожа на ту, которой она\nбыла во второй половине 19 века, когда поло­\nвину ингредиентов для коктейлей приходилось\nготовить на месте. С другой стороны, сегодня на\nпомощь приходят все современные технологии\nи приборы: су-вид, роторные испарители, гомо­\nгенизаторы, дегидраторы...\nЕще одним устойчивым трендом миксологии\nстало сближение коктейлей с искусством высо­\nкой кухни.\nКроме того, у коктейлей с некоторых пор появил­\nся новый компонент – эмоциональная составля­\nющая, которая определяется уровнем воздей­\nствия напитка на чувства потребителя. Теперь\nкоктейль обязан быть не просто качественным\nнапитком. Он должен удивлять своим внешним\nвидом и подачей, восхищать своим ароматом,\nвкусом и текстурой, передавать концепцию, то\nесть обеспечивать, так называемое, мультисен­\nсорное восприятие.\n\nМ ультисенсорное восприятие\nМультисенсорное восприятие – это\nпроцесс, при котором информация от\nразных сенсорных зон человеческого\nорганизма синтезируется, влияя на\nего общее впечатление и поведение.\nВ последнее время мультисенсорность стала одной из важных тем в\nмиксологии. На самом деле, это направление не является чем-то новым.\nЧеловек всегда воспринимал напиток\nили блюдо на мультисенсорном уровне, ибо в процессе их потребления в\nход всегда задействуются несколько\nорганов чувств, а не только рецепторы на языке.\nНо теперь мультисенсорность стала\nпредметом детального изучения со\nстороны физиологов, психологов, а\nтакже шеф-поваров и миксологов. То\nчто раньше делалось на интуитивном\nуровне согласно традициям и коллективному опыту, теперь подвергается\nразбору и анализу. Так, например,\nсегодня доподлинно известно какие\nименно рецепторы человеческого\nязыка чувствуют каждый из вкусов,\nа также какой именно из отделов головного мозга анализирует поступающие с языка сигналы и под действием\nкаких секреций.\nЦелью «мультисенсорной подачи»\nкоктейля или блюда является желание восхитить и удивить потребителя\nи тем самым вызвать у него эмоции.\n\nХудожник, шоумен, менеджер,\nкреативщик, консультант, кулинар,\nбизнесмен, амбассадор – сегодня\nпрофессия бармена позволяет раскрыться самым разным талантам.\nНа соседней странице. Подача\nКоктейля №22 в баре 15 Kitchen+Bar,\nМосква.", "Хроник а а лкоголя и кок тей лей 33", "Ч асть первая . Г лава 2\n\nМетоды производства\nспиртных напи т ков\nБ рожение\nБро­же­ние – это про­цесс пре­вра­ще­ния са­ха­ра в\nспирт под воз­дей­с т­ви­ем дрож ­жей. Его ба­ланс в\nуп­ро­щен­ном ви­де вы­гля­дит сле­ду­ю­щим об­ра­зом:\nСахар = Этиловый спирт + Углекислый газ\nДрож­жи, слу­жа­щие ка­та­ли­за­то­ром бро­же­ния, мо­\nгут быть как ес­те­с т­вен­но­го про­ис­хож ­де­ния (на\nко­ж у­ре пло­дов), так и спе­ци­аль­но до­бав­лять­с я в\nсус­ло. Этот про­цесс все­гда со­про­вож ­да­ет­с я по­\nвы­ше­ни­ем тем­пе­ра­т у­ры. Та­ким об­ра­зом, кон­тро­\nли­руя тем­пе­ра­т у­ру, мож­но кон­тро­ли­ро­вать вре­\nмя бро­же­ния.\nТре­бу­ет­с я 17 г са­ха­ра на 1 л сус­ла, что­бы по­вы­\nсить со­дер­жа­ние эти­ло­во­го спир­та в браж­ке на\n1%. Пу ­тем бро­же­ния по­лу­ча­ет­с я спирт­ное кре­по­\nс­тью мак­си­мум 16%, по­сколь­к у боль­шее ко­ли­че­\nст­во ал­ко­го­ля ней­т­ра­ли­зу­ет дрож ­жи.\n\nД ис тилляция\nД
