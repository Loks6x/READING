нского сухого закона, когда публике\nосточертело насыщенное ароматами и сахаром\nподпольно изготовленное спиртное, водка «без\nвкуса и запаха» произвела фурор.\nОна позволила создать коктейли, сохраняющие\nв неприкосновенности ароматы ингредиентов.\nОна служила передатчиком разных вкусов, основой, на которую проецировались фантазии бармена. Если прибегнуть к несколько помпезному,\nно совершенно точному сравнению, то можно\nсказать, что для миксолога водка – то же, что чистый холст для художника. Абсолютная основа, на\nкоторой будет создано новое произведение.\nВодка делает коктейли более крепкими, не меняя\nпри этом их вкус. Ее используют для приготовления таких всемирно популярных коктейлей, как\n«Кровавая Мэри», «Космополитен», «Московский\nмул» и многих других.\nВодка хорошо сочетается со свежими фруктами,\nликерами, соками, сиропами и предоставляет\nбарменам огромную свободу творчества.\nНаконец, водка – прямой конкурент джина. Она\nпредставляет собой американское влияние, в\nто время как джин – английское. И знаменитый\nАгент 007, заменяя в своем «Мартини» джин на\nводку, возможно, разоблачает себя как агента ЦРУ,\nвнедренного в секретную службу Ее Величества.\n\nВ настойках\nВодка – это самый версатильный спиртной напиток, который можно настоять на любых продуктах. Ее возможности безграничны. Только как и\nдля всех других напитков следует избегать «про-\n\n64 Водк а\n\nВ чистом виде водка идеально подходит к блюдам\nрусской кухни, например к черной икре, копченому лососю, селедке, соленьям.\nДореволюционные традиции. Согласно дореволюционным традициям, в лучших русских ресторанах Парижа водку наливают в маленький хрустальный графин, который помещают в ведерко\nс небольшим количеством воды, и все это замораживают до температуры –10°С. Ледяную водку\nналивают гостям, держась при этом за ведерко.\nРюмки. В том случае, если водку подают сильно\nохлажденной, то же самое рекомендуется делать с\nрюмками. Для этого их следует держать в морозильнике в течение нескольких часов.\n«Флайты». В престижных американских барах,\nсозданных в русском стиле успехом пользуются\nтак называемые «флайты» (Flights). Один «флайт»\n– это четыре разных шота с водкой, поставленные в металлический лоток с дробленым льдом.\nКаждый флайт имеет свое тематическое название, например, «The Best of Russia» или «Around\nthe World».\nТемпература подачи. Температура подачи\nспиртного напитка зависит от содержания в нем\nнеалкогольных составляющих. Поскольку водка\nвключает мало таких элементов, ее лучше подавать «замороженной», то есть охлажденной до\n–10°С ... –18°С. Это замедляет испарение спирта,\nсмягчает его запах и вкус.\nВ баре парижского отеля «Ритц» водка подается при температуре –18°С, а для приготовления\nодного коктейля ее специально охлаждают до\nминус 21°С. Однако в России по традиции водку\nнередко пьют при температуре +10°С.\n\nО сновные бренды\nНиже приведены некоторые известные и премиальные водочные бренды, представленные на\nроссийском и международном рынках.\n\nAbsolut (Абсолют)\nШведская водка Absolut производится на основе\nпроцесса перегонки, разработанного в 19 веке\nЛарсом Олссоном Смитом. Происхождение содержимого каждой бутылки гарантировано использованием местной пшеницы и воды из собственных\nскважин. Наряду с классической водкой, выпускается несколько вкусовых вариантов Absolut с натуральными ароматами.\n\nП олугар\nПолугар приходится водке тем\nже, кем ржаной виски – бурбону.\nЭто аутентичный продукт, гарант\nтрадиций и вкуса. Благодаря рецепту,\nобнаруженному в источнике XIX века,\nспециалист по водке и писатель Борис\nРодионов проникся идеей воскресить\nпредка водки – полугар.\nДля его производства используется\nрожь, и он соответствует тому, что\nкогда-то называлось «хлебное вино».\nПолугар, полученный в результате\nтройной дистилляции в перегонном\nкубе, очищенный яичным белком и\nотфильтрованный сквозь древесный\nуголь, имеет крепость 38,5% vol.", "Beluga (Белуга)\n\nKetel One (Кетел уан)\n\nВыпускается на ликероводочном заводе в Мариинске, в Сибири. Для ее производства используется солодовый спирт и вода из сибирских скважин, которая ествественным образом фильтруется\nсквозь толстый слой кварца. В результате получается водка, сочетающая чистоту и характер.\n\nНазвание этой водки происходит от «Distilleer\nKetel 1», что по-голландски означает «Аламбик\n№1». Ее получают из пшеницы, перегонкой в медных аппаратах и фильтруют через древесный\nуголь. Производится в Шидаме с 1983 года.\n\nFinlandia (Финляндия)\n\nВодка Mamont производится на сибирском заводе, с давних пор обосновавшемся в Алтайском\nкрае. Используемае вода, пшеница, равно как и\nмногочисленные перегонки соответствуют поставленной цели – добиться максимальной чистоты продукта. Бутылка своей формой напоминает бивень мамонта.\n\nFinlandia Vodka олицетворяет природные богатства этой северной страны: ее чистейшую родниковую воду и особый ячмень, выращенный под\nполуночным солнцем. Водка также берет на вооружение сегодняшние достижения страны, благодаря высокотехнологичной перегонке и дизайнерской бутылке. Существует как в классической\nверсии, так и во многих вкусовых вариантах.\n\nGrey Goose (Грей Гуз)\nДля производства Finlandia Vodka\nиспользуется финский ячмень.\nЛетом ячмень зреет не только днем,\nно еще и белыми ночами – под полуночным солнцем, что наделяет зерно\nособыми чертами.\n\nВодка Grey Goose появилась на свет в 1997 году. Ее\nсоздал американец Сидни Франк. Производится\nво Франции из отборной пшеницы и воды из источника Жансак. Заключительный этап производства этой изысканной водки проходит в Коньяке.\nИмеет вкусовые варианты: Le Citron (лимонная) и\nL'Orange (апельсиновая).\n\nImperia (Империя)\nПолученная из пшеницы и ледяной воды севера,\nэта российская водка перегоняется восемь раз и\nпроходит кварцевую фильтрацию.\n\nС ове ты бармену\nКачество водки\nАлкоголь, содержащийся в качественных спиртных напитках,– это этанол или\nэтиловый спирт, который в небольших\nколичествах не причиняет сильного\nвреда человеческому организму.\nСпиртные напитки содержат также много других компонентов, среди которых –\nметанол, или метиловый спирт, губительный для здоровья.\nЗадача дистилляции при производстве\nводки заключается не только в получении чистого спирта, но и в получении\nчистого этилового спирта.\nПри неправильно проведенной перегонке в дистилляте остается большое\nколичество метанола.\nУпотребление водки, полученной из такого спирта, может вызвать алкогольное\n\nотравление, которое в лучшем случае\nоборачивается сильным похмельем и\nголовной болью.\nУсваивание метанола человеческим\nорганизмом начинается только после\nполного усвоения этанола, из-за этого\nэффект действия метанола проявляется\nне сразу. Рюмка водки в утро похмелья\nпомогает почувствовать себя лучше, потому что этиловый спирт, появившийся\nв организме, приостанавливает усвоение метанола. Но лучше, конечно же,\nне рисковать здоровьем своих гостей и\nпредлагать им только высококачественную водку, прошедшую правильную,\nпрофессиональную дистилляцию.\nКстати, за сильно выраженным сладковатым вкусом водки может прятаться вода\nили спирт плохого качества.\n\nMamont (Мамонт)\n\nSmirnoff (Смирнофф)\nВ 1898 году Петр Смирнов оставил в наследство\nсвоим сыновьям спиртоводочный завод в Москве\nи рецепт водки. Владимир продолжил дело отца,\nно после революции бежал из России. Восстав из\nпепла в США под названием Smirnoff, водка Петра\nСмирнова встретила мировой успех.\nСегодня водка Smirnoff имеет британскую прописку и производится повсюду в мире.\n\nАлтай\nИткульский спиртзавод был основан в 1868 году\nна Алтае. В настоящее время при техническом содействии французской компании «Перно Рикар»\nздесь производится водка «Алтай». Чистая алтайская вода и морозостойкая пшеница дают легкую,\nживую и уравновешенную водку мирового класса.\n\nВысшие пития\nВодка, производимая во Франции на основе ржи\nпо семейным рецептам русского дворянства.\nСпирт настаивается на традиционных ингредиентах, таких как лимон, тмин и различные пряности,\nа затем перегоняется в медном кубе в области Коньяк. Существует в классическом, а также в двух\nвкусовых вариантах: тминная (крепость 58% vol.) и\n«лимонная на молоке» (крепость 43% vol.).\n\nКристалл\nИзвестный московский завод «Кристалл» был\nоснован на берегу Яузы в 1901 году после введения государственной водочной монополии.\nИзначально он носил название «Московский\nказенный склад №1». Сегодня здесь производят\nтакие марки водки, как Moskovskaya Osobaya,\nStolichnaya, Чистый Кристалл, Putinka и другие.\n\nРусский Стандарт\nЭта российская водка была создана Рустамом Тарико. Она основывается на национальных ценностях и производится в Санкт-Петербурге.\n\nВ одк а 65", "Martini. Каким бы он ни был – «сухим», «мокрым»,\n«голым» или «грязным» – вы никогда не будете\nразочарованы от Martini на основе Absolut.\nЕще один мой любимец – это «Эспрессо Мартини». Даже несмотря на то, что много кофе,\nвыпитого на ночь, мне мешает спать. Теперь в\nбольшинстве баров готовят приличные «Эспрессо Мартини». По крайней мере, пока бармены\nне начинают слишком осложнять рецепт, и их\nкоктейли не становятся похожи на фраппе из\nСтарбакса. (Хотя даже и они вкусные).\nДавайте тоже вспомним еще про один коктейль,\nкоторый утвердил моду на вкусовые водки. Это\nCosmo. Правильно приготовленный (что встречается не так часто) – это один из лучших образцов\nсовременной классики. Погуглите рецепт от\nToby Cecchini, и вы пойдете по правильном пути.\n\nРикардо Динан уже на протяжении пяти лет работает с брендом\nAbsolut. Вначале в качестве брендамбассадора в Великобритании,\nа теперь – повсюду в мире. Что\nкасается коктейлей, то его фавориты\n– это Espresso Martini и различные\nварианты Vodka Martini.\n\nР и к а рд о Д и н а н\nГл о б а л ь н ы й б р е н д - а м б а сс а д о р\nв о д к и A b s o lu t\nРикардо считает, что сейчас мы переживаем\nсамый осмысленный и серьезный период\nстановления барной индустрии. Он рассказывает нам о том, как изменилось использование\nводки в коктейлях, а также дает советы относительно приготовления классики с водкой.\n1. Рикардо, как вы стали барменом, а потом –\nГлобальным бренд-амбассадором водки Absolut?\nВсю мою сознательную жизнь я был в игре. Уже\nв 14 лет я начал коллекционировать бокалы. Как\nи для большинства, тогда работа бармена была\nспособом подрабатывать и соблазнять девушек.\nЭто были совсем другие времена.\nС брендом Absolut я стал работать пять лет тому\nназад. Вначале я был бренд-амбассадором в\nВеликобритании. Когда освободилась позиция\nглобального бренд-амбассадора, я, как и все, подал резюме. Мне повезло, меня взяли.\nКогда мне исполнилось 30 лет, я решил взглянуть\nна обратную сторону индустрии. Все то, что я\nузнал в течение этих пяти лет, бесценно.\n2. На ваш взгляд, какие три коктейля на основе\nAbsolut мы должны иметь возможность попробовать в каждом баре?\nМне нравятся коктейли Vodka Martini, для которых\nAbsolut Original – идеальная основа. Ее богатый\nхарактер, обусловленный удивительным производственным процессом, ощущается в хорошем\n\n66 Водк а\n\n3. Можете ли вы дать какие-то советы относительно приготовления «Эспрессо Мартини» и\n«Водка Мартини» или их твистов?\nЯ люблю, когда «Эспрессо Мартини» приготовлен\nпросто. Надо дать водке Absolut и кофе сделать свою работу. Нет необходимости в буром\nсахаре, сахарном сиропе, ванили, сливках или\nмолоке. Только щедрая порция Absolut Original с\nравными частями ликера Kahlua и свежесваренного эспрессо. Хорошо встряхнуть в шейкере со\nльдом и процедить в бокал.\nЧто касается «Водки Мартини», то могу предложить «мокрый» твист c аперитивом Lillet Blanc и\nлимонной цедрой. Это очень вкусный и освежающий коктейль.\n4. Что изменилось в последние годы относительно использования водки в коктейлях? Каковы будут тренды в ближайшие годы?\nВодка используется сейчас гораздо более креативными способами. В этом заслуга сегодняшних\nбартендеров, которые обладают гораздо более\nобширными познаниями, нежели раньше.\nСовременные коктейли – это не просто смесь\nводки с фруктовым соком, у которой вкус сока.\nБартендеры делают коктейли, направленные\nспециально на водку. Либо они используют\nспособность водки подчеркнуть другие ароматы. Либо они принимают вызов этого «чистого\nхолста», который позволит им создать коктейль с\nавторской композицией вкусов и ароматов.\nЧто касается трендов, то если бы я их точно знал,\nто мог бы разбогатеть. Но я жду с нетерпением\nпродолжения сегодняшних успехов индустрии,\nкоторая переживает свой самый осмысленный\nпериод в истории. Я только надеюсь, что будет\nиметь место стабильность, и устойчивое развитие будет рассматриваться не как тренд, а как\nпостоянное изменение к лучшему.", "A bsolut . О дин источник . М ного вдохновения\nБренд Absolut связан с историей шведа по имени Ларс Олссон Смит. В 1879 году он представил «Absolut Rent Branvin», то есть абсолютно\nчистое спиртное, полученное путем непрерывного метода перегонки.\nВ 1979 году, чтобы отпраздновать столетие этого\nсобытия, напиток был воскрешен. Так появилась\nна свет водка премиум-класса Absolut.\nС тех пор водка Absolut не только покорила мир\nсвоим неопровержимым качеством, но и стала\nодним из иконических брендов современности,\nкоторый изо дня в день вдохновляет барменов\nна творчество.\n\nПроизводство\nВесь процесс производства Absolut сосредоточен в одном месте – в окрестностях поселка\nОхус, на юге Швеции. Это служит гарантией\nпостоянного качества водки.\nЗерно поступает с соседних полей, расположенных в радиусе 100 километров от Охуса. Причем,\nиспользуется пшеница твердых озимых сортов.\nЗерновое сусло подвергают брожению при\nпомощи уникального, «авторского» штамма\nдрожжей.\nЗатем в ходе перегонки и ректификации дистиллят проходит множество степеней очистки.\nВода добывается из местных скважин, глубина\nкоторых составляет более 140 метров. На протяжении тысяч лет эта подземная вода фильтровалась естественным путем – через каменистый\nгрунт, что обеспечивает ее чистоту и мягкость.\nЧистота водки Absolut подчеркивается отсутствием этикетки и особой формой бутылки.\n\nТворчество\nAbsolut – это бренд, вдохновивший многих деятелей исскуства, среди которых – Энди Уорхол\nи Дэмьен Херст. Мы встречаем искусство прямо\nна бутылках Absolut, которые отличаются своими\nароматами, как разные произведения творчества. Груша, ваниль, малина, ягоды асаи представлены на легендарных бутылках, как визуальное\nотражение заключенной в них ароматической\nчистоты. Натуральные ароматы плодов, собранных в момент их полной спелости, включены в\nчистую, аутентичную водку, позволяя бармену\nсоздать свой собственный шедевр.\nВодка Absolut вызывает творческий подъем,\nкоторый помогает найти вдохновение для завтрашних творений и покорить новые вершины\nсвоего искусства. Благодаря водке Absolut, у нас\nесть все, чтобы стать Абсолютным барменом.\n\nКирпичное здание дистиллерии возвышается над курортным поселком Охус. Это исторический центр\nпроизводства водки Absolut. Пшеницу выращивают на соседних полях. Воду добывают в местных\nскважинах. Перегонка проходит на современной дистиллерии, расположенной в 20 минутах езды\nот Охуса. Даже бутылки изготавливают неподалеку, что позволяет каждые три часа поставлять их в\nразливочный цех.\n\nAbsolut Original (1979 год).\n\nЧерносмородиновая Absolut Kurant\nпоявилась на свет в\n1992 году.\n\nЛимонная Absolut Citron\n(1988 год) легла в основу\n«Космополитена».\n\nAbsolut Mandrin с\nароматами мандарина и апельсина\n(1999 год).\n\nAbsolut Vanilia со сложными\nи нежными ванильными\nароматами (2003 год).\n\nAbsolut Pears с\nсоблазнительными\nароматами груши\n(2007 год).\n\nAbsolut Mango\nбыла выпущена на\nрынок в 2007 году.\n\nAbsolut Raspberri с интенсивным малиновым\nароматом (2004 год).\n\nAbsolut Berri Açaí\nвбирает вкусы ягод с\nразных концов света:\nголубика, гранат и\nасаи (2010 год).\n\nВ одк а 67", "Ч асть первая . Г лава 5\n\nД жин\nР еволюция джина не привлек ла к себе такого внимания , как революция кок тей лей . Н о она произошла и была значите льной . С недавних пор сущес твуют два\nбольших семейс тва джина , которые позволяют бармену расширить выразите ль ные средс тва в кок тейлях .\nС одной с тороны , ес ть знаменитые к лассические бренды джина , мож жеве ло вые , с ярким вк усом , « холодные к ак с та ль » и безукоризненные по с тилю .\nC другой с тороны , – новые бренды , обычно в так называемом запа дном\nс тиле , с облегченным ароматическим профилем . О ни с ложнее , зачас т ую не сколько с ла дковатые . В них не довлее т мож жеве льник , и иногда они содер ж ат удивите льные д ля джина ингре диенты . И х производят к ак к лассическими\nме тодами , так и с применением более современных технологий .\nИ спользование новых брендов джина в кок тейлях требуе т от миксолога боль шего опыта , поскольк у он должен переработать свои рецепты с уче том арома тического профиля напитк а . Н о результат може т того с тоить .\n\nП редок джина – женевер\nДистилляты с добавлением можжевеловых ягод были широко известны\nв Голландии с середины 16 века и зачастую употреблялись в медицинских\nцелях. Уже в конце 16 века появился\nженевер (genever или jenever), что\nв переводе с голландского означает\n«можжевельник».\nЖеневер быстро стал популярным\nнапитком. Так, в рацион голландских\nморяков входило примерно полпинты\nженевера. Кроме того, он сыграл свою\nроль и в становлении коктейльной\nкультуры. Согласно исследованиям современного американского\nписателя-историка Дэвида Уондрича,\nименно женевер использовал в своих\nкоктейлях легендарный бартендер\nДжерри Томас в середине 19 века.\nВ производстве женевера важную\nроль играет «солодовый дистиллят»,\nкоторый в Голландии называется malt\nwine.\n\n68 Д жин\n\nИ с тория\nДжин берет свое начало в грубоватой и могучей\nможжевеловой настойке, которая была изобретена в 16 столетии голландцем Франциском Сильвиусом и использовалась в медицине против\nболей в желудке. Когда предок джина пересек\nСеверное море, он больше напоминал ржаной\nвиски, чем сегодняшний кристальный джин. По\nприбытии в Англию он утратил свой цвет и приобрел престиж, пусть и не за один день.\n\nГолландская храбрость\nВо время Тридцатилетней войны (1618-1648) британские солдаты открыли для себя согревающее\nи хмельное свойство голландского можжевелового напитка. Они назвали это ощущение «Dutch\nCourage» (голландская храбрость) и привезли напиток в родную Англию. В то время в Англии стало развиваться винокурение, и местный напиток\nс добавлением можжевеловой ягоды получил название «джин».\nУильям III, взошедший на престол в 1689 году, по-\n\nкровительствовал винокурению. Все желающие\nмогли заниматься перегонкой, объявив об этом\nпублично за 10 дней. Качество джина в то время\nбыло очень сомнительным, он представлял собой странное на вкус сладковатое варево. Однако невысокая цена обеспечивала джину грандиозный успех у простого населения, в том числе\nу женщин и детей. В 1730 году в Лондоне существовало около 7000 точек, торгующих спиртным.\nДжин продавался повсюду, даже у цирюльников.\nСогласно подсчетам, в бедных кварталах Лондона джином торговали в каждом четвертом доме.\nПьянство и деградация народа принимали угрожающие масштабы.\nВ 1736 году был принят закон под названием «Gin\nAct», поднявший налог на джин в несколько раз.\nОднако эти меры только привели к расцвету подпольного винокурения и дальнейшему росту\nпьянства.\nGin Act отменили в 1742 году. Были установлены\nразумные ставки налога на джин, что положило", "начало цивилизованному развитию винокурения\nи улучшению качества спиртного.\n\nВосхождение по социальной\nлестнице\n\nМ ожжевельник\nи его ягоды\nВечнозеленый хвойный кустарник\nМожжевельник относится к семейству Кипарисовые. Можжевельник\n– долгожитель, он может достигать\nвозраста 600 лет.\nДля производства джина используются ягоды Можжевельника обыкновенного (Juniperus communis), который\nраспространен в центральной Европе.\nМожжевеловая ягода обладает смолисто-хвойными ароматами. Кроме\nджина, она находит применение в\nкулинарии, при изготовлении некоторых ликеров, а также используется\nв медицине в качестве стимулирующего пищеварение и противовоспалительного средства.\n\nВ 1820-е годы торговцы джином начали испытывать острую конкуренцию со стороны пивных,\nдля открытия которых не требовалась лицензия.\nВ ответ на эту конкуренцию в английских городах стали появляться дворцы джина (Gin Palaces).\nЭто были красивые, а порой просто роскошные\nзаведения.\nНовая клиентура – порожденный индустриальной революцией рабочий класс – забывала в магическом интерьере дворца джина тяготы своей\nнелегкой жизни. Дворцы джина способствовали\nулучшению имиджа напитка. Джин перестали покупать на улице, ушло в прошлое спиртное сомнительного происхождения и связанное с этим\nпьянство и деградация народа.\nДжин обрел социальных статус, и его начали пить\nв высших слоях населения. Статус джина окончательно утвердился благодаря изобретению непрерывной перегонки. Аппарат Аэнеаса Коффи\nзначительно улучшил очистку спирта, который\nсоставляет основу джина и определяет его качество. Ведь для джина не имеют значения ни традиции, ни «вкус земли». Важно мастерство, испытанный рецепт и солидные средства.\nВысокая стоимость нового оборудования сконцентрировала производство джина в руках нескольких обеспеченных компаний. А подпольные винокурни прекратили свое существование.\nСладкий джин вышел из моды, уступив место сухому (dry gin).\nДжин стал ингредиентом первых смешанных напитков и дал рождение многим историческим\nкоктейлям.\n\nИнгредиенты джина\nСпирт\nСпирт должен иметь крепость не менее 96% vol.\nи быть прекрасно очищенным, не иметь ни привкусов, ни посторонних запахов. Базовым сырьем\nдля него служит в основном зерно, реже – черная патока (или меласса, то есть побочный продукт сахарного производства) и картофель.\n\nБотаникалы (Растительные пряности)\nГлавным и обязательным компонентом джина является можжевеловая ягода. Ее обычно привозят\nиз Италии и Балканских стран. Некоторые производители выдерживают ее около года в тряпичных\nмешочках в прохладном, сухом помещении для дозревания и концентрации ароматов.\n\n70 Д жин\n\nДругие пряности – это кориандр, ангелика, фиалковый корень, миндаль, апельсиновые и лимонные\nкорки, лакрица, мускат, кардамон, корица и прочие.\nКак правило, для производства качественного\nджина необходимо от 6 до 10 растительных компонентов, но в большинстве случаев рецепт приготовления джина является коммерческой тайной\nпроизводителя.\n\nВода\nВода, применяемая как при дистилляции джина, так\nи для снижения его крепости перед разливом по\nбутылкам, должна быть очень чистой, прозрачной и\nне иметь никаких привкусов. Эту воду обычно подвергают деминерализации, то есть очистке от различных соединений, входящих в ее состав.\n\nД ва способа\nпроизводс тва джина\nСегодня джин производится во многих странах\nдвумя способами. Первый традиционный способ – дистилляция – дает наиболее качественный\nджин, называемый Distilled Gin. Второй способ –\nсмешивание – используют для получения дешевого джина.\n\nДистилляция\nСпирт разбавляют водой для снижения его крепости примерно до 45% vol., добавляют пряности\nи помещают эту смесь в перегонный куб (обычно\nмедный).\nВ некоторых случаях пряности кладут на специальные лотки или в мешочки и размещают их над\nспиртом.\nЗатем проводят перегонку, цель которой – насытить спиртное ароматами пряностей.\nПри этом отделяют «головы» и «хвосты», сохраняя\nбогатое ароматами «сердце» дистиллята крепостью около 80% vol.\nВ него добавляют воду, снижая содержание алкоголя.\nПолученный джин готов к употреблению, его крепость варьируется от 37,5 до 47,3% vol. Этим способом получают такие разновидности джина, как\nLondon Dry Gin и Plymouth Gin.\n\nСмешивание\nВ первую очередь изготавливают «джиновую эссенцию». Ее получают либо путем дистилляции\nрастительных компонентов вместе с небольшим\nколичеством спирта в перегонных аппаратах малого размера, либо выжимкой пряностей. Затем\nэссенцию смешивают с обычным спиртом и разбавляют водой.", "Как делают\n\nд жин\n\n1. Можжевеловая ягода – главный\nкомпонент джина.\n\n2. Можжевеловую ягоду и другие пряности (кориандр,\nминдаль, лимонные корочки и т.д.) дистиллируют со\nспиртом, разбавленным водой до 45% vol.\n\n4. Джин разбавляют водой и\nразливают по бутылкам.\n3. Мастер перегонки отделяет\n«головы» и «хвосты» от «сердца»\nдистиллята.\n\nД жин 71", "B ombay S apphire . П рошлое , настоящее\nи будущее в одной бутылке джина\nСтаринный рецепт\n\nВнизу. Дистиллерия «Лаверстоук\nМилл», где сегодня изготавливают\nджин Bombay Sapphire. Здесь используются вместе старинные и инновационные производственные методы.\n\nМастер-ботанист – Ивано Тонутти\n– использует для джина Bombay\nSapphire десять пряностей из разных\nстран мира.\n\nРецепт Bombay Sapphire восходит к 1761 году.\nДля него используется десять отобранных\nвручную растительных ингредиентов из разных\nуголков мира. Напиток производится при 100%ой паровой мацерации.\nДля того чтобы довести крепость напитка до 47%\nvol., в полученный крепкий ароматный спирт\nдобавляется чистейшая вода из реки Тест, на\nкоторой расположено производство. Благодаря\nмеловым породам, через которые бьют подземные источники, питающие русло этой реки, ее\nвода считается одной из самых чистых в Англии.\nВ итоге получается уравновешенный, разносторонний и сложный джин, в котором ярко проявляет себя каждая пряность.\n\nБотаникалы\nБотаникалы играют ключевую роль в производстве джина. А для Bombay Sapphire, – может\nбыть, даже и еще более ключевую, ибо это\nединственный джин, у которого есть собственный мастер-ботанист. Его зовут Ивано Тонутти.\nОн работает напрямую с фермерами, чтобы\nзаполучить самые качественные растительные\nкомпоненты, укоротить цепочку поставщиков и\nобеспечить постоянство качества.\nДля создания Bombay Sapphire используется\nуникальная смесь из 10 растительных компонентов, собранных по всему миру, причем, точно\nв пропорциях, предусмотренных старинным\n\nрецептом, чтобы ни один из компонентов не\nбыл доминирующим, а джин получился мягким и\nсбалансированным.\nМиндаль из Испании сообщает джину едва уловимый ореховый аромат.\nКорень дудника из Германии подчеркивает вкус\nдругих компонентов своими сладковато-суховатыми оттенками.\nКора кассии из тропических лесов Индокитая\nнаделяет джин пряными нотами и приятной\nсладостью.\nЗерна кориандра из Марокко привносят в аромат пряно-цитрусовые оттенки.\nЯгоды кубеба с острова Ява придают джину согревающий, почти ментоловый вкус.\nРайские зерна из Африки дарят напитку легкие\nи роскошные шоколадно-цитрусовые ароматы с\nострой перчинкой.\nЯгоды можжевельника из Италии придают джину\nароматы сосновых шишек, лаванды и камфоры.\nЦедра лимона из Испании сообщает яркие\nлимонные ноты.\nЛакрица из Китая придает глубину ароматической композиции. А фиалковый корень из\nИталии объединяет ароматы всех других компонентов.\n\nФутуристическая дистиллерия\nДистиллерия «Лаверстоук Милл», где сегодня\nпроизводится джин Bombay Sapphire, открылась\nв 2014 году.\nФутуристические формы оранжереи, которая\nрасположена при дистиллерии, соответствуют\nфилософии дома, в частности – заботе о будущем, ибо воздействие на окружающую среду\nздесь сведено к минимуму.\nНа дистиллерии «Лаверстоук Милл» инновационные и старинные производственные методы\nсоседствуют друг с другом.\n\nПерегонка\nОдна из особенностей Bombay Sapphire – это\nтехнология его перегонки. Растительные компоненты «завариваются» на спиртовых парах, а\nне кипятятся. Особая конструкция перегонных\nкубов позволяет отделить растения от спирта.\nТолько поднимающиеся пары проходят через\nмедную корзину, в которой находятся растительные компоненты, уложенные в определенном\nпорядке. Благодаря такому устройству аппарата,\n\n72 Д жин", "ароматы каждого из 10-ти растений экстрагируются в четко определенных пропорциях, что\nдает джин со сложными и утонченными ароматами.\n\nBombay Sapphire и коктейли\nBombay Sapphire – это бренд, прочно связанный\nс миксологией. С этим джином работают лучшие\nмиксологи мира. И они добиваются фантастических результатов.\nBombay Sapphire придает коктейлю исключительную глубину и ароматическую плотность,\nпревращая его в произведение искусства.\nКак известно, для создания своего культового\nкоктейля «Брэмбл» Дик Брэдселл использовал\nджин Bombay Sapphire. Известно тоже, что это\nодин из любимых брендов джина легендарного\nбармена Сальваторе Калабрезе.\nСложные ароматы джина Bombay Sapphire\nестественным образом возвышают ароматы прочих ингредиентов и позволяют отыскать Грааль\nмиксологии: сумма должна превосходить по\nкачеству каждое отдельно взятое слагаемое.\n\nБренд, устремленный в будущее\nРадж Награ, глобальный амбассадор Bombay\nSapphire, свидетельствует о том, что этот бренд\nстоит у истоков современного возрождения джина. Он говорит, что «Bombay Sapphire во многом\nобеспечивает сегодняшний успех категории и,\nпо всей видимости, будет продолжать играть\nпервую скрипку в оркестре индустрии благодаря\nстабильным методам производства. Bombay\nSapphire имеет все козыри, чтобы сопровождать\nвозрастающий спрос на джин и творческие\nамбиции бартендеров, создающих креативные\nкоктейли».\nСхема производственного процесса Bombay Sapphire.\n\nД жин 73", "В иды джина\nТермин\n«N ew W estern Style G in »\nВ последние годы произошел небывалый рост количества брендов джина.\nЭто привело к тому, что был введен\nв обращение новый термин – New\nWestern Style Gin – по отношению к\nнекоторым современным маркам. Их\nпринципиальное отличие от классического джина кроется в отношении к\nможжевельнику.\nЭти джины «нового западного стиля»,\nразумеется, включают можжевеловую\nягоду, чтобы иметь право называться\n«джином». Но, в отличие от традиционного джина, ароматический фокус\nсмещен с можжевелового аромата на\nдругие пряности (например, цитрусовые).\nПонятно, что такая ароматическая политика дает новым брендам соответствующие маркетинговые аргументы,\nпозволяющие им хоть как-то выделиться на фоне исторических марок,\nдля которых можжевеловый аромат –\nэто традиционный компонент джина.\nНадо сказать, что термин «New\nWestern Style Gin» никак не закреплен\nзаконодательным образом.\n\n74 Д жин\n\nLondon Dry Gin (Лондон Драй джин)\n\nOld Tom Gin (Олд Том джин)\n\nВ конце 19 века джин из Лондона получил название London Dry Gin в знак гарантии его качества.\nСегодня это название относится к сухому джину\nвысшего качества, полученному методом дистилляции. Слово «сухой» указывает на отсутствие\nсахара.\nПод названием London Dry Gin можно производить джин в любой точке мира, но только таким\nже образом, как это делается в Лондоне.\n\nТрадиционный английский джин, подслащенный\nсахарным сиропом. Он пользовался огромной популярностью и стал предшественником сегодняшнего джина. Его название возникло от того, что в 18\nвеке такой джин продавался в деревянном аппарате в форме кота (по-английски: Tom-cat). Покупатель\nклал деньги в рот кота, и джин вытекал из трубы,\nскрытой в его лапе.\n\nPlymouth Gin (Плимут джин)\nЭто одновременно и марка джина, и его разновидность. Единственная винокурня, производящая Плимут джин, называется «Black Friars\nDistillery». Она была основана в 1793 году в здании\nбывшего монастыря в городе Плимут, на юго-западе Великобритании.\nИзначально джин из Плимута был самым крепким\nв Англии. Он производился, в первую очередь, для\nкоролевского морского флота, где ценили его «компактность».\nДжин из Плимута изготавливают путем дистилляции. Его разбавляют местной водой, которая придает ему мягкость. Он обладает сильным ароматом можжевельника.\n\nА роматизированный джин\nАроматизированный джин производят путем вымачивания пряностей в джине. Его подслащивают сахаром, фильтруют и разливают по бутылкам.\nТакже его можно получить простым смешением\nджина, ароматизаторов и сахара. Среди этих джинов наиболее часто встречаются следующие.\n\nSloe Gin (Слоу джин)\nДжин с ароматами терна (разновидности сливы).\n\nLemon Gin (Лемон джин)\nДжин с ароматами лимонных корок.", "Д жин B eefeater . Л ондонская классика\nBeefeater символизирует Британию, давшую рождение джину, футболу и чаепитию в пять часов.\nДолгое время это был единственный джин, который производили в Лондоне. Поэтому некоторые\nизвестные миксологи питают к нему поистине\nрелигиозное благоговение.\nВ классических коктейлях – от «Белой леди»\nдо «Рамос Джин Физза» – мощь, равновесие и\nсвежесть джина Beefeater творят чудеса. А благодаря своим ароматам лимона и можжевельника,\nон образует идеальное сочетание с тоником и\nпридает джин-тонику настоящий класс.\n\nИстория\nВ 1860-х годах фармацевт Джеймс Барроу приобрел в лондонском Челси небольшую винокурню,\nоснованную в 1820-х годах. Использовав свои\nпознания в ботанике, он создал джин.\nДжеймс назвал его в честь гвардейцев, охранявших лондонский Тауэр, легендарная сила\nкоторых, как говорили, поддерживалась огромными порциями говядины, за что их прозвали\n«бифитерами» (beef eater – мясоед). Именно так\nЙоменские стражники, как они на самом деле\nназывались, сделались эмблемой бренда.\nВ 1907 году историческая винокурня в Челси ста-\n\nла маловата для производства джина Beefeater,\nи она была переведена в лондонский район\nЛамбет.\nВ своем нынешнем – третьем по счету – здании,\nкоторое находится в лондонском квартале Кеннингтон, дистиллерия Beefeater обосновалась в\n1958 году.\n\nДесмонд Пейн уже более 20 лет\nработает мастером перегонки на\nдистиллерии «Бифитер» и производит\nджин, следуя оригинальному рецепту\nфармацевта Джеймса Барроу,\nкоторый разработал его во второй\nполовине 19 века.\n\nМастер перегонки\nВот уже более 20 лет мастером перегонки на\nзаводе в Кеннингтоне работает Десмонд Пейн,\nкоторый год за годом воспроизводит вкус джина\nBeefeater.\nОн говорит, что для поддержания сложившегося\nстиля джина отбор пряностей играет ключевую\nроль. Поэтому в его календаре наибольшее значение имеют даты, когда он оценивает образцы\nрастений нового урожая.\nЧто касается основного аромата джина – можжевельника, то регулярно изучается свыше\nдвух сотен его образцов с тем, чтобы подобрать\nдостаточно вариантов для воссоздания требуемого стиля джина Beefeater. Классического по\nдуху, чистого по характеру, уравновешенного\nпо вкусу, с балансом сложности в своей ароматической палитре.\n\nД жин 75", "джин внезапно очутился на втором плане. Даже\n«Драй Мартини» перекинулся в стан врага: к водке. С 1970-х и до начала 2000-х годов джин подавали в основном лишь в виде джин-тоника искушенным завсегдатаям баров (они-то никогда не\nзабывали холодный металлический вкус своего\nлюбимого напитка).\nВ ходе коктейльной революции и реабилитации\nпрошлого современная миксология заново открыла для себя джин.\nМолодые бармены внезапно прониклись страстью к этому историческому напитку, то мощному, то утонченному, расцветающему в самых\nневообразимых коктейлях, какие только можно\nпридумать.\nСегодня джин, как и прежде, является самым употребительным крепким напитком в классических\nкоктейлях.\n\nДжин и фудпэринг\n\nП одача джина\nНесмотря на то что некоторые люди могут по достоинству оценить джин в чистом виде или со\nльдом, этот напиток прежде всего предназначен\nдля коктейлей. Он является великолепным элементом для смешивания, ароматным, мягким, с\nбольшими возможностями.\nВ 1930-х годах примерно две трети существовавших коктейлей готовились именно на основе\nджина. Однако позднее перед лицом трудного\nпрошлого или, проще, приливов и отливов моды\n\n«Когда речь заходит о джине, возможности фудпэринга безграничны», – говорит Радж Награ,\nглобальный бренд-амбассадор бренда Bombay\nSapphire.\nДействительно, напитки на основе джина, например джин-тоник, легко сочетать с едой благодаря\nботаникалам, ведь они используются не только\nдля джина, но и на кухне в качестве приправ и\nпряностей. Эти растительные компоненты хорошо узнаваемы как бартендерами, так и шефповарами. Они служат ориентиром при разработке гастрономических сетов.\n\nИ звес тные бренды\nС ове ты бармену\nВкус джина\nХороший джин, дегустируемый в чистом\nвиде, должен создавать во рту сильное ощущение холода («холодный как\nметалл» – говорят про джин в Англии),\nслужащее противовесом обжигающему\nдействию алкоголя. Сладковатый вкус\nджина обычно плохой знак, поскольку\nза ним может скрываться спирт плохого\nкачества.\n\nАроматы джина\nАромат можжевельника у хорошего\nджина должен быть сильнее, чем ароматы других пряностей, но в то же время\nне заглушать запахи лимона, апельсина,\n\n76 Д жин\n\nкориандра, миндаля и других используемых растительных компонентов.\n\nВыбор джина\nИспользуйте в баре только высококачественный джин, выбирайте джин\nизвестных марок, не вызывающих у\nвас сомнения. Плохой джин сделает\nследующее утро вашего гостя труднее,\nчем пробуждение мертвеца, и он к вам\nбольше не придет.\nВсе это усугубляется еще и тем, что\nджин – это один из самых основных напитков бара, ведь бар без джина подобен свадебной ночи без невесты. Ваша\nошибка в его выборе не будет прощена.\n\nСегодня категория джина переживает головокружительное развитие. Каждый год на рынке\nпоявляются десятки новых брендов. Далее перечислены исторические и наиболее известные\nбренды джина.\n\nBombay Sapphire (Бомбей Сапфир)\nДжин Bombay Sapphire изготавливают в Англии\nпо рецепту 1761 года. Для него используют 10\nтщательно отобранных пряностей из разных\nуголков мира: кориандр – из Марокко, миндаль –\nиз Испании, лакрицу – из Китая, лимонные корочки – из Андалузии, «райские зерна» – из Африки.\nБогатый букет джина Bombay Sapphire обусловлен особым способом перегонки: алкогольные\nпары насыщаются ароматами, проходя сквозь\nпряности, разложенные в медной корзине в\nопределенном порядке. Безупречная прозрачность напитка достигается использованием воды\nиз реки Тест.", "Д жин холодной перегонки O xley .\nВ ысокие технологии , возвышенные ароматы\nOxley – это джин, в котором каждый аромат проявляется с удивительной чистотой и ясностью.\nБлагодаря этим качествам, он является необходимым спиртным напитком в арсенале миксолога, который постоянно пребывает в поиске\nнаиболее изысканных, чистых и, насколько это\nвозможно, оригинальных ароматов.\n\nПроизводственный процесс\nЭтот джин обязан своей ароматической ясностью и свежестью своеобразной технологии\nпроизводства, которую называют «холодной\nперегонкой».\nМы знаем, что температура кипения жидкости\nзависит от давления. Чем ниже давление, тем при\nболее низкой температуре закипает жидкость.\nКроме того известно, что при классической\nперегонке джина все растительные ингредиенты\nнагреваются. В результате, ароматы лимона, можжевельника, ягод и кореньев, используемых для\nджина, при нагревании меняются, искажаются\nили даже исчезают. Метод холодной перегонки\nпозволяет избежать этой проблемы и получить\nконденсат, сохранивший ароматы в состоянии,\nмаксимально близком к первоначальному.\nВ случае с джином Oxley применяется особенная\nтехнология, позволяющая перегонку при температуре ниже нуля. Смесь растительных компонентов настаивают в спирте, а затем помещают\nв глубокий вакуум и перегоняют. Полученный\nконденсат отличается невероятной чистотой. Его\nразбавляют водой до крепости 47% vol. и получается джин Oxley.\n\nнальным образом отличается от той, которая образуется при низкой температуре дистилляции.\nА джин Oxley дистиллируют при температуре\nминус 5 градусов!\nРезультат превзошел все ожидания, на которые\nможно было надеяться при использовании\nподобной технологии. Джин отличается удивительной ясностью. Каждый аромат ощущается с\nнемыслимой свежестью и безошибочно определяется благодаря своей чистоте.\n\nДжин Oxley и коктейли\nВ коктейлях джин Oxley превосходен во всех\nклассических рецептах. Кроме того, в своих собственных рецептах миксолог может бесконечно\nварьировать ароматы этого джина, выделяя то\nодин, то другой, чтобы предложить гостям выразительные и изысканные коктейли.\n\nВосемь лет технологических\nизысканий\nВ итоге при таком производственном процессе,\nлимон, апельсин, можжевельник, ваниль, анис,\nкориандр, мускатный орех, грейпфрут – в общей\nсложности около 15 ботаникалов – восходят на\nвершину ароматической экспрессии.\nДаже если на словах этот метод кажется несложным, для достижения результата потребовалось\n8 лет совместных изысканий ученых и мастеровдистиллеров.\nКроме того, пришлось опробовать 38 различных\nрецептов, чтобы найти идеальные пропорции\nмежду растительными компонентами. Дело в\nтом, что ароматическая композиция, полученная\nобычной перегонкой, то есть при 78°C, карди-\n\nД жин 77", "Beefeater (Бифитер)\n\nMonkey 47 (Манки 47)\n\nНа тихой улочке в квартале Кеннингтон расположена лондонская винокурня, где изготавливают\nджин Beefeater. При его производстве следуют\nиспытанному и секретному рецепту, который\nпридумал изобретательный аптекарь Джеймс\nБарроу. В 1860-х годах он создал джин, сочетающий силу и легкость. Он назвал его Beefeater в\nчесть стражников лондонского Тауэра, считая,\nчто они лучше всего символизируют традиционность лондонского джина.\n\nЭтот джин появился на свет в Германии в 2008\nгоду. Его создатель – Александр Штайн – вдохновился рецептом, восходящим к середине 20 века.\nДля джина используются 47 растительных компонентов. После перегонки дистиллят разбавляют\nгорной водой до крепости 47%, а потом выдерживают 100 дней в глиняных сосудах.\n\nOxley (Окслей)\n\nЭтот джин, созданный в 1769 году Джоном Гордоном, продолжает производиться по первоначальному рецепту. Тройная перегонка спирта с\nрастительными компонентами дает мощный и\nдушистый джин.\n\nДжин Oxley производится в том же месте, что и\nизвестный бренд Bombay Sapphire, а именно на\nдистиллерии «Лаверстоук Милл». Однако технология перегонки этих двух джинов совершенно\nразная, поэтому у каждого из них свой характер.\nOxley дистиллируют при отрицательной температуре, которая лежит в основе его свежих, звонких, отчетливых ароматов.\n\nHendrick's (Хендрикс)\n\nTanqueray (Тэнкерей)\n\nДжин Hendrick's появился на рынке в 1999 году.\nОн производится в Шотландии и перегоняется\nв двух старинный аламбиках. Hendrick's известен своими нотами розы и огурца, которые используются для его ароматизации. Кроме того,\nHendrick's обладает более классическими ароматами кориандра, можжевельника, ангелики и\nцитрусовых корочек.\n\nЭтот джин был создан Чарльзом Тэнкереем в Лондоне в 1830 году. Классический Tanqueray – элегантный джин с нотами можжевельника и кориандра. Кроме того, в 2000 году на свет появился\nTanqueray Ten. В ходе его производства используются свежие фрукты и пряности, чтобы джин\nобрел ароматы грейпфрута, апельсина, лайма, а\nтакже кориандра, можжевельника и ромашки.\n\nGordon’s (Гордонс)\n\n78 Д жин\n\nСбор растительных компонентов\nдля джина Monkey 47. Его производят в горном и лесистом регионе\nЩварцвальд (в переводе с немецкого\n– «Черный лес»), который расположен\nна юго-западе Германии. Здесь же\nсобирают около трети ингредиентов,\nиспользуемых для Monkey 47. Они\nсочетаются с экзотическими ботаникалами, которые поступают со всего\nмира.", "Д жин M onkey 47.\nД обро пожаловать в Ч ерный лес !\nВ старинном аптечном флаконе, с пробкой из\nдубовой коры и обезьяной на этикетке джин\nMonkey 47 стал культовым напитком в мире\nкоктейлей. Его бутылка, столь же декоративная,\nсколь несущая вдохновение, с некоторых пор\nцарствует в лучших барах планеты.\nВ основе успеха Monkey 47 лежит романтичная\nистория, удачный рецепт и кропотливый труд.\nЭтот сложный и уравновешенный напиток нравится как ценителям джина, так и тем, кто только\nначинает свое знакомство с этой категорией.\n\nРомантичная история\nПо окончании Второй мировой войны старший\nбританский офицер Монтгомери Коллинз отвечал\nза восстановление руин Берлина.\nВ ходе реконструкции зоопарка он подружился с\nобезьяной по имени Макс. После восстановления\nБерлина Монтгомери решил остаться в Германии\nи переехал в регион Шварцвальд (от немецкого\n«Черный лес») на юго-западе страны, где он приобрел гестхаус, назвав его «Дикая обезьяна».\nПомимо того, Коллинз, будучи истинным британским джентльменом, попытался создать свой\nсобственный авторский джин и дал ему имя Max\nthe Monkey – Schwarzwald Dry Gin «(Обезьяна по\nимени Макс» – Сухой джин из Шварцвальда).\nПозднее подробный рецепт этого джина был обнаружен при реновации гестхауса. Чуть больше\nдесяти лет тому назад Александр Штайн загорелся идеей воссоздать джин Монтгомери Коллинза\nи основал дистиллерию Black Forest.\n\nТрадиционный, но сложный рецепт\nАлександр Штайн вдохновился историей\nМонтгомери Коллинза. Но, как говорит он сам,\nего планы были гораздо более далекоидущими:\nон стремился создать лучший в мире джин. Его\nджин должен был основываться на опыте местных производителей спиртного из ягод, но при\nэтом сохранять характер настоящего джина.\nПосле переработки 120 вариантов рецепта был\nвыбран лучший из них.\nВ основу ароматической композиции джина\nMonkey 47 легла идея Монтгомери Коллинза: сочетание растительных ингредиентов из Шварцвальда с экзотическими специями.\nДве трети ботаникалов собираются со всего\nмира.\nВ частности, лимоны поступают из Сицилии,\nгрейпфруты – из ЮАР, лаванда – из Франции.\nМожжевеловая ягода – с севера Италии и Хорватии. Сочетание ароматных перцев – из Азии.\nИз Шварцвальда происходит около трети ботаникалов, включая бузину, бруснику, терновник,\nлистья ежевики, а также ангелику, цветы акации,\nшиповник, шалфей и вербену.\nСекрет этой эксцентричной комбинации заключается в ключевом ингредиенте – бруснике, придающей напитку необычный вкусовой\nштрих.\nВ общей сложности в состав джина входят 47\nботаникалов, образуя сложный и многогранный\nнапиток, в котором каждый сумеет найти требующиеся ему ароматы.\n\nП одача\nДжин Monkey 47 – один из редких\nбрендов джина, который можно\nдействительно оценить в чистом\nвиде. Он мягок и приятен на вкус.\nВместе с тем, его сложный характер, без чрезмерного преобладания\nможжевельника, позволяет создавать\nинтересные коктейли.\nКаждый найдет в его аромате что-то\nсвое: кто-то, в первую очередь, почувствует лаванду, кто-то – цитрус.\nКреативный миксолог всегда сумеет\nподобрать рецепт, который выделит\nту или иную сторону джина Monkey 47.\nВ этом и заключается сила сложных и\nудачных напитков, которые не имеют\nграниц для самовыражения, кроме,\nразумеется, – таланта миксолога.\n\nАлександр Штайн – создатель бренда\nMonkey 47 с легендарным аппаратом\nдистилляции Apparatus Alembicus\nMaximus, который представляет собой\nсердце дистиллерии. Аппарат был\nсобран вручную с использованием\nмноговековых приемов.\nДжин дистиллируют в небольших\nперегонных кубах. Затем крепость\nспиртного доводится до 47% с помощью свежей горной воды.\nВ течение 100 дней джин выдерживают в глиняных сосудах, прежде чем\nразлить в знаменитые бутылки.\nВ результате получается джин, который обладает свежестью, содержит\nпродолжительные горькие ноты, а\nтакже небольшую сладость во вкусе.\n\nД жин 79", "Ч асть первая . Г лава 6\n\nВ иски\nН а протяжении ис тории к ат егория виски преврат и лась в це лое семейс т во ,\nоб ъе диняющее с т раны и кон т инен т ы . В мес т е с т ем , виски – это с толь же распро с т раненный , сколь и у ник а льный напи ток .\nБ армен должен прояви т ь все свое иск усс т во , ч тобы под ат ь виски наи лу чшим\nобра зом , сознава я себя мас т ером по с ле днего жес та . И бо именно он нано си т по с ле дний , иногд а г ениа льный ш т рих на одно из прекраснейших произ ве дений че ловеческой циви лизации .\n\nКто первым создал виски?\nВиски разных стран связаны с известными личностями. Первая знаковая фигура в мире виски\n– это легендарный Святой Патрик, покровитель\nИрландии и ирландского виски.\nЗа ним следуют реальные исторические персонажи, каждый из которых внес огромный вклад\nв развитие этого напитка: Аэнеас Коффи, Эндрю\nАшер, Самюэль Бронфман, Масатака Такетсуру...\nКак и для хлеба, текучей и одухотворенной формой которого является виски, в производстве\nмогут быть использованы любые злаки. От ячменя до ржи, включая кукурузу и пшеницу. Все они\nимеют свои особенности и принимают участие в\nформировании вкусового богатства напитка.\nПерегонка виски следовала за развитием человеческой цивилизации. От небольших простеньких перегонных кубов подпольных винокуров\nХайленда к блестящим «пот стилам», а затем – к\nнепрерывной перегонке, сделавшей возможным\nраспространение виски и его международное\nпризнание.\nДа, виски всегда объединял самые стойкие традиции с последними инновациями.\nСегодня качество виски продолжает улучшаться\nс каждым днем. Это касается совершенствования\nброжения, перегонки и выдержки, а также углубления знаний об ароматических составляющих\nвиски и прогресса в блендинге, который с некоторых пор поднялся на недосягаемую прежде\nвысоту.\n\n80 Виски\n\nПроизводство виски сочетает искусство и науку,\nу которых нет пределов. Поэтому не будет ошибкой сказать, что сегодняшние виски, скорее всего,\nлучшие из когда-либо существовавших.\nДругой важный момент: виски – это универсальный напиток. Он схож с пивом в отношении солода, а с вином – в том, что касается выдержки.\nБолее того, каждая страна-производитель внесла\nсобственные инновации, которые подхватывались другими странами. Например, шотландский\nвиски хранился в бочках из-под хереса, к которым впоследствии присоединились бочки из-под\nбурбона. А сам бурбон произошел от ирландского виски, но при этом бочки для него обжигают.\nВ Теннесси добавили фильтрацию сквозь уголь\nиз кленовой древесины, которая в свою очередь\nбыла подхвачена несколькими японскими дистилляторами, правда, с использованием бамбукового угля...\nВоображение производителей виски не знает\nграниц. Все, что помогает усовершенствовать виски, тут же подхватывается где-нибудь в другой\nчасти света.\nНаконец, мастер-блендер виски, скорее всего,\nвладеет самыми широким знаниями из всех мастеров купажа в мире спиртных напитков. Он\nимеет в своем распоряжении бесконечное множество инструментов, чтобы, создавая бленд,\nотразить совершенное и особенное сочетание\nвкусов и ароматов.\n\nИрландцы и шотландцы оспаривают\nдруг у друга приоритет создания\nвиски. Ирландцы напоминают о том,\nчто самые старинные шотландские\nвинокурни (а именно из Айла) находятся напротив Ирландии. Они также\nнастаивают на том, что самая древняя\nвинокурня – это ирландская Бушмилс, официально основанная в 1608\nгоду. Более того, они доказывают,\nчто она неофициально действовала\nзадолго до того времени, и подтверждают свои доводы словами из книги\n«Description of Pembrokeshire» (1602\nгод): «Беженцы из Ирландии, занимавшиеся ремеслом у себя на родине, изготавливают в большом количестве\n«воду жизни» и продают ее по всей\nстране с лошадей и мулов...».\nАргументация шотландских историков строится на первом письменном\nупоминании крепкого напитка,\nизготовленного из ячменя. Оно было\nнайдено в шотландском документе\n1494 года. В сохранившейся казначейской летописи есть запись: «Восемь\nмер солода для монаха Джона Кора на\nизготовление «воды жизни». Такого\nколичества зерна хватало для получения более 1000 литров спиртного.\nВ любом случае, ирландский и\nшотландский виски имеют общего\nпредка. Это «вода жизни», которая\nна гэльском языке называлась uisge\nbeatha. Со временем название,\nпотеряв второе слово, трансформировалось в whisky у шотландцев и в\nwhiskey у ирландцев.", "Ш отландский виски\nУ же в 15 веке дис тилляция с та ла распрос траненным занятием в Ш отландии .\nОднако в те времена она была архаичной и дава ла только грубое спиртное .\nШ отландцы добились значите льного прогресса в облас ти перегонки в 16 веке .\nП ервые усовершенс твования произошли пос ле закрытия монас тырей . М онахи ,\nвладевшие иск усс твом перегонки лучше всех , разде лили с винок урами много вековой опыт, тайно копившийся за монас тырскими с тенами .\n\nТехнический прогресс способствовал совершенствованию процесса перегонки. Постепенно винокуры научились охлаждать змеевик ледяной\nводой. И уже в середине 16 века перегонный куб\nобрел типичную форму луковицы, сохранившуюся и по сей день.\n\nВинокурение в подполье\nИстория шотландского виски связана с непрестанной борьбой подпольных винокуров с правительством, жадным до налоговых сборов. В\n1555 году после скудного урожая зерна шотландский парламент ввел налог на ячмень, направляемый на перегонку. За ним последовал ряд новых\nналогов, предназначенных для финансирования\nвойны с Англией. А британцы, по иронии судьбы,\nеще больше повысили налог на виски в 1707 году\nпосле объединения шотландского и английского\nпарламентов. Эта разорительная мера вынудила винокуров уйти в подполье. Контрабандисты\nскрывались от сборщиков налогов в горах, непрестанно собирая и разбирая вблизи чистых\nречек свои небольшие медные перегонные аппараты. В это время шотландский виски пережил\nважную эволюцию. Подпольные винокуры сушили ячмень на горящем торфе, открыв вкус солодового виски, известного сегодня на весь мир.\nБорьба между контрабандистами и сборщиками налогов продолжалась более 100 лет. В 1820\nгоду, несмотря на уничтожение правительством\nболее 14 тысяч подпольных винокурен, половина\nпотребляемого виски была контрабандной. Говорят, что именно контрабандный виски был самым\nвкусным. Палата Лордов решила изменить сложившуюся в стране ситуацию в 1823 году, когда\nбыл принят Акцизный акт, ослабивший налоговое\nбремя, благодаря чему подпольные винокурни\nвскоре прекратили свое существование.\n\nИндустриальная революция\nАкцизный акт был принят вовремя. Из-за расту-\n\n82 Виски\n\nщей урбанизации спрос на виски стремительно\nподнимался, а индустриальная революция набирала ход и принесла с собой целый ряд нововведений. Одним из них был аппарат непрерывной\nперегонки, придуманный Робертом Штайном и\nусовершенствованный ирландцем французского\nпроисхождения Аэнеасом Коффи. Новый аппарат\nдавал большое количество зернового спирта с\nдовольно нейтральным вкусом.\n\nАнглийский король Георг IV посетил\nШотландию в 1822 году. Ответственным за прием монарха был назначен\nизвестный шотландский писатель\nВальтер Скотт. Было решено, что вся\nместная знать облачится в национальный костюм. Дело дошло до\nтого, что и сам король решил одеться\nпо-шотландски, что и было запечатлено на этой картине за авторством\nшотландского художника Дэвида\nВилки. Традиция носить килт и клетку\nполучила новый импульс.", "С котч и закон\nСогласно закону, наименование Scotch Whisky («шотландский виски») применяется к спиртному напитку, полученному при следующих условиях.\n• Виски может быть изготовлен только в Шотландии из воды и соложеного ячменя, а также других злаковых (в зависимости от категории виски).\n- Зерно должно быть переработано в сусло на винокурне.\n- Сахар, необходимый для брожения, должен образоваться в сусле благодаря эндогенному ферменту (то есть естественным энзимам, которые содержатся в зерне).\n- Брожение должно проходить под воздействием дрожжей на винокурне.\n• В результате дистилляции должно получиться спиртное не крепче 94,8% vol.,\nчтобы в дистилляте присутствовали ароматы использованного сырья.\n• Спиртное может быть выдержано только на территории Шотландии в дубовых\nбочках, объемом не более 700 литров. Срок выдержки должен составлять не\nменее трех лет.\n• Разрешаются добавки воды для снижения крепости, а также карамели – для\nпридания цвета.\n• Крепость готового виски должна быть не менее 40% vol.\n\nИзобретение было воплощено в жизнь уроженцем Эдинбурга Эндрю Ашером. В 1853 году он\nсмешал крепкий солодовый виски с зерновым\nспиртом и создал первый в истории бленд – легкий, но одновременно ароматный купажированный виски.\nПосле этого знаменательного события во второй\nполовине 19 столетия на свет появились знаменитые бренды купажированного виски, которые\nизвестны нам сегодня: Chivas, Dewar's, Ballantine's,\nJohnnie Walker...\nКроме того, зародилась новая уважаемая профессия – мастер-блендер. Человек, который, пользуясь научными знаниями, культурными традициями\nи собственным опытом, объединяет ингредиенты,\nдобиваясь постоянства вкуса и характера своего\nвиски.\n\nSingle Malt (Солодовый или\nодносолодовый виски)\n\nРазновиднос ти\n\nКупаж солодовых и зерновых виски.\n\nшотландского виски\nСуществует несколько разновидностей шотландского виски, которые отличаются друг от друга\nиспользованным сырьем, местом и методом\nпроизводства.\n\nЭтот виски изготавливают в пределах одной винокурни из соложеного ячменя путем перегонки\nв традиционном аппарате «пот стил».\n\nSingle Grain\n(Зерновой виски с одной винокурни)\nЭтот виски, как и сингл молт, изготавливают на\nодной винокурне. Но на него не налагаются\nограничения в отношении используемого сырья\n(это может быть, как соложеный ячмень, так и его\nсмесь с другими злаковыми) и метода перегонки.\nГлавным образом, этот виски входит в состав\nразличных купажей, но иногда разливается по\nбутылкам отдельно.\n\nBlended (Купажированный виски)\nBlended Malt (Купаж солодовых виски)\nСмесь сингл молтов, полученных на разных\nвинокурнях.\n\nBlended Grain Whisky (Купаж зерновых виски)\n\nС рок выдержки виски\nна этикетке\n\nО бозначение возраста\n\nВиски с обозначением возраста на\nэтикетке (например, 12 years old)\nможет быть смесью спиртов разной\nстепени выдержки, произведенных\nв разные годы. По закону Шотландии\nвозраст, указанный на этикетке, должен соответствовать возрасту самого\nмолодого спирта.\n\nN o A ge Statement\n\nВ последнее время, в связи с возрастающим спросом на виски, все более\nраспространены релизы виски без\nуказания возраста. Согласно закону,\nтакой виски должен быть выдержан в\nдубовых бочках не менее трех лет.\n\nУ к азание года перегонки (vintage )\n\nВ этом случае содержимое бутылки полностью дистиллировано в\nупомянутом году. На этикетке такого\nвиски должен быть также указан\nлибо возраст, соответствующий сроку\nвыдержки в бочках, либо дата его\nразлива по бутылкам.\n\nСмесь зерновых виски, полученных на разных\nвинокурнях.\n\nВиски 83", "Односолодовый виски\n(S ingle M alt )\nС ингл молт (он же солодовый или односолодовый виски) – это традиционный\nшотландский виски . О н может быть получен только из соложеного ячменя , вы сушенного на горящем торфе . С ингл молт всегда производится только на одной\nдис тиллерии и обычно носит ее название .\n\nС ырье\nЯчмень\n\nК аким должен быть ячмень?\nК ячменным зернам, используемым\nдля виски, предъявляются многие\nтребования. Среди них следующие:\n• Зерна должны быть одинакового\nразмера, чтобы прорасти одновременно.\n• Они должны иметь светло-желтый\nцвет, блеск без признаков плесени и\nиздавать приятный, здоровый запах.\n• Содержать как можно больше\nкрахмала.\n• Зерна должны быть хорошо сформированными, равномерными и\nобъемными.\n\n84 Виски\n\nЯчмень особенно хорошо подходит для получения сусла, способного к брожению.\nВ Шотландии существуют сорта ячменя, приспособленные к местным условиям. По данным некоторых исследований, они лучше всего подходят\nдля производства виски. Однако их часто заменяют импортным ячменем.\n\nТорф\nТорф образуется из растительных остатков, в\nтом числе вереска, и иногда пропитан морской\nпеной. Его цвет – совсем темный и даже черный\nна севере Шотландии и более светлый, коричневый, на юге. Торф используется для высушивания\nи копчения ячменя. При горении он выделяет\nдым с характерным ароматом, который въедается\nв солод и наделяет виски особыми чертами. Так,\n\nлучшие виски обладают ароматами различных\nцветов и растений. Разумеется, ароматические\nособенности дыма зависят от состава торфа.\n\nВода\nКонечно, вода должна быть чистейшей. Она\nопределяет конечный вкус виски. Шотландская\nвода – слабоминеральная. После фильтрации ее\nиспользуют, как минимум, три раза в ходе производства виски:\n• при замачивании зерна ячменя впитывают воду,\nнеобходимую для прорастания;\n• во время варки солода вода растворяет крахмал, извлекая ароматические вещества и элементы, необходимые для брожения;\n• вода снижает крепость виски.\nНекоторые ценители виски заказывают воду из\nисточника той дистиллерии, виски которой они\nпьют, чтобы разбавлять ею свой любимый напиток.", "П роизводс тво\n1. Соложение\n\nП ерегонные аппараты\nУ каждой винокурни свои особые\n«пот стилы», отличающиеся формой\nи размером. Считается, что высокие\nи узкие перегонные аппараты дают\nболее легкий виски, а в небольших\nи широких «пот стилах» получается\nболее ароматный и тяжелый виски. От\nформы аппарата зависит температура\nв различных частях перегоняемой\nжидкости. Деформация куба от\nудара может создать особые условия\nтемпературы и испарения на месте\nвмятины. Все это заставляет порой\nмастеров дистилляции в точности\nвоспроизводить форму старого перегонного куба при его замене. А некоторые, наиболее суеверные из них,\nбоясь утратить магию вкуса своего\nвиски, доходят до того, что выстраивают новые кубы вокруг прежних\nили изготавливают их, повторяя все\nизъяны и следы ремонта.\n\nВ форме луковицы (O nion S haped)\n\nТрадиционный шотландский перегонный куб, который можно увидеть\nв подавляющем большинстве винокурен.\n\nБ ойл Б олл (B oil B all )\n\nПерегонный куб в форме луковицы,\nв верхней части которого имеется\nдополнительное утолщение. Оно\nприостанавливает наиболее тяжелые\nпары, чтобы их еще раз продистиллировать.\n\nВ форме груши (P ear S hape )\n\nКонический перегонный куб, в\nкотором нет выраженного перехода\nмежду нижней пузатой частью и куполом. Лучший пример – Лэгавулин.\n\nА ламбик Л омонд (L omond Still )\n\nПерегонный куб, имеющий внутри\nкупола ряд пластин, позволяющих\nректифицировать спирт наподобие\nаппаратов непрерывной перегонки.\nПри этом он сохраняет характеристики традиционного куба, поскольку\nперегонка не является непрерывной.\nЭтот аппарат был разработан на\nвинокурне Лох Ломонд, откуда и его\nназвание. Встречается достаточно\nредко.\n\n86 Виски\n\nЦель соложения – подготовить ячмень к перемолке и брожению, а также придать ему характерные ароматы с помощью торфяного дыма. Рассмотрим подробнее основные этапы соложения.\nВымачивание ячменя. Зерна очищают и перебирают. Затем их вымачивают в течение 48 часов в\nводе. В конце этой операции:\n• ячменное зерно должно легко раздавливаться\nмежду пальцами;\n• его можно легко раскусить зубами;\n• зерном можно писать на шероховатой поверхности, где оно должно оставлять белый след, подобно мелу.\nПрорастание. Вымоченный ячмень раскладывают слоем на полу солодовни. Для улучшения контакта с воздухом зерна регулярно ворошат. Через\nнекоторое время в зернах начинают проклевываться ростки. Процесс прорастания длится 10\nдней. Пророщенный ячмень называют «зеленым\nсолодом».\nСамо соложение. Прорастание резко прерывают, подвергая зеленый солод воздействию\nвысокой температуры. Эта операция проходит\nв солодильных башнях с крышей в форме пагод,\nкоторые составляют неотъемлемую часть типичного шотландского пейзажа.\nЗерно сушат над горящим торфом. Оно пропитывается дымом и развивают все те особенности,\nкоторые свойственны солоду.\nИнтенсивность сушки, ее продолжительность,\nколичество дыма влияют на вкус будущего виски.\nОни варьируются на разных винокурнях.\n\n2. Варка\nЭтот процесс очень напоминает варку пива.\nОчистка и помол. Солод отделяют от ненужных\nростков, а затем перемалывают в муку.\nЗаваривание. Полученную муку, называемую\ngrist, постепенно смешивают с горячей водой.\nВода растворяет крахмал, который трансформируется в сахар.\nПосле фильтрации получается сладкое сусло,\nназываемое wort, которое направляют на брожение, а остатки сусла (солодовая гуща) идут на\nкорм домашних животных.\nБрожение. В сусло добавляют дрожжи, которые активизируют брожение. Оно длится от 45 до 48 часов.\nТемпература сусла не должна превышать 35-37°С,\nчтобы не парализовать работу дрожжей. В результате получается пиво, называемое wash, крепостью\nоколо 5% vol.\nWash подвергают двум перегонкам в медных ап-\n\nпаратах «пот стил», имеющих характерную форму\nреторты.\n\n3. Перегонка\nПерегонный аппарат «пот стил» является своего\nрода символом виски. Сделанный из меди, он воплощает собой волшебство дистилляции. Для производства солодового виски чаще всего используют два аппарата.\nПосле перегонки в первом аппарате, называемом wash still, объемом от 7 до 23 тысяч литров,\nполучается жидкость, именуемая low wines, крепостью 25-30% vol. Она перетекает во второй\nаппарат, называемый spirit still, объемом от 6 до\n21 тысячи литров, и перегоняется в нем еще раз.\nПосле второй перегонки виски приобретает крепость 65-70% vol.\n\n4. Выдержка\nПосле перегонки в виски, как правило, добавляют воду, понижая его крепость примерно до 55%\nvol. Затем его разливают в дубовые бочки. Разные\nбочки по-разному влияют на вкус напитка. Виски\nможет быть выдержан в бочках из-под бурбона,\nхереса или порто. Эти бочки, пропитанные бывшим содержимым, сообщают его ароматы виски,\nблагодаря чему самые престижные солодовые\nвиски обладают винными или ванильными нотами, оттенками миндаля и сухих плодов.\nВыдержка – важнейший этап производства виски.\nВ процессе старения через поры древесины происходит испарение виски, называемое «долей\nангелов». Оно способствует избавлению виски\nот нежелательных веществ, а также объединению\nдругих составляющих напитка, в результате чего\nобразуются столь желанные сложные ароматы.\nКроме того, спирт испаряется быстрее воды, поэтому виски, постепенно теряя свою крепость,\nможет достичь 40% vol., то есть той крепости, при\nкоторой его обычно выставляют на рынок. Если\nсрок выдержки недостаточен для естественного\nснижения крепости, то виски разбавляют водой.\nСогласно регламентации, выдержка виски должна длиться не менее трех лет. Но в действительности она длится дольше. Считается, что идеальный возраст солодового виски – 12 лет, однако\nнекоторые производители смело выдерживают\nсвои напитки в течение 25 и даже 50 лет. Влажный\nклимат Шотландии особенно благоприятен для\nвыдержки спиртного. Напиток постепенно раскрывается и обретает тонкость. Как только виски\nперелит в бутылки, испарение прекращается, и\nнапиток больше не стареет.", "Как делают\nсолодовый\n\nвиски\n1. Виски делают из ячменя, который\nсначала вымачивают в воде, а затем\nраскладывают на полу солодовни. Для того чтобы ячмень\nпревратился в солод, он должен дружно прорасти. Этому\nспособствует регулярное ворошение.\n\n2. Пророщенный ячмень сушат над горящим торфом\nв солодильных башнях, чтобы наделить будущий\nвиски ароматами дыма.\n\n4. Муку заваривают горячей водой. При этом\nкрахмал, содержащийся в муке, растворяется\nи превращается в сахар, необходимый для\nброжения.\n\n3. Высушенный, копченый солод\nперемалывают в муку, которая называется\nGrist.\n\n5. Сусло бродит,\nпревращаясь в пиво.\n7. Виски выдерживают\nв дубовых бочках не менее\nтрех лет.\n6. Пиво проходит двойную\nперегонку и становится\nвиски.\nВиски 87", "География шотландских дис тиллерий\nУ шотландских односолодовых виски, как у знаменитых вин, есть определенные районы производства, обуславливающие их характер.\nПодобно тому, как земля и климат влияют на букет вина, так земля, вода и природа «сотворяют»\nвиски.\nМногочисленные географические, геологические и климатические факторы оказывают огромное влияние на вкус виски.\nАроматы виски с юга и с севера Шотландии существенно различаются, даже без учета отличительных особенностей процесса производства\nна разных дистиллериях.\n\nХ айленд (H ighlands)\nХайленд («Нагорье») – важнейший район производства виски в Шотландии. В этих труднодоступных горных краях с многочисленными источниками воды в относительном спокойствии\nпроцветали подпольные винокурни, пока смягчение налогового бремени не позволило им\nвступить на законный путь. Таким образом, Хайленд – колыбель «скотча».\nЭта полоса земли шириной 200 километров пересекает Шотландию с запада на восток.\nЗначительная протяженность региона обеспечила виски Хайленда разнообразие вкуса. Они\nмогут иметь вкус соли и йода у побережья или\nфруктовый аромат с нотами дыма вдали от него.\n\nMiltonduff\nAultmore\n\nР егионы производства\nшотландского виски\n\nС официальной точки зрения в Шотландии насчитывается 5 регионов, где\nизготавливают виски.\n\n1. Х айленд\n\nСамый крупный регион-производитель виски. Он охватывает центральную и северную части Шотландии, и\nна его территории действует около\nчетырех десятков дистиллерий.\nВиски, полученные на островах,\nрасположенных к западу и к северу\nот Хайленда (кроме острова Айла),\nформально относятся к хайлендским\nвиски. Среди этих островов следующие: Скай, Малл, Оркнейские острова,\nДжура, Арран и Льюис. На них в\nобщей сложности размещается семь\nвинокурен.\n\n2. С пейсайд\n\nScapa\n\nСпейсайд географически находится\nна территории Хайленда. Однако\nон считается отдельным региономпроизводителем виски благодаря\nбольшому количеству дистиллерий,\nкоторых здесь насчитывается более\nчетырех десятков.\n\n3. Л оуленд\n\nЭтот регион расположен к югу от\nХайленда. Местные дистиллерии, производящие солодовый виски, можно\nпосчитать по пальцам.\n\nMacduff\n\n4. А йла\n\nОстров напротив западного побережья Шотландии, где есть восемь\nдистиллерий, производящих виски.\n\n5. К емпбе лтаун\n\nЭто полуостров, расположенный к югу\nот Айла. Здесь функционируют всего\nтри дистиллерии.\n\nLoch\nLomond\n\nGlen Scotia", "A berfeldy .\nД истиллерия в сердце Ш отландии\nРазверните карту Шотландии и укажите пальцем\nв ее центр. Вы попадете в Аберфелди, живописный городок графства Пертшир. Его окружают\nвеликолепные пейзажи и орошает самая длинная река Шотландии – Тэй.\n\nИстория\nВ 1896 году братья Дюары купили у маркиза Бридалбейна участок земли на выезде из городка,\nидеально расположенный для постройки винокурни.\nВыбор места оказался очень удачным. Дистиллерия Aberfeldy открылась в 1898 году.\nЩедрая природа пророчила новой винокурне\nдать рождение выдающемуся солодовому виски.\nДля его производства по сей день используется\nчистейшая вода из источника Питилли Бёрн.\nВ его кристальной воде до сих пор попадаются\nчастицы золота, добываемого здесь с незапамятных времен.\nБлизость железной дороги обеспечивала быстрый доступ к центру купажирования – городу\nПерт, и вскоре виски Aberfeldy сделался душой\nбленда Dewar's White Label, пользующегося\nгромкой известностью.\nПри этом самому виски Aberfeldy было суждено\nоколо 100 лет пребывать в тени своего знаменитого купажированного «собрата».\n\nCолодовый виски\nТакая несправедливость была устранена в 1999\nгоду, когда на рынок был выпущен солодовый\nвиски Aberfeldy 12 y.o. Он был с энтузиазмом\nвстречен ценителями и сразу же принялся\nнаверстывать упущенное на международных\nконкурсах.\nПри производстве Aberfeldy применяют длительный процесс брожения – более 70 часов,\nблагодаря чему в сусле образуются сложные\nэфирные масла, которые придают виски глубину\nвкуса, а также пряные, цитрусовые и медовые\nоттенки, являющиеся отличительной чертой\nпродуктового ряда Aberfeldy.\n\n«М ир В иски Д юарс »\nВинокурня Aberfeldy приютила\nвпечатляющий туристический центр\n«Dewar’s World of Whisky».\nС помощью наисовременнейших\nсредств мультимедиа здесь рассказывается о производстве, истории\nи дегустации виски. Это место,\nпосещаемое всеми ценителями\nвиски, также является необходимым\nучебным центром для барменов и\nсомелье, желающих повысить свою\nквалификацию.\n\nП родуктовый ряд\nA berfeldy 12 y. o .\n\nЭтот 12-летний виски раскрывает\nособый характер, присущий данной\nобласти Шотландии. Его солидная и\nмощная архитектура, подчеркнута\nлегкими нотами дыма. Ароматы меда\nи ванили переходят в пряный финал.\n\nA berfeldy 16 y. o .\n\nВыдержанный в бочках из-под хереса,\n16-летний Aberfeldy – это алхимия\nмягкости и богатства ароматов. Он\nнасыщенный, как фруктовый кекс с\nшоколадом.\n\nA berfeldy 21 y. o .\n\nИсключительный солодовый виски\nсо сливочной текстурой, в котором\nароматы сухофруктов и поджаренного кокоса превозносят медововересковый характер сингл молта из\nПетршира.\n\nВиски 89", "Dalmore (Далмор)\nВинокурня Далмор, существующая на севере\nХайленда с 1839 года, располагает одним из наиболее старинных запасов выдержанных солодовых виски, который составляет ее богатство. Ее\nвиски ценится за свою полноту, цельность характера и сложность вкуса, создающую особое ощущение объемности.\n\nDalwhinnie (Далуинни)\n\nAberfeldy (Aберфелди)\n\nС орта ячменя\nЯчмень оказывает существенное\nвлияние на вкус виски. Используемые\nсорта ячменя в настоящее время\nявляются серьезным объектом исследований.\nВ 19 веке для виски использовали\nместные сорта ячменя. Однако в 20\nстолетии производители виски начали\nимпортировать ячмень со всех концов\nсвета. Например, крупными поставщиками ячменя в Шотландию были\nФранция и Россия. Но постепенно\nпроизводители виски стали отдавать\nпредпочтение местному ячменю, приспособленному к климату Шотландии\nи более богатому крахмалом. Вначале\nсамым популярным сделался шотландский сорт Golden Promise. Однако\nон стал менее востребован в конце\n1980-х годов из-за слабой устойчивости к болезням. Некоторые винокурни\nеще продолжают его использовать,\nно в большинстве случаев на смену\nему пришли другие сорта. Например, на протяжении последних лет\nблагосклонностью производителей\nпользуются сорта Optic и Troon.\n\nВинокурня, основанная братьями Дюарами в\n1898 году, расположена в географическом центре\nШотландии, в Восточном Хайленде, в полутора\nчасах езды на автомобиле от Эдинбурга.\nЕе виски ценится за свои богатые ароматы с медовыми нотами и входит в состав бленда Dewar’s.\nНастоящему любителю виски непременно следует посетить «Мир Виски Дюарс» (Dewar’s World of\nWhisky). Речь идет о расположенном непосредственно на винокурне Aberfeldy большом комплексе-музее, посвященном истории, производству и дегустации виски.\n\nBalblair (Балблэр)\nВиски Балблэр, который производят в Северном\nХайленде с 1790 года, обязан своим характером\nкубу для первой перегонки (wash still). Он имеет\nтипичную форму луковицы, и его приземистость\nспособствует концентрации ароматов виски. Торфяная вода из ближайшего источника тоже играет важную роль во вкусе напитка.\n\nBen Nevis (Бен Нэвис)\nВинокурня, существующая с 1825 года, расположена у подножья горы Бен Нэвис на западе Хайленда.\nЗдесь сохранилось кустарное производство, а виски отличается сильным ароматом и деревенским\nхарактером. С 1989 года винокурня принадлежит\nяпонцам.\n\nClynelish (Клайнелиш)\nКлайнелиш была построена на севере Хайленда в 1967 году по соседству с винокурней Brora,\nоснованной в 1819 году (сегодня закрыта). При\nдегустации виски Клайнелиш впечатляет своими\nбогатыми и мощными ароматами торфа, солода\nи специй.\n\n90 Виски\n\nКто-то когда-то сравнил шотландские винокурни\nс монастырями, выраставшими на путях паломников. Я думаю, что подобное чувство вы испытаете\nпри виде Далуинни, самой высокогорной винокурни Шотландии. Несмотря на то, что она расположена на севере Хайленда, далеко от Спейсайда,\nисток реки Спей находится поблизости. Она была\nоснована в 1897 году под названием Стратспей\n(Strathspey).\n\nDeanston (Динстон)\nДинстон – единственная винокурня Шотландии\n(запад Хайленда), которой не грозит отключение\nэлектричества. Эта старинная водяная мельница, перестроенная для производства виски в\n1965 году, снабжена генератором, получающим\nвсю необходимую энергию благодаря реке Тейт.\nЗдесь производится солодовый виски с жареными и фруктовыми нотами.\n\nEdradour (Эдрадауэр)\nВинокурня Эдрадауэр использует для производства виски самые маленькие разрешенные законом перегонные кубы в Шотландии. Если бы они\nбыли еще чуть меньше, винокурня утратила бы\nсвою лицензию, поскольку размер перегонных кубов установлен законом, исходя из соображений,\nсвязанных со сбором налогов. Для перегонки достаточно одного человека, наблюдающего за кубами и имеющего при себе лопату, чтобы удалить\nбарду, после окончания дистилляции. Восточный\nХайленд. Дата основания: 1825 год.\n\nGlencadam (Гленкэдам)\nВ этой небольшой винокурне, основанной на востоке Хайленда в 1825 году, виски выдерживают\nклассическим образом в бочках из-под бурбона.\n\nGlengoyne (Гленгойн)\nС 1833 по 1876 год эта винокурня называлась\n«Бернфут» (Burnfoot). Затем до 1905 года – Гленгуин (Glenguin), после чего получила свое нынешнее название. Особенность ее в том, что она расположена на южной границе Хайленда, и про нее\nговорят, что если виски перегоняют в Хайленде,\nто выдерживают его в Лоуленде. Более того, здесь", "используется сорт ячменя Golden Promise, который не солодят на торфе. Это делает виски легким и утонченным.\n\nторые частично ректифицируют спирт. Эта идея\nбыла позаимствована и некоторыми другими винокурнями.\n\nGlenmorangie (Гленморанджи)\n\nMacduff (Макдафф)\n\nВысокие перегонные кубы Гленморанджи дают\nлегкий и душистый виски. Вначале здесь были\nустановлены старые перегонные кубы для джина, а затем традиция использовать несоразмерно\nвысокие кубы (более 5,13 метров) была продолжена. Выдержка в бочках из-под хереса или порто\nдосконально отработана, что сделало виски Гленморанджи одним из лучших образцов в своем\nжанре. Дата основания: 1843 год.\n\nВинокурня Макдафф, основанная в 1960 году,\nрасположена там, где в суровое Северное море\nвпадает Деверон. В честь этой реки – The Deveron\n– был назван производимый здесь виски. Он высоко ценится мастерами-блендерами, а также\nпользуется успехом в качестве сингл молта.\n\nGlenturret (Глентаррет)\nВ этих краях на востоке Хайленда виски делали\nеще подпольные перегонщики, а первая винокурня здесь была построена в 1775 году. В 1826\nгоду она получила название Глентаррет. Сначала\nее закрыли, потом снесли, но в 1957 году отстроили заново. Так что, несмотря на почтенный возраст, она абсолютно современна.\n\nGlen Garioch (Глен Гариох)\nЭта небольшая живописная винокурня, существующая с 1797 года, – душа деревни Олдмелдрам, расположенной неподалеку от Абердина.\nВ ней всего два перегонных куба. Почти вся ее\nпродукция продается как солодовый виски, а не\nиспользуется для купажирования. Винокурня\nбыла выкуплена японской компанией «Сантори».\nЕе виски отличается характерными ароматами\nлаванды и имбиря.\n\nOban (Оубан)\nВинокурня расположена в центре портового\nгорода Оубан, откуда паромы отправляются на\nГебридские острова. Здесь с 1794 года производят мягкий, солоноватый и слегка торфянистый\nвиски.\n\nPulteney (Палтни)\nЕсли не считать Оркнейских островов, то Палтни\n– самая северная винокурня Шотландии. Название\nсвое она получила от города Палтни, рядом с которым была создана в 1826 году. Ее виски, продающийся под названием Old Pulteney, – породистый\nи элегантный.\n\n«Королевский виски» Royal Brackla\nобъединяет ноты специй и орехов\nс ароматами ванили, карамели,\nперсиков, аниса, шоколада и ягод.\n\nRoyal Brackla (Роял Бракла)\nОснованная в 1812 году винокурня получила разрешение прибавить к своему названию слово\n«Royal», став поставщиком королевского двора\nВильяма IV в 1835 году. Долгий процесс брожения,\n\nВыдержанный в бочках из-под хереса\nи бурбона, виски The Deveron (винокурня Macduff) богат фруктовыми и\nореховыми тонами, с нотами специй и\nяблочного пирога во вкусе.\n\nHighland Park (Хайленд Парк)\nЭта дистиллерия была основана в 1798 году на\nОркнейских островах. Метод ручного соложения,\nсозревание виски в ценных испанских бочках изпод хереса и дополнительная выдержка (гармонизация) перед разливом по бутылкам создают\nзнаменитый букет Highland Park, сочетающий легкие ноты дыма и медовую сладость.\n\nIsle of Jura (Айл оф Джура)\nУ этой винокурни, существующей с 1810 года на\nострове Джура, была бурная жизнь. Ее неоднократно разрушали, а в 1920 году владелец даже\nразобрал крышу, чтобы не платить часть налогов.\nЕе виски деликатен, но обнаруживает стремление к характеру.\n\nLoch Lomond (Лох Ломонд)\nВ винокурне Лох Ломонд установлены перегонные кубы особого типа, которые с некоторых пор\nносят ее название. Они снабжены колоннами, ко-\n\nВиски 91", "уважение вековых традиций и выдержка в бочках\nиз-под хереса обуславливают уникальный характер этого виски.\n\nRoyal Lochnagar (Роял Лохнагар)\nРоял Лохнагар, основанная в 1845 году, обязана\nсловом «Royal» в своем названии королеве Виктории, посетившей винокурню в 1848 году. В том же\nгоду винокурня сделалась поставщиком королевского двора. Ее виски ценится за свою сложность\nи гармонию.\n\nScapa (Скапа)\nСкапа с Оркнейских островов (условно относящихся к Хайленду) – это сдержанный виски. Виноку
