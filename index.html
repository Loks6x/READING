вины прошлого века Jameson изготавливают на современной дистиллерии в\nМидлтоне.", "оставляя за собой борозды глубиной 1,5-2 см по\nвсему периметру ее внутренней части. Потом\nбочки обжигают изнутри на глубину 2-х мм.\nВ результате получается виски с насыщенным\n«обожженным» вкусом, в котором ноты специй и\nванили обволакивают фруктовую сладость.\n«Джемесон Черная бочка» – интенсивный, мощный и одновременно нежный напиток, который\nпредназначен для подачи в чистом виде или в\nизысканных коктейлях.\n\nJameson Gold Reserve\n\nJameson Caskmates отлично сочетается с пивом, в частности – со стаутом.\nЭто неудивительно, ведь Jameson\nCaskmates выдерживается в бочках\nиз-под крафтового пива.\n\nJameson Caskmates\nУникальный характер этого виски обусловлен\nвыдержкой в бочках из-под крафтового пива.\nОни сообщают напитку ноты хмеля, кофе и\nкакао в добавок к свежим фруктовым ароматам.\nА тройная перегонка лежит в основе мягкости\nэтого виски.\n\nJameson Black Barrel\nВнимание: виски с ярким характером! Производится на основе соложеных и несоложеных\nвиски, вышедших из аппарата «пот стил», и редких\nзерновых сортов. Различные спирты выдерживаются отдельно, а после купажирования образуют\nгармоничное, но мощное целое.\nДля выдержки используются бочки из-под бурбона, но они проходят дополнительную доработку:\nспециальное устройство пилит бочку изнутри,\n\nСочетая традиции и современность, Jameson\nGold Reserve отражает квинтэссенцию ирландского духа. Основная отличительная черта этого\nвиски состоит в том, что в ходе его выдержки\nиспользуются новые дубовые бочки.\nJameson Gold Reserve обладает интенсивным\nцветом, мягким характером с оттенками меда и\nделикатным послевкусием.\n\nJameson Rarest Vintage Reserve\nЭтот эксклюзивный виски отражает весь опыт\nмастеров дистиллерии «Мидлтон». В нем преобладают редкие и ценные спирты, выдержанные в\nбочках из-под хереса и порто, которые сообщают виски благородные фруктовые и цветочные\nароматы.\n\nJameson 18 y.o. Limited Reserve\nПосле восемнадцати лет выдержки в бочках этот\nбогатый виски проявляет насыщенный характер\nи очень долгое послевкусие.\nОн выпускается каждый год в ограниченном\nколичестве, обладает индивидуальным номером\nи предназначен для особых случаев.\n\nО собенности производства\nвиски J ameson\nСегодня виски Jameson производится\nна дистиллерии «Мидлтон», которая\nхранит секреты мастерства многих\nпоколений.\nСоложеный ячмень смешивается с\nнесоложеным, а вода отличается несравненной чистотой.\nТройная перегонка придает виски\nего особую мягкость. Она проходит в\nогромных перегонных кубах типа «пот\nстил». Наконец, долгая выдержка в\nбочках придает различным сортам\nвиски Jameson их сбалансированный\nхарактер.\n\nВиски 117", "А мериканский виски\nB ы можете проехать Соединенные Ш таты с вос тока на запад , с севера на юг, по\nавтомагис тра лям и узким дорогам , притормаживая у всех баров , подвернувшихся вам на пу ти . В каж дом из них на почетном мес те вы обнаружите дос тойный\nассортимент лучших виски , производимых в А мерике . Разумеется , вы увидите\nбурбоны , виски из Теннесси и все чаще ржаной виски , одно время почти исчез нувший , но вновь обретающий популярнос ть среди широкой публики . А мерикан цы , более чем когда - либо , ос таются верны своему виски : полноте лому, уютному,\nсогревающему, ванильному, щедрому, мас лянис тому, бодрящему, живите льному,\nкороче , собравшему все эпитеты , применимые как к бару, где его подают, так и к\nсамому напитк у.\n\nАмериканский виски зародился благодаря ирландским и шотландским переселенцам, покорившим Новый Свет. Однако на заре своей\nистории он не был тем мягким напитком, каким\nмы знаем его сегодня. Виски тех времен помогал\nколонизаторам пережить ностальгию по родине\nи служил лекарством от всех бед и страданий.\nНастоящее развитие американского виски началось во второй половине 18 века. Его история,\nкак и в других странах, не обошлась без бунтов и\nналоговых неурядиц. Первый налог на виски был\nустановлен Джорджем Вашингтоном в 1791 году.\nЭто заставило многих винокуров Пенсильвании\nперебраться в глубь страны подальше от сборщиков налогов.\nТаким образом, штат Кентукки стал родиной бурбона. Напиток получил имя провинции Бурбон,\nиз которой были отправлены первые ящики виски в Новый Орлеан. Сама провинция Бурбон\nбыла названа в честь французской королевской\nдинастии Бурбонов и в благодарность французам, которые сражались в этих местах против англичан во время Войны за независимость.\nВ 1808 году прекращение работорговли нанесло\nтяжелый удар по основному конкуренту американского виски – рому. Благодаря этому виски\nзанял прочные позиции на рынке спиртных напитков.\nВойна между Севером и Югом замедлила взлет\nамериканского виски. Разрушение многих винокурен и отягощение налогового бремени были\nодними из ее последствий.\nПроизводство виски сильно возросло после индустриальной революции и появления аппарата\nнепрерывной перегонки.\n\n118 Виски\n\nОднако в историю напитка вмешался сухой закон. За исключением нескольких предприятий,\nполучавших спирт для медицинских целей,\nвсе остальные винокурни были вынуждены закрыться.\nК моменту отмены сухого закона американцы\nпривыкли к «белым» спиртным напиткам, которые было легче производить нелегально.\nСегодня американский виски обрел свою дворянскую грамоту. Его особый способ производства с использованием закваски и выдержкой в\nобугленных дубовых бочках определяет оригинальность напитка, неотделимую от настоящего\nуспеха.\n\nП роизводс тво\nДля большинства американских виски характерна выдержка в новых обожженных бочках, что и\nпридает им глубокий и яркий вкус. Они обязаны\nсвоим характером на 70% выдержке, а в остальном – использованному зерну, степени его перегонки и иногда – фильтрации через кленовый\nуголь.\n\nСырье\nЧто касается используемых злаков, то это те, которые американцы потребляют в твердом виде\nкаждое утро за завтраком. Кукуруза, пшеница, ячмень, рожь, используемые в разных пропорциях.\nКомпозиция злаковых (состав сусла) является, в своем роде, формулой виски и называется mashbill.\nБольшое значение придается дрожжам, которые\nиграют важную роль в ароматах и вкусе будущего\n\nИ нструкция к потреблению\nНа заре своей истории американский\nвиски был крепким напитком сильных\nдухом мужчин. Однако теперь новые\nобугленные дубовые бочки, чистейшая вода и использование закваски\nпридают ему округлость, мягкость и\nблагородный характер, что делает его\nуникальным в своем роде напитком,\nотражением страны, ее климата и\nтрадиций. Поэтому, как написал Гари\nРиган, американский виски можно\nпить с равным успехом в обществе\nбанкира, адвоката или вашей мамы.\nВ чистом виде, со льдом или в\nсоставе многочисленных коктейлей,\nкак исторических (например, «Минт\nДжулеп») так и современных.\nАмериканский виски – это аутентичный и глубоко человечный напиток,\nдля которого манера потребления\nважна. Но не настолько – как компания, в которой его пьют.", "Как делают\n\nвиски в\n\nА мерике\n2. Зерно перемалывают в муку.\n\n1. Производители виски используют, в первую\nочередь, такие злаковые, как кукуруза,\nячмень и рожь.\n\n3. В муку добавляют воду. Сусло разваривают,\nчтобы крахмал превратился в сахар.\n\nБочки, в которых проходит выдержка виски, предварительно обжигают внутри. Обугленный слой\nпридает напитку дополнительные ароматы, темный\nоттенок, а также абсорбирует нежелательные\nвещества.\n\n4. В сусло добавляют дрожжи или Sour Mash\n(закваску), чтобы активизировать брожение,\nпосле которого сусло превращается в пиво.\n\n5. Пиво дистиллируют, как правило,\nв аппарате непрерывной перегонки.\n\n6. Виски разбавляют водой и выдерживают в\nобугленных дубовых бочках.\n\nПосле перегонки теннессийский виски (в\nотличие от бурбона) фильтруется через\nдревесный уголь.\n\nУголь для фильтрации теннессийского\nвиски изготавливают из древесины клена.\n\nВиски 119", "виски. К воде также предъявляются строгие требования, в частности, в отношении ее мягкости.\n\nВарка и брожение\nКукурузу очищают и перемалывают в муку, которую смешивают с водой и варят. Сусло охлаждают\nдо 156°F (69°С) и добавляют ржаную и пшеничную\nмуку в установленной пропорции.\nСмесь варят и затем охлаждают до 146°F (63°С). В\nнее добавляют перемолотый соложеный ячмень.\nСодержащийся в нем фермент – диастаза – превращает крахмал в сахар, необходимый для брожения.\nСусло охлаждают до комнатной температуры и\nдобавляют в него дрожжи.\nБрожение длится около 3 дней и в результате\nдает distiller's beer. Это пиво переливают, снимая\nс осадка, и фильтруют.\n\nО бугленные бочки :\nамерик анск а я тра диция\nСпецифичность американского виски связана с особыми бочками, в которых проходит выдержка.\nСуществуют три легенды, объясняющие, откуда в США повелось обжигать бочки. Согласно первой легенде, нерадивый работник оставил бочку слишком долго сушиться над огнем. Вторая версия гласит, что причина кроется в пожаре, произошедшем\nна одной винокурне. После этого бедствия на предприятии не хватало новой тары,\nи виски налили в частично обгоревшие бочки. А третья легенда рассказывает о\nтом, что Элайджа Крейг, испытывая недостаток в бочках, решил использовать бочки\nиз-под рыбы. Пытаясь избавиться от характерного неприятного запаха, он обжег их\nизнутри. Через несколько месяцев оказалось, что напиток улучшился, став мягче от\nконтакта с горелой древесиной.\nБочки делают из белого американского дуба. Его раскалывают на доски, которые\nсушат либо на свежем воздухе, либо на складе с контролируемой температурой и\nвлажностью. Затем бочарные доски досушивают в больших печах. В ходе этих операций древесина испускает пахучие нежелательные вещества, которые могут придать\nвиски сильный древесный привкус, а необходимые ароматы закрепляются в древесине благодаря усадке древесного волокна. Затем бочки изготавливают таким же\nспособом, как и везде, включая стягивание, проводимое над огнем. Эту операцию\nназывают Toasting (поджарка).\nПрежде чем закрыть бочку сверху и снизу, ее снова обжигают, что называется\nCharring. При этом бочка обугливается изнутри на глубину полсантиметра. Этот\nобжиг еще сильнее концентрирует древесные ароматы, в особенности ванили, и в\nбудущем, благодаря карамелизированным древесным сокам, придает виски красивый теплый оттенок.\nОбугленный слой играет еще одну роль в созревании виски. Подобно фильтру, он\nпонемногу абсорбирует оставшиеся нежелательные компоненты напитка.\nБочка обжигается в большей или меньшей степени. Уровень ее обугливания варьируется от 1 до 4.\nКстати, старые бочки из-под бурбона пользуются большим спросом у производителей шотландского и ирландского виски и даже у некоторых производителей рома и\nтекилы.\n\n120 Виски\n\nПерегонка и выдержка\nПиво дистиллируют чаще всего в аппарате непрерывной перегонки.\nКрепость виски на выходе из аппарата, как правило, не должна превышать 160 proof (80% vol.),\nчтобы сохранились характерные черты использованного сырья.\nПримеси, среди которых сивушные масла, в будущем, в ходе выдержки в бочке, разовьют ценные\nароматы.\nВиски разбавляют водой, снижая его крепость\nмаксимум до 125 proof (62,5% vol.).\nПосле выдержки в бочках, которая обычно продолжается от 2 до 4 лет, а иногда и дольше, его\nфильтруют и разливают по бутылкам.\n\nВ иды америк анского\nвиски\n1. З ерновые категории\nBourbon (Бурбон)\nЭто наиболее известный и старейший американский виски. Его производят из зерна, содержащего по меньшей мере 51% кукурузы.\nВиски получил свое название от провинции Бурбон в штате Кентукки.\nНекоторые производители выпускают Wheated\nBourbon («пшеничный бурбон»). Он делается из\nсусла, содержащего больше пшеницы, чем ржи.\n\nRye whiskey (Рай виски)\nРжаной виски, который получают из зернового\nсусла, содержащего не менее 51% ржи.", "Rye Malt whiskey (Рай молт виски)\n\nBlended Whiskey (Блендид виски)\n\nВиски, который получают из зернового сусла, содержащего не менее 51% соложеной ржи.\n\nКупаж, в котором содержится не менее 20%\nStraight Whiskey, а оставшиеся 80% могут состоять из виски других видов или спирта.\n\nCorn whiskey (Корн виски)\nГотовится из зернового сусла, содержащего не\nменее 80% кукурузы. Он предназначен, главным\nобразом, для местного потребления. В отличие\nот других виски, его не требуется выдерживать.\nА в случае выдержки, должны применяться необугленные или уже использованные бочки.\n\nWheat whiskey (Вит виски)\nПроизводится из зерна, содержащего не менее\n51% пшеницы.\n\nMalt Whiskey (Молт виски)\nЭтот виски получают из зерна, содержащего не\nменее 51% соложеного ячменя.\nПосле перегонки крепость вышеперечисленных\nвиски не должна превышать 160 proof (80% vol.),\nчтобы сохранились ароматы и вкус использованного сырья.\nВсе виски (за исключением Corn Whiskey) должны быть выдержаны в новых обугленных дубовых бочках. Срок выдержки законом не оговаривается.\n\n2. Согласно технологии\nStraight Whiskey (Стрейт виски)\nСлово «Straight», как правило, добавляется на\nэтикетке к вышеперечисленным виски «зерновых\nкатегорий»: например Straight Bourbon.\nК разновидности Straight предъявляются следующие требования:\nЭто виски из зернового сусла, крепость которого\nпосле перегонки не должна превышать 160 proof\n(80% vol.).\nПеред выдержкой он может быть разбавлен водой до крепости не более 125 proof.\nЭтот виски выдерживают в новых обугленных\nбочках не менее двух лет.\nЕго разливают по бутылкам крепостью не менее\n80 proof (40% vol.).\nВ том случае, если виски Straight старел в бочках менее 4 лет, на этикетке должен быть указан\nточный срок его выдержки. В противном случае\n– при выдержки от 4 лет и более – этот срок указывать не обязательно.\nЕсли название Straight Whiskey использовано на\nэтикетке без указания «зерновой категории», то\nнапиток сделан из сусла, в котором ни один вид\nзлаковых не содержится в количестве 51% и более.\n\nLight Whiskey (Лайт виски)\n«Легкий» виски, дистиллированный при высокой температуре до крепости 160-190 proof. Он\nсодержит мало вторичных элементов. Его выдержка проходит в необугленных или использованных ранее дубовых бочках. Такой способ производства дает светлое спиртное с нейтральным\nвкусом.\n\n3. П о системе госконтроля\nBottled-in-Bond Whiskey\n(Ботлед-ин-бонд виски)\nЭтот виски старел не менее 4 лет на складах,\nконтролируемых государством, что гарантирует\nсрок выдержки напитка и освобождает производителя от ряда налогов. Он разливается по бутылкам крепостью 100 proof (50% vol.)\n\n4. П о способу фильтрации\nTennessee Whiskey (Теннесси виски)\nЕго производят подобно бурбону, но после перегонки дистиллят очищают с помощью угольного\nфильтра, полученного из древесины клена.\nТакие фильтры используются только в Теннесси,\nпоэтому виски получил название этого штата.\n\n5. П о индивидуа льным\nпризнак ам\n\nS our M ash W hiskey\nПри производстве «Сауэр маш виски»\nиспользуют метод закваски, который\nгарантирует постоянство вкуса напитка. Около четверти не востребованного при дистилляции сусла, оставшегося в перегонном кубе, добавляют в\nновое сусло, чтобы активизировать\nброжение.\nБольшинство виски в США получают\nименно таким способом, хотя производители не всегда указывают это на\nэтикетке.\nЕсли метод закваски не используется, то мы имеем дело со Sweet Mash\nWhiskey (Свит маш виски).\n\nSingle Barrel Whiskey\n(Сингл Бэррел виски)\nЭтот виски происходит из одной бочки, и его\nвкус не подвергается сглаживанию, неизбежному\nпри купажировании содержимого разных бочек,\nв разной степени обугленных и хранимых при\nразных температуре и влажности.\n\nSmall Batch Bourbon\n(Смол Бэтч бурбон)\nТакой бурбон происходит из небольшой партии\nотобранных бочек (не более двадцати), содержимое которых купажируют перед разливом по\nбутылкам.\n\nVintage Whiskey\n(Винтейдж виски)\nНа этикетке этого винтажного\nвиски указывается год перегонки и разлива по бутылкам.\n\nВиски 121", "А мерик анские винок урни и бренды виски\nАмериканские винокурни производят как свой\nсобственный виски, так и виски для независимых\nбрендов. В результате количество брендов превышает число винокурен.\nДалее описаны как все основные винокурни,\nпроизводящие бурбон и теннесcийский виски,\nтак и наиболее известные марки, которые можно встретить в продаже. Для некоторых указан\nсостав сусла (mash bill). Он носит приблизительный характер и может меняться в зависимости от\nбренда и линейки.\n\nA. Smith Bowman (Эй. Смит Бауман)\nДистиллерия Maker's Mark в Лоретто,\nштат Кентукки, начала производить\nодноименный виски в 1953 году.\nОднако основана она была гораздо\nраньше (правда, под другим названием) – в 1805 году.\nСегодня она входит в книгу рекордов\nГиннесса, как старейшая дистиллерия\nпо производству бурбона.\n\nПодобно многим американским винокурням, Эй.\nСмит Бауман открылась после отмены сухого закона в 1935 году. В 1988 году винокурня поменяла\nсвое местоположение и сменила оборудование\nна более современное, позволяющее ей выпускать также и водку.\nЛинейка: Virginia Gentleman Bourbon, Virginia\nGentleman Small Batch Bourbon и др.\n\nBarton (Бартон)\nВинокурня Бартон, расположенная в Бэрд-стоуне,\nштат Кентукки, производит бурбон таких известных марок, как Kentucky Gentleman Bourbon и\nVery Old Barton. Состав сусла: 75% кукурузы, 15%\nржи, 10% ячменного солода.\n\nBuffalo Trace (Буффало Трейс)\nЭта винокурня бурбона, одна из старейших в Соединенных Штатах, была основана в 1857 году в\nКентукки на месте исторической винокурни 1787\nгода. Название «Буффало Трейс» (след бизона)\nвоскрешает путь перемещения бизонов в период\nих миграции. Буффало Трейс производит и разливает виски нескольких брендов.\nЛинейка: Ancient Age, Benchmark, Eagle Rare,\nBlanton’s, Sazerac Rye, Old Rip Van Winkle, Van\nWinkle Special Reserve 12 y.o., Papy Van Winkle\nFamily Reserve 23 y.o. и т.д.\nСостав сусла: 80% кукурузы, 10% ржи, 10% ячменного солода.\n\nEarly Times (Эрли Таймс)\nВинокурня была открыта в 1860 году в Лоренсбурге, штат Кентукки. Бурбон Эрли Таймс – легкий, ванильный, с жареным послевкусием.\nЛинейка: Early Times Bourbon (79% кукурузы, 11%\nржи, 10% ячменного солода), Old Forester Bourbon\n(кукуруза 72%, рожь 18%, ячменный солод 10%).\n\nFour Roses (Фор Роузес)\nФор Роузес использует 5 различных штаммов дрожжей и 2 варианта состава сусла, чтобы разнообразить вкус разных бурбонов, которые отличаются\nнежностью и нотками ванили. Винокурня была основана в 1888 году и одна из немногих продолжала\nдействовать в годы сухого закона, выпуская медицинский спирт.\nЛинейка: Four Roses Straight Bourbon, Single Barrel\nи т.д.\n\nGeorge A. Dickel (Джордж Эй. Диккел)\n\u0007 жордж Диккел, основанная в 1870 году, – это\nД\nвинокурня Теннесси, менее известная по сравнению с Джек Дэниэлс. Здесь также используют\nметод фильтрации виски через древесный уголь.\nДля слова «виски» на этикетках используется шотландская орфография («whisky», без буквы «e»).\nЛинейка: George A. Dickel’s Tennessee Sour Mash\nWhisky.\n\nHeaven Hill (Хэвен Хилл)\nВинокурня была основана в 1934 году вскоре после отмены сухого закона. С тех пор Хэвен Хилл\n\n122 Виски", "выпускает бурбоны, своими названиями воздающие должное первым винокурам, таким как Эван\nУильямс или Элайджа Крэйг.\nХэвен Хилл также владеет винокурней Bernheim\nDistillery, расположенной в Луисвилле, штат Кентукки.\nЛинейка: Heaven Hill Bourbon, Evan Williams\nBourbon, Elijah Craig Bourbon, Pikesville Rye\nWhiskey, Bernheim Original Wheat Whiskey и.т.д.\n\nJack Daniel’s (Джек Дэниэлс)\nЗнаменитая винокурня Джека Дэниэла была зарегистрирована в 1866 году. Она расположена\nв штате Теннесcи, где производят особый виски.\nЕго фильтруют через кленовый уголь, что придает напитку мягкость и нежную структуру. По\nэтой причине Jack Daniel's – это не бурбон, это\nтеннесcийский виски.\nЛинейка: Jack Daniel’s Old №7, Gentleman Jack,\nJack Daniel’s Single Barrel.\n\nJim Beam (Джим Бим)\nИстория этой винокурни восходит к 1795 году,\nкогда Кентукки вошел в состав Соединенных\nШтатов Америки. Ее сегодняшний мастер-дистиллер относится к седьмому поколению семьи Бим.\nСостав сусла меняется в зависимости от линейки,\nно хранится производителем в секрете. Бурбон\nподвергается двойной перегонке, а затем разливается в обожженные бочки из белого американского дуба. Для его разбавления используется богатая минералами вода, не содержащая примесей\nжелеза. В результате получается мягкий виски,\nодновременно традиционный и современный.\nЛинейка: классический Jim Beam и вкусовые варианты бурбона: Red Stag с ароматами черешни,\nяблочный Apple, медовый Honey. А также 12-летний Signature Craft.\n\nMaker’s Mark (Мэйкерс Марк)\nБурбон Maker's Mark производят на винокурне,\nзаново открытой в 1953 году, но восходящей к\n1805 году. Название бренда Maker's Mark означает\n«Знак мастера» и отражает гордость производителей за свой виски. Этикетки Maker's Mark до сих\nпор печатают на старинном типографском станке. Бутылки запечатывают красным сургучом.\nMaker's Mark – это пшеничный бурбон. То есть, в нем\nдоминирует кукуруза, но пшеница заменила рожь,\nпридающую виски, по мнению некоторых специалистов, избыточную горчинку.\nНа его бутылке никогда не указывается срок выдержки. Производители Maker's Mark считают, что\nважность выдержки невозможно выразить цифрами. Поэтому ее срок может быть различным:\nнапиток выдерживают столько, сколько потребуется. В настоящее время Мэйкерс Марк – одна из\n\nнемногих винокурен, где продолжают использовать ротацию бочек, то есть перекладывать верхние вниз, а нижние – вверх, в целях оптимизации\nвыдержки виски и обеспечения однородности\nконечного напитка.\nЛинейка: Maker’s Mark Bourbon. Состав сусла: 70%\nкукурузы, 16% пшеницы, 14% ячменного солода.\n\nWild Turkey (Уайлд Терки)\nОстин Николс в 1855 году занялся оптовой торговлей чаем и спиртными напитками, а в 1869\nгоду открыл эту винокурню. С тех пор фирма\n«Уайлд Терки» стала знаменитым производителем бурбона. Ее виски выдерживают в сильно обугленных бочках.\nЛинейка: Wild Turkey Bourbon, Wild Turkey Single\nBarrel, Wild Turkey Rye Whiskey, Wild Turkey 12 y.o. и т.д.\n\nWoodford Reserve (Вудфорд Резерв)\nЭта маленькая винокурня (ее прежнее название\n– Labrot & Graham) была открыта Элайджей Пеппером в 1812 году. Несмотря на свой почтенный\nвозраст, винокурня абсолютно современна. В\n1994 году она была полностью модернизирована.\nЗдесь производится Woodford Reserve Straight\nBourbon, элегантный и породистый виски, который включает 72% кукурузы, 18% ржи и 10% соложеного ячменя. Напиток подвергается тройной\nдистилляции в медных кубах и выдерживается в\nсреднем около 8 лет в небольших обожженных\nбочках из белого дуба.\n\nДжаспер Ньютон «Джек» Дэниел\n(1850-1911) занимался перегонкой с ранних лет, став хозяином и\nмастером-дистиллером линчбургской\nвинокурни (штат Теннесси), зарегистрированной в 1866 году.\nСегодня, как и во времена Джека Дэниела, на его дистиллерии\nжгут древесину сахарного клена.\nПолученный уголь измельчают до\nкусочков размером не больше 6 мм и\nукладывают в фильтр трех-метровой\nтолщины, через который медленно\nпросачивается свежеперегнанный\nвиски, чтобы сделаться еще мягче.\nИменно этот процесс относит Jack\nDaniel's к разряду теннессийских\nвиски, а не бурбонов.\nЗатем виски выдерживают в новых\nобожженных дубовых бочках собственного производства.\nТочного срока выдержки виски не существует, но в любом случае напиток\nстареет не менее четырех лет.\nJack Daniel's Old № 7 – это один из\nсамых востребованных виски в мире.\nСимвол щедрости, комфорта и хорошей компании. Его пьют без строгих\nправил: в чистом виде, со льдом, с\nколой, с лимонадами, в составе коктейлей.\n\nВиски 123", "Я понский виски\nЯ пония – одна из самых молодых с тран - производите лей виски , поскольк у пер вая винок урня была открыта здесь только в 1923 году.\nС тех пор, основываясь на шотландских традициях винокурения и применяя ти пично японск ую тщате льнос ть , мес тные винокуры добились впечатляющих ре зультатов и радуют любите лей во всем мире отличным виски с ярким харак тером .\n\nО тец - основатель\nяпонского виски\n\nСтрана восходящего солнца располагает уникальными природными условиями, что в сочетании с\nяпонским умением и тщательностью позволяет\nпроизводить виски высокого качества, в котором\nнаходит отражение профессионализм мастеров\nпо перегонке, выдержке и купажированию.\n\nренного торфом солода, дистиллят перегоняют\nв традиционных аламбиках или в кубах непрерывного действия и выдерживают в бочках всех\nтипов, с тем чтобы обладать как можно более широкой палитрой виски.\nВсего в Японии насчитывается с десяток винокурен, где производят солодовый виски.\n\nО сновные винок урни\n\nFuji-Gotemba (Фудзи-Готемба)\n\nОсобенность японских дистиллерий такова, что\nконкурирующие компании не продают друг другу свои запасы виски для купажирования как в\nШотландии. В Японии есть возможность купажировать между собой только те солодовые виски,\nкоторые получены на дистиллериях, принадлежащих той же самой компании. Поэтому каждое\nпредприятие производит широкий спектр виски.\nИх получают на основе более или менее проку-\n\nHakushu (Хакушу)\n\n124 Виски\n\nЭта винокурня была основана в 1973 году. Она\nимеет собственное бочарное производство, цех\nпо розливу и использует как традиционную, так и\nнепрерывную перегонку.\n\nГорная винокурня Hakushu (Хакушу) расположена в окружении древних лесов у подножья горы\nКай Комагатакэ, во влажном прохладном климате,\nрядом с подземными источниками с кристальной\n\nМасатака Такетсуру – отец японского\nвиски. Он родился в 1894 году в семье\nпроизводителей саке и в 1919 году отправился в Шотландию для изучения\nхимии.\nТам Масатака Такетсуру влюбился в\nмолодую шотландку. Пара обосновалась в Кемпбелтауне, где Масатака\nработал на винокурне.\nВ 1920-м году Масатака вернулся\nв Японию и затем стал руководителем первой японской винокурни\n«Ямазаки», которая была построена\nяпонской компанией «Котобукия»,\nпревратившейся впоследствии в\nгиганта «Сантори».\nВ 1934 году Масатака построил свою\nсобственную винокурню «Йочи». Для\nнее он выбрал остров Хоккайдо, поскольку тамошний климат напоминал\nему Шотландию.\nНа фото: Масатака Такетсуру с шотландской женой Ритой.", "компании «Никка», которая также владеет винокурней Йочи. Перегонные кубы имеют форму boil\nballs, то есть у них есть вздутия, которые, как считается, придают цветочный вкус виски, к тому же\nслабо торфированному.\n\nYamazaki (Ямазаки)\n\nводой. Она была построена в 1973 году и до недавнего времени считалась самой большой в\nмире.\nДля создания виски на винокурне Хакушу используют торф, привезенный из Шотландии, шотландский\nячмень и бочки для выдержки, как для шотландского виски. Продукция винокурни Hakushu имеет репутацию «зеленого и свежего» виски, который прекрасно сочетается с гастрономией.\n\nMiyagikyo (Миягикио)\nЭта винокурня, расположенная на острове Хонсю, была основана в 1969 году. Она принадлежит\n\nЯмазаки – первая винокурня Японии, основанная\nв 1923 году. Она находится недалеко от древней\nстолицы Японии, Киото, в окружении бамбуковых\nлесов, на месте слияния трех рек: Кацура, Кидзу,\nУдзи. Туманная область и обилие воды создают\nздесь влажный микроклимат, идеальный для выдержки виски.\nШотландское мастерство винокурения в сочетании с японской философией, союз традиций и\nинноваций – так представляется односолодовый\nвиски Yamazaki.\nДля его создания используется ячмень, привезенный из Шотландии. Сусло перегоняют в перегонных кубах различных форм и размеров, что дает\nбольшое количество разнообразных вкусов и\nароматов виски.\nИспользование дубовых бочек из японского дуба\nМизунара сообщает виски характерный сладковатый привкус, ассоциирующийся с Востоком.\n\nYoichi (Йочи)\nЭта винокурня основана в 1934 году на острове\nХоккайдо «прародителем» японского виски Масатакой Такетсуру. Считается, что она производит\nвиски в шотландском духе: сложный, торфяной и\nмощный. Бутылки с виски из Йочи носят название\nкомпании «Никка», которая контролирует винокурню.\n\nС аке и сетю\nСаке – древний японский напиток,\nкрепостью 15–18% vol., который\nможно упрощенно назвать «пивом из\nриса», но без газа и пены.\nПроцесс производства саке включает\nполучение «опары», когда в пропаренный рис добавляют споры грибка\n«коджи-кин», который вызывает\nосахаривание риса. Затем в опару\nдобавляют воду, дрожжи и новый\nпропаренный рис, подвергая смесь\nступенчатой ферментации в течение\n15-30 дней. Перебродивший саке процеживают, фильтруют и, как правило,\nпастеризуют. В некоторые виды саке\nдобавляют немного крепкого алкоголя перед фильтрацией. Качество саке\nзависит от степени шлифовки рисовых\nзерен, свойств воды, температуры\nброжения...\nСетю, в свою очередь, – это крепкое\nспиртное, продукт перегонки браги\nиз риса.\nСегодня, из-за растущего влияния\nяпонской миксологии, как саке так и\nсетю достаточно широко используются в коктейлях.\n\nВиски 125", "126 ром", "Ч асть первая . Г лава 7\n\nРом и кашаса\nР ом – это один из тех спиртных напитков , которые наиболее широко исполь зуютс я в миксологии . О н ле жит в основе «Д айкири », входящего в тройк у са мых вос требованных кок тейлей мира . Р ом с лу жит ингре диентом других к убин ских смешанных напитков , а так же тики - кок тейлей , которые на ходятс я на пике\nпопулярнос ти . К роме того , ром все чаще используе тс я в твис та х легендарных\nкок тейлей к ак , например, «О лд Ф ешенд ».\nГоворя о вида х и бренда х рома , с ле дуе т отме тить , что эта а лкогольна я к атего рия сейчас пере живае т бурное развитие .\n\nВ последние годы великие исторические бренды\nрасширили предложение, увеличив число ромов\nразличных сроков выдержки, и предлагают напитки высшего качества. Но одновременно мы\nнаблюдаем появление множества новых брендов\nс прекрасно разработанной маркетинговой концепцией, к которым бармен должен относиться с\nнекоторой с осторожностью. Разработка нового\nсорта рома – это сложный и длительный процесс.\nВремя невозможно купить, а опыт мастеров нельзя заменить ничем.\n\nИ с тория\nСахарный тростник появился на свет либо в Индии, либо в Новой Гвинее. Распространившись в\nИндонезии и Китае, растение проникло в Египет,\nна Средний Восток, а позднее – в Европу. Однако наилучшие условия для развития сахарный\nтростник обрел благодаря Колумбу, когда в 1493\nгоду он взял с собой несколько ростков этого\nрастения в свое второе путешествие в Новый\nСвет. Так сахарный тростник познал солнце Карибских островов. Разведение тростника стало\nстратегическим занятием. Торговля сахаром была\nверным средством для обогащения, а значит, для\nзавоевания новых территорий.\nПри изготовлении ценного сахара образовывался побочный продукт – темная, густая и ароматная патока. Она имела тенденцию к естественному брожению, и такой же естественной оказалась\nидея о ее перегонке.\n\nГлавными производителями рома стали англичане,\nибо испанцы и французы усматривали в роме конкурента своих национальных спиртных напитков.\n\nТорговый треугольник\nВ 17–18 веках английские переселенцы использовали «торговый треугольник», в котором ром\nслужил валютой. В то время население Карибских островов значительно сократилось из-за\nэпидемий, распространившихся с приходом колонистов. На рубку сахарного тростника вместо\nкоренных жителей стали привлекать рабов, завозимых из Африки. Корабль, груженный ромом,\nплыл с восточного берега Америки в Африку. В\nАфрике ром обменивали на рабов, которых везли\nна Карибские острова для работы на плантациях.\nПо прибытии в порт рабов меняли на сахар и патоку, которые вновь отправляли в Америку, где\nпроцветало производство рома из привозного и\nместного сырья.\nТорговый треугольник распался в 1808 году, когда была запрещена торговля рабами. Однако он\nимел серьезные последствия. Из-за него изменилась мировая демография, он способствовал вырождению аборигенов и привел к образованию\nнекоторых колоссальных состояний.\nСегодня основные страны-производители рома\n– это Большие Антильские острова (Куба, Ямайка,\nГаити, Пуэрто-Рико), Малые Антильские острова\n(Мартиника, Гваделупа, Тринидад, Барбадос), Доминиканская Республика, Южная Америка (Гайана, Бразилия и Венесуэла), а также США.\n\nР ом – кровь адмирала\nВ 18-м и начале 19 века ром, наряду\nс бренди, был самым распространенным алкоголем. Он был излюбленным\nнапитком английского адмирала\nГорацио Нельсона, который много\nраз побеждал французов, но был\nсмертельно ранен в 1805 году\nу берегов Испании в Трафальгарском\nсражении.\nЧтобы сохранить тело адмирала во\nвремя возвращения на родину, его\nпоместили в бочку с ромом.\nГоворят, когда корабль достиг Англии,\nбыло обнаружено, что в бочке не\nосталось ни капли спиртного. Невзирая на все запреты, команда тайком\nпила ром из бочки на протяжении\nвсего плавания…\nПосле этого ром стали называть\nкровью Нельсона.\n\nром 127", "ЧРЕЗМЕРНОЕ УПОТРЕБЛЕНИЕ АЛКО\n128 ром", "ро\nОтк\n\nй д л я се\n\nбя\n\nнастоящие\n\nромы\n\nкаждая капля\nвыдержана под\n\nкарибским\n\nсолнцем\n\nГОЛЯ ВРЕДИТ ВАШЕМУ ЗДОРОВЬЮ\nром 129", "Н аследие Факундо Б акарди\nДля барменов, миксологов и всех тех, кто имеет\nотношение к бару, коктейлям и спиртным напитками, Bacardi – это бренд, с которым необходимо\nблизкое знакомство, поскольку он будет сопровождать их на протяжении всей карьеры.\nВ самом деле, дом Bacardi был первооткрывателем в том, что касается легкого рома, на основе\nкоторого впоследствии были созданы такие\nмонументальные коктейли, как «Дайкири» и\n«Мохито». В наши дни Bacardi – один из главных\nбрендов современной миксологии.\n\nИстория бренда\n1862 год. Это дата вступления Bacardi в историю. Человек по имени Факундо Бакарди Массо\nвпервые создал ром, ставший образцом легкого\nстиля, в противоположность тяжелому рому,\nпроизводившемуся в английских колониях.\nФакундо Бакарди родился в 1814 году в Ситжесе,\nв Испании. Как и многие другие каталонцы, в\n1830 году он отплыл на Кубу, в надежде добиться\nтам многого. Но дорога оказалась трудной. Когда\n\n130 ром\n\nон обосновался в Сантьяго-де-Куба и занялся\nторговлей спиртными напитками, город был разрушен землетрясением. Он перевез свою семью\nобратно в Испанию, а сам вернулся на Кубу. Там\nон принялся за производство собственного\nрома, ориентируясь на технологию сбраживания\nи перегонки коньяка.\nВ 1862 году дон Факундо Бакарди открыл свою\nвинокурню. В основание империи Bacardi был\nзаложен первый камень.\nИдею эмблемы в виде летучей мыши, украшающей каждую бутылку Bacardi, подала супруга\nдона Факундо: колония летучих мышей обосновалась на балках под крышей винокурни. А на\nКубе летучая мышь – это символ счастья.\nТак началась сага рома Bacardi. В последующие\nгоды дружная и трудолюбивая семья Бакарди\nсыграла на Кубе немаловажную роль, а их ром\nстал эмблемой острова.\nВ годы американского сухого закона Куба превратилась в коктейльную столицу. Ром Bacardi\nлился потоками, в том числе в баре «Флориди-\n\nСлева. Дон Факундо Бакарди.\nСверху. Первая винокурня по\nпроизводству рома Bacardi была\nоткрыта в Сантьяго-де-Куба в 1862\nгоду.", "та» (основан в 1819 году), где трудился великий\nбармен Константе Рибалаигуа Верт, в 1918 году\nсделавшийся владельцем этого бара.\nУ Константе работал барменом Мигель Боадас,\nвпоследствии открывший свой знаменитый бар\nв Барселоне.\nКонстанте получил известность в качестве\nбармена, готовящего лучшие «Дайкири» на свете.\nБолее того, он создан замороженную версию\nэтого коктейля: Frozen Daiquiri.\nНадо сказать, что «Дайкири» был основой успеха\nрома Bacardi. Этот коктейль придумал инженер Дженнинг Кокс, работавший на железных\nрудниках под названием Дайкири, неподалеку от\nСантьяго-де-Куба.\nКроме того, Bacardi был ромом Эрнеста Хемингуэя, завсегдатая бара «Флоридита», где он пил\n«Дайкири», а позже – «Папа Доббле», в которых\nвместо сахара использовался ликер Мараскино.\nКомпания Bacardi неоднократно приглашала\nХемингуэя на различные мероприятия и даже\nорганизовала торжественный прием в честь его\nНобелевской премии.\nВ 1931 году, пользуясь своим мировым успехом,\nкомпания Bacardi развернула производство\nв Мексике, а в 1936 году – в Пуэрто-Рико. Эти\nстратегические решения позволили ей продолжить производство рома и развиваться после\nкубинской революции и ухода с Кубы.\nСегодня ром Bacardi производится в Пуэрто-Рико, Мексике и Индии, но повсюду по единой технологии, разработанной основателем – доном\nФакундо Бакарди в 1862 году!\n\nИ с торическ а я линейк а\nПредставители исторической линейки Bacardi являются прямыми наследниками\nтого легкого рома, который был создан доном Факундо Бакарди в 19 веке и который\nоткрыл безграничные возможности для создания коктейлей. До сих пор эти ромы\nпроизводят соблюдая основные методы, разработанные доном Факундо.\n\nBacardí Carta Blanca\nАгуардиенте – один из компонентов купажа этого рома, выдерживается в среднем\nкак минимум 18 месяцев в дубовых бочках, а затем очищается путем фильтрации\nчерез древесный уголь. В итоге ром обладает мягким характером и кристальным,\nнепорочным обликом.\nBacardi Carta Blanca – это чистая миксология. Его утонченные ароматы превосходным\nобразом проявляются в известных коктейлях: «Мохито», «Дайкири», «Пинья Колада».\n\nBacardí Carta Oro\nBacardi Carta Oro выдерживают в среднем как минимум два года в дубовых бочках. Он\nобладает ароматами тропических фруктов, кураги и ванили.\nBacardi Carta Oro – идеальная основа для «Куба Либре». Этот классический коктейль\nкак раз и был создан на золотом Bacardi.\n\nBacardí Carta Negra\nВыдерживается в среднем как минимум 3 года в сильно обожженных бочках, набирая\nтемно-коричневый цвет с красным отливом, а также интенсивный вкус и мягкость.\nBacardi Carta Negra послужит прекрасной основой для коктейлей «Май Тай» и «Пунш\nПлантатора». Кроме того, стоит попробовать закусить его долькой апельсина, посыпанной молотой корицей.\n\nОсобенности производства\nРазумеется, производство рома Bacardi, ставшего одним из величайших брендов спиртных\nнапитков, утратило кустарный характер времен\nдона Факундо. Однако основные принципы сохранились, и созданный доном Факундо характер рома соблюдается в малейших деталях.\nДо 1862 года кубинский ром был примитивным,\nжестким и неприятным. Обеспеченные кубинцы предпочитали другие напитки, в частности\nконьяк. Именно для них дон Факундо создал\nболее утонченный и элегантный ром, который,\nнаконец, можно было сравнить с изысканным\nалкоголем. Для того, чтобы получить его, он соблюдал семь правил, которые используются до\nсих пор.\n1. Он тщательно отбирал патоку сахарного\nтростника, которая определяет стиль рома\nBacardi.\n2. Он контролировал ароматический профиль\nсусла из патоки благодаря особым дрожжам: он\n\nром 131", "Л инейк а Facundo ,\nпосвященна я основате лю компании\nЭта коллекция ромов – дань уважения наследию дона Факундо Бакарди и кульминация 150-летней истории дома. Каждый из ромов данной коллекции имеет свой неповторимый стиль. В их основе лежат самые редкие выдержанные спирты, хранящиеся в\nсемейном «парадизе» (хранилище ценных спиртов) на Багамах.\nМэни Оливер – старший Maestro de ron Bacardi – создал 40 купажей различной выдержки, и Семья Бакарди отобрала 4 рома, составивших линейку Facundo. Эти ромы\nпроизводятся в ограниченном количестве. Каждая бутылка, сама по себе произведение искусства, имеет индивидуальный номер. Они созданы для истинных любителей и\nпочитателей выдержанных напитков.\n\nFacundo Neo – это, может быть, самый старый белый ром на рынке. Он состоит из\nмощных спиртов, выдержанных до 8 лет в бочках и процеженных через угольный\nфильтр для создания сложного ароматического профиля с мягким, деликатным послевкусием.\n\nFacundo Eximo – единственный ром в коллекции, купажированный еще до выдержки,\nкоторая длится 10 лет и проистекает в лучших дубовых бочках. Eximo означает «свободный», демонстрируя свободу от технологических традиций.\n\nFacundo Exquisito означает «изысканный», это идеально сбалансированный купаж ромовых спиртов, выдержанных от 7 до 23 лет в дубовых бочках. После купажирования\nром дозревает в бочках из-под хереса минимум месяц, приобретая мягкое послевкусие. Тропический климат способствует повышенному испарению содержимого бочек.\n«Доля ангелов» составляет от 6 до 10% в год. Неудивительно, что старые ромовые\nспирты встречаются редко, ведь после 23 лет выдержки остается лишь 5% от изначального объема бочки.\n\nFacundo Paraíso (то есть, «рай») – это тщательно созданный купаж старейших премиальных дистиллятов семьи Бакарди. Финальная выдержка проходит в бочках из-под\nконьяка категории XO. Коньячные бочки – это дань уважения донне Амалии, жене\nФакундо Бакарди, француженке по происхождению.\n\n132 ром\n\nвыделил и вырастил специальный штамм дрожжей (сегодня известный под названием Bacardi\nLevadura).\nЭтот штамм дрожжей используется до наших\nдней, он позволяет контролировать брожение и\nв любой момент иметь возможность удостовериться в консистенции и аромате сусла.\nСледует отметить, что дрожжи играют почти\nстоль же важную роль, что и сырье (в данном\nслучае патока сахарного тростника) для окончательного вкуса спиртного напитка.\nДрожжи – один из главных секретов вкуса ромов\nBacardi.\n3. Дон Факундо работал с двумя различными\nпродуктами перегонки.\nОдин перегонялся дважды и давал тяжелый\nдистиллят «агуардиенте», обеспечивающий вкус\nи мощь рома Bacardi. Другой, полученный в результате многократной перегонки, – «редестиладо» – придавал рому Bacardi его специфическую\nмягкость и легкость.\nСегодня для дистилляции используются колонны непрерывного цикла. «Агуардиенте» проходит через одну колонну и очищается до 75%\nсодержания алкоголя, а «редестиладо» проходит через 5 колонн и на выходе имеет крепость\nоколо 93% vol.\n4. Дон Факундо трудился над фильтрацией рома.\nОн процеживал его сквозь древесный уголь,\nчтобы избавиться от нежелательных запахов, и\nполучить спиртное самого высокого качества с\nтонким ароматом.", "До наших дней ромы Bacardi фильтруют, используя уголь из древесины тропических пород,\nсостав которых меняется в зависимости от сорта\nрома.\n5. Дон Факундо направлял различные сорта\nрома, полученные путем разной перегонки и\nпроцеженные сквозь древесной уголь, на выдержку в дубовых бочках, чтобы смягчить их и\nпомочь раскрыться их ароматам.\n6. На следующем этапе он снова фильтровал\nчасть этих выдержанных спиртов через древесный уголь.\nЭто позволяло получить прозрачный и неокрашенный ром, выглядящий, как молодой, в\nто время как, на самом деле, он был смягчен\nсозреванием в дубовой бочке.\n7. Наконец, дон Факундо искусно смешивал\nразличные полученные им сорта рома, чтобы\nпридать рому Bacardi превосходный аромат и\nравновесие.\nКомпания Bacardi смогла добиться процветания\nдоставшегося ей наследия, соблюдая методы\nдона Факундо и приспосабливаясь к прогрессу\nсовременного мира.\nНевзирая на планетарный успех, она осталась\nсемейной компанией, для которой опыт предков\n– это главное богатство.\n\nН ова я премиа льна я коллекция ромов\nПремиальные ромы Bacardi, выдержанные под карибским солнцем, вбирают в себя\nнаследие дома «Бакарди» и одновременно обладают своим собственным современным стилем, отражая умение и опыт Мастеров рома.\n\nBacardí Añejo Cuatro (4)\nЭкспрессия Карибских островов и их бурной природы, которую олицетворяют\nпальмовые листья на этикетке. Спирты выдержаны по меньшей мере четыре года в\nбочках.\nРом обладает золотисто-абрикосовым цветом. В его вкусе раскрывается ваниль,\nдубовые ноты, мед и гвоздика.\n\nBacardí Reserva Ocho (8)\nКак минимум восемь лет выдержки в бочках позволяют изготовить этот яркий золотистый ром с пряными ароматами древесины, абрикоса, мускатного ореха и тоффи.\n\nBacardí Gran Reserva Diez (10)\nBacardi Gran Reserva Diez стареет по меньшей мере 10 лет в обугленных бочках из\nбелого дуба, набирая темно-золотистый цвет и мягкость с деликатными копчеными\nакцентами. В его ароматах преобладают фруктовые тона с карамельно-ванильными\nоттенками.\n\nBacardí Gran Reserva Limitada\nЭто исключительный ром в матовой черной бутылке. Он происходит из ограниченных запасов спиртов, долго выдержанных в бочках. Дубовые ноты, сухофрукты и\nбогатые оттенки тропических плодов присущи этому темно-золотому напитку, который концентрирует в себе всю щедрость природы Карибских островов и искусство\nМастеров рома. Предназначен для особых случаев.\n\nром 133", "После трех прогонов остается темная густая и\nлипкая жидкость, содержащая 50% сахара и множество вторичных элементов. Это патока. Она\nвбирает в себя все оставшиеся примеси, которые\nна самом деле сообщают рому его душистый аромат.\n\nБрожение\n\nПроизводство рома\nНа мастера рома возложена ответственная задача выдержки различный ромовых спиртов (агуардиенте)\nс последующим купажированием их\nмежду собой, чтобы добиться равновесия между силой и изысканностью,\nсложностью и легкостью.\n\nСреди других спиртных напитков ром проявляет\nсильнее всего ароматы и вкус использованного\nсырья. Поэтому все способы обработки во время\nего производства оказывают большое влияние на\nхарактер конечного продукта.\n\nСок сахарного тростника\nОчищенную от листьев нижнюю часть сахарного\nтростника разрубают, измельчают и дробят. После\nнескольких прессований из нее вытекает сок. Его\nоставляют «отдохнуть» некоторое время, чтобы\nотделить взвеси, делающие сок мутным. Наконец,\nего фильтруют. А осадок используется на плантациях в качестве удобрения.\n\nИзготовление патоки\nВ мире производству 90% рома сопутствует производство сахара.\nСок сахарного тростника нагревают и концентрируют выпариванием. Для благоприятной кристаллизации в сироп добавляют мелкий сахарный\nпесок, который обрастает свежими кристаллами.\nПутем обработки на центрифугах образовавшиеся кристаллы сахара отделяют. Эту операцию\nпроводят несколько раз, получая сахар разного\nкачества: от наиболее чистого до самого грубого.\n\n134 ром\n\nПатоку растворяют в воде и добавляют дрожжи,\nкоторые вызывают брожение. Оно во многом\nопределяет ароматы будущего напитка. В том\nслучае, когда хотят получить ром с характером, в\nпатоку добавляют закваску, как при производстве\nбурбона. Она называется Dunder и представляет\nсобой остаток последней перегонки. Dunder значительно усиливает ароматы рома. Наибольшее\nколичество закваски используют для тяжелого\nрома.\nИногда в патоку добавляют Skimming – пену, которая образуется на поверхности сока сахарного\nтростника, когда его выпаривают, извлекая сахар.\nSkimming имеет то же назначение, что и Dunder –\nразвитие у рома мощных ароматов.\nЭти способы производства были разработаны\nангличанами, которые стремились получать как\nможно более ароматный и концентрированный\nром, занимающий меньше места в трюмах кораблей. Он был предназначен для смешивания и\nпридания вкуса нейтральному алкоголю.\nТемпература брожения строго контролируется.\nЕсли она достаточно низкая, то брожение протекает медленно и займет 48 часов или больше, а\nиногда свыше 8 дней. Аромат рома будет интенсивным, концентрированным и тяжелым. Для легкого рома брожение проводят быстрее – около\n15 часов – и при более высокой температуре. По\nокончании брожения сусло достигает крепости\n8-10% vol.\n\nПерегонка\nДля получения рома могут использоваться два\nспособа дистилляции:\n• В аппарате «пот стил», схожем с теми, в которых\nперегоняют виски или коньяк. В этом случае после отделения «голов» и «хвостов» получается\nконцентрированный ром крепостью от 50 до 55%\nvol. Он известен высокой ароматической мощью\nи улучшается во время выдержки в дубовых бочках.\n• На многих островах, в том числе на Кубе и Пуэрто-Рико, применяют постоянную перегонку.\nСусло дистиллируют в трех-, четырех- или пятиколонном аппарате непрерывной перегонки, что\nделает ром более легким, тонким, с менее выраженным вкусом первичного сырья. Такой ром в\nменьшей степени предназначен для выдержки и\nнаходит свое лучшее отражение в коктейлях.", "Как делают\n\nРОМ\n1. Сахарный тростник рубят и увозят на переработку.\n\nВ случае с промышленным ромом, из тростникового\nсока вначале изготавливают сахар, а на производство\nрома идет побочный продукт сахарного производства –\nпатока.\n\nСок сахарного тростника может быть сразу\nнаправлен на брожение. Таким образом получают\nсельскохозяйственный ром.\n\n3. В сусло добавляют дрожжи и его\nподвергают брожению при строго\nконтролируемой температуре.\n\n2. После прессования из сахарного тростника\nвытекает сладкий сок.\n\n5. Ром выдерживают в дубовых бочках, где он\nобретает янтарный оттенок и дополнительные\nароматы.\n\n4. После перегонки перебродившее сусло\nпревращается в ром.\nром 135", "Выдержка\nПосле перегонки на долю рома выпадает один из\nдвух уделов.\n• Ароматные и тяжелые напитки выдерживают в\nдубовых бочках, которые сообщают рому янтарный оттенок. Бочки из-под бурбона и хереса придают напитку дополнительные ароматы. Несмотря на то, что климатические условия не слишком\nблагоприятны для долгой выдержки (сильная\nжара способствует ускоренному испарению и\nактивному растворению древесных танинов), ее\nсрок остается значительным и порой достигает\n12 лет и более.\n• Легкий ром можно пить в ближайшие месяцы\nпосле перегонки. После легкой выдержки в бочках его фильтруют, разбавляют водой, разливают\nпо бутылкам и выставляют на продажу. Иногда\nлегкий ром подвергают более серьезной выдержке, но она длится не более 8–9 лет.\n\nС лово «Р ом »\nСлово «ром» впервые появилось в\nначале 17 века. Считается, что оно\nпроисходит от слова rumballion,\nозначавшего драку между хулиганами Йоркшира, одного из крупнейших\nграфств Великобритании.\nОднако оно также могло возникнуть\nот научного названия самой используемой на Антильских островах\nразновидности сахарного тростника\n– Saccharum Officinarum.\n\nСтраны и стили рома\nОрганолептическое разнообразие рома обусловлено не только нюансами производства. Различия между ромом с разных островов можно\nобъяснить особенностями климата, почвы, воды,\nа также разными видами сахарного тростника.\nТем не менее в целях упрощения ситуации будем\nразличать ром в зависимости от его способа производства, который связан с полученным колониальным наследием.\n\nРом в английских традициях\nЭтот ром, подобно рому в испанских традициях,\nизготавливают из патоки, но он может быть как\nлегким, так и тяжелым.\nДостаточно легкий ром получают с помощью непрерывной перегонки на острове Тринидад и Тобаго. Ром с Барбадоса обладает большим ароматическим богатством, изготавливается согласно\nвековым традициям и, наверное, является самым\nдревним ромом Карибских островов. Сегодня он\nможет быть легким или более ароматным, дистиллированным либо в аппарате «патент стил», либо\nв «пот стил», а чаще всего представляет собой\nсмесь и того, и другого.\nГайана, принадлежавшая вначале Голландии, а\nзатем Франции и Англии, предлагает впечатляющее многообразие рома. Здешняя винокурня\nDemerara носит имя местной реки.\nЯмайский ром – темный, мощный и ультраконцентрированный. Его изначальное предназначение – придавать характер купажу, подобно тому,\nкак солодовый виски должен подчеркивать вкус\nбленда. На Ямайке также производят более легкий ром под названием Common Clean, получа-\n\n136 ром\n\nемый путем непрерывной перегонки в аппарате\n«патент стил».\nЗавершая тему островов, где производят ром в\nанглийских традициях, следует упомянуть СентЛюсию, Гренаду, а также Виргинские и Багамские\nострова. Среди них только на Виргинских островах производят ром, обладающий выразительным характером. А на других островах специализируются на изготовлении более легкого рома,\nкоторому отдают предпочтение сегодняшние\nпотребители, в частности, благодаря коктейлям.\n\nРом в испанских традициях\nПод ромом в испанских традициях подразумевается легкий ром.\nВ истории легкого рома важную роль сыграл\nдон Факундо Бакарди, уроженец каталонского\nгородка Ситжес. Приехав на Кубу, он стал торговцем винами и спиртными напитками, а позднее создал новый тип рома – тонкий, легкий,\nделикатный и пряный. Впоследствии стиль легкости окончательно утвердился благодаря американцам. После отмены сухого закона высокий\nспрос американского рынка на спиртное привел\nк значительному снижению его качества. Правительство США было вынуждено ввести строгое\nзаконодательство в отношении качества импортного алкоголя и отдало предпочтение легкому,\nочищенному рому, полученному путем постоянной перегонки. Так ром стал тоже бесцветным\nспиртным напитком, предназначенным в первую\nочередь для коктейлей.\nСегодня ароматическая палитра и возрастные категории рома «в испанских традициях» расширяются. Однако он всегда остается легким и тонким\nнапитком.\nНаиболее известные бренды рома «в испанских\nтрадициях» изготавливают в Пуэрто-Рико, во\nФлориде и на Кубе. К данной категории также относится ром, получаемый в Мексике и Санто-Доминго.\n\nРом во французских традициях\nФранцузы вначале сдержанно относились к производству рома. Но после нашествия филлоксеры\nна французские виноградники они постарались\nнаверстать упущенное. В середине 19 века изготовление сахара уже не было столь выгодным\nзанятием. Поэтому в заморских департаментах\nФранции стали получать сельскохозяйственный\nром, то есть ром не из патоки (отходов сахарной\nпромышленности), а прямо из сока сахарного\nтростника.\nНевыдержанный французский ром называется\n«белая гроздь» (Grappe Blanche). А после трех лет\nвыдержки он получает право на пометку «старый» (Vieux или Old).", "HAVANA CLUB\nEL RON DE CUBA*\n#К УБАВСЕРДЦЕ\n#ГАВАНАВБОКАЛЕ\n\n*Кубинский ром\n\nЧРЕЗМЕРНОЕ УПОТРЕБЛЕНИЕ АЛКОГОЛ Я ВРЕДИТ ВАШЕМУ ЗДОРОВЬЮ\nром 137", "О сновные бренды рома\nAngostura (Ангостура)\n\nБ ренды пряного рома\nB acardi O akheart (Б ак арди О ак хёрт )\nЯнтарный Bacardi Oakheart получил\nсвое название благодаря обожженным бочкам из американского белого\nдуба, которые используются для его\nвыдержки. Он проявляет благородные\nароматы сухофруктов, мускатного\nореха, апельсина и ванили. Bacardi\nOakheart послужит прекрасной\nосновой для коктейля, а также может\nбыть подан в чистом виде со льдом.\n\nC aptain M organ S piced G old\n(К апитан М орган)\nМарка Captain Morgan обязана своим\nназванием бесстрашному флибустьеру («легальному пирату») Генри\nМоргану, который служил Британской\nкороне в 17 веке. Он вошел в историю\nне только как легенда Карибского\nморя, но и как большой любитель\nямайского рома.\n\nS ailor J erry (С ейлор Д жерри)\n«Моряк Джерри» носит имя легендарного персонажа американской\nкультуры – Норманна Коллинза.\nПоследний родился в 1911 году, был\nпоследовательно музыкантом, диктором на радио, а главное – татуировщиком. Его считают родоначальником\nсовременной татуировки. Кроме\nтого, он был еще и моряком. Говорят,\nчто он всегда имел при себе рецепт\nэтого рома, производившегося на\nВиргинских островах и настоянного\nна ванили, корице, мускатном орехе\nи других пряностях. Существует 8\nразных рисунков девушек в стиле\n«pin up», украшающих этикетку этого\nрома.\n\n138 ром\n\nДом «Ангостура» известен, в первую очередь,\nсвоим знаменитым биттером, который производится с 1875 года на островах Тринидад и Тобаго,\nрасположенных примерно в 15 км от венесуэльского побережья. Кроме того, дом «Ангостура»\nс равным успехом с 1949 года производит различные сорта рома. Их изготавливают на основе\nмелассы и долго выдерживают в бочках из-под\nбурбона. Они нежные, пряные, с ванильными\nароматами.\nЛинейка. В линейке Angostura следует отметить\n«1919», который является купажом, где самому молодому рому 8 лет. Что до «1824», то он составлен\nиз ромов как минимум 12-летней выдержки и обладает нотками меда и шоколада.\n\nAppleton Estate (Эпплтон Эстейт)\nРомы Appleton производятся на острове Ямайка,\nа их происхождение относится к 1749 году. В настоящее время этот дом выпускает ром, который\nполучают либо в перегонных аппаратах колонного типа для обретения большей легкости, либо\n– для получения мощного и крайне ароматного\nрома – в кубах типа «пот стил».\nЗатем ром выдерживается в бочках из-под бурбона, что придает ему сложность, которая сочетается с его натуральным ароматическим богатством.\nРомы Appleton выпускаются по преимуществу в\nследующих возрастных категориях: 8 лет, 12 лет\nи 21 год. Указанный возраст относится к самому\nмолодому рому в купаже.\n\nBacardi (Бакарди)\nДон Факундо Бакарди Массо, уроженец испанского города Ситжес, обосновался в Сантьягоде-Куба и открыл свою виноторговую компанию.\nВ 1855 году он предпринял первые изыскания в\nобласти перегонки рома. Его задачей было получение рома нового типа, с легкими ароматами.\nВ 1862 году он достиг своей цели, применив особую разновидность дрожжей для более быстрого сбраживания и фильтрацию через древесный\nуголь.\nТак родился ром Bacardi, который произвел революцию в мире коктейлей.\nИсторическая линейка. Bacardi Carta Blanca –\nточный, нежный шелковистый ром, рожденный\nдля коктейлей.\nBacardi Carta Oro и Bacardi Carta Negra – более\nмощные и насыщенные, предназначенные для\nкоктейлей с выразительным вкусом.\n\nПремиальная линейка. Bacardí Añejo Cuatro\n(4) включает спирты, выдержанные по меньшей\nмере четыре года в бочках. Его ароматы ванили,\nмеда и гвоздики прекрасно раскроются в смешанных напитках.\nЯркий золотистый цвет Bacardí Reserva Ocho (8)\nявляется результатом как минимум восьми лет\nвыдержки в бочках. Его пряные ароматы древесины, абрикоса, и мускатного ореха лучше всего\nоценить при подаче в чистом виде или в составе\nкоктейля «Олд Фешенд».\nBacardi Gran Reserva Diez стареет по меньшей\nмере 10 лет в обугленных бочках из белого дуба,\nнабирая темно-золотистый цвет и мягкость..\nBacardí Gran Reserva Limitada – исключительный\nром из ограниченных запасов спиртов, долго выдержанных в бочках. Он концентрирует в себе\nвсю щедрость природы Карибских островов и\nискусство Мастеров рома.\nКоллекция Facundo создана в честь основателя компании – Факундо Бакарди. Производится\nв ограниченном количестве из самых редких\nвыдержанных спиртов, хранящийся в семейном\nхранилище Бакарди.\nFacundo Neo состоит из спиртов, выдержанных\nдо 8 лет в бочках и процеженных через угольный\nфильтр.\nFacundo Eximo – ром, купажированный еще до\nвыдержки, которая длится 10 лет.\nFacundo Exquisito – изысканный купаж ромовых\nспиртов, выдержанных от 7 до 23 лет в дубовых\nбочках. После купажирования ром дозревает в\nбочках из-под хереса еще минимум месяц.\nFacundo Paraíso – это исключительный купаж\nстарейших премиальных дистиллятов семьи Бакарди. Финальная выдержка проходит в бочках\nиз-под коньяка категории XO.\n\nBanks (Бэнкс)\nЭтот современный бренд носит имя путешественника 18 века – Джозефа Бэнкса.\nСам ром не привязан к одному месту производства, одному острову или одной стране. Напротив, он является смесью ромов различного географического происхождения.\nЛинейка. Banks 5 – светлый ром, который включает в себя 21 ром, которые были получены на\nпяти различных островах.\nBanks 7 – купаж из 23 ромов из семи разных\nстран и островов. Благодаря выдержке, он обладает золотистым цветом и сложным, изысканным\nвкусом.", "Р ом H avana C lub . Т радиции К антинерос\nHavana Club – это всем известный бренд кубинского рома. Винокурня была основана в 1878\nгоду, а ром Havana Club перегоняется и выдерживается в соответствии с кубинскими традициями с 1934 года.\nHavana Club – легкий и восхитительно ароматный напиток. Он выгодно пользуется благоприятными климатическими и почвенными условиями, которые сложились для сахарного тростника\nна Кубе.\n\nКуба – остров барменов\nКуба – уникальное место, особый остров для\nбарменов. Именно здесь родились некоторые\nиз величайших классических коктейлей. Кроме\nтого, это остров кантинерос, барменов, сохранивших и продолживших старинные традиции,\nкоторые они возвели в ранг искусства.\nКлуб «Cantineros de Cuba» существует с 1924\nгода. С тех пор кантинерос сделались посланцами барменского искусства.\n\nПроизводство\nПосле сбора урожая сахарный тростник давят,\nотжимая из него сок. Этот сок, называемый\nGuarapo, доводят до кипения, превращая в\nмелассу. Смешав мелассу с водой и дрожжами,\nполучают перебродившее сусло, называемое\nBaticion. Его дистиллируют в перегонных колоннах, получая «агуардиенте», которое придаст\nбудущему рому свой характер.\nВ действительности, маэстро-ронеро («мастер\nрома») производит несколько разных агуардиенте, которые выдерживаются в разных бочках,\nпричем разное время. Потом он смешивает эти\nспирты, чтобы получился сложный и насыщен-\n\nный ром, называемый «мадре» – матерью.\nКубинский ром – ароматный, но легкий, в нем\nнет тяжести. Поэтому в дальнейшем «мадре» добавляют к другим спиртам из сахарного тростника, перегнанным до большей крепости.\nВ результате удается добиться того одновременно фруктового и душистого, но всегда легкого и\nнежного характера, который придает ароматический блеск кубинским коктейлям. В искусстве\nкупажа проявляется весь талант маэстро-ронеро. Он должен уметь предвидеть ароматическое развитие спиртов, которые он создает и\nсмешивает.\nВыдержка также представляет собой непростой\nпроцесс. Ее называют Añejamiento. Результат выдержки зависит от ее срока (3 года, как минимум,\nдля светлого рома), а также от используемых\nбочек и особенностей купажа.\nЦель всего процесса производства – добиться\nтончайшего равновесия между ароматами и\nлегкостью, между силой и сложностью, которое\nхарактеризует кубинский ром и, в особенности,\nHavana Club.\nВ производстве рома нет секретов. Лишь кропотливая работа в поисках качества. Постоянное\nвнимание к отбору лучших спиртов, полученных\nиз лучшего сахарного тростника, выращенного\nна лучших почвах. И, разумеется, – к выбору\nлучших бочек. Но всегда присутствует тот специфичный для Кубы ингредиент, который называется «уважение к традициям».\n«У кубинского рома нет волшебной формулы,\n– говорит маэстро-ронеро дон Хосе Наварро.\n– Это культурное наследие, передающееся от\nодного маэстро-ронеро к другому, от сердца к\nсердцу, от кубинца к кубинцу».\n\nЛ инейка H avana C lub\nH avana C lub A ñejo 3 A ños – светлый\nром соломенного оттенка, выдержанный не менее трех лет в бочках. Его\nуравновешенный характер и фруктовые, свежие ароматы прекрасно\nпроявят себя в кубинских коктейлях.\nH avana C lub A ñejo E special подвер-\n\nгается двойной выдержке. Вначале\nром долго стареет в бочках из-под\nбурбона, а затем – в бочках первого\nнаполнения из-под ирландского виски. В результате ром развивает пряный характер с нотами ванили, дуба,\nкорицы и апельсиновых корочек. Он\nотлично подходит для сочетания с\nколой и другими безалкогольными\nнапитками.\n\nH avana C lub A ñejo 7 A ños выдерживается в соответствии с непрерывным,\nцикличным методом, который был\nпретворен в жизнь мастерами рома\nHavana Club в конце 1960-х годов.\nСуть данного метода заключается в\nтом, что часть готового рома вновь\nзакладывают на выдержку, чтобы\nкаждая последующая партия Havana\nClub Añejo 7 Años содержала в себе\nспирты предыдущих партий, в том\nчисле те, которые были созданы\nнесколько десятилетий тому назад.\nТакой метод обуславливает сложность рома и сохранение его духа и\nхарактера.\nНапиток обладает богатыми ароматами тропических плодов, табака и пряностей, ванили и какао. Он предназначен для дегустации в чистом виде.\n\nром 139", "Brugal (Бругал)\n\nHavana Club (Гавана Клаб)\n\nДистиллерия «Бругал» была основана в 1888 году\nв Доминиканской республике выходцем из Испании Андресом Бругалем. Вот уже 130 лет знания\nи опыт производства рома передаются внутри\nсемьи, из поколения в поколение. Для рома используют особые дрожжи и двойную перегонку, а\nзатем его выдерживают в бочках.\nЛинейка. Brugal Añejo выдержан от 2 до 5 лет в бочках из-под бурбона. Brugal XV выдерживается от 3\nдо 8 лет в бочках из-под бурбона и хереса. Brugal\n1888 стареет 6-8 лет в бочках из-под бурбона, а затем дозревает в бочках из-под хереса от 2 до 5 лет.\n\nДистиллерия, на которой производят этот ром,\nбыла основана в 1878 году.\nВерный кубинским традициям, ром Havana Club\n– легкий и деликатный, с душистыми и пряными\nчертами.\nЕго изготавливают путем короткого брожения.\nПосле перегонки в аппарате «патент стил» напиток стареет в бочках.\nЛинейка. Ром Havana Club Añejo 3 Años, с яркими\nароматами, создает идеальную основу для самых\nразнообразных коктейлей.\nHavana Club Añejo Especial проходит двойную выдержку. Вначале – в бочках из-под бурбона, затем\n– в бочках из-под ирландского виски. Он обладает пряным характером и отлично подходит для\nсочетания с колой и другими безалкогольными\nнапитками.\nHavana Club Añejo 7 Años выдерживается по непрерывному методу, согласно которому часть готового рома вновь закладывают на выдержку. Получается, что каждая бутылка Havana Club 7 Años\nсодержит в себе спирты, созданные несколько\nдесятилетий тому назад. В результате получается\nсложный ром с неизменным характером, который\nлучше всего прочувствуется при дегустации в чистом виде.\n\nEldorado (Эльдорадо)\nПроизводство рома в Гайане началось в 1760-х\nгодах. В 18 и 19 столетиях в стране действовало\nмножество винокурен. Но постепенно они объединились и образовали единственную винокурню «Демерара», производящую ром Eldorado.\nЭта винокурня собрала и сохранила перегонные\nкубы прежних производителей и, таким образом,\nрасполагает наиболее старинными аламбиками\n«пот стил» из ныне действующих. В некоторых из\nних еще присутствуют деревянные детали.\nСам ром получается в результате купажа спиртов,\nполученных в «пот стилах», со спиртами, перегнанными в аппаратах колонного типа. Существует во\nмногих возрастных категориях: от 3 до 25 лет.\n\n140 ром", "Santa Teresa (Санта Тереса)\nЭтот изысканный ром в испанском стиле производится уже более 100 лет в переделах одноименного хозяйства (Асьенда «Санта Тереса)», которое расположено на севере Венесуэлы и было\nосновано в 1796 году.\nСахарный тростник выращивают на плантациях,\nпринадлежащих хозяйству. Мелассу дистиллируют частично в перегонных кубах «пот стил», частично – в колоннах. При выдержке используется\nметод «солера». В результате, получается уравновешенный и утонченный ром с великолепными\nароматами.\nЛинейка. Santa Teresa Claro – это смесь тяжелых и\nлегких ромов, которые были выдержаны до трех\nлет в дубовых бочках. Он наилучшим образом\nпроявит себя в коктейлях.\nSanta Teresa Gran Reserva – мягкий, золотистоянтарный ром, который включает премиальные\nспирты, старевшие до пяти лет в бочках. Его лучше всего подать в составе лонг дринка.\nSanta Teresa 1796 – элегантный, богатый и сложный ром янтарного цвета. Он выдерживается\nполностью согласно методу «Солера». Его рекомендуется подавать в чистом виде со льдом или\nслегка разбавленным водой.\n\nZacapa (Закапа)\nРом Zacapa производится в Гватемале. Его первая\nособенность состоит в том, что его перегоняют\nиз так называемого «тростникового меда», который получают простым нагреванием сока сахарного тростника. После сбраживания и перегонки\nром выдерживается в погребах, расположенных\nна высоте 2300 метров над уровнем моря, в бочках, главным образом, из-под бурбона и хереса,\nпо методу солеры.\nБольшая высота способствует более медленному старению рома. Спирты различного срока\nвыдержки входят в состав разных ромов линейки Zacapa. Так, например, «Zacapa 15» содержит\nромовые спирты, выдержанные от 5 до 15 лет, а\n«Zacapa 23» – от 6 до 23 лет.\n\nУ потребление рома\nЧисло придуманных барменами коктейлей с ромом не просто велико, оно практически бесконечно. Многие из них – это признанные бестселлеры. «Дайкири», «Мохито», «Куба Либре», «Пинья\nКолада» – названия, известные всей планете, как\nмарки джинсов или автомобилей. Всерьез обдумывать открытие бара и обойтись в меню без этих\nкоктейлей просто невозможно.\nК тому же, для современных миксологов ром\n\nостается одним из излюбленных ингредиентов\nпри создания новых коктейлей. Причины подобного успеха можно выразить одним лишь словом:\nВкус. Ром обладает уникальной способностью\nулучшать смесь напитков. Легкий невыдержанный ром не слишком интересен сам по себе. Но\nв сочетании с лаймом, сахаром, мятой, фруктами\nили пряностями он порождает великолепие, заставляющее клиентов нервничать, когда затягивается обслуживание.\n\nРесторан O! Cuba, Санкт-Петербург.\n\nЛегкий ром\nМолодой белый ром просто создан для коктейлей, количество которых не передается исчислению. Он отлично сочетается с колой, лаймом, со\nвсеми соками, особенно цитрусовыми и экзотическими, а также с ликерами и сиропами.\n\nТемный ром\nВыдержанный ром часто пьют «сам по себе». Его\nподают на дижестив при температуре 18°С в коньячном бокале. В силу своего происхождения\nон превосходно сочетается с сигарами, а также\nс кофе. Кроме того, на его основе готовится немало коктейлей. Например, «Май Тай» и «Пунш\nПлантатора».\n\nВ горячем виде\nВ горячем виде ром подается в составе различных грогов и пуншей. В этом случае следует отдать предпочтение темному рому.\n\nФрагмент рекламы униформы для\nбарменов из книги Иларио Алонсо\n«El Arte del Cantinero. Los Vinos y los\nLicores», изданной в Гаване в 1948\nгоду.\n\nром 141", "К оллекция ромов B anks\nB anks 5\n\nР ом B anks . О строва в стакане\nВ отличие от большинства других брендов рома,\nBanks не привязан к определенному месту происхождения, к конкретной винокурне. Как и во\nвремена господства Британского Королевского\nфлота или французских колоний, Banks является\nблендом, ароматной и экзотической смесью\nромов из разных мест планеты, где производят\nспиртное из сахарного тростника.\n\nразными методами производства и особыми\nклиматическими условиями.\nАрно де Трабюк смешивает эти различные сорта рома и подвергает их выдержке так же, как\nэто сделал бы мастер коньячного погреба или\nмастер-блендер виски.\n\nПутешественник в названии\n\nДля завершения портретной галереи, связанной с ромом Banks, осталось упомянуть Джима\nМихана.\nПредставлять Джима барменам нет нужды.\nОн основатель нью-йоркского PDT, один из\nнаиболее выдающихся миксологов своего\nвремени. Кроме того, в качестве супер-брендамбассадора он принимает участие в составлении купажей ромов Banks, из которых затем\nготовит коктейли общепризнанного качества.\nС точки зрения Джима Михана, классические\nкоктейли в наибольшей степени раскрывают\nкачества ромов Banks.\n«Дайкири» продемонстрирует сложный и свежий, несколько пряный и фруктовый характер\nBanks 5.\n«Олд Фешенд», со своей стороны, подчеркнет\nароматическое богатство Banks 7. Горькие\nапельсины, конфитюр из экзотических фруктов и\nтонкие древесные оттенки этого рома обернутся\nцветочным букетом с душистыми и пьянящими\nароматами.\nЕще одно поле миксологии, исследованное\nДжимом Миханом, – это пунши. Восхитительные\nи несложные в приготовлении, они являют одновременно прошлое и будущее рома.\n\nДля укрепления главной идеи этого рома –\nмультипроисхождения и духа путешествий, его\nназвали в честь знаменитого английского натуралиста и ботаника Джозефа Бэнкса, который с\n1768 по 1771 год был вместе с Джеймсом Куком в\nего первом кругосветном плавании.\n\nМастер погреба\nв производственном процессе\nДругое важное действующее лицо этой ромовой\nэпопеи – француз по имени Арно де Трабюк. Он\nизучал энологию у легендарного бордоского\nспециалиста Эмиля Пейно, занимал ответственные посты в крупных компаниях, таких как\n«Коньяк Хайн» и «Ангостура».\nИменно он сегодня, будучи мастером погреба,\nотбирает и составляет купажи разных сортов\nрома, привезенных с семи островов и стран.\nРомы с Ямайки, Тринидада, Барбадоса, Гайаны,\nЯвы, а также из Панамы и Гватемалы вместе образуют несравненную палитру ароматов.\nПоэтому, составляя купаж нового рома, Арно\nде Трабюк имеет широкий выбор спиртов с совершенное разными вкусовыми интонациями,\nкоторые обусловлены разными традициями,\n\n142 ром\n\nМиксолог в качестве разработчика\nкупажей и коктейлей\n\nЭтот светлый ром представляет собой\nсмесь из 21 рома, которые были получены на 6 винокурнях, расположенных на 5 островах.\nРом из Тринидада образует стержень\nкупажа.\nАроматическое богатство сообщается\nямайским ромом, который дистиллируют в аппаратах «пот стил».\nНоты гумуса и тропических фруктов\nпривносятся ромом из Гайаны.\nРом с Барбадоса придает купажу\nхарактер, а продукция с острова Ява\nсообщает пряные ароматы.\n\nB anks 7\n\nВыдержанный, сложный ром золотистого цвета. Он составлен из 23\nромов, которые были изготовлены на\n8 винокурнях, расположенных в семи\nразных странах: в Тринидаде, Ямайке,\nГайане, Барбадосе, Гватемале, Панаме\nи Яве.", "S anta Teresa .\nР ом из В енесуэлы с двухвековой историей\nВ пейзаже Венесуэлы горы чередуются с равнинами. С севера страна омывается Карибским\nморем, и большая часть ее территории лежит в\nзоне тропического климата. Такие условия благоприятствуют произрастанию многих культур и,\nв первую очередь, сахарного тростника. Поэтому\nВенесуэла исторически имеет давние традиции\nсахарного производства и до сих пор поставляет\nпатоку во многие страны Карибского бассейна.\nТочно так же Венесуэла имеет огромный опыт\nпроизводства рома, и ромы из этой страны занимают все более существенное место на барных\nполках. Среди них следует отметить бренд, считающийся одним из лучших в мире: Santa Teresa.\nЭтот ром в испанском стиле производится с\nиспользованием метода «Солера».\n\nАсьенда 18 века – «Санта Тереса»\nАсьенда «Санта Тереса» расположена на севере\nстраны в плодородной долине Арагуа. Это самое\nстаринное хозяйство по выращиванию сахарного тростника в Венесуэле. Плантация была\nзаложена графом де Товар в 1796 году.\nСпустя 100 лет, в 1896 году здесь начали перегонять ром, а торговая марка Santa Teresa была\nзарегистрирована в 1909 году.\n\nРом, произведенный в одном\nхозяйстве\nSanta Teresa – это настоящий ром «Сингл Эстейт».\nВесь цикл его производства проходит в том же\nсамом хозяйстве. Здесь выращивают тростник,\nвыжимают из него сок и перегоняют мелассу. В результате получается один из лучших ромом в мире.\n\nВыдержка по методу «Солера»\nВ духе испанских традиций выдержки хереса, на\nАсьенде «Санта Тереса» используют метод «Солера» для выдержки рома.\n«Солера» представляет собой систему расположения бочек, которые устанавливают друг на\nдруга рядами, что позволяет более выдержанному рому обогащать более молодой.\nКогда из бочек, лежащих на земле, извлекают\nром, их доливают ромом из бочек, расположенных прямо над ними. Молодой ром наливают\nлишь в самые верхние бочки. В результате ром\nопускается от бочки к бочке, набирая выдержку\nи смешиваясь с более старым ромом, пока он не\nокажется в бочке, лежащей на земле (sol, отсюда\n\nназвание solera), и не будет готов к частичному\nизвлечению для разлива по бутылкам.\n\nАрхитектура рома\nРом Santa Teresa зачастую представляет собой\nсмесь характерных, тяжелых ромов, полученных\nв перегонных кубах «пот стил», и легкого рома,\nдистиллированного в колоннах. Из подобного,\nпрактически идеального сочетания, получается\nвеликолепный ром с ароматами шоколада и\nкофе, ванили и кожи, апельсина и эвкалипта.\nВ его архитектуре утонченность уравновешена\nароматическим богатством.\n\nЛинейка\nSanta Teresa Claro – это деликатная смесь легких\nромовых спиртов, дистиллированных в аппарате\nколонного типа, с сортами более тяжелого рома,\nполученными в кубе «пот стил», которые были\nвыдержаны до трех лет в дубовых бочках.\nОбладает бледно-золотистым цветом, фруктовыми ароматами сахарного тростника с легкими\nдревесными нотами. Послужит прекрасной\nосновой для душистых коктейлей.\nSanta Teresa Gran Reserva – золотисто-янтарный\nром, с мягким вкусом и шелковистой текстурой,\nкоторую подчеркивают сладостные и свежие\nфруктовые тона. Древесные ароматы этого рома\nобусловлены выдержкой входящих в его состав\nпремиальных спиртов, которая составляет до\nпяти лет. Его лучше всего подать в составе лонг\nдринка – в сочетании с безалкогольными напитками или фруктовыми соками.\nSanta Teresa 1796 – отсылает к дате основания\nАсьенды «Санта Тереса», которая вот уже более\nдвухсот лет хранит традиции культуры сахарного\nтростника. Этот янтарный ром с красными отблесками выдерживается полностью в дубовых бочках согласно артизанальному испанскому методу\n«Солера». В его сложных ароматах преобладают\nфрукты, мед и черной шоколад. Мягкий и сбалансированный вкус демонстрирует оттенки табака,\nкожи и копчено-жареные ноты. Вся полнота,\nэлегантность и шелковистость этого высококлассного рома проявятся при подаче в чистом виде со\nльдом. Кроме того, его можно сервировать слегка\nразбавленным минеральной водой, что раскроет\nвсе его ароматическое богатство.\n\nП роект «А лькатрас »\nВ 2003 году банда напала на Асьенду\n«Санта Тереса». Вместо того, чтобы\nотправить молодых преступников\nв тюрьму, хозяин Асьенды предложил взять их на работу в хозяйство.\nТрудовая терапия прошла успешно и\nдала рождение проекту «Алькатрас»:\nреабилитация молодых правонарушителей путем работы на Асьенде «Санта Тереса». Кроме того, в свободное\nот работы время бывшие гангстеры\nвыпускают пары на поле для игры в\nрегби, развивая моральные качества\nи командный дух.\n\nром 143", "К ашаса\nВ наши дни к ашаса являе тс я одним из ве дущих продук тов Б разилии , символом\nпраздник а и жизнера дос ти бразильцев , а кок тейль на ее основе – «К айпиринья »\n– один из самых распрос траненных смешанных напитков мира .\nС недавних пор кашаса совершила значите льный качес твенный прогресс .\nО тмечается громкое возвращение , так называемых , традиционных кашас ,\nизготовленных согласно ис торическим методам , но при их пос тоянном\nсовершенс твовании , что приве ло кашасу на четвертое или даже на третье мес то\nсре ди а лкогольных напитков с наибольшим объемом производс тва в мире .\n\nИ с тория\nНекоторые историки возводят появление кашасы\nв Бразилии к 1530-м годам. В основу ее производства легли привнесенные португальцами методы\nперегонки. Но в то время слово «кашаса» означало любой крепкий напиток. Позже, начиная с 17\nстолетия, оно стало означать именно спиртное из\nсахарного тростника.\nБразильский напиток использовался подобно\nрому в качестве платежного средства, и в 17 веке\nон обрел популярность в Европе. Подобно рому,\nкашаса служила для покупки рабов, которых везли трудиться на колониальных плантациях.\nУспех кашасы был таков, что португальские колонисты стали отдавать ей предпочтение и отказываться от своего национального бренди. Португальские власти восприняли это с неодобрением\nи подняли налоги на бразильский алкоголь, что\nв 1660 году вызвало восстание, получившее название «Revolta de Cachaça» (Восстание Кашасы).\nВпрочем, в течение всей своей истории кашаса\nбыла одним из важнейших источников доходов\nпортугальского правительства и даже внесла\nсвой финансовый вклад в восстановление Лиссабона после Великого землетрясения 1755 года.\nПоследовательное повышение налогов на кашасу, которая использовалась в лечебных целях\n\n144 к ашас а\n\nРазновидности кашасы\nСуществуют две большие группы\nкашасы.\n\n1. К ашаса промышленного\nпроизводства\n\nЕе выпускают в большом объеме.\nПосле быстрого сбраживания сока\nсахарного тростника (5 часов) проводят его перегонку в колоннах.\nТакая кашаса отличается высокой\nстепенью очистки, и в ней мало что\nостается от исходного вкуса сахарного\nтростника.\n\n2. Традиционная к ашаса\nи облегчала тяжкие условия жизни в Бразилии,\nподпитывало недовольство местного населения\nв отношении Португалии. Оно сделалось одним\nиз символов сопротивления иностранному господству, которое в конечном счете привело\nБразилию к независимости, провозглашенной в\n1822 году.\n\nЗолото в земле и в бочонках\nТак же, как виски в Шотландии или в Соединенных Штатах, кашаса сопутствовала развитию Бразилии.\nКашаса, предназначенная для искателей золота\nи алмазов области Минас-Жерайс, поставлялась\nтуда в бочках. Она улучшалась от контакта с деревом и приобретала золотистый оттенок. Это объясняет, почему и в наши дни в глубинных районах\nпредпочитают выдержанную кашасу, а на побережье – белую. Как, например, на родине коктейля\n«Кайпиринья», в портовом городе Парати.\nСо временем кашасу начали изготавливать на\nместе, в глубинных районах, где принялись использовать бочки разных древесных пород для\nхранения напитка. Так и в наши дни кашасу иногда выдерживают в бочках из экзотических пород\nдерева.\nСегодняшняя кашаса – современный напиток, готовый к всемирному признанию.\n\nКашасы артизанального изготовления\nзначительно более интересны.\n\nУ потребление кашасы\nВ Бразилии кашасу часто пьют в\nчистом виде.\nНо если кашаса приобрела известность за пределами Бразилии, то\nэто, в первую очередь, благодаря\nкоктейлю «Ка
