ром - 60 мл\nИмбирный эль - 90 мл\nСок лайма (факультативно) - 15 мл\n\n1. В бокал хайбол положить лед. Налить\nимбирный эль и сок лайма, перемешать.\n2. Сверху налить ром. Украсить долькой лайма.\nПодача «Дарк энд Сторми», Comstock Saloon,\nСан-Франциско.\n\nПтица Дж унглей\n\nГолубая лаг уна\n\nJungle Bird\n\nBlue Lagoon\n\nЭтот коктейль появился на свет в Малайзии\nв конце 1970-х годов и позднее был взят на\nвооружение известным тики-специалистом –\nДжеффом Берри.\n\nБлагодаря своему названию и цвету, «Голубая\nлагуна» примкнула к тики-коктейлям, хотя она\nзародилась в глубине парижской серости.\nЕе придумал Эдди МакЭлхон (сын Гарри) в\n1960-х годах, когда поп-группа Бич Бойз\nоткрывала миру радости пляжа, экзотики и\nсерфинга.\n\nНа 1 бокал\n\nТемный ром Bacardi Carta Negra - 45 мл\nБиттер Martini Riserva - 15 мл\nСвежевыжатый ананасовый сок - 60 мл\nСвежевыжатый сок лайма- 15 мл\nСахарный сироп - 15 мл\n\n1. Все ингредиенты взбить в шейкере, заполненном льдом.\n2. Отфильтровать в бокал рокс, заполненный дробленым льдом.\n3. Украсить мятой, вишней и чипсами\nцитрусовых.\n\nНа 1 бокал\n\nВодка - 40 мл\nСвежевыжатый лимонный сок - 15 мл\nЛикер Blue Curaçao - 15 мл\n\n1. Положить в шейкер лед и налить ингредиенты.\n2. Взбить и отфильтровать в охлажденный\nкоктейльный бокал.\n\nЭк зотик а 315", "Остров рома\n\nВ\n\n1920-х и 1930-х годах , когда сухой закон гасил пламя кок тей ля в С оединенных Ш татах , солнце миксологии вс тава ло над\nК убой .\nН адо сказать , что К уба не дожида лась введения сухого закона ,\nчтобы принять в свои объятия будущих светил миксологии . Гавану\nназыва ли «М а леньким П арижем К арибских ос тровов », не в пос лед нюю очередь благодаря массе увесе лите льных заведений . Город с та л\nубежищем для многочис ленных ката лонцев . К онс тантино Р иба ла иг уа прибыл в Гавану еще в 1910 году, чтобы работать во «Ф лориде».\nВ 1918 году он вык упил этот бар, переименовав его во «Ф лоридит у ».\nЗ а ним пос ледова ли другие бармены , отк ликнувшись на обещания\n«О с трова рома ».\nВ ызванный сухим законом массовый наплыв американцев , которые\nчерез М айами прибыва ли на К убу в « а лкогольные т уры », подх лес тнул\nкок тейльное иск усс тво в Гаване . О на превратилась в барную с тойк у\nА мерики . Турис ты приезжа ли сюда не прос то выпить кок тейль . И м\nтребова лся большой глоток свободы . У потребление кок тейля было в\nравной с тепени и удовольс твием , и вызовом , жес том протес та .\nРади этих американцев , кантинерос превосходили себя . О ни готови ли им лучшие кок тейли лучшими способами . Так , к примеру, появил ся метод Cuban R oll . В о времена сухого закона , а затем по инерции\nна протяжении последующих 15 лет кубинская школа была одной из\nлучших , если не лучшей в мире .\n\nК уба Либре\n\nКлассика\n\nCuba Libre\n«Куба Либре» был одним из самых\nходовых коктейлей 1940-х годов.\nОн был в числе бестселлеров\nзнаменитого «Сторк клаба» в НьюЙорке.\nВ наши дни, в своей гениальной\nпростоте, правильно приготовленный, с хорошим лаймом и свежеоткупоренной колой, этот напиток\nостается незаменимым и популярным.\n«Куба Либре» был придуман американским капитаном в одном из\nгаванских баров в конце 19 века.\nВ то время американцы вели войну\nпротив испанских колонизаторов\nКубы. «Por Cuba Libre!» (За свободную Кубу!) – сказал капитан, поднимая бокал со смесью рома и колы.\nТак появились на свет и рецепт\nкоктейля, и его название. Семья\nБакарди, активно участвовавшая в\nборьбе за независимость острова,\nпретендует на то, что именно ром\nBacardi должен использоваться для\nприготовления этого коктейля.\nНа 1 бокал\n\nРом Bacardi Carta Oro - 50 мл\nКола - 100 мл\nЧетверть лайма, порезанная пополам\n\n1. Пестиком размять лайм на дне бокала.\n2. Добавить 4-5 кубиков льда.\n3. Налить ром и колу, перемешать.\n\n316 Эк зотик а", "Остров рома\n\nДайкири\n\nКлассика\n\nDaiquiri\n«Дайкири» входит в первую десятку коктейлей планеты. По сути он представляет собой сауэр из рома. Его изобрел в 1898 году инженер Дженнинг\nКокс. Он работал на кубинской шахте рядом с Сантьяго-де-Куба и, как\nрассказывают, получал ежедневное довольствие «за вредность производства» в виде рома Bacardi, который производился неподалеку.\nШахта называлась Дайкири, а вкус коктейля был таков, что, по мнению\nКокса, он заслуживал собственного имени – «Дайкири», а не просто «Ром\nСауэр».\nОчень скоро коктейль стал пользоваться громадным успехом. Несмотря\nна простоту, в процессе приготовления он требует повышенного внимания во избежание хронических дефектов, к которым относятся недостаток\nалкоголя и избыток сахара. Cахарный песок – только белый, его можно заменить сахарным сиропом (что делает структуру коктейля более однородной), но при этом исчезает так называемая «хрусткость», которая отвечает\nза освежающие свойства. А в украшениях нет необходимости.\n\nНа 1 бокал\n\nРом Bacardi Carta Blanca - 50 мл\nСвежевыжатый сок лайма - 25 мл\nБелый сахарный песок - 2 полные ч. л.\n\n1. Взбить ингредиенты в шейкере, заполненном льдом.\n2. Отфильтровать в охлажденный коктейльный бокал.\n\nЭк зотик а 317", "Остров рома\nПапа Добле (он же Хеминг уэй Спешиал)\nPapa Doble\nВ мире коктейлей «Папа Добле» – то же самое, что Биг Мак в мире гамбургеров. Это двойная порция чудесного белого рома, которая подается в бокале размером с ведерко для шампанского.\n«Папа Добле» тянется вдвое дольше любого обычного коктейля. Он имеет отношение к наследию\nХемингуэя едва ли не большее, чем роман «По ком звонит колокол». Тем не менее, у «Папы Добле»\nнет официального статуса, а в справочнике бара «Флоридита» он фигурирует под названием «Хемингуэй Спешл». Дело в том, что название «Папа Добле» использовалось в узком кругу официантами, завсегдатаями и, разумеется, друзьями Хемингуэя.\nРецепт коктейля был специально придуман для писателя во «Флоридите». Считая себя диабетиком,\nХемингуэй заказывал «Дайкири» без сахара.\nНеизвестно, был ли коктейль создан самим Константе или одним из его блестящих барменов по\nимени Антонио Меиллан. Последняя гипотеза представляется более правдоподобной. Став хозяином «Флоридиты», Константе сосредоточился на управлении и больше не принимал тесного участия\nв приготовлении и подаче коктейлей. Что же до Антонио Меиллана, то он сразу проявил себя,\nначав работать во «Флоридите» в 1939 году, и сделался в некотором роде персональным барменом\nХемингуэя. Он был доброжелательным и приветливым барменом, обладавшим, как и Константе,\nчувством вкуса и пропорций.\nСледует отметить, что наряду с «процеженной» версией, существует также «замороженный» вариант коктейля, смешанный в блендере с дробленым льдом. «Папа Добле» был прославлен на весь\nмир благодаря другу и биографу Хема – писателю Аарону Хотчнеру.\n\n318 Эк зотик а\n\nНа 1 бокал\n\nРом Bacardi Carta Blanca - 110 мл\nСвежевыжатый сок грейпфрута - 30 мл\nЛикер Maraschino - 25 мл\nСвежевыжатый сок лайма - 30 мл\nСахарный сироп - 15 мл (факультативно)\n\n1. Взбить ингредиенты в шейкере, заполненном льдом.\n2. Отфильтровать в охлажденный коктейльный бокал или в бокал coupette.\n3. Опустить в коктейль вишню.\n\nПодача коктейля «Папа Добле»\nв баре Copperbay, Париж.", "Остров рома\n\nМизмо\n\nРом Олд фешенд\n\nМэри Пикфорд\n\nMismo\n\nRum Old Fashioned\n\nMary Pickford\n\nСчитается, что этот напиток появился на свет\nна Кубе на рубеже 19 и 20 веков. Тогда один из\nместных заказал в баре ром Bacardi с содовой,\nа его друг попросил «Lo Mismo». Это услышали\nамериканцы, которые не говорили по-испански,\nно хотели казаться посвященными в местные\nпитейные обычаи. Все они стали заказывать\nMismo, так и не зная, что по-испански это\nзначит «то же самое».\n\nИсторический коктейль Old Fashioned, приготовленный на основе Bacardi 8 Años, демонстрирует новые вкусовые грани и отражает все\nароматическое богатство выдержанного рома.\n\nКоктейль создан на Кубе, во время американского сухого закона, в честь актрисы немого\nкино Мэри Пикфорд, посетившей остров в\n1920-х годах.\n\nНа 1 бокал\n\nНа 1 бокал\n\nРом Bacardi Gran Reserva 8 Años - 50 мл\nБиттер Angostura - 2 дэш\nСахар - одна-две ч.л.\nТвист из апельсиновой цедры\n\nРом Bacardi Carta Blanca - 40 мл\nАнанасовый сок - 30 мл\nСироп Гренадин - дэш\nЛикер Maraschino - дэш\n\n1. В бокал олд фешенд насыпать сахар, сбрызнуть его водой и добавить биттер. Перемешать барной ложкой до растворения сахара.\n2. Добавить 2-3 куска льда и половину рома.\nПеремешать. Повторить эту операцию еще\nодин раз.\n3. Отжать твист из апельсиновой цедры в\nкоктейль и опустить его в бокал.\n\n1. В шейкер положить лед и налить ингредиенты.\n2. Взбить содержимое шейкера и отфильтровать в охлажденный коктейльный бокал.\n3. Украсить коктейльной вишней.\n\nНа 1 бокал\n\nРом Bacardi Añejo Cuatro - 35 мл\nСодовая вода - 100 мл\nТри дольки лайма\n\n1. Наполнить льдом высокий бокал. Налить в\nнего ром.\n2. Сверху отжать две дольки лайма и опустить их в бокал.\n3. Добавить содовую и перемешать.\n4. Украсить долькой лайма.\n\nЭк зотик а 319", "Остров рома\nК онстанте Р ибалаигуа\nЗ а стойкой «Ф лоридиты »\nКогда в райском уголке – легендарном баре «Флорида» на Кубе – собирался весь мировой бомонд и заказывали «Дайкири», то краешком глаза\nследили, чтобы коктейль готовил лично Константино Рибалаигуа. Цена от\nэтого не менялась, но качество оказывалось на порядок выше!\nРодившийся в Каталонии и поступивший на службу во «Флориду» в 1914\nгоду, Константе-волшебник, Константе-король коктейлей, Константе-властелин «Дайкири», был единогласно избран своими собратьями по профессии, знаменитыми «кантинерос», самым выдающимся барменом Кубы.\nТо есть, для того времени, – и всего мира. Его напор, его профессионализм и, в особенности, исключительное умение готовить неподражаемые\n«Замороженные Дайкири», помогли ему в 1918 году сделаться владельцем\n«Флориды». В 1940 году он переименовал бар во «Флоридиту» и превратил\nего в одно из наиболее модных заведений планеты.\nКонстанте умер в 1952 году на вершине славы.\nКонстанте Рибалаигуа подает «Замороженные Дайкири».\n\nЭль Президенте\n\nК убинский Президент\n\nEl Presidente\n\nCuban President\n\nКлассический кубинский коктейль из гаванского бара «Флоридита». Согласно одной из\nверсий, он был придуман в этом баре президентом Кубы – Марио Гарсией Менокалем – во\nвремя его правления, то есть между 1913 и\n1921 годами. Что касается Гренадина, то он, по\nвсей видимости, был добавлен позднее Гарри\nКрэддоком из лондонского «Савойя».\n\nПо этому рецепту «Кубинского президента»\nготовили в гаванском баре Sloppy Joe’s в 1930-х\nгодах.\n\nНа 1 бокал\n\nЗолотистый ром Bacardi Carta Oro - 30 мл\nСухой вермут Noilly Prat - 30 мл\nАпельсиновый ликер Triple Sec - 20 мл\nСироп Гренадин - дэш (факультативно)\n\n1. Перемешать ингредиенты со льдом в\nсмесительном стакане.\n2. Отфильтровать в охлажденный коктейльный бокал.\n3. Украсить цедрой апельсина и вишней.\n\n320 Эк зотик а\n\nНа 1 бокал\n\nРом Bacardi Carta Blanca - 50 мл\nСухой вермут - 50 мл\nЛикер Dry Orange - дэш\nСироп Гренадин - три капли\n\n1. В смесительном стакане, заполненном\nльдом, перемешать ингредиенты.\n2. Отфильтровать в охлажденный коктейльный бокал.\n3. Опустить в бокал вишню и твист из\nапельсиновой цедры.", "Остров рома\nМохито\n\nКлассика\n\nMojito\nО происхождении «Мохито» сложено множество легенд. Но в действительности, первое письменное упоминание коктейля с названием\nMojito встречается в разделе «Bacardi Drinks» в меню-сборнике рецептов гаванского бара «Слоппи Джоз», напечатанном в 1930 году. По\nимеющимся у меня сведениям, других источников не существует.\nИсходя из рецепта бара «Слоппи Джоз», оригинальный «Мохито» состоял\nиз чайной ложки сахара, сока половинки лайма и 2 унций рома Бакарди.\nВсе это дополнялось сельтерской водой и листьями мяты. Поданный с\nдробленым льдом, «Мохито» утолял жажду моряков, деловых людей, мировых знаменитостей и туристов, искавших на Кубе дух приключений.\n«Слоппи Джоз» находился на улице Зулуэта в старой Гаване, в двух\nшагах от высокого здания – Дома Бакарди, напоминающего Эмпайр\nСтейт Билдинг в миниатюре, башня которого, увенчанная знаменитой\nлетучей мышью, до сих пор возвышается над городом.\nВ один прекрасный день 1936 года основатель «Слоппи Джоз» Хосе\nАбеаль-и-Отеро, глядя на огромное здание Бакарди, решил, что подавая десятки тысяч «Мохито», он достаточно послужил делу обогащения империи Бакарди. И он стал отныне готовить «Мохито» на основе\nрома собственного производства. Но Фортуна не всегда благосклонна\nк смельчакам, поскольку через несколько лет «Слоппи Джоз» закрылся. Можно добавить, что он вновь открыл свои двери после реконструкции только в 2013 году.\nЧто касается вариантов «Мохито», то они, в первую очередь, отличаются не ингредиентами, а способом приготовления коктейля. Если вы\nхотите сильнее отразить в коктейле ароматы мяты, то можете предварительно растолочь ее мадлером с сахаром, прежде чем добавить\nдругие ингредиенты.\nНа 1 бокал\n\nРом Bacardi Carta Blanca - 50 мл\nПоловина лайма\nМята перечная - 12-15 листьев\nСахар тростниковый светлый - 2 ч.л.\nСодовая вода - 50 мл\n\n1. Разрезать лайм на три части.\n2. В бокал положить сахар, нарезанный лайм и размять содержимое мадлером.\n3. Слегка прихлопнуть ладонью листья мяты (мяту\nмять нельзя) и положить ее в стакан.\n4. Наполнить бокал до краев дробленым льдом.\n5. Добавить ром и хорошо перемешать.\n6. Дополнить бокал льдом до верху и добавить содовую.\n7. Слегка перемешать и украсить макушкой ветки\nмяты. Подать с двумя коктейльными трубочками.\n\nДейзи из Сантьяго\nDaisy de Santiago\n«Восхитительное произведение, которое нам\nстало известно благодаря компании покойного\nФакундо Бакарди», – так написал про этот коктейль Чарльз Бейкер, автор книги «Jigger, Beaker\n& Glass – Drinking Around the World».\nНа 1 бокал\n\nРом Bacardi Carta Blanca - 50 мл\nСвежевыжатый сок лайма - 15 мл\nСахарный сироп - 5 мл\nЖелтый ликер Chartreuse - 15 мл\n\n1. В смесительный стакан, заполненный\nльдом, налить ром, сок лайма и сироп.\n2. Перемешать и отфильтровать в винный\nбокал, заполненный дробленым льдом.\n3. Украсить мятой и сезонными ягодами.\nСверху налить ликер (флоат).\n\nМулата\nMulata\nПроисхождение этого кубинского коктейля\nдоподлинно неизвестно. Некоторые источники\nотносят его изобретение к 1930-м годам и приписывают его самому Константе Рибалаигуа из\nлегендарного гаванского бара «Флоридита».\nДругие считают, что коктейль появился на свет\nлет на десять позднее и за другим авторством.\nНа 1 бокал\n\nКоричневый ликер Crème de Cacao - 25 мл\nСок лайма - 10 мл\nВыдержанный ром - 50 мл\n\n1. В блендер положить лед и налить ингредиенты.\n2. Взбить и перелить в охлажденный коктейльный бокал.\n\nЭк зотик а 321", "Ч асть вторая . Г лава 17\n\nИталия\nпобедное трио: вермут, биттер и просекко\nКлассика: Американо, Негрони, Беллини, Спритц", "И та л и я\nАмерик ано\n\nКлассика\n\nAmericano\n«Американо» – один из наиболее типичных итальянских коктейлей. Вот\nуже более столетия он пользуется огромным успехом в барах и ресторанах, причем не только в Италии, но и по всему миру. Благодаря равновесию между сладостью и горечью, а также умеренной крепости, он служит\nпревосходным аперитивом.\nПервоначально коктейль «Американо» именовался «Милано-Торино» и,\nпо-видимому, был изобретен в конце 19 или в начале 20 столетия. Его, на\nпервый взгляд, безобидное название, отражало соперничество, до сих\nпор царящее между двумя итальянскими городами. Милан был промышленным центром, где придумали биттеры, а Турин – исторической столицей, поставлявшей вермут, необходимый для коктейля.\nСегодняшнее название коктейля появилось, по всей видимости, в 1917\nгоду благодаря американцам, воевавшим в Италии во время Первой мировой войны и особо ценившим этот коктейль.\nПервое письменное упоминание об «Американо» относится лишь к 1928\nгоду. Оно встречается в книге бармена Адольфа Торелли из отеля «Винтер\nПалас» в Ницце, которая называется «900 рецептов американских коктейлей и напитков». В этом сборнике для приготовления «Американо» рекомендуется использовать равные доли биттера и вермута.\nВ наши дни варианты «Американо» сильно отличаются в разных барах, но\nобщая тенденция заключается в соблюдении первоначального рецепта,\nто есть использовании равных долей биттера и вермута. В зависимости от\nпогоды добавляется больше или меньше содовой воды.\n\n324 Ита лия\n\nНа 1 бокал\n\nВермут Martini Riserva Rubino - 35 мл\nБиттер Martini Riserva - 35 мл\nСодовая вода - дэш\n\n1. В бокал рокс положить лед.\n2. Налить вермут и биттер, перемешать.\n3. Добавить содовую.\n4. Отжать в коктейль кусочек цедры лимона\nи опустить его в бокал.\n\nТорино -Торино\nПри использовании в рецепте «Американо» –\nнаряду с вермутом Riserva Rubino или Riserva\nAmbrato – биттера Martini Riserva, который с\nнедавних пор производится в окрестностях Турина\nпо старинному рецепту 1872 года, коктейль\nобретает полностью туринское происхождение и\nпревращается в «Торино-Торино».", "И та л и я\nНегрони\n\nКлассика\n\nNegroni\nЕсть разные способы войти в историю. Графу Камилло Негрони надо было\nлишь заказать коктейль «Американо» с небольшой добавкой джина, который напоминал ему о недавнем путешествии в Лондон. Произошло это во\nФлоренции в 1920-х годах.\nС тех пор успех коктейля «Негрони», украшенного ломтиком апельсина,\nчтобы не путать его с прочими «Американо», превзошел все ожидания.\nОтныне он входит в тройку наиболее востребованных коктейлей мира.\nТеперь в Италии даже существуют «негронерии», то есть бары, в которых\nпьют (почти) исключительно «Негрони», как, например, в Генуе, где можно\nнайти 64 версии этого коктейля.\n«Негрони» отражает популярность вермутов и их качественное улучшение. Вермуты сделались полноценными напитками и не довольствуются\nболее вторыми ролями. Они влияют на всю архитектуру коктейля, придавая ему невиданную прежде ароматическую глубину.\n«Негрони» выводит на первый план вермут, биттер и джин, подобно тому\nкак принцесса гордо несет бриллиантовую диадему.\nХороший «Негрони» узнается, в первую очередь, по цвету. Бокал должен\nсловно светиться, будто в нем горит огонь. Эти яркие отблески сообщаются натуральными красителями биттера – кармином и шафраном.\nА потом все просто. Если вы подумали, что закажете второй бокал, после того, как отпили только один глоток из первого, – значит это хороший\nкоктейль. Действительно, хороший «Негрони» обладает идеальным равновесием между сладостью и горечью. А гармония растительных ароматов и\nджина сразу вызывает вкусовой рефлекс, когда хочется пить еще и еще.\nС недавних пор у барменов появилась возможность вывести «Негрони» на\nновый уровень. Специально для этой цели была создана линейка вермутов и биттера Martini Riserva Speciale, которые идеально сочетаются не\nтолько друг с другом, но и – с джином Bombay Sapphire. Действительно,\nмастер-травник дома «Мартини» – Ивано Тонутти – также отвечает за подбор растений для джина Bombay Sapphire. Cоздавая новый биттер Martini\nRiserva Speciale (он был выпущен в 2017 году), Ивано ориентировался на\nароматический профиль как джина, так и вермутов, получив в итоге идеальный горький компонент для «Негрони».\nГотовя «Негрони» из данных ингредиентов, лучше использовать метод\n«стир», чтобы яркие и насыщенные компоненты были идеально охлаждены, перемешаны и слегка разбавлены тающим льдом.\n\nГраф К амилло Н егрони\nГраф Камилло Негрони дал свое имя знаменитому\nкоктейлю, который сегодня входит в тройку самых\nпопулярных смешанных напитков мира.\nНеудивительно, что именно ему: итальянцу по\nлинии отца, англичанину – по матери, пришло в\nголову смешать итальянские аперитивы с лондонским джином.\n\nНа 1 бокал\n\nВермут Martini Riserva Rubino - 30 мл\nБиттер Martini Riserva - 30 мл\nДжин Bombay Sapphire - 30 мл\n\n1. Ингредиенты перемешать в стакане для смешивания, заполненном льдом.\n2. Сцедить в бокал рокс, наполненный свежим льдом.\n3. Украсить долькой апельсина и подать.\n\nИта лия 325", "И та л и я\nФ ормула идеа льного «Н егрони »\nВермут – это один из наиболее востребованных напитков в баре. Он встречается во\nмногих классических и исторических рецептах, таких как «Манхэттен», «Драй Мартини»\nи «Негрони», которые (по данным Drink\nInternational) входят в топ-десятку наиболее\nзаказываемых коктейлей в лучших барах\nмира. Учитывая, что «Негрони» медленно, но\nверно продвигается к первому месту (второе в 2018 году), можно констатировать, что\nпублика все больше интересуется коктейлями с вермутом.\nУспех вермута объясняется ароматическим\nбогатством, горечью и сладостью в сочетании с умеренным содержанием алкоголя – где-то посередине между крепкими\nспиртными напитками и винами, – а также\nспособностью возбуждать аппетит.\n\nБиттер, как дополнение к вермуту\nВ сущности, у бармена не так уж много\nвозможностей, чтобы создать сбалансированный коктейль. Его «формула» должна\nподчиняться достаточно строгим правилам,\nкоторые сводятся к игре с пятью существующими в природе вкусами и их противопоставлением друг другу. Наряду с кислым и\nсладким, горький вкус чрезвычайно важен в\nмире коктейлей.\n\nПоиск аутентичных продуктов\nИзвестно также, что еще одно свойство,\nкоторое потребитель ожидает от коктейля, –\nэто его максимальная аутентичность.\nДействительно, в барах, специализирующихся на премиальных коктейлях, стандартные\nбазовые напитки заменяются эквивалентами\n\nс большей добавленной стоимостью. Поэтому, бармен должен внимательно подходить\nк выбору вермутов и биттеров.\n\nСозданные друг для друга\nДва вермута – Riserva Speciale Rubino и\nRiserva Speciale Ambrato, выпущенные домом\nMartini в 2015 году, а также присоединившийся к ним в 2017 году биттер Martini Riserva\nSpeciale предназначены для барменов, стремящихся поднять уровень своих коктейлей в\nответ на запросы потребителей в отношении\nвсе более высокого качества.\nВермуты Riserva Speciale принадлежат к\nнедавно закрепленной на законодательном\nуровне категории вермутов – IGP «защищенное географическое наименование»\nVermouth di Torino, которая гарантирует\nтипичность и качество напитков.\nЧто касается биттера Martini Riserva Speciale,\nто это продукт, подсказанный старинным рецептом. Он состоит только из натуральных\nингредиентов и представляет невиданную\nдо сих пор ароматическую сложность. Его\nгоречь, действительно, многогранна.\nВермуты Martini Riserva Speciale и биттер\nMartini Riserva Speciale созданы для смешивания друг с другом.\nБиттер включает большое число общих с\nвермутом растений и пряностей. В случае\nлинейки Riserva Speciale эта близость еще\n\nД жузеппе (Б еппе ) М уссо\nЭто легендарный мастер-энолог дома Martini. Он\nговорит, что цель дома – это сложность и гармония. Например, горькая составляющая вермутов\nMartini – это не одно растение, это целая гармоничная комбинация разных горьких растительных\nкомпонентов. Даже одного вида полыни недостаточно, ибо он не может дать весь тот комплексный\nаромат, который требуется для вермутов Martini.\nПоэтому для них было отобрано три сорта полыни!\nБеппе Муссо считает, что есть явная связь между\nработой бармена, который ищет гармонию в коктейлях, и деятельностью дома Martini, который\nнаходится в постоянной поиске гармонии между\nвсеми растительными компонентами, дарованными природой.\n\n326 Ита лия", "И та л и я\n\nболее тесная. Действительно, мастер-энолог\nи мастер-травник дома Martini объединили\nвсе свои знания и опыт, чтобы при смешивании этих вермутов с этим биттером получалась максимальная гармония.\nРезультат оказался на уровне ожиданий:\n«Негрони» и «Негрони Збальято» достигают\nтого уровня гармонии, которого раньше\nдобиться было просто невозможно, даже\nкомбинируя всеми известными способами\nлюбые присутствовавшие на рынке напитки.\n\nВ коктейле важна каждая деталь,\nдаже оранжевые отблески\nВ биттер Martini Riserva Speciale, базовый\nкрасный цвет которого сообщен кармином\n(натуральный краситель, получаемый из\nкошенили), добавили небольшое количество\nшафрана. Последний обеспечивает яркие\nоранжевые отблески, столь ценные для любителей итальянских коктейлей. Эти отблески придают «Негрони» особенный внешний\nвид, словно внутри бокала горит огонь.\n\nСекрет хорошего коктейля–\nсложность и гармония\nНачинающий миксолог считает самой важной чертой коктейля его основной аромат.\nНа конкурсах это часто приводит к катастрофическим коктейлям с веточкой розмарина,\nподжигаемой участником в момент подачи.\nДействительно, основной аромат коктейля\nважен. Но следом за ним идет сложность.\nИменно гармония этой сложности создает\nвкус коктейля. Основной аромат должен\nиграть, делиться с ароматами заднего плана.\nДолжно что-то происходить. Секрет великих\nкоктейлей – сложность и гармония между\nароматами.\nНе так важна узнаваемость каждого аромата\nили доминирование одного из них. Необходимо добиться общей, сложной алхимии.\nПервой реакцией на глоток удачного коктейля не должна быть попытка распознать\nодин за другим все присутствующие ароматы, а желание сделать еще один глоток.\nКоктейли из вермутов Martini Riserva\n\nSpeciale и биттера Martini Riserva Speciale\nлегко достигают поставленной цели. Между\nразными ароматическими составляющими царит полная гармония. Более того,\nмногообразие растительных компонентов\nзащищает вкусовые рецепторы от перенасыщения. Каждый новый глоток несет с собой\nновые вкусы, новые ощущения.\nСмешивая «Негрони» – джин с вермутом\nи биттером – бармен получает коктейль с\nкомбинацией из 60–80 ботаникалов. Распознать их все будет невозможно. Но эта\nтонкая алхимия – глоток за глотком – будет\nпрочувствована на уровне наших вкусовых\nрецепторов, и на сознательном уровне воспринята как лучший в мире «Негрони».\nДля «Негрони Збальято», можно менять рецепт, используя по очереди вермуты Rubino\nи Ambrato. В обоих случаях, винные и растительные ароматы сыграют с утонченностью\nпросекко, и придадут напитку дополнительное измерение.\n\nИта лия 327", "И та л и я\nМиланский Bar Basso, где был создан\nкоктейль «Негрони Збальято».\n\nХуго\nHugo\nЭтот вдохновленный «Спритцем» напиток\nпроисходит с сервера Италии. Согласно разным\nверсиям, «Хуго» появился на свет либо в конце\n90-х, либо в начале 2000-х годов.\nСледует отметить, что, наряду с приведенным\nниже рецептом, есть вариант «Хуго», в котором\nвместо сиропа из цветков бузины используется\nсироп из мелиссы.\nНа 1 бокал\n\nОх­л аж­д ен­н о­е Martini Prosecco - 60 мл\nСодовая вода - 60 мл\nСироп из цветков бузины - 30 мл\n\nЗбальято (он же негрони Збальято)\nSbagliato\nВ 1950-е годы Мирко Стокетто открыл миланский бар Basso, ставший первым «уличным» коктейльным баром города. Позднее, в 1970-е годы Мирко переработал рецепт классического «Негрони»,\nзаменив в нем джин на просекко. Так появился на свет «Негрони Збальято» (то есть, неправильный\nНегрони). Потом об этом коктейле на какое-то время все забыли, до тех пор пока в 1990-е годы\nМилан не захлестнула мода на аперитив.\nСегодня этот аперитивный коктейль все чаще называют просто «Збальято». Это, своего рода, летняя\nверсия «Негрони» и главный конкурент «Спритца». Он пользуется ошеломляющим успехом в Милане, а также в барах всех других больших и малых городов Италии.\nНа 1 бокал\n\nВермут Martini Riserva\n(Rubino или Ambrato) - 60 мл\nБиттер Martini Riserva - 60 мл\nИгристое вино Martini Prosecco - 60 мл\n\n1. В высокий бокал положить несколько кубиков льда.\n2. Налить вермут, биттер и игристое вино.\n3. Украсить ломтиком апельсина.\n\n1. В крупный винный бокал положить несколько кусков льда.\n2. Налить ингредиенты.\n3. Украсить мятными листьями.\n\nБичик летта\nLa Bicicletta\nLa Bicicletta («велосипед») – отличный аперитив в итальянском стиле, который подают\nповсюду в мире: от Лондона до Лос-Анджелеса.\nНазвание коктейля отражает страсть жителей\nапеннинского полуострова к двухколесному\nтранспорту.\nНа 1 бокал\n\nБиттер Martini Riserva - 60 мл\nСухое белое вино - 45 мл\nСодовая - 15 мл\n\n1. В винный бокал положить лед. Налить\nингредиенты. Перемешать.\n2. Украсить слайсом лимона.\n\n328 Ита лия", "И та л и я\nБеллини\n\nКлассика\n\nBellini\nВосхитительная смесь игристого вина и пюре из свежего персика, придуманная в венецианском «Гаррис баре» его основателем – Джузеппе Чиприани – по случаю выставки художника Джованни Беллини. Цвет коктейля напоминал колер тоги святого на одном из полотен живописца.\nЭтот исполненный простоты, соблазна и свежести коктейль встретил восторженный прием, и «Беллини» стали пить по всей Италии, а затем и по\nвсему миру в заведениях, где культивируется «дольче вита».\nЗа кадром остался тот факт, что вначале Чиприани предлагал «Беллини»\nлишь 4 месяца в году, во время сезона персиков. Он сам готовил персиковое пюре, тщательно раздавливая белую мякоть очищенных персиков,\nнастаивая ее несколько часов и иногда добавляя совсем немного сахара.\nСледуйте его примеру и вы получите исключительный коктейль.\n«Беллини» из венецианского «Гаррис бара» является своего рода эквивалентом «Кровавой Мэри» из «Гаррис Бара» парижского. Но, если не считать творческой жилки, два заведения не имеют ничего общего. Кстати,\nдля ценителей гастрономии венецианский «Гаррис бар» – это место, где\nизобрели карпаччо, а в парижском «Гаррис баре» впервые в Европе стали\nподавать хот-доги.\n\nНа 1 бокал\n\nОхлажденное Martini Prosecco - 80 мл\nПерсиковое пюре* - 40 мл\n\n1. Налить 40 мл пюре в смесительный стакан и добавить 40 мл просекко.\n2. Аккуратно перемешать и перелить в\nвысокий фужер или в чашу для шампанского,\nохлажденную в морозильнике.\n3. Не перемешивая, долить остальное просекко.\n\n*П ерсиковое пюре\nОтберите спелые персики с белой мякотью.\nОчистите их от кожицы, удалите косточки и\nизмельчите мякоть в блендере. Попробуйте пюре\nи, если требуется, добавьте немного сахарного\nсиропа. Дайте готовому пюре настояться в холодильнике в течение часа.\nВы можете заморозить готовое пюре, чтобы\nиспользовать его по прошествии сезона персиков.\n\nКоктейль «Беллини» в роскошном интерьере венецианского отеля The Gritti Palace.\n\nИта лия 329", "И та л и я\nСгроппино\nSgroppino\nЛимонное мороженое, водка и просекко –\nобразуют вместе традиционный итальянский\nкоктейль-десерт, который освежит дыхание\nпосле обеда или ужина.\nМороженое, каким мы знаем его сегодня, – это\nитальянское изобретение, которое стали подавать при дворе Медичи.\n«Сгроппино» должен сервироваться очень\nхолодным, ибо он быстро тает.\nНа 1 бокал\n\nВодка - 25 мл\nЛимонное мороженое* - 100 г\nОхлажденное просекко - 50 мл\n\n1. Все ингредиенты взбить в блендере.\n2. Перелить в охлажденный фужер для шампанского. Подавать немедленно.\n\nM artini F iero\nКомпания «Мартини» – неутомимый защитник итальянской «дольче виты» – обуздала бушующую волну популярности «Спритца», выпустив на рынок Martini Fiero. Новый напиток может\nпоспорить со своими знаменитыми конкурентами за право стать основой этого культового\nоранжевого коктейля.\nСледует знать, что в Венеции есть те, кто предпочитает готовить «Спритц» с Аперолем, и те, кто\nотдает выбор в пользу Campari, не считая третьих – поборников «Спритца» на основе биттера\nSelect, который находится где-то на полпути между горечью Campari и сладостью Aperol.\nЧто касается Martini Fiero, то это ароматизированное вино, рецепт которого держится в секрете.\nНапиток обладает фруктовыми ароматами с нотами апельсина и мандарина, а также горьковатыми оттенками полыни, которые сближают его с вермутами. Его пьют, в первую очередь, в\nкоктейле Fiero Spritz, смешивая с просекко и содовой, а также – в сочетании с тоником.\n\nПуччини\n\nРоссини\n\nPuccini\n\nRossini\n\nСочетание просекко с мандарином носит имя\nзнаменитого итальянского оперного композитора Джакомо Пуччини.\n\nКлубничная производная знаменитого венецианского коктейля «Беллини» названа в честь\nавтора множества опер Джоаккино Россини.\n\nНа 1 бокал\n\nНа 1 бокал\n\nОх­л аж­д ен­н о­е Martini Prosecco - 80 мл\nСвежевыжатый мандариновый сок - 40 мл\n\nОх­л аж­д ен­н о­е Martini Prosecco - 120 мл\nСпелая клубника - две-три ягоды\nНемного сахара (в зависимости от сладости\nягод)\n\n1. Налить ингредиенты в охлажденный\nфужер.\n\n330 Ита лия\n\n1. Растолочь клубнику с сахаром в пюре.\n2. Положить его в охлажденный фужер. Налить игристое. Слегка перемешать.\n3. Украсить клубникой.\n\n*Л имонное мороженое\nЕсли в погоне за крафтовым трендом вам захочется приготовить домашнее мороженое для\n«Сгроппино», вот его рецепт.\nЦедра одного лимона (порезать полосками)\nЛимонный сок - 150 мл\nСахарный песок - 220 г\nОхлажденные жирные густые сливки - 250 мл\n\n1. В кастрюлю поместить цедру и сахар. Залить водой (125 мл). Довести до кипения при\nпомешивании. Держать на медленном огне,\nпока сахар не растворится. Цедру удалить.\nСироп остудить.\n2. В полученный сироп влить лимонный сок.\nПеремешать.\n3. Взбить сливки в плотную пену. При постоянном взбивании влить в сливки лимонный\nсироп.\n4. Поместить смесь в электрическую\nмороженицу и следовать инструкциям производителя. (Если у вас нет сего аппарата,\nпридется поставить смесь в морозилку и\nпериодически – каждый час или два – взбивать ее венчиком или миксером, пока она не\nзатвердеет.)", "И та л и я\nСпритц\n\nКлассика\n\nSpritz\nКогда в 1797 году Венецианская\nреспублика попала под власть\nАвстрии, стоявшие там гарнизоном\nсолдаты взяли привычку добавлять\nгазированную воду в вино, которое\nони считали слишком крепким.\nТак появился «Спритц», еще одна\nвенецианская достопримечательность, наряду с гондолами и каналами.\nНачиная с 1920-х годов «Спритц»\nстал смесью газированной воды и\nпросекко, которую местные бармены принялись ароматизировать на\nсвой вкус при помощи еще одной\nместной достопримечательности –\nаперитива Aperol, а также Campari\nи других биттеров, секрет приготовления которых хранит Италия.\n«Спритц» узнается среди прочих\nкоктейлей по характерному оранжевому цвету. И без такого бокала\nвы никогда не сможете выглядеть\nнастоящим туристом, посещая\nВенецию.\nНа 1 бокал\n\nИгристое вино Martini Prosecco - 90 мл\nАперитив Aperol - 60 мл\nСодовая - 30 мл\n\n1. В крупный винный бокал положить несколько кубиков льда.\n2. Налить биттер и игристое вино. Добавить содовую.\n3. Украсить коктейль оливкой или ломтиком\nапельсина.\n\nИта лия 331", "Ч асть вторая . Г лава 18\n\nПариж\n\nКоктейли вечного города\nмиксология в изгнании", "К октейли П арижа . «Р итц », стр. 334\nКлассика: Сайд Кар, Френч 75\n\nТем временем в «Гаррис баре»..., стр. 339\nКлассика: Кровавая Мэри, Бульвардье, Белая Леди\n\nФ ранцузские коктейли - аперитивы , стр. 343", "К о кт е й л и П а р и ж а . «Р и т ц »\n\nК\n\nок тейли официа льно появились в П ариже на В семирной вы с тавке 1878 года , когда на М арсовом поле был открыт времен ный питейный павильон под названием B ar A mericain (« амери -\n\nканский бар »).\n\nС разу пос ле этого события в 1879 году парижский рес торатор месье\nГа ллопен , владевший большой брассерией непода лек у от Б иржи , вы писа л из К убы огромную с тойк у красного дерева и зарегис трирова л\nсвое заведение в качес тве первого пос тоянного «А мериканского\nбара » в П ариже\nШ ирокое распрос транение кок тейли получили на 10 лет позднее – в\n1889 году, когда в П ариже была организована с ледующая В семирная\nвыс тавка , для которой была пос троена Э йфе лева башня .\nП ариж хорошо подготовился к приему гос тей . В парижских оте лях и\nкафе с та ли подавать смешанные напитки .\nН адо сказать , что конец 19 с толетия – это эпоха бурного процвета ния П арижа . П ариж был абсолютной с толицей гас трономии . З десь\nбыло больше рес торанов , чем в Л ондоне и Н ью -Й орке вмес те взятых !\nВ то время открылось большинс тво сегодняшних гранд - брассерий и\nгран - кафе : L a C oupole , L e D ôme , L e S elect, L a C loserie des L ilas , L e\nC afé de Flore ... В се эти новые парижские заведения с та ли принимать\nс толичный бомонд и подавать кок тейли . П арижская публика горячо\nприняла эти с транные напитки с удивите льными названиями , кото рые посвященные бармены в бе лых пиджаках будто бы извлека ли из\nколдовской книги . Ф иксы , С ауэры , Д жулепы и К обблеры были с толь\nже непонятными , сколь притягате льными названиями . О ни обре ли\nуспех у высшего парижского общес тва .\n\nС реди этих заведений было расположенное на Е лисейских полях ка фе - рес торан F ouquet ' s . Е го основате ль – Л уи Ф укет – сос тавил пер вый французский сборник кок тейлей под названием B ariana . И зучая\nэт у книжк у, можно отметить , что рецепты здесь более или менее те\nже самые , что и в американских сборниках того времени .\nС вс т уплением в силу сухого закона в Соединенных Ш татах и\nнаплывом американских т урис тов , бары , предлагавшие кок тейли ,\nрасцвета ли как подснежники весной . Ф ранк М ейер царс твова л за\nс тойкой в Р итце , а Гарри М ак Э лхон – в своем баре на улице Д ону.\nВ 1920-х и в 1930-х годах П ариж был с толицей смешанных напитков . З десь появились на свет ве личайшие к лассические кок тейли ,\nтакие как «К ровавая М эри », «Ф ренч 75», «С айд К ар » и «Б е лая Л еди ».\n\n334 Париж\n\nМимоза\nMimosa\nСчитается, что коктейль под таким названием\nбыл впервые смешан Франком Мейером в\nпарижском «Ритце» в середине 1920-х годов.\nДействительно, этот рецепт содержится в\nсборнике Франка Мейера «The Artistry of Mixing\nDrinks», где он также называется Champagne\nOrange. Однако само сочетание шампанского с\nапельсиновым соком было придумано несколькими годами ранее в лондонском клубе Buck's\nClub, где оно получило название Buck's Fizz.\nНа 1 бокал\n\nОхлажденное шампанское - 75 мл\nОхлажденный апельсиновый сок - 45 мл\n\n1. В охлажденный фужер налить шампанское\nи сок.", "«Франк Мейер был шеф-барменом в знаменитом парижском баре «Ритца» в Золотую\nэпоху начала двадцатых годов. В то время\nтакие бары, как «Джо Зеллис», «Гаррис НьюЙорк бар» и мужской бар на той стороне\nотеля «Ритц», что выходит на улицу Камбон, были наиболее известными питейными\nТадж Махалами мира. Каждый трансатлантический лайнер выплескивал на французский берег толпы богатых и иссохших от\nжажды янки, полных обесцененных франков,\nа Франк из «Ритца» был чем-то вроде\nмеждународно признанного короля барменов, и в самом деле, приятным, великодушным и понимающим другом для тысяч\nамериканцев. В «Ритце» не было ничего ни\nдешевого, ни народного, не было перхоти на\nутренних жилетах посетителей, среди которых был король Испании, принц Уэльский\nи русские Великие князья, жившие в изгнании\nв Париже».\nВ качестве наследия Франк Мейер оставил\nнам небольшую книгу «Искусство смешивания напитков» (The Artistry of Mixing Drinks),\nвышедшую тиражом всего 1300 экземпляров,\nза которую бармены всей планеты яростно\nбьются на аукционах.\n\nПче линые колени\nBee’s Knees\n\nФ ранк М ейер\n\nХ имик , физиолог и психолог\n«Когда я воображаю себе загробную жизнь, дело всегда происходит в \"Ритце\"», – говорил Хемингуэй. И можно добавить: «с Франком Мейером, подающим коктейль!».\nФранк Мейер принадлежит к узкой касте великих барменов, которые священнодействовали\nво Франции начиная с 1920 годов – в золотой век коктейлей. Родом из Австрии, Франк Мейер\nбыл управляющим баром «Камбон» в отеле «Ритц» с момента его открытия в 1921 году. Он царил над «Ритцем» и самой роскошной парижской клиентурой вплоть до самой свой смерти в\n1947 году.\nЕго творения, среди которых – «Биз Низ» (Bee's Knees), остались потомкам.\nКроме того, он первым ввел в работу бармена психологические нюансы. Именно ему принадлежат ставшие знаменитыми слова: «Бармен должен быть химиком, физиологом и психологом».\nВ наши дни трудно представить себе ауру великих барменов прежних времен. Вот, в частности,\nчто писал в 1946 году американский журналист Лашес Биб о Франке Мейере и баре «Камбон»:\n\nКоктейль зародился во времена сухого закона,\nтак как выражение «bee’s knees» относится к тому\nпериоду. Существует мнение, что это странное название означает «лучший, вершина качества». Оно\nпроисходит от того, что пчелы переносят пыльцу\nв корзинках, расположенных неподалеку от их\nколен. Bee’s Knees стал популярным благодаря\nФранку Мейеру из парижского отеля «Ритц», и в\nнастоящее время наиболее распространен именно\nего вариант этого коктейля.\nНа 1 бокал\n\nДжин - 40 мл\nСок четверти лимона\nЖидкий мед - 1 чайная ложка\n\n1. Основательно взбить в шейкере ингредиенты со льдом.\n2. Отфильтровать в охлажденный коктейльный бокал.\n\nПариж 335", "К о кт е й л и П а р и ж а . «Р и т ц »\nСайд К ар\n\nКлассика\n\nSide Car\nСчитается, что «Сайд Кар» был изобретен в одном парижском баре во\nвремя Первой мировой войны. Он получил свое название от мотоциклетной коляски (по-английски – side car), в которой ездил капитан,\nкоторый ценил это изысканное сочетание коньяка, апельсинового\nликера и лимонного сока. Такую версию поведал в 1948 году американский автор Дэвид Эмбери, представившись другом того бармена,\nкоторый придумал коктейль. Но он не привел ни имени бармена, ни\nточной даты изобретения коктейля.\nДругие источники относят появление «Сайд Кар» то к Довилю, то к\nКаннам, то к Ницце. Но это еще не все версии. Американский гастрономический журналист Лашес Бейби (1902–1966), автор книги о Сторк\nКлубе, утверждает, что «Сайд Кар» изобрел Франк Мейер из бара «Камбон» парижского отеля «Ритц». Он уточняет, что Франк использовал в\nкоктейле коньяк 1865 года из тех немногих бутылок, которые появились на свет во время нашествия филлоксеры. По этой причине коньяк\nдаже имел легкий привкус трюфеля! Стоил в то время «Сайд Кар» пять\nдолларов в пересчете с франков.\nСегодня в «Ритце» все еще можно попробовать коктейль, приготовленный по тому же рецепту знаменитым барменом Колином Филдом, с тем\nже коньяком из запасов отеля, за скромную сумму в 1500 евро!\nНаконец, последняя версия приписывает изобретение коктейля Гарри\nМакЭлхону. Хотя сам он в своем сборнике рецептов, вышедшем в 1923\nгоду, не объявляет себя изобретателем «Сайд Кар». Он лишь уточняет,\nчто после оглушительного успеха во Франции английский бармен по\nимени Пат МакГарри привез этот коктейль в Британию, где он обрел\nмеждународную славу.\nВ конечном счете, все эти легенды демонстрируют то большое значение, которое придается данному коктейлю. Немногие рецепты сочетают в себе столько вкуса и элегантности.\nС момента его создания прошло почти сто лет. Но когда требуется подать престижный коктейль из лучших компонентов, сразу же приходит\nмысль о «Сайд Кар».\nНиже представлен рецепт «Сайд Кар» в версии Франка Мейера. Скорее всего, это оригинальный, первоначальный рецепт коктейля.\nВ меру крепкий и уравновешенный между сладостью и кислотностью.\nМожно сказать, что сегодня это самый распространенный вариант\nприготовления коктейля. Заметьте, что «Сайд Кар», как и сам коньяк,\nподается без каких бы то ни было украшений.\n\nТвист на «С айд К ар »\nДанная альтернативная версия классического\nкоктейля подается в бокале с двойными стенками и\nсостоит из следующих ингредиентов: 45 мл коньяка\nMartell VS Single Distillery, 15 мл ликера Triple Sec,\n10 мл лимонного сока, 10 мл гранатового сока, 5 мл\nкрасного биттера, апельсиновая цедра.\n\n336 Париж\n\nНа 1 бокал\n\nКоньяк Martell VSOP - 40 мл\nЛикер Triple Sec - 20 мл\nCвежевыжатый лимонный сок - 20 мл\n\n1. Взбить все ингредиенты в шейкере, заполненном льдом.\n2. Отфильтровать в охлажденный коктейльный бокал.", "К о кт е й л и П а р и ж а . «Р и т ц »\nФин-а-Лё\nFine à l'Eau\nВ переводе с французского «Фин-а-лё» – это «тонкий спиртной напиток с водой». Привычка смешивать коньяк (или «бренди из Коньяка», как его тогда называли) с содовой пришла в Европу из\nАнглии, где эта мода появилась еще в начале 19 века. По всей вероятности, она была завезена из\nИндии, где английские офицеры дезинфицировали воду при помощи коньяка. Это утоляло жажду и\nотделяло их от солдат, которые пили джин.\nВ начале 20 веке «Фин-а-лё» стал очень востребован на террасах парижских кафе. А после запрета\nабсента в 1915 году «Фин-а-лё» превратился в главный аперитив Франции. Его успех был феноменален вплоть до 1970-х годов.\nСегодня «Фин-а-лё» вновь оказался в центре внимания, благодаря интересу к историческим смешанным напиткам.\nЧтобы ярче выразить деликатное послевкусие коньяка и придать напитку дополнительную свежесть, можно использовать вместо воды холодный настой черного чая. Для этого надо налить в\nсифон воду и положить чай (две ложки на пол-литра воды). Настаивать минуту.\nНа 1 бокал\n\nКоньяк Martell VSOP - 50 мл\nСодовая вода (из сифона) - 100 мл\n\n1. Высокий бокал хайбол наполнить кубиками льда.\n2. Налить ингредиенты. Аккуратно перемешать.\n3. Можно украсить долькой лимона.\n\nС овременный рецепт\n\nСен-Жермен-де-пре\nSaint-Germain-des-Prés\nИзвестный парижский квартал на противоположном\nот «Ритца» берегу Сены дал название этому современному коктейлю с пряными ароматами.\nНа 1 бокал\n\nКоньяк Martell VS или VSOP - 50 мл\nГрушевый сок - 50 мл\nСироп «Корица» - 20 мл\nGinger Ale - 50 мл\n\n1. Коньяк, сок и сироп взбить в шейкере, заполненном льдом.\n2. Отфильтровать в бокал рокс, заполненный\nльдом.\n3. Добавить лед до верха бокала.\n4. Добавить Ginger Ale.\n5. Украсить грушевыми чипсами.\n\nПариж 337", "К о кт е й л и П а р и ж а . «Р и т ц »\nФренч 75\n\nКлассика\n\nFrench 75\nУ коктейля «Френч 75» нет точно установленного автора, но не вызывает ни малейшего сомнения тот факт, что он является эволюцией\nкоктейля «75», названного так в честь калибра французских пушек. Некоторые исследователи считают, что «75» был придуман Гарри МакЭлхоном. Но при этом в своем справочнике, изданном в 1923 году, сам\nМакЭлхон объясняет, что коктейль был популярен во Франции еще во\nвремя Первой мировой войны. В справочнике МакЭлхона коктейль\n«75» содержит дэш сиропа Гренадин, 2 дэша абсента, 2/3 кальвадоса и\n1/3 джина. Шампанское отсутствует.\nВерсия коктейля «75» от Франка Мейера из «Ритца», появившаяся несколькими годами позднее, уже гораздо больше напоминает современный «Френч 75». Он состоял из чайной ложки анисовой настойки Pernod,\nсока четверти лимона и полстакана джина. Все взбивалось в шейкере и\nотфильтровывалось в бокал для вина (а не в узкий фужер) и доливалось\nшампанским. Тот же вариант, но без анисовой настойки и обогащенный\nсахарным сиропом, подавался в нью-йоркском «Сторк Клубе» в 1946 году.\nОн-то и является сегодня официальным рецептом «Френч 75».\n\nВоскрешающий мертвеца №2\nCorpse Reviver № 2\nРецепт Франка Мейера из «Ритца». Можно\nотметить, что он не имеет практически ничего\nобщего с коктейлем Corpse Reviver №2 от Гарри\nКрэддока (джин, трипл сек, аперитив Lillet,\nлимонный сок и абсент).\nНа 1 бокал\n\nАнисовая настойка Pernod - 40 мл\nЧетвертинка лимона\nОхлажденное шампанское\n\n1. В охлажденный фужер для шампанского\nналить Pernod.\n2. Добавить шампанское.\n3. Отжать сок из четвертинки лимона.\n\nКассиско\n\nНа 1 бокал\n\nCassisco\n\nДжин Bombay Sapphire - 30 мл\nОхлажденное шампанское - 120 мл\nСвежевыжатый лимонный сок - 15 мл\nСахарный сироп - 15 л\n\nCassisco – производная от Cassis (черная\nсмородина) и Co (Cognac) – это типичный\nфранцузский аперитив, который был популярен\nв Париже в первой половине 19 века. Рецепт из\nкниги Франка Мейера «Искусство смешивания\nнапитков» (1936 год).\n\n1. В шейкер положить лед. Налить сок, сироп и джин.\n2. Взбить и отфильтровать в охлажденный фужер.\n3. Добавить шампанское.\n4. Украсить полоской из цедры лимона.\n\nНа 1 бокал\n\nЛикер Crème de Cassis - 15 мл\nКоньяк - 30 мл\nСодовая\n\n1. В рокс или крупный винный бокал положить\nнесколько кубиков льда.\n2. Налить черносмородиновый ликер и\nконьяк. Добавить содовую.\n\n338 Париж", "Тем временем в «Гаррис баре» ...\n\nП\n\nре ж де чем обосноватьс я в П ариже , Гарри М ак Э лхон трудилс я\nбарменом в оте ле «П лаза » в Н ью -Й орке , потом – в городском\nк азино в Н ицце и Д овилле , затем – в лондонском «С ирос». Н а -\n\nконец , в 1923 году он с та л вла де льцем бара на улице Д ону в П ариже ,\nполучившего название «Гаррис Н ью -Й орк бар ».\n\nЭ тот уютный и гос теприимный , обшитый деревом бар с тех пор ничу ть\nне изменилс я . О н идеа льно расположен в кварта ле П арижской оперы .\nГарри М ак Э лхон основа л здесь пере довую лабораторию по разработке\nновых кок тейлей . И менно в его баре была создана «О безьянья же леза »\nи , може т быть , «К ровава я М эри ». К с тати , в 1925 году в этом баре впер вые в Е вропе с та ли подаватьс я хот- доги .\nС егодня «Гаррис бар » пре дос тавляе т уник а льную возможнос ть попро бовать кок тейли с зас тывшим во времени вк усом . И х подают бармены ,\nсовершенно безразличные к трендам , моде , новым веяниям миксологии\nи бит терам , за иск лючением «П ешо » и «А нгос т уры ».\nГарри МакЭлхон. Фото из сборника рецептов за его\nавторством «ABC of Mixing Cocktails», 1923 год.\n\nБелая Леди\n\nКлассика\n\nWhite Lady\n«Белая леди» – это настоящий миксологический коктейль, в котором\nсложные ароматы джина чудесно сочетаются с лимонным соком и\nцитрусовыми нотами апельсинового ликера.\nГарри МакЭлхон позаимствовал название коктейля у одного белого\nсорта роз в 1919 году, когда\nон работал еще в лондонском\n«Сирос клубе». Но рецепт того\nкоктейля сильно отличался от\nнынешнего, поскольку он включал 1/6 коньяка, 1/6 мятного\nликера и 4/6 ликера Cointreau.\nПо словам Энди МакЭлхона,\nего отец позднее видоизменил\nрецепт и, в конце концов, создал современный вариант коктейля в Париже в 1929 году.\nЧто касается пропорций, то\nдопускается небольшое увеличение содержания ликера в\nущерб джину, когда коктейль\nподается даме. Использование\nяичного белка необязательно.\n\nНа 1 бокал\n\nДжин Beefeater - 40 мл\nСвежевыжатый лимонный сок - 10 мл\nЛикер Triple Sec - 20 мл\nЯичный белок - дэш\n\n1. Взбить ингредиенты в шейкере со льдом.\n2. Отфильтровать в охлажденный коктейльный\nбокал.\n\nПариж 339", "Тем временем в «Гаррис баре» ...\nРоза\n\nОбезьянья же леза\n\nRose Cocktail\n\nMonkey Gland\n\nДля того чтобы найти первое упоминание о\nкоктейле «Роза», придется обратиться к 1923\nгоду, когда Гарри МакЭлхон опубликовал\nего рецепт в своем справочнике, приписав\nавторство некоему Джонни из парижского\nбара «Шатам», который располагался на той же\nулице, что и «Гаррис бар». Коктейль пользовался большим успехом и через несколько лет был\nдаже взят на вооружение Гарри Крэддоком.\nВ сборнике рецептов «Les Cocktails de Paris», изданном в Париже в 1929 году, приводится несколько вариантов и твистов этого коктейля: с\nджином или с коньяком, с игристым вином или\nс малиновым сиропом. Все они, разумеется,\nотличаются розовым цветом, и большинство из\nних содержит то или иное количество кирша,\nкоторый в ту эпоху широко использовался в\nкоктейлях.\n\nОдно из наиболее неоспоримых творений Гарри\nМакЭлхона – это коктейль «Обезьянья железа».\nОн создал его, работая в лондонском «Сирос»\nеще до того, как стал владельцем собственного\nпарижского заведения. Получается, что этот\nкоктейль можно датировать 1920-1922 годами.\nОн присутствует в третьем издании справочника Гарри, увидевшем свет в 1923 году.\nПри создании этого коктейля Гарри МакЭлхон\nявно находился под влиянием опытов французского ученого русского происхождения\nСергея Воронова (1866-1951). Последний\nпытался найти ключ к омоложению мужчин,\nпрививая им тестикулы обезьян. В 1920-е годы\nего труды получили значительный резонанс, и,\nпо-видимому, ими вдохновился Булгаков при\nработе над романом «Собачье сердце».\nВоронов быстро разбогател. В его клинику\nна Лазурном берегу съезжались для лечения\nмиллионеры со всего мира. Не задумываясь,\nони расставались с половиной состояния в\nнадежде продлить свою золотую жизнь. Перед\nлицом подобного успеха Воронову случалось\nиспользовать органы молодых преступников в\nслучае нехватки обезьян. В конце концов, все\nубедились в тщетности подобных экспериментов. Но все-таки остались некоторые сомнения,\nпоскольку сам Воронов скончался в почтенном\nвозрасте 85 лет.\n\nНа 1 бокал\n\nСухой французский вермут - 20 мл\nВишневый ли­к е­р Cherry Brandy - 10 мл\nКирш - 40 мл\n\n1. В смесительный стакан положить лед и\nналить ингредиенты.\n2. Пе­р е­м е­ш ать и от­ф иль­т­р о­в ать в охлажденный коктейльный бокал.\n3. Опустить в бокал коктейльную вишню.\n\nШампань Пик-ми-ап\nChampagne Pick me Up\n«Пикапы», которые называли «утренними напитками», были придуманы для того, чтобы помочь\nпроснуться. В 1920-е годы они пользовались большой популярностью.\nЧто касается коктейля «Шампань Пик-ми-ап», то каждый вторник утром я назначаю встречу в\nпарижском «Гаррис баре», чтобы меня угощали все те, кто приписывает создание этого рецепта великому Гарри МакЭлхону. Ведь сам Гарри уточнил в своем знаменитом справочнике, что рецептом с\nним поделился бармен Джонни Леопольд из казино Grand Circle в Экс-ле-Бене.\nНа 1 бокал\n\nКоньяк - 15 мл\nСухой вермут - 15 мл\nСахар - чайная ложка\nОхлажденное шампанское - 120 мл\n\n1. В шейкере, наполненном льдом, взбить все ингредиенты, кроме шампанского.\n2. Отфильтровать в винный бокал и добавить шампанское.\n\n340 Париж\n\nНа 1 бокал\n\nДжин - 40 мл\nАпельсиновый сок - 40 мл\nАбсент - дэш\nСироп Гренадин - 2 дэш\n\n1. Все ингредиенты взбить в шейкере, заполненном льдом.\n2. Отфильтровать в охлажденный коктейльный бокал.", "Тем временем в «Гаррис баре» ...\nКровавая Мэри\n\nКлассика\n\nBloody Mary\n«Кровавая Мэри» заключает в себе яд и противоядие. Если коктейль приготовлен должным образом, из качественной водки и хорошего томатного\nсока и грамотно приправлен, то это настоящий деликатес. В противном\nслучае он быстро начинает напоминать холодный суп, забытый в столовой\nдома престарелых.\nПравильная «Кровавая Мэри» - это, по сути своей, Corpse Reviver («оживитель трупов»), который можно пить с утра и который одинаково излечивает как симптомы гриппа, так и любовные страдания. Он оказывает на вас такое же воздействие, как хорошее\nполено, подброшенное в огонь. И горит долго.\nСогласно одной из версий, «Кровавая Мэри» была изобретена\nПитом Петио в парижском «Гаррис баре» в 1920-х годах. Потом\nкоктейль канул в Лету, а Пит Петио вернулся в Америку после\nотмены сухого закона. Однако в 1934 году клиент русского\nпроисхождения по имени Серж Оболенский явился в бар\n«Кинг Коул». Он узнал Пита Петио, стоявшего за стойкой, и заказал ему коктейль, который он, помнится, пробовал в Париже в «Гаррис баре». Так «Кровавая Мэри» воскресла из пепла.\nСледует отметить, что Пит Петио переименовал свой коктейль\nв «Красного люциана», сочтя это имя более элегантным. Он\nтакже пытался готовить его с джином, впрочем, без особого\nуспеха. Публика предпочитала «Кровавую Мэри» «Красному\nлюциану» и, плиз, – с водкой. В результате «Кровавая Мэри»\nобрела международный успех и сделалась, как мы знаем,\nодним из самых знаменитых коктейлей планеты. Кстати, сам\nТрейдер Вик сообщает в одной из своих книг, что он попробовал первую «Кровавую Мэри» накануне Второй мировой\nвойны на лайнере, который вез его из Калифорнии в Гонолулу.\nКто говорит, что глобализация началась в 2000-е годы?\nЧто до первого известного мне печатного упоминания коктейля, то оно содержится в «Барной книге Сторк клуба» («The\nStork Club Bar Book») и датируется 1946 годом.\nBloody Mary без алкоголя называется Virgin Mary. Заменяя\nводку текилой, получаем Bloody Maria или Tequila Maria.\n\n«Кровавая Мэри» в парижском «Гаррис баре».\nЗдесь сельдерей не признается ни в какой\nформе – ни соли, ни веточки. Тем не менее,\nМеждународная ассоциация барменов советует\nдобавлять в коктейль щепотку соли сельдерея.\n\nНа 1 бокал\n\nВодка - 40 мл\nТоматный сок - 120 мл\nСвежевыжатый лимонный сок - дэш\nСоусы Worcestershire и Tabasco, соль и перец по вкусу\n\n1. В хайбол положить 5-6 кусочков льда.\n2. Добавить все ингредиенты.\n3. Перемешать, украсить веточкой сельдерея и ломтиком лимона.\n\nПариж 341", "Тем временем в «Гаррис баре» ...\nБульвардье\n\nКлассика\n\nBoulevardier Cocktail\nВпервые «Бульвардье» появился в сборнике Гарри МакЭлхона «Barflies\nand Cocktails», изданном в Париже в 1927 году. Однако рецепт коктейля\nприводится не в основной части книжки, а в приложении за авторством Артюра Мосса. Коктейль, состоящий из равных частей бурбона,\nкампари и итальянского вермута, упоминается вместе с именем одного светского персонажа той эпохи. Речь идет об американце Эрскине\nГвинне. В то время он выпускал в Париже ежемесячный журнал «The\nBoulevardier», предназначенный для американских экспатов. Несмотря\nна обилие имен в этой истории, точно не понятно, кто именно придумал коктейль.\nКстати, дополнительные вопросы вызывает тот факт, что коктейль под\nназванием «Бульвардье» фигурирует в еще одном парижском сборнике\nрецептов «Cocktails de Paris». И здесь авторство рецепта себе приписывает некий Робер из бара Viel, который располагался на Бульваре\nМадлен. Причем, как указано в сборнике, Робер выиграл с этим коктейлем гран-при чемпионата по барному искусству, который состоялся\nв Париже в 1929 году. Теперь если присмотреться к ингредиентам его\nкоктейля, то видно, что только кампари остался на месте. Бурбон был\nпатриотично заменен на коньяк, а итальянский вермут – на равные\nдоли французских аперитивов Dubonnet и Saint-Raphaël. Несмотря на\nпобеду на конкурсе, в историю вошел рецепт «Бульвардье» на основе\nбурбона.\nОн пережил новое возрождение с распространением моды на горьковатые коктейли, которые олицетворяет «Негрони» – один из ближайших родственников «Бульвардье». Можно добавить, что сегодняшний\nрецепт «Бульвардье» включает больше бурбона по сравнению с его\nпервоначальной версией.\nНа 1 бокал\n\n342 Париж\n\nСтарый друг\nOld Pal Cocktail\nВо время сухого закона Спэрроу Робертсон –\nредактор спортивных новостей газеты New\nYork Herald Tribune – наслаждался свободой\nв Париже и в 1929 году создал этот коктейль.\n«Старый друг», в некотором роде, является\nсухим товарищем «Бульвардье», в котором\nсладкий вермут заменяют на «драй».\nСогласно оригинальному рецепту в качестве\nосновы должен использоваться канадский\nвиски.\nСегодня в лондонских барах Hawksmoor, где\nвоздают дань историческим напиткам, делают\nтвист на этот коктейль. Его готовят на ирландском виски, а биттер настивают на чае Lapsang.\nНа 1 бокал\n\nВиски - 30 мл\nСухой вермут - 30 мл\nБиттер Martini Riserva - 30 мл\n\n1. Перемешать ингредиенты в стакане для\nсмешивания, заполненном льдом.\n2. Отфильтровать в охлажденный коктейльный бокал.\n3. Украсить цедрой лимона.\n\nЗум\nZoom\n\nБурбон - ine’s – один из наиболее традиционных и, одновременно, самых\nсовременных виски. Что, по вашему мнению,\nможет привнести в бар линейка Ballantine’s?\nСегодня Ballantine’s является одним из самых\nпродаваемых виски в мире в категории\nBlended Scotch Whisky. На мировом рынке\nсуществует порядка 12-ти его разновидностей от классического Ballantine’s Finest до\nBallantine’s 40 лет, от вкусового Ballantine’s\n\n348 Новейша я миксология\n\nBrasil Lime до односолодовых виски, выпущенных под брендом Ballantine’s.\nТакая широкая палитра позволяет охватить\nвсе грани в баре и подарить потребителю\nяркие впечатления на любом этапе его\nвзросления и эволюции вкуса.\nВы очень хорошо подметили вопрос о традиционности и современности. Мы помним\nо своих корнях, но при этом стараемся\nшагать в ногу со временем.\nBallantine’s Finest обретает все больше по-\n\nклонников среди поколения 21+.\nПоявление Ballantine’s Brasil Lime вызвало\nфурор даже у тех людей, которые не готовы\nпить крепкие напитки, и виски в том числе.\nА раскрытие того вкуса, которое составляет сердце Ballantine’s, в виде релиза трех\nсолодовых виски его главных дистиллерий – Glenburgie 15 y.o., Miltonduff 15 y.o.,\nGlentauchers 15 y.o. – показало нашу открытость к экспериментам.\nПоэтому я полагаю, что Ballantine’s просто\nобязан присутствовать во всех современных, а также классических барах.\nКаким образом виски Ballantine’s, будем подразумевать Finest и 12 y.o., может помочь\nбармену усовершенствовать свои коктейли?\nВ состав Ballantine’s входит порядка 40\nсолодовых спиртов из разных регионов\nШотландии, а также – 4 зерновых. Эта\nмногогранность позволяет обыграть индивидуальность каждого региона, выделить\nего основные характеристики и вкусы. А\nэто бесконечная возможность вариаций в\nкоктейлях.\nВы занимаетесь музыкой. Можете ли немного\nрассказать о своей музыке и том, существует ли связь между музыкой и Ballantine’s?\nBallantine’s имеет самую прямую связь с\nмузыкой и музыкантами, так как у нас одина-", "Н о  True.\n\nМэпл Фешенд\n\nЧерный кофе\n\nMaple Fashioned\n\nThe Black Coffee\n\nНовый взгляд на классику.\n\nЕсли вы не знаете, что выбрать: виски, кофе\nили десерт, попробуйте вот этот бодрящий\nкоктейль.\n\nНа 1 бокал\n\nВиски Ballantine's 12 y.o. - 50 мл\nКленовый сироп - чайная ложка\n\n1. В бокал рокс положить лед.\n2. Налить виски и сироп. Перемешать до\nполного растворения.\n3. Украсить твистом из апельсиновой\nцедры.\n\nФайнест имбирь яблоко\nFinest Ginger Apple\nПряный. Фруктовый. Освежающий.\n\nНа 1 бокал\n\nВиски Ballantine's Finest - 35 мл\nЛикер Kahlua - 15 мл\nСливки - 75 мл\nМолоко - 75 мл\nОхлажденный кофе - 60 мл\nКарамельный сироп - 30 мл\nЩепотка соли\n\n1. Ингредиенты основательно взбить в\nшейкере, заполненном льдом.\n2. Отфильтровать в высокий бокал хайбол,\nзаполненный льдом.\n3. Украсить кофейными зернами.\n\nНа 1 бокал\n\nВиски Ballantine's Finest - 50 мл\nНеосветленный яблочный сок - 30 мл\nИмбирный эль\n\n1. Наполнить льдом высокий бокал хайбол.\n2. Налить виски и яблочный сок.\n3. Добавить имбирный эль. Перемешать.\n4. Отжать в коктейль дольку лайма и\nопустить ее в бокал.\n\nСода Найтс\nSoda Nights\nВиски и содовая – классика на все времена.\nBallantine's Finest и мята придают напитку\nсовременность и свежесть, превращая его в\nнезаменимого спутника вечеринок.\nНа 1 бокал\n\nВиски Ballantine's Finest - 50 мл\nСодовая вода - 100 мл\nБиттер Ангостура - два дэш\n\n1. Наполнить льдом высокий бокал хайбол.\n2. Налить виски и содовую.\n3. Добавить биттер. Перемешать.\n4. Украсить мятными листьями.\n\nНовейша я миксология 349", "350 Новейша я миксология", "Н о в е й ш а я м и к со л о г и я\nПенициллин\n\nКлассика\n\nPenicillin\nСэм Росс – один из немногих современных миксологов, сумевших создать\nновую классику, – коктейль «Пенициллин». Сэм может сколько угодно\nповторять, что он всего лишь усовершенствовал «Виски Сауэр», не придумал ничего особенно нового, но при этом «Пенициллин» – сказочный\nкоктейль, рожденный внезапным вдохновением, вспышкой гения. В этом\nкоктейле Сэм впервые ввел в употребление солодовый виски.\nФлоат из Laphroaig (или другого очень дымного виски) по контрасту\nуравновешивает ароматы меда и имбиря. А для основы коктейля следует\nиспользовать шотландский купажированный виски, в архитектуре которого доминируют Спейсайд или Хайленд.\nНа 1 бокал\n\nВиски Dewar's 12 или 15 y.o. - 60 мл\nСвежевыжатый лимонный сок - 22.5 мл\nМедовый сироп (3 части меда на 1 часть воды) - 12 мл\nИмбирный сок, слегка подслащенный сахарным песком* - 12 мл\nСолодовый виски Laphroaig (флоат) - 7.5 мл\n\n1. В шейкере, заполненном льдом, взбить\nкупажированный виски, соки и сироп.\n2. Отфильтровать в бокал рокс, положив в\nнего предварительно большой кусок льда.\n3. Сверху налить флоат солодового виски.\n4. Украсить ломтиком засахаренного имбиря.\n*Фирменный секрет «Пенициллина» кроется в\nимбирном соке. Сэм Росс выжимает сок из имбиря\nс помощью центрифуги, добавляя в него немного\nсахарного песка, но ни в коем случае – не сахарного сиропа. Так ароматы имбиря лучше всего\nсохраняются в течение всего вечера.\nДля получения небольшого количества сока\nможно выжать его с помощью соковыжималки для\nцитрусовых. Кипятить имбирь в сахарном сиропе\nили в меде – святотатство, поскольку подобный\nметод убивает свежий вкус и антиоксидантные\nсвойства имбиря.\n\nШотландская амброзия\nScotch Ambrosia\nАвторы рецепта – Владимир Николаев (совладелец бара\nПолторы комнаты) и Георгий Кучеренко.\nНа 1 бокал\n\nВиски Dewar’s 12 или 15 y.o. - 40 мл\nИнфьюз на вине Гевюрцтраминер* - 60 мл\n\n1. Ингредиенты перемешать в стакане для смешивания,\nзаполненном льдом.\n2. Отфильтровать в бокал олд фешенд, заполненный льдом.\n3. Коктейль подается на мхе в террариуме, в который\nвначале напускается тяжелый элегаз, а на него – дым из\nрозмарина.\n\n*И нфьюз на вине (на 0,8 л)\nВино Гевюрцтраминер - 500 мл\nМедовый сироп - 300 мл\nЛавровый лист - 7 шт\nКардамон - 6 коробочек\n\nНастаивать ингредиенты 7 часов при 50°C в «су вид».\nИван Ляшук – совладелец бара Полторы комнаты\n(Санкт-Петербург) – готовит коктейль Scotch Ambrosia.\n\nНовейша я миксология 351", "Н о в е й ш а я м и к со л о г и я\nОлд К убан\n\nКлассика\n\nOld Cuban\nНесмотря на свое название, «Олд Кубан» – современный коктейль, изобретенный в 2004 году Одри Соундерс, творческой личностью из нью-йоркского\n«Пегу Клаба». Но он содержит все ингредиенты, характерные для подлинного\nкубинского коктейля. Можно сказать, что «Олд Кубан» находится на полпути\nмежду «Королевским Мохито» и «Мятным Дайкири». Или еще можно сказать,\nчто он сочетает дух двух легендарных кубинских коктейлей – братских, но,\nтем не менее, конкурирующих друг с другом: «Мохито» и «Дайкири». Как и\nво многих других коктейлях, использование просекко делает его еще более\nпраздничным. В любом случае, сочетание выдержанного рома и просекко,\nокольцованных мятой и «Ангостурой», дает бесподобный результат. Остается\nтолько ждать, когда пройдут годы, чтобы этот коктейль стал исторической\nкубинской классикой!\nНа 1 бокал\n\nРом Bacardi Gran Reserva 8 Años - 50 мл\nСвежевыжатый сок лайма - 20 мл\nСахарный сироп - 25 мл\nМята - шесть листьев\nБиттер Ангостура - два дэш\nИгристое вино Martini Prosecco - 60 мл\n\n1. Барной ложкой размять в стакане от шейкера мяту вместе с сиропом и соком лайма.\n2. Добавить ром, биттер, лёд и тщательно взбить.\n3. Сцедить через стрейнер и дополнительное сито в охлаждённый бокал для подачи.\n4. Долить просекко и украсить листом мяты.\n\nПарижский Дайкири\nParisian Daiquiri\nТвист на классический «Дайкири» от Дениса\nТёмного.\nНа 1 бокал\n\nРом Bacardi Carta Blanca - 50 мл\nЛикер St-Germain - 30 мл\nСвежевыжатый сок лайма - 30 мл\nСахар - 1 ч.л.\nСлайс лайма (для украшения)\n\n1. Добавить в шейкер сок лайма и сахар.\nПеремешать барной ложкой до растворения.\n2. Добавить оставшиеся компоненты и лёд.\nЭнергично взбить не менее 15 секунд.\n3. Сцедить в замороженный коктейльный\nбокал (или купит).\n4. Гарнировать тонким круглым слайсом\nлайма.\n352 Новейша я миксология", "Н о в е й ш а я м и к со л о г и я\n\nТормента негра\nTormenta Negra\nВ переводе с испанского: «Черный шторм».\nТвист от Джузеппе Галло на известный коктейль Dark & Stormy.\nНа 1 бокал\nРом Bacardi Carta Negra - 50 мл\nСвежевыжатый сок лайма - 15 мл\nБиттер Ангостура - 3 дэш\nGinger Beer - 100 мл\n\n1. В бокал хайбол положить несколько кубиков\nльда.\n2. Налить сок лайма и Ginger Beer. Перемешать\n3. Сверху добавить ром и Ангостуру и положить половинку лайма.\n\nРыцарский к убок\n\nИдеальный шторм\n\nKnight Cup\n\nPerfect Storm\n\nКоктейль-победитель конкурса Bacardi Legacy Cocktail Competition, рецепт Елизаветы Евдокимовой\n(бар Delicatessen, Москва).\nКомбинация рома Bacardi, гранатового ликера и чинара, придающая коктейлю в равной степени\nамериканский и европейский характер, – гениальная идея, которая имеет как вкусовую, так и\nисторическую обоснованность. Легкая горчинка Чинара сообщает коктейлю приятную свежесть.\nА сочетание рома и граната играет на стороне наследия Bacardi (вспомните знаменитый Bacardi\nCocktail). Получается, что Knight Cup заслуживает места в меню всех баров.\n\nРецепт из бара Happiness Forgets, Лондон.\n\nНа 1 бокал\n\nРом Bacardi Carta Blanca - 45 мл\nCynar - 20 мл\nГранатовый ликер - 10 мл\nСахарный сироп - 5 мл\n\n1. Перемешать ингредиенты в смесительном стакане, заполненном льдом.\n2. Отфильтровать в бокал олд фешенд поверх кубиков льда.\n3. Украсить твистом из кожуры граната.\n\nНа 1 бокал\n\nТемный ром - 45 мл\nО-де-ви из сливы Vieille Prune - 5 мл\nСвежевыжатый лимонной сок - 20 мл\nСок из имбиря - 15 мл\nЖидкий мед - 15 мл\nИмбирный эль\n\n1. Все ингредиенты, кроме имбирного эля,\nвзбить в шейкере, заполненном льдом.\n2. Отфильтровать в бокал хайбол.\n3. Положить в бокал брусок льда. Добавить\nимбирный эль.\n4. Украсить долькой лимона.\n\nНовейша я миксология 353", "Н о в е й ш а я м и к со л о г и я\nА пери т ивный кок т ей ль не обязат е льно дол жен бы т ь с ложным .\nП ро с та я комбинация верму та с тоником отлично справи тс я с ролью апери т ива . О на не\nсодержи т много а лкоголя и обла д ае т о све ж ающим х арак т ером , богат ыми ароматами\nи необходимой горчинкой , пробу ж д ающей\nаппе т и т.\nИ спользование верму тов M artini R iserva\nS peciale – R ubino и A mbr ato – повышае т\nк ласс этого смешанного напи т к а , прид ава я\nему современно с т ь , дополни т е льну ю глу бину\nи с ложно с т ь .\n\nКоктейль «Апостериори»,\nбар Apotheke, Санкт-Петербург.\n\nАпостериори\nAposteriori\nКоктейль «Апостериори», что на латыни значит «исходя из опыта», был\nсоздан после тщательного изучения аперитивных традиций.\nЕго автор – Игорь Карнаух, бар Apotheke, Санкт-Петербург.\nНа 1 бокал\n\nВермут Martini Riserva Rubino - 30 мл\nРом Bacardi Gran Reserva 8 Años - 30 мл\nГранатовый сок - 10 мл\nГранатовый соус Наршараб - 7 мл\nCardamon Bitter - пять капель\n\n1. Ингредиенты перемешать со льдом в стакане для смешивания.\n2. Отфильтровать в охлажденный коктейльный бокал.\n\n354 Новейша я миксология\n\nПодавая вермут на аперитив в чистом виде со льдом, используйте\nширокие бокалы, в которых раскроются все богатые ароматы напитка.\nСегодня настоящий итальянский аперитив немыслим без мини-закусок, которые называются «стуццикини». Это переводит подачу\nвермута в гастрономическую плоскость.\nЯнтарный вермут Riserva Ambrato прекрасно сочетается с различными сырами.\nРубиновый вермут Riserva Rubino послужит отличным сопровождением прошутто крудо, салями и других изысканных колбасных изделий.", "Н о в е й ш а я м и к со л о г и я\nВерму т и Тоник\nVermouth & Tonic\nСочетание с тоником позволяет в полной мере раскрыть оттенки вкуса и аромата вермута.\nНа 1 бокал\n\nНа 1 бокал\n\nВермут Martini Riserva Ambrato - 100 мл\nТоник - 100 мл\nСок лайма - 5 мл\nДолька лайма\n\nВермут Martini Riserva Rubino - 100 мл\nТоник - 100 мл\nДолька апельсина\n\n1. Наполнить стакан льдом на 2/3.\n2. Добавить вермут, тоник и сок лайма.\nПеремешать барной ложкой.\n3. Украсить долькой лайма.\n\n1. Наполнить стакан льдом на 2/3.\n2. Добавить вермут и тоник. Перемешать\nбарной ложкой.\n3. Украсить долькой апельсина.\n\nМАртини рояле\nMartini Royale\nСоздав коктейль «Мартини Рояле», Денис Тёмный нашёл формулу успеха. Сегодня его\nкоктейль стал трендовым способом употребления Martini по всему миру, сделавшись\nновой классикой.\n«Мартини Рояле» – коктейль летних террас и вечеринок. Он идеально подходит для\nспонтанных встреч с друзьями, а его потрясающий вкус может сделать любой вечер\nособенным.\n«Создавая Martini Royale, я постарался затронуть все человеческие органы восприятия,\nсоздав гармонию чувств. Большое количество льда, подчёркнутое долькой лайма и\nветочкой мяты, создаёт ощущение свежести. Специальный бокал круглой формы приятно\nлежит в ладони. Если поднести коктейль к уху, можно услышать «шёпот» пузырьков\nMartini Prosecco и постукивание кубиков льда, напоминающее шум прибоя на галечном\nпляже», - вот что говорит сам Денис о своём коктейле.\nНа 1 бокал\n\nВермут Martini Bianco - 100 мл\nИгристое вино Martini Prosecco - 100 мл\nСвежевыжатый сок лайма - 15 мл\nДолька лайма и макушка ветки мяты (для украшения)\n\n1. В крупный шарообразный винный бокал налить Martini Bianco. Выжать в бокал сок\nлайма.\n2. Наполнить бокал на 2/3 льдом. Налить Martini Prosecco. Перемешать барной\nложкой.\n3. Опустить в бокал дольку лайма. «Разбудить» макушку ветки мяты и положить её\nтак, чтобы она была сверху.\nПодавать без трубочки!\n\nНовейша я миксология 355", "Денис Тёмный, Москва.\n356 Новейша я миксология", "Н о в е й ш а я м и к со л о г и я\nГрин Ти Пунш\n\nЛевобережный Мартини\n\nБузинный Мартини\n\nGreen Tea Punch\n\nLeft Bank Martini\n\nElderflower Martini\n\nТвист Дениса Тёмного на рецепт Джима\nМихана.\n\nИзысканное и творческое сочетание за авторством Саймона Диффорда. Ликер из цветов\nбузины олицетворяет левобережный квартал\nСен-Жермен и придает шарм коктейлю. Джин\nнаделяет его бодрящими ароматами. А звонкие, душистые ноты привносятся классическим\nфранцузским сортом зошли в мире джина в последние\nгоды, и вопреки появлению на рынке\nмножества новых брендов, Beefeater\nостается одним из самых востребованных джинов среди барменов. О секретах этого успеха и о том, как влияет\nBeefeater на вкус коктейлей, рассказывает в интервью глобальный брендамбассадор Сумайя Коннолли.\nНе вступает ли в противоречие образ\nдевушки бренд-амбассадора джина и\nизображение гвардейца-бифитера на его\nбутылке? Ведь часто заявляют, что джин –\nэто мужской напиток, не так ли?\nНи в коем случае! Джин – удивительно\nмногогранный напиток. Он может доставить удовольствие всем в любой точке\nмира, невзирая на гендер. Более того,\nнекоторые из гвардейцев-бифитеров в\nлондонском Тауэре – это женщины.\nЧто представляет собой London Dry Gin,\nкаков его стиль? Как влияет такой джин,\nкак Beefeater на вкус коктейля?\nLondon Dry Gin – это тип напитка, а не\nместо его происхождения, поскольку он\nможет быть произведен где угодно. После\nперегонки растительных компонентов к\nнему не добавляется ничего, кроме воды\n\nТакая классика, как «Гимлет», «Драй Мартини» или обычный «Джин-тоник», раскрывает вкус джина. Как это относится к джину\nBeefeater?\nКак я уже отметила, Beefeater превосходен\nво многих коктейлях. Важно, чтобы при\nдобавлении других ингредиентов не заглушался преобладающий можжевеловый\nвкус, а также характерная цитрусовая нота,\nявляющаяся отличительной чертой джина\nBeefeater. Этой крайне важной особенностью Beefeater обязан своему рецепту,\nнастаиванию на ботаникалах в течение\n24 часов, а также совместной деятельности нашего мастера-дистиллера и всей\nкоманды.\nВ последние годы ситуация с джином\nсущественно изменилась. С одной стороны, джин остается ингредиентом №1 для\nкоктейлей, с другой – появилось множество\nновых брендов джина с различным ароматическим профилем. Благодаря каким\nкачествам джин Beefeater остается таким\nвостребованным среди барменов?\nЗа последние несколько лет мир решительно изменился. Радостно наблюдать появление новых ароматов, сегодня бармены\nобладают широчайшим выбором.\nBeefeater остается излюбленным напитком\nбарменов, поскольку он остается мощным,\nдушистым и ярким джином. К тому же, он\nстоль удивительно многогранен,\nчто предоставляет барменам возможность экспериментировать и изобретать новые волнующие коктейли. Знаменательно, что в нашем Всемирном конкурсе\nкоктейлей прошлого года «Beefeater\nMIXLDN Global Cocktail Competition» приняли участие 32 страны. Кроме того, наш\nджин имеет больше всего наград в мире,\nчто является свидетельством его высочайшего качества.\n\nSage Against the Machine\nНа 1 бокал\n\nДжин Beefeater - 50 мл\nСвежевыжатый яблочный сок - 40 мл\nСвежевыжатый лимонный сок - 10 мл\nСахарный сироп - 5 мл\nМорская соль - небольшая щепотка\nШалфей - два-три листа\nСодовая\n\n1. В шейкере, заполненном льдом, взбить все\nингредиенты, кроме содовой.\n2. В высокий бокал хайбол положить лед. Налить в него содовую и отфильтровать (дабл\nстрейн) содержимое шейкера.\n3. Добавить содовую, в случае необходимости. Украсить листьями шалфея.\n\nMartini k-ya\nНа 1 бокал\n\nДжин Beefeater - 40 мл\nСухой вермут Dolin de Chambery - 10 мл\nРисовый крекер, покрытый маскарпоне и\nсбрызнутый жидким медом (гарниш)\n\n1. Джин и вермут перемешать в смесительном стакане, заполненном льдом.\n2. Отфильтровать в охлажденный коктейльный бокал.\n3. Подать с гарнишем (можно на отдельном\nблюдце) и украсить твистом из лимонной\nцедры (факультативно).", "Н о в е й ш а я м и к со л о г и я\nБородино\nРецепт Дмитрия Суворова, Orthodox Russian Bar,\nСанкт-Петербург.\nНа 1 бокал\n\nВодка Солодовая оригинальная - 50 мл\nLillet Blanc - 30 мл\nЛикер Kummel - 5 мл\nСельдерейный биттер - 2 дэш\n\n1. Ингредиенты перемешать в стакане для\nсмешивания, заполненном льдом.\n2. Сцедить в охлажденный коктейльный бокал.\n3. Отжать в коктейль цедру лимона.\n\nЧеревички\nРецепт Дмитрия Суворова, Orthodox Russian Bar,\nСанкт-Петербург.\nНа 1 бокал\n\nБиттер Beluga Hunting Berry - 50 мл\nНастой каркаде - 30 мл\nЛимонад лодовый виски был практически повсеместно вытеснен из смешанных\nнапитков.\nПотребовалось почти целых сто лет, чтобы ситуация начала меняться.\nПроизошло это, в частности, благодаря Сэму Россу и его выдающемуся коктейлю «Пенициллин», созданному в 2005 году. С тех пор мы все чаще пьем\nсолодовый виски в коктейлях.", "Н о в е й ш а я м и к со л о г и я\nПикассо Мартини\nPicasso Martini\nПеред самым обновлением мировой миксологии Колин Филд (бар «Хемингуэй» в парижском отеле\n«Ритц») был признан лучшим барменом мира. Этот причудливый и изобретательный персонаж\nомолодил типичный образ стареющего бартендера, с которым чаще всего можно было встретиться\nв парижских отелях. Колин совершил подвиг, сумев навязать свой талант, свои рецепты и свою личность бару, посвященному одному из самых заметных деятелей мировой литературы.\nВ конце концов, в бар «Хемингуэй» приходили как для того, чтобы воздать должное автору «По ком\nзвонит колокол», так и ради этого бармена в белом пиджаке, готовившего коктейли в его честь.\nВ не меньшей степени, чем его знаменитый предшественник Франк Мейер, Колин Филд участвовал\nв превращении бара «Ритца» в один из храмов мировой миксологии.\nДанный рецепт был создан Колином в 2000-м году. Коктейль представляет собой «разложенный»\nмартини с кубиком замороженного вермута. Так гость может приготовить свое идеальное сочетание джина и вермута, вынув замороженный кубик в нужный момент.\nНа 1 бокал\n\nДжин, охлажденный до –18,4°C - 60 мл\nКубик замороженного французского вермута*\n\n1. В охлажденный коктейльный бокал налить джин.\n2. Опустить в бокал кубик вермута.\n* Для того чтобы приготовить ледяные кубики из вермута, надо предварительно разбавить\nего чистой водой до крепости 5% vol. Налить в формочки и поставить в морозилку.\n\nЗе леный зверь\nGreen Beast\nСовременный коктейль с абсентом, созданный\nизвестным миксологом Шарлем Вексена.\n\nСаммит\n\nМАртини «Бекон с Яйцом»\n\nSummit\n\nBacon and Egg Martini\n\nСовременный коктейль, подчеркивающий\nсложные ароматы коньяка.\n\nРецепт из Covent Garden Cocktail Club, Лондон.\nНа 1 бокал\n\nНа 1 бокал\n\nКусочек цедры лайма\nИмбирь - четыре тонких ломтика\nОгуречная кожура - полоска\nКоньяк - 40 мл\nЛимонад - 60 мл\n\n1. Положить в бокал рокс цедру лайма и имбирь. Налить 20 мл коньяка. Слегка размять\nмадлером имбирь и цедру.\n2. Наполнить бокал наполовину кубиками\nльда. Перемешать.\n3. Добавить оставшиеся 20 мл коньяка. Налить лимонад.\n4. Опустить в бокал полоску из огуречной\nкожуры.\n\nАмериканский виски, настоянный на беконе\n- 50 мл\nСвежевыжатый лимонный сок - 25 мл\nСироп «Кленовый» - 25 мл\nБиттер Ангостура - 3 дэш\nЯичный белок\n\n1. Все ингредиенты взбить в шейкере без\nльда (dry shake). Добавить лед и еще раз\nвстряхнуть шейкер.\n2. Отфильтровать в охлажденный коктейльный бокал.\n3. Украсить хрустящим ломтиком бекона.\n\nНа 1 бокал\n\nАбсент Pernod - 25 мл\nСвежевыжатый сок лайма - 25 мл\nСахарный сироп - 25 мл\nХолодная вода - 100 мл\nОгурец - четыре тонких ломтика\n\n1. В бокал для абсента положить 5-6 кусочков льда.\n2. Налить ингредиенты, перемешать.\n3. Опустить в бокал ломтики огурца.\n\nК ак настоять виски на беконе?\nПоджарить на сковороде 3-4 слайса бекона.\nКогда содержимое сковороды остынет, отобрать\n30 мл жира. Отфильтровать этот жир в пищевой\nконтейнер и добавить туда бутылку виски (750\nмл), перемешать.\nНастаивать при комнатной температуре 4-6\nчасов. Потом поставить в морозилку. Когда жир\nзатвердеет, надо его удалить. А виски процедить\nобратно в бутылку.\n\nНовейша я миксология 373", "Указатель кок тейлей", "А л фа в и т н ы й у к а з ат е л ь к о к т е й л е й\n20th Century Cocktail 286\n7 Sips Grapefruit & Cinnamon 297\n\nA bsinthe Frappe 261\nAdonis 257\nAffinity 256\nAlaska 255\nAlexander 253\nAlexandra 286\nAlgonquin 253\nAmaretto Sour 368\nAmbrosia 265\nAmerican Beauty 251\nAmericano 324\nAposteriori 354\nApple Jack 251\nArmenian 5 o'clock 346\nArmenian Beauty 346\nAviation 258\n\nB\n\n-52 273\nBacardi Cocktail 254\nBacon and E
