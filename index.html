ледних вида\nбренди – самые известные и дорогие. В конце 19\nвека испанцы создали бренди из хереса (Brandy\nde Jeres). Его оригинальность заключается в способе выдержки, называемом «солера», таком же,\nкак и для самого хереса.\n\nФранция\nМногие французские винокуры предлагают недорогие и качественные бренди, допуская отступления от строгих правил производства коньяка\nи арманьяка. Такие обозначения, как Napoléon,\nVSOP, XO и т.д., появившиеся под влиянием коньяка, могут не отражать сроков выдержки напитка, в противоположность коньяку и арманьяку.\nОни остаются на совести производителей, и им\nможно доверять лишь с оговорками.\n\nГраппа\nГраппа – это итальянский спиртной\nнапиток из выжимок винограда.\nВ ходе производства вина остаются\nнеиспользованными выжимки, состоящие из кожицы, мякоти и косточек\nвинограда. Их плотно укладывают в\nбочки или другие сосуды, которые\nгерметично закрывают, чтобы туда\nне проникал воздух. Там выжимки\nоставляют некоторое время для\nулучшения их качества и насыщения\nароматами.\nПоскольку при производстве красного\nвина сок винограда бродит обычно\nвместе с кожицей, его выжимки\nсодержат еще некоторое количество\nвина. Во время пребывания в бочках\nмедленный процесс брожения превращает оставшийся сахар в алкоголь. Выжимки от производства белого вина содержат меньше алкоголя,\nно больше сахара, поэтому после\nпребывания в бочках их измельчают,\nзаливают теплой водой и добавляют\nдрожжи, чтобы активизировать брожение. Полученную бражку отделяют\nот кожицы и твердых частиц и подвергают перегонке обычно в аппарате коньячного типа. Дистиллят иногда\nвыдерживают в бочках.\nЧасто на бутылках с граппой указывают сорт использованного винограда.\nЛучшие граппы получают в областях\nФриули и Пьемонт. Обычно это крепкие, молодые, «деревенские» напитки.\nВ Италии их пьют\nна дижестив после\nобильной трапезы.\nИтальянцы советуют пить молодую\nграппу при 9-13°С,\nвыдержанную граппу – при 17°С. Ее\nследует подавать\nв специальном бокале\nв форме колбы на ножке.\nМинимальная крепость\nграппы – 37,5% vol.\n\nГреция\nГреческие бренди производят из винограда, выращенного в центре страны и на острове Самос.\n\nКоньяк и другие бренди 171", "В основном используется достаточно сладкий\nвиноград белого сорта Саватьяно, который сообщает бренди характерный маслянистый вкус.\n\nПортугалия\nСпиртное из вина здесь называется «агуарденте».\nЧасто его производят с помощью перегонного\nаппарата коньячного типа. Бренди выдерживается\nв бочках, прежде содержавших порто, что придает\nему выраженный винный характер. После более\nили менее долгой выдержки в него иногда добав-\n\nляют натуральную эссенцию миндаля или сливы.\n\nДругие страны\nБренди получают в разных странах, разными\nметодами, и их качество может быть различным.\nЛучшие южно-африканские бренди дистиллируют коньячным методом и выдерживают не менее\n3 лет в бочках. В Австралии бренди нередко\nподслащивают сахарным сиропом. Также бренди делают в Калифорнии, Израиле, на Кипре, в\nТайване и во многих других странах.\n\nП иско\nПиско – это бренди, рожденный от потрясения, вызванного встречей двух культур: испанской и индейской. Двойная жизнь писко продолжается и сегодня, ибо две страны – Чили и Перу – считают его\nсвоим национальным наследием.\n\nЧили\nСогласно законодательству писко может быть произведен на ограниченной территории на севере Чили под двумя наименованиями\n(D.O.) – Atacama и Coquimbo. Преимущественно используются\nнесколько разновидностей Муската, а также сорта Педро Хименес\nи Торонтель. Сусло дистиллируют в аппаратах прерывного типа, а\nзатем выдерживают в больших чанах из дуба или бука. В зависимости\nот сроков выдержки, различают несколько видов писко:\nCorriente или Tradicional – 2 месяца выдержки;\nEspecial – от 4 до 6 месяцев выдержки;\nReservado – от 6 до 24 месяцев выдержки;\nGran Pisco – более 24 месяцев выдержки.\n\nПеру\nЗдешний писко может быть произведен в пяти регионах страны,\n\n172 Коньяк и другие бренди\n\nназвания которых используются в качестве D.O.: Lima, Ica, Arequipa,\nMoquegua и Tacna. Для перуанского писко используются 8 сортов\nвинограда, а дистилляция проходит в медных перегонных аппаратах\nтипа «пот стил». Напиток не может быть выдержан в «дереве», но он\nдолжен «передохнуть» не менее 3 месяцев в чанах из нержавеющей\nстали или другого нейтрального материала. После чего его разливают по бутылкам, причем не разбавляя водой.\nPuro – «чистый» писко, произведенный из одного «неароматного»\nсорта винограда. Чаще всего используется сорт Кебранта, реже –\nМоллар, Негра перуана и Увина.\nAromáticas – опять же писко на основе только одного сорта, но в\nэтот раз «ароматной» разновидности, а именно: Мускат, Альбилла,\nИталия и Торонтель.\nMosto Verde – писко из неполностью перебродившего, «зеленого»\nсусла, которое направляют на перегонку с остаточным сахаром.\nAcholado – писко из нескольких сортов винограда.\n\nУпотребление\nПиско можно пить всеми способами: на аперитив, дижестив или в\nсоставе коктейлей, самый известный из которых – Pisco Sour.", "О-де - ви\nиз фруктов и ягод\nПервые письменные упоминания о производстве\n«воды жизни» из фруктов и ягод датируются 17\nвеком. Вначале использовались плоды с высоким\nсодержанием сахара, например черешня, легко\nподвергающиеся натуральному брожению.\nРазвитие техники и изучение брожения привели\nк созданию множества спиртных напитков на\nоснове почти всех существующих фруктов и ягод.\n\nпостью от 4 до 6% vol. Его подвергают двойной\nперегонке в традиционном медном аппарате,\nотбирая «сердце» дистиллята.\nО-де-ви переливают в стеклянные бутыли, которые затыкают материей, и через нее испаряются\nнежелательные эфиры. Спиртное могут также\nвыдерживать от нескольких месяцев до нескольких лет в бочках.\n\nО-де-ви из фруктов\n\nО-де-ви из ягод\n\nПосле сбора урожая фрукты утрамбовывают в\nбольших бочках или остекленных чанах. Они\nдавятся под действием собственного веса и благодаря натуральным дрожжам начинают бродить.\nПроцесс брожения занимает около 6 недель.\nИз перебродивших плодов выжимают сусло кре-\n\nЯгоды содержат мало сахара, поэтому при их\nброжении алкоголь практически не образуется.\nИз-за этого ягоды вначале настаивают в спирте\nиз вина около месяца. Затем этот настой один\nраз дистиллируют. Крепость о-де-ви из фруктов\nи ягод варьируется от 37,5 до более 50%.\n\nК а льва дос : « яблочный бренди »\nКальвадос носит имя французскомго департамента, где он и производится.\n\nПроизводство\nПосле сбора яблок все сорта – нежные, горькие, нежно-горькие и кислые – отбирают и\nсмешивают в секретной пропорции. Иногда\nдобавляются груши для придания дополнительного вкуса. Фрукты давят, из них выжимают сусло, которое фильтруют и подвергают\nброжению. Натуральное брожение длится 5\nнедель и дает сидр крепостью от 4 до 6% vol.\nСидр дистиллируют либо в аппарате коньячного типа (для лучшего кальвадоса), либо в\nаппарате типа «патент стил» (для обыкновенного кальвадоса). Выдержка напитка длится не\nменее двух лет в дубовых бочках.\nКрепость кальвадоса – около 40% vol.\n\nВозрастные категории\n★★★ – 3 яблока – не менее 2 лет выдержки.\nVieux – Réserve – не менее 3 лет выдержки.\nVieille Réserve – не менее 4 лет выдержки.\nVSOP – не менее 5 лет выдержки.\nExtra – XO – Hors d’Age – Age Inconnu – не\n\nменее 6 лет выдержки.\nКальвадос – это купаж, и при определении его\nвозраста в счет идет только срок выдержки\nсамого молодого кальвадоса в купаже..\n\nНаименования\nВ зависимости от сорта яблок, способа дистилляции и места производства встречаются,\nглавным образом, два вида кальвадоса:\n• Calvados du Pays d’Auge AOC производится на\nнебольшой территории региона Пеи д\"Ож.\n• Calvados AOC производится на более обширной территории. Процессы его производства\nне так тщательны и дорогостоящи.\n\nУпотребление\nПо традиции кальвадос пьют на дижестив. Во\nФранции его часто добавляют в кофе. Также\nу французов существует традиция «опрокидывать» рюмку кальвадоса в середине ужина\nдля улучшения пищеварения. Этот ритуал\nназывают trou Normand, то есть «нормандская\nямка». Кроме того, кальвадос пьют в коктейлях,\nтак как многие исторические рецепты требуют\nиспользования яблочного бренди.\n\nК ирш (K irsch)\nКирш – спиртной напиток из темной\nчерешни с мелкими косточками –\nизготавливают на востоке Франции с\n17 века. Ягоды подвергают брожению\nвместе с косточками, а выдерживают\nкирш в стеклянной таре. Благодаря\nминдальным ароматам, он служит\nотличным дижестивом, а также\nиспользуется в составе некоторых\nкоктейлей.\n\nО-де - ви из груши В ильямс\n(P oire Williams)\nПолучают из груш сорта Вильямс и\nвыдерживают до нескольких лет в\nстеклянной таре. Порой в бутылке\nзаключена груша. Она зрела в этой\nбутылке, привязанной к ветке.\nЭтот оригинальный и нежный напиток\nпьют в чистом виде (при 6–8°С) и в\nкоктейлях.\n\nС ливовая о -де - ви (P rune)\nЭтот мощный и характерный напиток\nпорой долго выдерживают в бочках.\nЕго пьют на дижестив в еще теплой\nкофейной чашке, и он способствует\nпищеварению.\n\nМ ирабель (M irabelle)\nСпиртной напиток из мирабели (мелкая темно-желтая слива) подвергают\nдвойной перегонке и немного выдерживают в бочках. Мирабель пьют в\nчистом виде, оценивая ее деликатность и фруктовость. Хранить ее надо\nв темноте и употребить в течение 6\nмесяцев после открытия бутылки.\n\nМ алиновая о -де - ви\n(F ramboise)\nДушистые ароматы малины завершают свое формирование в процессе\nвыдержки в керамической или стеклянной таре. Пить в чистом виде\n(при 6–8°С) или в коктейлях в течение 2 лет после разлива по бутылкам.\n\nКоньяк и другие бренди 173", "Ч асть первая . Г лава 10\n\nЛ икёры\nЛ икеры – это одни из самых интересных ингредиентов бара . О ни с лужат как\nароматической основой кок тейля , так и придают ему с ладос ть . Н о не толь ко это . О ни несу т в себе вк ус ис тории , а так же имидж роскоши и прес тижа .\nИ с торические ликеры отличаются еще и тем , что каж дый их них уника лен . Д ля\nбармена с творческим подходом они прос то необходимы .\n\nПервые ликеры были созданы итальянскими и\nфранцузскими монахами в конце 13 века. Монастыри издавна служили приютом для странников.\nВ случае необходимости монахи лечили своих\nгостей. Для этой цели они дистиллировали травы и растения, которые можно было найти поблизости, и готовили из них предшественников\nсегодняшних ликеров. Зачастую монастыри располагались в труднодоступных местах, и в их\nокрестностях росли редкие растения, что обогащало вкус ликеров.\nПозднее, в начале 17 века, появились первые аптеки. Они взяли на себя заботу о больных и начали готовить собственные ликеры.\nА монахи, вскоре лишившиеся довольствия, нашли в изготовлении ликеров источник средств к\nсуществованию и возможность заниматься любимым искусством.\nЗолотой эпохой ликеров можно считать 19 столетие. Технический прогресс индустриальной\nреволюции, обилие сахара и падение цен на\nнего способствовали успеху, известности и распространению ликеров. В то время благодаря\nнескольким увлеченным первооткрывателям на\nсвет появились многие ликеры, сохранившие известность до наших дней.\nСегодняшнее разнообразие ликеров связано\nс поистине огромным количеством ароматов,\nкоторые нам дарует природа.: самые разные\nфрукты, травы, семена, а также кожура, коренья,\nцветы. Это способствует тому, что практически\nкаждый день новый напиток вступает в ряды ликеров.\n\n174 Ликеры\n\nП роизводс тво\nСуществуют два способа производства ликеров.\nТакже напиток может быть получен путем их комбинации.\n\nПервый способ – настойка\nНастойка – это мацерация (вымачивание) фруктов, ягод, растений и пряностей в алкоголе или,\nнапример, в бренди, виски или другом напитке.\nЭто вымачивание может продолжаться до шести\nмесяцев. Полученную смесь фильтруют, в нее\nдобавляют дистиллированную воду, снижая крепость, а также сахар или мед. Вкус полученной\nнастойки во многом зависит от крепости напитка,\nв котором проходило вымачивание. Так, содержание алкоголя 35-40% vol. способствует извлечению горьких составляющих корней и растений.\nА при более высокой крепости лучше экстрактируются эфирные масла. Воздействуя на крепость,\nможно значительно влиять на конечный вкус ликера.\n\nВторой способ – перегонка\nРазные ингредиенты: фрукты, ягоды, кожура цитрусовых, растения – вымачивают в алкоголе, но\nне столь долго – от нескольких часов до нескольких недель. Затем смесь фильтруют и дистиллируют. В процессе перегонки отбирают только «сердце» напитка. В него добавляют сахар и чистую\nводу для снижения крепости. Некоторые ликеры\nподвергают выдержке.", "группы. Первая объединяет ирландские кремы на\nоснове виски, сливок, сахара или меда. А вторая\n– кремы из разных фруктов, которые созданы специально для смешивания. Они придают коктейлям\nнежность и дополнительные ароматы.\n\nЛ егендарные ликеры\nВряд ли монахи монастыря Шартрез или кондитер Эдуар Куантро могли предположить, в каких\nусловиях и каким образом их произведения будут пить сегодня. А ведь сейчас их ликеры занимают прочные позиции в барах, на дискотеках, в\nресторанах, где их пьют в чистом виде, со льдом\nили в составе множества коктейлей.\n\nAmaretto di Saronno Originale\n(Амаретто ди Саронно Ориджинале)\nСамый известный ликер с ароматом миндаля –\nрезультат использования абрикосовых косточек.\nМожно подавать в чистом виде, со льдом или в\nкоктейлях. Италия, 28% vol.\n\nК лассифик ация\nЛ икер B énédictine\nВ 1863 году виноторговец Александр\nЛе Гран обнаружил в архивах своего\nдеда старинный монастырский манускрипт с рецептом ликера.\nС помощью одного аптекаря он воссоздал и модернизировал старинный\nрецепт, положив в его основу 27 трав\nи пряностей со всего мира, в частности: дягиль, можжевельник, мирру,\nшафран, арнику, лимонную кожуру и\nкорицу.\nЛикер поступил в продажу под названием Bénédictine. Его успех был\nмолниеносным.\nБуквы D.O.M. на этикетке ликера\nозначают «Deo Optimo Maximo», что\nпо-латински значит «божественный,\nлучший, величайший».\nВ наши дни Bénédictine нисколько не\nутратил своей привлекательности.\nЭто один из тех неброских и одновременно необходимых ликеров, которые\nделают бар не только местом развлечения, но и средоточием культуры\nи истории.\nЛикер Bénédictine является незаменимым компонентом множества коктейлей. Он входит в состав легендарного\n«Сингапур Слинга» и новоорлеанского\n«Вьё Каре». Вместе с шотландским\nвиски и красным вермутом он\nобразует известный исторический\nкоктейль «Бобби Бёрнс», а в сочетании с коньяком создает изысканный\nдижестив B&B.\n\nЛикеры сложно классифицировать из-за их\nогромного разнообразия. Целые поколения производителей старались наделять свои напитки\nуникальными чертами. Я пытался не прибегать\nк иерархии, которая может быть только субъективной, а классифицировать ликеры согласно\nтем местам, которые отвела им история. Некоторые ликеры прошли сквозь столетия и сохранили неизменным свой рецепт, который знали и\nпередавали только в узком семейном кругу. Эти\nстаринные ликеры нашли свое применение сегодня, адаптировавшись к современной жизни. Я\nобъединяю их в группу «легендарных ликеров».\nОни созданы монахами, алхимиками, кондитерами или аптекарями на основе растений, фруктов,\nкожуры, коры и кореньев.\nС течением времени под влиянием моды, спроса и в поисках новых рынков сбыта динамичные\nкомпании создали ликеры из многочисленных\nингредиентов, которые придают коктейлям яркий цвет, новый вкус и экзотические ноты. Чаще\nвсего такие ликеры получают из фруктов и их\nкорок, добавляя не менее 100 граммов сахара на\nлитр. Я объединил их под названием «марочные\nликеры».\nОтдельная группа – «кремы» – включает ликеры с\nдобавлением разных ароматов, часто – эссенций.\nОни содержат не менее 250 граммов сахара на\nлитр. Некоторые из них имеют давнюю историю. В\nсвою очередь, кремы можно разделить на две под-\n\nBénédictine D.O.M. (Бенедиктин Д.О.М.)\nЭтот известный ликер изготавливают в Нормандии из 27 трав и пряностей со всех уголков мира.\nПроцесс его производства длится три года и\nвключает выдержку. Подают Bénédictine со льдом\nили в коктейлях. Франция, крепость – 40% vol.\n\nCenterbe (Чентербе)\nВырабатывается на растительной основе и ароматизируется перечной мятой. Италия, крепость\n– от 30 до 42% vol.\n\nChartreuse (Шартрез)\nЛикер был создан в одном из французских монастырей, неподалеку от Гренобля. В крепком\nспиртном, полученном из вина, вымачивают более 130 растений. Желтый Шартрез – наиболее\nмягкий, его крепость – 40% vol. Крепость зеленого Шартреза – 55% vol. Их подают в чистом виде,\nсо льдом или в составе коктейлей. Надпись VEP\n(Vieillissement Exceptionnellement Prolongé) свидетельствует о долгой выдержке ликера в дубовых бочках.\n\nCointreau (Куантро)\nЭтот французский ликер изготавливают на предприятии, основанном в 1849 году, оснащенном 19\nмедными аламбиками, следуя секретной рецептуре, придуманной кондитером Эдуаром Куантро.\nЛикер обладает мощными и в то же время утонченными ароматами апельсиновых корочек. Он служит важным компонентом коктейлей, а также подается в чистом виде со льдом. Франция, 40% vol.\n\nЛикеры 175", "Curaçao (Кюрасао)\nЛикер получил название острова напротив Венесуэлы. Он был изготовлен при попытке найти применение апельсинам, портившимся при перевозке.\nПометка triple sec означала, что он содержал втрое\nменьше сахара по сравнению с другими ликерами.\nНаиболее известными являются бесцветный, оранжевый и голубой Кюрасао. Они широко используются в коктейлях. Крепость – от 24 до 35% vol.\n\nDanziger Goldwasser\n(Данцигер Голдвассер)\nЭтот ликер появился в 1598 году в Данциге. Его\nполучают путем мацерации разных пряностей в\nспиртном из зерна и разливают в бутылки, в которых находится листочек золота. Существует\nтакже ликер Silverwasser (Силвервассер) с серебряным листочком. Германия, крепость – 30% vol.\n\nDrambuie (Драмбуи)\nНа шотландском языке название этого ликера означает «напиток, который нравится». Его возраст\nнасчитывает более 250 лет. Изготавливается на\nоснове шотландского виски, верескового меда и\nароматизаторов. Шотландия, крепость – 40% vol.\n\nFrangelico (Франжелико)\nЭтот ореховый ликер назван именем монаха-отшельника, придумавшего его более трех столетий тому назад. Франжелико употребляют в чистом виде, а также в составе коктейлей. Италия,\nкрепость –28% vol.\n\nGalliano (Гальяно)\nВ 1896 году Артуро Ваккари запустил в производство яркий золотисто-желтый ликер, воплощающий собой дух Италии. Назван ликер в честь\nмайора Джузеппе Гальяно – знаменитого итальянского героя. При производстве ликера, требующем 7 мацераций и 6 дистилляций, используются более 30 различных трав, пряностей и\nспеций. Сегодня есть несколько разновидностей\nэтого ликера, среди которых наиболее распространен ванильный вариант. Galliano прекрасно\nсмешивается в коктейлях, являясь ингредиентом многих известных напитков, среди которых\nHarvey Wallbanger. Италия, крепость – 30% vol.\n\nGrand Marnier (Гран Марнье)\nЭтот ликер, разлитый в бутылки, похожие на перегонные кубы для коньяка, появился на свет в 1880\nгоду во Франции, близ Версаля. Он сочетает классику и экзотику – выдержанные коньяки и эссенцию горьких апельсинов с Карибских островов.\nБывает нескольких видов. Grand Marnier Cordon\nRouge – самый распространенный из них. Он\nпроизводится по секретному рецепту и выдер-\n\n176 Ликеры\n\nживается в дубовых бочках. Употребляется в чистом виде, со льдом и в коктейлях. Франция, крепость – 40% vol.\n\nЛ икеры и закон\n\nНазвание этого ликера, существующего с 1935\nгода, переводится как «мастер-охотник». На его\nэтикетке изображен святой Убер, покровитель\nохотников. Этот ликер помогает пищеварению.\nЕго пьют охлажденным в чистом виде залпом и в\nкоктейлях. Германия, крепость – 35% vol.\n\n• Ликером может называться спиртной напиток, полученный одним из\nперечисленных ниже способов:\n– мацерация растительных компонентов;\n– дистилляция растительных компонентов;\n– добавление дистиллята из растительных компонентов в смесь воды\nи спирта;\n– комбинация перечисленных выше\nспособов.\n\nKahlua (Калуа)\n\n• Ликер должен иметь крепость не\nменее 15% vol.\n\nJägermeister (Егермайстер)\n\nЭтот знаменитый кофейный ликер имеет достаточно давнее мексиканское происхождение. Он\nполучил широкую известность в 1950-е годы,\nсделавшись привилегированным компонентом\nмногих популярных смешанных напитков, среди которых такие классические коктейли, как\n«Черный русский», «Белый русский» и «Эспрессо\nМартини». Kahlua производится в мексиканском\nштате Веракрус из кофейных зерен сорта Арабика, ванили и дистиллята сахарного тростника,\nкоторые мощно проявляются в его ярком, сладковато-горьковатом вкусе. Мексика, крепость –\n20% vol.\n\nMandarine Napoléon\n(Мандарин Наполеон)\nСогласно легенде, этот ликер возник благодаря императору Наполеону I, любившему выпить\nпосле еды немного коньяка, в котором вымачивались мандарины. Его пьют в конце обеда или\nужина в чистом виде, со льдом или разбавленным\nконьяком. Франция, крепость – 38% vol.\n\nMaraschino (Мараскино)\nЛикер из мелкой кислой вишни, был придуман\nв городе Задар в Далматии в 17 веке. Он часто\nвстречается в коктейлях. Италия, Хорватия, крепость – 30-35% vol.\n\nPeter Heering (Питер Хиринг)\nЭтот вишневый ликер производится с 1818 года.\nОн носит имя своего создателя – бакалейщика\nПитера Хиринга. Сок вишен особого сорта и ароматические травы настаивают в спирте и выдерживают в дубовых бочках по системе «солера»,\nпри которой молодой ликер постепенно смешивается со старым. Дания, крепость – 24,7% vol.\n\nPimm’s No 1 (Пимс № 1)\nСостоит из джина, карамелизированных апельсинов, ароматических трав и других пряностей.\nНосит имя своего создателя Джеймса Пимма, владельца одного из рыбных ресторанов Лондона.\nВ первой половине 19 века он готовил для сво-\n\n• В качестве подсластителей ликера\nмогут выступать сахар, глюкоза и\nмед.\nПомимо перечисленных выше требований, ликер должен содержать не\nменее 100 граммов сахара на литр,\nа крем (crème или cream) – не менее\n250 граммов.\nКрем из черной смородины (Crème\nde Cassis) – не менее 400 г сахара на\nлитр.\n\nЗнаменитый кофейный ликер Kahlua\nпроизводится в Мексике, в штате\nВеракрус, с использованием отборных\nкофейных зерен сорта Арабика.", "С ове ты бармену\n• Многие коктейли нравятся потребителям не только из-за своего вкуса, но еще\nиз-за цвета, которым они обязаны ликерам, входящим в их состав. Ликеры добавляют\nсладость коктейлям, одновременно их смягчая.\n• Большинство ликеров подкрашивают такими натуральными продуктами, как\nшафран, морковь, различные сиропы и травяные настойки, хотя в последнее время\nтакже часто используются искусственные красители.\n• Ликеры способствуют равномерному смешиванию различных спиртных напитков\nв коктейле.\n• Благодаря таким уникальным свойствам ликеры являются незаменимым продуктом\nкаждого бара.\n• Коктейли, включающие ликеры и в еще большей степени – кремы, должны быть\nвзбиты в шейкере, чтобы получить однородную структуру.\n• Ликеры не хранят на холоде, потому что они могут помутнеть.\n\nих гостей смешанный напиток на основе джина.\nУспех этого ликера вдохновил ресторатора на\nего коммерческое производство. Англия, крепость – 25% vol.\n\nП одача ликеров\nН а дижестив\n\nРаньше ликеры чаще всего подавали в специальных рюмках и пили в\nчистом виде на дижестив, оценивая\nих сладость, приятный вкус и способность приносить удовольствие. В\nсегодняшнем мире, который становится «все более light», этот способ\nупотребления находит меньшее\nраспространение.\nТем не менее всегда актуально предлагать ликер на дижестив, особенно\nтому клиенту (часто женщине), которого не прельщает виски или коньяк.\nВ данном случае ликер подают со\nльдом в бокале рокс или, как раньше,\n– в чистом виде в рюмке. Заметим,\nчто многие любят пить ликер с кофе.\nЛикеры не подают на аперитив из-за\nвысокого содержания в них сахара,\nкоторое в этом случае сыграет роль,\nобратную преследуемой.\n\nВ кок тейлях\n\nЛикеры завоевали важное место в\nбаре благодаря коктейлям. Около\nтрети известных коктейлей не существовали бы без ликеров, которые\nпридают им нежность и дополнительные ароматы, определяют их вкус и\nцвет.\n\nSambuca (Самбука)\nСладкая анисовая настойка с сильными ароматами. Ее подают в чистом виде или со льдом. В\nИталии самбуку пьют «с мухой» (con la mosca): два\nкофейных зернышка кладут в небольшой бокал,\nналивают напиток, поджигают, ждут, пока самбука\nохладится, и пьют. Италия, крепость – 38% vol.\n\nSouthern Comfort (Саузерн комфорт)\nЛикер Southern Comfort был придуман в 1874\nгоду в Новом Орлеане барменом по имени М.В.\nХерон, который решил смягчить жесткий вкус виски, добавив в него фрукты и специи. Ликер пьют\nв чистом виде, со льдом или в составе коктейлей.\nСША, крепость – 35% vol.\n\nStrega (Стрега)\nРецепт этого желтого ликера со сложными ароматами включает многие травы. Strega производится с 1860 года в итальянском городе Беневенто, который согласно легенде был местом сбора\nведьм в Средние века. Отсюда возникло название\nликера: strega по-итальянски значит «ведьма».\nИталия, крепость – 40% vol.\n\nTia Maria (Тия Мария)\n«Тетушка Мария» – кофейный ликер с добавлением рома и ароматических компонентов. Он существует более 300 лет и употребляется на дижестив или в составе коктейлей. Производится на\nЯмайке, крепость – 26,5% vol.\n\nК рем - ликеры\nBaileys (Бэйлис)\nЭтот ирландский крем-ликер, созданный в 1974\nгоду в Дублине, представляет собой смесь сливок, ирландского виски, меда и различных ароматизаторов. Крепость – 16% vol.\n\nMozart (Моцарт)\nШоколадные ликеры Mozart изготавливают с 1954\nгода в австрийском Зальцбурге, родном городе\nлегендарного композитора. Производственный\nпроцесс проходит под музыку Моцарта с использованием только натуральных ингредиентов.\nБывает двух видов: Chocolate Cream (молочный\nшоколад), крепостью 17% vol., и White Chocolate\nVanilla Cream (белый шоколад с ванилью), крепостью 15% vol. Все достоинства этих ликеров можно оценить, подав их в чистом виде.\n\nSaint Brendan’s Superior\n(Сент Бренданс Супериор)\nПроизводство этого ирландского крем-ликера\nбыло основано в 1983 году. В его состав входят\nвыдержанный ирландский виски и свежие сливки. Крепость – 17% vol.\n\nК лассические крем - ликеры\nд ля кок тейлей\n\nCrème de Bananes (Крем де банан)\nБанановый ликер, белый или янтарный. Крепость\n– около 25% vol.\n\nCrème de Café (Крем де кафе)\nКофейный крем-ликер. Крепость – около 25% vol.\n\nCrème de Cacao (Крем де какао)\nКрем-ликер из ванили и бобов какао, придающий\nаромат коктейлю «Александр». Он может быть коричневым или бесцветным. Крепость – 24% vol.\n\nCrème de Cassis (Крем де кассис)\nЭтот черносмородиновый ликер используется в\nкоктейлях «Кир» и «Королевский Кир». Крепость\n– 15-25% vol.\n\nCrème de Fraise (Крем де фрез)\nКлубничный крем-ликер, его крепость – около\n25% vol.\n\nCrème de Framboise\n(Крем де фрамбуаз)\nМалиновый ликер. Крепость – около 25% vol.\n\nЛикеры 177", "Crème de Mandarine\n(Крем де мандарин)\nМандариновый ликер. Крепость – около 25% vol.\n\nпервую очередь, Chambord применяется в коктейлях, сообщая им красивый оттенок и яркие\nягодные ароматы. Франция, крепость – 16,5% vol.\n\nCrème de Menthe (Крем де мант)\n\nCherry Brandy (Черри бренди)\n\nОсвежающий ликер из перечной мяты, сообщающий тонус коктейлю «Стингер». Может быть бесцветным или зеленым. Крепость – 20-25% vol.\n\nЭтот результат мацерации и/или дистилляции\nвишни в спирте обогащает ароматическую палитру таких коктейлей, как «Кровь и песок» и «Сингапур Слинг». Крепость – 24-30% vol.\n\nМ арочные ликеры\nЧаще всего эти ликеры производят из фруктов и\nдругих ароматических субстанций. В некоторых\nслучаях используют яйца и сливки, которые связывают алкоголь и сахар.\n\nAdvocaat (Адвокат)\nЯичный ликер, ароматизированный авокадо. Голландия, крепость – 20% vol.\n\nApricot Brandy (Эйприкот бренди)\nСлово «бренди» в названии ликера означает, что\nон результат мацерации и/или дистилляции плодов в спиртном. Одни ликеры получают на базе\nнастоящего бренди, другие – на основе обычного\nзернового спирта. Apricot Brandy получают при вымачивании абрикосов. Крепость – около 30% vol.\n\nChambord (Шамбор)\nВ основе рецепта Chambord лежит исторический\nликер, который был создан в 1685 году по случаю\nпосещения замка Шамбор королем Франции Людовиком XIV. Для его производства используются\nчерная малина, ежевика, коньяк, ваниль и мед. В\n\nGoldschlager (Голдшлагер)\nЭтот ликер часто называют «шнапсом с корицей».\nОн происходит из Швейцарии и содержит золотые хлопья, лежащие в основе его оригинальности. Крепость – 43,5% vol.\n\nMidori (Мидори)\nЯрко-зеленый ликер, который получают на основе двух сортов дынь из Японии: мускусных и сорта\nYubari. В качестве алкогольной основы используется виноградный дистиллят. Созданный при помощи\nяпонских бартендеров, ликер был выпущен на рынок в начале 1970-х годов и быстро получил широкое распространение в барах и коктейлях благодаря своим ярким дынным ароматам и насыщенному\nосвежающему вкусу. Япония, крепость – 20% vol.\n\nPassoa (Пассоа)\nЭтот яркий коралловый ликер производится из\nплодов маракуйи и лимонов, вымоченных в алкоголе. Образует утоляющий жажду лонг дринк\nв сочетании с апельсиновым соком, а также\nупотребляется в составе различных коктейлей.\nФранция, крепость – 20% vol.\n\nPisang Ambon (Пизан Амбон)\nЛикер на основе зеленых бананов с острова Амбон. Крепость – 21% vol.\n\nSt-Germain (Сен-Жермен)\nЛикер из цветов бузины, которые собирают вручную во французских Альпах. St-Germain широко\nиспользуется в коктейлях. Франция, крепость –\n20% vol.\n\nSheridan’s Original\n(Шериданс Ориджинал)\nИрландский двойной ликер, бутылка которого делится на две части. В одной содержится ванильный ликер крепостью 17% vol, а в другой, которая вдвое больше, – шоколадно-кофейный ликер\nкрепостью 19,5% vol. Оба ликера смешиваются,\nкогда содержимое бутылки наливают в бокал.\n\nSoho (Сохо)\nПрозрачный ликер из личи с изысканными свежими ароматами. Крепость – 24% vol.\n\n178 Ликеры", "Л икёр St-G ermain: придай коктейлю\nШ арм (бузины) и Ш ик (П арижа)\nКогда речь заходит об этом ликере с ароматами\nцветов бузины, мне сразу вспоминается восхитительный Elderflower Martini, который мне лично\nподал сам Дик Брэдселл.\nНадо сказать, что с началом коктейльной революции барменам потребовались новые вкусовые\nоттенки, которые должны были сопровождать их\nтворчество и отвечать запросам клиентуры, открывающей для себя удовольствие от коктейлей.\nЦветы бузины прекрасно подходили для таких\nноваторских коктейлей, поскольку они обладают\nутонченными ароматами, одновременно – богатыми, сложными и нежными.\nВследствие такого спроса, в 2007 году выходец\nиз семьи винокуров Роб Купер изобрел новый\nликер. Страстный поклонник Франции и Парижа,\nа также спиртных напитков и миксологии, он собрал команду лучших миксологов того времени\nдля разработки ликера во французском стиле.\nСреди них был Саймон Диффорд. Так появился\nна свет St-Germain.\nВпоследствии Роб Купер счел, что его ликер заслуживал международной известности. Поскольку он сам был не в состоянии ее обеспечить,\n\nто уступил бренд компании «Бакарди». Следует\nотметить, что ликер St-Germain не стремится\nдостигнуть титанических уровней продаж, хотя\nбы потому что этого не позволяет сам процесс\nего получения. Ему суждено остаться ликером\nкустарного производства.\nОн делается на основе свежих цветов бузины,\nсобранных вручную во Французских Альпах, что\nисключает промышленные масштабы производства. Разумеется, рецепт хранится в секрете, но\nизвестно, что используется спирт из винограда\nи сахар. Наконец, ликер не содержит никаких\nискусственных добавок и красителей.\nСтоль ограниченное производство не мешает\nего успеху, и газета «Нью-Йорк Таймс» объявила,\nчто ликер St-Germain – один из тех, что оказали\nнаибольшее влияние на мир коктейлей за последнее десятилетие.\nГоворя о дегустационных качествах ликера\nSt-Germain, следует отметить, что он объединяет\nинтенсивные ароматы цветов бузины, которые\nподчеркнуты нотами тропических фруктов, личи,\nперсика, груши, лимона и винограда.\n\nСтильная бутылка французского\nликера St-Germain вызывает\nв памяти Париж 1920-х годов,\nнапоминая о творческом безумии той\nэпохи. А его яркие ароматы цветов\nбузины находят широкое применение\nв современных коктейлях, придавая\nим сложность и изысканность.\n\nЛикеры 179", "180 Вино", "Ч асть первая . Г лава 11\n\nВ ино\nД ат у появления вина ус тановить невозможно . И звес тно лишь , что вино пили и\nвысоко ценили египетские фараоны . У же в те да лекие времена они принима ли в\nрасчет совмес тимос ть сос тава почвы и сорта винограда , которая обус лавлива ет харак тер знаменитых вин .\n\nИ с тория\nБлагодаря древним грекам, вино обрело настоящую дворянскую грамоту. Именно греки стоят у\nистоков развития вина, которое под их влиянием низвергло с престола пиво. От них эстафету\nразвития виноделия приняли римляне. И если\nдревним грекам мы во многом обязаны духовной\nстороной вина, то торговля этим напитком и способы его производства определенно претерпели римское влияние. Большие любители выпить,\nримляне не только получали вино со своих виноградников, но и завозили его со всех завоеванных\nтерриторий. Кроме того, они разводили виноград\nтам, где он прежде никогда не рос.\nНа закате Римской империи, когда Европа была\nохвачена мраком невежества, знания сохранялись только в монастырях. Во время Средних\nвеков и даже позднее за виноградниками чаще\nвсего ухаживали монахи. Священнослужители не\nгнушались торговать вином, что служило для них\nважным источником дохода. Потребление вина\nпостепенно расширялось: поставляемое поначалу к столу папы, вино проникло в королевский\nдворец, а затем появилось в домах знати всей Европы. С этого момента вино становится центром\nпритяжения коммерческих интересов и благодаря активной деятельности торговцев (в частности, голландских) покоряет весь мир.\nВ 15 веке конкистадоры завезли на американский\nконтинент европейскую лозу вида Vitis Vinifera, которая дает лучшие вина. С конца 17 века и на протяжении 18 века виноградную лозу посадили во многих\nновых странах – в Южной Африке, Австралии, Новой\nЗеландии.\nВ Европе с повышением уровня жизни потре-\n\nбление дешевого вина значительно сократилось,\nуступив первенство дорогим напиткам. Вместе с\nтем качество вина постоянно улучшалось. Вино\nстали производить во многих странах, где этому\nблагоприятствовали климат и почва. Традиционные страны-производители оказались в условиях\nконкуренции, которая идет на пользу всем любителям вин.\n\nП роизводс тво вина\nКрасное вино\nСобранный виноград поступает на винодельню,\nгде обычно от него вначале отделяют гребни, а\nзатем давят. Во время этой операции не должны\nбыть повреждены косточки винограда, что может\nпридать вину слишком терпкий неприятный вкус.\nЗатем начинается процесс брожения, которое\nпродолжается 9-15 дней, а иногда до трех недель.\nТемпература сусла строго контролируется, она\nне должна превышать +30°С. Во время брожения\nкрасное вино насыщается веществами, которые\nсодержатся в кожице винограда.\nЧан с перебродившим суслом спускают. Из него\nвытекает первое, самое качественное вино («самотек»). Оставшееся в чане сусло прессуют, получая таким образом «первый пресс», содержащий\nмного танинов. «Самотек» и «первый пресс» смешивают, количество последнего зависит от желаемой структуры вина.\nНедорогое вино, предназначенное для скорого\nупотребления, переливают ненадолго в металлические чаны, затем фильтруют и разливают по\nбутылкам.\nЛучшие вина выдерживают в погребе, в дубовых\n\nВиноградная лоза в диком виде\nпредставляет собой огромную лиану.\nЭто одно из древнейших растений\nна земле, которое появилось на\nсвет, по всей видимости, по берегам\nКаспийского и Черного морей.\nОно принадлежит к семейству\nвиноградовых, состоящему из\nбольшого числа видов. Из них только\nодин дает все лучшие вина: Vitis\nVinifera, который подразделяется на\nмножество подвидов. Это известные\nсорта винограда от Шардоне до\nКаберне.\n\nВино 181", "О сновные сорта виногра да\nВиноград принадлежит к семейству растений Ampelidaceae, к которому относятся 10\nродов, но только один из них подходит для виноделия. Его называют Vitis, и он, в свою\nочередь, имеет около 70 видов, из которых чаще всего для виноделия используется вид\nVitis Vinifera. В него входят все известные сорта винограда: от Алиготе до Зинфанделя.\nКаждый сорт отличается структурой кожицы, содержанием танинов, сахаров, кислотностью и т.д.\n\nбочках, придающих им танины, а также ароматы\nванили и древесины.\nВ бочке вино испаряется, поэтому ее необходимо\nчасто доливать. Поскольку вино образует осадок,\nего надо иногда перелить в другую чистую бочку.\nСтарение в бочках длится от нескольких месяцев\nдо двух лет и иногда дольше.\nВыдержанное вино очищают от взвесей и разливают по бутылкам.\n\nБелое вино\nКабернеСовиньон\n\nЕго начали разводить в начале нашей эры во французском регионе Бордо.\nОн широко используется в очень многих странах и дает темные красные\nвина с мощными танинами, выразительными пряно-фруктовыми ароматами\nи нотами черной смородины. Они хорошо поддаются выдержке в бочке.\n\nМерло\n\nНаряду с Каберне-Совиньоном он является наиболее распространенным\nсортом винограда. Мерло дает мягкие, округлые и доступные красные вина с\nароматами черных ягод, сливы и вишни.\nКапризный сорт, предпочитающий прохладный климат. Качество вина из это-\n\nПино Нуар\n\nго винограда в большой степени зависит от года урожая. Из него получают\nделикатные красные вина с богатой ароматической палитрой: ноты малины,\nвишни и красных фруктов, которые с возрастом развивают оттенки кожи и\nживотные тона.\n\nСира (Шираз)\n\nЭтот сорт выращивали в Галлии (сегодняшней Франции), начиная с III века.\nСегодня он произрастает в Австралии, Франции, ЮАР, Калифорнии, Чили. Он\nдает темные красные вина, фруктовые, пряные, богатые танинами.\n\nСанджовезе\n\nИзвестен в Тоскане с незапамятных времен. Входит в состав знаменитого\nитальянского вина Кьянти. Его вина отличаются яркими фруктовыми ароматами, нотами фиалки и лакрицы и изящными танинами.\nЦвет Гренаша может быть красным, белым и серым. Из белого и серого Гре-\n\nГренаш\n\nнаша получают крепленые вина, из красного – крепкие бархатистые сухие\nкрасные вина, более легкие розовые, а также крепленые вина с нотами\nзасахаренных черных ягод.\n\nШардоне\n\nСамый распространенный белый сорт винограда. В холодном климате вина\nполучаются сухими, элегантными, свежими, с ароматами цитрусовых плодов.\nВ жарком климате – маслянистыми, пышными, с богатой палитрой ароматов.\n\nПри производстве белого вина сусло бродит без\nкожицы винограда, причем при более низкой температуре (13–20°С). Для высококачественных белых\nвин используется только «самотек». Некоторые белые вина выдерживают в дубовых бочках. Разливают белое вино по бутылкам в среднем раньше,\nчем красное, обычно его не выдерживают в бочках\nболее полутора лет.\n\nРозовое вино\nКачественные розовые вина получают из красного винограда. Несколько часов вымачивания\nсусла вместе с кожицей придают вину желаемый\nоттенок.\n\nП ок упк а вина\nВ отличие от коньяка или виски, старение которых прекращается в стекле, вино – это живой\nпродукт. Оно продолжает свое развитие в бутылке, достигая максимального расцвета, и затем,\nесли не выпито вовремя, постепенно умирает.\nРанняя смерть вина может быть вызвана его неправильной транспортировкой и хранением.\nПоэтому, покупая вино, необходимо задаваться\nследующими вопросами.\nВ каком моменте своего развития находится\nвино?\nУ обычных дешевых вин жизнь коротка, поэтому\nпить их следует молодыми, не старше одноготрех лет.\n\nВстречается во многих странах, в том числе во Франции, Германии, Испании,\n\nСовиньон\n\nИталии, ЮАР, США, Чили, Австралии, Новой Зеландии. Дает приятные и\nдоступные белые вина с утонченными, свежими и душистыми ароматами\nцветов и цитрусовых.\nПоявился на свет в Германии, на берегах Рейна. Дает сухие белые вина с\n\nРислинг\n\nцитрусовых и минеральными ароматами, а также сладкие вина с пряными\nоттенками. Рислинг с гранитных земель в ходе выдержки в бутылке развива-\n\nКак вино транспортировалось?\nЭто должны контролировать директора отделов\nзакупок ресторанов. Вино следует импортировать в термогрузовиках, не позволяющих ему замерзать зимой и перегреваться летом. Бутылки\nнужно располагать в ящиках горизонтально или\nгорлышком вниз.\n\nет ценимые и экстравагантные «керосиновые» ноты.\n\nКаковы условия хранения на складе у поставщика?\nСмотрите раздел «Хранение вина». (стр. 191)\n\n182 Вино", "Как делают\n\nвино\n\n1. В течение всего года винодел\nухаживает за лозой. Он проводит\nее подрезку, подвязку, борется с\nзаболеваниями.\n\n2. Когда виноград достигает оптимальной\nспелости, проводится сбор урожая.\n\n4. Сусло бродит в больших чанах,\nпревращаясь в вино. Его периодически перемешивают, поливая\nсверху суслом, вытекающим снизу.\nЧан с перебродившим суслом\nспускают.\n3. Виноград давят, чтобы получить сусло.\n\n6. Во время выдержки в бочках, которая обычно длится от 6 месяцев до 2 лет, вино насыщается танинами и развивает дополнительные ароматы. В течение этого периода вино доливают, оклеивают\n(очищают от взвесей) и переливают в другие бочки, сцеживая с\nосадка.\n\n5. Вино отдыхает несколько недель в стальных чанах. После этого престижные вина переливают в дубовые бочки,\nа другие – в бутылки.\nВино 183", "Внешний вид бутылки при покупке\n\nП робка\nПробка появилась на свет достаточно\nпоздно. Потребовалось сперва привыкнуть к бутылке, оценить ее удобство\nне только в качестве простого графина, но и как сосуда для хранения вина\nи его перевозки, чтобы возникла необходимость ее герметично закрыть.\nПо-видимому, первые деревянные\nпробки относятся к 16 веку, а первые\nобразцы штопоров, без сомнения, являются их ровесниками. Но в то время\nбутылки еще чаще всего затыкали\nпропитанным маслом конопляным\nволокном. Вероятно, впервые корковую пробку применил Дом Периньон\nв Шампани в 17 столетии. До 18 века\nкорковая пробка считалась большой\nроскошью, но вскоре она стала общепризнанной.\nСегодня на­т у­р аль­н ая проб­к а из ко­р ы\nпроб­к о­в о­г о дуба – это по­к а еще\nса­м ый рас­п ро­с т­р а­н ен­н ый спо­с об\nза­к у­п о­р и­в а­н ия бу­т ы­л ок с элитным\nви­н ом. Од­н а­к о по не­с коль­к им при­\nчи­н ам – вы­с о­к ий спрос, длительный\nпериод возобновления ко­р ы, высокая\nцена, а так­ж е риск прида­н ия ви­н у\nтак на­з ы­в а­е­м о­г о «привку­с а проб­к и»\n– про­и з­в о­д и­т е­л и все ча­щ е пы­т а­ю т­с я\nза­м е­н ить на­т у­р аль­н ую проб­к у син­т е­\nти­ч е­с­к ой, го­р аз­д о ме­н ее эле­г ант­н ой,\nно, мо­ж ет быть, бо­л ее эф­ф ек ­т ив­н ой и\nво всяком случае ме­н ее до­р о­г ой.\nЧто касается пробкового дуба, то он\nпредставляет собой вечнозеленое\nдерево, которое произрастает на юге\nЕвропы и на севере Африки.\n\n184 Вино\n\nПри выборе и покупке конкретной бутылки необходимо обращать внимание на следующие моменты:\n• местонахождение пробки: если она выше горлышка, велика вероятность того, что вино хранилось при слишком высокой температуре;\n• подтеки вокруг пробки;\n• пониженный уровень вина в бутылке (это нормальное явление только для старых вин);\n• запах бутылки вокруг пробки (она, конечно, не\nдолжна ничем пахнуть).\nНаличие трех последних свидетельств говорит\nо том, что из-за повышенных температуры и давления бутылка утратила герметичность, вино вышло, а в бутылку попал воздух, испортив ее содержимое.\nЕсли бутылка с вином находилась на холоде, в\nней могут появиться маленькие твердые частицы.\nХотя это не сильно влияет на вкус вина, однако\nчасто напиток утрачивает глубину своего букета.\n\nП одача вина\nПрофессионал должен предварительно продемонстрировать гостю этикетку бутылки, сообщить название вина, год урожая и производителя. Клиент должен подтвердить свой выбор.\nСтарую бутылку вина подают этикеткой кверху\nв специальной корзинке, при этом стараясь как\nможно меньше ее шевелить. По возможности\nбутылку откупоривают в присутствии клиента. У\nстарой, пыльной бутылки протирают только горлышко.\n\nОткупоривание бутылки\nОткрыть бутылку вина очень просто, но эта операция требует большого опыта. Все бутылки разные,\nи проблемы возникают там, где их ждут меньше\nвсего. Чтобы их избежать, воспользуйтесь следующими советами.\n1. Откупоривая бутылку, двигайте ее как можно\nменьше. Вино должно оставаться в вертикальном\nположении или в своей корзинке.\n2. Маленьким ножиком срежьте колпачок под выступом, опоясывающим горлышко.\n3. Снимите отрезанную фольгу. Вставьте штопор в\nсередину пробки и вверните его на предполагаемую ее длину. Здесь важны опыт и привычка. Вина\nиз Бордо и Риохи имеют самые длинные пробки.\nОчень часто длина пробки зависит от цены бутылки.\nВвинчивая штопор в пробку, следите за тем, чтобы конец штопора не вышел с другой стороны.\nЭто не очень элегантно, и кроме того, кусочки\nпробки могут попасть в вино.\n\nЕсли вам попалась очень старая бутылка, ее\nпробка может быть мягкой из-за плесени и влажности. В этом случае лучше ввинтить штопор под\nуглом, чтобы наверняка вынуть пробку.\n4. Медленно выньте пробку. Во время этой операции не бойтесь ввинтить штопор дополнительно\nна 1-2 оборота в случае необходимости.\n5. Вытрите горлышко бутылки салфеткой и понюхайте пробку, чтобы убедиться в отсутствии неприятных запахов.\n\nНаполнение бокалов\n1. Налейте немного вина в бокал гостя, заказавшего вино. Получите его одобрение.\n2. Наполняйте бокалы по часовой стрелке, обслуживая в первую очередь дам.\n3. Вино наливают в бокал, стоя с правой стороны\nот сидящего за столом. Бутылку держат правой\nрукой таким образом, чтобы была видна ее этикетка. Указательный палец должен находиться на\nгорлышке бутылки. Если до бокала невозможно\nдотянуться с правой стороны от клиента, не стоит\nбеспокоить его, выставляя перед ним руку, надо\nзайти с левой стороны, взять левой рукой его бокал и на весу налить в него вино правой рукой.\n4. Наполняйте бокал красным вином наполовину,\nа белым – на две трети. Бутылку молодого белого вина наклоняют над бокалом достаточно высоко – на расстоянии 8-10 сантиметров. Красное\nи старое белое вино разливают, держа бутылку\nкак можно ближе к бокалу (но никогда не касаясь\nгорлышком его стенок).\n5. Когда в бокале оказывается достаточно вина,\nбутылку уверенным жестом возвращают в вертикальное положение, сделав при этом легкое вращательное движение запястьем, чтобы не капать\nвином на скатерть.\n6. Для того чтобы элегантно подать старое бордоское или бургундское вино, бокал слегка наклоняют в сторону бутылки, держа левой рукой за\nего ножку, но не отрывая его полностью от стола.\nЭтот способ позволяет не сотрясать вино, покоящееся в корзинке.\n7. Бутылку, содержащую осадок, никогда не разливают до последней капли. Оставленные на дне\nтакой бутылки несколько сантилитров вина считаются верхом элегантности.\n8. Тренируйтесь, для клиента нет ничего более\nнеприятного, чем долгое и мучительное откупоривание бутылки.\nТем, кто желает больше знать об аэрации вина,\nего декантации и правилах сочетания с блюдами,\nсоветую обратиться к электронной книге «Библия сомелье и ресторатора», где собраны все\nсоветы относительно правильной работы с вином в ресторане.", "Франция\nПользующаяся выгодным географическим положением и старейшими традициями виноделия,\nФранция, бесспорно, считается страной вина.\nФранцузские вина обладают таким многообразием стилей, что, кажется, их можно пить всю\nжизнь, ни разу не встретив одинаковую бутылку.\nЭто многообразие вин усилилось из-за влияния соседних стран.\nОт Эльзаса, заимствовавшего характер немецких вин, до Корсики, породнившейся с винами Италии, от испытавшего испанское влияние\nЮго-Запада до Шампани, чьи вина прославили\nангличане, Франция получила уникальное винодельческое наследие. Она с гордостью представляет невероятное разнообразие вин, которые изготавливают в более, чем десяти регионах, самые\nизвестные из которых Бордо, Бургундия и Берега\nРоны.\n\nБ ордо\nРегион Бордо расположен на западе Франции.\nРеки Гаронна и Дордонь омывают эту территорию\nи при слиянии образуют широкое устье, называемое Жирондой, которое впадает в Атлантический\nокеан.\nКлимат в Бордо – океанический, влажный, без\nзначительных температурных колебаний. Зима\nмягкая и теплая благодаря Гольфстриму, а лето\nумеренное из-за близости Атлантического океана и благодаря рекам, омывающим виноградники.\n\nСорта винограда\nВ Бордо выращивают следующие красные сорта:\nКаберне-Совиньон, изобилующий танинами и\nобладающий прекрасной способностью к выдержке; Мерло, придающий купажу мягкость;\nКаберне-Фран, сообщающий вину яркий цвет\nи особый букет. Эти сорта на бордоской земле\nдают рождение великим винам, причем некоторые из них считаются лучшими на планете:\nнапример, Шато Латур, Шато Лафит-Ротшильд и\nШато Марго.\nСреди белых бордоских сортов следует упомянуть свежий и душистый Совиньон; подверженный благородному гниению Семийон, очень\nподходящий для производства сладких вин, а\nтакже Мускадель с субтильными, нежными ароматами.\n\nВино 185", "Бург ундия\nК атегории\nфранцузских вин по\nпроисхождению\nНиже приведены категории французских вин, начиная с самых престижных и заканчивая ординарными.\nРядом с французским названием\nуказан его европейский эквивалент.\n1. AOC/AOP – Appellation d'Origine\nContrôlée/ Appellation d'Origine\nProtégée – наименование, контролируемое/защищаемое по происхождению (апеласьон). Эти вина производят в соответствии со следующими\nпринципами:\n• ограниченная территория;\n• традиционные сорта винограда;\n• контроль урожайности;\n• установленные способы производства;\n• проведение дегустации, подтверждающей особенности вина.\n2. Vins de Pays/IGP – местные вина/\nзащищенное географическое происхождение. На них распространяются\nнекоторые правила контроля, менее\nстрогого, чем в предыдущих случаях.\n3. Vin de France/SIG. Эти французские\nвина/без указания географического\nпроисхождения могут представлять\nсобой смесь вин, произведенных в\nразных уголках страны.\n\n186 Вино\n\nБургундия, как и Бордо, известна своими качественными винами. Однако Бургундия меньше –\nее площадь составляет две десятых от площади\nБордо (24.000 гектаров).\nВ Бургундии континентальный климат с холодной\nзимой и солнечным жарким летом. Бургундские\nвина в большой степени подвержены погодным\nкапризам, поэтому год урожая имеет для них очень\nважное значение.\n\nСорта винограда\nПино Нуар используется для производства красного вина, Шардоне – для белого. Они достигают\nв Бургундии своего совершенства. Другие сорта,\nтакие, как Алиготе и Гамэ, используются в меньшей\nстепени.\nЧаще всего бургундские вина производятся из\nвинограда одного сорта.\n\nЗнаменитые вина\nЗнаменитые белые вина производят в районах\nШабли и Кот-де-Бон (среди них Монраше и Кортон-Шарлемань).\nПрославленные красные появляются на свет в\nрайоне Кот-де-Нюи (среди них Жевре-Шамбертен, Мюзиньи и Вужо).\nК Бургундии также относят регион Божоле, расположенный к югу. Он знаменит своими молодыми и фруктовыми красными винами. Их получают\nна основе сорта Гамэ, который обретает удивительную выразительность на здешних гранитных\nземлях. Самое известное вино этого района – Божоле Нуво, то есть новое Божоле. Оно поступает\nв продажу в третий четверг ноября, всего через 2\n\nмесяца после сбора урожая, и его следует допить\nдо конца года.\n\nБ ерега Р оны\nНа берегах Роны возделывают более 70.000 гектаров виноградников, которые располагаются на\nузкой, длинной полосе (250 километров), порой в\nкрайне трудных условиях и самых неудобных местах – на каменистой почве и на крутых склонах\nхолмов, опаленных солнцем.\nКлимат, господствующий в этом регионе, обуславливает своеобразие здешних вин. Исключительное воздействие солнца, сильный ветер\nмистраль, резкие перепады температуры днем и\nночью, летом и зимой наряду с геологическими\nособенностями долины Роны формируют оригинальный характер здешних вин. Кроме того, вина\nс берегов Роны – самые сложные по составу сортов винограда.\n\nОсновные сорта винограда\nВ долине Роны для производства красных, розовых и белых вин разрешены 23 сорта винограда.\nНапример, можно использовать до 13 сортов винограда для производства вина Шатонеф-дю-Пап.\nОсновной сорт красных и розовых вин – черный\nГренаш. Также все чаще применяется сорт Сира.\nСорт Мурведр дает вина, пригодные к выдержке.\nСмесь таких сортов винограда, как белый Гренаш,\nКлерет, Марсан и Руссан, позволяет производить\nсбалансированные белые вина. Сорт Вионье сообщает вину ароматы тропических плодов.\nНаконец, для получения сладких вин здесь используется сорт Мускат мелкозернистый.", "Италия\nС самых древних времен жители Апеннинского полуострова стремились приручить дикую\nвиноградную лозу. Благоприятный климат способствовал быстрому развитию виноделия и виноградарства. О многообразии местных сортов\nписал Вергилий в «Георгиках»: «Тот, кто желает\nпознать все виды лозы виноградной, пусть сосчитает волны морей или Ливийской пустыни песок».\nПосле падения Римской империи на протяжении\nстолетий виноделие развивалось только в пределах замкнутых феодальных владений.\nСегодня виноделие является важнейшей отраслью Италии.\n\nСорта винограда\n• Традиционные итальянские сорта\nОни составляют большинство. К ним относятся\nкрасные: Санджовезе, Неббиоло, Барбера, Дольчетто, Рефоско; белые: Треббьяно, Мускат, Пино\nГриджио, Вердуццо, Кортезе, Мальвазия и многие\nдругие.\n• Классические французские сорта\nЭти сорта представлены Каберне-Совиньоном,\nМерло, Шардоне и некоторыми другими.\n• Немецкие сорта винограда\nСреди немецких сортов в Италии выращивают\nРислинг и Гевурцтраминер.\n\nВино 187", "Испания\nВ Италии насчитывается 20 винодельческих регионов, которые совпадают с административными\nобластями. Самыми известными из них являются\nТоскана и Пьемонт.\n\nП ьемонт\n\nК атегории\nитальянских вин по\nпроисхождению\nРазличают следующие категории\nитальянских вин, начиная с самых\nпрестижных и заканчивая ординарными.\n1. Denominazione di Origine Controllata\ne Garantita, сокращенно DOCG (наименование, контролируемое и гарантированное по происхождению).\nКритерии производства этих вин\nсамые строгие.\n2. Denominazione di Origine\nControllata, сокращенно DOC (наименование, контролируемое по происхождению).\nЭти вина отвечают точным нормам\nвиноградарства и виноделия и могут\nбыть получены только на определенной ограниченной территории.\n3. IGT (или IGP) – Indicazione\nGeografica Tipica (Protetta) (вино с\nуказанием происхождения). Место\nполучения этих вин контролируется.\n4. Vino ( «вино»). Происхождение такого вина не подлежит контролю. Оно\nможет быть купажом вин, полученных в совершенно разных регионах\nИталии.\n\n188 Вино\n\nПьемонт расположен у подножья Альп на северо-западе Италии. Здесь с давних времен изготавливают качественные вина с безупречной\nрепутацией, составляющие гордость жителей\nИталии.\nНаиболее известны здешние красные вина с их\nсдержанной элегантностью и высоким потенциалом к выдержке. Самое знаменитое и дорогое\nиз них – это Barolo, крепкое вино с фиалковым\nароматом, относящееся к престижной категории\nDOCG. Его производят в округе селения Бароло\nиз винограда сорта Неббиоло и выдерживают не\nменее двух лет в бочках.\nЕще одно известное вино Пьемонта, но на сей раз\nбелое, сладкое и игриcтое – это Asti Spumante,\nполучаемое из винограда сорта Мускат.\n\nТоск ана\nТоскана – это, бесспорно, самая известная в мире\nвинодельческая область Италии, которая очаровывает нас своими бархатистыми красными винами. Она расположена в центре страны, и здесь\nгосподствует исключительный климат, который\nблагоприятствует полному созреванию красного винограда без ущерба его кислотности. Среди возделываемых в Тоскане сортов винограда,\nСанджовезе – самый верный представитель этой\nобласти.\nПопулярное итальянское вино Chianti – родом\nиз Тосканы. Его производят из нескольких сортов\nвинограда. Основным из них является Санджовезе, сообщающий Chianti мощь и характерные\nароматы.\nДругое известное вино Тосканы – Brunello di\nMontalcino. Его полностью производят из сорта\nСанджовезе. Оно должно быть выдержано в течение четырех лет, три из которых – в дубовой\nбочке. Разливают это вино только в «бордоские»\nбутылки, на этикетках которых ставится престижная отметка DOCG.\n\nИспания – это страна с благоприятными для виноделия бедными почвами, контрастным климатом\nи удачно расположенными горными склонами.\nВиноградарство зародилось, по всей видимости,\nна юге страны благодаря финикийцам. Позднее\nримляне распространили его по всей стране.\nСчитают, что в известной степени испанцы обязаны своими виноградниками арабам, которые\nразводили некоторые столовые сорта винограда, например, Педро Хименес, из которого производят знаменитый херес. Сегодня по площади\nвиноградников Испания опережает Италию и\nФранцию.\n\nСорта винограда\nДля Испании характерны собственные сорта\nвинограда, которым подходят местные климатические условия. Среди них наиболее известны\nследующие.\nКрасные сорта\n• Гренаш (по-испански Garnacha) и все его разновидности, то есть черный, розовый и серый\nГренаш.\n• Темпранильо, королевский сорт Риохи, который\nвыращивают и в других регионах, где пытаются\nпроизводить вина лучшего качества, выдержанные в дубовых бочках.\n• Монастрель, который также выращивают на\nюге Франции под названием Мурведр, и Бобаль,\nвстречающийся преимущественно в Валенсии.\nБелые сорта\n• Паломино и Педро Хименес, используемые главным образом для производства хереса.\n• Макабео, белый сорт Риохи.\n• Мускат александрийский.\n• Белый Гренаш.\n• Аирен, самый распространенный сорт в Испании. Он дает легкие и «живые», но несколько простоватые вина.\n• Классические Совиньон и Шардоне.\nВ Испании насчитывается более 40 винодельческих районов, вина которых имеют право на\nзвание Denominación de Origen, указанное на\nэтикетке.\nЭти районы входят в состав больших винодельческих регионов. Далее приводятся основные из\nних.", "Уникальный, современный пятиуровневый погреб винодельни Campo Viejo (Риоха) позволяет наиболее бережно работать с виноградом на всех производственных стадиях по принципу «сверху вниз».\nДанный подход лучше сохраняет целостность ягод, а значит оригинальный вкус и аромат вин.\n\nА нда лузия\nАндалузия – родина хереса и диких быков. Суровая, пустынная красота этой южной провинции\nсмягчена близостью Атлантического океана и\nСредиземного моря. Это обуславливает контрастный климат Андалузии, где часто дуют очень\nсильные ветры, которые «куют» здесь погодные\nусловия.\nХерес оказал настолько сильное влияние на производство вина в этом южном регионе, что большинство здешних вин в той или иной степени\nсхожи с ним.\nЭто сладкие или сухие вина с высоким содержанием алкоголя. Как правило, подобно хересу, они\nвыдержаны согласно методу «солера».\n\nР иоха\nЭто самый знаменитый винодельческий регион\nИспании. Он делится на три района:\n• Риоха-Альта (Rioja Alta) на севере, ближе к Атлантическому океану. Здесь производят тонкие вина,\nспособные к выдержке;\n• Риоха-Баха (Rioja Baja), чьи вина богаты алкоголем;\n• Риоха-Алавеса (Rioja Alavesa), где получаются\nмягкие и «округлые» вина.\nВина этих трех районов обладают разным характером и при смешивании образуют гармоничный\nи уравновешенный купаж, который часто имеет\nобщее наименование – Rioja.\n\nКрасные вина Риохи производят преимущественно из сорта Темпранильо. Здесь также получают\nбелые и розовые вина.\n\nК ата лония\nКаталония расположена на северо-востоке Испании близ французской границы. Здешние вина\nносят разные наименования и в разных частях\nрегиона значительно отличаются друг от друга.\nОни могут быть легкими и тонкими, как, например, Costers del Segre, или алкогольно-крепкими\nи «щедрыми», как Priorato.\nНаиболее известное вино Каталонии носит наименование Cava. Это высококачественное игристое вино, получаемое традиционным способом.\n\nК ас тилья\nКастилья разделяется на две части: Ла Манча (La\nMancha) и Леон (León).\nЛа Манча – важнейший регион производства дешевых испанских вин.\nВ Леоне изготавливают высококачественные вина\nRueda – исключительно белые, свежие и ароматные. Красные вина, в частности из района Ribera\ndel Duero, могут удовлетворить самых капризных\nпотребителей.\n\nК атегории испанских вин\nпо происхождению\nИспанская регламентация охватывает\nследующие основные категории вин\nот самых престижных до наиболее\nординарных:\n1. Denominación de Origen (DO). Эти\nвина происходят с установленной\nтерритории и производятся при соблюдении строгих требований. Среди\nних выделяют следующие группы:\n• Denominación de Origen Calificada\n(DOC). Вина, отвечающие дополнительным производственным\nтребованиям.\n• Vino de Pago. Эти вина должны быть\nпроизведены и разлиты по бутылкам\nв пределах одного винодельческого\nхозяйства.\n2. Vinos de Calidad con Indicación\nGeográfica (VCIG). Эти вина производят на ограниченной территории.\nДанная категория считается трамплином к престижной категории DO.\n3. Vino de la Tierra. Местное вино.\n4. Vino de Mesa. Столовое вино, может\nбыть получено в разных частях\nстраны.\n\nВино 189", "Южная Африка\nКультура виноделия зародилась в Южной Африке в середине 17 века благодаря усилиям первых\nголландских переселенцев. Начиная с 18 века\nв Южную Африку стали прибывать из Франции\nбеженцы-гугеноты. Они привезли с собой французские сорта винограда и винодельческий опыт.\nЭти первые шаги подхватили английские импортеры, тонкие знатоки вин и спиртных напитков,\nлишившиеся французских вин во время блокады\nАнглии императором Наполеоном. Сегодня ЮАР\nэкспортирует свои вина по всему миру. Их качество получило единодушное признание среди\nлюбителей вина.\n\nОсновные сорта винограда\n\nСбор урожая неподалеку от\nКейптауна, Южная Африка.\n\n190 Вино\n\nСреди белых сортов наиболее распространен Шенен Блан, который здесь называется Steen. Из него\nполучают фруктовые вина. Он хорошо подходит к\nусловиям Южной Африки благодаря своей кислотности. Здесь достаточно широко распространены\nКоломбар, Шардоне, Совиньон, Мускат и Семийон,\nа также Рислинг и Гевурцтраминер.\nСреди красных сортов наиболее популярны Кабер-\n\nне-Совиньон, Сенсо и Пинотаж. Последний, полученный скрещиванием Пино Нуара и Сенсо, дает\nвина с мощными ароматами. Здесь также встречаются Мерло, Сира и Пино Нуар.\n\nРегламентация\nЗаконодательство ЮАР гарантирует место происхождения и качество вина и устанавливает\nграницы официальных винодельческих зон:\nрегионов (regions), районов (districts), округов\n(wards) и поместий (estates).\nСамые качественные южноафриканские вина\nносят на этикетке пометку Wine of Origin (W.O.) в\nсочетании с названием официальной винодельческой зоны. Они полностью получены из винограда, выращенного в данной зоне, и должны\nбыть изготовлены, как минимум, на 75% из определенного сорта винограда и, как минимум, на\n75% из урожая определенного года.\nМесто происхождения может быть указано на\nэтикетке, если вино произведено, как минимум,\nна 75% из винограда, выращенного на данной\nтерритории.", "Сорт винограда указывается на этикетке, если\nвино произведено из него, как минимум, на 75%\n(для экспорта – на 85%).\nГод урожая может быть указан на этикетке, если,\nкак минимум, 75% содержимого бутылки произведено из урожая этого года.\n\nОсновные винодельческие регионы\nВажнейшие виноградники ЮАР сосредоточены в\nюго-западной части страны, омываемой водами\nАтлантического и Индийского океанов. Приведем\nважнейшие винодельческие регионы.\nКонстанция (Constantia) – «колыбель» южноафриканского виноделия. В этом регионе, расположенном неподалеку от Кейптауна, производят\nкачественные сладкие и сухие белые и красные\nвина.\nСтилленбош (Stellenbosch). Вина этого региона\nсегодня получили широкое признание. Среди\nних – красные вина на основе сортов Пинотаж,\nКаберне-Совиньон, Сира и Мерло, а также белые, полученные из сортов Совиньон и Шардоне.\nЗдесь производят и игристые вина на основе сорта Шенен Блан.\nПаарль (Paarl) граничит на юге со Стилленбошем\nи удален от моря. Здесь, в условиях более теплого и сухого климата, производят большое разнообразие вин, как сухих, так и сладких и игристых.\nРобертсон (Robertson) зарекомендовал себя\nкак один из основных винодельческих регионов\nстраны. На известняковых почвах здесь выращивают Коломбар, Шардоне, а также Совиньон и\nРислинг, которые дают весьма тонкие вина благодаря температурному контрасту между дневным\nзноем и ночной прохладой.\n\nЧили\nЧеренки европейских сортов винограда были завезены в Чили во второй половине 19 века. Климат\nблагоприятствовал развитию виноделия. А девственный, чарующий ландшафт, пересеченный бурными реками, сбрасывающими свои воды с вершин\nАнд в Тихий океан, оказался недоступным для вредных насекомых, в том числе филлоксеры, которая\nвызывала кошмары у европейских виноградарей.\nНо только с 1970-х годов чилийское виноделие начало развиваться по-настоящему. Правители Чили,\nпоняв экономические выгоды виноделия для развития страны, стали привлекать инвестиции и ино-\n\nстранных специалистов в помощь местным виноделам. С тех пор в рекордные сроки чилийские вина\nзаняли важное место на международном рынке.\n\nКлимат\nВиноградники Чили тянутся на 1400 километров,\nот 27° до 39° южной широты. На этой узкой полосе земли, которую окаймляют Анды на востоке и\nТихий океан на западе, климат зависит от прихоти\nветров в долинах и океанских течений, умеряющих эксцессы девственной природы. Считается,\nчто здешний климат напоминает средиземноморский. Летом жаркая солнечная погода сменяется приходящей с гор ночной прохладой, что\nспособствует оптимальному созреванию плодов.\n\nСорта винограда\nВ Чили выращивают множество сортов винограда. Но только 17 белых и 17 красных сортов могут\nбыть указаны на этикетке. Среди них белые: Шардоне, Шенен Блан, Гевурцтраминер, Совиньон,\nВионье, Рислинг – и красные: Каберне-Совиньон,\nКаберне-Фран, Мерло, Санджовезе, Сира, Пино\nНуар, Зинфандель, Кариньян и Карменер.\n\nРегламентация\nНа этикетке вина может быть указано географическое место его происхождения (регион,\nсубрегион, зона или область) в том случае, если,\nкак минимум, 75% вина получено из винограда,\nвыращенного на данной территории.\nСорт винограда может быть указан на этикетке,\nесли вино состоит из данного сорта, как минимум, на 75%.\nВино может быть помечено годом урожая при\nусловии, что не менее 75% содержимого бутылки\nбыло получено из урожая этого года.\n\nВинодельческие регионы\nВ Чили насчитывается пять основных винных\nрегионов (с севера на юг): Атакама (Atacama), Кокимбо (Coquimbo), Аконкагуа (Aconcagua), Центральная долина и Южный регион. Три последних наиболее известны. За редким исключением,\nздесь производят лучшие чилийские вина.\nНаиболее важный аспект географии чилийских\nвин – это речные долины (по-английски на этикетке – Valley). Многочисленные реки, спускаясь с\nАнд к океану, образовали ряд параллельных долин\nпоперек страны, где приютились виноградники.\nМногим из долин присвоено D.O. (Denomination de\nOrigen) – контролируемое наименование, которое\nносят получаемые здесь вина.\nЭти D.O. подразделяются на винодельческие зоны\n(они часто окружают приток основной реки и носят его имя). Зоны, в свою очередь, дробятся на винодельческие области.\n\nХ ранение вина\nИдеальные условия хранения вина\nпредполагают следующее.\n• Температура. Самая подходящая\nтемпература для хранения вина –\n+12°С. При более высокой температуре вино стареет быстрее. При\nтемпературе выше 24°С оно эволюционирует особенно интенсивно,\nдвигаясь к упадку большими шагами.\n• Влажность. От 70 до 80 гидрометрических градусов. Если влажность\nвыше, то пробка может заплесневеть,\nа если ниже, то высохнуть. Оба исхода\nодинаково вредны для вина.\n• Освещение. Полная темнота. Вино не\nлюбит света.\n• Покой. Отсутствие вредной для вина\nвибрации. Также следует как можно\nреже перекладывать бутылки.\n• Изоляция. Вино должно храниться отдельно. Рядом с ним не стоит\nхранить химические вещества или,\nнапример, несвежие овощи.\n• Размещение бутылок. В горизонтальном положении. (А бутылки с\nкреплеными винами и спиртными\nнапитками должны храниться вертикально, чтобы спирт не воздействовал на пробку).\n\nВино 191", "Старинный белый сорт винограда\nГлера (до 2009 года он назывался\n«Просекко») лежит в основе многих\nитальянских игристых вин. В первую\nочередь, – в основе просекко.\n\nИгристые вина\nП одача игристого\nИгристое вино можно пить самыми\nразными способами. Его можно\nподать на аперитив с легкими закусками. На его основе готовится множество коктейлей. Кроме того, оно\nпрекрасно сопровождает весь ужин.\nСервировка блюд с игристым более\nуниверсальна, чем с другими винами,\nкоторые требуют разной температуры\nподачи и по-разному сочетаются с\nблюдами.\n\nБ ок а лы д ля игристого вина\n\nФорма бокала влияет на высвобождение пузырьков газа в вине, его\n«игру». Пена живее образуется в\nбокалах с более заостренным низом.\nК тому же в абсолютно чистом и\nгладком бокале пузырьки образуются\nплохо, поэтому некоторые производители вырезают на дне своих бокалов\nмаленькую звездочку.\nМоющие вещества также могут отрицательно сказываться на вспенивании. Поэтому, если вино не пенится,\nпрежде чем говорить о его плохом\nкачестве, взгляните на бокал.\nДля подачи игристых вин традиционно используются узкие фужеры\nпродолговатой формы. А в бокалах\nв виде чаши вино растекается, пена\nне держится, и букет быстро рассеивается.\nСегодня игристые вина все чаще\nподают в винных бокалах, причем\nлетом добавляют лед.\n\nТемперат ура подачи\n\nИгристое вино должно быть охлаждено до 6-9°С. В процессе употребления оно успеет нагреться до 8-13°С.\nВыдержанное игристое, например\nстарое шампанское, подают при более\nвысокой температуре – до 12°С, что\nподчеркивает его винную сторону.\n\n192 Вино\n\nИ грис тые вина – это, скорее всего, лучшая точка соприкосновения , способная\nобъединить мир баров и мир рес торанов . В ыпить бока л просекко или шампан ского , расположившись на табурете бара , – оправданный выбор. Столь же оправ данный , как заказ бу тылки игрис того к блюду из рыбы или морепродук тов .\nП оэтому игрис тые вина обла дают особым с тат усом . К лассические и совре менные – они играют роль к ата лизатора праздник а . К роме того , их пузырьки\nценятс я в кок тейлях , ибо они оживляют их и придают им динамизм .\n\nВо всех винодельческий странах производят\nигристые вина, которые являются символом\nпраздничной атмосферы и отражают характер\nместных жителей и их обычаи.\n\nИ та лия\nИталия располагает удивительным разнообразием вин. Игристое вино, занимает среди них\nважное место не только по объему продаж,\nно также благодаря своей легкости и веселому нраву. Среди самых известных игристых вин\nИталии можно выделить просекко, асти спуманте\nи франчакорту.\n\nПросекко\nПросекко – старинный сорт итальянского винограда. Кроме того, с 2009 года так именуется область на севере Италии неподалеку от Венеции,\nа виноград переименовали в Глера. Он дает элегантные, энергичные, радостные и свежие вина,\nкоторые в самой Италии сделались объектом настоящего культа. Именно здесь в наилучшем виде\nвыражается эта легкость, эта типично итальянская радость жизни.\n\nАсти Спуманте\nТерритория производства Asti Spumante огра-\n\nничена и находится в Пьемонте, в окрестностях\nгородка Асти. Asti Spumante получают из сорта\nвинограда Мускат белый.\nПри производстве главное – как можно меньше\nвлиять на тонкий фруктовый вкус, подаренный\nприродой. Вино набирает пену в процессе натурального брожения в больших металлических\nчанах.\nСодержание алкоголя в спуманте варьируется от\n7 до 9% vol., что делает его легкопьющимся и подходящим для всевозможных праздников.\nТакая крепость объясняется неполным сбраживанием сахара, благодаря чему эти игристые\nвина более сладкие по сравнению с шампанским.\nСпуманте содержит до 90 грамм сахара на литр,\nи даже у самых сухих из них его содержание\nсоставляет от 10 до 20 грамм на литр.\n\nФранчакорта\nСогласно древним рукописям, уже по меньшей\nмере в начале 16 века в окрестностях Брешии\nбыл известен секрет изготовления игристого\nвина, которое называли vino mordace, «кусачее\nвино». Эти древние традиции были унаследованы\nвинами Franciacorta, которые сегодня изготавливают в Ломбардии по классическому методу с\nвторичным брожением в бутылках. В основе этих\nигристых вин лежат сорта винограда: Шардоне,\nПино Блан и Пино Нуар.", "* Мартини Просекко ** *Произведено в Италии\n\nMARTINI\nPROSECCO\n*\n\n.\n\n.\n\nитальянские игристые вина\n\nI0\n\nN 1 В МИРЕ\n.\n\n**\n\n.\n\nProdot to in\n\nI t a l i a ***\n\n**По данным «систем три коммьюникейшенз (лондон)», лтд.,\nВеликобритания (исследование IWSR) об объемах продаж\nлинейки игристых вин Martini (Asti, Prosecco, Brut, Rose,\nNero и др.) в стоимостном выражении за период с 01/16 по\n12/16 включительно в категории итальянских игристых вин.\n\nЧРЕЗМЕРНОЕ УПОТРЕБЛЕНИЕ АЛКОГОЛЯ ВРЕДИТ ВАШЕМУ ЗДОРОВЬЮ", "Ф ранция\n\nО хлаждение игристого вина\nВедерко со льдом нужно наполовину наполнить водой, что поможет\nбыстрее охладить вино до желаемой\nтемпературы. Если в ведерке нет\nводы, то вино или переохладится,\nили охладится недостаточно, ведь\nлед находится в контакте не со всей\nповерхностью бутылки. В барах и\nресторанах я часто видел бутылки,\nпросто поставленные на кучку льда.\nЭто совершенно бесполезная для\nохлаждения вина процедура.\nДля охлаждения вина в ведерке до\nтемпературы 7°С необходимо около\nодного часа, если до этого оно имело\nтемпературу 20°С.\nЕсли вам нужно быстро охладить\nбутылку игристого, вы можете добавить в ведерко горсть соли и стакан\nгазированной воды. Используйте этот\nтрюк только в случае крайней необходимости.\n\nО шибки при подаче игристого\n• Открывая игристое вино, не сотрясайте бутылку и не направляйте ее в\nсторону людей.\n• Не ставьте бутылку в ведерко с изображением марки конкурирующей\nфирмы.\n• Не прячьте этикетку, заворачивая\nбутылку, как младенца. Гость должен\nзнать, что он пьет.\n• Никогда не ставьте пустую бутылку\nв ведерко горлышком вниз.\n• Не бросайте в ведерко со льдом ни\nпробку, ни фольгу.\n\n194 Вино\n\nНаряду с шампанским во Франции производят\nи другие игристые вина, некоторые из них –\nкак в Шампани традиционным способом. Часто\nэти вина называют crémant (креман). Их меньше\nвыдерживают на осадке, чем шампанское, что\nприводит к образованию менее тонких пузырьков, но зато они более доступны. Такие вина\nможно встретить практически во всех винодельческих областях Франции. Самые известные\nи качественные из них происходят из Эльзаса,\nЛуары, Бургундии и Бордо.\nМногие французские игристые вина делают\nсогласно методу Шармата-Мартинотти – с брожением в больших закрытых металлических чанах.\n\nИ спания\nИгристые вина производят в Испании, а точнее,\nв Каталонии с 1872 года. Те из них, которые называются «cava» (кава), получают исключительно\nтрадиционным способом, выдерживая от 4 до 9\nлет в бутылках на осадке.\nДля кавы используют местные сорта винограда, дающие свежее, фруктовое и хорошо сбалансированное вино. К этим сортам относятся\nПареллада и Макабео, а также все большее применение находит Шардоне.\n\nР оссия\nПосле разгрома армии Наполеона и вступления\nцарских войск во Францию, русские офицеры\nраспробовали французские напитки и пристрастились к шампанскому. Вернувшись на родину,\nони не расстались с новой привычкой, и экспорт шампанских вин в Россию пережил небывалый бум. Вместе с тем в России, в частности\nв Крыму, в 19 веке были предприняты попытки\nизготовления отечественного игристого вина. Но\nпрактически все они по разным причинам, в том\nчисле из-за разрушительной Крымской войны,\nоказались неудачными.\nИсключением стало хозяйство князя Льва\nГолицына. В конце 1870-х годов он начал выращивать виноград неподалеку от Судака, ездил во\nФранцию перенимать опыт у лучших шампанистов и стал производить престижные игристые\nвина.\nКнязь Голицын был также главным виноделом\nимператорских имений, в частности хозяйства Абрау-Дюрсо, которое было основано в\nКраснодарском крае в 1870-м году. Под его руко-\n\nводством в 1898 году здесь было выпущено первое игристое вино.\nСегодня, спустя полтора века после своего\nоснования, хозяйство «Абрау-Дюрсо» является\nфлагманом российского виноделия и выпускает\nширокую гамму игристых вин.\n\nМ е тоды производс тва\nигрис тых вин\nКлассический метод\nИзобретение классического, или шампанского\nметода приписывают французскому монаху Дому\nПериньону, жившему в конце 17 века. Он смешивал в составе кюве полностью перебродившие\nсухие вина и разливал их в бутылки из толстого\nстекла, добавляя особый «ликер» из дрожжей и\nсахара. После этого прочно укупоренные бутылки укладывались в погреба, где в них проходило\nвторичное брожение, а углекислый газ медленно\nрастворялся в вине. Затем вина еще несколько\nмесяцев выдерживались на осадке, приобретая\nбогатство букета и вкуса.\n\nМетод Шармата-Мартинотти\nВ 1895 году итальянский ученый из Асти по имени\nФедерико Мартинотти предложил модернизировать классический метод. Он выступил с идеей\nпроводить вторичное брожение вина не в бутылках, а в герметических стальных емкостях – автоклавах.\nВ начале 20 века французский ученый Эжен Шармат усовершенствовал и запатентовал данный\nметод, который позволял ускорить производство\nи контролировать качество при больших объемах.\n\nИтальянский метод\nИтальянские виноделы переосмысли резервуарный метод, решив акцентировать свежесть и\nароматическую яркость молодых игристых вин.\nГлавным нововведением итальянского метода\nстало исключение из производственного цикла\nэтапа вторичного сбраживания: кюве составляется не из перебродивших, сухих вин, а из осветленного и охлажденного виноградного сока. Под\nдействием добавленных дрожжей кюве бродит в\nгерметичных чанах. Выделяющийся газ растворяется в вине. Когда достигается нужная крепость\n(не более 7,5% vol.), брожение останавливают холодом. При этом, остаточный сахар – тот, который\nне успели съесть дрожжи, сохраняет яркий фруктовый характер вина.", "Как делают\nигристое вино\nпо классическому методу\n\n2. Виноград отжимают в прессе, получая сусло.\n\n1. Для шампанского и других наиболее престижных\nигристых вин сбор урожая осуществляется вручную.\n\n4. При производстве шампанского мастер купажирования смешивает\nразличные вина: из разных сортов, с разных участков, разных годов\nурожая, получая вино с заданным вкусом, присущим определенной марке.\n\n5. Вино разливают в бутылки, добавляя смесь из\nсахара и дрожжей, и укладывают их в погреб.\nВ вине возникает вторичное брожение и образуется\nуглекислый газ. Однако после этого придется удалить\nдрожжевой осадок.\n\n3. Сусло бродит в чанах из нержавеющей стали.\n\n6. Вначале дрожжевой осадок переводят на пробку при\nпомощи ремюажа: бутылку постепенно опускают горлышком\nвниз, вращая вокруг своей оси. Вино выдерживают в\nвертикальном положении на осадке от 2 до 6 лет.\n\n7. Осадок удаляют при помощи дегоржажа: горлышко\nзамораживают и бутылку открывают, давая выскочить\nпревратившемуся в лед осадку. Затем в вино добавляют\n«экспедиционный раствор». Бутылки укупоривают и\nвыставляют на продажу.\nВино 195", "Просекко\nИ та льянск а я « дольче вита » – это смесь роскоши и неприну ж деннос ти .\nО дин из ее символов – просекко – олице творяе т прес тиж без снобизма и\nрасс лабление без вульгарнос ти . В этом тончайшем равновесии зак лючена вс я\nдуша И та лии .\n\nПросекко входит в число даров природы и цивилизации, наполняющих жизнь вкусом и шармом.\nПросекко объединяет миры сомелье и миксологии, свободно чувствуя себя как на столе, так и в\nсоставе коктейля. Последним просекко придает\nсвежесть и наделяет способностью доставлять\nудовольствие. Им можно облагородить простой\nсок, например, апельсиновый, сообщив ему характер и престиж. Но просекко тоже превосходно сочетается со сложными напитками, такими\nкак ликеры, аперитивы и крепкое спиртное. Наконец, просекко подчиняется вашему воображению, творческим порывам. Немногие продукты\nна земле обладают такими возможностями.\n\nПроисхождение\nПросекко – игристое вино, которое производится в области, охватывающей два итальянских\nрегиона – Венето и Фриули. Обычно эти вина\nотносятся к категории DOC. Вместе с тем, вина,\n\n196 Вино\n\nпроисходящие из провинций Конельямо Вальдоббьядене и Азоло, пользуются наиболее престижным
